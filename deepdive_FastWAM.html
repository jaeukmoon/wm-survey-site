  <script>
  const MD = "# Fast-WAM: Do World Action Models Need Test-time Future Imagination? — Deep-Dive\n\n> **이 논문이 달성하려는 것**: WAM(World-Action Model)이 추론 때 미래를 *명시적으로 상상*할 필요가 있는지를 묻는다. 학습 때 video co-training은 유지하되 추론 때 미래 생성을 빼서 — \"world model의 이득은 **학습-시 표현**에서 오지 추론-시 미래 생성에서 오는 게 아니다\" — 를 실증하고, imagine-then-execute 대비 **~4배 빠른(190ms) 실시간 제어**를 달성.\n\n| 항목 | 값 |\n|---|---|\n| 제목 | Fast-WAM: Do World Action Models Need Test-time Future Imagination? |\n| arXiv | 2603.16666v2 · 2026-03-23 |\n| 저자/소속 | Tianyuan Yuan, Zibin Dong, Yicheng Liu, Hang Zhao · IIIS, Tsinghua University + Galaxea AI |\n| 코드 | https://github.com/yuantianyuan01/FastWAM (HF: yuanty/fastwam) |\n\n> 읽는 법: 0장(핵심 질문)→3장(방법, 수식·구조)만 봐도 논지는 다 잡힌다. 3.2의 ASCII(MoT/마스크/train·test)가 그림이 안 보여주는 세부다.\n\n---\n\n## 0. 핵심 질문 (Abstract)\n\n- **핵심**:\n  - WAM은 \"행동에 따라 관측이 어떻게 변하나\"를 명시적으로 모델링해 VLA의 대안으로 떠올랐다.\n  - 그런데 대부분의 WAM은 **imagine-then-execute**(미래 영상을 반복 denoise → 그 위에 행동) 방식이라 **추론이 느리다**.\n  - 논문이 분리하려는 두 요인: **(1) 학습 때의 video 예측 목적** vs **(2) 추론 때의 명시적 미래 생성**. 통상 둘이 한 덩어리로 묶여 있어 \"미래 상상이 정말 성능에 필요한가\"가 불분명했다.\n- **왜 / 직관**: \"미래를 그려봐야 잘 움직인다\"는 통념을 둘로 쪼갠다 — *연습 때* 미래를 그려보며 배운 감각(표현)이 중요한가, 아니면 *실전에서도* 매번 미래를 그려야 하는가? 운전 비유: 초보 때 \"다음 순간 차가 어디 갈지\" 머릿속으로 그려보며 배우지만, 숙련되면 매 순간 그리지 않고 즉각 핸들을 꺾는다. 논문 주장은 후자 — **연습(학습) 때만 상상하면 충분**.\n- **학습/추론**: Fast-WAM = \"학습 땐 video co-training 유지, 추론 땐 미래 예측 skip\".\n\n---\n\n## 1. Introduction — 3가지 WAM 패러다임\n\n- **핵심**: WAM이 행동을 내는 방식을 추론 시 **미래를 실제로 생성하는가**를 축으로 3가지로 가른다.\n  - **(A) Joint-modeling**: 미래 video 토큰 + action 토큰을 **같은 denoise에서 동시** 생성.\n  - **(B) Causal**: **먼저 미래 관측을 생성** → 그 미래 표현에 조건부로 행동 예측.\n  - **(C) Fast-WAM (제안)**: 학습 땐 video co-training 유지, **추론 땐 미래 생성 제거** → latent world representation에서 **단일 forward**로 행동을 바로 예측.\n- **왜 / 직관**: (A)/(B)는 둘 다 추론 때 미래 영상을 만든다(=느림). (C)는 \"그 미래 영상 만드는 단계가 정말 정확도에 기여하나?\"를 의심하고 빼본다.\n- **그림 / 구조도**:\n  원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2603.16666v2/x1.png)\n  ![](https://arxiv.org/html/2603.16666v2/x1.png)\n  → 캡션(요지): (A) 미래 video+action 동시 denoise / (B) 미래 관측 먼저 생성 후 그에 조건부 행동 / (C) 학습 땐 video co-train, 추론 땐 미래 생성 제거하고 latent에서 1-pass 행동.\n\n  구조 정리(노트 — 그림 1은 3패러다임을 나란히만 보여주므로, \"추론 비용이 어디서 나는지\"를 명시):\n  ```\n  (A) Joint     : [obs] + noise(future video) + noise(action) ──> 반복 denoise(공동) ──> action\n                                                  └ 미래 video를 매 step 같이 깎음 (느림)\n  (B) Causal/IDM: [obs] ──> 미래 video 생성(반복 denoise) ──> [그 미래] ──> action 예측\n                              └ 미래를 \"먼저\" 다 만든 뒤 행동 (가장 느림, ~810ms)\n  (C) Fast-WAM  : [obs] ──> (백본 1-pass) z(o,l) ──> action expert ──> action\n                              └ 미래 video 생성 단계 자체가 없음 (~190ms)\n  공통 축: 학습 손실은 셋 다 동일(아래 §3.3). 다른 건 '추론 때 미래를 만드냐'뿐.\n  ```\n\n---\n\n## 2. Related Work\n\n- **핵심** (선행 3갈래):\n  1. **VLA (Vision-Language-Action)**: 관측+언어 → 행동을 사전학습 VL 백본으로 직접 매핑(미래 모델 없음).\n  2. **WAM (World-Action Model)**: 미래 시각 예측 + 행동 모델링을 한 틀에 결합.\n  3. **Video-based policy / Video world model**: 영상 생성을 환경 dynamics 모델로 써서 행동을 유도.\n- **왜 / 직관**: Fast-WAM은 2·3번(video를 쓰는 계열)의 \"추론 때 영상 생성\" 비용에 의문을 던지고, 1번(VLA)의 빠른 추론 인터페이스를 추론 단계에서 차용한다 — \"학습은 WAM, 추론은 VLA처럼\".\n- *(이 섹션은 개념 분류라 그림/수식 없음 — ASCII 불필요.)*\n\n---\n\n## 3. Method\n\n### 3.1 Problem Formulation (식 1–4)\n\n- **핵심**: 표준 정책 → imagine-then-execute → Fast-WAM 순으로 행동 분포 정의를 좁혀간다.\n\n**수식**:\n\n$$\np(a_{1:H}\\mid o,l) \\qquad (1)\n$$\n\n- $o$=현재 관측, $l$=언어 지시, $a_{1:H}$=호라이즌 $H$의 행동 청크. $\\theta$ 첨자 없음 = 일반 visuomotor 정책(미래 변수 없음).\n- 한 줄 직관: \"지금 보고 바로 행동\" (plain VLA).\n\n$$\np(a_{1:H}\\mid o,l)=\\int p(v_{1:T}\\mid o,l)\\,p(a_{1:H}\\mid o,l,v_{1:T})\\,dv_{1:T} \\qquad (2)\n$$\n\n- $v_{1:T}$=예측 호라이즌 $T$의 **미래 관측**. 미래를 생성($p(v_{1:T}\\mid o,l)$)한 뒤 그 위에 조건부로 행동.\n- 한 줄 직관: imagine-then-execute. 이 **적분 $\\int(\\cdots)dv_{1:T}$가 추론 시 반복 미래-video denoise 비용**의 정체.\n\n$$\np_\\theta(a_{1:H}\\mid o,l) \\qquad (3)\n$$\n\n- Fast-WAM의 **direct-policy 인터페이스**(추론 때 미래 생성 안 함). 여기부턴 $p_\\theta$.\n\n$$\np_\\theta(a_{1:H}\\mid o,l)=p_\\theta(a_{1:H}\\mid z(o,l)) \\qquad (4)\n$$\n\n- $z(o,l)$=현재 컨텍스트로 video 백본이 내는 **latent world representation**, **단일 forward encoding pass**로 획득.\n- 한 줄 직관: 식(2)의 적분이 $z(o,l)$ 인코딩 하나로 **대체**됨.\n\n> **콕 집어 못박기**: 식(1)은 $\\theta$ 없는 기준 정책, 식(3)·(4)는 $p_\\theta$ (Fast-WAM). 헷갈리지 말 것.\n\n### 3.2 Architecture — MoT 백본 + action expert\n\n- **핵심**:\n  - 백본 = 사전학습 **video diffusion transformer Wan2.2-5B** (video DiT + 내장 T5 text encoder + video VAE).\n  - 거기에 **~1B action expert**(hidden dim $d_a=1024$)를 붙여 총 **~6B**. 두 modality는 **Mixture-of-Transformers(MoT)** — weight는 분리, **attention만 공유**. -> [ASK] 여기서 action 부분에 DiT도 있고, action encoder도 있는데 action expert가 어디까지 포함하는건지?\n  - 토큰은 **3그룹**: ① clean 첫 관측 latent(공유 시각 앵커), ② noisy 미래-video latent(**학습 전용**), ③ action 토큰.\n  - **attention mask**가 미래 정보 누설을 막는다: *\"action 토큰은 미래 video 토큰을 attend 못 하고, clean 첫 프레임 토큰은 아무것도 attend 안 한다.\"*\n- **왜 / 직관**: video 백본은 \"세상이 어떻게 변하나\"를 이미 아는 사전학습 지식의 보고. 그걸 안 버리고(MoT로 weight 보존) action expert만 얹어 행동을 뽑되, mask로 \"미래 정답을 훔쳐보고 행동하는 치팅\"을 차단한다.\n- **그림 / 구조도**:\n  원본 그림 2(a): [arXiv Figure 2a](https://arxiv.org/html/2603.16666v2/x2.png)\n  ![](https://arxiv.org/html/2603.16666v2/x2.png)\n  → 캡션: \"Fast-WAM model architecture.\"\n  원본 그림 2(b): [arXiv Figure 2b](https://arxiv.org/html/2603.16666v2/x3.png)\n  ![](https://arxiv.org/html/2603.16666v2/x3.png)\n  → 캡션: \"Training and inference masks.\"\n\n  구조 정리(노트 — Fig.2는 전체 구조/마스크를 보여주지만 토큰 그룹별 흐름·weight 분리는 세부가 흐리므로 ASCII로 못박음):\n  ```\n  ── MoT 한 레이어 안의 흐름 (weight 분리, attention만 공유) ──\n   [① clean 첫관측 latent]   [② noisy 미래-video latent]   [③ action 토큰]\n      (video VAE, 공유 앵커)    (학습 전용 — 추론 땐 제거)      (noisy action)\n            │                        │                          │\n            │   video-DiT(~5B)의 Q/K/V        │      action expert(~1B,d_a=1024)의 Q/K/V\n            ▼                        ▼                          ▼\n            └──────────►  공유 self-attention (block mask)  ◄────┘\n                          softmax(QKᵀ)V 를 합친 시퀀스에서 한 번에\n            ┌──────────────┴───────────────┐\n            ▼                               ▼\n       video-DiT MLP(자기 weight)      action MLP(자기 weight)\n      [T5 text emb 는 cross-attention 으로 모든 토큰에 주입]\n\n  ── attention mask 규칙 (누설 차단) ──\n     ① clean 첫관측 → (아무도 attend 안 함; 순수 앵커)\n     ② 미래 video  → 자기들끼리 + ①  attend  (video 분기 내부)\n     ③ action      → 자기들끼리 + ①  attend,  ②(미래 video)는 ✗ attend 금지\n                      └ \"미래 정답 훔쳐보기\" 차단 → 추론 때 ② 없어도 일관\n  ```\n- **학습/추론**: 학습 = ①②③ 다 존재(②로 미래 예측 co-train). 추론 = **②를 통째로 제거**, ①만 백본 1-pass → ③가 행동 디코딩.\n- **숫자**: Wan2.2-5B + 1B action expert(d_a=1024) = 6B · 토큰 3그룹.\n\n#### [Q] action expert 범위 — encoder/DiT 어디까지?\n\n논문 기준 **action expert ≈ action DiT 전체**. 세부:\n- **포함**: action 토큰을 처리하는 ~1B Transformer 블록 전체 — Q/K/V projection, MLP, layer norm. hidden dim $d_a = 1024$.\n- **video-DiT와 공유하는 것**: self-attention 연산만 (MoT 구조). 가중치는 분리.\n- **action encoder/decoder**: 별도 인코더를 명시하지 않음. noisy action $a_t$를 직접 선형 projection해서 입력하고, 출력 토큰에서 velocity를 예측하는 선형 head가 붙는 표준 DiT-for-action 패턴.\n- 요약: **action encoder = 입력 projection, action DiT = Transformer 블록들, 둘을 합쳐 action expert**라 부름.\n\n#### [Q] noisy 미래 video — 형식·역할·추론 후 어떻게 작용?\n\n**형식**: video VAE로 인코딩한 미래 관측 latent $z_{1:T}$ (shape: `[T, H, W, C]`)에 flow matching noise를 섞은 토큰. 식(5)에서 $y = z_{1:T}$로 인스턴스화: $z_t = (1-t)\\,z_{1:T} + t\\,\\epsilon$.\n\n**학습 때 역할**:\n- ②번 토큰 그룹으로 video-DiT에 입력 → denoising 과정에서 \"미래 세계가 어떻게 변하는지\" backbone 가중치에 새겨짐.\n- attention mask상 action 토큰(③)은 ②를 attend 불가 → action expert는 미래 정답 참조 없이 clean 관측(①)만 보고 행동 예측 훈련. 이게 \"치팅 차단\"의 정체.\n\n**추론 때**: ② 그룹 자체를 통째로 제거. backbone은 ①만 보고 $z(o,l)$ 인코딩 → action expert가 행동 샘플링. 학습 때 video denoising이 backbone 표현을 좋게 만들었기 때문에, 추론 때 실제 미래를 생성하지 않아도 world knowledge가 $z(o,l)$ 안에 압축되어 남아있음. 이것이 논문의 핵심 주장 — \"**이득은 학습-시 표현에서, 추론-시 생성에서가 아니다**\"의 메커니즘.\n\n#### [심화] FastWAM은 어떻게 학습되나 — \"정보 차단(마스크)\"은 있고 \"그래디언트 차단(stop-gradient)\"은 없다\n\n> 위 두 블록(학습/추론 요약 + noisy 미래 video)을 한 묶음으로 정밀하게. 근거: 원문 §3.2(Architecture·Training objective)·§3.1(식 4)·§4.1(Implementation), 멀티에이전트 추출 후 원문 대조 적대적 검증 완료. **원문에 명시된 것 / 노트의 해석**을 분리해 표기한다.\n\n> **🟢 쉬운 한 장 요약 (학습이 결국 뭐 하나).**\n> 깨끗한 **첫 관측 latent ①** 을 보고, **미래 영상 ②**와 **행동 ③**의 *노이즈 섞인 버전*을 한 번에 받아 **둘 다 denoise**(노이즈→정답으로 \"되돌아가는 화살표\" 맞히기)하도록 배운다. 단 ③은 ②를 못 본다(mask = 미래 훔쳐보기 차단). 손실은 **같은 flow-matching 게임을 두 과목에 동시에** 건 것: $\\mathcal{L}=\\mathcal{L}_{\\mathrm{act}}+\\lambda\\mathcal{L}_{\\mathrm{vid}}$ (**본업=행동, 부업=영상**, λ가 부업 비중). 영상 과목은 **추론 땐 버리지만** 학습 때 백본을 좋게 만들어 행동이 읽는 표현 $z(o,l)$을 개선한다 → \"이득은 추론-시 생성이 아니라 **학습-시 표현**\". *(메커니즘 상세 = 아래 (1)–(7), 수식 정의 = §3.3.)*\n\n**(1) 학습 forward — 토큰 3그룹이 한 시퀀스로 동시에 들어간다**\n- ① clean 첫 관측 latent(**공유 시각 앵커**) · ② noisy 미래-video latent($z_{1:T}$, VAE가 만든 미래 프레임 토큰, **학습 전용**) · ③ noisy action 토큰($a_{1:H}$).\n- 한 번의 MoT joint forward에서 ②는 video flow-matching, ③는 action flow-matching을 **동시에** 푼다. 두 분기는 **weight 분리**(video DiT + action expert, $d_a=1024$의 1B expert, 합 6B)이되 **self-attention을 공유**한다. 언어 $l$은 T5로 인코딩돼 **모든 토큰에 cross-attention**으로 주입.\n\n**(2) 두 종류의 \"차단\"을 구분하라 — 이게 학습 이해의 핵심**\n- **정보 차단 (O · forward-pass)**: attention mask. ③ action은 ② 미래 video를 **attend 못 함**(미래 정답 훔쳐보기 차단). ②·③ 모두 ①은 읽고, ①은 아무것도 attend 안 하는 순수 소스. *(원문 명시)*\n- **그래디언트 차단 (X · 없음)**: 원문 전체에 **stop-gradient / detach / freeze가 하나도 없다**(전문 검색으로 확인). end-to-end, mixed precision, grad clip 1.0. 즉 ②의 손실 $\\mathcal{L}_{\\mathrm{vid}}$의 **그래디언트는 막히지 않고 공유 백본으로 흘러든다**. *(부재 = 검증된 사실)*\n\n> ⚠️ **π0.7의 Knowledge Insulation과 정반대 설계**: π0.7은 action expert의 gradient가 백본으로 흐르지 못하게 **stop-gradient로 막는다**. FastWAM은 그런 **gradient 차단이 없고**, 오직 **attention mask(정보 차단)** 하나만 쓴다. \"치팅 차단\"의 정체가 두 논문에서 다르다 — π0.7=gradient 격리, FastWAM=forward 마스크.\n\n**(3) 그래서 \"video 학습이 action을 좋게 한다\"의 정확한 경로**\n- **원문 명시**: video 예측 목적이 \"video DiT가 물리적으로 의미 있는 motion·interaction 구조를 인코딩하도록 **shape**한다\"(§3.2 Overview·§1). 그리고 action 분포는 백본이 내는 latent world representation $z(o,l)$로 파라미터화된다 — 식(4) $p_\\theta(a_{1:H}\\mid o,l)=p_\\theta(a_{1:H}\\mid z(o,l))$.\n- **노트의 해석(원문이 gradient-flow 문장으로는 안 씀)**: 차단이 *정보 차단뿐*이므로 $\\mathcal{L}_{\\mathrm{vid}}$의 gradient가 **공유 백본·공유 attention**을 갱신 → ①(공유 앵커)을 처리하는 그 백본 표현이 좋아짐 → action expert가 shared attention으로 ①을 읽어 만드는 $z(o,l)$이 좋아짐. 이것이 \"이득은 학습-시 표현에서\"의 작동 원리. *(원문은 결과만 단언: \"representations shaped by video co-training\")*\n\n**(4) 추론 — ② 그룹을 통째로 들어냄**: ①만 백본 **1-pass** → $z(o,l)$ → action expert가 10-step flow로 $a_{1:32}$ 샘플. 미래 video denoise 0 → **190ms**.\n\n**(5) 정밀 수치 (원문 §3.2·§4.1, 적대적 검증 완료)**\n\n| 항목 | 값 (원문) |\n|---|---|\n| 손실 | $\\mathcal{L}=\\mathcal{L}_{\\mathrm{act}}+\\lambda\\,\\mathcal{L}_{\\mathrm{vid}}$ (식 9); $\\mathcal{L}_{\\mathrm{act}}=\\mathcal{L}_{\\mathrm{FM}}(a_{1:H})$, $\\mathcal{L}_{\\mathrm{vid}}=\\mathcal{L}_{\\mathrm{FM}}(z_{1:T})$ |\n| flow target | $f_\\theta(y_t,t,o,l)\\to(\\epsilon-y)$, $y_t=(1-t)y+t\\epsilon$ (식 5·6) |\n| **λ 수치** | **원문 전체에 미제시 (확정 — 2회 전수검색)**. \"action·video 균형 가중치\"라고만 |\n| action horizon | $h=32$ |\n| 미래 video | **9 frame** (4× temporal downsample). multi-cam 이미지는 VAE 전에 1장으로 concat |\n| 노이즈 스케줄 | **logit-normal over $t$** (학습·추론 공통) |\n| 추론 | **10 denoise step**, **CFG 1.0** |\n| 옵티마이저 | AdamW lr $1\\times10^{-4}$, wd 0.01, cosine · mixed precision · grad clip 1.0 |\n| 학습 step | LIBERO 20k / RoboTwin 30k / real-world 30k · **embodied pretraining 없음** |\n| latency | Fast-WAM **190ms** vs IDM **810ms** (RTX 5090D V2 32GB) |\n\n**(6) 원문 미명시 (추측 금지)**: λ 수치 · self-attention의 Q/K/V projection이 두 expert 간 **공유인지 분리인지** · action expert 내부 세부(별도 인코더/velocity head/레이어 수) · VAE 공간 downsample 배수·latent 토큰 수 · batch size — 전부 원문에 없음. (앞 [Q] action expert 답의 세부 구성은 *표준 DiT 관행 기반 추론*이며 원문은 \"video 분기와 같은 구조의 action expert DiT, $d_a=1024$\"까지만 말한다.)\n\n**(7) controlled variants와의 차이 = 마스크/노이즈 한 줄** (원문 §3.3 \"Controlled Variants for Disentangled WAM Design\")\n- **Joint (A)**: 위 마스크에서 ③↔② attend 금지를 **풀어** 함께 denoise.\n- **IDM (B)**: video-then-action. GT video 토큰에 **p=0.5**로 noise augmentation.\n- 셋 다 **학습 손실(식 9)·구조 동일**; 다른 건 마스크 / 추론 시 미래 생성 여부뿐.\n\n### 3.3 Training Objective (식 5–9) — 세 패러다임이 공유\n\n> **원문 위치 정정**: 식 5–9는 실제로 원문 **§3.2 \"Training objective\" 소절**에 있다. 원문 **§3.3의 제목은 \"Controlled Variants for Disentangled WAM Design\"**(Joint/IDM 정의)다 — 식 번호는 유지하되 출처 위치만 바로잡음.\n\n- **핵심**: 직선 보간 위에서 속도장(velocity)을 회귀하는 **flow matching**을, **행동과 미래-video 양쪽에 joint**로 건다.\n- **학습/추론**: 식(9) 전체는 **학습에만**. 추론 땐 $\\mathcal{L}_{\\mathrm{vid}}$ 분기(②)가 사라진다.\n\n> **30초 큰 그림 — flow matching 한 문장 비유.**\n> \"정답(데이터)에 모래폭풍(노이즈)을 끼얹어 가는 길\"을 직선으로 그어 놓고, 그 길 위 **아무 지점에서나 \"집으로 가려면 어느 방향으로 얼마나 빨리 가야 하나\"(속도)를 맞히도록** 신경망을 훈련한다. 정답 자체를 외우게 하는 게 아니라 **\"되돌아오는 화살표\"**를 배우는 것. 추론 때는 순수 노이즈에서 출발해 이 화살표를 따라 거꾸로 몇 걸음 걸으면 정답이 복원된다.\n> - **왜 이게 좋은가**: 화살표(속도장)는 길 위에서 *방향이 일정*해서 배우기 쉽고, autoregressive처럼 한 토큰씩 순차 생성하는 게 아니라 **청크 전체를 몇 step 만에 한꺼번에 정제**한다 → 빠르다.\n> - **이 논문에서의 쓰임**: 같은 \"화살표 맞히기\" 게임을 **행동(action)**과 **미래 영상(video)** 두 과목에 동시에 시킨다. 영상 과목은 점수에 직접 안 들어가는 *연습문제*지만, 그걸 풀며 백본이 \"세상이 어떻게 변하나\"를 체득한다(=학습 전용 정규화).\n\n**수식**:\n\n$$\ny_t=(1-t)\\,y+t\\,\\epsilon \\qquad (5)\n$$\n\n- **무슨 식?** 정답 $y$와 노이즈 $\\epsilon$을 비율 $t$로 섞은 **중간 지점** $y_t$를 만든다. $t=0$이면 순수 정답, $t=1$이면 순수 노이즈, 그 사이는 둘의 혼합.\n- **비유**: 사진 두 장(왼쪽=정답, 오른쪽=모래폭풍)을 겹쳐 놓은 **크로스페이드 슬라이더**. $t$가 슬라이더 위치다. 학습할 땐 슬라이더를 무작위 위치에 던져 놓고 \"지금 이 흐릿한 그림에서 정답 쪽으로 가는 방향을 맞혀봐\"라고 시킨다.\n- **기호**: $y$=타깃(행동 $a_{1:H}$ 또는 미래 video latent $z_{1:T}$), $\\epsilon\\sim\\mathcal{N}(0,I)$=가우시안 노이즈, $t\\in(0,1)$=섞는 비율.\n\n$$\n\\mathcal{L}_{\\mathrm{FM}}(y)=\\mathbb{E}_{y,\\epsilon,t}\\!\\left[\\left\\lVert f_\\theta(y_t,t,o,l)-(\\epsilon-y)\\right\\rVert_2^2\\right] \\qquad (6)\n$$\n\n- **무슨 식?** 신경망 $f_\\theta$가 중간 지점 $y_t$를 보고 내놓은 \"예측 화살표\"가, **진짜 화살표** $(\\epsilon-y)$와 얼마나 다른지를 제곱오차로 재고 줄인다. ($o$=관측, $l$=언어 지시는 조건으로 함께 입력.)\n- **비유**: 안갯속($y_t$)에 서서 \"출구가 저쪽이야\"라고 가리키는 연습. 정답 화살표는 GPS가 알려주는 진짜 방향이고, 손실은 *내가 가리킨 방향과 GPS 방향의 어긋난 각도*. 수많은 위치($t$)·수많은 안개 패턴($\\epsilon$)에서 반복하면 길 전체의 방향 감각이 몸에 밴다.\n- **왜 화살표가 $(\\epsilon-y)$인가?** 식(5)를 $t$로 미분하면 $\\tfrac{d y_t}{dt}=\\epsilon-y$. 즉 \"$t$가 커질 때(정답→노이즈 방향) 점이 움직이는 속도\"가 정확히 $\\epsilon-y$다. 길이 직선이라 이 속도는 **위치와 무관하게 일정** → 그래서 배우기 쉽다.\n- **콕 집어 못박기**: 타깃은 $(\\epsilon-y)$지 $(y-\\epsilon)$가 **아니다**. 부호가 헷갈리면 \"식(5)에서 정답이 $t=0$ 쪽\"이라는 약속을 떠올리면 된다.\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathcal{L}_{\\mathrm{FM}}(a_{1:H}) \\qquad (7)\n$$\n\n$$\n\\mathcal{L}_{\\mathrm{vid}}=\\mathcal{L}_{\\mathrm{FM}}(z_{1:T}) \\qquad (8)\n$$\n\n- **무슨 식?** 식(6)의 *똑같은 게임*을 두 과목에 그대로 적용. $y=a_{1:H}$로 넣으면 **행동 손실**(식 7), $y=z_{1:T}$로 넣으면 **미래 영상 손실**(식 8). 같은 $f_\\theta$, 같은 규칙, 타깃만 바뀐다.\n- **비유**: 한 학생(공유 백본)이 **운전 시뮬레이터**로 두 과제를 같이 연습 — (7) \"다음 1초 동안 핸들·페달을 어떻게 움직일까\"(행동), (8) \"그러면 앞 유리에 무엇이 보일까\"(미래 영상). 같은 머리로 두 감각을 같이 기른다.\n- **콕 집어 못박기**: 비디오 분기 타깃은 픽셀 $v_{1:T}$가 **아니라** latent $z_{1:T}$ (사전학습 VAE가 압축한 토큰). 즉 \"원본 영상\"이 아니라 \"영상의 요약본\"을 맞힌다 — 가볍고 의미 중심.\n\n$$\n\\boxed{\\;\\mathcal{L}=\\mathcal{L}_{\\mathrm{act}}+\\lambda\\,\\mathcal{L}_{\\mathrm{vid}}\\;} \\qquad (9)\n$$\n\n- **무슨 식?** 두 손실을 더해 한꺼번에 최소화. **본업은 행동($\\mathcal{L}_{\\mathrm{act}}$)**, **부업은 미래 영상($\\lambda\\,\\mathcal{L}_{\\mathrm{vid}}$)**이며 $\\lambda$가 부업의 비중을 정하는 손잡이.\n- **비유**: 시험 점수(행동)가 진짜 목표지만, 옆에서 시키는 **예습 숙제(영상 예측)**가 실력을 다져준다. $\\lambda$를 키우면 숙제를 더 빡세게, 줄이면 살살. ($\\lambda$의 구체 수치는 **원문 전체 전수검색에도 미제시 — 확정**; \"균형 가중치\"라는 역할만 명시.)\n- **핵심 메시지**: 이 부업(영상 예측)이 *학습 때* 백본 표현을 좋게 만드는 게 논문이 말하는 \"world model의 진짜 이득\"이고, *추론 때*는 빼버린다 — 숙제는 실력을 키우는 수단이지 시험장에 들고 들어가는 게 아니다.\n\n### 3.4 Inference — 단일 forward (미래 생성 제거)\n\n- **핵심**: 미래 frame을 생성하지 않는다. clean 첫 관측 latent만 백본에 **한 번** 통과 → $z(o,l)$ → action expert가 행동 청크를 flow-matching 샘플(10 step).\n- **수식**: 식(4) $p_\\theta(a_{1:H}\\mid o,l)=p_\\theta(a_{1:H}\\mid z(o,l))$.\n- **그림 / 구조도** (그림 없음 → ASCII):\n  구조 정리(노트 — 논문에 train vs test 토큰 흐름 대비 그림은 마스크(2b)뿐, 흐름을 명시):\n  ```\n  TRAIN:  [① clean obs] + [② noisy 미래video] + [③ noisy action]\n              └──────────── MoT joint forward ────────────┘\n              L = L_act(③) + λ·L_vid(②)        ② → ③ attend ✗ (mask)\n  TEST :  [① clean obs] ─(백본 1-pass)→ z(o,l) ─→ [action expert] ─(10 step flow)→ a₁:₃₂\n              └ ② 미래video 그룹 자체가 없음 → 반복 video denoise 0 → ~190ms\n  핵심: 식(2)의 ∫p(v)·p(a|v)dv (미래 생성) 이 사라지고, z(o,l) 단일 인코딩으로 대체.\n  ```\n- **학습/추론**: 위가 정확히 그 차이. ~190ms(Fast-WAM) vs ~810ms(Fast-WAM-IDM, imagine-then-execute), 4배+.\n- **숫자**: 행동 호라이즌 $h=32$ · 미래 video 9 frame(4× temporal downsample) · 추론 10 denoise step, CFG 1.0, logit-normal $t$ schedule · RTX 5090D V2 32GB.\n\n---\n\n## 4. Experiments\n\n- **핵심**:\n  - 벤치: **LIBERO**(4 suite: Spatial/Object/Goal/Long, suite당 500 demo·10 task, 20k step, 40 task×총 2000 trial), **RoboTwin 2.0**(50+ bimanual task, 2,500 clean + 25,000 randomized demo, 30k step, task당 100 trial), **실세계 towel-folding**(Galaxea R1 Lite, 60h teleop, 30k step).\n  - 결과(평균 성공률): Fast-WAM이 imagine-then-execute 변형들과 **거의 동등**한데 **4배+ 빠름**.\n- **왜 / 직관**: \"미래 생성을 빼도 정확도가 안 떨어지면, 미래 생성은 추론 때 불필요\"라는 주장을 ablation으로 입증하는 게 실험의 본체.\n- **수치 (Table 1·2 평균 SR)**:\n\n  | | RoboTwin 2.0 | LIBERO |\n  |---|---|---|\n  | **Fast-WAM (제안, 추론 미래생성 X)** | **91.8%** | **97.6%** |\n  | Fast-WAM-Joint (A, 동시생성) | 90.6% | 98.5% |\n  | Fast-WAM-IDM (B, imagine-then-execute, ~810ms) | 91.3% | 98.0% |\n  | Fast-WAM **w/o video co-train** | 83.8% | 93.5% |\n  | LingBot-VA (pretrained, 참고) | 92.2% | 98.5% |\n  | Motus (pretrained, 참고) | 87.8% | 97.7% |\n\n- **ablation — 논문의 핵심 증거**:\n  - **video co-training 제거**가 **test-time 미래상상 제거보다 훨씬 큰 손실**: RoboTwin 91.8→83.8(**−8%p**), LIBERO 97.6→93.5(**−4.1%p**), 실세계 towel-folding은 **10%로 폭락**.\n  - 반면 Fast-WAM(추론 미래생성 X)은 Joint(90.6)·IDM(91.3)과 **거의 동등** → \"미래 생성 단계는 추론 때 빼도 됨\".\n- **이게 무슨 뜻? — \"학습은 반드시 world model 방식\"이라는 직관**:\n  - \"w/o video co-train\"은 식(9)에서 $\\lambda\\,\\mathcal{L}_{\\mathrm{vid}}$를 떼고 $\\mathcal{L}_{\\mathrm{act}}$ **만으로 학습**한 것 = **순수 VLA처럼 \"행동만 뱉도록\" 훈련**한 모델이다. 이게 크게 깨진다는 건, **학습 단계에서 미래 영상을 예측하는 world-model식 보조 과제가 (옵션이 아니라) 반드시 필요**하다는 뜻 — 사용자 이해 그대로다.\n  - **두 ablation을 짝지어 읽으면 결론이 분리된다**:\n    - 학습 때 영상 예측 **제거** → **치명적**(−4~8%p, 실세계 폭락). ⇒ \"세상이 어떻게 변하나\"를 학습으로 체득하는 과정은 **필수**.\n    - 추론 때 영상 생성 **제거** → **무해**(Joint·IDM과 동률). ⇒ 그 체득한 지식을 실전에서 *매번 다시 그려볼* 필요는 **없음**.\n  - **비유**: 운전 실력은 *연습 때* 머릿속으로 \"다음 순간 차가 어디 갈지\" 그려보며 길러야 한다(영상 예습 = 필수). 하지만 *숙련된 뒤 실제 운전에서는* 매 순간 그 장면을 일부러 상상하지 않아도 손이 먼저 나간다(추론 때 미래 생성 = 불필요). VLA처럼 처음부터 \"그냥 핸들 꺾는 법\"만 외운 운전자는 어려운 상황(towel-folding 같은 long-horizon)에서 무너진다.\n- **그림 / 구조도**:\n  원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2603.16666v2/figs/bench_grid_2560x720.png)\n  ![](https://arxiv.org/html/2603.16666v2/figs/bench_grid_2560x720.png)\n  → 캡션: 실세계 towel-folding(Galaxea R1 Lite). long-horizon + 정밀 closed-loop 조작 요구.\n  원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2603.16666v2/x4.png)\n  ![](https://arxiv.org/html/2603.16666v2/x4.png)\n  → 캡션: 실세계 towel-folding 결과 — (좌) 성공률 vs 완료시간, (우) 추론 지연 비교.\n- **학습 디테일**: AdamW(lr 1e-4, wd 0.01, cosine), mixed precision, grad clip 1.0.\n\n---\n\n## 5. Conclusion\n\n- **핵심 발견**: WAM에서 video 예측의 가치는 **학습 때 world 표현을 좋게 만드는 것**에 있지, **추론 때 미래 관측을 명시적으로 생성**하는 데 있지 않다. → 추론 때 미래 생성을 빼면 정확도는 유지하면서 ~4배 빠른 실시간 제어.\n- **함의**: \"학습=WAM, 추론=VLA처럼\" 이 실용적 sweet spot.\n\n---\n\n## 한눈에 정리\n\n- WAM의 통념(추론 때도 미래를 그려야 한다)을 **학습 신호 vs 추론 연산**으로 분해 → 추론 미래 생성은 빼도 된다는 걸 입증.\n- 구조: Wan2.2-5B video-DiT + 1B action expert(MoT, attention만 공유), 토큰 3그룹(clean obs / 미래video[학습전용] / action), mask로 미래→행동 누설 차단.\n- 학습: 식(9) $L=L_{act}+\\lambda L_{vid}$ (flow matching, 타깃 $\\epsilon-y$). 추론: 식(4) 단일 forward, 미래 video 그룹 제거 → 190ms.\n- 증거: video co-training 제거가 치명적(−8%p/−4.1%p/실세계 10%), 추론 미래생성 제거는 무해(Joint·IDM과 동률).\n\n## ⚠️ 확인 필요 / 나중에 (TODO)\n\n- [ ] **추론 per-step 샘플링 식**: 논문은 \"10 denoise step, CFG 1.0, logit-normal $t$\"만 산문으로 줄 뿐 **명시적 ODE/Euler 업데이트 수식이 없음**. 행동 샘플링의 수학적 근거는 학습식(6)뿐. (LaTeX 소스에 named solver 없음 확인됨.)\n- [ ] $\\lambda$ **수치값 미명시** — 균형 계수라고만. ablation에서 sweep 했는지 추가 확인 필요.\n- [ ] LingBot-VA / Motus 가 \"pretrained 참고치\"인데 Fast-WAM은 from-scratch인지 fair-comparison 조건 재확인.\n- [ ] logit-normal schedule의 평균/분산 파라미터(미명시, Wan2.2 인용).\n- [ ] Fast-WAM-Joint 추론 지연(본문 수치는 IDM 810ms만; Joint는 \"190ms보다 느림\"으로만).\n\n---\n## Source Provenance\n- Source: HTML (arxiv.org/html/2603.16666v2) + e-print LaTeX (수식 §3 검증)\n- Fetched: 2026-06-10\n- Parse reliability: High (수식 §3은 LaTeX 소스 2회 독립 대조·환각 0 / 실험 수치는 HTML 추출)\n- Verified by: paper-deepdive 멀티에이전트 워크플로(수식 dim 적대적 검증 완료) + 본 조립 시 직접 fetch 보강\n- Unconfirmed: 위 TODO 항목 (추론 ODE 식·λ 값 등 — 논문에 부재)\n";

    const j = await r.json();
    st.textContent = j.summary || JSON.stringify(j);
    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = '서버가 없습니다 — 터미널에서 `python surveybot/serve.py` 실행 후 http://localhost:8777 로 접속하세요. (요약·딥다이브 생성은 Claude 세션에서 /wm-survey)';
  }
}
</script>
</body></html>
