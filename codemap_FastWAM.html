  <script>
  const MD = "# Fast-WAM — 논문 본문 ↔ 코드 매핑 (Code Map)\n\n> 목적: [FastWAM_deepdive.md](FastWAM_deepdive.md)의 각 핵심 포인트·수식(식 1–9)·모듈을 **공식 구현 코드의 실제 위치(file:line)** 에 못박는다.\n> 코드 = `github.com/yuantianyuan01/FastWAM` (official, depth-1 clone 기준, 2026-06-14). HF 체크포인트 `yuanty/fastwam`.\n> 모든 인용은 repo 루트 기준 경로다. 핵심 결론 먼저: **논문 3패러다임 = 코드 3파일/3config**, **학습식(5–9) = `scheduler_continuous.py` + `fastwam.py:training_loss`**, **추론식(4) = `infer_action` + `mot.prefill_video_cache`**.\n\n---\n\n## 0. 레포 구조 — 어디에 뭐가 있나\n\n```\nFastWAM/\n├── configs/model/\n│   ├── fastwam.yaml          # (C) Fast-WAM 제안: 추론 미래생성 X\n│   ├── fastwam_joint.yaml    # (A) Joint: video+action 동시 denoise\n│   └── fastwam_idm.yaml      # (B) IDM/Causal: imagine-then-execute\n├── configs/train.yaml        # eval_num_inference_steps: 10  등 공통\n├── src/fastwam/\n│   ├── models/wan22/\n│   │   ├── fastwam.py        # ★ 메인: FastWAM 클래스, training_loss, attention mask, infer_*\n│   │   ├── fastwam_joint.py  # (A) 변형\n│   │   ├── fastwam_idm.py    # (B) 변형\n│   │   ├── action_dit.py     # ★ action expert (ActionDiT, ~1B, d_a=1024)\n│   │   ├── mot.py            # ★ Mixture-of-Transformers: 공유 self-attention + KV cache\n│   │   ├── wan_video_dit.py  # video DiT 백본(Wan2.2-5B), DiTBlock/flash_attention/rope\n│   │   ├── wan_video_vae.py  # video VAE (latent z 인코딩, 4× temporal downsample)\n│   │   ├── wan_video_text_encoder.py  # T5 text encoder\n│   │   └── schedulers/scheduler_continuous.py  # ★ flow matching (식 5·6·추론 step)\n│   ├── trainer.py            # 학습 루프(옵티마이저/스케줄/로깅)\n│   └── runtime.py\n└── experiments/{libero,robotwin}/   # 평가 하니스\n```\n\n매핑 한 줄 요약:\n\n| 논문 | 코드 |\n|---|---|\n| 3 패러다임 (A/B/C) | `fastwam_joint.py` / `fastwam_idm.py` / `fastwam.py` (+ 동명 config 3종) |\n| §3.2 MoT 백본+action expert | `fastwam.py:FastWAM`, `mot.py:MoT`, `action_dit.py:ActionDiT` |\n| §3.2 attention mask (누설 차단) | `fastwam.py:_build_mot_attention_mask` (386–407) |\n| 식(5) $y_t=(1-t)y+t\\epsilon$ | `scheduler_continuous.py:add_noise` (49–56) |\n| 식(6) 타깃 $(\\epsilon-y)$ | `scheduler_continuous.py:training_target` (58–61) |\n| 식(7)(8)(9) $L=L_{act}+\\lambda L_{vid}$ | `fastwam.py:training_loss` (448–568), 합산 line 563 |\n| 식(4) $p_\\theta(a\\mid z(o,l))$ 단일 forward | `fastwam.py:infer_action` (906) + `mot.py:prefill_video_cache` (257) |\n| 추론 Euler step (논문 미기재) | `scheduler_continuous.py:step` (82–88) |\n\n---\n\n## 1. 세 패러다임 = 세 파일 / 세 config (§1, §4 ablation)\n\n논문 Fig.1의 (A)Joint / (B)Causal-IDM / (C)Fast-WAM 이 코드에서 **각각 독립 모델 클래스 + config**로 존재한다. ablation 표(논문 §4)가 곧 이 셋의 비교다.\n\n- **(C) Fast-WAM** (제안, 추론 때 미래생성 X) → `src/fastwam/models/wan22/fastwam.py` + `configs/model/fastwam.yaml`\n- **(A) Joint** (video+action 동시 denoise) → `fastwam_joint.py` + `fastwam_joint.yaml`\n- **(B) IDM/Causal** (imagine-then-execute, ~810ms) → `fastwam_idm.py` + `fastwam_idm.yaml`\n\n세 config 모두 `hidden_dim: 3072`(video expert), action expert `hidden_dim: 1024`(= 논문 $d_a=1024$), `lambda_action: 1.0`로 동일 → **차이는 오직 \"추론 때 미래를 만드냐\"의 구현**이고 학습 골격은 공유(논문 §3.3 \"세 패러다임이 학습식 공유\"와 정확히 일치).\n\n> \"w/o video co-train\" ablation(논문에서 −8%p/−4.1%p/실세계 10% 폭락)은 별도 파일이 아니라 **`lambda_video`를 0으로 두는 config 변형**으로 재현된다(아래 §3 참조).\n\n---\n\n## 2. §3.2 아키텍처 → 코드\n\n### 2.1 MoT — \"weight 분리, attention만 공유\"\n\n논문: video DiT(~5B)와 action expert(~1B)는 **가중치는 분리, self-attention만 공유**. 코드의 정체는 `mot.py`의 `_mixed_attention`:\n\n`src/fastwam/models/wan22/mot.py:77`\n```python\ndef _mixed_attention(self, q_cat, k_cat, v_cat, attention_mask):\n    attn_mask = attention_mask.to(device=q_cat.device)\n    def _forward(q, k, v):\n        return flash_attention(q=q, k=k, v=v, num_heads=self.num_heads, ctx_mask=attn_mask)\n    return _forward(q_cat, k_cat, v_cat)\n```\n- `q_cat/k_cat/v_cat` = **video 토큰과 action 토큰의 Q/K/V를 이어붙인 것** → 단 한 번의 attention으로 두 modality가 섞인다(= \"attention만 공유\"). 반면 각 expert의 **MLP·LayerNorm·projection 가중치는 분리**(video는 `wan_video_dit.py`, action은 `action_dit.py`).\n- `attention_mask` = 아래 2.3의 블록 마스크 → 어떤 토큰이 어떤 토큰을 보는지 통제.\n\n### 2.2 action expert = ActionDiT (§3.2 [Q] \"action expert 범위\")\n\ndeepdive의 결론(\"action encoder = 입력 projection, action DiT = Transformer 블록, head = velocity\")이 코드로 **그대로** 확인된다.\n\n`src/fastwam/models/wan22/action_dit.py:74` · `:98` · `:86`\n```python\nself.action_encoder = nn.Linear(action_dim, hidden_dim)   # 입력 projection (noisy action → 토큰)\n...\nself.blocks = nn.ModuleList([DiTBlock(hidden_dim, attn_head_dim, num_heads, ffn_dim, eps)\n                             for _ in range(num_layers)])   # action DiT 블록들\nself.head  = nn.Linear(hidden_dim, action_dim)             # velocity 출력 head\n```\n- `hidden_dim = 1024`(config) = 논문 $d_a$. `post_dit`(:301)은 `head(tokens)` 한 줄 → 출력이 **velocity**(식 6의 $f_\\theta$ 출력).\n- **별도 action encoder/decoder 없음** 확정: 입력은 `Linear` 한 장, 출력은 `Linear` 한 장. deepdive의 \"표준 DiT-for-action 패턴\" 서술과 일치.\n- `ACTION_BACKBONE_SKIP_PREFIXES = (\"action_encoder.\", \"head.\")`(:33) — 사전학습 backbone을 로드할 때 **encoder/head는 새로 초기화**(나머지 DiT 블록만 로드). 즉 action 입출력 layer는 항상 fresh.\n\n### 2.3 attention mask — \"미래 정답 훔쳐보기 차단\" (§3.2 핵심)\n\ndeepdive의 마스크 규칙(① clean obs는 아무도 attend 안 함 / ③ action은 ①만 attend, ② 미래 video ✗)이 코드로 정확히 박혀 있다.\n\n`src/fastwam/models/wan22/fastwam.py:386`\n```python\ndef _build_mot_attention_mask(self, video_seq_len, action_seq_len, video_tokens_per_frame, device):\n    total = video_seq_len + action_seq_len\n    mask = torch.zeros((total, total), dtype=torch.bool, device=device)\n    # video -> video (백본 자체 마스크: first_frame_causal)\n    mask[:video_seq_len, :video_seq_len] = self.video_expert.build_video_to_video_mask(...)\n    # action -> action  (action 토큰끼리는 bidirectional)\n    mask[video_seq_len:, video_seq_len:] = True\n    # action -> first-frame video ONLY  (clean 첫 관측만; 미래 video는 막힘)\n    first_frame_tokens = min(video_tokens_per_frame, video_seq_len)\n    mask[video_seq_len:, :first_frame_tokens] = True\n    return mask\n```\n- 마지막 두 줄이 핵심: action 행(`[video_seq_len:, ...]`)은 **자기들끼리 + 첫 프레임 토큰만** True. 즉 **action → noisy 미래 video 토큰은 영구히 False**(attend 금지) = 논문의 \"치팅 차단\". 그래서 추론 때 미래 video 그룹을 통째로 빼도 action 분기의 attention 패턴이 일관된다.\n\n### 2.4 토큰 3그룹\n\n학습 입력 구성은 `training_loss`(아래 §3.2 코드)에서 만들어진다: ① clean 첫 관측 latent(`first_frame_latents`로 `latents[:,:,0:1]` 덮어쓰기, `fastwam.py:467-468`), ② noisy 미래 video latent(`add_noise(input_latents,...)`), ③ noisy action(`add_noise(action,...)`). config `num_frames: 33`(`configs/data/*.yaml`) → VAE 4× temporal downsample → 약 9 latent frame(deepdive \"미래 video 9 frame\"과 일치).\n\n---\n\n## 3. §3.3 학습 (식 5–9) → 코드\n\n### 3.1 flow matching 본체 — `scheduler_continuous.py`\n\n식(5)·(6)이 함수 두 개로 정확히 대응. (deepdive의 \"타깃은 $\\epsilon-y$지 $y-\\epsilon$ 아님\" 못박기를 코드가 증명.)\n\n`src/fastwam/models/wan22/schedulers/scheduler_continuous.py:49` (식 5)\n```python\ndef add_noise(self, original_samples, noise, timestep):\n    sigma = (timestep / self.num_train_timesteps)...\n    return (1 - sigma) * original_samples + sigma * noise     # y_t = (1-t) y + t ε\n```\n`:58` (식 6 타깃)\n```python\n@staticmethod\ndef training_target(sample, noise, timestep):\n    return noise - sample          # target = ε - y   (← y - ε 아님!)\n```\n- `sigma = timestep/num_train_timesteps` 가 곧 식(5)의 $t$. `_phi`(:17)·`sample_training_t`(:31)가 논문이 말한 **shift 기반(logit-normal류) t 스케줄**(`shift=5.0` 기본).\n\n### 3.2 $L = L_{act} + \\lambda L_{vid}$ — `fastwam.py:training_loss`\n\n식(7)(8)(9)이 한 메서드에 다 있다.\n\n`src/fastwam/models/wan22/fastwam.py:458-465` (video 분기 = 식 8 준비)\n```python\nnoise_video   = torch.randn_like(input_latents)\ntimestep_video= self.train_video_scheduler.sample_training_t(...)\nlatents       = self.train_video_scheduler.add_noise(input_latents, noise_video, timestep_video)  # 식5\ntarget_video  = self.train_video_scheduler.training_target(input_latents, noise_video, timestep_video)  # 식6\n```\n`:470-477` (action 분기 = 식 7 준비) — 동일 패턴으로 `noisy_action`/`target_action`.\n\n`:504-528` MoT 한 번 통과(video+action 토큰 + 위 attention_mask) → `pred_video`, `pred_action`.\n\n`:550` action loss (식 7) · `:539` video loss (식 8) · **`:563` 합산 (식 9)**:\n```python\naction_loss_token = F.mse_loss(pred_action.float(), target_action.float(), reduction=\"none\").mean(dim=2)\n...\nloss_total = self.loss_lambda_video * loss_video + self.loss_lambda_action * loss_action   # = L_act + λ L_vid (식9)\n```\n- 즉 `loss_lambda_video` = 논문의 **$\\lambda$**. config 기본 `lambda_video: 1.0`, `lambda_action: 1.0`(`configs/model/fastwam.yaml:58` 부근).\n- **논문에 없던 구현 디테일**: 각 손실에 timestep별 가중 `training_weight`(`scheduler:39`)가 곱해진다(`fastwam.py:545-548, 558-561`). 식(9)엔 없는 per-timestep reweighting(Wan2.2식) → 노트에 못박을 가치 있음.\n\n> **\"w/o video co-train\" ablation 재현**: 식(9)에서 $\\lambda L_{vid}$ 제거 = `loss_lambda_video: 0.0`으로 두면 순수 $L_{act}$(=VLA식 학습). 논문에서 이게 가장 크게 깨졌다(학습-시 world modeling이 필수라는 핵심 증거).\n\n---\n\n## 4. §3.4 추론 (식 4) → 코드 — \"미래 생성 제거, 단일 forward\"\n\n식(4) $p_\\theta(a_{1:H}\\mid o,l)=p_\\theta(a_{1:H}\\mid z(o,l))$ 의 구현이 `infer_action`이다.\n\n`src/fastwam/models/wan22/fastwam.py:906` 핵심 흐름:\n```python\ntimestep_video = torch.zeros(...)                       # ① 첫 관측은 CLEAN (t=0, noise 없음)\nvideo_pre = self.video_expert.pre_dit(x=first_frame_latents, timestep=timestep_video, ...)  # 미래 video latent 없음\nvideo_kv_cache = self.mot.prefill_video_cache(video_tokens=video_pre[\"tokens\"], ...)        # ② z(o,l): 백본 1-pass → KV 캐시\n# 이후 action 토큰만 flow-matching denoise (캐시된 video KV에 attend)\ninfer_timesteps_action, infer_deltas_action = self.infer_action_scheduler.build_inference_schedule(...)\n```\n- `timestep_video = zeros` → 첫 관측을 **노이즈 없이** 인코딩. **noisy 미래 video 토큰 그룹 자체가 입력에 없음** → 논문의 \"추론 때 ② 제거\".\n- `prefill_video_cache`(`mot.py:257`) = **video 백본을 단 한 번 통과시켜 per-layer K/V를 캐시** → 이게 식(4)의 $z(o,l)$ \"단일 forward encoding\". 이후 action denoise 루프는 이 캐시에 attend만 하므로 video 재연산 0 → 논문의 ~190ms.\n- denoise 각 step의 적분기(deepdive TODO였던 \"명시적 ODE 식 없음\")는 `scheduler.step`:\n\n`scheduler_continuous.py:82`\n```python\n@staticmethod\ndef step(model_output, delta, sample):\n    return sample + model_output * delta     # Euler: x ← x + v·Δσ\n```\n→ **추론은 단순 Euler 적분**(velocity × σ-간격 누적). 논문 본문엔 식이 없지만 코드는 이것.\n\n### 4.1 (A)(B) 비교 구현\n- **(A) Joint**: `fastwam.py:infer_joint`(726) / `fastwam_joint.py` — video와 action을 같은 step에서 같이 denoise(`_predict_joint_noise`, 570).\n- **(B) IDM**: `fastwam_idm.py`(452줄) — 미래 video를 먼저 완전 생성한 뒤 그 위에 action(imagine-then-execute, ~810ms).\n- `infer`(1051)가 모드에 따라 위를 디스패치.\n\n---\n\n## 5. deepdive의 TODO/미확인 항목 — 코드로 해소된 것\n\n| deepdive TODO | 코드 근거 / 결론 |\n|---|---|\n| 추론 per-step **ODE/Euler 식 없음** | `scheduler.step`(82) = `sample + model_output*delta` (Euler). **해소** |\n| **$\\lambda$ 수치 미명시** | config `lambda_video/lambda_action: 1.0` (기본). 추가로 timestep별 `training_weight` reweighting 존재(논문 외). **해소(+보강)** |\n| 추론 denoise step 수 | `infer_action` 함수 기본값 20, **but** 실제 eval은 `configs/train.yaml:eval_num_inference_steps: 10` → 논문 \"10 step\"과 일치. **해소** |\n| video frame 수(9) | `num_frames: 33` + VAE 4× temporal downsample ⇒ ~9 latent frame. **정합** |\n| action expert 범위 | `action_encoder`(Linear) + `DiTBlock×N` + `head`(Linear), `hidden_dim=1024=d_a`. **확정** |\n\n---\n\n## 6. 주의 / 아직 미확인\n\n- 본 매핑은 **공식 repo `yuantianyuan01/FastWAM`** 기준이다. (동명의 다른 org 미러가 보일 수 있으나 공식 저장소를 기준으로 함.)\n- 파라미터 수(video ~5B + action ~1B = ~6B)는 config의 `hidden_dim/num_layers`로 추정 가능하나, 정확한 총 파라미터·Wan2.2-5B 체크포인트 변형은 HF `yuanty/fastwam`에서 별도 확인 필요.\n- `training_weight`(timestep reweighting), `_phi` shift schedule의 정확한 분포 형태는 Wan2.2 계열 관례 — 본 매핑에선 \"논문 식엔 없는 구현 디테일\"로만 표시.\n- text encoder(T5)·VAE의 세부(`wan_video_text_encoder.py`/`wan_video_vae.py`)는 백본 상속분이라 매핑에서 깊이 다루지 않음.\n- depth-1 clone이라 git 히스토리/이슈는 미참조.\n\n---\n## Source Provenance\n- Code: `github.com/yuantianyuan01/FastWAM` (depth-1 clone, 2026-06-14 KST), 메인 에이전트가 소스 직접 정독.\n- Paper ref: [FastWAM_deepdive.md](FastWAM_deepdive.md) (arXiv 2603.16666v2).\n- 검증: file:line·코드 스니펫은 클론 소스 verbatim. 식↔코드 대응은 직접 대조(High).\n- Unconfirmed: 정확한 총 파라미터, HF 체크포인트 변형 (위 §6).\n";
