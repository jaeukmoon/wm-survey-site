  <script>
  const MD = "# Next Forcing: Causal World Modeling with Multi-Chunk Prediction — Deep-Dive\n\n> **이 논문이 달성하려는 것**: autoregressive WAM(World-Action Model)의 지배적 학습법인 **teacher-forced next-chunk denoising**이 빠지는 *myopic supervision*(근시안적 감독) — 인접 chunk가 거의 같아 \"직전 장면 복붙(appearance shortcut)\"으로 loss를 낮춰 진짜 dynamics를 안 배우는 문제 — 을, **여러 미래 chunk(next¹·next²·next³)를 동시에 예측하는 보조 MCP(Multi-Chunk Prediction) module**을 붙여 해결한다. LLM의 multi-token prediction을 *continuous video latent + iterative denoising* 설정으로 옮긴 것. 같은 MCP module이 **학습 때는 dense temporal supervision**, **추론 때는 parallel chunk decoding(2× 가속)**의 이중 역할을 한다. 결과: RoboTwin SOTA(Clean/Random 94.1/93.5%), 50fps에서 2.3× 빠른 수렴, 2× 추론 가속. **FastWAM·LingBot-VA와 같은 RoboTwin WAM 라인의 직접 후속수.**\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2606.11187 · 2026-06 |\n| 저자/소속 | Ant Group / Robbyant 계열 (repo `gangweix/next-forcing`) — *정확한 author list는 본 노트 수집 범위에서 미확인* |\n| 코드 | https://github.com/gangweix/next-forcing |\n| backbone | LingBot-VA framework + **Wan2.2 Transformer (30 layers)** |\n| 벤치 | RoboTwin 2.0 (50 bimanual task) · PhyWorld · in-house general video (~3.5M clips) |\n| 완성도(rigor) | 81/100 (평가 14·abl 17·base 17·재현 16·근거 17) |\n\n> 읽는 법: 0(핵심)→§4(방법, 식 4–13·ASCII)만 봐도 논지는 다 잡힌다. §4.2(chunk shifting + 높은 noise bias)와 §4.5(loss)·§4.6(추론 2모드)이 핵심. §5는 \"왜 high-fps에서 더 잘 되나\"가 본체.\n\n---\n\n## 0.5 핵심 개념 정리 (헷갈림 방지 — 여기부터 읽기)\n\n> 이 논문을 읽을 때 가장 많이 꼬이는 지점들을 먼저 못박는다. 아래 6개만 잡으면 §3~§4가 안 헷갈린다.\n\n### (A) 세 축은 서로 다른 것: autoregressive · flow matching · teacher forcing\n\n셋이 다 \"생성/학습\" 얘기라 헷갈리지만 **층위가 다르다** (충돌 아님).\n\n- **Autoregressive (AR)** = *chunk 단위의 시간축 생성 방식*. 영상을 $M$ frame짜리 **chunk**로 쪼개 chunk 1 → 2 → … 순서로, 각 chunk를 **이전 chunk들에 조건 걸어** 만든다.\n- **Flow matching** = *한 chunk 안에서 노이즈를 지우는 목적함수*. chunk 하나($M$ frame 전체)를 몇 스텝 ODE로 **한꺼번에** 정제 → **flow matching 자체는 AR이 아니다**(chunk 내부는 병렬).\n- **Teacher forcing** = *학습 때 조건으로 주는 과거를 무엇으로 하느냐*. chunk $i$를 만들 때 조건인 \"과거 chunk\"를 **모델 출력이 아니라 정답 데이터의 clean chunk**로 준다(RNN 학습에서 온 개념).\n- **콕 집어**: 이 모델은 **\"chunk끼리는 AR / chunk 내부는 flow matching(non-AR) / 조건은 teacher forcing\"**. 셋이 식 3 한 줄에 다 들어있다(§3.2 참조).\n\n### (B) autoregressive 생성 ≠ MCP(multi-chunk prediction) — 가장 헷갈리는 지점\n\n둘 다 \"여러 미래 chunk\"가 나와서 헷갈리지만 **완전히 다른 것**이다.\n\n| 축 | **Autoregressive 생성** | **MCP (Next Forcing이 추가한 것)** |\n|---|---|---|\n| 정체 | 영상을 **실제로 만드는 방식** | **학습용 보조 감독**(문제를 더 어렵게) |\n| 언제 | 학습 + 추론 (생성 그 자체) | **학습 only** (추론 zero-overhead에선 제거) |\n| 순서 | chunk를 **하나씩 순차** 생성 (i 만들고→조건에 넣고→i+1) | 한 위치 $i$에서 **i+1·i+2·i+3을 한 forward에 동시** 예측 |\n| 결과물 | **실제 출력**(다음 스텝 입력으로 append) | **출력 안 씀** — gradient만 뽑고 예측값은 버림 |\n| 목적 | 시퀀스 생성 | 복붙 shortcut 차단 → 진짜 dynamics 학습 강제 |\n\n- **chunk $i{+}3$을 얻는 법 대비**: **AR**은 $i{+}1$을 *진짜로* 생성→append→$i{+}2$→append→$i{+}3$ (순차 3스텝, 실제로 씀). **MCP**는 $i$에서 $i{+}1,i{+}2,i{+}3$을 한 번에 예측하되 **실제 영상으로 안 씀**(다음 AR 스텝의 main이 어차피 다시 만드니 버림). 오직 gradient용.\n- **비유**: AR = 시험을 한 문제씩 순서대로 실제로 푸는 것. MCP = 공부할 때 \"지금 문제 + 3문제 뒤까지 동시에 풀어봐\"라는 연습 — 실제 시험(추론)엔 안 하고, 연습 덕에 실력만 오른다.\n\n### (C) \"main model\" / MCP / {4,12,20,30} / chain 의 정체\n\n- **main model = WAM 본체 = Wan2.2 Transformer 30 layers**(LingBot-VA 프레임워크의 backbone). video(+action) chunk를 실제로 denoise하는 놈.\n- **MCP 모듈은 학습된다**(자기 weight $W_k$ + depth당 lightweight transformer 3블록). 다만 *목적*이 gradient를 **main으로 역류**시키는 것이라, 추론 zero-overhead 모드에선 **떼어버린다** → \"학습용 코치\"(학습되지만 test-time엔 버릴 수 있음).\n- **{4,12,20,30}은 action expert가 아니다.** main model 30 layer 중 **4·12·20·30번째 layer의 hidden state**(초기=coarse 구조, 후기=fine 디테일)를 뽑아 fuse하는 것(식 7).\n- **causal chain은 AR 생성이 아니다.** $h_{\\mathrm{fuse}}$→depth1→depth2→depth3로 **feature(표현)를 릴레이로 넘겨 보조 예측 3개를 만드는 것**이지, 생성물을 append해 다시 넣는 AR 루프가 아니다(표현 전달 ≠ 시퀀스 생성).\n\n### (D) chunk vs frame, 그리고 §4.1의 \"1m\"\n\n- **frame = 영상 한 장(한 시점)**, **chunk = 연속 $M$ frame 묶음**(= AR의 단위이자 chunk shifting의 이동 단위).\n- §4.1 비유의 **\"1m\"은 프레임 수가 아니라 *감독 horizon*** = \"바로 다음 **1 chunk**\". teacher-forced next-chunk denoising은 chunk(=$M$ frame)를 만들지만 감독은 *다음 1 chunk*에만 걸린다(\"1m\"). MCP는 next¹·²·³ = \"1·2·3 chunk 앞\"(식 4의 $i{+}k$; §4.1 운전 비유의 \"1m·3m·5m\"은 근/중/원 *은유*일 뿐 리터럴 chunk offset이 아니다 — 실제 offset은 $i{+}1,i{+}2,i{+}3$). → \"영상 생성이니 여러 프레임 보는 것 아니냐\"는 *chunk 내부 프레임*과 *chunk 간 horizon*을 섞은 혼동이며, 비유는 chunk 간 horizon 기준이라 맞다.\n\n### (E) AR·teacher forcing은 이 논문 게 아니라 base(LingBot-VA/WAM 표준) 상속\n\n- AR chunk 생성 + teacher forcing + persistent KV cache는 전부 **base인 LingBot-VA의 설계**다(§3.2). 논문 첫 문장 *\"The dominant training objective for WAMs is teacher-forced next-chunk denoising\"* = \"우리가 만든 게 아니라 이게 표준\"이라는 선언. **Next Forcing이 실제로 추가한 건 오직 MCP.**\n- 그 AR은 **RNN-recurrent이 아니라 Transformer + causal attention + KV cache 기반 autoregression**이다(Diffusion Forcing 원구현의 RNN latent $z_{t-1}$과 대비 — 겉보기 반복 생성은 같아도 메커니즘이 다름).\n\n### (F) forcing 계열 좌표 (diffusion / self forcing 과의 관계)\n\n\"forcing\"류는 *무슨 손잡이를 돌리나*로 갈린다 (배경지식 `basic_theory.md`의 \"Forcing family\" 토픽):\n\n- **teacher / self forcing → CONTEXT 축** (조건을 clean GT 과거로 vs 자기 생성 과거로).\n- **diffusion forcing → NOISE 축** (토큰마다 독립 노이즈 레벨; 학습 때 노이즈 낀 과거를 경험시켜 exposure bias 완화).\n- **Next forcing → TARGET 축** (무엇을 예측 — 현재 chunk만 vs 현재+미래 여러 chunk).\n- 따라서 Next Forcing은 teacher/self/diffusion 어느 것과도 **직교(orthogonal)·조합 가능(composable)** — 논문이 §2에서 명시하는 포지셔닝. (상세 대비·수식은 `basic_theory.md` Forcing family 카드.)\n\n### (G) \"학습 때 AR = 순차 루프\"가 아니다 + FastWAM(블록 한꺼번에)과의 대비\n\n- **AR이라고 학습을 chunk 하나씩 루프 돌리는 게 아니다.** LingBot-VA/Next Forcing/DreamZero도 학습 때는 **GT 시퀀스 전체를 한 번의 forward**에 넣고 **causal attention mask**로 \"각 chunk는 자기보다 앞선 clean chunk만 본다\"를 강제해 **모든 chunk의 next-chunk 손실을 병렬로** 계산한다(LLM teacher forcing과 동일한 트릭). **실제 순차 생성 루프는 추론 때만** 일어난다. → 정확히는 *\"AR = 학습 땐 병렬 계산이지만 causal 의존구조 / 추론 땐 실제 순차 생성\"*. \"AR이니 학습도 하나씩 느리게 도나?\" → 아니다.\n- **FastWAM은 학습 때 미래를 next-chunk로 잇지 않는다 = \"블록 한꺼번에\".** 미래 window(9 frame)를 **하나의 블록**으로, clean 첫 관측(anchor)에 조건 걸어 한 번에 예측(video co-training). 그리고 **추론 땐 미래 생성 자체를 제거**(single-forward direct policy $p_\\theta(a\\mid z(o,l))$). 즉 chunk 단위 AR rollout이 아니다 — 이것이 FastWAM의 정체성(\"학습은 WAM처럼, 추론은 VLA처럼\")이자 Next Forcing 라인과의 근본 대비.\n\n| | 미래 예측 구조(학습) | 계산 방식(학습) | 추론 |\n|---|---|---|---|\n| LingBot-VA / **Next Forcing** / DreamZero | **next-chunk (causal 의존)** | 1-forward + causal mask (병렬) | **순차 AR 루프** |\n| **FastWAM** | **future window 블록 한꺼번에** | 1-forward | **미래 생성 없음** (1-pass) |\n\n- **forcing family 좌표와 연결**: \"next-chunk(causal) = 다음 것만 순차\" vs \"full-sequence(블록) = 한꺼번에 같은 취급\"은 사실 **노이즈 스케줄 하나로 이어지는 스펙트럼**이다 — Diffusion Forcing이 *per-token 노이즈 레벨*로 통합(과거=레벨0(clean)이면 next-chunk 극한, 전부 동일 레벨이면 full-sequence). 그래서 \"AR이냐 한꺼번에냐\"는 양자택일이 아니라 같은 축의 양 끝.\n\n---\n\n## 1. Introduction — 3가지 문제의식\n\n- **핵심**:\n  - WAM은 future video와 action을 함께 모델링해 manipulation policy를 학습한다. 지배적 학습 목표 = **teacher-forced next-chunk denoising**(clean past chunk를 조건으로 noisy current chunk를 denoise).\n  - **문제 = appearance shortcut → myopic supervision**: 인접 chunk가 시각적으로 매우 유사해, clean past → current의 *near-identity map*(작은 residual만 보정)으로도 denoising loss가 크게 떨어진다. 이 지름길이 gradient를 흡수해 장기 temporal dynamics를 배울 압력을 없앤다. 저자는 이를 **myopic supervision**이라 명명(§1에서 정의).\n  - **high frame rate에서 특히 치명적**: 50fps에선 인접 chunk gap이 거의 사라져 shortcut이 사실상 lossless → 표준 teacher forcing은 수렴이 느리고 최종 accuracy도 낮다(Figure 1).\n  - **핵심 통찰**: local single-chunk 목표를 **long-range multi-chunk 목표**로 바꾸면, 모델이 복붙 대신 *temporal evolution을 지배하는 latent dynamics*를 배우도록 강제된다. LLM의 **multi-token prediction(MTP)**에서 검증된 발상.\n  - **MTP→video 이전이 non-trivial한 이유**: 예측 target이 discrete token이 아니라 *continuous video latent*, 생성이 single-step이 아니라 *iterative denoising*, temporal dependency가 *여러 horizon에 걸침*.\n  - **포지셔닝**: 기존 forcing 계열은 *모델이 보는 context*를 바꾸거나(teacher/self forcing) *noise schedule*을 바꾼다(diffusion forcing). Next Forcing은 **\"무엇을 예측하도록 요구받는가(what to predict)\"**를 바꾸므로 이들과 **직교(orthogonal)·composable**.\n\n- **왜 / 직관**: teacher-forced next-chunk denoising은 \"바로 직전 프레임을 보고 다음 chunk를 만들라\"는 받아쓰기다. 두 chunk가 거의 같으니 모델은 *복사 + 약간 수정*이라는 손쉬운 길을 택해 loss를 떨어뜨린다 — 시험 답이 바로 윗줄에 적혀 있어 베껴도 점수가 나오는 셈. 그래서 loss는 줄지만 \"장면이 어떻게 변하는가\"는 못 배운다. fps가 높을수록 베끼기가 무손실이라 더 나빠진다. 해결은 \"멀리 보게 강제하기\": next¹·next²·next³를 동시에 맞히게 하면 단순 복사로는 먼 미래를 못 맞히니 latent dynamics를 배워야 한다.\n\n- **그림 / 구조도**:\n\n  원본 그림 2(전체 overview): [arXiv Figure 2](https://arxiv.org/html/2606.11187v1/x2.png)\n  ![](https://arxiv.org/html/2606.11187v1/x2.png)\n  → main model이 current chunk를 denoise하는 동안, chained MCP module이 main의 feature로 미래 chunk(next¹, next², …)를 예측. **학습 = dense supervision / 추론 = parallel chunk prediction.** (전체 구조를 풀어쓴 ASCII 다이어그램은 §4.1 참조.)\n\n- **숫자**: RoboTwin SOTA Clean/Random **94.1/93.5%** · 50fps **2.3× 수렴 가속** · **2× 추론 가속** · general video pretraining(3.5M clips)에서 **FVD 50%+ 감소** · MCP depth = 3(next¹·²·³).\n\n- **기여 4가지**: ① myopic supervision을 극복하는 MCP framework ② RoboTwin SOTA + 훨씬 빠른 수렴 ③ MCP를 추론에 retain해 current와 병렬로 next chunk 예측 → 생성 가속 ④ discrete→continuous로 MCP를 옮기는 design choice(timestep shift, multi-layer feature fusion, causal MCP chain)의 체계적 ablation.\n\n---\n\n## 2. Related Work — \"어느 손잡이로 푸느냐\"\n\n- **핵심 (2.1 World Action Models)**: VLA(관찰+언어 → action 직접 매핑; RT-2/OpenVLA/π0)와 달리 WAM은 *먼저 미래 시각 dynamics를 예측하고 그 프레임에서 action을 decode*한다. 최근 발전 축 — **DreamZero**(14B autoregressive video diffusion, zero-shot/cross-embodiment), **LingBot-VA**(teacher forcing 통합 framework + persistent KV cache로 bimanual SOTA; 본 논문의 base), **Fast-WAM**(\"video modeling의 주이득은 *학습-시 world representation 개선*에 있다\"는 발견). → 본 논문은 새 architecture/data scaling이 아니라 **학습 패러다임(training paradigm)을 MCP로 개선**, 기존 WAM에 그대로 적용 가능 + 추론 가속.\n\n- **핵심 (2.2 Autoregressive Video Generation)**: 표준 학습 = teacher forcing(clean GT context로 current chunk denoise) → 안정적이나 학습(clean) vs 추론(self-generated) **distribution gap = exposure bias**. 기존 해법은 *context 구성 방식(how context)*을 손봄 — **Diffusion Forcing**(frame마다 독립 noise level → 학습 때도 noisy context 경험), **Self Forcing**(self-generated history 조건 + distribution-matching loss). Next Forcing은 *무엇을 예측하나(what to predict)*라는 **다른 보완 축**을 건드린다.\n\n- **왜 / 직관**: 작문 교습에 두 축 — \"무슨 자료를 보고 쓰게 할까(context)\" vs \"얼마나 앞을 내다보고 쓰게 할까(예측 target)\". Diffusion/Self Forcing은 보여주는 자료를 손보고, Next Forcing은 과제 자체를 \"한 수 → 여러 수 앞 읽기\"로 바꾼다. 그래서 충돌이 아니라 직교·보완.\n\n- **숫자**: §2 본문 유일 수치 = DreamZero 14B. (본 논문 실험 수치는 related-work 특성상 없음.)\n\n---\n\n## 3. Preliminaries\n\n### 3.1 Flow Matching\n\n- **핵심**: noise 분포 → data 분포로 sample을 옮기는 **velocity field**를 배운다. clean $x_0$와 noise $\\epsilon$을 직선 보간한 $x_t$ 위에서, network $v_\\theta$가 *직선의 속도* $\\epsilon-x_0$를 예측하게 한다. 추론은 $t{=}1$(노이즈)→$t{=}0$(데이터)으로 velocity를 ODE 적분.\n\n- **30초 큰 그림**: \"노이즈→데이터를 잇는 직선의 *방향 화살표*(velocity)\"를 길 위 아무 데서나 맞히는 연습. 직선이라 속도가 위치와 무관하게 *상수*여서 배우기 쉽다.\n\n**수식**:\n\n$$\n\\mathbf{x}_t = (1-t)\\,\\mathbf{x}_0 + t\\,\\boldsymbol{\\epsilon}, \\qquad \\boldsymbol{\\epsilon}\\sim\\mathcal{N}(0,\\mathbf{I}) \\qquad (1)\n$$\n\n- **무슨 식?**: clean과 noise를 비율 $t$로 섞은 중간 지점 $x_t$를 만든다.\n- **비유**: 정답·노이즈 두 사진을 겹친 *크로스페이드 슬라이더*, $t$가 슬라이더 위치($t{=}0$ 정답, $t{=}1$ 순수 노이즈).\n\n$$\n\\mathcal{L}_{\\mathrm{FM}} = \\mathbb{E}_{t,\\mathbf{x}_0,\\boldsymbol{\\epsilon}}\\left[\\left\\lVert v_\\theta(\\mathbf{x}_t, t, \\mathbf{c}) - (\\boldsymbol{\\epsilon} - \\mathbf{x}_0)\\right\\rVert^2\\right] \\qquad (2)\n$$\n\n- **무슨 식?**: 예측 화살표 $v_\\theta$와 정답 화살표 $(\\epsilon-x_0)$의 MSE를 모든 $(t,x_0,\\epsilon)$에서 최소화.\n- **콕 집어 못박기**: target은 $(\\epsilon - x_0)$다(식 1을 $t$로 미분하면 $dx_t/dt=\\epsilon-x_0$). $\\mathbf{c}$=context(조건). timestep $t$는 shift parameter $s$로 샘플링(상세 Appendix C).\n\n### 3.2 Autoregressive Video Generation with Teacher Forcing\n\n- **핵심**: base는 **LingBot-VA**. pre-trained VAE의 video latent 위에서 영상을 $M$ frame 단위 **chunk**로 autoregressive 생성. step $i$에서 noisy current chunk를, *GT에서 온 clean 이전 chunk들* + 언어 $\\ell$을 조건으로 denoise → **teacher forcing**. closed-loop 배포(매 action 후 생성 frame이 실제 관측으로 교체)와 정합. 한계: supervision이 current chunk에만 갇혀 **myopic supervision**.\n\n  > **층위 정리 (VAE vs 백본 vs 프레임워크 — 헷갈림 방지)**: **Wan2.2**는 그 자체가 하나의 비디오 생성 모델 패키지로 **Transformer(DiT) + 자체 video VAE(Wan-VAE) + text encoder**를 품는다. 이 논문이 백본으로 쓰는 건 그중 **Wan2.2 Transformer(30 layers)** = main model이며 **이것은 VAE가 아니다**. 위 \"pre-trained VAE\"는 별개 부품인 **video VAE**(영상↔latent 인코더/디코더, frozen)이고, 백본이 Wan2.2 Transformer인 만큼 짝으로 딸려오는 **Wan-VAE**일 가능성이 높다(*노트 기준 추정 — 원문이 VAE 명칭을 명시하지 않음 → TODO*). 층위: **video VAE(Wan-VAE, 입출력) → Wan2.2 Transformer(백본) → LingBot-VA(프레임워크: teacher forcing·persistent KV cache·joint MoT) → Next Forcing(MCP 추가)**. chunk 분할·flow matching·denoising·MCP는 전부 픽셀이 아니라 이 latent 공간에서 일어나며, VAE 자체는 학습하지 않는다.\n\n**수식**:\n\n$$\nv_{\\theta}\\!\\left(\\mathbf{x}_{t}^{(i)},\\,t,\\,[\\mathbf{x}_{0}^{(1:i-1)},\\,\\ell]\\right)\\approx\\boldsymbol{\\epsilon}^{(i)}-\\mathbf{x}_{0}^{(i)} \\qquad (3)\n$$\n\n- **무슨 식?**: i번째 chunk의 noise를 \"정답 과거 chunk들 + 명령어\"를 보고 denoise — supervision이 **current chunk 하나에만** 걸린다.\n- **비유**: 받아쓰기에서 한 단어 틀려도 선생이 정답을 불러주고 다음을 잇게 하는 것. 안정적이지만 \"바로 다음 한 칸\"만 채점받아 멀리 못 본다.\n- **기호**: 위첨자 $(i)$=i번째 autoregressive chunk, $(1:i-1)$=이전 chunk 묶음(GT clean).\n- **콕 집어 (왜 이 한 식이 flow matching이면서 teacher forcing인가)**: *목적함수*는 flow matching(출력 velocity $v_\\theta$, 타깃 $\\epsilon^{(i)}-x_0^{(i)}$)이고, *조건 거는 방식*은 teacher forcing이다. 조건 $[\\mathbf{x}_0^{(1:i-1)},\\ell]$에서 $\\mathbf{x}_0$가 **clean(정답)** 과거 chunk라는 점이 teacher forcing의 정체 — \"깨끗한 정답 과거로 현재를 denoise\". 두 성질(목적함수 축·조건 축)이 한 줄에 겹쳐 있는 것이지 같은 것이 아니다(§0.5-A 참조).\n\n- **그림 / 구조도** (그림 없음 → ASCII):\n  ```\n   GT clean chunks            noisy current chunk x_t^(i)\n   x0^(1) ... x0^(i-1)               │ (noise level t,s)\n        └── condition [x0^(1:i-1), ℓ] ─► v_θ ─► velocity ≈ ε^(i) - x0^(i) ─► chunk i\n   step i→i+1: 과거를 '생성물'이 아니라 GT x0^(i)로 채움(teacher forcing)\n   ⇒ loss는 current chunk에만 = myopic supervision (먼 미래엔 신호 없음)\n  ```\n\n---\n\n## 4. Next Forcing (방법)\n\n### 4.1 Overview\n\n- **핵심**: 표준 teacher-forcing 목표에 **MCP를 augment**. 학습 시 main model은 current chunk를 denoise하고, **3개 auxiliary MCP module이 next¹·next²·next³ chunk를 causal chain으로 denoise**(각 depth가 직전 depth 출력 위에 쌓임). 추론 시 두 모드: **(a) MCP 폐기 = zero-overhead**(baseline과 동일 latency/memory), **(b) MCP 유지 = parallel chunk generation(2×)**.\n\n- **왜 / 직관**: 운전 교습을 \"바로 앞 1m만 보기\"에서 \"1m·3m·5m 지점을 동시에 예측하기\"로 바꾸면 trajectory 단위로 사고하게 강제된다. 핵심 영리함은 **비용 구조** — 학습 땐 멀리 보는 코치(MCP)를 붙이고, 추론 땐 코치를 떼거나(공짜) 그대로 써서 속도를 산다.\n  > **헷갈림 방지(한 줄)**: \"1m\" = 프레임 수가 아니라 감독 horizon(§0.5-D) · \"동시에 예측(MCP)\" = 학습용 보조 감독이지 AR 생성 루프가 아님(대비표 §0.5-B).\n\n  구조 정리(노트 — Fig.2의 요지를 풀어쓴 것; mask·layer index 등 세부는 §4.2–4.3):\n  ```\n  ground-truth: [clean past ...][current chunk]   [미래: next¹  next²  next³ ...]\n\n     clean past + noisy current ──► MAIN MODEL (iterative denoise) ──► current chunk\n                                        │ intermediate features (여러 layer)\n                                        ▼\n                                 MCP#1 ─► next¹   ┐\n                                   │ causal chain  │ TRAIN: dense temporal supervision\n                                 MCP#2 ─► next²   │ INFER: MCP 유지 → 병렬 chunk 예측(2×)\n                                   │              │\n                                 MCP#3 ─► next³   ┘\n     - MCP는 main보다 높은 timestep shift → main 표현에 더 의존(coupling↑)\n  ```\n\n### 4.2 Multi-Chunk Prediction Objective\n\n- **핵심 3장치**: ① **Temporal Chunk Shifting**(식 4) — 영상을 $k$ chunk 미래로 당긴 target, 경계는 마지막 chunk 복제(pad). ② **Independent Noise Injection**(식 5) — depth마다 독립 $t_k,\\epsilon_k$로 noising하되 $s_{\\mathrm{mcp}} > s_{\\mathrm{main}}$로 **더 높은 noise level**에 bias. ③ **MCP Position Encoding**(식 6) — RoPE를 $i{+}k$에 줘 미래 offset을 알림.\n\n- **왜 / 직관 (핵심 트릭)**: 미래 chunk일수록 일부러 노이즈를 세게 줘(높은 $s_{\\mathrm{mcp}}$) *미래 정답을 거의 지운다*. 그러면 MCP module은 자기 입력만으론 못 풀고 **main model의 표현에 매달릴 수밖에 없다** → \"미래를 맞춰라\"는 gradient가 작은 보조 module에 흡수되지 않고 **main model로 역류**해 본체가 trajectory-level 표현을 키우게 압박한다. (학생에게 거의 가려진 미래 문제를 던져 선생에게 묻게 만들어, 선생 실력이 늘게 하는 셈.)\n\n**수식**:\n\n$$\n\\mathbf{x}_0^{[k]}[i] = \\mathbf{x}_0\\big[\\min(i+k,\\, F)\\big] \\qquad (4)\n$$\n\n- **무슨 식?**: depth $k$의 target = 정답 영상을 $k$ chunk 미래로 민 것($x_0$ shape $C\\times F\\times H\\times W$, $F$=chunk 수). $\\min(\\cdot,F)$로 경계 밖은 마지막 chunk 복제.\n\n$$\n\\mathbf{x}_{t_k}^{[k]} = (1-t_k)\\,\\mathbf{x}_0^{[k]} + t_k\\,\\boldsymbol{\\epsilon}_k, \\qquad \\boldsymbol{\\epsilon}_k\\sim\\mathcal{N}(0,\\mathbf{I}) \\qquad (5)\n$$\n\n- **무슨 식?**: 각 depth를 *독립* noise·timestep으로, 그것도 *더 세게* 노이징($t_k$는 $s_{\\mathrm{mcp}}$로 샘플, $s_{\\mathrm{mcp}}>s_{\\mathrm{main}}$).\n\n$$\n\\mathrm{RoPE}\\big(\\mathbf{x}_0^{[k]}[i]\\big) = \\mathrm{RoPE}(i+k) \\qquad (6)\n$$\n\n- **무슨 식?**: 각 MCP에 \"네가 맞출 건 $i{+}k$ 위치\"라는 미래 좌표를 RoPE로 알린다.\n\n- **그림 / 구조도**:\n  ```\n  (a) Chunk Shifting [식4]:  원본 [c_i][c_{i+1}][c_{i+2}][c_{i+3}]...[c_F]\n        k=1 → target c_{i+1} / k=2 → c_{i+2} / k=3 → c_{i+3} / 경계초과 → c_F 복제\n  (b) Noise Injection [식5]:  x0^[k] --(t_k, ε_k; s_mcp > s_main)--> x_{t_k}^[k]  (high-noise bias)\n  (c) Position [식6]:  depth k 입력에 RoPE(i+k)\n  핵심: 강하게 가린 미래 target → MCP가 main 표현에 의존 → MCP gradient가 main으로 역류\n  ```\n\n### 4.3 Chained MCP Modules\n\n- **핵심 2장치**:\n  - **Multi-Layer Feature Fusion**(식 7) — main의 30 layer 중 **{4,12,20,30}** hidden state를 concat→2-layer MLP로 $h_{\\mathrm{fuse}}$ 생성. 초기 layer=coarse 구조, 후기 layer=fine detail이라 둘 다 써야 다양한 depth 표현에 영향. MCP loss gradient가 $h_{\\mathrm{fuse}}$를 통해 이 중간 layer들로 역류 → backbone 초기·후기 모두에 temporally-aware supervision. (수집된 hidden state는 *noisy current + clean history latent 둘 다* 포함.)\n  - **Causal Chain Across Depths**(식 8) — depth $k$마다 noisy shifted target을 shared patch embed → 직전 depth 출력 $h_{\\mathrm{prev}}^{[k-1]}$과 concat → $W_k$로 사영 → **3개 lightweight transformer block** → velocity $\\hat v^{[k]}$. 출력이 다음 depth의 $h_{\\mathrm{prev}}^{[k]}$($h_{\\mathrm{prev}}^{[0]}=h_{\\mathrm{fuse}}$).\n  - MCP는 main과 **동일한 attention mask 공유** → step당 mask 1회 구성(상세 Appendix A, Figure 5).\n\n- **왜 / 직관**: 화가가 밑그림(coarse, 초기층)과 세밀한 붓터치(fine, 후기층)를 다 보고 평가하는 것 = multi-layer fusion. Causal chain = **릴레이**: depth-1이 next¹ 바통을 depth-2에 넘기면 depth-2가 그 위에서 next², depth-3이 next³.\n\n**수식**:\n\n$$\n\\mathbf{h}_{\\mathrm{fuse}} = \\mathrm{MLP}([\\mathbf{h}_4;\\mathbf{h}_{12};\\mathbf{h}_{20};\\mathbf{h}_{30}]) \\in \\mathbb{R}^{B\\times N\\times d} \\qquad (7)\n$$\n\n- **무슨 식?**: 여러 깊이 hidden state를 한데 섞어 multi-scale temporal feature 한 덩어리로 압축. $B$=batch, $N$=latent token 수, $d$=hidden dim.\n\n$$\n\\mathbf{z}^{[k]} = W_k\\,[\\mathbf{h}_{\\mathrm{prev}}^{[k-1]};\\,\\mathrm{Embed}(\\mathbf{x}_{t_k}^{[k]})], \\qquad W_k \\in \\mathbb{R}^{d\\times 2d} \\qquad (8)\n$$\n\n- **무슨 식?**: 직전 depth 출력 + 이번 depth shifted target 임베딩을 concat(2d) → $W_k$로 d로 사영 = 사슬의 한 고리. $h_{\\mathrm{prev}}^{[0]}=h_{\\mathrm{fuse}}$.\n\n- **그림 / 구조도**:\n  ```\n  MAIN MODEL (30 layers)  L1 ... [L4] ... [L12] ... [L20] ... [L30] → denoise current\n                                  h4      h12      h20      h30\n                                   └────── concat ──► [2-layer MLP] ──► h_fuse (= h_prev^[0])   ...식(7)\n   ── CAUSAL CHAIN ──\n    z^[1]=W1[h_prev^[0]; Embed(x_t1^[1])] → [3 TF blocks] → v̂^[1]  →  h_prev^[1]   ...식(8)\n    z^[2]=W2[h_prev^[1]; Embed(x_t2^[2])] → [3 TF blocks] → v̂^[2]  →  h_prev^[2]\n    z^[3]=W3[h_prev^[2]; Embed(x_t3^[3])] → [3 TF blocks] → v̂^[3]\n   gradient: L_k^MCP → h_fuse → {L4,L12,L20,L30} 역류 ⇒ backbone 초기·후기에 temporal supervision\n   * MCP는 main과 SAME attention mask 공유 → step당 mask 1회 (Appendix A)\n  ```\n\n### 4.4 Joint Video-Action Architecture\n\n- **핵심**: LingBot-VA를 따라 **2-stage joint modeling** — (1) video stream $p_\\theta$가 다음 visual chunk $x_{i+1}$ 예측, (2) action stream $g_\\psi$가 *예측된 미래까지 포함한 관측* $x_{\\le i+1}$에 조건부로 **inverse dynamics**로 action $a_i$ decode. 두 stream은 **하나의 Mixture-of-Transformers(MoT)** 안에서 매 layer **cross-modal attention**으로 fuse. MCP는 **video stream에서 동작**하고, 개선된 video 표현이 cross-modal attention으로 action stream에 **간접 전파**된다.\n\n  > ⚠️ 확인 필요: \"MCP가 *오직* video stream에만 작동하고 action엔 직접 손대지 않는다\"는 배타성(exclusivity)은 본문에서 단언을 확인하지 못했다(맨 끝 TODO 참조). 확실한 것은 \"MCP는 video stream에서 동작 + cross-modal attention으로 action에 간접 전파\"까지.\n\n- **왜 / 직관**: 당구 선수가 큐를 치기 전에 공 궤적을 시뮬(Stage 1: video 예측)하고 그 그림을 보고 손 힘·각도(Stage 2: action)를 정한다. *inverse dynamics* = \"시작 상태 + 도착 상태(예측된 다음 frame)를 보고 그 사이 행동을 역추론\" → 그래서 action 조건에 미래 $x_{\\le i+1}$이 들어간다. video 쪽 \"눈\"이 MCP로 좋아지면 귓속말(cross-modal attn)을 타고 action도 무임승차로 좋아진다.\n\n**수식**:\n\n$$\n\\mathbf{x}_{i+1}\\sim p_{\\theta}(\\cdot\\mid\\mathbf{x}_{\\leq i},\\mathbf{a}_{<i},\\ell),\\qquad \\mathbf{a}_{i}\\sim g_{\\psi}(\\cdot\\mid\\mathbf{x}_{\\leq i+1},\\mathbf{a}_{<i},\\ell) \\qquad (9)\n$$\n\n- **무슨 식?**: 먼저 다음 frame을 그리고($p_\\theta$), 그 그린 미래를 보고 행동을 역추론한다($g_\\psi$). 좌=Stage 1, 우=Stage 2. 우변 조건 $x_{\\le i+1}$이 *예측된 미래 chunk를 포함*하는 것이 inverse-dynamics의 정의적 특징(video가 먼저, action이 그 결과에 조건부 = 순차 의존).\n\n- **그림 / 구조도**:\n  ```\n        ┌──────────── Unified MoT ────────────┐\n        │ VIDEO stream   ⇄cross-modal attn⇄  ACTION stream │  (매 layer fuse)\n        │   p_θ: x_{i+1} 예측        g_ψ: a_i (x_{≤i+1} 조건, inverse dyn) │\n        └──────┬───────────────────────────────┘\n        MCP(§4.3)는 VIDEO stream에서 동작 → 개선된 video 표현이\n        shared cross-modal attn 통해 ACTION stream으로 간접 전파(직접 수정 없이 이득)\n  ```\n\n### 4.5 Training Objective\n\n- **핵심**: 전체 손실 = main(video+action) + depth별 MCP loss의 가중합. **각 MCP loss는 마지막 k개 padded(복제) chunk를 제외**하고 계산(가짜 미래로 벌주지 않음; k = MCP depth). 가중치는 $w_1=0.5,\\ w_2=0.2,\\ w_3=0.1$ (먼 미래일수록 작게).\n\n**수식**:\n\n$$\n\\mathcal{L}_{\\mathrm{video}} = \\mathbb{E}_{t,\\mathbf{x}_0,\\boldsymbol{\\epsilon}}\\big[\\,\\lVert v_\\theta(\\mathbf{x}_t, t, \\mathbf{c}) - (\\boldsymbol{\\epsilon} - \\mathbf{x}_0)\\rVert^2\\,\\big] \\qquad (10)\n$$\n\n$$\n\\mathcal{L}_{\\mathrm{action}} = \\mathbb{E}_{t,\\mathbf{a}_0,\\boldsymbol{\\epsilon}}\\big[\\,\\lVert v_\\psi(\\mathbf{a}_t, t, \\mathbf{c}_a) - (\\boldsymbol{\\epsilon} - \\mathbf{a}_0)\\rVert^2\\,\\big] \\qquad (11)\n$$\n\n- **무슨 식?**: (10) video stream이 미래 visual state로 가는 velocity를, (11) action stream이 inverse dynamics로 action을 회귀. $c_a$는 *현재+미래 관측*의 visual context를 포함(본문 명시).\n\n$$\n\\mathcal{L}_k^{\\mathrm{MCP}} = \\mathbb{E}_{t_k,\\mathbf{x}_0^{[k]},\\boldsymbol{\\epsilon}_k}\\big[\\,\\lVert v_\\theta^{[k]}(\\mathbf{x}_{t_k}^{[k]}, t_k, \\mathbf{c}) - (\\boldsymbol{\\epsilon}_k - \\mathbf{x}_0^{[k]})\\rVert^2\\,\\big] \\qquad (12)\n$$\n\n- **무슨 식?**: depth $k$ MCP가 자기 shifted target $x_0^{[k]}$를 맞히는 flow-matching loss. *마지막 $k$개 padded chunk는 제외*.\n\n$$\n\\boxed{\\;\\mathcal{L} = \\mathcal{L}_{\\mathrm{video}} + \\mathcal{L}_{\\mathrm{action}} + \\sum_{k=1}^{3} w_k\\,\\mathcal{L}_k^{\\mathrm{MCP}}\\;} \\qquad (13)\n$$\n\n- **무슨 식?**: main 손실 + 3개 미래예측 손실의 가중합. $w=(0.5,0.2,0.1)$.\n- **비유**: 시험 점수(본업=video/action)가 목표지만, *예습 숙제*(MCP)가 실력을 다진다. 먼 미래일수록 불확실하니 신뢰(가중치)를 덜 준다.\n\n- **그림 / 구조도**:\n  ```\n  GT chunks:  x0[i](k=0)  x0[i+1](next¹)  x0[i+2](next²)  x0[i+3](next³)\n  MAIN MODEL (30층, 2 stream)  video v_θ → L_video(10)  / action v_ψ → L_action(11)\n        │ hidden {4,12,20,30} → 2-layer MLP → h_fuse\n        ▼\n  chained MCP:  MCP1(→next¹, L_1^MCP, w=0.5, last 1 pad 제외)\n                MCP2(→next², L_2^MCP, w=0.2, last 2 pad 제외)\n                MCP3(→next³, L_3^MCP, w=0.1, last 3 pad 제외)\n  TOTAL  L = L_video + L_action + Σ_k w_k·L_k^MCP        ...식(13)\n  ```\n\n### 4.6 Inference — 두 모드 (같은 checkpoint, 재학습 없음)\n\n- **핵심**:\n  - **Zero-Overhead Mode**: MCP 전부(fusion MLP, projection, 3-block) 폐기 → main model만 standard autoregressive. **baseline과 동일 latency/memory**, 향상은 전부 *학습 때 main에 역전파된 enriched signal*에서 옴 → **test-time 비용 0**.\n  - **Parallel Chunk Generation Mode**: MCP 유지. 한 denoising trajectory에서 main이 current chunk를, **depth-1 MCP가 동시에 next chunk**를 생성. MCP block은 main보다 *한 자릿수(≈10×) 가벼워* 거의 공짜 → step당 1 chunk 대신 **2 chunk 전진 = 2× 가속**. (LLM의 speculative/parallel decoding[Leviathan 2023; Medusa, Cai 2024]과 같은 정신.)\n  - **depth-2/3는 가속 모드에 미사용** — 다음 step에서 main이 그 예측을 덮어쓰기 때문. 더 확장하면 speedup↑ 가능하나 accumulated drift 대가 → future work.\n\n- **왜 / 직관**: 학습 때 만들어둔 \"예측 견습공\"을 추론 때 *집에 두거나(Zero-Overhead, 공짜 점심)* *데려가거나(Parallel, 본체보다 10× 가벼워 짐 안 됨)*. 본체가 현재 문제 푸는 동시에 견습공이 다음 문제를 풀어 한 동작에 두 문제 → 2×.\n\n- **그림 / 구조도**:\n  ```\n  (a) Zero-Overhead:  history → MAIN(30층) → current chunk   (MCP 전부 ✗)  ⇒ +1 chunk/step, 비용 0\n  (b) Parallel(2×):   history → MAIN ─────────────► current chunk (x_i)        ┐ 한 forward\n                         └ {L4,12,20,30}→MLP→h_fuse→ depth-1 MCP(3 light blk)→ next chunk (x_{i+1}) ┘ 동시\n                      depth-2/3 미사용(다음 step main이 supersede)   ⇒ +2 chunk/step = 2×\n  ```\n\n---\n\n## 5. Experiments\n\n### 5.1 Setup\n\n- **벤치**: **RoboTwin**(50 bimanual task, Clean=고정 초기배치 / Random=물체자세·레이아웃 랜덤화, 50-task 평균 SR) + **PhyWorld**(영상만으로 물리법칙 발견·준수 평가).\n- **구현(핵심 하이퍼파라미터)**:\n  - backbone **Wan2.2 Transformer 30 layers**, baseline 설정은 LingBot-VA와 동일.\n  - main: $s_{\\mathrm{main}}=5$, noisy history augmentation **p=0.5**.\n  - MCP: depth **3**(next¹·²·³), 각 **3 transformer block**, $s_{\\mathrm{mcp}}=10$, weight는 main 마지막 몇 layer로 init.\n  - loss weight $w=(0.5,0.2,0.1)$, chunk size $M\\sim\\{1,\\dots,4\\}$ 랜덤(M_max=4), fusion layer **{4,12,20,30}**.\n- **학습**: large-scale multi-embodiment pretrain → RoboTwin post-train. Main 실험 = Clean 2,500(task당 50) + Random 25,000(task당 500) demo, 최대 **50k steps, 64 GPU**. Ablation = 16 GPU, Clean 2,500만, 25fps, 20k steps.\n\n**수식 (setup에 박힌 값)**:\n\n$$\ns_{\\mathrm{main}}=5,\\quad s_{\\mathrm{mcp}}=10,\\quad w_1=0.5,\\;w_2=0.2,\\;w_3=0.1,\\quad M\\sim\\{1,\\dots,M_{\\max}\\},\\;M_{\\max}=4\n$$\n\n### 5.2 Main Results\n\n- **RoboTwin SOTA (Table 1, Clean/Random SR %)** — VLA·WAM 계열 전부 능가:\n\n  | 모델 | Clean | Random |\n  |---|---|---|\n  | **Next Forcing** | **94.1** | **93.5** |\n  | LingBot-VA (직전 best) | 92.9 | 91.5 |\n  | **Fast-WAM** | **91.9** | **91.8** |\n  | Being-H0.7 | 90.2 | 89.6 |\n  | Motus | 88.7 | 87.0 |\n  | π0.5 | 82.7 | 76.8 |\n  | X-VLA | 72.9 | 72.8 |\n  | π0 | 65.9 | 58.4 |\n\n  → vs LingBot-VA: Clean **+1.2pt**, Random **+2.0pt**. **vs Fast-WAM: +2.2 / +1.7pt** (FastWAM 직접 추월).\n\n- **5.2.2 Training Convergence (Figure 1)**:\n\n  원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2606.11187v1/x1.png)\n  ![](https://arxiv.org/html/2606.11187v1/x1.png)\n  → RoboTwin step별 SR. 12·50fps 모두에서 더 빨리 수렴 + 더 높은 최종 accuracy. *원캡션: 50fps에서 5k step에 Random 기준 LingBot-VA 대비 +29.7점, 20k step이 baseline의 45k-step accuracy와 동등 = **2.3× training speedup**.*\n\n  - **12fps**: ~2× 빠른 수렴(10k step에 90.0%, baseline ~20k step). 최종 94.1/93.5% vs 92.8/91.8%.\n  - **50fps**: 5k step에 **70.2/61.6%** vs 45.5/31.9%. 50k step에 91.8/90.5% vs 88.6/85.2%.\n  - **왜 high-fps에서 더 잘 되나(핵심)**: 인접 chunk가 거의 같으면 next-chunk denoising이 *appearance copying*으로 trivial하게 풀린다. 2~3 step 앞은 시각 차이가 커서 **physical dynamics를 이해해야만** 예측 가능 → shortcut 차단, temporally-aware 표현 강제. **supervision signal density**↑.\n\n  > ⚠️ +29.7점(5k @ Random)과 2.3× speedup(20k가 baseline 45k와 동등)은 Fig.1 캡션의 *서로 다른* 두 통계 — 혼동 금지.\n\n- **5.2.3 PhyWorld (action stream 제거, 순수 video gen; Table 3, Figure 3)**:\n\n  원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2606.11187v1/x3.png)\n  ![](https://arxiv.org/html/2606.11187v1/x3.png)\n  → GT/Next Forcing/Baseline 3단 프레임, 파란 박스=baseline이 GT 물리궤적에서 이탈한 구간.\n\n  | 지표(↓) | OOT(out-of-template) | IT(in-template) |\n  |---|---|---|\n  | FVD: NF vs LingBot-VA | **4.7** vs 5.3 | **3.2** vs 3.5 |\n  | Abnormal Ratio: NF vs LingBot-VA | **8%** vs 12% | **2%** vs 3% |\n\n  → OOT에서 이득이 더 큼 = template 암기가 아닌 **일반화 가능한 physical dynamics** 학습.\n\n- **5.2.4 Generality on Video Pretraining (Figure 4)**:\n\n  원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2606.11187v1/x4.png)\n  ![](https://arxiv.org/html/2606.11187v1/x4.png)\n  → ~3.5M clip(5–10s, human activity 중심), action stream 제거, 32 GPU. 두 held-out test set(각 1,024) 전 구간에서 일관되게 낮은 FVD.\n  - 50k step: Test Set 1 **−58%**(94 vs 225), Test Set 2 **−52%**(97 vs 204). **Next Forcing 10k step이 LingBot-VA 50k step을 능가** → robot 도메인 밖에서도 효과.\n\n### 5.3 Ablation (RoboTwin Clean, 20k steps, 16 GPU, SR%; Table 2)\n\n- **Baseline 축**: default(s_main=5 + noisy history aug) **75.6%**. *noisy history aug 제거 → 69.8%*(clean context 복붙 shortcut 발생). $s_{\\mathrm{main}}$: 1→65.3, 5→75.6, 10→78.4(best), 20→77.6, 25→77.2(포화).\n- **+ MCP → 85.8%** (**+10.2pt**, 이 절 최대 기여).\n- **MCP 설계 축**(default 85.8 기준): w/o multi-layer fusion **83.6**(중간 feature fusion이 main으로의 gradient 전파를 깊게 함), $s_{\\mathrm{mcp}}{=}5$(=main) **83.2**(큰 shift가 coupling 강화), w/o weight init **83.8**.\n- **MCP block 수**: 1→**86.5**, 3→85.8(default), 5→85.0. *가벼울수록 coupling tight*. 1 block이 SR은 약간 높지만, **parallel 생성 시 visual artifact가 적은** 3 block을 default로 채택.\n\n### 5.4 Inference Acceleration (Table 4)\n\n- MCP 유지 시 standard 대비 **2×** 가속하면서 정확도 거의 유지: MCP-accelerated SR(Clean/Random) — 12fps **93.5/90.6**, 25fps **91.0/89.8**, 50fps **92.2/91.3** (standard 50fps 91.8/90.5와 동급/상회). 메커니즘 본체는 §4.6.\n\n---\n\n## 6. Conclusion\n\n- **핵심 발견**: WAM teacher forcing의 myopic supervision은 **예측 대상을 여러 미래 chunk로 확장(MCP)**하면 해결된다 — context를 손보는 기존 forcing과 직교. 같은 MCP module이 *학습=dense supervision*, *추론=parallel decoding(2×)*의 이중 역할.\n- **함의**: 기존 WAM(LingBot-VA 등)에 끼워 넣을 수 있는 *training-paradigm 개선* + 추론 가속. high frame rate일수록 이득이 커진다.\n\n## Appendix (요지)\n- **A. Attention Mask** (Figure 5): teacher forcing 하에서 noisy token은 인과적으로 앞선 clean token + 같은 chunk noisy token에 attend, clean token은 표준 causal, *clean은 noisy에 attend 못 함*. **MCP는 main과 동일 mask 구조** → step당 mask 1회 구성.\n\n  원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2606.11187v1/x5.png)\n  ![](https://arxiv.org/html/2606.11187v1/x5.png)\n\n- **C. Timestep Shift Formulation**: §3.1의 timestep shift $s$의 구체식(본 노트 미정독). 실사용 값 $s_{\\mathrm{main}}{=}5$, $s_{\\mathrm{mcp}}{=}10$.\n\n---\n\n## 한눈에 정리\n\n- **문제**: teacher-forced next-chunk denoising → 인접 chunk 복붙(appearance shortcut)으로 loss만 낮추고 dynamics를 안 배움 = **myopic supervision**(고fps일수록 심각).\n- **해법(MCP)**: main이 current chunk를 denoise하는 동안 **3개 chained MCP module이 next¹·²·³를 예측**(식 4–8). 미래를 *강하게 노이징*($s_{\\mathrm{mcp}}{>}s_{\\mathrm{main}}$)해 MCP가 main 표현에 의존 → gradient가 main으로 역류. multi-layer fusion({4,12,20,30})으로 backbone 깊숙이 supervision.\n- **손실**: $\\mathcal{L}=\\mathcal{L}_{\\mathrm{video}}+\\mathcal{L}_{\\mathrm{action}}+\\sum_k w_k\\mathcal{L}_k^{\\mathrm{MCP}}$, $w=(0.5,0.2,0.1)$, padded chunk 제외.\n- **추론 이중 모드**: zero-overhead(MCP 폐기, baseline 동일) / parallel(depth-1 MCP 유지, 2× 가속).\n- **결과**: RoboTwin 94.1/93.5(SOTA, **Fast-WAM 91.9/91.8 추월**), 50fps 2.3× 수렴, 2× 추론, PhyWorld·일반영상 FVD 대폭↓.\n\n## ⚠️ 확인 필요 / 나중에 (TODO)\n\n- [ ] **검증 미완 섹션 (세션 한도로 verify 미실행)**: §2 Related Work, §5 / §5.2 / §5.2.3 Main Results·PhyWorld, §5.3 Ablation, §5.4 Inference Accel, Appendix C. → 단, §5 핵심 수치(RoboTwin 94.1/93.5, Fast-WAM 91.9/91.8, LingBot-VA 92.9/91.5, PhyWorld FVD 4.7/3.2 등)는 **surveybot papers.json(검증본)과 교차 일치 확인**.\n- [ ] **§4.4 MCP exclusivity**: \"MCP가 *오직* video stream에만\" 의 배타성은 PLAUSIBLE(본문 단언 미확정). source_quotes 일부에 fabricated verbatim 의심 있어 본문 인용은 배제함.\n- [ ] **Appendix C timestep shift 식**: 미정독 — $s$가 noise schedule을 어떻게 옮기는지 정확한 formulation 확인 필요.\n- [ ] **저자 list**: 정확한 author/소속 미확인(repo `gangweix`, Ant/Robbyant 계열로만 귀속).\n- [ ] **Eq. 번호**: 본 노트는 §3.1 (1)(2) / §3.2 (3) / §4.2 (4)(5)(6) / §4.3 (7)(8) / §4.4 (9) / §4.5 (10)(11)(12)(13)으로 정렬 — HTML 원문 번호와 1:1 재대조 권장.\n\n---\n## Source Provenance\n- Source: HTML (arxiv.org/html/2606.11187v1) — Map + 섹션별 정독\n- Fetched: 2026-07-01\n- Parse reliability: Medium–High (HTML 추출; 수식 §3–§4는 멀티에이전트 추출 후 적대적 검증 통과분)\n- Verified by: paper-deepdive 멀티에이전트 워크플로 (run `wf_ee8a10ba-8d2`, 57 agents). 28개 섹션 중 20개 verify 통과(교정 반영: w_k=0.5/0.2/0.1 복원, MCP padding 제외 조건 추가, myopic supervision=§1 귀속, Fig 귀속 교정). 나머지 8개 섹션은 세션 한도로 verify 미실행 → 위 TODO 명시 + papers.json 교차검증으로 보강.\n- Unconfirmed: 위 TODO 항목 (§4.4 exclusivity · Appendix C 식 · author list · verify 미실행 8섹션)\n";
