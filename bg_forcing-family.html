  <script>
  const MD = "# Forcing family (teacher / diffusion / self / next forcing) — autoregressive 영상 생성 학습 패러다임\n\n**한 줄 정의**: autoregressive (video/world) diffusion을 청크 단위로 학습시킬 때, \"과거를 어떻게 보여주고(context) · 노이즈를 어떻게 걸고(noise) · 무엇을 예측하게 하는가(target)\" 세 손잡이 중 하나씩을 돌려 학습-추론 괴리(exposure bias)나 근시안 감독을 줄이는 네 가지 학습 패러다임이다. 서로 경쟁하는 대체재가 아니라 **각자 다른 축**을 건드린다.\n\n> **30초 큰 그림 비유**: 한 컷씩 이어 그리는 만화가를 훈련시킨다고 하자. **Teacher forcing**은 이전 컷을 항상 스승의 *완벽한 정답 원화*로 깔아주고 현재 컷만 그리게 한다 — 잘 배우지만 시험(추론) 때는 자기가 그린 삐뚤한 컷 위에 이어 그려야 해서 무너진다. **Diffusion forcing**은 과거·현재 컷마다 *제각각 다른 흐림(노이즈) 정도*를 무작위로 걸고 지운다. **Self forcing**은 훈련부터 *자기가 그린 이전 컷*을 깔고 이어 그리게 해 시험 환경과 똑같이 맞춘다. **Next forcing**은 다음 한 컷이 아니라 *여러 컷 앞까지 동시에* 스케치하게 강제해 직전 컷을 거의 복붙하는 지름길(shortcut)을 못 쓰게 한다.\n\n### 비교의 척추: 어느 손잡이를 돌리는가\n\n네 방법은 서로 다른 축을 건드린다 (Next Forcing deep-dive §2.2의 정리 — 원문 *\"Next Forcing is orthogonal to both: it varies what the model is asked to predict, and is therefore composable with all of the above.\"*):\n\n- **Teacher / Self forcing → CONTEXT 축**: 모델이 조건으로 보는 과거를 *깨끗한 정답(GT)*으로 줄지, *자기 생성물*로 줄지.\n- **Diffusion forcing → NOISE 축**: 시퀀스의 토큰마다 노이즈 레벨을 *독립적으로* 배정.\n- **Next forcing → TARGET 축**: 무엇을 예측하게 할지 (현재 청크만 vs. 현재+미래 여러 청크).\n\n따라서 next forcing은 나머지 셋과 **직교(orthogonal)하며 조합 가능(composable)**하다.\n\n### 1. Teacher Forcing — CONTEXT 축의 baseline\n\n현재의 노이즈 청크 $x_{t^i}^{i}$를 디노이즈할 때, 조건 $c$로 **깨끗한 ground-truth 과거 청크** $x^{<i}$를 그대로 준다. 학습은 항상 정답 과거 위에서 이뤄지지만(train=clean) 추론은 모델이 만든 과거 위에서 진행(test=self-generated)되어 **exposure bias**가 생긴다. RNN 시절 teacher forcing(Williams & Zipser 1989)의 diffusion 버전이다.\n\n$$\n\\mathcal{L}^{\\mathrm{DM}} = \\mathbb{E}\\big[\\, w_{t^i}\\,\\|\\hat\\epsilon_\\theta^{\\,i} - \\epsilon^i\\|_2^2 \\,\\big],\\qquad \\hat\\epsilon_\\theta^{\\,i} = G_\\theta(x_{t^i}^{i},\\, t^i,\\, c),\\quad c = x^{<i}\\ (\\text{clean GT past})\n$$\n\n여기서 $x_{t^i}^{i} = \\alpha\\,x^i + \\sigma\\,\\epsilon^i$. TF는 \"깨끗한 GT context\"뿐 아니라 \"과거 노이즈 timestep = 0\"까지 함께 고정되는 것으로 정의된다 (그래서 아래 Diffusion Forcing과는 *noise 축*에서 갈린다).\n\n### 2. Diffusion Forcing — NOISE 축\n\n시퀀스의 토큰(청크)마다 **독립적인 per-token 노이즈 레벨** $k_t$를 배정해 디노이즈한다. 이로써 causal next-token prediction(가변 길이 생성)과 full-sequence diffusion(guidance)을 한 모델에 결합하고, 과거를 완전히 지우지 않은 채 미래 토큰을 생성한다. 학습 지평(training horizon)을 넘겨 롤아웃해도 baseline이 발산하는 지점에서 안정적이며, decision-making·planning에서 이득을 본다.\n\n$$\n\\mathcal{L} = \\mathbb{E}\\Big[\\, \\sum_{t} \\|\\epsilon_t - \\epsilon_\\theta(z_{t-1},\\, x_t^{k_t},\\, k_t)\\|^2 \\,\\Big],\\qquad x_t^{k_t} = \\sqrt{\\bar\\alpha_{k_t}}\\,x_t + \\sqrt{1-\\bar\\alpha_{k_t}}\\,\\epsilon_t,\\quad k_t \\sim \\mathcal{U}\\{0,\\dots,K\\}\n$$\n\n$z_{t-1}$은 causal(RNN) latent, 노이즈는 토큰별 i.i.d. $k_t$의 표본이 **0을 포함**하는 점이 핵심 — 레벨 0(clean)이 곧 next-token-prediction 극한을, 모든 토큰 동일 레벨이 full-sequence diffusion을 복원한다. (엄밀히는 \"noise schedule\"이라기보다 시퀀스 차원의 *per-token 노이즈 레벨 배정*이지만, 어쨌든 noise 축이다.)\n\n### 3. Self Forcing — CONTEXT 축 (GT → self)\n\nteacher forcing의 context 손잡이를 **깨끗한 GT → 자기 생성 과거**로 돌린다. 학습 중에 (KV cache를 쓰는) autoregressive 롤아웃을 실제로 수행해 각 청크를 *모델 자신의 이전 출력*에 조건화하고, 프레임별 MSE 대신 시퀀스 전체 분포매칭(주로 DMD; SiD·GAN 변형도)으로 데이터 분포에 맞춘다. 즉 \"학습을 추론처럼\" 해서 train-test gap을 정면으로 메운다. 효율을 위해 few-step(4-step) 생성기 + stochastic gradient truncation(롤아웃 중 무작위 한 step에만 backprop)을 쓴다.\n\n$$\n\\nabla_\\theta\\, \\mathbb{E}_t\\big[D_{\\mathrm{KL}}(p_{\\theta,t}\\,\\|\\,p_{\\mathrm{data},t})\\big] = -\\,\\mathbb{E}_{t,\\hat x_t}\\Big[\\big(s_{\\mathrm{real}}(\\hat x_t,t) - s_{\\mathrm{fake}}(\\hat x_t,t)\\big)\\,\\tfrac{\\partial \\hat x}{\\partial \\theta}\\Big]\n$$\n\n(개념적으로는 $\\nabla_\\theta \\mathcal{L}_{\\mathrm{DMD}} = \\mathbb{E}_t[\\nabla_\\theta D_{\\mathrm{KL}}]$이고, 실제 역전파되는 형태가 위의 score-difference 추정량이다.) 성능: chunk-wise 17.0 FPS / 0.69s latency, frame-wise 8.9 FPS / 0.45s, 단 4 step, single H100 (real-time streaming video).\n\n### 4. Next Forcing — TARGET 축 (직교·조합 가능)\n\n\"무엇을 예측하는가\"를 바꾼다. 현재 청크 하나만 예측하면 50fps처럼 프레임 간격이 촘촘할 때 **깨끗한 직전 청크 → 현재 청크가 거의 항등사상(near-identity / appearance shortcut)**이라 손실이 거의 0이 되는 **근시안적 감독(myopic supervision)**에 빠진다. Next forcing은 현재 + $K$개 미래 청크를 동시에 예측(**MCP, multi-chunk prediction**)하게 해 이 지름길을 막는다. 추론은 두 모드 — 미래 예측을 버리는 \"Zero-Overhead Mode\"와 depth-1 MCP를 유지해 2× 병렬 생성하는 모드 — 를 지원한다.\n\n$$\n\\mathcal{L} = \\mathcal{L}_{\\mathrm{video}} + \\mathcal{L}_{\\mathrm{action}} + \\sum_{k=1}^{3} w_k\\,\\mathcal{L}_k^{\\mathrm{MCP}},\\qquad \\mathcal{L}_k^{\\mathrm{MCP}} = \\mathbb{E}\\big[\\,\\|v_\\theta^{[k]}(x_{t_k}^{[k]},\\, t_k,\\, c) - (\\epsilon_k - x_0^{[k]})\\|^2\\,\\big]\n$$\n\n회귀 타깃은 flow/velocity 형태 $\\epsilon_k - x_0^{[k]}$, 가중치는 $w_k$ (λ 아님), MCP 항은 main video+action loss에 **더해진다**. 성능: LingBot-VA 대비 수렴 2.3× 가속(5k step에서 상대 +93.1% @ 50fps), RoboTwin 94.1 / 93.5% (Clean/Random). → 상세는 `Next_Forcing_deepdive.md`.\n\n### ASCII: 넷이 무엇에 조건 걸고 무엇을 예측하나\n\n```\n                  ┌─ PAST context ─────────┬─ CURRENT target ────┬─ 예측 대상 ────────────┐\nTeacher Forcing   │ clean GT  x^{<i}       │ noisy x_{t}^{i}      │ eps^i (현재 청크)       │  [CONTEXT: GT]\nDiffusion Forcing │ per-token 노이즈 과거  │ x_t^{k_t} (레벨 k_t) │ eps_t (토큰별)         │  [NOISE: 독립 레벨]\nSelf Forcing      │ SELF-generated 과거    │ (자기 롤아웃)        │ p_data 매칭 (DMD)      │  [CONTEXT: self]\nNext Forcing      │ (위 셋 중 무엇이든)    │ 현재 + K개 미래 청크 │ eps_k - x0^[k] (K청크) │  [TARGET: 다중청크]\n                  └────────────────────────┴─────────────────────┴────────────────────────┘\n    축:   Teacher↔Self = CONTEXT 손잡이   |   Diffusion = NOISE 손잡이   |   Next = TARGET 손잡이(직교)\n```\n\n### 비교 표\n\n| method | 무엇을 바꾸나 (knob) | 한 줄 메커니즘 | 관계 |\n|---|---|---|---|\n| Teacher Forcing | **context** (clean GT 과거) | 정답 과거로 현재 청크만 디노이즈 | baseline; train=clean/test=self → exposure bias |\n| Diffusion Forcing | **noise** (per-token 독립 레벨) | 토큰마다 독립 노이즈 → causal NTP + full-seq diffusion 결합 | noise 축; context·target과 직교 |\n| Self Forcing | **context** (self-generated 과거) | 자기 생성 과거로 롤아웃 + 분포매칭(DMD) → train=test | teacher의 context 축을 GT→self로 돌림 |\n| Next Forcing | **prediction target** (무엇을 예측) | 현재+K개 미래 청크 동시예측(MCP)로 근시안 감독 제거 | 셋 모두와 **직교·조합 가능** |\n\n### ⚠️ gotchas (못박기)\n\n- **축을 섞지 말 것**: teacher/self는 *context* 손잡이(GT vs self), diffusion은 *noise* 손잡이(per-token 레벨), next는 *target* 손잡이(무엇을 예측). \"teacher vs diffusion\"을 같은 축의 경쟁자로 오해하기 쉽다.\n- **Next forcing은 대체재가 아니다**: 나머지 셋 위에 *얹는* 직교 성분이다 (composable). teacher/self/diffusion 어느 것과도 함께 쓸 수 있다.\n- **teacher = \"GT 과거\" + \"과거 노이즈=0\" 둘 다**로 정의된다. Diffusion forcing은 이 중 *noise* 조건을 깬 것(과거를 노이즈 있게), self forcing은 *context 출처*를 깬 것(GT→self). \"teacher = diffusion forcing에서 과거 노이즈=0\"이라는 정리는 편의적 해석이지 DF 논문의 결론은 아니다.\n- **\"forcing\"은 학습-시점 패러다임**이다 — 추론 트릭(예: sampling scheduler)이 아니다. 어떻게 조건을 만들어 loss를 거느냐의 문제.\n- **Diffusion forcing의 $k_t$는 0을 포함**한다 ($\\mathcal{U}\\{0,\\dots,K\\}$). 0(clean)을 빼면 next-token-prediction 극한이 사라진다.\n- **Next forcing 손실은 더해지는 항**($+\\sum w_k \\mathcal{L}_k^{\\mathrm{MCP}}$)이지 독립 목적함수가 아니다. 가중치는 $w_k$이고 타깃은 flow $\\epsilon_k - x_0^{[k]}$.\n\n### 우리 계보에서의 쓰임 (used_by)\n\n- **Next Forcing (2606.11187) = MCP**: 우리가 tracking하는 대표 사례. base는 **LingBot-VA**(=우리 계보의 **LingBot-VLA**, Fast-WAM·Next Forcing이 L을 뺀 표기로 인용하는 같은 모델; `world_model_lineage_easy.md` §① 참조) 프레임워크 + Wan2.2 Transformer 30-layer 위에 MCP를 얹는다. 단, Next Forcing 논문은 LingBot-VA를 명시적으로 \"teacher forcing 방법\"이라 부르지는 않는다 — \"TF류 대비\" 서술은 우리 쪽 추론이므로 *LingBot-VA=teacher-forcing base*는 확정이 아니라 정황으로 둔다.\n- **Teacher forcing = 우리 계보의 확정 실증 앵커 → DreamZero (2602.15922)**: 14B autoregressive WAM으로, 학습 시 각 chunk의 noisy video/action latent를 **clean(ground-truth) video context에 조건화해 denoise**하는 전형적 **teacher-forcing chunk-wise** 방식 (`DreamZero_deepdive.md` §3.1·Fig4 원문 *\"denoises noisy video and action latents conditioned on clean video context\"*). 추론 시 KV cache에 GT observation을 되먹여 exposure-bias/에러누적을 억제한다(teacher-forcing의 test-time 취약점을 시스템으로 보완). AR video/world diffusion의 사실상 기본 baseline이라, 우리가 보는 WAM/VLA 파이프라인 대부분(예: `FastWAM_deepdive.md` §3.2 chunk 단위 autoregressive teacher-forced denoising)의 암묵적 출발점이기도 하다.\n- **Diffusion / Self forcing**: 현재 우리가 tracking하는 robot-WAM 논문 중 이 둘을 *명명된 학습 패러다임*으로 직접 채택했다고 검증된 사례는 아직 없다 (둘 다 일반 video-gen/시퀀스 diffusion 계열에서 유래). Self forcing의 분포매칭(DMD)·few-step 실시간 스트리밍 아이디어는 향후 robot-WAM으로 넘어올 참고 축.\n\n### 출처\n\n> arXiv 1차 소스 교차검증 완료 (paper-deepdive 멀티에이전트 리서치+적대검증, 2026-07-02; 4개 방법 모두 arXiv id·저자·메커니즘·수식 원문 대조 일치, 신뢰도 높음).\n\n- **Teacher Forcing** (AR video diffusion 형식화): Self Forcing 논문(arXiv **2506.08009**) 내 정의를 인용 — *\"TF involves denoising each frame using clean, ground-truth context frames.\"* RNN 기원: Williams & Zipser 1989, *\"A Learning Algorithm for Continually Running Fully Recurrent Neural Networks,\"* Neural Computation.\n- **Diffusion Forcing**: arXiv **2407.01392**, *\"Diffusion Forcing: Next-token Prediction Meets Full-Sequence Diffusion,\"* Chen, Martí Monsó, Du, Simchowitz, Tedrake, Sitzmann (MIT CSAIL; Martí Monsó는 TU Munich 방문학생), NeurIPS 2024.\n- **Self Forcing**: arXiv **2506.08009**, *\"Self Forcing: Bridging the Train-Test Gap in Autoregressive Video Diffusion,\"* Huang, Li, Shechtman (Adobe Research) · He, Zhou (UT Austin), NeurIPS 2025 spotlight (pub 2025-06-09).\n- **Next Forcing**: arXiv **2606.11187**, Gangwei Xu et al. (Robbyant = Ant Group embodied-AI · HUST · HKUST · HKUST-GZ; corresponding: Xin Yang, Yinghao Xu; project lead: Qihang Zhang), 2026 (pub 2026-06-09).\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
