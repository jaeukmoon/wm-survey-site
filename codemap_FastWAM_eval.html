  <script>
  const MD = "# Fast-WAM — 평가 하니스 출력 ↔ 코드 매핑 (Eval Code Map)\n\n> 목적: LIBERO 평가(`experiments/libero/eval_libero_single.py`) 실행 시 나오는 **출력물(mp4 폴더·GT·PSNR·replan)** 을 실제 코드 위치(file:line)에 못박고, 그 출력을 **어떻게 읽는지** 정리한다.\n> 짝 문서: [fastwam_libero_runbook.md](notes/fastwam_libero_runbook.md)(실행 레시피·픽스, private), [FastWAM_code_map.md](FastWAM_code_map.md)(논문↔코드).\n> 핵심 결론 먼저: **uncond=action만 / IDM=미래영상→action 역추론**, **predicted_videos 개수 ≈ 재계획 횟수**, **GT = 정책이 실제 실행한 관측(데모 아님)**, **IDM은 `pred→action→GT` 인과 사슬**.\n\n> ⚠️ file:line은 작업 당시(2026-06-15) MolmoBot follow-up 기준. 실제 repo에서 재확인 권장.\n\n---\n\n## 1. 추론 2경로 ↔ 코드\n\n| 경로 | 진입 코드 | 미래영상 | action | `predicted_videos/` |\n|---|---|---|---|---|\n| **uncond** | `fastwam.py:906 infer_action` (식4) | ❌ 현재 1프레임만 조건(`timestep_video=0`, 디노이즈 없음) | 현재 프레임 조건부로 action만 디노이즈 | 안 생김 |\n| **IDM** | `fastwam_idm.py:269 infer_joint` | ✅ Stage1: 노이즈→미래영상 디퓨전 | Stage2: **생성 미래영상을 K/V로** action 디노이즈 | 생김 |\n\n- `predicted_videos/`를 보려면 IDM류 + `EVALUATION.visualize_future_video=true` → 이건 `model.video_dit_config.action_conditioned=false`를 요구하므로 **uncond은 불가**.\n\n---\n\n## 2. 출력물 ↔ 코드 (어디서 나오나)\n\n| 출력 | 코드 (file:line) | 무엇 |\n|---|---|---|\n| `videos/*.mp4` | 시뮬레이터 렌더(uncond·IDM 공통) | 로봇이 **실제 움직인 롤아웃**(image+wrist 좌우 병합) |\n| `predicted_videos/` | IDM Stage1 생성 | **FastWAM이 그린 미래(위)** + GT(아래) 세로 병합 |\n| `predicted_videos/`가 **여러 개**(`replan=NNNN`, `replan=all`) | `eval_libero_single.py:496` — chunk를 뽑고 `replan_steps`(기본 10)만 실행 후 큐가 비면 `infer_joint` 재호출(receding-horizon) | 파일 수 ≈ **재계획 횟수**. `NNNN`=그 시점 클립, `all`=전체 합본 |\n\n해석: task를 빨리 풀면(성공) replan 적어 파일 적고, 실패해서 max_steps까지 굴면 파일이 늘어난다.\n\n---\n\n## 3. \"GT\"의 정체 — 가장 헷갈림 (closed-loop)\n\n`eval_libero_single.py:530-533`\n```python\nobs, _, done, _ = env.step(pending_actions.pop(0))   # 모델이 뽑은 action 실행\nif current_replan_step in capture_steps:\n    current_predicted_future_clip[\"gt_frames\"].append(get_libero_image(obs))  # 그 결과 관측을 GT로 저장\n```\n\n- `gt_frames` = **데이터셋 데모가 아니라, 모델의 action을 실제 실행했을 때 시뮬이 보여준 관측** = 그 정책이 만든 실제 궤적.\n- 그래서 **정책이 다르면 GT도 다르다**(학습/미학습 GT 다른 게 정상). `task_id`·init_state가 같으므로 **replan=0의 0번 프레임(시작 관측)만 동일**, 첫 action부터 발산.\n- predicted_videos는 \"모델이 상상한 미래(pred)\" vs \"그 행동을 실제로 했더니 펼쳐진 현실(GT)\"의 비교 → *realized* GT지 *demonstration* GT가 아님.\n\n---\n\n## 4. 학습 vs 미학습 — 출력 해석 워크드 예시\n\n동일 task(libero_spatial task0)·동일 IDM config로 (a) 체크포인트 로드 vs (b) 미로딩(랜덤 초기화) 비교.\n\n| 출력/지표 | 코드 근거 | **학습됨** | **미학습** | 해석 |\n|---|---|---|---|---|\n| task 성공 | env done | ✅ True | ❌ False | 정책 품질 |\n| 미래영상 PSNR | pred vs realized GT | **26.47 dB** | **21.98 dB** | 월드모델이 자기 미래를 맞췄나 |\n| predicted mp4 수 | `eval_libero_single.py:496` replan | 10개(~9 replan) | 23개(~22 replan) | 실패할수록 재계획↑ |\n| 누적 추론시간 | — | 6.6s | 14.8s | replan 많으면 느림 |\n\n- **미학습 실행(repo 안 건드림)**: `eval_untrained_wrapper.py` — 자체 `@hydra.main` + `_load_model_checkpoint`를 no-op으로 monkeypatch. ckpt 경로는 `cfg.ckpt is None` 가드 통과용일 뿐 **실제 로드 X**(experts 랜덤 초기화).\n- **미학습 PSNR이 0이 아니라 ~22인 이유**: IDM Stage1이 첫 프레임을 현재 관측으로 고정(`latents_video[:,:,0:1]=first_frame_latents`) → 첫 장면은 진짜라 점수를 받쳐주고, 예측한 *미래* 프레임만 엉망(~4.5dB 하락).\n\n### 핵심 사슬 (IDM 본질)\n```\n랜덤 가중치 → Stage1 미래영상(pred) 엉망 (PSNR 26.47→21.98)\n   → 그 영상에서 역추론한 action 엉망\n      → 실행한 실제 롤아웃(GT)도 엉망 (success True→False)\n```\n- IDM은 `pred→action→GT`가 인과로 묶임(상상이 곧 행동의 근거). **uncond은 action이 영상을 안 거치므로 이 사슬이 없다.**\n\n---\n\n## 5. 산출물 폴더 구조\n\n```\nevaluate_results/libero/\n├── mp4_test/            # uncond, 학습됨\n├── mp4_idm/             # IDM, 학습됨  (predicted_videos/ 생김)\n└── mp4_idm_untrained/   # IDM, 미학습\n    └── <suite>/\n        ├── videos/            # 시뮬 롤아웃\n        └── predicted_videos/  # pred(위) vs GT(아래), replan별 + all\n```\n\n---\n## 주의 / 미확인\n- file:line은 follow-up 작성 시점 기준 — 실제 repo(`experiments/libero/eval_libero_single.py`, `src/fastwam/models/wan22/fastwam_idm.py`)에서 재대조하면 더 정확.\n- PSNR/mp4 개수/시간 수치는 **해석 예시용**(특정 1회 실행값). 절대치보다 \"학습>미학습\" 경향과 사슬 해석이 핵심.\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else
    // marked mangles LaTeX (underscores -> <em>, $$ blocks -> <p>) before KaTeX runs.
    let katexInMarked = false;
    try {
      // nonStandard: true — allow inline $...$ followed immediately by Korean particles (와/는/로),
      // otherwise the default regex requires whitespace/punctuation after closing $ and skips them.
      if (window.markedKatex) { marked.use(window.markedKatex({throwOnError: false, nonStandard: true})); katexInMarked = true; }
    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
    // 8~256 GPU); marked pairs two ~ in a line into <del>. Consume ~ runs as literal text.
    try {
      marked.use({ extensions: [{
        name: 'noStrike', level: 'inline',
        start(s) { return s.indexOf('~'); },
        tokenizer(s) { const mm = s.match(/^~+/); if (mm) return { type: 'noStrike', raw: mm[0], text: mm[0] }; },
        renderer(t) { return t.text; }
      }] });
    } catch (e) {}
    el.innerHTML = marked.parse(MD);
    // Fallback only if the extension failed to load (e.g. offline CDN)
    if (!katexInMarked && window.renderMathInElement) renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ], throwOnError: false
    });
  });
  </script>

<script>
async function runUpdate(){
  const st = document.getElementById('upd-status');
  st.textContent = '업데이트 중… (arXiv/HF 수집 → 사이트 재생성, 1~2분)';
  try{
    const r = await fetch('/api/update', {method:'POST'});
    const j = await r.json();
    st.textContent = j.summary || JSON.stringify(j);
    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = '서버가 없습니다 — 터미널에서 `python surveybot/serve.py` 실행 후 http://localhost:8777 로 접속하세요. (요약·딥다이브 생성은 Claude 세션에서 /wm-survey)';
  }
}
</script>
