  <script>
  const MD = "# ImageWAM — Deep-Dive\n\n> **이 논문이 달성하려는 것**: video-generation 기반 World-Action Model(WAM)이 미래 영상 전체를 합성하는 비싸고 불안정한 방식을, **pretrained image-editing 모델을 backbone으로 재활용**해 대체한다. 추론 시 target frame을 픽셀로 디코딩하지 않고, image-editing denoising 과정이 만든 **KV cache(edit-aware 중간 표현)에 flow-matching Action Expert를 joint attention으로 conditioning**해 action chunk를 예측한다. → video-WAM 대비 **FLOPs ~1/6 · latency ~1/4**로 VLA baseline을 능가. FastWAM(미래 imagination 제거)·LaWAM(미래를 latent subgoal로)와 같은 \"pixel future-video를 버리는\" 계열의 한 변종 — 여기선 미래를 **단일 image-edit**로 본다.\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2606.19531 · 2026-06-17 |\n| 저자/소속 | Yuyang Zhang, Wenyao Zhang, Zekun Qi, He Zhang, Haitao Lin, Jingbo Zhang, Yao Mu, Xiaokang Yang, Wenjun Zeng, Xin Jin (SJTU · EIT 등) |\n| 코드 | https://github.com/yuyangalin/ImageWAM |\n| backbone | OmniGen2 (main) · FLUX.2 · Ovis-U1 (appendix 변형) |\n| 벤치 | RoboTwin 2.0 · LIBERO · LIBERO-Plus · real-world |\n\n> ⚠️ post-cutoff 논문. 본 노트는 `paper-deepdive` 멀티에이전트(추출 53 에이전트 + 섹션별 적대적 검증 1패스, run `wf_d1778399-342`)로 작성. 미확인/검증 지적 항목은 맨 아래 **⚠️ 확인 필요** 모음 참조.\n\n---\n\n## 1 Introduction\n\n**핵심**\n- 문제 제기: 최근 robot policy learning은 video generation 모델을 world-action backbone으로 쓰는 흐름이 강하다. video pretraining이 object motion·temporal continuity·physical interaction·scene evolution 같은 rich visual dynamics를 학습시키고, reason-before-act 패러다임(먼저 미래를 imagine하고 그걸로 action을 가이드)을 지원하기 때문이다.\n- 그러나 mismatch 존재(Figure 1(a)): video generation은 완전한 future video를 합성하도록 학습되므로 appearance detail·background change·camera motion·temporal smoothness 등 robot의 다음 action과 약하게만 관련된 요소들까지 모델링해야 한다. 여러 프레임에 걸친 다수의 spatio-temporal token 생성은 real-time control에 inference가 비싸다.\n- video는 hard proxy task: 물리적으로 일관된 video 생성은 어렵고, 특히 fine-grained manipulation에서 작은 contact event·미세한 object displacement·subtle configuration change가 성공을 좌우하지만 여러 프레임에 걸쳐 신뢰성 있게 예측하기 어렵다. imagine된 video가 틀리면 downstream action predictor가 오도된다(misled).\n- 핵심 주장: image editing 모델이 language-conditioned manipulation에 더 직접적인 visual generative prior다. scene 전체가 시간에 따라 어떻게 진화하는지 예측하는 대신, source image를 instruction에 따라 transform하도록 학습된다 — 이는 'instruction 하에서 현재 scene에 어떤 task-relevant visual change가 일어나야 하는가'라는 robot policy 요구와 정확히 맞는다.\n- image editing backbone의 세 가지 advantage: (1) instruction-to-change alignment(pretraining objective가 language와 visual modification을 직접 결합 → 무엇을/어디서/어떻게 바꿀지에 집중), (2) easier·action-relevant proxy(full temporal trajectory가 아니라 current state와 instruction-consistent target state 사이의 visual difference에만 집중 → 무관한 temporal detail에 capacity 낭비 방지, 부정확한 future video로 인한 위험 감소), (3) compact inference path(dense multi-frame video를 디코딩하지 않고 editing-aware 내부 표현 사용).\n- 제안: ImageWAM(Figure 1(b)). pretrained image editing 모델을 robot action prediction backbone으로 repurpose. 현재 observation+task instruction이 주어지면 editing-aware representation을 추출해 action prediction head에 공급. 목표는 보기 좋은 edited image 생성이나 goal-image generator 사용이 아니라, intermediate instruction-conditioned feature를 transformation-aware representation으로 써서 direct policy learning을 하는 것. → explicit future video synthesis 없이 generative visual pretraining의 이점을 유지하면서 real-time control용 compact inference path 확보.\n- 실증 요지: editing-aware representation은 language-conditioned policy에 효과적. 비슷한 action prediction architecture 조건에서 standard visual·vision-language backbone을 능가 → 단순히 image recognition이나 language alignment가 강해서가 아님. instruction conditioning과 editing-oriented feature extraction이 action-relevant representation을 얻는 데 중요함을 분석으로 보임.\n- 기여(3가지): (1) image editing 모델을 instruction-conditioned visual backbone으로 repurpose하는 ImageWAM 프레임워크 제시(video-generation 기반 WAM의 대안), (2) robot manipulation을 instruction-guided visual transformation으로 정식화하고 policy learning과 잘 맞는 editing pretraining의 3가지 속성(instruction-to-change alignment, easier goal/change proxy, compact inference) 식별, (3) editing-aware representation의 효과를 standard visual·vision-language backbone과 비교해 실증하고 instruction conditioning·editing-oriented feature extraction의 역할 분석.\n- [중요/provenance] 이 섹션(1 Introduction 본문)에는 수식이 전혀 없고, FLOPs·latency·success-rate 같은 정량 수치도 없다. 그 수치들과 KV cache/flow-matching action expert의 구체적 메커니즘 표현은 모두 Abstract(및 Method)에 있다. Introduction은 inference 효율을 'compact inference path / without decoding dense multi-frame videos at inference time'라는 정성적 표현으로만 진술한다.\n\n**왜 / 직관**\n\n비유로 보면, video-generation WAM은 '다음에 일어날 일을 통째로 영화로 찍어보고(미래 영상 전체 합성) 그 영화를 보며 손을 움직이는' 방식이다. 영화를 다 찍으려면 배경·조명·카메라 흔들림까지 다 그려야 하는데, 정작 로봇이 알아야 할 건 '컵을 어디서 어떻게 집을지' 한 가지뿐이다. 비용은 크고(많은 spatio-temporal token), 영화가 한 컷이라도 틀리면(부정확한 future) 동작이 오도된다. ImageWAM은 영화를 찍는 대신 '지금 사진에 빨간 펜으로 변화를 표시(image editing)' — instruction에 따라 source 이미지를 target 상태로 바꾸는 그 '변화의 의도'만 본다. 무엇을/어디서/어떻게 바꿀지가 곧 action에 필요한 신호이므로, 전체 미래를 상상하지 않고도(=영화 안 찍고) 변화 중심 표현만으로 충분하다. 직관의 핵심: '미래 전체를 photorealistic하게 그리는 hard proxy' 대신 '현재→target의 instruction-consistent visual difference'라는 easier proxy로 갈아끼우면, action-무관 정보에 capacity를 안 쓰고 더 싸고 더 안정적이다.\n\n**그림 / 구조도**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2606.19531v1/x1.png)\n![](https://arxiv.org/html/2606.19531v1/x1.png)\n→ Introduction이 명시적으로 참조하는 유일한 그림 — (a)는 video-generation WAM의 mismatch(action-무관 detail에 capacity 할당), (b)는 ImageWAM이 image editing backbone으로 future video prediction을 대체하는 핵심 대비를 보여줌.\n<sub>원캡션: Previous video-generation WAMs vs ImageWAM image-editing backbone (a/b)<\/sub>\n\n**학습 / 추론**\n\n[Introduction 본문 기준] 이 섹션은 학습/추론을 정성적으로만 진술한다. 추론(test-time): ImageWAM은 'dense multi-frame video를 디코딩하지 않고(without decoding dense multi-frame videos at inference time)' image editing backbone의 'intermediate instruction-conditioned feature를 transformation-aware representation으로' 사용해 action prediction head에 넘긴다. 즉 explicit future video synthesis를 피하고 compact inference path를 가진다. 학습(train-time): editing-aware representation을 direct policy learning에 사용 — '보기 좋은 edited image 생성'이나 'goal-image generator'가 목적이 아니라 intermediate feature를 정책 학습 신호로 쓴다. [provenance 주의] 사용자가 언급한 정확한 test-time 메커니즘 — '추론 시 target frame을 디코딩하지 않고, image-editing denoising이 만든 KV cache에 flow-matching action expert를 conditioning한다' — 는 Introduction 본문이 아니라 Abstract의 문장 'ImageWAM does not decode the target frame at inference time; instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising, using them as a compact world-action context.'에서 확인된다(본문 Method 3.4 Efficient Inference에서 상세화). Introduction은 이 메커니즘을 'compact inference path'라는 추상 수준으로만 예고한다. train vs test 차이의 본질: 학습 때는 editing objective가 instruction↔visual-change를 정렬시키도록 backbone을 정렬/활용하고, 추론 때는 target frame을 실제로 그려내지 않고(=비싼 디코딩 생략) KV cache/intermediate feature만 action expert 조건으로 재사용한다는 점.\n\n**숫자**\n- [Introduction 본문에는 정량 수치 없음 — 아래는 동일 논문 Abstract 출처, provenance 명시]\n- FLOPs를 video-based WAM의 1/6로 감소 (Abstract: 'reduces FLOPs to 1/6 ... of video-based WAMs')\n- latency를 video-based WAM의 1/4로 감소 (Abstract: 'latency to 1/4 of video-based WAMs')\n- [주의] success rate 84.5%, π0 55.8%, π0.5 72.3%, FastWAM 79.0% 수치는 WebFetch 요약이 제시했으나 다운로드한 HTML의 Abstract/Introduction 텍스트에서 직접 확인되지 않음 → Introduction·Abstract 근거로는 미검증, 본문 Experiments 섹션 확인 필요(추측 금지로 미채택)\n\n---\n\n## 2 Related Works\n\n**핵심**\n- 섹션 2는 두 갈래의 선행연구를 정리한다: (2.1) Image Editing, (2.2) World Action Models. ImageWAM이 이 둘의 교차점에 위치함을 논증하는 배경 섹션이다.\n- 2.1 Image Editing: text-guided image editing은 language instruction에 따라 source image를 수정하되 무관한 내용(irrelevant content)은 보존한다. diffusion-based + MLLM-enhanced editing 모델들이 단순 object-level edit에서 spatial/semantic/knowledge-driven 수정으로 발전해 왔다.\n- 선행 image editing 연구는 perceptual quality와 instruction fidelity(시각 품질·지시 충실도)에 초점을 둔 반면, 본 논문은 robotics 관점에서 image editing을 본다. 즉 editing의 source-conditioned이고 change-centric한 표현(representation)을 robot policy learning을 위한 compact world-action backbone으로 사용한다.\n- 2.2 World Action Models: VLA(vision language action) 모델들과 달리, 최근에는 video generation 모델을 robot policy learning의 predictive prior(예측적 사전)로 탐구해 왔다.\n- 초기 world action model은 video generation을 명시적 visual planning model로 취급: 현재 observation과 task context가 주어지면 전체 future video/visual rollout을 예측하고, 이를 inverse dynamics model 또는 action decoder가 실행 가능한 action으로 번역한다.\n- 더 최근 연구들은 이 패러다임을 확장해 video generative model을 (a) action generation을 위한 representation extractor, (b) value prediction, (c) interactive world modeling 용도로 사용한다. 그러나 여전히 대부분 video generation prior를 중심으로 설계되어 있다.\n- 기존 video-generation 기반 설계의 한계: dense spatio-temporal future token을 예측/처리해야 하므로 (1) inference cost가 무시할 수 없고(non-trivial), (2) action과 무관하거나(action-irrelevant) 비현실적인(unrealistic) visual detail까지 모델링할 수 있다.\n- ImageWAM의 차별점(섹션 결론): instruction-guided editing cache를 compact world-action context로 사용하여, WAM의 장점은 유지하면서 dense future-video token 처리를 회피한다.\n- 섹션 2 본문에는 수식·정량 수치(FLOPs/latency 비율, 성공률)·그림 참조가 전혀 없다. 이 섹션은 순수 서술형 배경(narrative background)이다.\n\n**왜 / 직관**\n\n왜 이런 분류가 필요한가: ImageWAM의 핵심 주장은 \"world model이 정말로 video generation을 해야 하는가, 아니면 image editing만으로 충분한가\"이다. 그래서 Related Works를 일부러 두 진영으로 갈라 놓는다 — 한쪽(2.1)은 'image editing 기술 자체'의 계보, 다른 쪽(2.2)은 'world action model이 video generation에 의존해 온' 계보. 비유: 요리 영상 전체를 처음부터 끝까지 찍어서(=video generation, dense future video) 다음에 뭘 할지 추론하는 셰프 vs, '재료 하나만 바꾼 before/after 사진 한 장'(=image editing, source-grounded edit)만 보고 다음 동작을 결정하는 셰프. 후자는 무관한 배경 픽셀(action-irrelevant visual detail)을 일일이 그릴 필요가 없어 싸고 빠르다. 또 다른 직관: editing은 본질적으로 'source를 조건으로 한 변화(change)'만 표현하므로(source-conditioned, change-centric), robot이 알아야 할 '무엇이 어떻게 바뀌어야 하는가'와 정확히 align된다. 반면 video generation은 '시간에 걸친 모든 프레임의 모든 픽셀'을 상상해야 해서 capacity를 action-irrelevant detail에 낭비한다. 그래서 저자들은 image editing 진영의 표현을 가져와 video-WAM 진영의 비싼 dense token 처리를 대체한다.\n\n**학습 / 추론**\n\n섹션 2(Related Works)는 ImageWAM 자체의 train/infer 메커니즘을 서술하지 않으며, 기존 패러다임의 학습/추론 비용을 대조적으로 언급할 뿐이다. 소스 근거: 기존 world action model은 추론 시 \"predicts a complete future video or visual rollout\"을 거쳐 inverse dynamics model/action decoder로 action을 번역한다(=test-time에 dense future video를 명시적으로 생성·디코딩). 더 최근 변종은 video generative model을 representation extractor로 쓰지만 \"still largely built around video generation priors\"이며, \"predicting or processing dense spatio-temporal future tokens\"가 필요해 \"non-trivial inference cost\"를 유발한다. 이에 대비해 ImageWAM은 \"uses instruction-guided editing caches as a compact world-action context, avoiding dense future-video token processing\"이라고만 명시한다. 즉 섹션 2가 직접 밝히는 추론 차이는 '기존=dense future-video token을 예측/처리, ImageWAM=image editing의 editing cache를 compact context로 사용해 그 dense 처리 자체를 회피'라는 수준까지다. 프롬프트가 언급한 '추론 시 target frame을 디코딩하지 않고 image-editing denoising의 KV cache에 flow-matching action expert를 조건화한다'는 구체 메커니즘은 섹션 2 본문에 등장하지 않으므로(추측 금지) 여기에 단언하지 않는다 — 섹션 2가 보장하는 것은 \"editing caches를 compact world-action context로 사용 → dense future-video token 처리 회피\"라는 정성적 진술까지다.\n\n---\n\n## 2.1 Image Editing (Related Works)\n\n**핵심**\n- 주의 — 섹션 분류: 논문에서 '2.1 Image Editing'은 '3 Method'가 아니라 '2 Related Works'의 하위 섹션이다. 따라서 이 섹션은 수식/모듈/학습-추론 메커니즘/효율 숫자를 전혀 담고 있지 않다. (프롬프트가 요청한 KV cache + flow-matching action expert 메커니즘, FLOPs ~1/6, latency ~1/4, 벤치마크 성공률 등은 모두 Section 3(Method) / Section 4(Experiments) 소속이며 2.1에는 없음 → 추측 금지 원칙상 본 추출에는 포함하지 않음.)\n- 정의: Text-guided image editing은 language instruction에 따라 source image를 수정하되, instruction과 무관한(irrelevant) 콘텐츠는 보존하는 task다. (instruction이 지정한 부분만 바꾸고 나머지는 그대로 유지)\n- 기술 발전 흐름: 최근의 diffusion-based 및 MLLM-enhanced editing 모델들은 단순한 object-level edit에서 출발해, 더 복잡한 spatial / semantic / knowledge-driven 수정으로 진화해 왔다.\n- 기존 연구의 초점: 선행 image editing 연구는 주로 perceptual quality(지각 품질)와 instruction fidelity(지시 충실도)에 집중한다.\n- 본 논문의 차별점 / 동기: ImageWAM은 image editing을 robotics 관점에서 본다. 즉 image editing이 제공하는 source-conditioned(원본 조건부) · change-centric(변화 중심) representation을 robot policy learning을 위한 compact world-action backbone으로 재활용(repurpose)한다.\n- 직관: editing 모델은 '무엇이 바뀌어야 하고(what), 어디가 바뀌어야 하며(where), instruction이 변화를 어떻게 지정하는가(how)'에 집중하도록 학습된다는 점이, action에 필요한 변화 중심 표현과 잘 맞는다는 것이 이 섹션이 까는 동기적 토대다.\n- 이 섹션은 순수 narrative prose + citation 리뷰이며, 어떤 figure도 인용하지 않는다(Figure 1~5 어느 것도 본문 2.1에서 참조되지 않음).\n\n**왜 / 직관**\n\n왜 image editing을 world-action model의 backbone으로 쓰려 하는가를 까는 동기 섹션이다. 비유하자면, 미래 전체를 동영상으로 '상상해서 그려내는'(video generation) 화가 대신, '이 사진에서 컵을 집어 올린 상태로 한 장만 고쳐 그려줘'라고 지시받아 source 사진을 instruction대로 딱 필요한 부분만 편집하는 포토샵 리터처를 쓰는 셈이다. Image editing 모델은 본질적으로 source-conditioned(원본을 붙들고) + change-centric(바뀌는 부분에만 capacity를 쓰는) 표현을 학습하므로, action과 무관한 dense한 시각 디테일에 용량을 낭비하지 않는다. 이 '무엇을/어디를/어떻게 바꾸는가'에 집중하는 성질이 곧 로봇 action 예측에 필요한 정보 구조와 정렬되기 때문에, 저자들은 perceptual quality에 집중해온 기존 editing 연구를 로봇 정책 학습용 compact backbone으로 끌어온다.\n\n**학습 / 추론**\n\nSection 2.1(Related Works)에는 학습/추론 방법이 기술되어 있지 않다. 프롬프트가 명시한 메커니즘(추론 시 target frame을 디코딩하지 않고, image-editing denoising의 KV cache에 flow-matching action expert를 조건화)은 이 섹션의 내용이 아니라 Section 3 Method(3.2 Architecture / 3.3 Action Prediction and Training / 3.4 Efficient Inference)에 속한다. 추측 금지 원칙에 따라 2.1 추출에는 train/infer 디테일을 채우지 않는다. (참고: 해당 메커니즘과 FLOPs ~1/6·latency ~1/4, RoboTwin2.0·LIBERO·LIBERO-Plus 성공률은 Method/Experiments 섹션에 존재하므로, 그 섹션을 대상으로 다시 추출하면 정확히 얻을 수 있음.)\n\n---\n\n## 2.2 World Action Models (Related Works)\n\n**핵심**\n- 섹션 위치 주의: '2.2 World Action Models'는 본문 Method가 아니라 '2 Related Works' 아래 subsection이다. 순수 산문 literature review로, 수식·그림 참조·모듈·정량 수치가 전혀 없다.\n- WAM(World Action Model) 계열의 출발점: video generation model을 robot policy 학습의 predictive prior로 사용. 이는 VLA(vision-language-action) 계열과 대비된다.\n- 초기 WAM은 video generation을 'explicit visual planning model'로 취급한다. 즉 현재 관측 + task context가 주어지면 완전한 future video(visual rollout)를 예측하고, 이를 inverse dynamics model 또는 action decoder가 실행 가능한 action으로 번역한다.\n- 최근 연구들은 이 패러다임을 확장: video generative model을 (a) action generation을 위한 representation extractor, (b) value prediction, (c) interactive world modeling 용도로 쓴다. 하지만 여전히 대체로 video generation prior 위에 구축된다.\n- 공통 한계(이 섹션의 핵심 비판): 이런 설계는 dense spatio-temporal future token을 예측/처리해야 해서 (1) non-trivial inference cost가 들고 (2) action-irrelevant하고 unrealistic한 visual detail까지 모델링할 수 있다.\n- ImageWAM의 포지셔닝(이 섹션의 결론 한 문장): instruction-guided editing cache를 compact world-action context로 사용하여, WAM의 장점은 유지하면서 dense future-video token 처리를 회피한다.\n- 제약 준수: 이 섹션에는 수식이 없으므로 equations는 비움. Related 섹션이므로 ascii=''. 섹션 본문이 명시적으로 인용하는 figure가 없으므로 figures도 비움(아래 figure 인벤토리는 §2.2가 직접 참조하지 않음).\n- 사용자가 물은 KV-cache 조건화·flow-matching action expert·추론 시 target frame 미디코딩 메커니즘과 FLOPs ~1/6·latency ~1/4 같은 효율 수치는 모두 §3.3(Action Prediction and Training)·§3.4(Efficient Inference) 및 실험 섹션 소관이다. §2.2 본문에는 존재하지 않으므로, 추측 금지 원칙에 따라 여기 포함하지 않는다.\n\n**왜 / 직관**\n\n초기 WAM은 '로봇에게 행동을 시키기 전에, 미래에 일어날 장면 전체를 머릿속에서 영화처럼 한 프레임 한 프레임 다 상영해본 뒤(future video 예측) 그 영상을 보고 행동을 역추론(inverse dynamics)'하는 방식이다. 문제는 이 '머릿속 영화'가 너무 고해상도·고프레임이라는 점이다 — 컵을 집는 데 필요 없는 배경 그림자, 벽지 무늬, 비현실적으로 일그러진 디테일까지 전부 그려내느라 연산을 낭비하고, 그렇게 그린 잘못된 디테일이 오히려 행동 예측을 오도할 수 있다(이 위험은 인벤토리의 Figure 5 캡션이 묘사하는 'future-video artifacts mislead action' 현상과 같은 맥락이지만, 그 그림 자체는 §2.2가 아니라 실험 섹션 소관이다). 비유하면: 동료에게 '저 컵 집어줘'라고 부탁할 때, 동료가 방 전체를 4K 동영상으로 상상해 렌더링한 뒤 행동하는 대신, '컵이 손 쪽으로 옮겨진 한 장의 편집된 사진'만 떠올리는 편이 빠르고 task에 더 집중된다는 것 — 이것이 ImageWAM이 video generation 대신 image editing cache를 compact world-action context로 쓰겠다는 직관이다. §2.2는 이 대비(과거 WAM = 무거운 미래 영상 예측 / ImageWAM = 가벼운 편집 캐시)를 선행연구 맥락에서 깔아주는 역할만 한다.\n\n**학습 / 추론**\n\n§2.2에는 학습/추론 메커니즘 서술이 없다(Related Works 산문). 이 섹션이 정리하는 것은 '선행 WAM의 동작 방식'뿐이다: 초기 WAM은 추론 시 현재 관측+task context로 완전한 future video/visual rollout을 생성한 뒤 inverse dynamics model 또는 action decoder로 action을 디코딩한다(=dense future token을 실제로 예측·처리). 최근 변형은 video generative model을 representation extractor/value prediction/interactive world modeling으로 쓰되 여전히 video generation prior 기반이다. 사용자가 명시한 ImageWAM의 핵심 추론 메커니즘 — '추론 시 target frame을 디코딩하지 않고 image-editing denoising의 KV cache에 flow-matching action expert를 조건화' — 은 §2.2 본문에 등장하지 않으며 §3.4 Efficient Inference(및 §3.3) 소관이다. 추측 금지 원칙에 따라 §2.2 추출물에는 이 메커니즘의 구체 내용을 채워 넣지 않는다. (이 섹션이 ImageWAM에 대해 말하는 것은 단 한 문장: 'instruction-guided editing cache를 compact world-action context로 써서 dense future-video token 처리를 회피하면서 WAM 장점은 유지한다'.)\n\n**숫자**\n- 섹션 2.2 본문에는 정량 수치가 전혀 없음(FLOPs, latency, 성공률 등 모두 부재). 사용자가 물은 FLOPs ~1/6·latency ~1/4·벤치마크 성공률은 §3.4/§4 실험 섹션 소관이며, 추측 금지 원칙상 여기서는 보고하지 않음.\n\n---\n\n## 3 Method\n\n**핵심**\n- 문제 정의: 로봇 manipulation을 현재 observation o_t와 instruction l로 조건화해 action chunk 𝐚_{t:t+H}=(a_t,...,a_{t+H})를 예측하는 policy π_θ(𝐚_{t:t+H}|o_t,l). H는 action horizon.\n- 핵심 차별점: video-WAM은 (o_t,l)→ô_{t+1:t+H+1}→𝐚_{t:t+H}로 dense한 여러 future frame을 생성하는 reason-before-act 방식. ImageWAM은 endpoint 한 장만 보는 (o_t,l)→ô_edit≡ô_{t+H+1}→𝐚_{t:t+H}로 대체. ô_edit은 task가 지정한 visual transformation을 요약한 source-conditioned 한 장.\n- 아키텍처: image editing model(OmniGen2 · Ovis-U1 · Flux2 variant)의 editing branch에 Action Expert를 붙임. OmniGen2가 o_t·l을 입력받는 source-conditioned image editing backbone 역할.\n- 핵심 아이디어: editing branch로 최종 이미지를 디코딩하는 대신, denoising 도중 transformer가 만든 layer별 key-value cache(𝒞^τ_edit)를 action 생성용 conditioning context로 재사용. 이 cache는 visual latent가 instruction과 상호작용한 뒤 계산되므로, 최종 edited image를 디코딩하지 않고도 task-conditioned visual transformation 정보를 담음.\n- Action Expert는 이 editing context를 joint attention으로 통합해, 현재 robot state·action noise를 조건으로 future action sequence를 예측. editing branch가 'source가 instruction에 따라 어떻게 변해야 하는가'를 추론하면, action expert가 그 editing context를 실행 가능한 action으로 변환.\n- Fast-WAM-style variant: future video token을 학습 때 video co-training용으로만 쓰고 추론 때는 제거. 추론 시 future video token을 instantiate/denoise하지 않고 현재 observation·instruction에서 나온 KV cache에만 조건화.\n- Freezing: editing model의 VLM·multimodal understanding 컴포넌트(instruction·visual context 인코딩 모듈 포함)는 frozen. diffusion 기반 image generation branch와 action expert만 학습.\n- 학습: image editing objective ℒ_img(velocity field 회귀)와 action flow-matching objective ℒ_act를 ℒ=ℒ_act+ℒ_img로 joint 최적화. 학습 때 editing denoising timestep τ를 랜덤 샘플링해 다양한 denoising 단계의 cache에 action expert를 노출.\n- 효율 추론(3.4): 전체 editing denoising trajectory를 돌지 않고 고정 timestep τ*에서 editing-branch forward 단 한 번으로 𝒞^{τ*}_edit를 얻고, action expert가 이 cache에 조건화해 action을 denoise. future video 생성도, edited image 디코딩도 안 함.\n- 효율 수치: video-based WAM 대비 FLOPs 1/6, latency 1/4. 성공률 RoboTwin2.0 randomized 93.56%, LIBERO 98.4%, LIBERO-Plus 83.1%, real-world 84.5%.\n\n**왜 / 직관**\n\nvideo-generation WAM은 행동하기 전에 '미래 영상 전체를 머릿속으로 다 그려보는' 화가와 같다. 여러 future frame의 dense한 spatio-temporal token을 다 생성·디코딩해야 해서 비싸고, action과 무관한 시각 디테일(배경 질감 등)에까지 capacity를 낭비하며 artifact가 생기면 action을 오도한다. ImageWAM은 '미래 영상을 다 그리지 말고, 작업이 끝난 한 장면(endpoint frame)이 어떻게 달라질지만 머릿속으로 스케치하라'는 비유다. 더 핵심적인 비유: 이미지 편집기가 'instruction에 맞춰 이 사진을 어떻게 고칠까'를 속으로 추론할 때, 굳이 최종 편집본을 화면에 띄워(디코딩) 보지 않아도 편집기의 '내부 작업 메모(KV cache)'만 들여다보면 변형 의도를 알 수 있다. ImageWAM은 그 작업 메모를 그대로 action expert에게 건네 행동으로 번역한다. 즉 '그림을 끝까지 렌더링하지 말고, 그리는 중간의 손동작 흔적만 읽어 행동을 정한다'는 발상이라 6배 적은 연산으로도 강한 policy 성능을 낸다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image Editing Backbone (editing branch)** — 목적: 현재 observation을 instruction에 맞게 어떻게 변형해야 하는지를 추론하는 source-conditioned image editing 모델 (OmniGen2/Ovis-U1/Flux2 variant). future endpoint frame 예측 및 KV cache 생성이 목적. · 입력→출력: 입력: 현재 observation o_t, task instruction l. (학습 target: o_{t+H+1}의 VAE latent z*=E_vae(o_{t+H+1})). 출력: denoising timestep τ에서의 layer별 KV cache 𝒞^τ_edit={(K^τ_ℓ,V^τ_ℓ)}_{ℓ=1..L} (L=transformer layer 수); velocity field u_φ(z_r,r|o_t,l). 최종 edited image는 디코딩하지 않음. · 내부: VLM·multimodal understanding 컴포넌트(instruction·visual context 인코딩)는 frozen, diffusion 기반 image generation branch만 학습. z_r=(1−r)z*_{t+H+1}+rϵ_z로 보간 후 ℒ_img=E[||u_φ(z_r,r|o_t,l)−(ϵ_z−z*)||²]로 endpoint frame velocity를 학습. cache 𝒞^τ_edit는 visual latent가 instruction과 상호작용한 후 계산되어 task-conditioned visual transformation 정보를 담음.\n- **Action Expert** — 목적: editing backbone의 internal reasoning(KV cache)을 받아 실행 가능한 robot action으로 변환하는 flow-matching 기반 action 생성기. · 입력→출력: 입력: 현재 observation o_t, instruction l, editing cache 𝒞^τ_edit, 현재 robot state, action noise ϵ_a (+ action flow time s∈(0,1)). 출력: action chunk 𝐚_{t:t+H}=(a_t,...,a_{t+H}) (H=action horizon). · 내부: 𝒞^τ_edit의 intermediate KV feature를 joint attention으로 통합. 𝐚_s=(1−s)𝐚*_{t:t+H}+sϵ_a로 보간 후 velocity predictor v_θ가 ℒ_act=E[||v_θ(𝐚_s,s|o_t,l,𝒞^τ_edit)−(ϵ_a−𝐚*)||²]로 학습. 학습 중 τ를 샘플링해 denoising 여러 단계의 cache에 노출. 추론 시 고정 τ*의 𝒞^{τ*}_edit에 조건화해 â_{t:t+H}~p_θ(𝐚|o_t,l,𝒞^{τ*}_edit)로 action을 denoise.\n- **Fast-WAM-style variant** — 목적: future video token을 학습 시 co-training 신호로만 활용하고 추론 시 제거해 추가 효율을 얻는 변형. · 입력→출력: 입력: 현재 observation o_t, instruction l (추론 시 future video token 없음). 출력: KV cache 기반 action chunk. · 내부: future video token을 학습 중 video co-training에만 사용하고 추론 시 제거. action expert는 현재 observation·instruction에서 나온 KV cache에만 조건화하며 future video token을 instantiate/denoise하지 않음.\n\n**수식**\n\n$$\n\\mathbf{a}_{t:t+H} = (a_t, a_{t+1}, \\ldots, a_{t+H})\n$$\n\n- **무슨 식?**: 한 번에 H+1개의 미래 action을 묶어서 출력하는 단위\n- 예측 대상인 action chunk. 시점 t부터 t+H까지의 action을 묶은 시퀀스이며 H는 action horizon이다.\n\n$$\n\\pi_\\theta(\\mathbf{a}_{t:t+H} \\mid o_t, l)\n$$\n\n- **무슨 식?**: 관측+지시문을 보고 action chunk를 내는 정책\n- policy learning objective. 현재 observation o_t와 instruction l을 조건으로 action chunk의 분포를 모델링한다.\n\n$$\n(o_t, l) \\rightarrow \\hat{o}_{t+1:t+H+1} \\rightarrow \\mathbf{a}_{t:t+H}\n$$\n\n- **무슨 식?**: 미래 영상 전체를 그린 뒤 행동 (비싼 baseline 경로)\n- video-generation WAM의 reason-before-act 경로. 먼저 여러 future frame(dense spatio-temporal token)을 생성한 뒤 그로부터 action을 뽑는다. 비싼 부분.\n\n$$\n(o_t, l) \\rightarrow \\hat{o}_{\\text{edit}} \\equiv \\hat{o}_{t+H+1} \\rightarrow \\mathbf{a}_{t:t+H}\n$$\n\n- **무슨 식?**: 끝 장면 한 장만 편집-추론 후 행동 (ImageWAM 경로)\n- ImageWAM의 경로. dense한 영상 대신 endpoint frame 한 장 ô_edit(=ô_{t+H+1})만 image-editing으로 추론하고 action으로 간다.\n\n$$\n\\mathcal{C}^\\tau_{\\text{edit}} = \\{(K^\\tau_\\ell, V^\\tau_\\ell)\\}_{\\ell=1}^{L} = f^\\tau_{\\text{edit}}(o_t, l)\n$$\n\n- **무슨 식?**: editing branch의 layer별 KV 캐시 = action을 위한 압축 world-action 중간표현\n- editing branch를 denoising timestep τ에서 한 번 돌려 각 transformer layer ℓ의 key-value를 모은 cache. L은 layer 수. visual latent가 instruction과 상호작용한 뒤 계산되므로 task-conditioned visual transformation 정보를 담되 최종 edited image를 디코딩할 필요는 없다. action conditioning context로 쓰임.\n\n$$\nz_r = (1-r)\\,z^*_{t+H+1} + r\\,\\epsilon_z\n$$\n\n- **무슨 식?**: target frame latent와 noise를 r로 섞은 학습용 입력\n- image flow matching의 interpolated latent. z*_{t+H+1}=E_vae(o_{t+H+1})는 target future frame의 VAE latent, ϵ_z~𝒩(0,I), r∈(0,1)은 image flow time. target과 noise를 선형 보간.\n\n$$\n\\mathcal{L}_{\\text{img}} = \\mathbb{E}_{z^*,\\epsilon_z,r}\\big[\\|u_\\varphi(z_r, r \\mid o_t, l) - (\\epsilon_z - z^*_{t+K})\\|_2^2\\big]\n$$\n\n- **무슨 식?**: edit branch가 endpoint frame velocity를 맞추는 flow-matching 손실\n- image editing(diffusion) branch의 학습 loss. velocity predictor u_φ가 o_t·l 조건 하에서 velocity field (ϵ_z − z*)를 회귀하도록 한다. editing branch가 task-relevant endpoint frame을 예측하게 만드는 항.\n\n$$\n\\mathbf{a}_s = (1-s)\\,\\mathbf{a}^*_{t:t+H} + s\\,\\epsilon_a\n$$\n\n- **무슨 식?**: expert action과 noise를 s로 섞은 학습용 action 입력\n- action flow matching의 interpolated action. 𝐚*_{t:t+H}는 expert action chunk, ϵ_a~𝒩(0,I), s∈(0,1)은 action flow time. expert action과 noise를 선형 보간.\n\n$$\n\\mathcal{L}_{\\text{act}} = \\mathbb{E}_{\\mathbf{a}^*,\\epsilon_a,s,\\tau}\\big[\\|v_\\theta(\\mathbf{a}_s, s \\mid o_t, l, \\mathcal{C}^\\tau_{\\text{edit}}) - (\\epsilon_a - \\mathbf{a}^*_{t:t+H})\\|_2^2\\big]\n$$\n\n- **무슨 식?**: edit-cache에 조건화해 action velocity를 맞추는 flow-matching 손실\n- action expert의 flow-matching loss. velocity field 예측기 v_θ가 현재 observation·instruction·editing cache 𝒞^τ_edit를 조건으로 action velocity (ϵ_a − 𝐚*)를 회귀. s는 action flow time, τ는 cache 추출용 image editing denoising timestep. 학습 중 τ 샘플링이 action expert를 denoising의 여러 단계 cache에 노출시킨다.\n\n$$\n\\mathcal{L} = \\mathcal{L}_{\\text{act}} + \\mathcal{L}_{\\text{img}}\n$$\n\n- **무슨 식?**: image-edit 손실 + action 손실 합산 joint 학습\n- 전체 학습 목표. diffusion image branch와 action expert를 joint로 최적화한다.\n\n$$\n\\mathcal{C}^{\\tau^*}_{\\text{edit}} = f^{\\tau^*}_{\\text{edit}}(o_t, l)\n$$\n\n- **무슨 식?**: 추론: 고정 τ*에서 edit branch 한 스텝만 → KV 캐시\n- 추론 시 고정된 editing denoising timestep τ*에서 editing-branch forward를 단 한 번 수행해 얻는 KV cache. 전체 denoising trajectory를 돌지 않는다.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H} \\sim p_\\theta(\\mathbf{a}_{t:t+H} \\mid o_t, l, \\mathcal{C}^{\\tau^*}_{\\text{edit}})\n$$\n\n- **무슨 식?**: 추론: 그 캐시에 조건화해 action을 denoise해 샘플링\n- 추론 시 action 생성. action expert가 이 단일 cache에 조건화해 action sample을 denoising하여 action chunk를 샘플링한다. future video 생성도, edited image 디코딩도 하지 않는다.\n\n**그림 / 구조도**\n\n원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2606.19531v1/x2.png)\n![](https://arxiv.org/html/2606.19531v1/x2.png)\n→ Section 3가 직접 참조하는 메인 파이프라인 그림 — editing backbone이 ô_{t+H+1}을 합성하고 Action Expert가 그 KV feature를 joint attention으로 통합해 action을 예측하는 3.2~3.4의 전 과정을 보여줌\n<sub>원캡션: ImageWAM Pipeline<\/sub>\n\n- (원본 그림 1 재참조) → 3.1의 핵심 대비(dense future video 예측 vs image-editing 기반 compact world-action intermediate)를 시각화해 method의 동기를 뒷받침\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nImageWAM data flow (Section 3, Fig.2 기반)\n\n instruction l ----+\n                   |\n observation o_t --+--> [Image Editing Backbone (OmniGen2/Ovis-U1/Flux2)]\n                   |        |  VLM + multimodal understanding = FROZEN\n                   |        |  diffusion image gen branch = TRAINED\n                   |        v\n                   |    denoising at timestep tau  (train: tau random / infer: fixed tau*)\n                   |        |\n                   |        +--> layer-wise KV cache  C^tau_edit = {(K_l,V_l)}_{l=1..L}\n                   |        |        (= compact world-action intermediate;\n                   |        |         최종 edited image 디코딩 안 함)\n                   |        |\n                   |        +--(train only)--> u_phi predicts velocity -> L_img\n                   |                                (endpoint frame o_{t+H+1} 학습)\n                   |\n                   |    [Action Expert  v_theta]  (TRAINED)\n                   |        inputs: o_t, l, C^tau_edit  + robot state + action noise eps_a\n                   |        joint attention over C^tau_edit\n                   |        flow-matching denoise (action time s)\n                   v        |\n            a_{t:t+H} <-----+   (train: L_act ;  infer: sample a_hat)\n\n Loss (train):  L = L_act + L_img   (joint optimize edit branch + action expert)\n\n Train vs Infer:\n   TRAIN  : tau ~ sampled (denoising 여러 단계 cache에 노출); L_img로 future frame 학습\n   INFER  : fixed tau*; edit branch forward 1 step만 -> C^tau*_edit;\n            future video 생성 X, edited image 디코딩 X;\n            action expert가 cache에 조건화해 action denoise\n            => FLOPs ~1/6, latency ~1/4 of video-WAM\n```\n\n**학습 / 추론**\n\n학습(train-time): image editing objective와 action flow-matching objective를 joint로 최적화한다. (1) editing branch는 target future endpoint frame o_{t+H+1}의 VAE latent z*에 대해 z_r=(1−r)z*+rϵ_z를 만들고 velocity u_φ를 회귀하는 ℒ_img를 학습. (2) action expert는 𝐚_s=(1−s)𝐚*+sϵ_a를 만들고 editing cache 𝒞^τ_edit에 조건화해 velocity v_θ를 회귀하는 ℒ_act를 학습. 전체는 ℒ=ℒ_act+ℒ_img. 중요: 학습 중 editing denoising timestep τ를 랜덤 샘플링하여 action expert를 denoising의 서로 다른 단계에서 나온 cache에 노출시킨다. VLM·multimodal understanding 모듈은 frozen, diffusion image generation branch와 action expert만 갱신. (Fast-WAM variant는 future video token을 학습 때 co-training용으로만 쓰고 추론 때 제거.)\\n\\n추론(test-time): 핵심 차이는 target frame을 디코딩하지 않는다는 점이다. 전체 editing denoising trajectory를 돌지 않고 고정된 단일 timestep τ*에서 editing-branch forward를 단 한 번만 수행해 layer별 KV cache 𝒞^{τ*}_edit=f^{τ*}_edit(o_t,l)를 얻는다. 그 다음 action expert가 이 cache에 조건화해 action sample을 denoising하여 â_{t:t+H}~p_θ(𝐚|o_t,l,𝒞^{τ*}_edit)를 샘플링한다. 즉 (a) future video 생성을 하지 않고, (b) 완전한 edited image 디코딩도 하지 않으며, (c) image-editing denoising 과정에서 생긴 KV cache에 flow-matching action expert를 joint attention으로 조건화하는 것만으로 action을 낸다. video WAM이 여러 future frame의 dense spatio-temporal token을 denoise+decode하는 것과 달리, ImageWAM은 단일 layer-wise editing cache 한 세트를 계산해 action expert의 context로 바로 사용한다. 결과적으로 video-based WAM 대비 FLOPs 1/6, latency 1/4 (Ours 263 ms vs FastWAM-IDM 1081 ms / FastWAM 1-step 302 ms).\n\n**숫자**\n- FLOPs: video-based WAM 대비 1/6\n- Latency: video-based WAM 대비 1/4\n- Latency 절대값(Table 5): ImageWAM(Ours) 263 ms vs FastWAM-IDM 1081 ms, FastWAM(1 Step) 302 ms\n- RoboTwin 2.0 randomized setting: 평균 성공률 93.56%\n- LIBERO: 평균 성공률 98.4%\n- LIBERO-Plus: 평균 성공률 83.1%\n- Real-world: ImageWAM 84.5% (vs π0 55.8%, π0.5 72.3%, FastWAM 79.0%)\n\n---\n\n## 3.1 Problem Formulation\n\n**핵심**\n- 로봇 manipulation을 'current visual observation + task instruction'으로 조건화한 정책 학습 문제로 정의한다. 매 time step t마다 image observation o_t와 instruction l을 받아 action chunk a_{t:t+H}를 예측한다 (H = action horizon).\n- 정책 목표는 단순한 conditional policy π_θ(a_{t:t+H} | o_t, l) 이다 (식 2). 즉 본질은 '관측+지시 → 행동 시퀀스' 매핑.\n- World-Action Model(WAM)의 핵심 아이디어: action 예측 전에 'intermediate visual reasoning step'(중간 시각 추론)을 끼워넣는다. action을 바로 내지 않고 '미래의 시각적 결과를 먼저 상상한 뒤(reason) 행동(act)' 한다 = reason-before-act.\n- 기존 video-generation WAM의 intermediate는 미래 visual trajectory 전체를 예측하는 것: (o_t, l) → ô_{t+1:t+H+1} → a_{t:t+H} (식 3). 즉 여러 future frame의 dense spatio-temporal token을 다 생성해야 한다.\n- ImageWAM의 핵심 차별점: 미래 궤적 전체가 아니라 '끝점 프레임(endpoint frame) 하나'만 예측한다: (o_t, l) → ô_edit ≡ ô_{t+H+1} → a_{t:t+H} (식 4).\n- ô_edit는 single source-conditioned frame으로, 현재 관측이 task에 의해 어떻게 변형되어야 하는지(visual transformation)를 요약한다. 이것이 action 예측을 위한 'compact world-action intermediate' 역할을 한다.\n- 주의: 3.1은 순수 formulation 섹션이다. 'image editing backbone', 'Action Expert', 'KV cache', 'flow-matching', 'joint attention' 같은 구체 메커니즘 용어는 3.1에 등장하지 않고 3.2(Architecture)/3.3(Action Prediction and Training)/3.4(Efficient Inference)에서 다뤄진다. (이 노트의 학습/추론 detail은 그 섹션들 근거로 보강한 것.)\n\n**왜 / 직관**\n\n기존 video-WAM은 \"다음에 일어날 영상을 통째로 머릿속에서 재생(dense future video)\"한 뒤 행동을 정하는 방식이다. 이건 비유하자면 컵을 집으려고 손이 컵까지 가는 동영상 한 편을 프레임 단위로 다 그려내는 것 — 비싸고(많은 spatio-temporal token), 행동과 무관한 배경/텍스처/시간적 디테일에까지 용량을 낭비하며, 길게 상상할수록 오류가 누적되어 행동을 오도할 수 있다. ImageWAM의 직관은 \"전체 동영상 대신 결과 사진 한 장(before→after)만 떠올리면 충분하다\"는 것이다. instruction이 시킨 변화가 다 끝났을 때 장면이 '어떻게 보일지'(끝점 프레임 ô_{t+H+1})만 알면, 그 사이 행동을 역으로 추론할 수 있다. 즉 video generation 문제를 image editing 문제로 치환한다: 현재 관측을 source로 두고 지시에 맞춰 '편집된 한 장'을 만들고, 그 편집 과정의 표현(3.2~3.4의 KV cache)을 action의 conditioning context로 쓴다. 이로써 식(3)의 무거운 trajectory 예측이 식(4)의 가벼운 endpoint 예측으로 압축된다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Policy / WAM objective (식 1-2)** — 목적: 관측과 지시로부터 action chunk를 내는 조건부 정책을 정의 — 모든 WAM이 공유하는 최상위 task. · 입력→출력: 입력: o_t (image observation), l (task instruction) → 출력: a_{t:t+H} = (a_t,...,a_{t+H}), action chunk (H = action horizon). 분포 형태 π_θ(a_{t:t+H} | o_t, l). · 내부: WAM은 이 조건부 분포를 직접 풀지 않고 action 전에 'intermediate visual reasoning step'을 삽입한다 (reason-before-act). 3.1은 이 reasoning intermediate를 어떻게 둘 것인가로 baseline(식3)과 ImageWAM(식4)을 분기시킨다.\n- **Video-generation intermediate (baseline, 식 3)** — 목적: action 전 visual reasoning을 '미래 visual trajectory 전체 예측'으로 구현 — 비교 대상(기존 방식). · 입력→출력: 입력: (o_t, l) → 중간산출: ô_{t+1:t+H+1} (t+1..t+H+1의 여러 future frame, dense spatio-temporal tokens) → 출력: a_{t:t+H}. · 내부: reason-before-act 정책 학습을 가능하게 하지만 여러 future frame에 걸친 dense token 생성이 필요해 inference가 비싸고, action-irrelevant한 시각/시간 디테일에 용량을 쓰며, 긴 horizon 상상은 오류를 유발해 action을 오도할 수 있다(본문/abstract 근거).\n- **ImageWAM endpoint-edit intermediate (식 4)** — 목적: visual reasoning을 '끝점 프레임 하나 예측(image editing)'으로 압축 — 본 논문의 제안 intermediate. · 입력→출력: 입력: (o_t, l) → 중간산출: ô_edit ≡ ô_{t+H+1} (single source-conditioned frame, 한 장) → 출력: a_{t:t+H}. · 내부: ô_edit는 현재 관측의 'task-specified visual transformation'을 요약한 single source-conditioned frame이며 action 예측의 compact world-action intermediate로 기능한다. 식(3)의 {t+1..t+H+1} 다중 프레임을 {t+H+1} 단일 프레임으로 축약한 것이 핵심. (이 한 장을 action으로 잇는 KV cache·action expert 메커니즘은 3.2~3.4 소관으로 3.1엔 명시 없음.)\n\n**수식**\n\n$$\n\\mathbf{a}_{t:t+H} = (a_t, a_{t+1}, \\ldots, a_{t+H})\n$$\n\n- **무슨 식?**: 한 번에 H+1개 step의 행동을 묶어서 예측 (action chunking).\n- 예측 대상인 action chunk의 정의. time step t부터 t+H까지의 action을 하나의 묶음(chunk)으로 한꺼번에 예측한다. H는 action horizon(한 번에 내다보고 내는 행동 길이). 각 a_i는 해당 step의 로봇 action.\n\n$$\n\\pi_\\theta(\\mathbf{a}_{t:t+H} \\mid o_t, l)\n$$\n\n- **무슨 식?**: '관측 o_t + 지시 l → 행동 시퀀스'의 조건부 정책.\n- 정책 학습 목표(식 2). 파라미터 θ의 정책 π가 현재 image observation o_t와 task instruction l을 조건으로 action chunk a_{t:t+H}의 분포를 모델링한다. WAM은 이 조건부 분포를 직접 풀지 않고 중간 visual reasoning을 거친다.\n\n$$\n(o_t, l) \\;\\rightarrow\\; \\hat{o}_{t+1:t+H+1} \\;\\rightarrow\\; \\mathbf{a}_{t:t+H}\n$$\n\n- **무슨 식?**: 미래 '영상 전체'를 상상한 뒤 행동 — dense·비쌈.\n- 기존 video-generation WAM의 reason-before-act 경로(식 3). 먼저 (o_t,l)로부터 미래 visual trajectory ô_{t+1:t+H+1}(t+1부터 t+H+1까지의 여러 future frame)를 생성하고, 그 dense spatio-temporal token을 거쳐 action을 예측한다. 비용이 큰 부분이 바로 가운데 항(여러 프레임 전체 생성).\n\n$$\n(o_t, l) \\;\\rightarrow\\; \\hat{o}_{\\mathrm{edit}} \\equiv \\hat{o}_{t+H+1} \\;\\rightarrow\\; \\mathbf{a}_{t:t+H}\n$$\n\n- **무슨 식?**: 미래 '결과 사진 한 장'만 떠올린 뒤 행동 — compact·저렴.\n- ImageWAM의 경로(식 4). 미래 궤적 전체 ô_{t+1:t+H+1} 대신 '끝점 프레임' 하나 ô_edit(= ô_{t+H+1})만 예측한다. ô_edit는 현재 관측을 task가 지시한 대로 변형한 single source-conditioned frame이며, action 예측의 compact world-action intermediate가 된다. 식(3) 대비 가운데 항이 '여러 frame'에서 '한 frame'으로 축소된 것이 핵심 차이.\n\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[3.1 Problem Formulation — note-derived data flow, grounded in eqs (1)-(4)]\n(3.1 자체엔 그림 참조 없음. 식이 정의하는 두 경로의 대비를 본문 근거로만 ASCII화)\n\n INPUTS (per step t):\n   o_t : image observation\n   l   : task instruction\n        |\n        v\n ============================================================\n  Baseline: Video-generation WAM            ... eq (3)\n ============================================================\n   (o_t, l)\n        |\n        v   predict DENSE future trajectory (many frames)\n   o^_{t+1}, o^_{t+2}, ..., o^_{t+H+1}      <- spatio-temporal tokens\n        |   (action-irrelevant detail; costly)\n        v\n   a_{t:t+H} = (a_t, ..., a_{t+H})\n\n ============================================================\n  ImageWAM                                  ... eq (4)\n ============================================================\n   (o_t, l)\n        |\n        v   predict ONLY the endpoint frame\n   o^_edit  ==  o^_{t+H+1}                   <- single source-conditioned frame\n        |   (compact world-action intermediate;\n        |    summarizes task-specified visual transformation)\n        v\n   a_{t:t+H} = (a_t, ..., a_{t+H})           ... eq (1)\n\n  Policy objective (both):  pi_theta( a_{t:t+H} | o_t, l )   ... eq (2)\n\n  Key contraction:  eq(3) {t+1..t+H+1}  -->  eq(4) {t+H+1 only}\n  (1 frame인 ô_edit가 어떻게 action conditioning으로 쓰이는지의\n   세부 메커니즘 = KV cache / flow-matching action expert 는\n   3.2~3.4 소관, 3.1엔 없음)\n```\n\n**학습 / 추론**\n\n3.1은 형식화만 다루므로 학습/추론 메커니즘 detail은 abstract·3.3(Action Prediction and Training)·3.4(Efficient Inference) 근거로 보강한다. [Train-time] 학습 시에는 image editing branch가 현재 관측 o_t를 source로 instruction l에 맞춰 편집된 끝점 프레임(ô_edit ≡ ô_{t+H+1})을 만드는 image-editing denoising을 수행하도록 학습된다(편집/감독 신호 존재). action 쪽은 flow-matching action expert가 'current observation + task instruction + editing context cache C^edit_t'를 조건으로 velocity field를 예측하도록 학습되며, 손실은 v_θ(a_s, s | o_t, l, C^edit_t) − (ε_a − a*_{t:t+H}) 형태의 flow-matching velocity로 robot state와 action noise(ε_a)에 조건화된다(3.3 근거). [Test-time] 핵심 효율 트릭: ImageWAM은 추론 시 target/future frame을 픽셀로 디코딩하지 않는다(\"ImageWAM does not decode the target frame at inference time\"). 대신 image-editing denoising이 만들어내는 KV cache(editing caches C^edit_t)에 flow-matching action expert를 조건화하여, 이를 compact world-action context로 직접 사용한다(\"instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising\"; \"directly uses image-editing caches as compact action-conditioning context, avoiding the instantiation of dense future-video tokens\"). 또한 full image-editing denoising trajectory를 다 돌지 않고, 고정된 editing denoising timestep τ*를 골라 editing-branch forward를 단 1 step만 수행한다(\"we select a fixed editing denoising timestep τ* and perform only one editing-branch forward step\"). 즉 train은 '편집 프레임을 생성/감독'하지만 infer는 'KV cache만 뽑아 action expert 조건화, 픽셀 디코드 생략, editing forward 1-step'. 이 차이가 FLOPs 1/6·latency 1/4 효율의 출처다.\n\n**숫자**\n- 효율(Abstract): FLOPs를 video-based WAM의 1/6로, latency를 1/4로 감소\n- Table 5 FLOPs: ImageWAM 9.72 TFLOPs vs FastWAM-IDM 63.65 TFLOPs vs FastWAM(1 Step) 13.21 TFLOPs\n- Table 5 Latency: ImageWAM 263 ms vs FastWAM-IDM 1081 ms vs FastWAM(1 Step) 302 ms\n- RoboTwin 2.0 (Table 1): ImageWAM Clean 93.20%, Randomized 93.56%\n- LIBERO (Table 2): ImageWAM 평균 98.4%\n- LIBERO-Plus (Table 3): ImageWAM (FLUX.2 4B) 83.1%\n- Real-World (Table 4): ImageWAM 평균 84.5% (Stack Three Bowls 94%, Fold Towel 84%, Open Drawer 78%, Hang Cup 82%)\n- Action horizon: H (식 1에서 a_{t:t+H}의 chunk 길이로 정의, 구체 수치는 3.1에 없음)\n\n---\n\n## 3.2 ImageWAM Architecture\n\n**핵심**\n- ImageWAM은 video-generation WAM처럼 미래 frame을 dense하게 생성/decode하지 않는다. 대신 image editing model(OmniGen2 / Ovis-U1 / FLUX.2)의 image editing branch 위에 action expert를 붙여, editing denoising 과정에서 나오는 intermediate transformer KV cache를 action 예측의 conditioning context로 재사용한다.\n- World-action reasoning을 'endpoint frame 한 장의 image editing'으로 재정의한다: 미래 trajectory 전체 o_{t+1:t+H+1}를 예측하는 대신, instruction이 적용된 단일 endpoint frame o_hat_edit = o_hat_{t+H+1}만 떠올리고 거기서 action a_{t:t+H}를 뽑는다 (Eq. 4).\n- 핵심은 'edited image를 끝까지 decode하지 않는다'는 점이다. editing branch는 task-conditioned visual transformation 정보를 layer-wise KV cache C_edit^tau 형태로만 만들고 (Eq. 5), action expert가 이 cache에 joint attention으로 조건화되어 action을 생성한다. 최종 edited image 픽셀은 필요 없다.\n- Editing model의 VLM 및 multimodal understanding 모듈(instruction/visual context encoding)은 frozen으로 두고, diffusion 기반 image generation branch와 action expert만 학습한다. Frozen VLM이 안정적인 language-vision conditioning을 주고, trainable diffusion branch가 task-relevant future frame을 학습한다.\n- 효율: video 기반 WAM 대비 FLOPs를 약 1/6, latency를 약 1/4로 줄인다 (Table 5: 9.72 vs 63.65 TFLOPs, 263 ms vs 1081 ms). 동시에 강한 policy 성능 유지(RoboTwin2.0 93.38%, LIBERO 98.4%, LIBERO-Plus 83.1%, real-world 84.5%).\n- Train-time와 inference-time이 다르다: 학습 시 denoising timestep tau를 random sampling해 여러 단계의 editing cache에 action expert를 노출시키고, inference 시에는 고정된 tau*로 editing branch를 단 한 번만 forward해 cache를 얻는다(full denoising cycle 불필요).\n\n**왜 / 직관**\n\n비유하자면, 기존 video-generation WAM은 '로봇이 앞으로 일어날 일을 완전한 동영상으로 머릿속에 다 그린 다음(매 프레임 픽셀까지) 그걸 보고 행동을 정한다'에 가깝다. 동영상을 끝까지 렌더링하는 비용이 크고, task와 무관한 배경/질감 디테일에도 capacity를 쓰며, 잘못 그려진 미래 프레임의 artifact가 action을 오도할 수 있다(Fig. 5). ImageWAM은 '동영상을 다 그리지 말고, 결과 한 장만 떠올려라(endpoint frame), 그것도 완성된 그림으로 출력(decode)하지 말고 떠올리는 도중의 머릿속 메모(KV cache)만 바로 행동 결정에 가져다 써라'는 발상이다. 즉 image editing 모델에게 'instruction대로 이 장면이 어떻게 바뀌어야 하나'를 추론(denoising)시키되, 그림을 완성시키는 마지막 디코딩 단계를 건너뛰고, 추론 과정의 internal representation(layer별 K,V)을 action expert가 joint attention으로 읽는다. 그래서 '미래를 상상하는 reasoning'은 유지하면서 dense imagination/decoding 비용을 없앤다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image Editing Model (backbone)** — 목적: (o_t, l)을 받아 instruction이 적용된 endpoint frame으로의 visual transformation을 추론하는 backbone. ImageWAM은 이를 처음부터 짓지 않고 OmniGen2 / Ovis-U1 / FLUX.2 같은 기성 image editing model을 변형해 사용한다. · 입력→출력: 입력: 현재 관측 o_t (image) + task instruction l (language) -> 내부적으로 future endpoint frame o_hat_{t+H+1}을 향한 denoising 추론. 출력(최종 픽셀 image)은 ImageWAM에서 사용/decode하지 않음. · 내부: 두 부분으로 구성. (a) VLM + multimodal understanding 모듈: instruction과 visual context를 encode, FROZEN 유지(안정적 language-vision conditioning 제공). (b) diffusion 기반 image generation branch f_edit: TRAINABLE, task-relevant future frame을 예측하도록 학습. world-action reasoning을 dense video가 아닌 single endpoint-frame editing으로 수행 (Eq. 4).\n- **KV Cache Extraction (f_edit^tau)** — 목적: editing branch가 denoising하는 도중의 internal representation을 추출해, edited image를 decode하지 않고도 task-conditioned visual transformation 정보를 compact한 형태로 확보한다. · 입력→출력: 입력: o_t, l 과 (학습 시) random denoising timestep tau -> 출력: C_edit^tau = {(K_ell^tau, V_ell^tau)}_{ell=1..L}, 각 transformer layer ell의 key-value cache 집합. (shape는 본문 미명시: layer 수 L에 걸친 (K,V) 텐서들) · 내부: Eq. 5: C_edit^tau = {(K_ell^tau, V_ell^tau)}_{ell=1}^{L} = f_edit^tau(o_t, l). 'cache는 final edited image를 decode할 필요 없이 task-conditioned visual transformation 정보를 담는다.' 학습 시 tau를 random sampling해 denoising의 여러 단계 cache에 노출, inference 시 고정 tau* 한 번만 forward.\n- **Action Expert** — 목적: editing reasoning(KV cache)을 실행 가능한 robot action으로 변환한다. editing branch가 '관측이 instruction대로 어떻게 바뀌어야 하나'를 추론하면, action expert가 그 editing context를 action으로 디코딩한다. · 입력→출력: 입력: 현재 관측 o_t, instruction l, editing KV cache C_edit^tau, 현재 robot state, action noise -> 출력: future action sequence(action chunk) a_{t:t+H}. · 내부: C_edit^tau의 intermediate KV features를 joint attention으로 통합해 조건화(Fig.2 caption). TRAINABLE. flow-matching 기반 action expert로, current robot state와 action noise를 조건으로 action chunk를 생성(섹션 3.3의 action objective에서 velocity predictor v_theta로 학습). 정의상 'edited image -> action expert -> a_{t:t+H}' (Eq. 4)의 마지막 화살표를 담당.\n\n**수식**\n\n$$\n(o_t, l) \\;\\to\\; \\hat{o}_{t+1:t+H+1} \\;\\to\\; \\mathbf{a}_{t:t+H}\n$$\n\n- **무슨 식?**: 기존 방식: 미래 frame 전체를 그린 뒤 action\n- 비교 대상(기존 video-WAM)의 formulation. 현재 관측 o_t와 instruction l로부터 미래 frame들의 전체 sequence(t+1 .. t+H+1)를 예측한 뒤 action chunk a_{t:t+H}를 뽑는다. dense future video 예측이라 비용이 크다.\n\n$$\n(o_t, l) \\;\\to\\; \\hat{o}_{\\text{edit}} \\equiv \\hat{o}_{t+H+1} \\;\\to\\; \\mathbf{a}_{t:t+H} \\qquad (4)\n$$\n\n- **무슨 식?**: ImageWAM: endpoint frame 한 장 -> action\n- ImageWAM의 재정의. 미래 전체가 아니라 instruction이 적용된 단일 endpoint frame o_hat_edit(= horizon 끝 frame o_hat_{t+H+1})만을 'image editing'으로 떠올리고, 그로부터 action a_{t:t+H}를 예측한다. dense video를 single source-conditioned frame으로 축약.\n\n$$\n\\mathcal{C}^{\\tau}_{\\text{edit}} = \\{(K^{\\tau}_{\\ell}, V^{\\tau}_{\\ell})\\}_{\\ell=1}^{L} = f^{\\tau}_{\\text{edit}}(o_t, l) \\qquad (5)\n$$\n\n- **무슨 식?**: editing 도중 layer별 (K,V) cache = action 조건\n- editing branch f_edit를 denoising timestep tau에서 돌려, 모든 transformer layer ell(=1..L)의 key-value cache (K_ell^tau, V_ell^tau)를 모은 집합이 C_edit^tau. 이 cache가 task-conditioned visual transformation 정보를 담는다(최종 edited image decode 불필요). 이것이 action expert의 conditioning context가 된다.\n\n**그림 / 구조도**\n\n- (원본 그림 1 재참조) → video future prediction을 image editing backbone으로 대체해 compact한 world-action intermediate를 만든다는 본 섹션의 핵심 패러다임 전환을 한 장으로 보여줌.\n- (원본 그림 2 재참조) → Architecture/pipeline 도식 - editing backbone이 cache를 만들고 Action Expert가 그 intermediate KV features를 joint attention으로 통합해 action을 예측하는, 3.2 섹션이 그대로 묘사하는 구조.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nImageWAM architecture (Section 3.2, grounded in Eq.4/5 + Fig.2 caption)\n\n  l (instruction) ---+\n                     |\n  o_t (current obs)--+--> [ Image Editing Model ]\n                     |     ----------------------------------\n                     |     | VLM + multimodal understanding |  <- FROZEN\n                     |     |  (encode instruction l, visual |     (stable\n                     |     |   context o_t)                  |      lang-vision\n                     |     ----------------------------------      conditioning)\n                     |              |\n                     |              v\n                     |     ----------------------------------\n                     |     | Diffusion image-editing branch |  <- TRAINABLE\n                     |     |   f_edit at denoising step tau  |     (learns task-\n                     |     |   layers ell = 1 .. L          |      relevant\n                     |     ----------------------------------      future frame)\n                     |              |\n                     |              |  collect per-layer KV  (Eq. 5)\n                     |              v\n                     |     C_edit^tau = { (K_ell^tau, V_ell^tau) }_{ell=1..L}\n                     |              |\n                     |   (NOTE: final edited image o_hat_{t+H+1} is NOT decoded;\n                     |          cache itself is the world-action intermediate)\n                     |              |\n                     |              | joint attention (KV features as context)\n                     |              v\n                     |     ----------------------------------\n                     +---->| Action Expert                  |  <- TRAINABLE\n   robot state s -------->|   conditioned on o_t, l,        |\n   action noise -------->|   C_edit^tau  (+ state, noise)   |\n                          ----------------------------------\n                                   |\n                                   v\n                          a_{t:t+H}  (action chunk)\n\nTrain:  tau ~ random per step (expose expert to many denoising stages)\nInfer:  tau = tau* fixed, single forward of f_edit -> cache -> action\n        (no full denoising cycle, no future video decode)\n```\n\n**학습 / 추론**\n\nTrain-time(주로 3.2-3.3): editing model의 VLM/multimodal understanding 모듈은 FROZEN, diffusion image-editing branch와 action expert만 update. 각 step마다 random denoising timestep tau를 sampling해 editing branch를 그 timestep에서 돌리고(Eq. 5로 C_edit^tau 수집), action expert를 denoising의 여러 단계 cache에 노출시킨다. 즉 학습 동안 editing branch는 'tau에서의 한 denoising step' 형태로 동작하며, action expert는 그 cache + robot state + action noise에 조건화되어 action을 예측하도록 flow-matching으로 학습된다(섹션 3.3의 action loss, velocity predictor v_theta). \\n\\nTest-time(3.4 핵심 메커니즘): full future-video generation도 안 하고 '완전한 edited image를 decode하지도 않는다.' 대신 고정된 editing denoising timestep tau*를 골라 editing branch를 단 한 번만 forward해 layer-wise cache C_edit^tau* = f_edit^tau*(o_t, l) (Eq. 10)를 계산하고, 이 cache를 그대로 action expert의 context로 써서 a_hat_{t:t+H} ~ p_theta(a_{t:t+H} | o_t, l, C_edit^tau*) (Eq. 11)로 action을 생성한다. 따라서 video WAM이 필요로 하는 full denoising cycle / dense spatio-temporal future token 생성·decode가 전부 제거된다 -- 즉 target frame을 decode하지 않고, image-editing denoising의 KV cache에 (flow-matching) action expert를 조건화하는 것이 inference 메커니즘이다. 이 덕분에 FLOPs ~1/6, latency ~1/4로 줄어든다.\n\n**숫자**\n- FLOPs: video 기반 WAM의 약 1/6 (ImageWAM 9.72 TFLOPs vs FastWAM-IDM 63.65 TFLOPs, Table 5)\n- Latency: video 기반 WAM의 약 1/4 (ImageWAM 263 ms vs 1081 ms, Table 5)\n- RoboTwin 2.0: 93.38% 평균 (clean 93.20% / randomized 93.56%)\n- LIBERO: 98.4% 평균 (four suites)\n- LIBERO-Plus: 83.1% 평균 (ImageWAM, FLUX.2 4B backbone)\n- Real-world robot: 84.5% 평균 (four tasks)\n- Transformer layers ell = 1 .. L (KV cache가 모든 L개 layer에서 수집됨)\n\n---\n\n## 3.3 Action Prediction and Training\n\n**핵심**\n- ImageWAM은 두 갈래(branch)를 jointly 학습한다: (1) image editing branch가 task-relevant future frame을 예측, (2) action expert가 flow matching으로 action chunk를 생성. 총 손실은 L = L_act + L_img.\n- Action expert는 future frame을 직접 입력받지 않는다. 대신 image editing backbone이 만들어낸 layer별 KV cache C_edit^τ = {(K_l^t, V_l^t)}_{l=1..L} = f_edit^τ(o_t, l) 를 joint attention으로 읽어서 action에 조건을 건다. 즉 KV cache가 'world-action intermediate' 역할.\n- Image editing objective: target latent z*_{t+H+1}과 noise ε_z를 flow time r로 섞은 z_r = (1-r)z*_{t+H+1} + r·ε_z 를 만들고, velocity predictor u_φ가 (ε_z - z*_{t+H+1})를 회귀하도록 학습 (Eq. 6, 7). 이는 editing branch가 task-relevant future visual state를 예측하는 능력을 유지시킨다.\n- Action flow matching: expert action a*_{t:t+H}와 noise ε_a를 flow time s로 섞은 a_s = (1-s)a*_{t:t+H} + s·ε_a 를 만들고, action expert velocity predictor v_θ가 (ε_a - a*_{t:t+H})를 회귀 (Eq. 8, 9). 조건은 o_t, l, 그리고 editing context cache C_edit^τ.\n- 학습 시에는 editing denoising timestep τ를 random sampling하여 action expert를 denoising 과정의 여러 단계에서 나온 editing cache에 노출시킨다 (robustness). 추론 시에는 fixed τ*로 editing branch를 단 한 번만 forward(one editing-branch forward step)해 KV cache만 얻고, full denoising trajectory도, 완성된 edited image 디코딩도 하지 않는다.\n- 효율: video-WAM 대비 latency 1081 ms → 263 ms (약 1/4), FLOPs 63.65 → 9.7 (약 1/6). 성공률은 유지: RoboTwin2.0 randomized 93.56%, LIBERO 98.4%, real-world 84.5% (π0 55.8%, π0.5 72.3%, FastWAM 79.0% 대비 우위).\n\n**왜 / 직관**\n\n왜 이렇게 설계했나: 기존 video-generation WAM은 미래를 '꽉 채운 영상(dense future video tokens)'으로 상상한 뒤 거기서 행동을 뽑는다. 이는 비싸고(매 프레임 token 생성·디코딩) 또 task와 무관한 시각 디테일(배경 텍스처 등)에까지 표현력을 낭비하며, 심지어 future-video artifact(물체 주변 왜곡)가 action prediction을 오도해 실패를 부른다(Fig. 5). ImageWAM의 직관은 '미래 영상 전체를 다 그려서 보여줄 필요 없이, 어떻게 바뀌어야 하는지에 대한 편집 의도(edit intent)만 머릿속에 잡으면 행동은 충분히 결정된다'는 것. 비유하면, 요리사가 완성 접시를 사진처럼 풀 렌더링해 보지 않아도 '이 재료를 저기로 옮긴다'는 편집 스케치(중간 표상)만 떠올리면 손이 움직인다. 그 '편집 스케치'에 해당하는 것이 바로 image editing backbone의 KV cache이고, action expert는 미래 프레임 픽셀을 받는 게 아니라 이 compact한 cache에 attention으로 올라타(joint attention) 행동을 흐름(flow)대로 디노이즈한다. 추론 때 미래 프레임을 디코딩조차 안 하는 이유도 같다: 우리가 원하는 건 그림이 아니라 그림을 그리는 도중의 '의도 표상'뿐이므로, 편집 denoising을 끝까지(혹은 디코더까지) 돌릴 이유가 없고 fixed timestep τ*에서 한 번만 forward해 cache를 뽑으면 된다. 이것이 1/6 FLOPs·1/4 latency의 출처다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image Editing Backbone f_edit^τ (image branch, velocity predictor u_φ)** — 목적: language instruction과 current observation을 source-grounded, instruction-guided 시각 변형(image edit)으로 추론해 task-relevant future visual state를 예측하고, 그 과정의 layer별 KV cache를 action용 'world-action intermediate'로 산출. · 입력→출력: 입력: o_t (current obs), l (instruction), interpolated latent z_r=(1-r)z*_{t+H+1}+r·ε_z, flow time r∈(0,1) → 출력: (a) velocity 예측 u_φ(z_r,r|o_t,l) [latent-velocity], (b) per-layer KV cache C_edit^τ={(K_l^t,V_l^t)}_{l=1..L} (L = transformer layer 수). · 내부: flow-matching diffusion image branch. target future frame o*_{t+H+1}을 VAE로 z*_{t+H+1}로 인코딩(Eq.6), Eq.7 L_img=E[||u_φ(z_r,r|o_t,l)-(ε_z-z*_{t+H+1})||_2^2]로 학습해 편집 능력을 유지. Eq.5에서 한 번의 forward로 각 transformer layer l의 (K_l^t,V_l^t)를 모아 C_edit^τ=f_edit^τ(o_t,l)를 만든다. 학습 시 editing denoising timestep τ를 random sampling.\n- **Action Expert v_θ (flow-matching action velocity predictor)** — 목적: editing backbone의 KV cache(편집 의도 표상)에 조건을 걸어 미래 action chunk를 flow matching으로 생성 — future frame 픽셀을 직접 받지 않음. · 입력→출력: 입력: interpolated action a_s=(1-s)a*_{t:t+H}+s·ε_a, action flow time s∈(0,1), 조건 (o_t, l, C_edit^τ) → 출력: action velocity 예측 v_θ(a_s,s|o_t,l,C_edit^τ) (target = ε_a - a*_{t:t+H}); 디노이즈를 통해 action chunk a_{t:t+H} (길이 H) 생성. · 내부: Eq.8로 a_s 구성, Eq.9 L_act=E_{a*,ε_a,s,τ}[||v_θ(a_s,s|o_t,l,C_edit^τ)-(ε_a-a*_{t:t+H})||_2^2]로 학습. C_edit^τ와의 결합은 joint attention(Action Expert가 editing 생성 과정의 intermediate KV features를 통합, Fig.2 caption 근거)으로 이뤄짐. τ를 학습 중 sampling해 denoising 과정 여러 단계의 editing cache에 노출(robustness).\n\n**수식**\n\n$$\n\\mathcal{C}_{\\text{edit}}^{\\tau} = \\{(K_l^{t}, V_l^{t})\\}_{l=1}^{L} = f_{\\text{edit}}^{\\tau}(o_t, l)\n$$\n\n- **무슨 식?**: editing backbone을 한 번 돌려 layer별 KV를 모은 것이 곧 '미래 의도' 표상(=action 조건).\n- (Eq. 5) Image editing backbone f_edit를 denoising timestep τ에서 현재 관측 o_t와 instruction l에 대해 돌려, 각 transformer layer l(총 L개)의 key K_l^t와 value V_l^t를 모은 KV cache C_edit^τ를 정의한다. 이 cache가 future frame을 대신하는 compact world-action intermediate이며 action expert의 조건 입력이 된다.\n\n$$\nz_r = (1-r)\\, z^{*}_{t+H+1} + r\\, \\epsilon_z, \\quad r \\in (0,1)\n$$\n\n- **무슨 식?**: 깨끗한 미래 프레임 latent과 noise를 r로 섞어 학습용 중간 상태를 만든다.\n- (Eq. 6) Image flow matching의 interpolated latent. VAE로 인코딩한 target future frame latent z*_{t+H+1}과 Gaussian noise ε_z를 flow time r로 선형 보간한다. r→0이면 깨끗한 target, r→1이면 순수 noise.\n\n$$\n\\mathcal{L}_{\\text{img}} = \\mathbb{E}\\big[\\,\\|\\, u_{\\phi}(z_r, r \\mid o_t, l) - (\\epsilon_z - z^{*}_{t+H+1}) \\,\\|_2^2\\,\\big]\n$$\n\n- **무슨 식?**: u_φ가 'noise→target으로 가는 속도장'을 맞히게 해 편집 능력을 보존.\n- (Eq. 7) Image editing branch의 손실. velocity predictor u_φ가 z_r, flow time r, 그리고 조건(o_t, l)으로부터 flow matching target velocity (ε_z - z*_{t+H+1})를 회귀하도록 MSE로 학습. 이 항이 editing branch가 task-relevant future visual state를 예측하는 능력을 유지시킨다.\n\n$$\na_s = (1-s)\\, a^{*}_{t:t+H} + s\\, \\epsilon_a, \\quad s \\in (0,1)\n$$\n\n- **무슨 식?**: 정답 action chunk와 noise를 s로 섞어 action denoising 학습 상태를 만든다.\n- (Eq. 8) Action flow matching의 interpolated action sample. 정답 action chunk a*_{t:t+H}(길이 H)와 Gaussian noise ε_a를 action flow time s로 선형 보간. s→0이면 정답 action, s→1이면 순수 noise.\n\n$$\n\\mathcal{L}_{\\text{act}} = \\mathbb{E}_{\\mathbf{a}^{*},\\,\\epsilon_a,\\,s,\\,\\tau}\\big[\\,\\|\\, v_{\\theta}(\\mathbf{a}_s, s \\mid o_t, l, \\mathcal{C}_{\\text{edit}}^{\\tau}) - (\\epsilon_a - \\mathbf{a}^{*}_{t:t+H}) \\,\\|_2^2\\,\\big]\n$$\n\n- **무슨 식?**: v_θ가 KV cache에 joint attention으로 올라타 action의 속도장을 맞힌다(τ는 학습 시 랜덤).\n- (Eq. 9) Action expert의 손실. velocity predictor v_θ가 a_s, action flow time s, 조건(현재 관측 o_t, instruction l, editing context cache C_edit^τ)으로부터 action velocity (ε_a - a*_{t:t+H})를 회귀. 기대값은 정답 action, action noise ε_a, action flow time s, 그리고 editing denoising timestep τ에 대해 취한다(τ를 random sampling). 핵심: action은 future frame 픽셀이 아니라 C_edit^τ에만 조건을 건다.\n\n$$\n\\mathcal{L} = \\mathcal{L}_{\\text{act}} + \\mathcal{L}_{\\text{img}}\n$$\n\n- **무슨 식?**: 두 branch를 한 손실로 묶어 jointly 학습.\n- 총 학습 목표. action flow matching 손실과 image editing 손실을 동시에 최적화(joint training)한다. editing 항이 cache의 질을 유지하고, action 항이 그 cache를 활용해 행동을 예측하도록 묶는다.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → 3.3의 핵심 메커니즘(editing backbone이 \\hat{o}_{t+H+1} 합성 과정에서 만든 intermediate KV features를 Action Expert가 joint attention으로 통합해 a_{t:t+H}를 예측)을 그대로 보여주는 파이프라인 그림 — Eq. 5/9의 C_edit^τ 조건화가 시각화됨.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nImageWAM 3.3 train-time data flow (Eq.5-9). 본문 근거 기반, 추측 없음.\n\n inputs:  o_t (current obs)   l (instruction)   a*_{t:t+H} (expert action chunk, len H)   o*_{t+H+1} (target future frame)\n            |                   |                          |                                   |\n            |                   |                          |                          VAE encode -> z*_{t+H+1}\n            v                   v                          |                                   |\n   +-------------------------------------+                 |                       Eq.6: z_r=(1-r)z*+r.eps_z  (r in (0,1))\n   |   Image Editing Backbone  f_edit^tau |<-- tau ~ sampled (train: random)        |\n   |   (denoising image branch, u_phi)    |                |                                   v\n   |                                      |---------------------------------> u_phi(z_r, r | o_t, l)\n   +-------------------------------------+                 |                                   |\n            |  Eq.5: collect per-layer KV                  |                  Eq.7: L_img = || u_phi - (eps_z - z*) ||^2\n            |  C_edit^tau = {(K_l^t,V_l^t)}_{l=1..L}       |\n            v                                              v\n   +-------------------------------------+        Eq.8: a_s=(1-s)a*_{t:t+H}+s.eps_a  (s in (0,1))\n   |        Action Expert   v_theta       |<------- a_s , s                          (eps_a ~ N(0,I))\n   |  joint attention over C_edit^tau     |<------- o_t , l\n   +-------------------------------------+\n            |\n            v   Eq.9: L_act = || v_theta(a_s, s | o_t, l, C_edit^tau) - (eps_a - a*_{t:t+H}) ||^2\n            |\n            +------> total:  L = L_act + L_img   (joint optimize)\n\nINFERENCE difference (key): pick FIXED tau*, run editing branch ONE forward step only\n   -> obtain C_edit^{tau*}  (NO full denoising trajectory, NO decoding of edited image / future video)\n   -> action expert denoises action conditioned ONLY on the cache  => latency 1/4, FLOPs 1/6\n```\n\n**학습 / 추론**\n\nTrain-time: editing branch와 action expert를 jointly 최적화한다(L = L_act + L_img). image branch는 Eq.6의 z_r과 Eq.7 L_img로, action expert는 Eq.8의 a_s와 Eq.9 L_act로 학습. 핵심 트릭은 editing denoising timestep τ를 매 step random sampling하여(L_act의 기대값이 τ에 대해 취해짐), action expert를 'denoising 과정의 서로 다른 단계에서 나온 editing cache'에 노출시키는 것이다. 이로써 단일 cache에 과적합되지 않고 다양한 τ의 cache로부터 action을 뽑는 능력을 얻는다. action은 어떤 단계에서도 future frame 픽셀이 아니라 C_edit^τ에만 조건을 건다.\\n\\nTest-time(추론): ImageWAM은 full future-video generation을 하지 않으며, 완성된 edited image를 decode조차 하지 않는다. full image-editing denoising trajectory를 돌리는 대신 fixed editing denoising timestep τ*를 하나 골라 editing branch를 단 한 번만 forward(one editing-branch forward step)해 C_edit^{τ*}만 얻는다. 그 다음 action expert가 이 KV cache에 joint attention으로 조건을 걸어 action을 flow-matching denoising으로 생성한다. video-WAM이 여러 future frame에 걸쳐 dense spatio-temporal token을 처리하는 것과 달리 ImageWAM은 단일 image-editing cache 한 세트만 쓰므로, A6000 기준 latency 1081 ms→263 ms (약 1/4), FLOPs 63.65→9.7 (약 1/6)로 줄면서 task success는 유지된다(Table 5).\n\n**숫자**\n- FLOPs: 63.65 → 9.7 (video-WAM 대비 약 1/6)\n- Latency (A6000 GPU): 1081 ms → 263 ms (약 1/4)\n- RoboTwin2.0: clean 93.20%, randomized 93.56%, average 93.38%\n- LIBERO average 98.4% (Spatial 97.2 / Object 99.2 / Goal 98.8 / Long 98.4)\n- LIBERO-Plus: FLUX.2 4B 83.1%, FLUX.2 9B 85.2%\n- Real-world average 84.5% (vs π0 55.8%, π0.5 72.3%, FastWAM 79.0%); T1 94% / T2 84% / T3 78% / T4 82%\n- Action chunk 길이 = H; target future frame = o_{t+H+1} (캡션상 \\hat{o}_{t+H+1}); transformer layer 수 = L\n\n---\n\n## 3.4 Efficient Inference\n\n**핵심**\n- 추론 시 ImageWAM은 (1) future-video 전체 생성도, (2) 완성된 edited image 디코딩도 하지 않는다. 즉 image-editing denoising trajectory를 끝까지 돌리지 않는다.\n- 대신 고정된 editing denoising timestep tau* 하나를 골라 editing-branch를 단 1회 forward pass만 수행해 layer-wise KV cache 집합 C_edit^{tau*}만 뽑아낸다 (Eq 10).\n- Action Expert는 이 cache C_edit^{tau*}를 조건으로 action noise를 denoise해 action chunk a_hat_{t:t+H}를 샘플링한다 (Eq 11). 핵심은 target frame(미래 영상/이미지)을 절대 디코딩하지 않고 cache만 condition으로 쓴다는 점.\n- video-WAM은 여러 미래 프레임에 걸친 dense spatio-temporal token을 denoise+decode해야 하지만, ImageWAM은 single set of layer-wise editing cache 한 번만 계산해 그대로 action expert의 context로 직접 사용한다.\n- 이로써 WAM의 'reason-before-act'(행동 전에 추론) 원칙은 유지하면서 dense future-video token의 instantiation은 회피한다.\n- 비교군으로 video-WAM backbone에 대한 Fast-WAM-style inference도 구현: test time에 future video token을 제거하고, video backbone은 current observation+instruction만 처리하며 그 current-context KV cache를 action 생성에 쓴다 (compact interface지만 ImageWAM과 달리 editing cache가 아닌 video backbone cache).\n- Train vs Test 차이: 학습 시에는 tau를 random 샘플링하고 image loss(L_img)+action loss(L_act)를 jointly 최적화하지만, 추론 시에는 tau* 고정 + editing-branch 1-step forward + image decode 없음 + action denoising만 수행.\n- 효율(A6000 GPU 측정, Table 5): latency 1081 ms -> 263 ms, FLOPs 63.65 -> 9.72 TFLOPs. Abstract 표현으로 FLOPs를 video WAM의 1/6, latency를 1/4로 감소.\n- ImageWAM은 정확도를 유지하면서(competitive task success) 이 효율을 달성 — LIBERO 평균 98.4%, real-world 평균 84.5%.\n\n**왜 / 직관**\n\nvideo-generation WAM이 행동을 결정하기 전에 '미래 전체를 한 컷씩 풀HD 동영상으로 머릿속에 다 그려보고' 행동하는 것이라면, ImageWAM은 '미래 한 장의 그림을 끝까지 색칠해 완성하지도 않고, 붓을 단 한 번 그어보다가 손끝에 남은 감각(중간 KV cache)만으로' 행동을 결정한다. 화가가 그림을 완성해야만 무엇을 그리려는지 아는 게 아니라, 첫 붓질의 방향만으로도 의도가 드러나는 것과 같다. 핵심 비유 두 가지: (1) editing-branch의 한 번 forward에서 나온 layer별 (K,V) cache는 '아직 디코딩 안 된, 그러나 task에 의해 이미 변형 방향이 정해진 잠재적 의도'다 — 완성된 이미지를 만들 필요 없이 그 안에 '무엇이 어떻게 바뀌어야 하는가'가 들어있다. (2) flow-matching action expert는 이 cache를 'joint attention으로 들여다보며' action noise를 진짜 action으로 점점 펴 나간다. denoising trajectory 전체를 돌리는 대신 tau* 한 지점만 보는 것은, 영화 전체를 보지 않고 결정적 장면 한 프레임만 봐도 줄거리를 파악하는 것과 같다. 이 '미래를 완성하지 않는' 절약이 곧 FLOPs 1/6, latency 1/4의 출처다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image-Editing Backbone (f_edit, editing branch)** — 목적: 현재 관측 o_t와 지시문 l을 받아, edited image를 디코딩하지 않은 채 task-conditioned 변형 정보를 담은 layer-wise KV cache C_edit를 생성하는 것(world-action reasoning을 image editing으로 대체). · 입력→출력: 입력: o_t (현재 observation 이미지), l (language instruction). 추론 시 fixed denoising timestep tau* 1회. 출력: C_edit^{tau*} = {(K_l^{tau*}, V_l^{tau*})}_{l=1}^L (L = transformer layer 수; 각 층의 key/value 쌍 집합). shape는 소스에 명시되지 않음(추측 금지). · 내부: OmniGen2/Ovis-U1/Flux.2 같은 source-conditioned image editing model의 editing branch 위에 구축(3.2). VLM 및 multimodal understanding 구성요소(instruction/visual context encoder)는 frozen, diffusion-based image generation branch만 학습. 추론: 전체 denoising trajectory를 돌리지 않고 tau*에서 단 1 forward step만 수행해 cache까지만 계산(Eq 10), 최종 edited image는 디코딩하지 않음. cache는 visual latent가 instruction과 attention으로 상호작용한 '후' 시점에 수집되므로 task-conditioned transformation 정보를 담음(Eq 5).\n- **Action Expert (v_theta / p_theta)** — 목적: editing cache를 조건으로 flow-matching denoising을 통해 실행 가능한 미래 action chunk를 생성하는 것(editing context -> robot action 변환). · 입력→출력: 입력: o_t, l, C_edit^{tau*}, action noise eps_a ~ N(0,I), current robot state(Fig 2 caption). 출력: action chunk a_hat_{t:t+H} (H = action horizon, 실험에서 H=16). 정확한 action 차원/shape는 소스 미명시. · 내부: 학습 시 flow time s ~ (0,1) 샘플 후 a_s = (1-s)a*_{t:t+H} + s*eps_a 로 보간(Eq 8), velocity field v_theta(a_s, s | o_t, l, C_edit^tau)를 예측하도록 L_act = E[||v_theta - (eps_a - a*_{t:t+H})||_2^2] 최소화(Eq 9). 학습 시 tau는 random 샘플(서로 다른 denoising 단계의 cache 노출). 추론 시에는 fixed C_edit^{tau*}를 condition으로 action noise를 denoise해 p_theta(a_{t:t+H} | o_t, l, C_edit^{tau*})에서 chunk를 샘플링(Eq 11). cache 통합 방식은 joint attention(Fig 2 caption: 'integrates the intermediate KV features ... via joint attention').\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l).\n$$\n\n- **무슨 식?**: 현재관측+지시문을 editing backbone에 1-step만 통과시켜 layer별 KV cache만 뽑는다 (이미지 디코딩 없음).\n- 추론용 editing cache 추출식 (Eq 10). f_edit^{tau*} = editing backbone(OmniGen2/Flux.2류)을 '고정된 denoising timestep tau*에서 단 1 step' 돌리는 forward 연산; o_t = 현재 observation(이미지), l = task instruction(language). 우변 한 번의 forward가 좌변 C_edit^{tau*} = layer-wise key-value cache 집합을 만든다. 학습식(Eq 5) C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1}^L 와 동일한 객체이되, 여기선 tau가 random이 아니라 fixed tau*. 이미지를 디코딩하지 않고 cache까지만 계산하는 것이 핵심.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}).\n$$\n\n- **무슨 식?**: 그 KV cache를 condition으로 action noise를 denoise해 미래 행동열을 뽑는다.\n- action chunk 생성식 (Eq 11). p_theta = action expert(파라미터 theta)가 정의하는 분포; a_hat_{t:t+H} = 추론된 미래 H+1개 시점 action chunk(실험에서 H=16). 조건부 항: o_t(현재 관측), l(지시문), 그리고 핵심으로 C_edit^{tau*}(위에서 뽑은 editing KV cache). 'denoising action samples'라는 본문 표현대로, action noise에서 출발해 이 cache를 condition으로 점진적으로 denoise해 action을 샘플링한다. 학습식 Eq 9의 velocity field v_theta(a_s, s | o_t, l, C_edit^tau) flow-matching 목적함수에 대응하는 추론(샘플링) 형태.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l),\n$$\n\n- **무슨 식?**: cache = editing backbone 각 층의 (K,V) 쌍 모음 — 이미지를 완성하지 않아도 변형 의도를 담는다.\n- [3.2의 정의식 Eq 5 — 3.4의 C_edit가 가리키는 객체를 명시하기 위해 grounding 차원에서 포함] cache는 editing backbone의 transformer 각 layer l(=1..L)에서 모은 key K_l^tau와 value V_l^tau의 쌍 집합이다. L = transformer layer 수. 이 cache는 visual latent가 editing backbone 안에서 task instruction과 상호작용(attention)을 거친 '후'에 계산되므로 task-conditioned visual transformation 정보를 담되, 최종 edited image를 디코딩할 필요는 없다. 3.4는 tau를 fixed tau*로 바꿔 이 식을 1회만 평가한다.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → 3.4가 서술하는 추론 데이터흐름(editing backbone이 KV cache 생성 -> Action Expert가 joint attention으로 그 cache를 통합해 a_{t:t+H} 예측)을 그대로 보여주는 파이프라인 그림이라 cache-조건부 추론 메커니즘 이해에 직결.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nImageWAM INFERENCE (Sec 3.4, grounded in Eq 10-11 + Eq 5 / Fig 2)\nNOTE: target future frame is NOT decoded at test time; only the KV cache is used.\n\n  o_t (current obs)  l (instruction)\n       \\                /\n        v              v\n  +---------------------------------------------+\n  |  Image-Editing Backbone  f_edit            |   <- frozen VLM + trainable diffusion branch (3.2)\n  |  run ONLY at fixed timestep tau*           |\n  |  (1 forward step, NO full denoising traj,  |\n  |   NO image decode)                         |\n  +---------------------------------------------+\n        |  collect per-layer (K,V), l=1..L\n        v\n  C_edit^{tau*} = { (K_l^{tau*}, V_l^{tau*}) }_{l=1..L}    (Eq 10 / Eq 5)\n        |   layer-wise KV cache  (compact world-action intermediate)\n        v\n  +---------------------------------------------+      action noise eps_a ~ N(0,I)\n  |  Action Expert  v_theta / p_theta          | <----  + current robot state\n  |  joint attention over C_edit^{tau*}        |\n  |  flow-matching denoise of action samples   |\n  +---------------------------------------------+\n        |\n        v\n  a_hat_{t:t+H}   (action chunk, H=16)   (Eq 11)\n\nCONTRAST (same source, 3.4 last paragraph + 3.2):\n  video-WAM   : denoise+DECODE dense spatio-temporal tokens over many future frames -> KV -> action\n  Fast-WAM    : drop future tokens at test; backbone sees only (o_t,l) -> current-context KV -> action\n  ImageWAM    : editing-branch 1-step -> editing KV cache (no future-frame decode) -> action\n\nEFFICIENCY (Table 5, A6000):  FastWAM-IDM 1081 ms / 63.65 TFLOPs (Video)\n                              ImageWAM     263 ms /  9.72 TFLOPs (Cache)\n                              => latency ~1/4, FLOPs ~1/6\n```\n\n**학습 / 추론**\n\nTrain-time: editing denoising timestep tau를 random 샘플(Eq 5), editing branch를 그 tau에서 돌려 layer-wise KV cache C_edit^tau 수집. 두 손실을 jointly 최적화 — image editing objective L_img (target future endpoint frame o_{t+H+1}의 VAE latent z*에 대한 flow-matching velocity 예측, Eq 6-7)와 action flow-matching objective L_act (Eq 8-9), 총 L = L_act + L_img (Eq 9 아래). 즉 학습 때는 미래 frame을 실제로 예측/감독하며(image branch가 task-relevant future를 그릴 수 있게), tau를 random으로 두어 action expert가 denoising의 여러 단계에서 나온 cache에 모두 robust하도록 노출시킨다. Test-time(3.4 핵심): (1) tau를 random이 아니라 fixed tau*로 고정, (2) editing-branch를 전체 denoising trajectory가 아닌 단 1 forward step만 수행, (3) target/edited image를 디코딩하지 않음, (4) 그 1-step에서 나온 KV cache C_edit^{tau*}만 추출(Eq 10), (5) 이 cache를 condition으로 action expert가 flow-matching denoising으로 action chunk a_hat_{t:t+H}만 생성(Eq 11). 즉 알려진 메커니즘 그대로 — 추론 시 future frame을 디코딩하지 않고, image-editing denoising의 KV cache에 flow-matching action expert를 (joint attention으로) 조건화한다. 비교 baseline Fast-WAM-style: future video token은 학습 때 co-training용으로만 쓰고 추론 때 제거; video backbone이 current observation+instruction만 처리해 만든 current-context KV cache로 action 생성(같은 no-future-token 추론 인터페이스지만 editing cache가 아닌 video-backbone cache라는 점에서 ImageWAM과 다름).\n\n**숫자**\n- FLOPs를 video-based WAM의 1/6로 감소 (abstract: 'reduces FLOPs to 1/6')\n- latency를 video-based WAM의 1/4로 감소 (abstract: 'latency to 1/4')\n- Latency: 1081 ms -> 263 ms (Table 5, A6000 GPU; FastWAM-IDM -> ImageWAM)\n- FLOPs: 63.65 TFLOPs -> 9.72 TFLOPs (Table 5; 본문 4.3은 9.7로 표기)\n- Fast-WAM (1 Step) baseline: 302 ms / 13.21 TFLOPs (cache-based, Table 5)\n- H = 16 (action horizon, 실험 설정)\n- LIBERO 평균 성공률 98.4%\n- Real-world 평균 성공률 84.5% (pi_0 55.8%, pi_0.5 72.3% 대비 우수)\n- RoboTwin2.0: Clean / Rand. 두 설정 평균 성공률 보고(Table 1; 정확한 평균 수치는 표 셀에 가려져 본문 단일 수치로는 미인용 — 추측 금지)\n\n---\n\n## 4 Experiments\n\n**핵심**\n- [Setup] ImageWAM은 추가 embodied policy pretraining (P.T.) 없이 downstream 벤치마크 demonstration만으로 학습됨. VLA/WAM baseline 대부분이 P.T.를 쓰는 것과 대조적 (P.T.=✓ vs ImageWAM=✗).\n- [벤치마크 4종] LIBERO (Spatial/Object/Goal/Long 4 suite, suite당 500 demo / 10 task), LIBERO-Plus (visual/layout 변동 증강된 더 어려운 평가셋 — 원본 LIBERO 학습 demo만 쓰고 증강 학습데이터는 안 씀), RoboTwin 2.0 (50+ task bimanual, clean 2,500 + heavy randomization 25,000 trajectory, 30k step, task당 100 trial), real-world (Dobot XTrainer dual-arm, T1~T4 4 task, task당 100 trajectory, 30k step, 100 trial).\n- [RoboTwin 2.0, Table 1] ImageWAM clean 93.20% / rand. 93.56% / Avg 93.38% — 모든 baseline 중 최고. video-generation WAM(FastWAM 91.83%)과 comparable하면서 dense future-video token 예측을 회피.\n- [LIBERO, Table 2] ImageWAM Avg 98.4% (Spatial 97.2 / Object 99.2 / Goal 98.8 / Long 98.4). P.T. 없이도 pretrained VLA 및 video-WAM과 경쟁력 유지. Goal·Long suite에서 특히 강함.\n- [LIBERO-Plus] ImageWAM Avg 83.1% 유지 — source-conditioned editing context가 고정 visual 구성에 overfit하지 않고 task-relevant 변화에 집중하게 도와 distribution-shift에 강건.\n- [Real-world, Table 4] ImageWAM Avg 84.5%로 π₀(55.8) / π₀.₅(72.3) / FastWAM(79.0) 모두 능가. 4개 task 전부에서 최고. FastWAM 대비 T1 +6, T2 +9, T3 +1, T4 +6. 최대 향상은 T2(Fold Towel, deformable object) — editing context가 task-relevant visual 변화 추론에 특히 유용. T3(occlusion)에서는 두 WAM 방식이 π₀를 크게 능가 — world-action reasoning이 가림 완화.\n- [효율, Table 5] ImageWAM은 editing-branch 1회 forward로 single image-editing cache만 얻음(video-WAM의 dense spatio-temporal multi-frame 토큰 처리와 대조). A6000 기준 latency 1081ms→263ms, FLOPs 63.65→9.72 TFLOPs로 감소(FastWAM-IDM video 대비 latency ~1/4, FLOPs ~1/6.5)하면서 success는 경쟁력 유지.\n- [Attention 분석, Fig.4] ImageWAM의 attention이 manipulated object/target receptacle/contact 영역 등 task-relevant change 영역에 집중하고 무관 background는 억제 — editing cache가 source-grounded·change-centric 시각 정보를 인코딩함을 시사.\n- [Future-video artifact, Fig.5] video-WAM은 task-relevant object 주변에 distorted geometry / inconsistent spatial layout artifact를 생성해 action expert를 오도 가능. ImageWAM은 추론 시 dense future-video token을 만들지도, future frame을 디코딩하지도 않고 image-editing cache를 직접 compact action-conditioning context로 사용해 이 artifact 누적을 회피.\n- [Ablation Q1, Table 7] editing backbone 교체(OmniGen2 71.8 / Ovis-U1 71.2 / FLUX.2 4B 83.1, LIBERO-Plus avg) — 모두 FastWAM·대부분 VLA를 능가. 특정 edit 모델에 종속되지 않으며 강한 editing backbone일수록 policy robustness가 직접 향상(FLUX.2 4B가 대부분 perturbation 차원에서 최고).\n- [Ablation Q2, Table 6] unified understanding-and-generation 모델을 안 쓰는 이유: understanding은 high-level semantic abstraction, generation은 fine-grained spatial/structural detail(특히 deeper layer)을 요구해 단일 fully-shared 모델에서 joint 최적화 시 상호 간섭. ImageWAM은 VLM understanding 부분을 frozen 유지하고 diffusion generation branch + action expert만 적응시켜 역할을 분리 — 동일 non-keyframe future prediction 세팅에서 UniVLA·BagelVLA보다 우수(ImageWAM LIBERO 98.4, RoboTwin clean 84.4).\n- [Ablation Q3] editing backbone 크기 효과: FLUX.2 4B→더 큰 FLUX.2로 키우면 LIBERO-Plus avg 83.1%→85.21%. 향상은 주로 Robot/Language/Background/Layout perturbation에서 옴. 단 Camera/Light/Noise는 단조 증가하지 않음 — backbone scaling이 대체로 robustness를 높이나 이득은 editing cache가 perturbation 종류와 얼마나 정렬되는지에 의존.\n\n**왜 / 직관**\n\n왜 이 섹션이 중요한가: ImageWAM의 핵심 주장은 \"world-action reasoning을 위해 미래 video를 통째로 생성(상상)할 필요가 없다 — image editing의 중간 표현(KV cache)만으로 충분하다\"이다. 4장은 이 주장을 두 축으로 검증한다. (1) 성능: video-WAM과 동급 이상(RoboTwin 93.38, LIBERO 98.4, real 84.5)이면서 P.T. 없이 달성. (2) 효율: latency ~1/4, FLOPs ~1/6.5. 비유 — video-WAM은 \"다음에 일어날 일을 영화로 한 편 다 찍어보고(매 미래 프레임 픽셀까지 렌더링) 거기서 행동을 읽는\" 방식이라 느리고, 게다가 영화에 CG 오류(artifact)가 끼면 행동까지 틀어진다(Fig.5). ImageWAM은 \"현재 사진을 지시문대로 어떻게 '고쳐 그릴지' 머릿속으로 절반쯤 스케치한 붓 자국(editing KV cache)\"만 보고 바로 행동을 정한다 — 완성된 그림(픽셀 디코딩)은 그릴 필요가 없다. 추론 시 단 1번의 editing-branch forward로 고정 timestep τ⋆의 cache만 뽑아 flow-matching action expert에 joint attention으로 주입하므로, 미래를 끝까지 denoise/decode하는 비용과 그 과정에서 쌓이는 artifact를 동시에 제거한다. Attention 시각화(Fig.4)는 이 cache가 실제로 조작 대상·접촉 영역 같은 task-relevant 변화에 집중함을 보여 \"editing 표현이 좋은 action context\"라는 논리를 뒷받침한다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image-Editing Backbone (diffusion edit branch)** — 목적: language instruction l과 현재 관측 o_t를 받아 source-grounded·instruction-guided visual transformation을 추론하는 world-action intermediate 생성. video 생성을 대체. · 입력→출력: 입력: (o_t, l) [+ train시 noise z_r, flow time r] → 출력(train): 미래 관측 latent z*_{t+H+1}를 reconstruct하는 velocity field; 출력(test): editing 중간 KV cache C^{τ⋆}_edit (픽셀 디코딩 없음) · 내부: train: u_φ(z_r, r | o_t, l)이 velocity field 예측, L_img = E[||u_φ(z_r,r|o_t,l) - (ε_z - z*_{t+K})||²₂]. editing denoising timestep τ를 random sample해 그 시점 KV cache 추출. test: 고정 τ⋆ 선택 후 editing-branch 1 step forward로 C^{τ⋆}_edit = f^{τ⋆}_edit(o_t, l)만 계산. 교체 가능(Q1: OmniGen2/Ovis-U1/FLUX.2 4B), 키우면 robust 향상(Q3). VLM understanding 부분은 frozen(Q2).\n- **Action Expert (flow-matching policy head)** — 목적: editing KV cache를 action-conditioning context로 받아 미래 action sequence를 예측하는 control head. · 입력→출력: 입력: 현재 robot state, action noise, (o_t, l), editing cache C^{τ⋆}_edit → 출력: action sequence â_{t:t+H}, action horizon H=16 (전 벤치마크 공통) · 내부: flow matching으로 action 생성. self-attention을 language context / visual condition / visual prediction / action 4종 토큰에 대한 joint self-attention으로 확장해 editing cache를 통합(joint attention). â_{t:t+H} ~ p_θ(a_{t:t+H} | o_t, l, C^{τ⋆}_edit). 추론 시 future video를 instantiate/decode하지 않아 artifact 누적 회피(Fig.5), attention이 task-relevant change 영역에 집중(Fig.4).\n\n**그림 / 구조도**\n\n원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2606.19531v1/x4.png)\n![](https://arxiv.org/html/2606.19531v1/x4.png)\n→ 4.3 Analysis가 직접 참조 — ImageWAM의 attention이 manipulated object/target/contact 등 task-relevant change 영역에 집중하고 background를 억제함을 보여 editing cache가 좋은 action context라는 주장을 뒷받침.\n<sub>원캡션: Attention visualization.<\/sub>\n\n원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2606.19531v1/x5.png)\n![](https://arxiv.org/html/2606.19531v1/x5.png)\n→ 4.3 'Qualitative analysis of future-video artifacts'가 참조 — video-WAM이 task-relevant object 주변에 distorted geometry/artifact를 생성해 실패하는 case로, ImageWAM이 future frame을 디코딩하지 않아 이를 피한다는 추론-시점 차이를 시각적으로 정당화.\n<sub>원캡션: Future-video artifacts can mislead action prediction.<\/sub>\n\n원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2606.19531v1/x3.png)\n![](https://arxiv.org/html/2606.19531v1/x3.png)\n→ 4.1 Experiment Setup이 참조하는 평가 환경 4종(RoboTwin2.0/LIBERO/LIBERO-Plus/real-world dual-arm) 셋업 그림.\n<sub>원캡션: Experiments setup on Robotwin2.0, LIBERO, LIBERO-Plus and real-world robot.<\/sub>\n\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nImageWAM inference vs Video-WAM (4.3 efficiency/artifact 근거; 학습 후 test-time 데이터흐름)\n\n[ Inputs ]  language instruction l        current observation o_t        robot state + action noise\n                 |                              |                                   |\n                 +--------------+---------------+                                   |\n                                v                                                   |\n                    +---------------------------+                                   |\n                    | Image-Editing diffusion   |  <-- VLM understanding: FROZEN (Q2)|\n                    | backbone (FLUX.2 4B 등)   |                                   |\n                    +---------------------------+                                   |\n                                |                                                   |\n        TRAIN-time  ===========>|  full denoise -> decode future frame o^_{t+H+1}   |\n                                |  (loss L_img = ||u_phi(z_r,r|o_t,l)-(eps_z-z*)||^2)|\n                                |                                                   |\n        TEST-time   ===========>|  fix tau*, ONE editing-branch forward step:       |\n                                |  C^{tau*}_edit = f^{tau*}_edit(o_t, l)            |\n                                |  (NO full denoise, NO pixel decode)               |\n                                v                                                   |\n                    +---------------------------+                                   |\n                    | KV cache  C^{tau*}_edit   |---------------+                   |\n                    +---------------------------+               |                   |\n                                                                v                   v\n                                                  +-----------------------------------------+\n                                                  | Action Expert (flow matching)           |\n                                                  | joint self-attention over 4 token types:|\n                                                  |  language / visual-cond /               |\n                                                  |  visual-pred / action                   |\n                                                  +-----------------------------------------+\n                                                                |\n                                                                v\n                                       a^_{t:t+H} ~ p_theta(a_{t:t+H}|o_t,l,C^{tau*}_edit)   H=16\n\n[Cost 대조, Table 5 (A6000)]\n  Video-WAM (FastWAM-IDM, interm=Video) : dense spatio-temporal tokens, multi future frame\n        Latency 1081 ms , 63.65 TFLOPs\n  ImageWAM (interm=Cache)               : single editing cache, 1 forward step\n        Latency  263 ms ,  9.72 TFLOPs       (~1/4 latency, ~1/6.5 FLOPs)\n```\n\n**학습 / 추론**\n\n[Train-time] image-editing diffusion branch가 미래 관측 latent z*_{t+H+1}을 실제로 reconstruct하도록 velocity field를 예측하며 flow-matching loss L_img = E[||u_φ(z_r, r | o_t, l) - (ε_z - z*_{t+K})||²₂]로 학습. 동시에 editing denoising timestep τ를 random sample해 그 timestep에서 editing branch의 KV cache를 추출, action expert가 이를 조건으로 받도록 함. 즉 학습 시엔 future-frame 생성 목표와 action 예측 목표가 함께 흐른다. [Test-time / Inference — 4장이 강조하는 핵심 차이] 미래 frame을 끝까지 denoise하거나 decode하지 않는다. 대신 (a) 고정된 단일 editing denoising timestep τ⋆를 선택하고, (b) editing-branch forward를 단 1 step만 수행해 중간 KV cache C^{τ⋆}_edit = f^{τ⋆}_edit(o_t, l)만 뽑는다(픽셀 디코딩 생략). (c) 이 cache를 flow-matching action expert에 'joint attention'으로 주입 — self-attention을 language context / visual condition / visual prediction / action 네 종류 토큰에 대한 joint self-attention으로 확장해 통합. (d) action expert는 현재 robot state와 action noise를 입력받아 â_{t:t+H} ~ p_θ(a_{t:t+H} | o_t, l, C^{τ⋆}_edit)로 미래 action sequence를 생성(action horizon H=16, 전 벤치마크 공통). 이 메커니즘 덕분에 4.3의 efficiency(latency 1081→263ms, FLOPs 63.65→9.72)와 4.3의 artifact 회피(미래 video token을 instantiate/decode 안 함)가 성립한다.\n\n**숫자**\n- RoboTwin 2.0 (Table 1) ImageWAM: Clean 93.20% / Rand. 93.56% / Avg 93.38% (전 baseline 중 최고; FastWAM 91.83, LingBot-VA 92.20)\n- LIBERO (Table 2) ImageWAM Avg 98.4% (Spatial 97.2 / Object 99.2 / Goal 98.8 / Long 98.4), P.T. 없음\n- LIBERO-Plus ImageWAM Avg 83.1%\n- Real-world (Table 4) ImageWAM Avg 84.5% (T1 94 / T2 84 / T3 78 / T4 82) > FastWAM 79.0 (88/75/77/76) > π₀.₅ 72.3 > π₀ 55.8; FastWAM 대비 T1+6, T2+9, T3+1, T4+6\n- 효율 (Table 5, A6000): latency 1081 ms → 263 ms; FLOPs 63.65 → 9.72 TFLOPs (ImageWAM). 중간단계: video → cache. 비교군 FastWAM(1 Step) 302 ms / 13.21 TFLOPs\n- Ablation Q1 (Table 7, LIBERO-Plus avg): OmniGen2 71.8% / Ovis-U1 71.2% / FLUX.2 4B 83.1% (FLUX.2 4B 세부: Camera 80.8 / Robot 50.3 / Language 91.4 / Light 98.1 / Background 85.5 / Noise 93.8 / Layout 80.5)\n- Ablation Q2 (Table 6): ImageWAM LIBERO 98.4 / RoboTwin Clean Only 84.4 / Clean2Hard 18.3; UniVLA LIBERO 95.5; BagelVLA(w/ K.F.) RoboTwin 75.3 & 20.9, (w/o K.F.) 56.7 & 15.9\n- Ablation Q3: FLUX.2 4B → 더 큰 FLUX.2 backbone 시 LIBERO-Plus avg 83.1% → 85.21%\n- Action horizon H = 16 (전 벤치마크), RoboTwin 30k step / task당 100 trial, real-world task당 100 trajectory / 100 trial / 30k step, LIBERO suite당 500 demo / 10 task\n\n---\n\n## 4.1 Experiment Setup\n\n**핵심**\n- No embodied pretraining: 대부분의 VLA/WAM baseline은 추가 embodied policy pretraining(논문 약어 P.T.)에 의존하지만, ImageWAM은 추가 embodied data 없이 downstrea
