m benchmark의 demonstration만으로 학습한다 (Table에서 P.T.=✗로 표시됨).\n- 평가 벤치마크 3종 + 실로봇: LIBERO, LIBERO-Plus, RoboTwin 2.0 시뮬레이션 + real-world dual-arm 조작. 실로봇은 Flux.2 4B backbone 사용.\n- LIBERO: 표준 4개 suite(Spatial, Object, Goal, LIBERO-Long)로 학습. 각 suite는 10개 task에 걸쳐 500개 expert demonstration 포함. 표준 benchmarking protocol 따름.\n- LIBERO-Plus: LIBERO task 위에 visual/layout variation을 늘린 더 어려운 평가 세팅. 학습은 원본 LIBERO demo만 쓰고 LIBERO-Plus의 augmented training data는 쓰지 않음(같은 학습데이터로 더 어려운 분포에서 평가 → generalization 측정).\n- RoboTwin 2.0: 50개 이상 task의 대규모 bimanual(양팔) 조작 benchmark. multi-task 세팅으로 단일 policy 학습 — clean scene 2,500 trajectory + heavy scene randomization 25,000 trajectory. 모든 모델 30k steps 학습. clean/randomized 두 설정에서 task당 100 trial 평균 success rate 보고.\n- Real-world: Dobot XTrainer dual-arm 플랫폼으로 4개 task 수집 — Stack Three Bowls(T1), Fold Towel(T2), Open Drawer & Store Marker(T3), Hang Cup On Rack(T4). long-horizon / visual occlusion / fine-grained / deformable-object 조작을 커버. task당 100 trajectory, 전 task 통합 데이터로 30k steps 학습, 여러 초기 configuration에서 100 trial 평균 success rate 보고.\n- 공통 평가 지표는 success rate(성공률) — 다양한 초기 조건에서의 trial 성공 비율. 모든 ImageWAM 결과는 P.T. 없이 달성된 것이 핵심 비교축.\n- 섹션 4.1 본문 자체에는 수식이 없음(수식은 3.3 action flow matching의 Eq.8-9, 3.4 efficient inference의 Eq.10-11에 위치). 효율 수치(FLOPs/latency)도 4.1이 아니라 4.3 Table 5에 위치 — 4.1은 setup만 기술.\n\n**왜 / 직관**\n\nImageWAM의 핵심 주장은 \"미래 비디오를 다 그리지 않고도 행동을 잘 뽑는다\"인데, 4.1 실험 셋업은 이 주장을 공정하게 검증하기 위한 무대 설계다. 비유하자면, 다른 선수들(VLA/WAM baseline)은 시합 전에 대규모 사전훈련 캠프(embodied pretraining, P.T.)를 다녀온 반면 ImageWAM은 그 캠프 없이 곧장 해당 종목의 연습데이터(downstream demo)만 보고 출전한다. 그래서 같은 성적이 나오면 \"효율적인 표상이 진짜 일한다\"는 증거가 된다. 벤치마크 구성도 난이도 사다리처럼 짜였다: LIBERO(표준) → LIBERO-Plus(같은 학습데이터로 시각/배치 변형을 늘려 일반화만 시험) → RoboTwin 2.0(양팔 협응 + 대규모 randomization) → 실로봇(occlusion·deformable 등 현실 잡음). LIBERO-Plus에서 일부러 증강 학습데이터를 안 쓰는 것은, 모델이 고정된 시각 배치에 과적합했는지 vs 정말 \"현재→목표의 변화 영역(source-grounded edit)\"에 집중하는지를 가르는 리트머스 시험지 역할이다. 즉 4.1은 \"image-editing cache가 video imagination을 대체할 수 있는가\"라는 가설을 P.T. 없는 조건 + 점증하는 분포 이동으로 압박해서 보는 setup이다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Evaluation harness (4.1 setup)** — 목적: ImageWAM이 P.T. 없이 image-editing 기반 world-action 표상만으로 video-WAM/VLA와 견줄 수 있는지를 4개 무대(LIBERO/LIBERO-Plus/RoboTwin2.0/real-world)에서 success rate로 검증. · 입력→출력: 입력: language instruction l + 현재 관측 o_t (+ RoboTwin은 양팔 state) -> 출력: action chunk a_{t:t+H} 실행 후 task 성공/실패 -> 집계: 100 trials 평균 success rate(%) · 내부: 공통 학습량 RoboTwin/real-world 30k steps. baseline 비교는 P.T.(embodied pretraining) 컬럼으로 통제: pi0/pi0.5/OpenVLA/GR00T N1/LingBot-VA/Motus는 P.T.=✓, ImageWAM/Fast-WAM/ABot-M0는 ✗. ImageWAM은 ✗인데도 경쟁력 확보가 목표.\n- **Image-editing backbone (frozen VLM + trainable diffusion edit branch)** — 목적: 현재 관측 o_t와 instruction l로부터 'source-grounded, instruction-guided 시각 변환'을 추론해 layer-wise editing KV cache를 만드는 world-action intermediate 생성기. · 입력→출력: 입력: o_t, l -> 출력: editing key-value cache C_edit^{tau} = {(K_l, V_l)}_layers (편집 이미지 자체는 디코딩하지 않음) · 내부: OmniGen2(기본) / Ovis-U1 / Flux.2 4B 등 image-editing 모델 위에 구축. VLM 및 multimodal understanding 모듈은 frozen, diffusion image generation branch만 학습. train 때 editing denoising timestep tau를 랜덤 샘플(Eq.9의 tau)해 한 스텝 forward로 cache 추출; 4.1의 real-world는 Flux.2 4B 사용.\n- **Action Expert (flow-matching)** — 목적: editing cache를 받아 실행 가능한 미래 action chunk를 생성하는 정책 모듈 — editing context를 robot control로 변환. · 입력→출력: 학습 입력: noisy action a_s, flow time s, (o_t, l, C_edit^{tau}), GT a*_{t:t+H}, action noise eps_a~N(0,I) -> 출력: velocity field v_theta. 추론 출력: action chunk a_{t:t+H} (현재 t부터 horizon H까지) · 내부: joint attention으로 editing branch의 중간 KV feature를 통합(Figure 2 설명). 학습: L_act(Eq.9) flow-matching velocity 회귀, 전체 L = L_act + L_img로 edit branch와 함께 공동 최적화. 추론: 고정 tau*에서 한 번의 editing forward(Eq.10)로 얻은 cache에 조건화해 action을 denoise 생성(Eq.11) — target frame/future video는 decode하지 않음.\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l). \\tag{10}\n$$\n\n- **무슨 식?**: edited 프레임을 그리지 말고, tau* 한 스텝의 editing KV cache만 뽑아라.\n- 추론(test-time) 메커니즘 핵심: 전체 image-editing denoising trajectory를 끝까지 돌리지 않고, 고정된 editing denoising timestep tau* 하나를 골라 editing branch f를 단 한 번(one forward step) 통과시켜 layer-wise key-value cache C_edit를 얻는다. o_t=현재 관측, l=언어 instruction. 즉 edited 이미지를 디코딩하지 않고 중간 KV cache만 추출. 이 식은 섹션 3.4에 있으나 4.1 실험이 그대로 쓰는 추론 절차다.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}). \\tag{11}\n$$\n\n- **무슨 식?**: editing KV cache 하나에 조건화해 미래 action chunk를 바로 denoise 생성.\n- 추론에서 action expert가 Eq.10의 cache C_edit(tau*)에 조건화되어 action chunk a_{t:t+H}(현재 t부터 horizon H까지의 미래 행동열)를 action sample denoising으로 생성. video WAM이 dense spatio-temporal token을 denoise+decode하는 것과 달리, ImageWAM은 한 set의 editing cache를 action expert의 context로 직접 사용. 4.1의 모든 success rate가 이 추론 경로로 측정됨.\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\!\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]. \\tag{9}\n$$\n\n- **무슨 식?**: 랜덤 tau의 editing cache에 조건화해 action velocity field를 flow-matching으로 회귀.\n- 학습(train-time) 목적: action expert를 flow-matching으로 학습. a*_{t:t+H}=expert(GT) action chunk, eps_a~N(0,I)=action noise, s=action flow-matching time, tau=editing denoising timestep. 학습 때는 tau를 매번 랜덤 샘플링해 denoising 여러 단계의 editing cache를 action expert가 두루 보게 한다(추론 때 고정 tau*와 대비). v_theta는 velocity field 예측. 이 식은 3.3에 있으나 4.1 학습 설정(30k steps 등)이 최적화하는 손실이다.\n\n$$\n\\mathcal{L}=\\mathcal{L}_{\\mathrm{act}}+\\mathcal{L}_{\\mathrm{img}}\n$$\n\n- **무슨 식?**: 이미지 편집 손실 + action 손실을 합쳐 편집 branch와 action expert만 함께 학습.\n- 전체 학습 손실: action flow-matching loss L_act(Eq.9)와 image diffusion branch loss L_img를 합쳐 diffusion image branch와 action expert를 공동(jointly) 최적화. VLM/multimodal understanding 컴포넌트는 frozen, diffusion generation branch와 action expert만 업데이트. 4.1의 'downstream demo만으로 학습'이 이 손실로 이뤄짐.\n\n**그림 / 구조도**\n\n- (원본 그림 3 재참조) → Figure 3 caption이 'Experiments setup on Robotwin2.0, LIBERO, LIBERO-Plus and real-world robot'로, 4.1이 기술하는 4개 평가 무대를 그대로 보여주는 setup 도식이다.\n- (원본 그림 4 재참조) → 4.1 본문이 real-world 조작 task를 'as shown in Figure 4 (Flux.2 4B)'로 명시 참조하므로 실로봇 셋업 맥락 그림으로 함께 첨부(단 이 figure의 caption 자체는 attention visualization으로 표기되어 본문 cross-ref 번호와 caption이 어긋나는 렌더링 정황 있음).\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[setup 4 benchmarks — train data / split / eval protocol, all P.T.=NO]\n\n (A) LIBERO  (standard)\n   train demos: 4 suites {Spatial, Object, Goal, LIBERO-Long}\n                each suite = 10 tasks x 500 expert demos\n   eval: standard protocol -> avg success rate (Table 2)\n\n (B) LIBERO-Plus  (harder, generalization test)\n   train demos: SAME original LIBERO demos  (NO LIBERO-Plus augmented data)\n   eval: LIBERO-Plus protocol (more visual/layout variation) -> avg success rate\n\n (C) RoboTwin 2.0  (bimanual, 50+ tasks)\n   train demos (multi-task, single policy):\n        clean   = 2,500 trajectories\n        random  = 25,000 trajectories (heavy scene randomization)\n   train budget: 30k steps\n   eval: {clean | randomized} x 100 trials/task -> avg success rate (Table 1)\n\n (D) Real-world  (Dobot XTrainer dual-arm; Flux.2 4B backbone)\n   tasks: T1 Stack Three Bowls | T2 Fold Towel\n          T3 Open Drawer & Store Marker | T4 Hang Cup On Rack\n   per task = 100 trajectories ; train on combined set ; 30k steps\n   eval: 100 trials, multiple initial configs -> overall success rate\n\n metric (all): success rate (%)   |   baseline contrast axis: P.T. (pretrain) yes/no\n [4.1 itself = setup only; equations live in 3.3/3.4, efficiency#s in 4.3/Table5]\n```\n\n**학습 / 추론**\n\n학습(train-time)과 추론(test-time)의 차이가 ImageWAM 효율의 핵심이며, 4.1 setup이 측정하는 정확한 메커니즘은 다음과 같다. [학습] diffusion image-editing branch와 action expert만 학습하고(VLM/understanding 모듈은 frozen), 매 스텝 editing denoising timestep tau를 '랜덤 샘플링'해 editing branch를 그 시점에서 돌려 layer-wise KV cache C_edit^{tau}를 추출한다. action expert는 이 cache에 조건화되어 flow-matching loss L_act(Eq.9, velocity field v_theta가 (eps_a - a*) 방향을 맞추도록)를 최소화하고, 동시에 image diffusion loss L_img와 합산한 L = L_act + L_img로 공동 최적화된다. tau를 랜덤화하는 이유는 action expert가 denoising 여러 단계의 cache 분포에 robust해지도록 노출시키기 위함이다. RoboTwin/real-world는 모두 30k steps. [추론] 핵심은 (1) future video를 생성/디코딩하지 않고, (2) edited 이미지조차 디코딩하지 않는다는 점. 전체 editing denoising trajectory를 끝까지 돌리는 대신 '고정된 단일 timestep tau*'를 골라 editing branch를 단 한 번 forward(one editing-branch forward step) 통과시켜 C_edit^{tau*} = f_edit^{tau*}(o_t, l) 를 얻고(Eq.10), action expert가 이 KV cache에 조건화되어 action chunk a_{t:t+H} ~ p_theta(· | o_t, l, C_edit^{tau*})를 action-sample denoising으로 바로 뽑는다(Eq.11). 즉 'image-editing denoising이 만든 KV cache에 flow-matching action expert를 조건화'하는 것이 추론 전부이고, target frame 디코딩은 없다. 비교로 video-WAM은 다수의 future frame에 걸친 dense spatio-temporal token을 denoise+decode해야 한다. 이 차이가 효율로 직결된다: Abstract는 video-based WAM 대비 FLOPs 1/6, latency 1/4라고 명시하고, 4.3 Table 5(A6000 GPU)는 latency 1081 ms->263 ms, TFLOPs 63.65->9.72(본문 표현 9.7)로 보고한다(단 이 수치는 4.1이 아니라 4.3 소속). 또한 video-WAM의 inverse-dynamics 변형(FastWAM-IDM=1081 ms/63.65 TFLOPs, Video intermediate)과 cache 변형(FastWAM 1-Step=302 ms/13.21 TFLOPs, Cache)도 함께 제시되어 ImageWAM(263 ms/9.72 TFLOPs, Cache)이 가장 효율적이다.\n\n**숫자**\n- P.T.(embodied pretraining) 미사용 — ImageWAM은 추가 embodied data 없이 downstream demo만으로 학습 (Table P.T.=✗)\n- LIBERO: 4 suites(Spatial/Object/Goal/LIBERO-Long), 각 suite 10 tasks × 500 expert demos\n- RoboTwin 2.0: 50+ tasks, multi-task 단일 policy, clean 2,500 trajectories + randomized 25,000 trajectories\n- RoboTwin / real-world 학습: 30k steps (both)\n- RoboTwin 평가: clean/randomized 각각 task당 100 trials 평균 success rate\n- Real-world: Dobot XTrainer dual-arm, 4 tasks(T1~T4), task당 100 trajectories, 100 trials 평균, Flux.2 4B backbone\n- [효율, 4.1 밖 — Abstract] video-based WAM 대비 FLOPs ~1/6, latency ~1/4\n- [효율, 4.1 밖 — 4.3 Table 5, A6000] latency 1081 ms -> 263 ms ; TFLOPs 63.65 -> 9.72(본문 9.7) ; FastWAM(1 Step) 302 ms/13.21 TFLOPs\n- [결과, 4.2 — 4.1 밖] RoboTwin2.0 ImageWAM avg 93.38% (clean 93.20 / rand 93.56) ; LIBERO avg 98.4% ; LIBERO-Plus avg 83.1%\n\n---\n\n## 4.2 Main Results\n\n**핵심**\n- RoboTwin 2.0 (Table 1): ImageWAM clean 93.20%, randomized 93.56%, Avg. 93.38% — VLA baseline 대비 명확한 개선, video-generation WAM(FastWAM 91.83) 대비 comparable 이상이면서 dense future-video token 예측을 회피.\n- LIBERO (Table 2): 4개 suite(Spatial 97.2 / Object 99.2 / Goal 98.8 / Long 98.4) 평균 98.4% — data pretraining 없이(P.T.=✗) pretrained VLA 및 video-WAM과 경쟁력 유지.\n- LIBERO-Plus (distribution-shifted): 평균 83.1% 유지 — source-conditioned editing context가 고정 visual configuration에 overfit하지 않고 task-relevant visual change에 집중하도록 도움.\n- Real-world (Table 4): 평균 84.5%로 π0(55.8), π0.5(72.3), FastWAM(79.0)을 모두 능가. 4개 task(T1 Stack Three Bowls, T2 Fold Towel, T3 Open Drawer & Store Marker, T4 Hang Cup On Rack) 전부에서 1위.\n- FastWAM 대비 task별 개선: T1 +6, T2 +9(최대 — deformable-object manipulation에서 editing context가 특히 유효), T3 +1, T4 +6 points.\n- T3에서 두 WAM-style 방법이 π0를 크게 능가 → world-action reasoning이 visual occlusion 영향을 완화함을 시사.\n- 효율(Table 5, 4.2가 인용하는 효율 근거): ImageWAM latency 263 ms / 9.72 TFLOPs (Cache intermediate)로 FastWAM-IDM(1081 ms / 63.65 TFLOPs, Video)과 FastWAM 1-Step(302 ms / 13.21 TFLOPs, Cache) 대비 최저. Abstract의 'FLOPs 1/6 · latency 1/4' 주장의 정량 근거.\n- 종합 결론: dense video-token reasoning을 image-editing cache로 대체하는 것이 실용적이고 효율적인 WAM backbone을 만든다.\n\n**왜 / 직관**\n\n4.2는 'image editing이 정말 video generation을 대체할 수 있나?'라는 논문의 핵심 질문에 대한 실증 답변이다. 비유하면, 기존 video-WAM은 다음 행동을 정하기 전에 미래 전체를 '동영상으로 한 장면씩 다 그려보는' 화가다 — 정확할 수 있지만 task와 무관한 배경 디테일까지 그리느라 비싸고, 잘못 그린 미래(future-video artifact)가 오히려 행동을 오도한다. ImageWAM은 미래를 끝까지 렌더링하지 않고 '편집 의도가 담긴 중간 스케치(KV cache)'만 뽑아 행동가에게 넘긴다. 결과적으로 시뮬(RoboTwin/LIBERO)에서는 comparable~우위, 실제 로봇에서는 명확한 우위(84.5 vs 79.0)를, 그것도 FLOPs ~1/6 · latency ~1/4로 달성한다는 것이 이 섹션의 메시지다. 특히 T2(수건 접기 같은 deformable) 최대 개선은, 형태가 변하는 물체일수록 '무엇이 어떻게 변해야 하는가'라는 편집-인지 표현이 행동 결정에 직접적으로 유용함을 보여준다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image Editing Backbone** — 목적: instruction l + 현재 관측 o_t를 받아 source-grounded·instruction-guided 미래 프레임 hat{o}_{t+H+1}을 합성하는 editing branch. 4.2에서 'editing-based world-action context'의 생성원. · 입력→출력: 입력: o_t (current image observation), l (task instruction) -> 출력(train): edited future frame hat{o}_{t+H+1} 및 layer별 KV cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L}; 출력(infer): KV cache C_edit^{tau*}만 (프레임 디코딩 안 함). · 내부: Flow-matching으로 future frame을 예측: L_img = E[|| u_phi(z_r, r | o_t, l) - (eps_z - z*_{t+H}) ||_2^2], z_r = (1-r)z*_{t+H+1} + r*eps_z, r in (0,1). denoising 도중 randomly sampled timestep tau에서 transformer L개 layer의 (K,V)를 추출해 C_edit를 만든다.\n- **Action Expert** — 목적: editing backbone의 중간 KV cache를 joint attention으로 통합해 action chunk를 예측하는 flow-matching action head. 4.2의 모든 success rate를 내는 정책 모듈. · 입력→출력: 입력: o_t, l, current robot state, action noise eps_a, KV cache C_edit^tau -> 출력: action sequence a_{t:t+H} = (a_t,...,a_{t+H}) (horizon H). · 내부: L_act = E[|| v_theta(a_s, s | o_t, l, C_edit^tau) - (eps_a - a*_{t:t+H}) ||_2^2], a_s = (1-s)a*_{t:t+H} + s*eps_a, action flow time s in (0,1). KV features를 joint attention으로 받아(Fig.2 caption) 조건화. 추론: a_hat_{t:t+H} ~ p_theta(a | o_t, l, C_edit^{tau*}).\n\n**수식**\n\n$$\n\\pi_\\theta(\\mathbf{a}_{t:t+H} \\mid o_t, l)\n$$\n\n- **무슨 식?**: 관측+지시 → 행동 묶음 분포.\n- 정책 목적: 현재 관측 o_t와 instruction l을 조건으로 action chunk a_{t:t+H}를 예측. (메서드(Sec3)에서 정의된 식이며 4.2 결과가 평가하는 대상 정책. 4.2 자체에는 신규 수식 없음.)\n\n$$\n(o_t, l) \\rightarrow \\hat{o}_{t+H+1} \\rightarrow \\mathbf{a}_{t:t+H}\n$$\n\n- **무슨 식?**: 미래 한 프레임(편집 결과)만 거쳐 행동으로 — dense 시퀀스 우회.\n- ImageWAM 추론 경로: video-WAM의 dense 미래 시퀀스 예측 (o_t,l)->hat{o}_{t+1:t+H+1}->a 대신, 단일 source-grounded edited future frame hat{o}_{t+H+1}를 거쳐 행동으로 감. 4.2의 'avoiding dense future-video token prediction'의 형식적 표현.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H} \\sim p_\\theta(\\mathbf{a}_{t:t+H} \\mid o_t, l, \\mathcal{C}_{edit}^{\\tau^*})\n$$\n\n- **무슨 식?**: 미래 프레임 디코딩 없이 KV cache만 조건으로 행동 생성 — 효율의 핵심.\n- 추론 시 행동 샘플링: 디코딩된 미래 프레임이 아니라 image-editing denoising의 KV cache C_edit(단일 timestep τ*)만을 조건으로 action expert가 행동을 생성. 4.2의 효율(263ms/9.72TFLOPs)과 'image-editing caches' 결론의 근거 메커니즘. (Sec3.4)\n\n**그림 / 구조도**\n\n- (원본 그림 5 재참조) → 4.2의 video-WAM 대비 우위(특히 task-relevant object 주변 왜곡으로 인한 실패 회피) 주장을 시각화 — ImageWAM은 dense imagination 대신 compact editing cache에 조건화.\n- (원본 그림 3 재참조) → 4.2가 보고하는 4개 평가 환경(RoboTwin2.0/LIBERO/LIBERO-Plus/real-world) 셋업을 한눈에 보여줘 결과 표들의 맥락 제공.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[Section 4.2 reported results - benchmark/efficiency map; values verbatim from Tables 1/2/4/5]\n\nRoboTwin 2.0 (Table 1, success %)        LIBERO (Table 2, success %)\n method      P.T.  Clean  Rand  Avg       method     P.T. Spat Obj  Goal Long Avg\n pi0          v   65.92  58.40 62.16      OpenVLA     v  84.7 88.4 79.2 53.7 76.5\n pi0.5        v   82.74  76.76 79.75      GR00T N1    v  84.7 88.4 79.2 53.7 76.5\n ABot-M0      x   81.20  80.40 80.80      pi0         v  96.8 98.8 95.8 85.2 94.1\n Motus        v   88.66  87.02 87.80      pi0.5       v  98.8 98.2 98.0 92.4 96.9\n LingBot-VA   v   92.90  91.50 92.20      LingBot-VA  v  98.5 99.6 97.2 98.5 98.5\n FastWAM      x   91.88  91.78 91.83      Motus       v  96.8 99.8 96.6 97.6 97.7\n ImageWAM     x   93.20  93.56 93.38      Fast-WAM    x  98.2 100. 97.0 95.2 97.6\n (P.T.=pretraining; ImageWAM no-PT)       ImageWAM    x  97.2 99.2 98.8 98.4 98.4\n                                          LIBERO-Plus avg: ImageWAM 83.1\n\nReal-world (Table 4, success %)          Efficiency (Table 5, lower=better)\n method     T1  T2  T3  T4  Avg           method          Latency  TFLOPs Inter.\n pi0        57  58  54  54  55.8          FastWAM-IDM      1081 ms  63.65  Video\n pi0.5      83  77  74  55  72.3          FastWAM (1 Step)  302 ms  13.21  Cache\n FastWAM    88  75  77  76  79.0          ImageWAM (Ours)   263 ms   9.72  Cache\n ImageWAM   94  84  78  82  84.5          => Abstract: FLOPs ~1/6, latency ~1/4\n dSOTA(vs FastWAM): +6 +9 +1 +6              vs video-based WAM (FastWAM-IDM)\n (T1 Stack3Bowls T2 FoldTowel\n  T3 OpenDrawer&StoreMarker T4 HangCup)\n\nInference data flow (why efficiency, grounded in Sec3.4 cited by 4.2):\n (o_t, l) --image-editing backbone (single fwd, timestep tau*)--> KV cache C_edit\n   [NO full edited image decoded, NO future-video tokens]\n C_edit --joint attention--> Action Expert (flow-matching) --> a_{t:t+H}\n```\n\n**학습 / 추론**\n\nTrain-time: image editing backbone이 flow matching으로 실제 future latent을 향해 denoise하며(L_img) target frame hat{o}_{t+H+1}을 학습하고, 그 denoising 과정의 randomly sampled timestep tau에서 layer별 KV cache C_edit^tau = {(K_l^tau,V_l^tau)}를 추출한다. Action Expert는 이 C_edit^tau를 조건으로 또 다른 flow matching(L_act)으로 action chunk를 학습한다. 즉 학습 시에는 편집 branch가 (잠재적으로) 완전한 미래 프레임 표현을 향해 denoising한다. Test-time(추론): 핵심 차이는 'ImageWAM does not require future video tokens to be generated or decoded'이며 'does not require decoding a complete edited image'(Sec3.4)라는 점. 추론은 image-branch를 단일 timestep tau*로 한 번만 forward(C_edit^{tau*} = f_edit^{tau*}(o_t,l))해 KV cache만 뽑고, target frame hat{o}_{t+H+1}은 결코 디코딩하지 않는다. Action Expert는 오직 이 editing-aware KV cache를 compact world-action context로 joint attention 조건화해 a_hat_{t:t+H} ~ p_theta(a | o_t, l, C_edit^{tau*})로 행동을 샘플링한다. 이 '미래 프레임 미디코딩 + image-editing denoising의 KV cache에 flow-matching action expert를 조건화' 메커니즘이 4.2가 인용하는 효율(Table5: 263ms/9.72TFLOPs; Abstract: FLOPs 1/6·latency 1/4)의 원천이다.\n\n**숫자**\n- RoboTwin 2.0 ImageWAM: Clean 93.20%, Rand. 93.56%, Avg. 93.38%\n- RoboTwin best baseline FastWAM Avg. 91.83 (Clean 91.88 / Rand. 91.78); LingBot-VA 92.20\n- LIBERO ImageWAM avg 98.4% (Spatial 97.2 / Object 99.2 / Goal 98.8 / Long 98.4)\n- LIBERO-Plus ImageWAM avg 83.1%\n- Real-world ImageWAM avg 84.5% vs pi0 55.8 / pi0.5 72.3 / FastWAM 79.0\n- Real-world per-task ImageWAM: T1 94, T2 84, T3 78, T4 82\n- ImageWAM vs FastWAM real-world gains: T1 +6, T2 +9 (largest), T3 +1, T4 +6 points\n- Efficiency (Table 5): ImageWAM 263 ms / 9.72 TFLOPs (Cache); FastWAM 1-Step 302 ms / 13.21 TFLOPs; FastWAM-IDM 1081 ms / 63.65 TFLOPs (Video)\n- Abstract claim quantified by 4.2: FLOPs to 1/6 and latency to 1/4 of video-based WAMs\n\n---\n\n## 4.3 Analysis (ImageWAM)\n\n**핵심**\n- Attention Visualization (Fig. 4): ImageWAM의 attention은 task-relevant change region(조작 대상 object, target receptacle, contact area)에 집중하고 무관한 background는 억제한다. 즉 editing cache가 source-grounded이고 change-centric한 시각 정보를 인코딩해 action expert에 유용한 context를 제공한다.\n- Latency & FLOPs (Table 5, A6000 GPU): video-generation WAM은 여러 future frame에 걸쳐 dense spatio-temporal token을 처리하지만, ImageWAM은 editing-branch의 단 한 번 forward로 image-editing cache 1세트만 얻는다.\n- 효율 결과: latency를 1081 ms -> 263 ms로, FLOPs를 63.65 -> 9.7(정확히 9.72 TFLOPs)로 줄이면서 경쟁력 있는 task success를 유지한다. 즉 editing cache가 future-video token rollout보다 더 효율적인 world-action intermediate임을 보인다.\n- Future-video artifact의 정성 분석 (Fig. 5): video-generation 기반 WAM은 task-relevant object 주변에 distorted geometry, inconsistent spatial layout 같은 visible artifact를 만든다. predicted action이 이 generated future representation에 conditioning되므로 artifact가 action expert를 오도(mislead)할 수 있다.\n- 대조적으로 ImageWAM은 추론 시 dense future-video token을 instantiate하거나 future frame을 decode하지 않는다(does not decode future frames at inference time). image-editing cache를 compact action-conditioning context로 직접 사용하여 future-video imagination의 visual artifact 누적을 회피한다.\n- 4.3 섹션 자체에는 수식이 없다(qualitative 분석 + 효율 표 위주). 또한 이 섹션에는 구체적 benchmark success rate 숫자가 등장하지 않는다(success rate는 다른 결과 섹션 소관).\n\n**왜 / 직관**\n\n왜 image editing이 video generation보다 나은가에 대한 직관: world-action model이 미래를 '상상'하는 두 방식의 대비다. video-generation WAM은 마치 화가에게 '다음 장면 전체를 픽셀 하나하나 그려라'고 시키는 것과 같다 - 시간이 오래 걸리고(dense token rollout), action과 무관한 배경 디테일에도 capacity를 낭비하며, 잘못 그린 부분(artifact)이 곧바로 정책 판단을 오염시킨다(쓰레기를 보고 행동을 결정). 반면 ImageWAM은 화가에게 완성된 그림을 요구하지 않고, '이 장면을 지시대로 바꾸려면 어디를 어떻게 손대야 하는지' 그 사고 과정의 메모(중간 KV cache)만 받아온다. 그림(future frame)을 끝까지 그릴 필요가 없으니 빠르고(latency ~1/4, FLOPs ~1/6), 메모는 이미 '바뀌는 곳'(조작 object/접촉 영역)에 attention이 모여 있어 source-grounded·change-centric하므로, decode 과정에서 생길 artifact 누적도 없다. 핵심 비유: future frame을 끝까지 렌더링하는 대신, denoising 과정의 '작업 노트(KV cache)'를 훔쳐 쓰는 것.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image-editing backbone (f_edit)** — 목적: language instruction에 따라 현재 장면을 변형하는 source-grounded edit를 reasoning하는 backbone. 추론 시 future frame을 끝까지 decode하지 않고 중간 KV cache만 제공. · 입력→출력: 입력: current observation o_t + language instruction l (+ denoising timestep tau) -> 출력: layer-wise editing KV cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L} (L개 transformer layer 각각의 K,V). 최종 edited image는 추론 시 미디코드. · 내부: denoising 과정 중 transformer layer마다 key-value cache를 수집(Eq.5 형태). 4.3 Fig.4 근거: 이 cache의 attention은 task-relevant change region(manipulated object, target receptacle, contact area)에 집중하고 background를 억제 -> change-centric·source-grounded 표현. video-gen 대비 dense future-video token rollout을 단 1회 editing forward의 cache 1세트로 대체.\n- **Flow-matching Action Expert (v_θ)** — 목적: editing cache를 world-action intermediate context로 받아 미래 action sequence를 예측하는 policy head. · 입력→출력: 입력: noised action a_s (noise level s) + current obs o_t + instruction l + editing cache C_edit^tau + robot state + action noise eps_a -> 출력: velocity field v_theta로 denoise한 action sequence a_{t:t+H} = (a_t, a_{t+1}, ..., a_{t+H}). · 내부: editing KV cache를 joint attention으로 통합(Fig.2 파이프라인)해 conditioning. 학습 목적은 flow-matching loss L_act(Eq.9 형태): velocity v_theta(a_s,s | o_t,l,C_edit^tau)가 (eps_a - a*_{t:t+H})를 맞추도록 회귀. 추론 시 future-video token 없이 cache만으로 action을 denoise -> Table 5의 latency/FLOPs 절감과 Fig.5의 artifact 회피의 직접 원인.\n\n**수식**\n\n$$\n\\mathcal{C}_{\\text{edit}}^{\\tau} = \\{(K_{\\ell}^{\\tau}, V_{\\ell}^{\\tau})\\}_{\\ell=1}^{L} = f_{\\text{edit}}^{\\tau}(o_t, l)\n$$\n\n- **무슨 식?**: 현재 obs+instruction을 editing backbone에 한 번 넣어 layer별 KV cache만 뽑아낸다 (future frame 디코딩 없음).\n- [method 섹션 식, 4.3의 inference 메커니즘을 설명하기 위해 인용] image-editing backbone f_edit를 denoising timestep tau에서 한 번 통과시켜, 각 transformer layer ell(=1..L)의 key K_l^tau와 value V_l^tau를 모은 editing KV cache C_edit^tau. 입력은 현재 observation o_t와 language instruction l. 이 cache가 future frame을 decode하지 않고도 task-conditioned visual transformation 정보를 담는 world-action intermediate 역할을 한다.\n\n$$\n\\mathcal{L}_{\\text{act}} = \\mathbb{E}_{\\mathbf{a}^{*}, \\epsilon_a, s, \\tau}\\left[\\left\\| v_{\\theta}(\\mathbf{a}_s, s \\mid o_t, l, \\mathcal{C}_{\\text{edit}}^{\\tau}) - (\\epsilon_a - \\mathbf{a}_{t:t+H}^{*}) \\right\\|_2^2\\right]\n$$\n\n- **무슨 식?**: editing KV cache를 조건으로 action noise를 denoise하는 flow-matching velocity v_theta를 회귀시킨다.\n- [method 섹션 식, 4.3가 비교하는 action expert의 학습 목적] flow-matching action expert의 손실. v_theta는 noised action a_s(noise level s)에서의 velocity field로, 현재 obs o_t·instruction l·editing cache C_edit^tau에 joint attention으로 conditioning된다. target은 (action noise eps_a - 정답 action sequence a*_{t:t+H})의 flow-matching velocity. 이 식이 'editing cache를 context로 받아 action을 denoise한다'는 ImageWAM 추론 메커니즘의 학습 형태다.\n\n**그림 / 구조도**\n\n- (원본 그림 4 재참조) → 4.3 Attention Visualization 문단이 직접 참조 - editing cache의 attention이 task-relevant change region(조작 object/receptacle/contact)에 집중하고 background를 억제함을 보이는 증거.\n- (원본 그림 5 재참조) → 4.3 'Qualitative analysis of future-video artifacts' 문단이 직접 참조 - video-WAM이 task-relevant object 주변에 artifact를 만들어 action을 오도하는 실패 사례 vs. ImageWAM이 dense imagination을 피하는 대조.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[ ImageWAM inference-time data flow (4.3 효율/메커니즘 근거 기반) ]\n\n  language instruction l ─┐\n                          ├──> [ image-editing backbone f_edit ]   (single forward, 1 denoising step)\n  current obs o_t ────────┘            │\n                                       │  NO future-frame / edited-image decode  (Fig.5 artifact 회피)\n                                       v\n                       layer-wise editing KV cache\n                       C_edit = {(K_l, V_l)}_{l=1..L}\n                       (attention -> change regions; Fig.4)\n                                       │\n        robot state ─┐                 │  joint attention (conditioning context)\n        action noise ε_a ─┐            v\n                          └──> [ flow-matching Action Expert v_θ ] ──denoise──> a_{t:t+H}\n\n  --- efficiency (Table 5, A6000) ---\n  FastWAM-IDM   : 1081 ms | 63.65 TFLOPs | interm = Video\n  FastWAM(1step):  302 ms | 13.21 TFLOPs | interm = Cache\n  ImageWAM(Ours):  263 ms |  9.72 TFLOPs | interm = Cache\n  => latency ~1/4 (1081->263), FLOPs ~1/6 (63.65->9.7), task success 유지\n\n  vs. Video-generation WAM (baseline, Fig.5):\n     o_t,l -> [video gen] -> dense future-video tokens / decoded future frames\n              (action-irrelevant detail + artifact 누적) -> action expert misled\n```\n\n**학습 / 추론**\n\n핵심은 train-time과 test-time에서 editing backbone을 쓰는 깊이가 다르다는 점이다. (1) Train-time: image-editing backbone(denoising)이 future/edited frame을 예측하도록 supervision을 받으면서, 각 transformer layer에서 KV cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L} = f_edit^tau(o_t, l)를 무작위로 샘플된 denoising timestep tau에서 수집한다(Eq. 5 형태). 이 cache는 'task-conditioned visual transformation' 정보를 담되 최종 image decoding을 요구하지 않는다. 그 위에서 flow-matching action expert가 velocity field v_theta를 학습한다(L_act = E[|| v_theta(a_s, s | o_t, l, C_edit^tau) - (eps_a - a*_{t:t+H}) ||_2^2], Eq. 9 형태) - 즉 action expert는 editing cache를 joint attention으로 받아 noise로부터 action을 denoise하도록 학습된다. (2) Test-time(4.3의 핵심 주장): ImageWAM은 full future-video generation을 하지 않고, future frame/edited image를 끝까지 decode하지도 않는다('does not instantiate dense future-video tokens or decode future frames at inference time'). 대신 editing-branch의 단 1회 forward로 layer-wise editing cache 1세트만 계산하고, 이 image-editing cache를 compact action-conditioning context로 직접 써서 action expert가 robot state와 action noise에 conditioning해 action sequence a_{t:t+H}를 denoise한다. 따라서 target frame 디코딩 비용과 future-video artifact 누적이 모두 제거되어 latency/FLOPs가 대폭 절감된다. (단, KV cache 정의식·flow-matching loss식은 4.3이 아니라 method 섹션에 있고, 4.3은 이 메커니즘의 효율·정성 결과를 보고한다.)\n\n**숫자**\n- Latency: 1081 ms -> 263 ms (ImageWAM)\n- FLOPs: 63.65 -> 9.7 (정확히 9.72 TFLOPs)\n- Table 5 (A6000 GPU): FastWAM-IDM = 1081 ms / 63.65 TFLOPs / interm=Video\n- Table 5: FastWAM (1 Step) = 302 ms / 13.21 TFLOPs / interm=Cache\n- Table 5: ImageWAM(Ours) = 263 ms / 9.72 TFLOPs / interm=Cache\n- 효율 비율(유도): latency ~1/4, FLOPs ~1/6\n\n---\n\n## 4.4 Ablation Study\n\n**핵심**\n- 섹션 4.4는 ImageWAM의 설계 선택을 검증하는 ablation으로, 세 개의 질문(Q1/Q2/Q3)으로 구성된다. Q1=editing backbone 교체 가능성, Q2=unified understanding-and-generation 모델을 쓰지 않는 이유, Q3=editing backbone 크기의 효과.\n- Q1 (Table 7): OmniGen2를 Ovis-U1, FLUX.2 4B로 갈아끼워도 모든 variant가 LIBERO-Plus에서 policy pretraining 없이 FastWAM과 대부분의 VLA baseline을 능가. OmniGen2 71.8%, Ovis-U1 71.2%로 비슷하고, FLUX.2 4B는 83.1%로 가장 좋다. 결론: ImageWAM은 특정 edit 모델에 묶이지 않으며, 더 강한 editing backbone이 곧바로 policy robustness를 끌어올린다.\n- Q2 (Table 6): unified multimodal 모델은 understanding(고수준 semantic 추상화)과 generation(세밀한 spatial/structural 디테일, 특히 deeper layer)이 서로 충돌하는 아키텍처 요구를 가져, 하나의 fully-shared 모델로 둘을 동시 최적화하면 간섭(generation을 좋게 하면 understanding이 나빠지고 그 반대도)이 생긴다. ImageWAM은 역할을 분리(decouple): VLM 컴포넌트는 frozen, diffusion generation branch와 action expert만 robot control용으로 adapt. 그 결과 비슷한 non-keyframe future prediction 조건에서 UniVLA, BagelVLA보다 policy pretraining 없이도 더 우수.\n- Q3 (LIBERO-Plus): FLUX.2 4B를 더 큰 FLUX.2 backbone(FLUX.2 9B)으로 바꾸면 평균 성공률이 83.1% → 85.21%로 상승. 개선은 주로 Robot, Language, Background, Layout perturbation에서 나오며, 이는 더 큰 editing 모델이 더 강한 instruction-conditioned visual context를 제공함을 시사. 단 모든 차원에서 균일하지 않고 Camera, Light, Noise는 monotonic하게 좋아지지 않는다(scaling 효과는 perturbation이 editing cache 특성과 얼마나 정렬되느냐에 의존).\n- 공통 메시지: ImageWAM의 핵심 가치(image-editing cache를 action 조건으로 쓴다)는 특정 backbone에 종속되지 않는 modular 설계이며, editing 능력 자체를 키우면(더 강하거나 더 큰 edit 모델) policy 성능/robustness가 직접 따라 올라간다. 단 video-generation 없이 cache만 쓰기 때문에 scaling 이득은 perturbation 종류에 따라 선택적이다.\n- 주의: 섹션 4.4 본문 자체에는 수식이 전혀 없고 FLOPs/latency 수치도 없다. 효율 수치(FLOPs ~1/6, latency ~1/4, Table 5의 9.72 vs 63.65 TFLOPs / 263ms vs 1081ms)는 4.2와 Table 5에, KV-cache 조건화/flow-matching 수식은 Method(Section 3)에 있다. 본 추출에서는 프롬프트 요청에 따라 train/infer detail과 modules에 그 근거를 명시적으로 표시했다.\n\n**왜 / 직관**\n\nQ1/Q2/Q3는 같은 가설을 세 각도에서 압박-테스트한다: \"ImageWAM의 힘은 미래 영상을 그려내는 데 있는 게 아니라, instruction에 맞춰 source 이미지를 어떻게 '편집할지' 추론하는 그 내부 cache에 있다.\" 비유하면, 요리사(policy)에게 완성된 요리 사진(미래 video)을 통째로 보여주는 대신, 레시피를 머릿속으로 따라가며 '소금을 더 넣어라, 불을 줄여라' 식으로 단계별 편집 의도(KV cache)만 귓속말로 전달하는 것과 같다. Q1은 \"귓속말하는 사람(edit backbone)을 다른 사람으로 바꿔도 되나?\"(된다, 더 유능할수록 좋다), Q2는 \"한 사람이 이해와 그림을 동시에 잘하게 만들면 안 되나?\"(이해와 그림은 뇌의 다른 부위를 쓰는 상충 작업이라 한 머리에 욱여넣으면 서로 발목을 잡는다 → 역할 분리), Q3는 \"귓속말하는 사람을 더 크게(똑똑하게) 만들면 늘 더 좋나?\"(대체로 좋아지되 모든 종류의 방해 상황에서 균일하진 않다 — scaling 이득은 그 방해가 '편집 의도'로 설명 가능한 것일 때 집중된다).\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Editing Backbone (ablated component, Q1/Q3)** — 목적: language instruction l과 현재 관측 o_t를 받아 source-grounded·instruction-guided 시각 변환을 denoising으로 추론하고, 그 내부 KV feature(C_edit)를 action 조건으로 내보내는 world-action intermediate 생성기. 4.4에서는 이 모듈을 교체(Q1)·확대(Q3)하며 ablate. · 입력→출력: 입력: (o_t, l) [current observation image + language instruction] -> 출력: image-editing KV cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L} (Method의 Eq. 5; 4.4 본문엔 수식 없음). 4.4에서 검증된 인스턴스: OmniGen2, Ovis-U1, FLUX.2 4B, FLUX.2 9B. · 내부: Q1: action expert와 training data를 고정한 채 backbone만 OmniGen2->Ovis-U1->FLUX.2 4B로 교체 -> 71.8/71.2/83.1% (LIBERO-Plus avg, no P.T.), 모두 FastWAM·대부분 VLA 능가. Q3: FLUX.2 4B->9B 확대로 83.1->85.21%, 개선은 Robot/Language/Background/Layout에 집중, Camera/Light/Noise는 non-monotonic. 더 강하거나 큰 edit 모델일수록 instruction-conditioned visual context가 강해져 policy robustness가 직접 향상됨을 보임.\n- **VLM components (frozen branch, Q2)** — 목적: understanding을 담당하는 부분으로, generation 목적과의 간섭을 피하기 위해 학습 중 동결(frozen)되어 역할 분리를 구현. · 입력→출력: 입력: multimodal context -> 출력: 동결된 표현(adapt되지 않음). Q2에서 이 frozen 설계가 unified 모델 대비 우수함을 Table 6로 입증. · 내부: 논거: understanding은 high-level semantic abstraction을, generation은 (특히 deeper layer에서) fine-grained spatial/structural 디테일을 요구해 fully-shared 단일 모델에서 동시 최적화 시 상호 간섭 발생. 따라서 VLM은 frozen, diffusion generation branch + action expert만 robot control용으로 adapt. 결과: 유사한 non-keyframe future prediction 조건에서 UniVLA, BagelVLA를 policy pretraining 없이 능가.\n- **Action Expert (held fixed in Q1, flow-matching head)** — 목적: editing backbone의 KV cache C_edit를 joint attention으로 통합해 미래 action 시퀀스를 예측하는 flow-matching policy head. 4.4의 Q1에서는 변수 통제를 위해 고정. · 입력→출력: 입력: (current robot state, action noise a_s, l, C_edit^tau) -> 출력: future actions a_{t:t+H} (velocity field 예측). Method의 action loss L_act = E[|| v_theta(a_s, s | o_t, l, C_edit^tau) - (eps_a - a*_{t:t+H}) ||_2^2] (Eq. 9; 4.4 본문엔 수식 없음). · 내부: 4.4에서는 직접 ablate되지 않고 통제 변수로 고정되지만, ImageWAM 추론의 핵심: 추론 시 target frame을 디코딩하지 않고 image-editing denoising이 만든 KV cache에 flow-matching action expert를 조건화. 이 설계가 Q1/Q3 결과의 전제(edit cache가 곧 action 조건)를 성립시킴.\n\n**그림 / 구조도**\n\n- (원본 그림 5 재참조) → 4.4의 핵심 논거(video generation 없이 edit cache로 충분, edit 모델만 강화하면 policy가 따라온다)를 시각적으로 뒷받침 — video-WAM은 task-relevant object 주변을 왜곡해 action 조건을 망치는 반면 ImageWAM은 dense imagination을 회피함.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[Section 4.4 Ablation -- 3 questions probing one hypothesis: \"power lives in edit-cache, not video gen\"]\n\n  Q1: swap the EDITING BACKBONE (action expert + data fixed)\n  ----------------------------------------------------------\n   o_t, l --> [ OmniGen2 ]  --KV cache C_edit--> [Action Expert] --> 71.8%  (LIBERO-Plus avg, no P.T.)\n   o_t, l --> [ Ovis-U1  ]  --KV cache C_edit--> [Action Expert] --> 71.2%\n   o_t, l --> [ FLUX.2 4B]  --KV cache C_edit--> [Action Expert] --> 83.1%  (best, most perturbation dims)\n   => not tied to a particular edit model; stronger edit -> stronger policy   (Table 7)\n\n  Q2: WHY NOT a single unified understand+generate model?\n  -------------------------------------------------------\n   unified shared model:  understanding (high-level semantic abstraction)\n                                   X  <-- interference -->  X\n                          generation (fine-grained spatial/structural, deep layers)\n   ImageWAM decouples:\n        [ VLM ] = FROZEN\n        [ diffusion generation branch ] + [ action expert ] = ADAPTED for control\n   => beats UniVLA / BagelVLA, non-keyframe future-pred, no policy pretraining   (Table 6)\n\n  Q3: scale the EDITING BACKBONE\n  ------------------------------\n   FLUX.2 4B  --> 83.1%\n   FLUX.2 9B  --> 85.21%   (LIBERO-Plus avg)\n   gains concentrated:  Robot | Language | Background | Layout   (stronger instruction-conditioned context)\n   NOT monotonic:       Camera | Light | Noise\n   => scaling helps where perturbation aligns with edit-cache properties   (Table 7 designations)\n```\n\n**학습 / 추론**\n\n[프롬프트 요청에 따라, 4.4의 ablation 결과를 떠받치는 ImageWAM의 train-time vs test-time 메커니즘을 Method(Section 3)·4.2 근거로 명시. 단 4.4 본문 자체에는 수식·효율 수치가 없음에 유의.] TRAIN-TIME: editing backbone은 image-editing flow-matching/denoising 손실로 학습됨 -- L_img = E[|| u_phi(z_r, r | o_t, l) - (eps_z - z*_{t+H}) ||_2^2] (Eq. 7). 이 과정에서 visual latent가 task instruction과 상호작용한 뒤의 KV cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L} = f_edit^tau(o_t, l) (Eq. 5)가 추출되고, action expert는 그 cache에 조건화되어 action loss L_act = E[|| v_theta(a_s, s | o_t, l, C_edit^tau) - (eps_a - a*_{t:t+H}) ||_2^2] (Eq. 9)로 함께 학습됨. VLM은 frozen, diffusion generation branch + action expert만 adapt (Q2 설계). TEST-TIME (핵심 차이): \"ImageWAM does not decode the target frame at inference time; instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising.\" 즉 미래 target frame(이나 미래 video)을 끝까지 디코딩하지 않고, 추론 시 cache만 추출 C_edit^tau* = f_edit^tau*(o_t, l) (Eq. 10)하여 그 KV cache에 flow-matching action expert를 조건화해 곧바로 action을 생성. \"ImageWAM avoids full future-video generation and also does not require decoding a complete edited image.\" 이로써 video-generation WAM 대비 효율 확보: Table 5 기준 9.72 vs 63.65 TFLOPs (~1/6 FLOPs), 263ms vs 1081ms latency (~1/4) -- (4.2/Table 5; 4.4 외부). 4.4의 Q1/Q3가 보여주는 것은, 이 cache 조건화 추론 구조 위에서 editing backbone을 더 강/크게 하면 cache 품질이 좋아져 policy가 직접 개선된다는 점.\n\n**숫자**\n- Q1 LIBERO-Plus avg success (no policy pretraining): OmniGen2 71.8%, Ovis-U1 71.2%, FLUX.2 4B 83.1%\n- Q3 LIBERO-Plus avg success: FLUX.2 4B 83.1% -> FLUX.2 9B 85.21%\n- Q3 개선 집중 차원: Robot, Language, Background, Layout / non-monotonic: Camera, Light, Noise\n- Q2 결론: 비슷한 non-keyframe future prediction 조건에서 UniVLA, BagelVLA를 policy pretraining 없이 능가 (Table 6)\n- [4.4 외부, train/infer 근거] 효율: ~1/6 FLOPs, ~1/4 latency; Table 5 = 9.72 vs 63.65 TFLOPs, 263ms vs 1081ms (Section 4.2/Table 5)\n\n---\n\n## 5 Conclusion\n\n**핵심**\n- WAM backbone으로 video generation 대신 image editing 모델을 쓰자는 것이 핵심 주장. image editing은 visual understanding과 generation을 동시에 요구하는 \"inherently ideal general task\"라 WAM에 적합하다고 본다.\n- 단 하나의 future frame만 예측(\"simply predicting a single future frame\")해도 action model을 위한 strong intermediate representation을 제공하고 end-to-end policy learning이 가능하다.\n- RoboTwin (Random)에서 93.56% success rate 달성 — 모든 VLA baseline을 큰 폭으로 outperform하고 state-of-the-art WAM과 comparable한 수준.\n- 효과의 원천은 editing 모델이 학습한 language-vision interaction prior라고 주장하며, 이것이 image 모델의 더 넓은 활용을 위한 groundwork를 놓는다고 결론.\n- (섹션 자체에는 수식·그림 참조가 없음. 효율 수치 FLOPs 1/6·latency 1/4와 추론 시 KV-cache 조건화 메커니즘은 Abstract/3.4에서 뒷받침되며 Conclusion의 주장을 정량적으로 받쳐준다.)\n\n**왜 / 직관**\n\nConclusion의 직관은 \"미래를 통째로 상상할 필요는 없다\"이다. 기존 video-generation WAM은 로봇이 행동하기 전에 앞으로 펼쳐질 영상 전체(dense spatio-temporal tokens, 여러 future frame)를 그려보는 셈인데, 이는 화가에게 \"다음 동작을 정하려면 앞으로 10초간의 동영상을 프레임 단위로 다 그려라\"라고 시키는 것과 같다 — 비싸고, 행동과 무관한 배경 디테일에까지 capacity를 낭비한다. ImageWAM은 대신 \"딱 한 장의 before-after 편집 그림(single future frame)\"만 떠올린다. 핵심 비유: 요리사가 다음 손동작을 정할 때 요리 전 과정을 머릿속으로 영화처럼 재생하는 대신 \"이 재료가 이렇게 바뀐다\"는 한 컷의 변화만 머릿속에 그리고 곧장 칼질하는 것과 같다. 더 나아가 추론 때는 그 한 컷조차 끝까지 그리지(decode) 않고, 편집을 그리다 만 중간 단계의 머릿속 메모(KV cache)만 행동 결정에 참고한다. image editing 모델이 사전학습으로 이미 \"지시문(language)을 그림의 국소적 변화(vision)에 매핑하는 prior\"를 갖고 있기 때문에, 이 한 컷의 상상만으로도 행동에 충분한 정보가 담긴다는 것이 결론의 직관이다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image-Editing Backbone (editing / diffusion image branch)** — 목적: language instruction l과 현재 관측 o_t를 받아 task-relevant future endpoint frame을 예측하도록 학습된 backbone. 그 과정의 중간 KV feature가 행동 예측용 \"world-action intermediate\"가 된다 (Conclusion의 \"strong intermediate representations\"의 실체). · 입력→출력: 입력: o_t (현재 RGB 관측) + l (language instruction). 학습 시 target latent z*_{t+H+1}=E_vae(o_{t+H+1}); 보간 latent z_r=(1-r)z*_{t+H+1}+r·ε_z (Eq.6). 출력(학습): velocity field u_φ(z_r,r|o_t,l); 출력(추론): single future frame ô_{t+H+1} 대신 layer-wise editing cache C_edit^{τ}. · 내부: OmniGen2 / Ovis-U1 / FLUX.2 같은 image editing 모델 variant 위에 구축. 학습 objective는 flow-matching velocity 회귀: L_img = E[ ||u_φ(z_r,r|o_t,l) - (ε_z - z*_{t+K})||_2^2 ] (Eq.7). 이 objective가 editing cache에 유용한 visual transformation 정보를 인코딩하도록 만든다.\n- **Action Expert (flow-matching action head)** — 목적: editing backbone이 만든 editing cache를 조건으로 받아 미래 action chunk를 생성하는 policy head. \"reason-before-act\"를 dense future-video 없이 실행하는 부분. · 입력→출력: 입력: action noise ε_a + current robot state + o_t + l + editing context cache C_edit^{τ} (joint attention으로 backbone의 intermediate KV feature 통합). 학습 시 보간 action a_s=(1-s)a*_{t:t+H}+s·ε_a (Eq.8). 출력: 미래 action chunk â_{t:t+H} (길이 H+1). · 내부: flow-matching objective: L_act = E[ ||v_θ(a_s,s|o_t,l,C_edit^{τ}) - (ε_a - a*_{t:t+H})||_2^2 ] (Eq.9). s는 action flow-matching time, τ는 editing cache 추출용 image denoising timestep; 학습 중 τ를 sampling해 다양한 denoising stage의 cache에 노출. backbone과 action expert는 joint loss L = L_act + L_img로 동시 최적화. 추론 시 action denoising step은 3회 (Table 11).\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l)\n$$\n\n- **무슨 식?**: 현재 관측+지시문을 editing 모델에 한 스텝만 넣어 행동의 조건이 될 compact KV cache를 뽑는다 (target frame은 디코딩 안 함).\n- 추론 시 editing context cache 추출식 (Eq. 10). f_edit^{τ*}: 고정된 editing denoising timestep τ*에서 editing branch를 단 한 번 forward한 결과. o_t: 현재 관측, l: language instruction. 즉 full denoising trajectory를 돌리지 않고 한 스텝만 돌려 layer-wise KV cache C_edit를 얻는다. (Conclusion이 말하는 efficiency/intermediate-representation의 실제 메커니즘)\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}})\n$$\n\n- **무슨 식?**: 그 KV cache를 조건으로 action expert가 미래 action chunk를 denoise해 출력 — \"reason-before-act\"를 dense video 없이 구현.\n- 추론 시 action chunk 생성식 (Eq. 11). action expert가 위에서 얻은 cache C_edit^{τ*}와 o_t, l을 조건으로 action noise를 denoise해 길이 H+1의 미래 action chunk a_{t:t+H}를 샘플링. video WAM처럼 dense future-video token을 decode하지 않고 이 한 세트의 editing cache만 context로 쓴다.\n\n**그림 / 구조도**\n\n- (원본 그림 1 재참조) → Conclusion의 핵심 메시지(video generation→image editing 대체, single future frame으로 강한 policy 성능+비용 절감)를 한 장으로 요약한 teaser figure.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[Inference-time mechanism that the Conclusion (\"strong intermediate representations\", \"reduces inference cost\") rests on — grounded in Sec 3.4 Eq.10/11]\n\n   instruction l ─┐\n                  ▼\n   o_t ───►  Image-Editing Backbone (editing branch)\n             run ONLY one step at fixed timestep τ*   ── Eq.10\n             (NO full denoising trajectory,\n              NO target-frame decode  ⊘ ô_{t+H+1})\n                  │\n                  ▼\n        C_edit^{τ*}  = layer-wise KV caches\n        (compact world-action context)\n                  │  via joint attention\n   robot state ──┐│\n   action noise ─┤▼\n        Action Expert (flow-matching)  ── Eq.11\n        denoise a few steps (paper: 3 action denoising steps)\n                  │\n                  ▼\n        â_{t:t+H}  (future action chunk)\n\n  vs. video-WAM (avoided): denoise+DECODE dense\n  spatio-temporal tokens over MULTIPLE future frames\n  → FLOPs ×6, latency ×4  (per Abstract)]\n```\n\n**학습 / 추론**\n\nTrain-time: editing branch(image diffusion)와 action expert를 joint loss L = L_act + L_img (Eq.7+Eq.9)로 동시 학습. 이때 editing branch는 실제 target future frame o_{t+H+1}의 latent z*를 예측하도록 velocity field를 학습하고(Eq.6-7), action expert는 editing cache C_edit^{τ}를 조건으로 expert action을 복원(Eq.8-9). 학습 중에는 image editing denoising timestep τ를 sampling하여 action expert가 denoising 여러 단계의 editing cache에 모두 노출되게 한다.\\n\\nTest-time(핵심 차이): ImageWAM은 추론 시 (1) full future-video를 생성하지 않고, (2) complete edited image(target frame ô_{t+H+1})조차 decode하지 않는다. 대신 고정된 editing denoising timestep τ*를 하나 골라 editing branch를 단 한 번만 forward해 layer-wise editing KV cache C_edit^{τ*}=f_edit^{τ*}(o_t,l)를 얻고(Eq.10), 이 cache를 flow-matching action expert의 조건으로 joint attention을 통해 주입해 action chunk â_{t:t+H} ~ p_θ(a_{t:t+H} | o_t, l, C_edit^{τ*})를 denoise한다(Eq.11). 즉 \\\"image-editing denoising이 만든 KV cache에 flow-matching action expert를 조건화\\\"하는 것이 정확한 추론 메커니즘이며, target frame 디코딩을 생략한다. video WAM이 여러 future frame의 dense spatio-temporal token을 denoise+decode하는 것과 대조적으로 한 세트의 editing cache만 계산한다. 결과적으로 reason-before-act 원리는 유지하되 dense future-video token instantiation을 피해 FLOPs 1/6, latency 1/4를 달성. (비교용으로 video-WAM backbone에 대해 Fast-WAM-style 추론 — test time에 future video token 제거, 현재 관측+지시문만 처리한 current-context KV cache 사용 — 도 구현.) 추론 시 action denoising은 3 step (Table 11).\n\n**숫자**\n- RoboTwin (Random) success rate 93.56% (Conclusion 본문 명시 — 모든 VLA baseline outperform, SOTA WAM과 comparable)\n- FLOPs를 video-based WAM의 1/6로 절감 (Abstract: \"reduces FLOPs to 1/6\")\n- latency를 video-based WAM의 1/4로 절감 (Abstract: \"latency to 1/4 of video-based WAMs\")\n- RoboTwin: ImageWAM 93.20 / 93.56 / 93.38 (vs FastWAM 91.88/91.78/91.83, LingBot-VA 92.90/91.50/92.20) — Random 열이 93.56\n- 추론 시 action denoising steps = 3 (Table 11); torch.compile+static CUDA graph로 약 3× 속도 향상\n\n---\n\n## Appendix (Sec. 5-8) ImageWAM Appendix: 아키텍처 변종(MoT) · 학습 디테일 · Efficiency 최적화 · Real-world/RoboTwin 결과\n\n**핵심**\n- Appendix는 4개 절(5 Architecture, 5.2 Training Details, 6 Efficiency Optimization, 7 Real-World Detail, 8 RoboTwin Results)로 구성. 자체 numbered equation은 없고, 본문 Sec.3의 식 (5)-(9)에서 정의된 KV-cache 조건화/flow-matching 메커니즘을 전제로 구현 디테일만 기술한다.\n- ImageWAM은 세 가지 image-editing backbone 변종으로 인스턴스화: OmniGen2-based, FLUX.2-based(4B/9B), Ovis-U1-based. 공통으로 MoT(Mixture of Transformers) 구조를 multimodal joint modeling 아키텍처로 채택.\n- MoT의 joint self-attention은 4종 토큰을 다룬다: language context / visual condition / visual prediction / action tokens. attention mask는 (a) action token은 다른 토큰을 one-way로 attend, (b) noisy token은 context token만 attend → context 정보를 clean하게 유지.\n- Action DiT는 image-editing 모델 weight를 copy+interpolate해 초기화(action-head weight-copy init, [34,85] 방식) — 학습 초기 noisy gradient로부터 visual model 보호 목적. 변종별 Action DiT 크기: OmniGen2 ~760M, FLUX.2 642M(4B)/952M(9B), Ovis-U1 1.1B.\n- 학습: 8x NVIDIA H20, DeepSpeed ZeRO-1(FLUX.2 9B만 ZeRO-2), bf16, AdamW, lr 1e-4, wd 1e-2, betas (0.9,0.95), grad clip 1.0, warmup cosine(0.05 T_total). LIBERO 224x448/10ep, RoboTwin 288x256/5ep, 모두 future horizon 16 frames + action chunk 16.\n- Efficiency(Sec.6, Table 11): prefix-only attention training + image-denoising-free inference + torch.compile/static CUDA graph. 3 action denoising step 기준, compile 적용 시 약 3배 speedup(주로 action head). 최저 latency 69 ms = FastWAM(1x video denoise) 302 ms 대비 4.38배.\n- 추론 핵심(본문 Sec.3.4): target frame을 full-decode하지 않음. 고정 editing timestep tau*에서 editing-branch를 단 1회 forward해 KV cache C_edit^{tau*}만 얻고, flow-matching action expert v_theta를 그 cache에 조건화해 action을 denoise. 즉 'image-editing의 KV cache에 action expert를 조건화'가 정확한 메커니즘.\n- 효율 수치 출처 주의: 'FLOPs 1/6, latency 1/4'와 63.65/9.7 FLOPs, 1081 ms는 Appendix가 아니라 본문 Abstract/Sec.4 Table 5에 있음. Appendix Table 11은 별도의 prefix-only/denoising-free latency(ms)와 speedup 배수만 보고.\n- Real-World(Sec.7): 4개 task(T1 Stack Three Bowls, T2 Fold Towel, T3 Open Drawer & Store Marker, T4 Hang Cup On Rack). task당 평균 100 demo, 모델당 task별 50 trial, execution success rate가 주 지표.\n- RoboTwin(Sec.8, Table 12): 50+ task per-task success rate(clean/randomized). ImageWAM-FLUX.2-4B 평균 93.20/93.56, ImageWAM-OmniGen2 92.48/92.80 — Fast-WAM-IDM 82.76/84.80, pi_0.5 82.74/76.76, Motus 88.66/87.02 등 베이스라인을 상회.\n\n**왜 / 직관**\n\n왜 이렇게 설계했나(비유 포함): 기존 video-generation WAM은 미래를 '영화 한 편을 풀로 렌더링'하듯 dense future video token을 다 생성한다 — 비싸고, 게다가 action과 무관한 시각 디테일(배경 질감 등)에 capacity를 낭비하며, 왜곡된 미래 프레임이 오히려 action을 오도할 수 있다(Fig.5의 video-WAM artifacts). ImageWAM의 직관은 '미래 사진 한 장을 끝까지 인화(decode)하지 말고, 인화 과정 중간의 작업 메모(현상액 속의 잠상=KV cache)만 빌려 쓰자'는 것이다. image-editing backbone이 instruction을 받아 source frame을 '편집'하는 denoising 도중 생기는 intermediate key-value cache는 이미 'source에 grounding된, instruction에 유도된 시각 변환' 정보를 압축해 담고 있다. 이 edit-aware 표현을 compact world-action intermediate로 보고, flow-matching action expert가 그 cache에 joint attention으로 조건화되어 action을 예측한다. Appendix가 보여주는 구현적 직관: (1) action token이 다른 토큰을 one-way로만 보고 noisy token은 context만 보게 mask를 짜 'context를 오염시키지 않는다' — 깨끗한 칠판을 학생(action)이 베끼되 칠판에 낙서는 못 하게 하는 격. (2) Action DiT를 editing 모델 weight로 copy-init하는 건 '이미 그림을 잘 그리는 화가에게 새 도구(action projection)만 쥐어주는' 것으로, 초기 학습의 noisy gradient가 잘 학습된 visual backbone을 망치지 않게 한다. (3) Efficiency 절의 prefix-only + denoising-free는 '편집을 끝까지 안 하고 prefix(조건부) 계산만, 그것도 1 step만' 하므로 action head의 작은 token 수를 torch.compile/static graph로 묶어 latency를 69 ms까지 끌어내린다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image-Editing Backbone f_edit (variants: OmniGen2 / FLUX.2 / Ovis-U1)** — 목적: instruction l과 현재 obs o_t를 받아 'source-grounded, instruction-guided' visual transformation을 수행하는 editing DiT. 그 denoising 과정의 layer별 KV cache가 world-action intermediate가 된다. · 입력→출력: 입력: o_t(현재 관측 image latent) + l(language instruction, LLM 마지막 layer hidden states) + future noisy frame z_r. 출력: 학습 시 edited future latent 예측(L_img) + 모든 layer의 KV cache C_edit^tau = {(K_l,V_l)}_{l=1..L}. · 내부: MoT joint self-attention으로 language ctx/visual cond/visual pred 토큰을 함께 처리. LLM backbone은 변종별로 Qwen2.5-VL-3B(OmniGen2) / Qwen3-4B,8B(FLUX.2) / Qwen3-1.7B(Ovis-U1). Ovis-U1은 ~1.2B diffusion visual decoder를 editing backbone으로 사용, FLUX.2/Ovis는 MMDiT(double+single stream) 구조.\n- **Action Expert / Action DiT v_theta** — 목적: editing KV cache에 조건화된 flow-matching velocity predictor — future action chunk를 denoise해 예측한다(task: action generation). · 입력→출력: 입력: interpolated action a_s=(1-s)a*+s*eps_a, flow step s, 조건 {o_t, l, C_edit^tau}, robot state, action noise. 출력: velocity v_theta = (eps_a - a*_{t:t+H}) → 역산해 action chunk a_{t:t+H} (chunk length 16). · 내부: image-editing 모델과 동일 architecture를 weight-copy+interpolate로 초기화(action-head weight-copy init, 초기 noisy gradient로부터 visual backbone 보호). cross-modal attention 유지하면서 크기 절감 위해 DiT hidden dim 1024로 줄이되 attention hidden dim 2520은 유지(OmniGen2). FLUX.2/Ovis는 lower layer=image/double-stream weight, higher layer=single-stream weight로 init. 최종 크기: OmniGen2 ~760M, FLUX.2 642M(4B)/952M(9B), Ovis-U1 1.1B. action token은 다른 토큰을 one-way attend, noisy token은 context만 attend.\n- **Joint Attention Mask / MoT coupling** — 목적: editing 토큰과 action 토큰을 하나의 attention에서 결합하되, context 정보를 오염시키지 않게 정보 흐름을 통제. · 입력→출력: 입력: 4종 토큰의 concatenated QKV(visual pred transformer + action transformer가 독립적으로 QKV 생성 후 concat). 출력: masked joint self-attention 결과 → 각 토큰 표현 갱신. · 내부: mask 규칙 두 가지: (1) action token → {lang ctx, visual cond, visual pred, action} 모두를 one-way로 attend; (2) noisy token(visual pred z_r) → context token만 attend (action을 보지 않음) → context를 clean하게 유지. 이로써 action 학습 gradient가 editing 표현을 역오염시키지 않는다.\n- **Efficiency / Inference path (prefix-only + denoising-free)** — 목적: 추론 latency 최소화 — target frame을 디코딩하지 않고 단일 timestep KV cache만 쓰는 image-denoising-free inference. · 입력→출력: 입력: o_t, l. 출력: 고정 tau*에서 1-step editing forward → C_edit^{tau*} → 3 action denoise step → a_{t:t+H}. latency 69 ms(최적). · 내부: FastWAM식 prefix-only attention training + image-denoising-free inference 채택. torch.compile + static CUDA graph 적용 시 약 3x 추가 speedup(action token 수가 작아 Action DiT의 parallel efficiency가 낮은 점을 compile이 보완). Table 11: FastWAM(1x vid denoise) 302 ms(1.00x) → ImageWAM(1x) 263 ms(1.15x) → FastWAM prefix-only 194 ms(1.56x)/+compiled 80 ms(3.78x) → ImageWAM prefix-only 198 ms(1.53x)/+action loop compile 85 ms(3.55x)/+image prefill compile 77 ms(3.92x)/+action static graph 69 ms(4.38x).\n\n**수식**\n\n$$\n(0.9,0.95),\\quad \\mathrm{lr}=1\\times 10^{-4},\\quad \\mathrm{wd}=1\\times 10^{-2}\n$$\n\n- **무슨 식?**: Appendix가 직접 명시한 유일한 LaTeX 값들: optimizer/lr/wd 세팅\n- Table 8의 공통 학습 하이퍼파라미터(verbatim). AdamW betas (0.9,0.95), learning rate 1e-4, weight decay 1e-2. (Appendix가 실제로 담은 수식 형태의 값은 이 하이퍼파라미터들뿐 — numbered equation은 없음.)\n\n$$\n\\text{Warmup steps}=0.05\\,T_{\\mathrm{total}},\\quad \\text{Min LR}=0.01\\times\\mathrm{lr}\n$$\n\n- **무슨 식?**: 스케줄러: 5% warmup, 최저 lr = 1% base\n- warmup cosine scheduler 설정. 총 step T_total의 5%를 warmup으로, 최저 lr은 base lr의 1%. grad clip 1.0과 함께 안정적 수렴 유도.\n\n$$\n224\\times 448 \\;(\\text{LIBERO}),\\qquad 288\\times 256 \\;(\\text{RoboTwin})\n$$\n\n- **무슨 식?**: 입력 해상도/뷰 레이아웃 — concat 방식이 데이터셋마다 다름\n- 데이터셋별 입력 해상도(Table 9). LIBERO는 2개 view를 horizontal concat 후 224x448, RoboTwin은 wrist 2-view horizontal + main vertical concat 후 288x256. 둘 다 future horizon 16 frames, action chunk length 16.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l)\n$$\n\n- **무슨 식?**: editing denoising 중간의 layer별 KV cache = action 조건화 context\n- [본문 Sec.3 식(5) — Appendix 구현이 전제하는 핵심 식] editing backbone f_edit가 timestep tau에서 obs o_t와 instruction l을 받아 각 layer l의 (K,V) cache 집합 C_edit^tau를 만든다. 이 KV cache가 action 조건화의 context. Appendix 5.1의 joint self-attention/weight-copy init이 바로 이 f_edit를 어떻게 인스턴스화하는지를 설명한다.\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: action expert = KV cache 조건부 flow-matching velocity 회귀\n- [본문 Sec.3 식(9)] action expert v_theta의 flow-matching loss. interpolated action a_s=(1-s)a*+s*eps_a를 입력받아 velocity (eps_a - a*)를 회귀. 조건은 o_t, instruction l, 그리고 editing KV cache C_edit^tau. Appendix 5.1의 Action DiT(760M/642M/952M/1.1B)가 이 v_theta. 학습 시엔 tau를 랜덤 샘플(E_{...,tau})하지만 추론 시엔 고정 tau*만 쓴다.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l),\\qquad \\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}})\n$$\n\n- **무슨 식?**: 추론: editing 1-step forward로 KV cache만 → 그 조건부로 action 샘플(프레임 디코딩 X)\n- [본문 Sec.3.4 추론 식 — Appendix Sec.6 'image-denoising-free inference'가 가리키는 메커니즘] 추론 시 단일 고정 timestep tau*에서 editing-branch를 1회 forward해 KV cache C_edit^{tau*}만 추출(target frame을 full-decode하지 않음). 그 cache에 조건화해 action을 샘플. Appendix Table 11의 'prefix-only'/'denoising-free' 최적화가 정확히 이 1-step prefix 계산을 compile/static graph로 가속하는 것.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → Appendix 5.1의 joint self-attention/Action Expert 구현이 가리키는 파이프라인 그림 — KV feature를 action expert가 joint attention으로 흡수해 a_{t:t+H}를 예측하는 구조를 보여준다.\n- (원본 그림 3 재참조) → Appendix Sec.7(Real-World, 4 task)과 Sec.8(RoboTwin per-task) 실험 셋업을 직접 도해 — Appendix 결과 표가 어느 환경에서 나온 수치인지 grounding.\n- (원본 그림 5 재참조) → Appendix Sec.6의 'image-denoising-free' 정당화 직관(dense future imagination 회피) 근거 — video-WAM의 future artifact가 action을 오도하는 실패 사례.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nMoT joint self-attention (Appendix 5.1.1, 본문 식(5)/(9) 기반) — 4종 토큰 + 1-way mask\n\n [language ctx] [visual cond] [visual pred(noisy z_r)]      [action tok(a_s)]\n       |              |                |                            |\n       +------ context (kept clean) ---+                            |\n       |              |                |                            |\n       v              v                v                            v\n +----------------------------------------------------------------------------+\n |               Joint self-attention (concatenated QKV)                        |\n |  mask rule A: action tok --> {lang, cond, pred, action}  (one-way attend)    |\n |  mask rule B: noisy tok(z_r) --> {context only}  (NOT to action; clean ctx)  |\n +----------------------------------------------------------------------------+\n       |                                                            |\n   editing branch f_edit^tau                               Action DiT v_theta\n   (per-layer K_l,V_l  => C_edit^tau, eq.5)                (weight-copy init from\n       |                                                    editing model; +action\n       |  joint attention feeds K/V                         in/out projection)\n       +----------------------------------> conditions ---->|\n                                                            v\n                                                  velocity (eps_a - a*)\n                                                            v\n                                                  a_{t:t+H} (chunk len 16)\n\nTRAIN vs INFER (본문 Sec.3.4 / Appendix Sec.6)\n TRAIN : tau ~ random ; L = L_act + L_img (editing branch도 z_r 디노이즈 학습)\n INFER : tau = fixed tau* ; editing-branch 1-step forward => C_edit^{tau*} ONLY\n         (target frame NOT decoded) -> action expert 3 denoise steps\n         + prefix-only attn + torch.compile/static CUDA graph => 69 ms (4.38x)\n```\n\n**학습 / 추론**\n\n학습(train-time): 8x NVIDIA H20, DeepSpeed ZeRO-1(FLUX.2 9B만 ZeRO-2), bf16, AdamW(betas 0.9/0.95), lr 1e-4, wd 1e-2, grad clip 1.0, warmup cosine(warmup=0.05*T_total, min lr=0.01*lr). 총 손실 L = L_act + L_img — 즉 editing branch(L_img, future latent flow-matching)와 action expert(L_act)를 함께 학습한다. editing timestep tau는 랜덤 샘플(L_act의 기대값에 tau 포함). 데이터셋별: LIBERO(2 view horizontal concat, 224x448, 10 epoch), RoboTwin(wrist 2-view horizontal + main vertical, 288x256, 5 epoch), Real-World(RoboTwin과 동일 preprocess, 4 task, 10 epoch). 공통 future horizon 16 frames + action chunk 16. 학습 비용: LIBERO OmniGen2/Ovis/FLUX.2-4B 각 18시간, FLUX.2-9B 1.6일; RoboTwin OmniGen2/FLUX.2-4B 각 5일(grad accum 3-step, effective batch/GPU 48).\\n\\n추론(test-time): 핵심 차이는 'target frame을 디코딩하지 않는다(image-denoising-free)'. 학습 때 랜덤이던 editing timestep tau를 추론에선 고정값 tau*로 두고, editing-branch를 단 1회 forward(prefix-only attention)해 KV cache C_edit^{tau*} = f_edit^{tau*}(o_t, l)만 얻는다. 이 cache에 flow-matching action expert v_theta를 joint attention으로 조건화하여 action chunk a_{t:t+H} ~ p_theta(a | o_t, l, C_edit^{tau*})를 3 denoising step으로 샘플한다. 즉 full future-video 생성도, 완전한 edited image 디코딩도 하지 않고, image-editing denoising의 중간 KV cache만 action expert의 조건으로 재사용하는 것이 ImageWAM 추론 메커니즘이다. 여기에 torch.compile/static CUDA graph를 더해 action head를 가속, 최소 69 ms(FastWAM 1x video denoise 302 ms 대비 4.38x) 달성.\n\n**숫자**\n- Action DiT 크기: OmniGen2 ~760M, FLUX.2 642M(4B)/952M(9B), Ovis-U1 1.1B params\n- OmniGen2 변종 DiT hidden dim 1024, attention hidden dim 2520\n- LLM backbone: Qwen2.5-VL-3B(OmniGen2) / Qwen3-4B,8B(FLUX.2) / Qwen3-1.7B(Ovis-U1, +~1.2B diffusion decoder)\n- 학습 HW: 8x NVIDIA H20; lr 1e-4, wd 1e-2, betas (0.9,0.95), grad clip 1.0, warmup 0.05*T_total, min lr 0.01*lr\n- 입력 해상도: LIBERO 224x448(2 view), RoboTwin 288x256(3 view); future horizon 16 frames; action chunk 16\n- Epoch: LIBERO 10, RoboTwin 5, Real-World 10\n- 학습 시간: LIBERO 18h(OmniGen2/Ovis/FLUX2-4B), 1.6 days(FLUX2-9B); RoboTwin 5 days(OmniGen2/FLUX2-4B, batch/GPU 48 w/ 3-step accum); Real-World 18h\n- Latency(Table 11, 3 action denoise steps): FastWAM(1x vid) 302 ms 1.00x; ImageWAM(1x vid) 263 ms 1.15x; FastWAM prefix-only 194 ms 1.56x; +compiled 80 ms 3.78x; ImageWAM prefix-only 198 ms 1.53x; +action loop compile 85 ms 3.55x; +image prefill compile 77 ms 3.92x; +action static graph 69 ms 4.38x\n- Real-World: 4 task(T1-T4), task당 ~100 demo, 모델당 task별 50 trial, execution success rate 지표\n- RoboTwin per-task SR 평균(Table 12, clean/rand): ImageWAM-FLUX.2-4B 93.20/93.56, ImageWAM-OmniGen2 92.48/92.80, Fast-WAM-IDM 91.16/91.34, Fast-WAM w/o co-train 82.76/84.80, LingBot-VA 92.90/91.50, pi_0.5 82.74/76.76, Motus 88.66/87.02\n- [본문 Sec.4/Abstract, Appendix 아님] FLOPs 1/6 + latency 1/4 of video-based WAMs; FLOPs 63.65→9.7, latency 1081 ms→263 ms (Table 5)\n\n---\n\n## 5.1 Architecture of ImageWAM\n\n**핵심**\n- 섹션 5.1은 (이 v1 HTML 기준) Appendix에 속한 'Architecture of ImageWAM'로, 본문 Section 3의 ImageWAM 설계를 세 가지 image-editing 백본(OmniGen2, FLUX.2[klein], Ovis-U1)으로 구체화한 구현 명세다. 세 변형 모두 공통적으로 MoT(Mixture-of-Transformers) 구조를 multimodal joint modeling 아키텍처로 채택한다.\n- 공통 골격: 사전학습된 image-editing 모델의 LLM/VLM 백본을 그대로 가져와 frozen 상태로 두고, 그 editing branch(DiT)에 Action Expert(Action DiT)를 '붙여서' joint self-attention으로 동작 예측을 한다. 즉 미래 video를 생성하지 않고 editing branch의 내부 표현(KV cache)을 action의 조건으로 쓴다.\n- OmniGen2 변형: LLM은 Qwen2.5-VL-3B를 backbone으로 로드(vision-language alignment 기반 제공). 이 LLM의 last-layer hidden states를 OmniGen2 DiT에, reference image latent token + future noisy frame과 함께 self-attention으로 넣는다.\n- MoT의 핵심: self-attention을 4종 토큰에 대한 joint self-attention으로 확장한다 — (1) language context tokens, (2) visual condition tokens, (3) visual prediction tokens, (4) action tokens. visual transformer와 action transformer가 각자 QKV를 만든 뒤 하나의 QKV 시퀀스로 concat한다.\n- Attention mask 설계: action token은 다른 토큰을 one-way(단방향)로만 attend하고, noisy token은 context token만 attend한다. 이렇게 해서 context token의 정보가 action/noisy 쪽 정보로 오염되지 않고 'clean'하게 유지된다.\n- 학습 안정화: 초기 학습에서 action model의 noisy gradient가 visual model을 망치지 않도록 action-head weight-copy initialization을 쓴다(선행연구 [34],[85]와 유사). Action DiT는 image-editing 모델과 동일 아키텍처를 쓰되, weight를 copy+interpolate해 Action DiT 크기에 맞추고 action 입출력용 projection layer를 추가한다.\n- OmniGen2 변형의 Action DiT 차원: cross-modal attention은 유지하면서 크기를 적당히 두기 위해 DiT hidden dimension은 1024로 작게, attention hidden dimension은 image-editing과 동일한 2520으로 유지 → 최종 약 760M params.\n- FLUX.2 변형: LLM은 FLUX.2가 쓰는 Qwen3-4B/8B. double-stream/single-stream 설계에 맞춰 action-head init을 수정 — action head의 lower layer는 double-stream stage의 image stream weight를 copy, higher layer는 FLUX의 single-stream block에서 init. Action DiT 최종 크기: 4B 버전 642M, 9B 버전 952M params.\n- Ovis-U1 변형: Ovis-U1이 학습/VL-finetune한 Qwen3-1.7B를 쓰고, 약 1.2B 규모의 diffusion visual decoder를 editing 백본으로 채택. 여기선 language context token에 LLM이 처리한 vision-language token도 포함. MMDiT 구조라 FLUX.2 변형과 동일한 Action DiT init 전략 사용. 모델이 작아 DiT hidden dim을 줄이지 않음 → Action DiT 최종 1.1B params.\n- 핵심 메커니즘(본문 3장, 5.1이 구현하는 대상): 추론 시 target/future frame을 디코딩하지 않는다. 고정된 editing denoising timestep tau*에서 editing-branch를 단 한 번 forward해 layer별 KV cache C_edit^{tau*}를 얻고, 이를 조건으로 flow-matching action expert가 action chunk를 denoise한다.\n- 효율: video-WAM 대비 FLOPs를 1/6, latency를 1/4로 줄인다(A6000 기준 latency 1081ms→263ms, FLOPs 63.65→9.7). 성능은 RoboTwin2.0/LIBERO/LIBERO-Plus/real-world에서 표준 VLA·경쟁 WAM과 동등 이상.\n\n**왜 / 직관**\n\n비유: 기존 video-generation WAM은 '행동하기 전에 미래 영상 전체를 머릿속으로 풀HD로 상영(dense future video 토큰 생성/디코딩)하고 그 영상을 보고 손을 움직이는' 방식이다. 비용이 크고, 영상에 생긴 잡티/왜곡(artifact)이 오히려 잘못된 행동을 유발한다. ImageWAM은 image-editing 모델을 백본으로 삼아 '미래 영상 한 편'이 아니라 '현재 관측을 지시문대로 어떻게 바꿔야 하는가'라는 단 한 장의 source-grounded 변환(o_edit = o_{t+H+1})만 추론한다. 더 결정적으로, 추론 때는 그 편집 결과 이미지조차 끝까지 그려내지(decode) 않는다. 비유하자면 editing 모델이 '이미지를 다 그리기 직전, 붓질을 어디에 어떻게 할지 머릿속으로 다 정해둔 중간 메모(layer별 KV cache)'만 뽑아내고, action expert가 그 메모를 곁눈질(joint attention)하며 로봇 동작을 denoise로 만들어낸다. 그림을 완성하는 비싼 마지막 단계를 통째로 건너뛰되, 그림을 그리려고 형성한 task-conditioned 추론 컨텍스트는 그대로 활용하는 것이 직관이다. MoT의 attention mask는 '메모(context)는 깨끗하게 보존하고, action/noise 쪽이 메모를 단방향으로 참고만 하게' 정보 흐름을 한쪽으로 흐르게 막아 reason-before-act 원칙을 유지한다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Frozen VLM / LLM backbone** — 목적: task instruction과 visual context를 인코딩해 안정적인 language-vision conditioning을 제공 (학습 중 갱신 안 함, frozen) · 입력→출력: 입력: task instruction l + current observation o_t -> 출력: language context tokens (+ Ovis-U1은 vision-language tokens 포함). OmniGen2의 경우 Qwen2.5-VL LLM의 last-layer hidden states · 내부: 변형별 백본: OmniGen2=Qwen2.5-VL-3B, FLUX.2=Qwen3-4B/8B, Ovis-U1=Qwen3-1.7B(Ovis-U1이 VL-finetune). 본문: 'We keep the VLM and multimodal understanding components ... frozen ... Only the diffusion-based image generation branch and the action expert are updated.'\n- **Image-Editing DiT branch (f_edit)** — 목적: 현재 관측을 지시문대로 변환한 task-relevant future endpoint frame o_edit = o_{t+H+1}을 추론하고, 그 과정의 layer별 KV cache를 산출(action의 world-action intermediate) · 입력→출력: 입력: (frozen backbone의 hidden states) + reference image latent token + future noisy frame token, denoising timestep r(또는 tau) -> 출력: velocity field 예측 u_phi 및 layer별 KV cache C_edit = {(K_l,V_l)}_{l=1..L} (Eq.5). 추론 시에는 편집 이미지 latent를 끝까지 디코딩하지 않음 · 내부: trainable. flow-matching으로 학습: z_r=(1-r)z*_{t+H+1}+r·eps_z (Eq.6), L_img (Eq.7). cache C_edit는 'visual latent가 task instruction과 상호작용한 뒤' 계산되므로 최종 편집 이미지 디코딩 없이도 task-conditioned 변환 정보를 담는다(본문). Action DiT 가중치의 copy 원천이 됨.\n- **MoT joint self-attention (4-token)** — 목적: visual prediction transformer와 action transformer를 하나의 attention으로 결합하되, context 오염 없이 단방향으로 action이 editing 추론을 참조하게 함 · 입력→출력: 입력: 4종 토큰 — language context / visual condition / visual prediction / action tokens. 각 transformer가 독립 QKV 생성 후 concat -> 출력: masked joint attention 결과 · 내부: Attention mask: action token은 다른 토큰을 one-way로만 attend, noisy token은 context token만 attend -> context token 정보를 clean하게 유지(5.1.1). 'The visual prediction transformer and the action transformer independently generate their attention QKV representations, which are then concatenated into a complete QKV sequence.'\n- **Action Expert / Action DiT (v_theta)** — 목적: editing context cache를 조건으로 미래 action chunk a_{t:t+H}를 flow-matching으로 생성(편집 컨텍스트를 실행 가능한 로봇 동작으로 변환) · 입력→출력: 입력: noisy action a_s + action flow time s + current robot state + (o_t, l, editing cache C_edit^tau) -> 출력: action velocity 예측, 최종 action chunk a_hat_{t:t+H} · 내부: trainable. a_s=(1-s)a*_{t:t+H}+s·eps_a (Eq.8), L_act=E[||v_theta(a_s,s|o_t,l,C_edit^tau)-(eps_a-a*_{t:t+H})||^2] (Eq.9). 아키텍처는 editing DiT와 동일하고 weight를 copy+interpolate 후 action I/O projection layer 추가(weight-copy init). 크기: OmniGen2 ~760M (DiT hidden dim 1024, attention hidden dim 2520), FLUX.2 4B=642M / 9B=952M (lower layer=double-stream image stream copy, higher layer=single-stream block init), Ovis-U1=1.1B (hidden dim 미축소).\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l)\n$$\n\n- **무슨 식?**: editing 모델 내부 layer별 KV를 모은 것 = decode 없이 얻는 'task가 반영된 시각 변환 메모'(world-action intermediate).\n- (Eq.5, 학습용 KV cache 추출) editing branch f_edit를 denoising timestep tau에서 현재관측 o_t와 지시문 l로 forward해, 모든 transformer layer ell(1..L)에서 key K^tau_ell, value V^tau_ell 쌍을 모은 집합 C_edit^tau를 만든다. L은 transformer layer 수. 이 cache는 visual latent가 task instruction과 이미 상호작용한 뒤의 값이라, 최종 편집 이미지를 디코딩하지 않고도 task-conditioned 시각 변환 정보를 담는다.\n\n$$\nz_{r}=(1-r)z^{*}_{t+H+1}+r\\epsilon_{z}\n$$\n\n- **무슨 식?**: 정답 미래프레임 latent와 noise를 r로 섞은 학습 입력.\n- (Eq.6, image latent 보간) editing branch 학습을 위한 flow-matching 입력. 목표 미래 endpoint frame의 clean latent z*_{t+H+1}과 가우시안 noise eps_z를 flow time r in [0,1]로 선형 보간해 noisy latent z_r을 만든다. (소스의 HTML alttext는 첨자에 오타 z*_{t+H+1s}로 렌더되나 동일 변수.)\n\n$$\n\\mathcal{L}_{\\mathrm{img}}=\\mathbb{E}_{z^{*},\\epsilon_{z},r}\\left[\\left\\|u_{\\phi}(z_{r},r\\mid o_{t},l)-(\\epsilon_{z}-z^{*}_{t+K})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: editing branch가 '현재→미래 편집 프레임' velocity를 맞히게 하는 flow-matching 손실.\n- (Eq.7, image editing branch loss) velocity predictor u_phi가 (현재관측 o_t, 지시문 l) 조건에서 보간입력 z_r,r로부터 velocity field를 예측하도록 하는 flow-matching MSE. 타깃 velocity는 (eps_z - z*_{t+K}) (목표 latent에서 noise로 가는 방향). u_phi는 diffusion image branch의 velocity 예측기. 이 branch가 task-relevant future endpoint frame을 예측하도록 학습된다.\n\n$$\n\\mathbf{a}_{s}=(1-s)\\mathbf{a}^{*}_{t:t+H}+s\\epsilon_{a}\n$$\n\n- **무슨 식?**: 정답 action과 noise를 s로 섞은 action 학습 입력.\n- (Eq.8, action 보간) action expert 학습 입력. 정답 action chunk a*_{t:t+H}와 noise eps_a를 action flow-matching time s in [0,1]로 선형 보간해 noisy action a_s를 만든다. (이미지 쪽 flow time r/tau와 별개의 시간축.)\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: Action Expert가 editing KV cache를 조건으로 action velocity를 맞히게 하는 flow-matching 손실(핵심 결합식).\n- (Eq.9, action expert loss) action velocity 예측기 v_theta가 (현재관측 o_t, 지시문 l, editing context cache C_edit^tau) 조건에서 보간입력 a_s,s로부터 action velocity를 예측하는 flow-matching MSE. 타깃은 (eps_a - a*_{t:t+H}). 기댓값이 tau에 대해서도 잡혀, 학습 중 무작위 editing timestep tau에서 뽑힌 cache에 robust해진다. s=action flow time, tau=editing denoising timestep.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l)\n$$\n\n- **무슨 식?**: 추론: editing branch를 tau* 한 스텝만 돌려 cache만 뽑음(이미지 디코딩 안 함).\n- (Eq.10, 추론용 cache) 추론 시에는 전체 editing denoising trajectory를 돌리지 않고, 고정된 단일 timestep tau* 에서 editing-branch를 단 한 번(one forward step)만 돌려 KV cache C_edit^{tau*}를 얻는다. 5.1이 강조하는 '미래 비디오/편집 이미지 디코딩 없음'의 수식적 표현.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}})\n$$\n\n- **무슨 식?**: 추론: 그 cache 하나를 조건으로 action chunk를 denoise해서 뽑음.\n- (Eq.11, 추론 action 생성) action expert가 그 단일 cache C_edit^{tau*}를 조건으로 action noise에서 시작해 denoise하여 action chunk a_hat_{t:t+H}를 샘플링한다. video WAM이 multiple future frame의 dense token을 denoise+decode하는 것과 달리, layer별 editing cache 한 세트만 action expert의 context로 직접 사용한다.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → 섹션 5.1이 명세하는 아키텍처(editing backbone이 future frame을 합성하고 Action Expert가 그 과정의 중간 KV feature를 joint attention으로 통합해 action을 예측)를 한 장으로 보여주는 파이프라인 그림이라 직접 근거가 됨.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nFigure 2는 고수준 파이프라인이라 MoT 4-token joint attention의 mask 방향과 train vs infer의 KV cache 경로가 안 드러난다. 아래는 5.1 + 본문 Eq.5-11 근거의 모듈/데이터흐름 (추측 없음).\n\n[ 공통 구조 (3 변형 공통, MoT) ]\n                language instr. l        current obs o_t\n                       |                      |\n                       v                      v\n            +---------------------------------------------+\n            |   Frozen VLM / LLM backbone (variant별)      |\n            |   OmniGen2: Qwen2.5-VL-3B                    |\n            |   FLUX.2  : Qwen3-4B/8B                      |\n            |   Ovis-U1 : Qwen3-1.7B                       |\n            +---------------------------------------------+\n              | last-layer hidden states (= language/visual context tokens)\n              v\n   +--------------------------------------------------------------+\n   |          Image-Editing DiT branch  f_edit (trainable)        |\n   |   tokens: [lang ctx][visual cond][visual pred(noisy frame)]  |\n   |   self-attn -> per-layer KV:  {(K_l, V_l)}_{l=1..L}          |\n   +--------------------------------------------------------------+\n        |  C_edit  (layer-wise KV cache)            (no image decode needed)\n        |                                                   |\n        |  joint self-attention (QKV concat)                |\n        v                                                   v\n   +--------------------------------------------------------------+\n   |   Action DiT / Action Expert  v_theta (trainable)            |\n   |   action tokens + action noise + robot state                |\n   |   weight = copy+interp from editing DiT + action proj.      |\n   +--------------------------------------------------------------+\n        |\n        v  a_hat_{t:t+H}\n\n[ MoT attention mask 방향 (one-way; 본문 5.1.1 근거) ]\n   action token  --(attend, 1-way)-->  lang/visual/context tokens\n   noisy token   --(attend)-->         context tokens ONLY\n   => context token은 oversight 받지 않아 'clean' 유지\n\n[ TRAIN vs INFER (Eq.5-11 근거) ]\n TRAIN:  random tau  -> f_edit run -> C_edit^tau (Eq.5)\n         L_img: editing velocity u_phi (Eq.7)\n         L_act: action velocity v_theta | C_edit^tau (Eq.9)   <- E over tau\n INFER:  fixed tau*  -> f_edit ONE forward step -> C_edit^{tau*} (Eq.10)\n         (NO full denoise trajectory, NO edited-image decode)\n         a_hat ~ p_theta( a | o_t, l, C_edit^{tau*} ) (Eq.11)\n```\n\n**학습 / 추론**\n\nTrain-time과 test-time의 차이가 ImageWAM의 핵심이다. [학습] editing denoising timestep tau를 무작위로 샘플링해 editing branch를 그 timestep에서 돌리고, 모든 layer ell에서 KV cache C_edit^tau={(K_l^tau,V_l^tau)}_{l=1..L}=f_edit^tau(o_t,l)를 수집한다(Eq.5). 두 손실을 동시에 최적화한다 — editing branch는 image flow-matching loss L_img(Eq.7, velocity u_phi)로 task-relevant future endpoint frame을 예측하도록, action expert는 L_act(Eq.9, velocity v_theta)로 그 cache C_edit^tau를 조건으로 action chunk를 예측하도록. L_act의 기댓값이 tau에 대해서도 잡혀 다양한 editing timestep의 cache에 robust해진다. 학습 안정화를 위해 action-head weight-copy init(초기 noisy action gradient가 visual model 훼손 방지)과, mask로 context token을 clean하게 유지하는 one-way attention을 쓴다. VLM/multimodal 이해 모듈은 frozen, diffusion image branch와 action expert만 갱신. (참고: standard video-WAM 변형은 future video token을 denoise하고, Fast-WAM-style 변형은 future video token을 '학습 때 video co-training에만' 쓰고 추론 때 제거.) [추론] 핵심: target/future frame을 디코딩하지 않는다 — 'At inference time, ImageWAM avoids full future-video generation and also does not require decoding a complete edited image.' 전체 editing denoising trajectory를 돌리는 대신 고정된 단일 editing timestep tau*를 골라 editing-branch를 단 한 번(one editing-branch forward step)만 돌려 cache C_edit^{tau*}=f_edit^{tau*}(o_t,l)만 얻는다(Eq.10). 그 다음 action expert가 이 cache를 조건으로 action noise에서 시작해 denoising으로 action chunk를 샘플링한다: a_hat_{t:t+H} ~ p_theta(a_{t:t+H}|o_t,l,C_edit^{tau*}) (Eq.11). 즉 flow-matching action expert를 image-editing denoising이 만든 layer-wise KV cache에 조건화하는 것이며, dense future-video token 인스턴스화/디코딩을 회피하면서 reason-before-act 원칙은 보존한다. ('In practice, ImageWAM does not decode the target frame at inference time; instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising, using them as a compact world-action context.')\n\n**숫자**\n- 효율: video-based WAM 대비 FLOPs 1/6, latency 1/4로 감소 ('It also reduces FLOPs to 1/6 and latency to 1/4 of video-based WAMs.')\n- 절대 수치(A6000 GPU, Table 5): latency 1081 ms -> 263 ms, FLOPs 63.65 -> 9.7\n- OmniGen2 변형 Action DiT: ~760M params (DiT hidden dim 1024, attention hidden dim 2520)\n- FLUX.2 변형 Action DiT: 4B 버전 642M, 9B 버전 952M params\n- Ovis-U1 변형 Action DiT: 1.1B params (visual decoder ~1.2B, LLM Qwen3-1.7B)\n- 평가 벤치마크: RoboTwin2.0, LIBERO(Spatial/Object/Goal/LIBERO-Long 4 suites), LIBERO-Plus, real-world dual-arm robot (각 task당 100 trials average success rate). 표준 VLA 및 경쟁 WAM 대비 동등 이상의 정책 성능을 추가 policy pretraining 없이 달성\n\n---\n\n## 5.1.1 OmniGen2-based ImageWAM\n\n**핵심**\n- OmniGen2-based ImageWAM은 OmniGen2의 LLM 컴포넌트를 원본 사전학습 Qwen2.5-VL-3B로 로드하여 LLM backbone으로 사용. 이로써 vision-language alignment의 강한 foundation을 downstream model에 제공.\n- Qwen2.5-VL LLM의 last-layer hidden states를 reference image의 latent tokens 및 future noisy frames와 함께 OmniGen2 DiT에 넣어 self-attention 수행.\n- MoT 구조에서 원래의 self-attention을 4종 token에 대한 joint self-attention으로 확장: (1) language context tokens, (2) visual condition tokens, (3) visual prediction tokens, (4) action tokens.\n- Visual prediction transformer와 action transformer가 각자 독립적으로 QKV를 생성한 뒤 하나의 완전한 QKV sequence로 concatenate.\n- Attention mask 설계: action tokens는 다른 token들을 one-way(단방향)로만 attend, noisy tokens는 context tokens에만 attend → context tokens의 정보를 clean하게 유지.\n- 학습 초기에 action model의 noisy gradient가 visual model을 망가뜨리지 않도록 action-head weight-copy initialization 전략 채택([34], [85]의 방식과 유사).\n- Action DiT는 image editing model과 동일한 architecture 사용. Image editing model의 weight를 copy + interpolate하여 Action DiT 크기에 맞추고, action 입출력을 위한 projection layer를 추가.\n- Cross-modal attention을 가능케 하면서 Action DiT를 적당한 크기로 유지: DiT hidden dimension은 작게 1024, attention hidden dimension은 2520로 동일하게 유지. 최종 Action DiT 크기는 약 760M parameters.\n- (이 architecture가 구현하는 핵심 아이디어 — 본문 method/abstract 근거) 추론 시 ImageWAM은 target/future frame을 디코딩하지 않고, image-editing denoising이 만든 KV cache에 flow-matching action expert를 조건화. 이로써 dense future-video 생성 없이 action 예측.\n\n**왜 / 직관**\n\n왜 이렇게 설계했나: 기존 video-generation WAM은 미래 비디오를 픽셀까지 빽빽하게 상상(dense imagination)하느라 연산이 비싸고, action과 무관한 시각 디테일에까지 capacity를 낭비한다. OmniGen2-based ImageWAM은 그 무거운 video generator 자리에 이미 vision-language를 잘 정렬한 image-editing backbone(OmniGen2 + Qwen2.5-VL-3B)을 놓는다. 비유하면, 미래 장면 전체를 일일이 그려서 보여주는 대신(영화 한 편 렌더링), '여기 있는 컵을 저기로 옮기면 이렇게 바뀐다'는 식의 source-grounded, instruction-guided '편집 의도'만 머릿속에 떠올리는 것이다. 그 '편집을 떠올리는 동안의 중간 사고 흔적'(denoising 과정의 KV cache)이 곧 compact한 world-action 중간표현이고, action expert는 그림을 끝까지 완성(decode)할 필요 없이 이 사고 흔적만 들여다보며 행동을 정한다. 추가로, 4종 token을 한 attention으로 묶되 action token은 단방향으로만 보고 noisy token은 context만 보게 mask를 거는 것은 '오염된 노이즈 정보가 깨끗한 문맥(지시문·관측)으로 역류하지 못하게 막는 일방통행 도로'를 까는 것과 같다. weight-copy init은 새로 붙인 action 머리가 처음부터 엉뚱한 gradient로 잘 학습된 image editing 본체를 망가뜨리지 않도록, 검증된 본체의 weight를 복사해 출발점으로 삼는 안전장치다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Qwen2.5-VL-3B LLM backbone** — 목적: Vision-language alignment foundation 제공 — 지시문(language)과 관측(vision)을 정렬해 downstream에 강한 출발점을 줌. · 입력→출력: 입력: language instruction l + 현재 관측 o_t(이미지) → 출력: last-layer hidden states(=language context tokens; OmniGen2 DiT의 self-attention 입력으로 전달). · 내부: OmniGen2의 원본 사전학습 Qwen2.5-VL-3B를 LLM 컴포넌트로 로드. last-layer hidden states를 DiT로 흘려보냄(본문상 LLM backbone으로 명시).\n- **OmniGen2 DiT (image-editing backbone / visual prediction transformer)** — 목적: Source-grounded, instruction-guided 미래 frame 편집을 떠올리는 역할 — 미래 frame latent를 향한 denoising velocity를 예측하고, 그 과정의 KV cache를 중간표현으로 남김. · 입력→출력: 입력: Qwen2.5-VL last-layer hidden states + reference image의 latent tokens(visual condition) + future noisy frames(visual prediction tokens) → 출력: visual-prediction용 QKV(QKV_vis) 및 denoising velocity u_phi (그리고 layer별 KV cache C_edit^tau). · 내부: 원래 self-attention을 4-token joint self-attention으로 확장. L_img = E[||u_phi(z_r, r | o_t, l) - (eps_z - z*_{t+H+1})||_2^2], z_r=(1-r)z*_{t+H+1}+r·eps_z. KV cache: C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L} = f_edit^tau(o_t, l), visual latent가 task instruction과 상호작용한 뒤 계산됨.\n- **Action DiT (Action Expert / action transformer)** — 목적: 편집 KV cache에 조건화된 flow-matching으로 미래 action sequence를 예측 — target frame을 decode하지 않고 행동을 생성. · 입력→출력: 입력: action noise(noisy action a_s, level s) + 현재 robot state + 조건 (o_t, l, 편집 KV cache C_edit^tau) → 출력: 미래 action sequence a_{t:t+H} (자체 QKV_act는 QKV_vis와 concat되어 joint attention). · 내부: image-editing model과 동일 architecture. weight를 copy+interpolate하여 크기 맞춤 + action 입출력 projection layer 추가. DiT hidden dim 1024, attention hidden dim 2520, 약 760M params. L_act = E[||v_theta(a_s, s | o_t, l, C_edit^tau) - (eps_a - a*_{t:t+H})||_2^2]. 학습 초기 noisy gradient 차단 위해 action-head weight-copy init ([34],[85] 유사).\n- **Joint attention + attention mask (MoT)** — 목적: 4종 token을 하나의 attention으로 묶되 정보 흐름을 통제 — noisy/action 정보가 깨끗한 context로 역류하지 않게 함. · 입력→출력: 입력: [language context, visual condition, visual prediction, action] 4종 token의 concat된 full QKV sequence → 출력: masking이 적용된 joint self-attention 결과. · 내부: visual prediction transformer와 action transformer가 독립적으로 QKV 생성 후 concat. mask: action tokens는 다른 token을 one-way로만 attend; noisy tokens는 context tokens에만 attend → context tokens 정보 clean 유지.\n\n**수식**\n\n$$\n\\mathcal{L}_{\\mathrm{img}}=\\mathbb{E}_{z^{*},\\epsilon_{z},r}\\left[\\left\\|u_{\\phi}(z_{r},r\\mid o_{t},l)-(\\epsilon_{z}-z^{*}_{t+H+1})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: 편집 backbone이 현재 관측+지시문 조건으로 미래 frame latent를 향한 denoising velocity를 배우게 하는 항(편집을 떠올리는 능력 학습).\n- Image-editing branch의 flow-matching loss. u_phi: velocity predictor(편집 backbone). z_r: target latent z*_{t+H+1}와 noise eps_z를 r로 보간한 interpolated latent. 조건은 현재 관측 o_t와 instruction l. 타깃 velocity는 (eps_z - z*_{t+H+1}). 즉 미래 frame latent를 향하는 흐름(velocity)을 회귀.\n\n$$\nz_r=(1-r)z^{*}_{t+H+1}+r\\epsilon_{z}\n$$\n\n- **무슨 식?**: 깨끗한 미래-frame latent와 noise를 r로 섞은 중간 상태 — denoising이 풀어가야 할 출발점.\n- Flow-matching의 보간 정의. r in [0,1]가 0이면 깨끗한 target latent z*_{t+H+1}, 1이면 순수 noise eps_z. u_phi는 이 z_r 위에서 velocity를 예측.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l)\n$$\n\n- **무슨 식?**: 편집을 떠올리는 동안 남는 '중간 사고 흔적' — target frame을 끝까지 그리지 않고 뽑아내는 행동조건용 캐시.\n- Image-editing denoising step tau에서 각 layer l(총 L개)의 key/value를 모은 KV cache. f_edit^tau: 관측 o_t와 instruction l을 입력받는 편집 backbone의 한 denoising step. 이 C_edit^tau가 action expert로 넘어가는 compact world-action 중간표현. (이 cache가 visual latent가 task instruction과 상호작용한 뒤 계산된다는 점이 핵심 — target frame 전체를 decode할 필요 없음.)\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: 편집 KV cache에 조건화된 action expert가 미래 action sequence를 향한 velocity를 배우는 항 — frame 디코딩 없이 행동 예측.\n- Action expert(Action DiT)의 flow-matching loss. v_theta: action velocity predictor. a_s: action noise level s에서의 noisy action. 조건은 관측 o_t, instruction l, 그리고 편집 KV cache C_edit^tau. 타깃 velocity는 (eps_a - a*_{t:t+H}), 즉 미래 action sequence a*_{t:t+H}를 향하는 흐름. 핵심: action expert가 편집 캐시 C_edit^tau에 조건화되어(joint attention으로) action을 denoise.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → ImageWAM Pipeline 그림 — image editing backbone이 o_t+instruction으로 미래 frame을 합성하는 동안 나오는 중간 KV features를 Action Expert가 joint attention으로 통합해 action을 예측하는, 5.1.1이 구현하는 4-token joint-attention + KV-cache 조건화 구조를 그대로 보여줌.\n- (원본 그림 1 재참조) → video-generation WAM(dense future-video 예측)과 ImageWAM(image-editing backbone 기반 compact world-action 중간표현)의 대비를 보여줘, OmniGen2 backbone 선택의 동기(연산 절감·action-무관 디테일 회피)를 뒷받침.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nMoT joint self-attention over 4 token types (OmniGen2-based ImageWAM, sec 5.1.1)\n\n  Qwen2.5-VL-3B (LLM backbone)\n      | last-layer hidden states\n      v\n  +----------------------------------------------------------+\n  |        OmniGen2 DiT  ---  joint self-attention           |\n  |                                                          |\n  |  inputs to attention:                                    |\n  |   [1] language context tokens   (from Qwen2.5-VL)        |\n  |   [2] visual condition tokens   (reference image latent) |\n  |   [3] visual prediction tokens  (future noisy frames)    |\n  |   [4] action tokens             (from Action DiT)        |\n  |                                                          |\n  |  Visual-prediction transformer --> QKV_vis  --.          |\n  |  Action transformer            --> QKV_act  --|          |\n  |                                               v          |\n  |                          concat --> full QKV sequence    |\n  +----------------------------------------------------------+\n        |\n        v  attention mask (one-way / clean-context):\n   action tokens  ---->  attend to other tokens (one-way only)\n   noisy tokens   ---->  attend to context tokens ONLY\n   context tokens <--/  (kept clean; no back-flow from noisy)\n\n  Action DiT (= same arch as image-editing model)\n   - weights copied + interpolated from image-editing model\n   - + extra projection layers (action in / action out)\n   - DiT hidden dim = 1024 ;  attention hidden dim = 2520\n   - ~760M params\n   - weight-copy init  => shields visual model from early noisy\n                          action gradients ([34],[85])\n```\n\n**학습 / 추론**\n\nTrain-time: image-editing branch(OmniGen2 DiT)는 미래 frame latent를 향한 denoising velocity를 회귀(L_img)하며 task-relevant future frame을 예측하도록 학습되고, action expert(Action DiT)는 그 편집 denoising step tau의 KV cache C_edit^tau에 조건화되어 미래 action sequence를 향한 velocity를 회귀(L_act)하며 joint하게 학습된다. 두 분기는 4-token joint self-attention으로 결합되지만, attention mask로 'action token은 단방향, noisy token은 context-only'를 강제해 noisy 정보가 깨끗한 context로 역류하는 것을 막는다. 또한 학습 초기 action model의 noisy gradient가 visual model을
