 오염시키지 않도록 image-editing model weight를 copy+interpolate하는 action-head weight-copy initialization을 적용한다.\\n\\nTest-time(추론): ImageWAM은 target/future frame을 디코딩하지 않는다('does not decode the target frame at inference time'; '§3.4: avoids full future-video generation and also does not require decoding a complete edited image'). 대신 image-editing denoising 과정에서 생성되는 KV cache C_edit^tau(= {(K_l^tau, V_l^tau)})에 flow-matching action expert를 조건화하여, 편집 그림을 끝까지 완성하지 않고도 joint attention을 통해 미래 action sequence a_{t:t+H}를 바로 예측한다. 핵심 차이: train에서는 미래 frame을 (latent로) 예측·학습하지만, infer에서는 그 frame을 픽셀/이미지로 복원하지 않고 denoising 중간 KV cache만 action 조건으로 재사용 → dense future-video imagination 제거로 연산·지연 대폭 절감.\n\n**숫자**\n- Action DiT DiT hidden dimension = 1024\n- Action DiT attention hidden dimension = 2520\n- Action DiT 총 파라미터 ≈ 760M\n- LLM backbone = Qwen2.5-VL-3B\n- 효율(Abstract): FLOPs를 video-based WAM의 ~1/6로, latency를 ~1/4로 감소\n- Latency: ImageWAM 263 ms (vs FastWAM 1-step 302 ms, FastWAM-IDM 1081 ms) [Table 5]\n- TFLOPs: ImageWAM 9.72 (vs FastWAM 1-step 13.21, FastWAM-IDM 63.65) [Table 5]\n- RoboTwin 2.0: 평균 93.38% (clean 93.20% / randomized 93.56%)\n- LIBERO: 4개 suite 평균 98.4%\n- LIBERO-Plus: 83.1% (FLUX.2 4B)\n- Real-world: 4개 task 평균 84.5%\n\n---\n\n## 5.1.2 FLUX.2-based ImageWAM\n\n**핵심**\n- 섹션 5.1.2 자체는 Appendix의 짧은 아키텍처 명세다. FLUX.2 변형에서 LLM 모듈은 FLUX.2가 쓰던 사전학습 Qwen3-4B/8B를 그대로 사용한다 (\"the LLM module is the original pretrained Qwen3-4B/8B used by FLUX.2\").\n- FLUX.2도 다른 변형과 동일하게 joint self-attention 구조로 확장하되, action-head 초기화 전략만 FLUX.2의 double-stream / single-stream 설계에 맞게 변경한다 (\"modifying the action-head initialization strategy according to the double-stream and single-stream design of FLUX.2\").\n- 초기화 규칙: action head의 lower layers는 FLUX double-stream stage의 image stream 가중치를 복사하고, higher layers는 FLUX single-stream blocks에서 초기화한다.\n- Action DiT 파라미터 수: 4B 버전 = 642M, 9B 버전 = 952M (\"642M parameters for the 4B version and 952M parameters for the 9B version\").\n- 이 섹션에는 자체 수식이 없다. 5.1.2는 본문 Sec 3.2~3.4가 정의한 공통 메커니즘(KV-cache 추출 Eq.5, image-editing loss Eq.7, action flow-matching loss Eq.9, 효율적 추론 Eq.10/11)을 FLUX.2 백본으로 구체화(instantiation)한 것이다.\n- 핵심 아이디어(본문): 미래 video를 디코딩하지 않고, image-editing denoising 과정에서 나오는 layer별 KV cache C_edit^τ 를 action expert의 조건으로 재사용한다 (\"reuses the intermediate transformer key-value caches produced during denoising as conditioning context\").\n- 추론 시: 고정 editing timestep τ* 에서 editing-branch를 단 한 번만 forward해 cache를 얻고(Eq.10), 그 cache에 조건화된 flow-matching action expert가 action chunk를 샘플링한다(Eq.11). 미래 video token도, 완성된 edited image도 디코딩하지 않는다.\n- 효율(abstract/Table 5): video-WAM 대비 FLOPs를 약 1/6, latency를 약 1/4로 줄임. ImageWAM = 263 ms / 9.72 TFLOPs (vs FastWAM-IDM 1081 ms / 63.65 TFLOPs).\n- 벤치마크 성공률(전체 시스템): RoboTwin2.0 clean 93.20% / randomized 93.56%, LIBERO 평균 98.4%, LIBERO-Plus(FLUX.2 4B) 평균 83.1%, real-world 평균 84.5%.\n- FLUX.2 변형은 LIBERO-Plus 견고성 평가에서 직접 보고되는 변형이다 (Table 3은 FLUX.2 4B 결과).\n\n**왜 / 직관**\n\n5.1.2는 \\\"같은 레시피, 다른 오븐\\\" 격이다. ImageWAM의 공통 레시피(미래 영상을 그리는 대신, image-editing 모델이 \\\"이 명령대로면 현재 장면이 어떻게 바뀌어야 하나\\\"를 추론하는 중간 KV cache를 행동의 컨텍스트로 쓰는 것)는 그대로 두고, 백본만 FLUX.2로 바꾼다. 바꿀 때 문제는 FLUX.2의 내부 구조가 OmniGen2와 달리 두 단계(double-stream에서 image/text가 분리된 두 흐름, 이후 single-stream에서 합쳐진 한 흐름)라는 점이다. 그래서 action head(=Action DiT)를 처음부터 학습하지 않고, FLUX의 검증된 가중치로 \\\"부트스트랩\\\"한다. 직관적 비유: 새 직원(action head)을 빈손으로 앉히지 않고, 입력 가까운 아래쪽 자리에는 분리된 image-stream 전문가의 노하우를 복사해 앉히고, 정보가 합쳐진 위쪽 자리에는 통합 single-stream 전문가의 노하우를 복사해 앉히는 식이다 (\\\"lower layers ... copied from the image stream in the double-stream stage ... higher layers ... from the single-stream blocks\\\"). 이렇게 하면 학습 초기 action 쪽 noisy gradient가 시각 모델을 망치지 않고(본문 5.1.1의 weight-copy 동기), FLUX의 표현력을 그대로 물려받는다. 추론 직관: \\\"미래를 끝까지 상상해 그려보고 행동\\\"하는 대신, editing 모델이 명령을 한 번 곱씹은 직후의 내부 메모(KV cache)만 슬쩍 빼내 행동가에게 건넨다. 그림을 끝까지 렌더링하는 비싼 단계를 건너뛰므로 FLOPs/latency가 크게 준다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **FLUX.2 LLM backbone (frozen)** — 목적: language instruction l과 visual context를 인코딩해 안정적인 language-vision conditioning 제공 (학습 중 동결). · 입력→출력: 입력: o_t(현재 관측 이미지), l(텍스트 instruction) → 출력: language context / visual context tokens (frozen). FLUX.2 변형은 Qwen3-4B(4B판)/Qwen3-8B(9B판) 사용. · 내부: \"the LLM module is the original pretrained Qwen3-4B/8B used by FLUX.2.\" VLM/멀티모달 이해 모듈은 frozen 유지 (\"We keep the VLM and multimodal understanding components of the editing model frozen\"). 별도 수식 없음.\n- **Editing backbone f_edit (FLUX.2 DiT, trainable)** — 목적: 명령에 따라 현재 관측이 어떻게 바뀌어야 하는지를 추론하고, 그 과정의 layer별 KV cache C_edit^τ를 산출(= world-action 중간 표현). joint self-attention 구조. · 입력→출력: 입력: (o_t, l) + editing denoising timestep τ → 출력: C_edit^τ = {(K_ℓ^τ, V_ℓ^τ)}_{ℓ=1}^{L} (Eq.5). [학습 시 추가로 미래 frame velocity u_φ 예측]. · 내부: FLUX.2를 joint self-attention 구조로 확장 (\"extend FLUX.2 into a joint self-attention structure\"). FLUX.2 특유의 2단계: double-stream(image/text 분리 흐름) → single-stream(합쳐진 흐름). 학습 목적 L_img (Eq.7): u_φ가 보간 latent z_r(Eq.6)로부터 미래 frame velocity 예측. 추론 시엔 전체 trajectory 대신 τ* 한 스텝만 forward (Eq.10), edited image는 디코딩 안 함.\n- **Action Expert / Action DiT v_θ (trainable)** — 목적: editing cache를 받아 실행 가능한 robot action chunk를 flow-matching으로 생성(= cache→행동 변환). · 입력→출력: 입력: 보간 action a_s(Eq.8), action flow time s, 조건 (o_t, l, C_edit^τ), current robot state + action noise → 출력: action velocity 예측 → 샘플링된 action chunk â_{t:t+H}. FLUX.2 변형 파라미터: 4B판 642M, 9B판 952M. · 내부: 초기화(5.1.2 핵심): \"the lower layers of the action head are initialized by copying the weights from the image stream in the double-stream stage of FLUX, while the higher layers are initialized from the single-stream blocks of FLUX.\" 동기(5.1.1): action 쪽 noisy gradient가 초기 학습에서 visual 모델을 망치지 않게 weight-copy. joint attention 통합(Fig.2): \"Action Expert integrates the intermediate KV features ... via joint attention.\" 손실 L_act (Eq.9). 추론: â_{t:t+H} ~ p_θ(·|o_t,l,C_edit^τ*) (Eq.11).\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l)\n$$\n\n- **무슨 식?**: editing 모델을 timestep τ로 한 번 통과시켜 모든 layer의 KV cache(= world-action 컨텍스트)를 뽑는다.\n- [Eq.5, 본문 Sec 3.2 — 5.1.2가 instantiate하는 공통 메커니즘] editing denoising timestep τ에서 image-editing backbone f_edit^τ에 현재 관측 o_t와 instruction l을 넣어, 각 transformer layer ℓ(총 L층)의 key-value 쌍 (K_ℓ^τ, V_ℓ^τ)를 모은 cache C_edit^τ를 추출. 각 항: f_edit^τ = editing branch의 timestep τ 한-스텝 forward; {(K,V)}_{ℓ=1}^L = 모든 layer의 KV 모음. FLUX.2 변형에선 이 f_edit가 Qwen3 + FLUX.2 DiT(double/single-stream)다.\n\n$$\n\\mathcal{L}_{\\mathrm{img}}=\\mathbb{E}_{z^{*},\\epsilon_{z},r}\\left[\\left\\|u_{\\phi}(z_{r},r\\mid o_{t},l)-(\\epsilon_{z}-z^{*}_{t+K})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: editing 가지가 미래 목표 프레임을 맞히도록 학습 → cache가 \"무엇이 바뀌어야 하나\"를 인코딩.\n- [Eq.7, Sec 3.3 image editing objective] editing branch가 task-relevant 미래 endpoint frame을 예측하도록 하는 flow-matching loss. u_φ = diffusion image branch의 velocity predictor; z_r = (1-r)z*_{t+H+1}+r·ε_z (Eq.6의 보간 latent); r∈(0,1) image flow time; 타깃 velocity = ε_z - z*. (소스 표기상 z*_{t+K}로 적혀 있으나 직전 정의는 z*_{t+H+1}.) 이 항이 editing cache가 유용한 시각 변환 정보를 담도록 보장한다.\n\n$$\n\\mathbf{a}_{s}=(1-s)\\mathbf{a}^{*}_{t:t+H}+s\\epsilon_{a}\n$$\n\n- **무슨 식?**: 정답 action과 noise를 s로 섞어 flow-matching 입력 a_s를 만든다.\n- [Eq.8, Sec 3.3] action flow-matching의 보간 샘플. expert action chunk a*_{t:t+H}와 Gaussian noise ε_a~N(0,I)를 action flow time s∈(0,1)로 선형 보간. s=0이면 정답 action, s=1이면 순수 noise.\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: action expert가 editing cache를 조건으로 받아 action velocity를 회귀 → cache→행동 변환을 학습.\n- [Eq.9, Sec 3.3 action flow matching] action expert v_θ가 보간 action a_s, flow time s, 그리고 (o_t, l, editing cache C_edit^τ)에 조건화되어 velocity field를 예측. 타깃 = ε_a - a*_{t:t+H}. 기대값을 a*, ε_a, s, 그리고 editing denoising timestep τ에 대해 취함 → τ를 학습 중 샘플링해 다양한 denoising 단계의 cache에 action expert를 노출. 여기서 v_θ가 곧 FLUX.2 변형의 Action DiT(642M/952M)다.\n\n$$\n\\mathcal{L}=\\mathcal{L}_{\\mathrm{act}}+\\mathcal{L}_{\\mathrm{img}}\n$$\n\n- **무슨 식?**: 이미지-편집 손실 + 행동 흐름매칭 손실을 합쳐 한 번에 공동 학습.\n- [Sec 3.3] 최종 학습 목적함수. diffusion image branch(Eq.7)와 action expert(Eq.9)를 합한 loss로 동시(jointly) 최적화. VLM/멀티모달 이해 모듈은 frozen, diffusion 생성 가지와 action expert만 업데이트.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l)\n$$\n\n- **무슨 식?**: 추론 때는 한 timestep τ*만, 한 번의 forward로 cache만 뽑는다(영상/이미지 디코딩 없음).\n- [Eq.10, Sec 3.4 Efficient Inference] 추론 시 전체 editing denoising trajectory를 돌리지 않고, 고정된 editing timestep τ*에서 editing-branch를 단 한 번만 forward해 cache를 얻음. edited image는 디코딩하지 않음.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}})\n$$\n\n- **무슨 식?**: 그 cache 하나에 조건화해 행동 chunk를 바로 샘플 → reason-before-act는 유지, dense 미래토큰은 생략.\n- [Eq.11, Sec 3.4] action expert가 cache C_edit^τ*에 조건화되어 action sample을 denoising으로 생성, action chunk â_{t:t+H}를 샘플링. video WAM이 다중 프레임의 dense spatio-temporal token을 denoise/decode하는 것과 달리, layer별 editing cache 한 세트만 컨텍스트로 직접 사용.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → 5.1.2가 FLUX.2 백본으로 구체화하는 전체 파이프라인(editing backbone → KV feature → Action Expert via joint attention → action) 구조를 한 장으로 보여주는 유일한 아키텍처 그림.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nFLUX.2-based ImageWAM (Sec 5.1.2가 본문 Sec 3.2-3.4를 instantiate)\n설계 근거: FLUX.2의 double-stream/single-stream 구조 + KV-cache 조건화.\n\nINPUTS:  o_t (현재 관측)        l (language instruction)        [학습 only] o_{t+H+1} (target frame)\n            |                          |                                   |\n            v                          v                                   |\n   +-------------------------------------------------+                     |\n   |  FROZEN: Qwen3-4B/8B  (FLUX.2의 원본 사전학습 LLM)|  <-- \"LLM module is the original\n   |  + VLM / 멀티모달 이해 모듈 (frozen)              |       pretrained Qwen3-4B/8B\"\n   +-------------------------------------------------+\n            | language/visual context tokens\n            v\n   +=================================================+        joint self-attention\n   |  EDITING BACKBONE  f_edit (TRAINABLE diffusion) |        (4 token 종류:\n   |                                                 |         language / visual-cond /\n   |   [A] DOUBLE-STREAM stage                       |         visual-pred / action)\n   |       image stream  ||  text stream  (분리)      |\n   |            |                                    |\n   |   [B] SINGLE-STREAM stage (image+text 합쳐진 1흐름)|\n   |                                                 |\n   |   timestep τ 에서 layer별 KV 추출:               |\n   |     C_edit^τ = {(K_ℓ^τ, V_ℓ^τ)}_{ℓ=1..L}  (Eq.5)|----+ KV cache (조건)\n   +=================================================+    |\n            | (학습) velocity u_φ -> L_img (Eq.7)         |\n            v                                             |\n       [학습] 미래 frame 예측 손실                          |  joint attention으로 전달\n       [추론] τ* 한 스텝만, 이미지 디코딩 X (Eq.10)          |  (action->others 단방향 mask;\n                                                          |   noisy token은 context만 attend)\n                                                          v\n                       a_s = (1-s)a* + s·ε_a  --->  +---------------------------+\n                       (Eq.8, action flow time s)   |  ACTION EXPERT  v_θ        |\n                       + robot state + action noise |  = Action DiT (TRAINABLE)  |\n                                                    |  FLUX.2 변형 크기:          |\n                                                    |   4B판 642M / 9B판 952M     |\n                                                    |  init: lower<-double-stream |\n                                                    |        image stream weights |\n                                                    |        higher<-single-stream|\n                                                    |        blocks               |\n                                                    +---------------------------+\n                                                          | velocity 예측\n                                                          v\n                                          [학습] L_act (Eq.9),  total L = L_act + L_img\n                                          [추론] â_{t:t+H} ~ p_θ(·| o_t,l,C_edit^τ*) (Eq.11)\n                                                          v\n                                                   action chunk a_{t:t+H}\n\n핵심: 미래 video token / edited image를 디코딩하지 않고 KV cache만 action 조건으로 사용.\n(주: double/single-stream 내부 layer 수·차원 등 세부는 5.1.2에 수치로 명시되지 않음 — 위는\n 본문 서술 기반 데이터흐름이며 추측 부분 없음.)\n```\n\n**학습 / 추론**\n\n[학습 시 / Train-time] editing branch와 action expert를 공동 학습 L = L_act + L_img (Eq.9 + Eq.7). editing denoising timestep τ를 매번 무작위 샘플링해 그 τ에서 editing branch를 돌리고 layer별 KV cache C_edit^τ를 추출(Eq.5). τ를 샘플링함으로써 action expert를 \\\"editing caches from different stages of the denoising process\\\"에 노출시킨다. 동시에 editing branch는 보간 latent z_r(Eq.6)에서 미래 endpoint frame velocity를 예측하도록 L_img로 학습되어 cache가 유용한 시각-변환 정보를 담게 된다. action expert는 보간 action a_s(Eq.8)와 (o_t, l, C_edit^τ)에 조건화되어 velocity를 회귀(L_act, Eq.9). VLM/멀티모달 이해 모듈은 frozen, diffusion 생성 가지와 action expert만 업데이트. FLUX.2 변형의 Action DiT 초기화는 double-stream image stream(lower) + single-stream blocks(higher) 가중치 복사. (참고: Fast-WAM-style 변형은 미래 video token을 학습 때만 video co-training에 쓰고 추론 땐 제거.)\\n\\n[추론 시 / Test-time — 질문의 핵심 메커니즘] ImageWAM은 추론 때 target frame을 디코딩하지 않고, 완성된 edited image도 만들지 않는다 (\\\"does not decode the target frame at inference time\\\"; \\\"avoids full future-video generation and also does not require decoding a complete edited image\\\"). 대신 (1) 고정된 editing denoising timestep τ*를 선택해 editing-branch를 단 한 번만 forward해서 KV cache C_edit^τ*만 얻고(Eq.10), (2) flow-matching action expert를 그 KV cache(= image-editing denoising이 만든 cache)에 조건화하여 action chunk â_{t:t+H} ~ p_θ(·|o_t,l,C_edit^τ*)를 denoising으로 샘플링한다(Eq.11). 즉 train은 다양한 τ에서 cache를 뽑아 노출시키지만, infer는 단일 τ*·단일 forward로 cache만 추출 → video WAM이 다중 미래 프레임의 dense spatio-temporal token을 denoise/decode하는 것과 달리 layer별 cache 한 세트만 컨텍스트로 직접 사용한다. 이로써 reason-before-act 원리는 유지하면서 dense 미래-video token 생성을 피한다. 핵심 인용: \\\"it conditions a flow-matching action expert on the KV caches produced by image-editing denoising, using them as a compact world-action context.\\\"\n\n**숫자**\n- FLUX.2 변형 Action DiT 파라미터: 4B판 642M, 9B판 952M (섹션 5.1.2 본문)\n- 효율(abstract): video-WAM 대비 FLOPs ~1/6, latency ~1/4\n- Table 5 latency/FLOPs: ImageWAM 263 ms / 9.72 TFLOPs; FastWAM(1 Step) 302 ms / 13.21 TFLOPs; FastWAM-IDM 1081 ms / 63.65 TFLOPs\n- RoboTwin2.0 평균 성공률: clean 93.20%, randomized 93.56% (Table 1)\n- LIBERO 평균 98.4% (Spatial 97.2 / Object 99.2 / Goal 98.8 / Long 98.4) (Table 2)\n- LIBERO-Plus 평균 83.1% — FLUX.2 4B 변형 (Camera 80.8 / Robot 50.3 / Language 91.4 / Light 98.1 / Background 85.5 / Noise 93.8 / Layout 80.5) (Table 3)\n- Real-world 평균 84.5% (Stack Bowls 94 / Fold Towel 84 / Open Drawer 78 / Hang Cup 82) (Table 4)\n- 참고 비교 OmniGen2 변형 Action DiT ~760M, Ovis-U1 변형 ~1.1B (DiT hidden dim 1024, attention hidden dim 2520 — OmniGen2 기준)\n\n---\n\n## 5.1.3 Ovis-U1-based ImageWAM\n\n**핵심**\n- ImageWAM의 세 가지 backbone 변형(OmniGen2, FLUX.2, Ovis-U1) 중 하나로, Ovis-U1 image-editing 모델을 visual editing backbone으로 사용하는 인스턴스화 설명이다. 세 변형 모두 MoT(Mixture of Tokens) 구조를 multimodal joint modeling 아키텍처로 채택한다.\n- LLM 백본은 Ovis-U1이 학습·vision-language fine-tune한 Qwen3-1.7B를 그대로 사용하고, Ovis-U1의 약 1.2B-parameter diffusion visual decoder를 visual editing backbone으로 채택한다.\n- 이 모델에서는 language context tokens에 LLM이 처리한 vision-language tokens도 포함된다 (즉 VLM 출력이 context로 흐른다).\n- Ovis-U1이 FLUX와 유사한 MMDiT 구조를 쓰므로, Action DiT 초기화는 FLUX.2-based ImageWAM 변형과 동일한 전략(double-stream/single-stream 가중치 복사)을 그대로 적용한다.\n- 모델이 상대적으로 작기 때문에 (OmniGen2 변형과 달리) DiT hidden dimension을 줄이지 않는다. 최종 Action DiT 크기는 1.1B parameters이다.\n- 5.1.3는 순수 아키텍처 인스턴스화 절이라 새 수식을 도입하지 않는다. 실제 작동 메커니즘(KV cache 조건화, action flow-matching, 효율적 추론)은 본문 3.2~3.4에 정의되어 있고 이 변형도 그대로 따른다.\n- 핵심 메커니즘: editing branch를 denoising 중간에 한 번만 돌려 layer별 key-value cache C_edit를 뽑고, action expert가 이 cache에 joint attention으로 조건화해 action chunk를 flow-matching으로 생성한다. future frame을 디코딩하지 않는다.\n- 효율: video 기반 WAM 대비 FLOPs를 1/6, latency를 1/4로 줄인다 (Table 5: ImageWAM 263 ms / 9.72 TFLOPs vs FastWAM-IDM 1081 ms / 63.65 TFLOPs).\n\n**왜 / 직관**\n\n왜 Ovis-U1 변형을 따로 두는가: ImageWAM의 핵심 아이디어(미래 비디오를 생성하지 말고 image-editing backbone의 내부 KV cache를 'world-action 중간표현'으로 재활용)는 backbone에 독립적이다. 그래서 저자들은 같은 레시피를 성격이 다른 세 편집모델에 끼워 본다 — OmniGen2(중간), FLUX.2(큰 Qwen3-4B/8B), 그리고 여기 Ovis-U1(작은 Qwen3-1.7B). 비유하자면, 동일한 '엔진(action expert + KV-cache 조건화)'을 차체 크기가 다른 세 차에 이식하는 것이다. Ovis-U1은 작은 차체라 두 가지 조정이 생긴다. (1) Ovis-U1의 MMDiT가 FLUX의 double/single-stream 구조를 닮았으니 FLUX.2 변형에서 쓴 '아래층은 image stream 가중치 복사, 위층은 single-stream 가중치 복사' 초기화를 그대로 빌려 쓴다 (바퀴 규격이 같으니 같은 타이어를 끼우는 격). (2) OmniGen2 변형에서는 Action DiT가 너무 커지지 않게 hidden dim을 1024로 줄였지만, Ovis-U1은 backbone 자체가 작아서 줄일 필요가 없다 — 작은 차에는 작은 엔진이 이미 맞으니 다운사이징 불필요. 결과적으로 Action DiT는 1.1B로 안착한다. weight-copy 초기화의 직관은 '학습 초반 action head의 noisy gradient가 visual model을 망치지 않도록, 이미 잘 학습된 editing 모델 가중치를 그대로 복사해 출발점을 안정화'하는 것이다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **MoT multimodal backbone (Ovis-U1)** — 목적: Ovis-U1 image-editing 모델을 ImageWAM의 backbone으로 인스턴스화 — 세 변형 공통 MoT(Mixture of Tokens) joint-attention 구조 · 입력→출력: 입력: 현재 관측 o_t (image) + task instruction l (text) -> 출력: language/visual condition/visual prediction/action 4종 token에 대한 joint self-attention 표현 · 내부: 5.1.3: LLM은 Ovis-U1이 vision-language fine-tune한 Qwen3-1.7B 사용, visual editing backbone은 Ovis-U1의 ~1.2B diffusion visual decoder. 이 변형에서는 language context tokens가 LLM이 처리한 vision-language tokens까지 포함한다. (5.1.1 정의: joint self-attention에서 action tokens는 다른 token에 one-way로 attend, noisy token은 context token에만 attend해 context를 clean하게 유지.)\n- **Visual editing backbone (~1.2B diffusion decoder, MMDiT)** — 목적: 현재 관측+명령을 받아 task-conditioned visual transformation을 추론하고, 그 중간 KV cache를 world-action 중간표현으로 제공 · 입력→출력: 입력: o_t, l, denoising timestep tau -> 출력: layer별 key-value cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L} (Eq.5). (학습 시엔 미래 endpoint frame hat o_{t+H+1}도 예측; 추론 시 디코딩 안 함) · 내부: Ovis-U1의 MMDiT는 FLUX와 유사. editing branch는 L_img(Eq.7)로 미래 endpoint frame latent z*_{t+H+1}로의 velocity를 예측하도록 학습돼 cache 품질을 보장. 최종 편집 이미지를 디코딩하지 않고도 cache에 task-conditioned 정보가 담긴다. VLM/multimodal understanding 모듈은 FROZEN, diffusion 생성 branch만 학습.\n- **Action DiT / Action Expert (1.1B params)** — 목적: editing cache를 실행 가능한 robot action으로 변환 — flow-matching으로 action chunk 생성 · 입력→출력: 입력: 보간 action 샘플 a_s, flow time s, o_t, l, editing cache C_edit^tau -> 출력: action velocity field v_theta (학습) / action chunk a_{t:t+H} (추론, 길이 H=16) · 내부: 5.1.3 핵심: Ovis-U1이 FLUX-like MMDiT이므로 FLUX.2 변형과 동일한 init 전략 — 아래층은 double-stream의 image stream 가중치 복사, 위층은 single-stream block 가중치 복사. OmniGen2 변형(hidden dim 1024로 축소)과 달리 모델이 작아 hidden dimension을 줄이지 않음. 최종 1.1B. 학습 목적은 L_act(Eq.9, KV-cache 조건화 flow-matching), 전체 L = L_act + L_img joint 최적화.\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l)\n$$\n\n- **무슨 식?**: editing 모델을 한 step 돌려 layer별 K/V를 뽑아 'world-action 중간표현'으로 쓴다 (이미지 디코딩 없이).\n- (Eq. 5, 3.2절) editing backbone f_edit를 현재 관측 o_t와 명령 l로 denoising timestep tau에서 한 번 돌려, transformer 각 layer ell(1..L)의 key-value 쌍 (K,V)을 모은 editing cache C_edit. 최종 편집 이미지를 디코딩하지 않고도 task-conditioned visual transformation 정보를 담는다. 5.1.3의 Ovis-U1 변형도 이 cache 메커니즘을 그대로 쓴다.\n\n$$\n\\mathbf{a}_{s}=(1-s)\\mathbf{a}^{*}_{t:t+H}+s\\epsilon_{a}\n$$\n\n- **무슨 식?**: 정답 action과 noise를 s로 섞어 flow-matching 학습 샘플을 만든다.\n- (Eq. 8, 3.3절) action flow-matching의 보간 샘플. 정답 action chunk a*_{t:t+H}와 Gaussian noise eps_a를 flow time s in (0,1)로 선형 보간 — s=0이면 정답, s=1이면 순수 noise. action expert가 풀어야 할 denoising 경로의 입력점을 만든다.\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: action expert가 editing KV cache에 조건화해 action velocity를 회귀하도록 학습 (KV-cache 조건화의 핵심 식).\n- (Eq. 9, 3.3절) action expert v_theta가 보간 샘플 a_s를 입력받고 o_t, l, editing cache C_edit^tau에 조건화되어 velocity field (eps_a - a*)를 예측하는 flow-matching loss. 여기서 s는 action flow time, tau는 cache를 뽑은 image-editing denoising timestep이며 학습 중 tau를 무작위 샘플링해 다양한 denoising 단계의 cache에 노출시킨다. 이것이 KV-cache 조건화의 수학적 정의 — 5.1.3의 Action DiT(1.1B)가 학습되는 목적함수.\n\n$$\n\\mathcal{L}_{\\mathrm{img}}=\\mathbb{E}_{z^{*},\\epsilon_{z},r}\\left[\\left\\|u_{\\phi}(z_{r},r\\mid o_{t},l)-(\\epsilon_{z}-z^{*}_{t+H+1})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: editing branch가 미래 endpoint frame을 예측하도록 유지해 cache 품질을 보장하는 보조 loss.\n- (Eq. 7, 3.3절) image editing 목적함수. velocity predictor u_phi가 보간 image latent z_r을 받아 미래 endpoint frame latent z*_{t+H+1}로 가는 velocity를 예측. 이 보조 목적이 editing branch가 task-relevant 미래 시각상태를 예측하는 능력을 유지시켜 추출되는 editing cache가 유용한 정보를 담게 한다. 전체 loss는 L = L_act + L_img로 두 branch를 joint 최적화.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l)\n$$\n\n- **무슨 식?**: 추론 시 고정 timestep tau*에서 editing branch를 단 1회 forward해 cache만 추출.\n- (Eq. 10, 3.4절 Efficient Inference) 추론 시에는 전체 denoising trajectory를 돌리지 않고 고정된 단일 timestep tau*에서 editing branch를 단 한 번 forward해 cache를 얻는다. 편집 이미지도, 미래 비디오도 디코딩하지 않는다 — 이것이 효율(FLOPs 1/6, latency 1/4)의 근원.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}})\n$$\n\n- **무슨 식?**: action expert가 cache에 조건화해 action chunk를 denoising 생성 (미래 프레임 디코딩 없음).\n- (Eq. 11, 3.4절) action expert가 단일-step editing cache C_edit^{tau*}에 조건화해 action noise를 denoising하여 action chunk a_{t:t+H}를 생성. target frame을 디코딩하지 않고 image-editing denoising의 KV cache에 flow-matching action expert를 조건화한다는 추론 메커니즘이 바로 이 식 (Eq.10→11).\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → 5.1.3의 Action DiT/Action Expert가 image-editing backbone의 중간 KV features에 joint attention으로 조건화되어 action a_{t:t+H}를 예측하는 전체 파이프라인 — 이 절이 인스턴스화하는 구조를 그대로 보여준다.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nSection 5.1.3 Ovis-U1-based ImageWAM  (instantiation; mechanism from sec 3.2-3.4)\n\n  Inputs:  current obs o_t        task instruction l        robot state, action noise eps_a\n              |                          |\n              v                          v\n   +---------------------------------------------------------+\n   |  Ovis-U1 backbone (MoT joint-attention)                 |\n   |                                                          |\n   |  [LLM] Qwen3-1.7B  (FROZEN, by Ovis-U1)                  |\n   |     -> language context tokens                           |\n   |        (INCLUDE vision-language tokens from LLM)  <-- 5.1.3 특이점\n   |                                                          |\n   |  [Visual editing backbone] ~1.2B diffusion decoder       |\n   |     MMDiT (FLUX-like double/single stream)               |\n   |     run ONE denoising step at timestep tau               |\n   |        => per-layer key-value cache                      |\n   |           C_edit^tau = {(K_l, V_l)}_{l=1..L}   (Eq.5)    |\n   +---------------------------------------------------------+\n              |  C_edit^tau  (KV features, NO image decode)\n              v\n   +---------------------------------------------------------+\n   |  Action DiT / Action Expert  = 1.1B params               |\n   |   init = FLUX.2 strategy (lower<-image-stream copy,      |\n   |          higher<-single-stream copy); hidden dim NOT cut |\n   |   joint attention over: lang ctx | vis cond | vis pred | action tokens\n   |   conditions on C_edit^tau                               |\n   |   v_theta(a_s, s | o_t, l, C_edit^tau)  flow-matching    |\n   +---------------------------------------------------------+\n              |\n              v\n   action chunk  a_{t:t+H}   (length H=16)\n\n  TRAIN  : tau ~ random denoising step; run full obj L = L_act(Eq.9) + L_img(Eq.7);\n           VLM frozen, only diffusion branch + action expert updated.\n  INFER  : fix single tau*, ONE editing forward -> C_edit^{tau*} (Eq.10),\n           then a_{t:t+H} ~ p_theta(.|o_t,l,C_edit^{tau*}) (Eq.11);\n           NO future-video, NO edited-image decode -> FLOPs 1/6, latency 1/4.\n```\n\n**학습 / 추론**\n\n학습(train-time)과 추론(test-time)이 명확히 다르다. [학습] denoising timestep tau를 매번 무작위 샘플링하고 editing branch를 그 timestep에서 돌려 layer별 KV cache C_edit^tau를 추출(Eq.5). action expert는 보간 action a_s(Eq.8)를 받아 o_t,l,C_edit^tau에 조건화된 velocity를 회귀(L_act, Eq.9). 동시에 editing branch는 미래 endpoint frame을 예측(L_img, Eq.7). 두 loss를 합쳐 L = L_act + L_img로 diffusion branch와 action expert를 joint 학습하며, VLM/이해 모듈은 frozen. tau를 무작위로 두는 이유는 action expert가 denoising의 여러 단계에서 나온 cache에 강건해지도록 노출시키기 위함. Fast-WAM-style 변형은 학습 때만 future video token을 co-training에 쓰고 추론 때 제거한다. [추론] 핵심 효율 메커니즘 — full future-video generation도, 완전한 edited image 디코딩도 하지 않는다. 전체 denoising trajectory 대신 고정된 단일 editing denoising timestep tau*를 골라 editing branch를 단 한 번 forward해 C_edit^{tau*}를 얻고(Eq.10), action expert가 이 cache에 조건화해 action noise를 denoising하여 action chunk를 샘플링한다(a_{t:t+H} ~ p_theta(.|o_t,l,C_edit^{tau*}), Eq.11). 즉 target frame을 디코딩하지 않고 image-editing denoising 과정의 KV cache에 flow-matching action expert를 조건화하는 것이 추론 메커니즘이다. video WAM은 여러 미래 프레임의 dense spatio-temporal token을 denoising+decode하는 반면, ImageWAM은 layer별 editing cache 한 세트만 계산해 action expert의 context로 직접 쓴다.\n\n**숫자**\n- Ovis-U1 변형 LLM 백본: Qwen3-1.7B (Ovis-U1이 vision-language fine-tune)\n- Ovis-U1 diffusion visual decoder: 약 1.2B parameters (visual editing backbone)\n- Ovis-U1 변형 Action DiT 최종 크기: 1.1B parameters (hidden dim 미축소)\n- 비교) OmniGen2 변형 Action DiT: 약 760M (hidden dim 1024, attention hidden dim 2520)\n- 비교) FLUX.2 변형 Action DiT: 642M (4B 버전), 952M (9B 버전)\n- 효율: FLOPs를 video-WAM의 1/6, latency를 1/4로 감소 (abstract)\n- Table 5 (A6000 GPU, lower is better): ImageWAM 263 ms / 9.72 TFLOPs\n- Table 5: FastWAM-IDM 1081 ms / 63.65 TFLOPs (Video); FastWAM(1 Step) 302 ms / 13.21 TFLOPs (Cache)\n- latency 1081 ms -> 263 ms, FLOPs 63.65 -> 9.7로 감소 (4.3절 서술)\n- 벤치마크 성공률: RoboTwin 2.0 평균 93.20% (randomized setting 93.56%)\n- LIBERO 평균 98.4%; LIBERO-Plus 평균 83.1%; Real-World 평균 84.5%\n- 학습 설정: H20 GPU 8장, action chunk 길이 16, 미래 관측 16 frames ahead 예측; LIBERO 입력 224x448 / 10 epochs, RoboTwin 입력 288x256 / 5 epochs\n\n---\n\n## 5.2 Training Details\n\n**핵심**\n- 전체 학습 인프라: 모든 모델을 8x NVIDIA H20 GPU에서 학습. 분산은 기본적으로 DeepSpeed ZeRO-1, FLUX.2 9B 변형만 모델이 커서 ZeRO-2 사용. 정밀도 bf16, optimizer AdamW. (Table 8)\n- 공통 하이퍼파라미터(Table 8): AdamW betas (0.9, 0.95), learning rate 1e-4, weight decay 1e-2, LR scheduler = warmup cosine, warmup steps = 0.05 x T_total, minimum LR = 0.01 x lr, gradient clipping 1.0.\n- LIBERO 전처리: 2개 카메라 뷰를 가로(horizontal)로 concat 후 224x448로 resize. 16 프레임 앞의 future observation과 길이 16의 action chunk를 예측. 4개 LIBERO suite를 합친 데이터셋으로 10 epoch 학습.\n- RoboTwin 전처리: 2개 wrist-view를 작은 해상도로 resize해 가로 concat -> 이를 main-view 이미지와 세로(vertical) concat -> 최종 288x256로 resize. 마찬가지로 16프레임 future observation + 길이 16 action chunk 예측, 5 epoch 학습. (Table 9)\n- Real-World 데이터셋: RoboTwin과 동일한 전처리. 16 action step 예측, 4개 task 전체로 10 epoch 학습. (Dobot XTrainer dual-arm, 4 task x 100 trajectory, 30k step)\n- 학습 비용(Table 10): LIBERO에서 OmniGen2/Ovis-U1/FLUX.2 4B는 약 18시간(batch/GPU 12/16/10), FLUX.2 9B는 1.6일(batch 12). RoboTwin은 OmniGen2/FLUX.2 4B 모두 5일, batch/GPU 48 (gradient accumulation 3-step 적용한 effective batch).\n- 이 섹션(5.2, Appendix)은 수식이나 그림을 직접 포함/참조하지 않음 - Table 8/9/10만 참조. 효율 수치(FLOPs 1/6, latency 1/4)와 벤치마크 성공률은 본문 Experiments 섹션(Table 5, Table 3/4 등)에 있으며 5.2의 학습 설정이 그 결과를 뒷받침함.\n- 핵심 학습 설계(이 섹션이 전제하는 메서드): 학습 중 editing denoising timestep tau를 랜덤 샘플링해 editing branch를 그 timestep에서 돌리고, 각 transformer layer의 KV cache C_edit^tau를 모아 action expert를 조건화. 손실은 L = L_act + L_img로 image branch와 action expert를 공동 최적화.\n- Train vs Inference 핵심 차이: 학습은 tau를 랜덤 샘플링(다양한 denoising 단계의 cache에 노출)하지만, 추론은 고정 timestep tau*에서 editing-branch를 단 1 step만 forward해 C_edit^{tau*}만 뽑고 target/future frame은 디코딩하지 않음. action expert가 이 cache에 조건화돼 action chunk만 flow-matching denoising으로 생성.\n\n**왜 / 직관**\n\n왜 이렇게 학습하나: ImageWAM의 핵심 주장은 \"로봇이 행동하려고 미래 영상 전체를 그릴 필요는 없다, 소스 관찰을 명령에 맞게 어떻게 '편집(edit)'해야 하는지의 내부 추론만 빌려오면 된다\"이다. 그래서 5.2의 학습 설정도 무거운 video 생성이 아니라 image-editing backbone(OmniGen2 / Ovis-U1 / FLUX.2) 위에 가벼운 action expert를 붙여 짧은 학습(LIBERO 10 epoch, RoboTwin 5 epoch)으로 끝낸다. 비유하자면, 화가에게 \"완성된 미래 그림을 한 장 그려 보여줘\"라고 시키지 않고(=video WAM), \"이 사진을 지시대로 고치려면 머릿속에서 어디를 어떻게 바꿀 생각이냐(=중간 스케치/메모, KV cache)\"만 받아 그 메모를 보고 로봇 손을 움직이는 셈이다. 학습 때 tau를 랜덤하게 흔드는 것은, 그 '머릿속 편집 메모'를 denoising의 초반/중반/후반 등 여러 시점에서 두루 보여줘 action expert가 특정 한 시점 cache에만 과적합되지 않게 하는 일종의 augmentation이다. 멀티뷰를 한 장의 큰 이미지로 가로/세로 concat해서 넣는 것도, 별도 멀티스트림 인코더 없이 기존 single-image editing backbone을 그대로 재활용하기 위한 실용적 트릭이다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image Editing Backbone (f_edit)** — 목적: 현재 관찰 o_t를 언어 명령 l에 맞춰 \"어떻게 편집해야 하는가\"를 내부 추론하고, 그 추론을 layer별 KV cache로 노출. 5.2에서 학습되는 본체(OmniGen2 / Ovis-U1 / FLUX.2 4B/9B 변형). · 입력→출력: 입력: 멀티뷰를 concat·resize한 단일 이미지 (LIBERO 224x448, RoboTwin 288x256) + language instruction l. 출력(학습 시): 미래 endpoint frame latent z*_{t+K}로 향하는 velocity (L_img); 동시에 모든 L개 layer의 KV cache C_edit^tau = {(K_l^tau, V_l^tau)}_{l=1..L}. · 내부: 학습 중 editing denoising timestep tau를 랜덤 샘플링해 backbone을 tau에서 돌리고 각 layer의 KV를 수집. cache는 visual latent가 instruction과 backbone을 통해 상호작용한 뒤 계산됨. flux.2 9B는 ZeRO-2(VRAM), 나머지는 ZeRO-1로 분산 학습. 손실 L_img = E[|| u_phi(z_r, r | o_t,l) - (eps_z - z*_{t+K}) ||^2].\n- **Action Expert (v_theta, flow-matching head)** — 목적: editing backbone의 KV cache에 조건화해 실행 가능한 로봇 action chunk를 생성. \"편집 추론 -> 로봇 제어\" 변환을 담당. · 입력→출력: 입력: noisy action a_s (action flow time s) + 현재 관찰 o_t + instruction l + editing cache C_edit^tau (학습) / C_edit^{tau*} (추론). 출력: 길이 H=16의 action chunk에 대한 velocity field (학습) -> 샘플링하면 a_hat_{t:t+H} (추론). · 내부: joint attention으로 editing의 중간 KV feature를 통합. 손실 L_act = E[|| v_theta(a_s, s | o_t,l, C_edit^tau) - (eps_a - a*_{t:t+H}) ||^2]. action token은 다른 token에 one-way로 attend, noisy token은 context token에만 attend해 context를 깨끗하게 유지(Appendix 5.1). 추론 시 3 action denoising step 사용.\n\n**수식**\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau}=\\left\\{(K_{\\ell}^{\\tau},V_{\\ell}^{\\tau})\\right\\}_{\\ell=1}^{L}=f_{\\mathrm{edit}}^{\\tau}(o_{t},l)\n$$\n\n- **무슨 식?**: editing backbone을 timestep tau에서 1회 돌려 뽑은 layer별 KV cache = 행동 조건이 되는 world-action 중간표현\n- (5.2가 전제하는 메서드 식, 본문 Sec3.2) editing backbone f_edit를 denoising timestep tau에서 한 번 돌려, 모든 transformer layer ell=1..L의 key/value 쌍 (K,V)를 모은 것이 editing KV cache C_edit^tau. 입력은 현재 관찰 o_t와 언어 명령 l. 즉 \"명령에 맞춰 소스 이미지를 어떻게 편집할지\"의 내부 추론 상태를 캐시로 추출.\n\n$$\n\\mathcal{L}_{\\mathrm{img}}=\\mathbb{E}_{z^{*},\\epsilon_{z},r}\\left[\\left\\|u_{\\phi}(z_{r},r\\mid o_{t},l)-(\\epsilon_{z}-z^{*}_{t+K})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: editing branch가 task-relevant 미래 endpoint 프레임을 향한 velocity field를 학습하는 image flow-matching loss\n- (메서드 식) image editing branch의 flow-matching 손실. 속도예측기 u_phi가 noisy latent z_r(시각 flow time r)과 조건 o_t,l을 받아, 목표 미래 endpoint frame latent z*_{t+K}로 가는 velocity (eps_z - z*_{t+K})를 맞추도록 학습. = \"미래 endpoint 프레임을 예측하는 편집 능력\"을 유지하는 항.\n\n$$\n\\mathcal{L}_{\\mathrm{act}}=\\mathbb{E}_{\\mathbf{a}^{*},\\epsilon_{a},s,\\tau}\\left[\\left\\|v_{\\theta}(\\mathbf{a}_{s},s\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau})-(\\epsilon_{a}-\\mathbf{a}^{*}_{t:t+H})\\right\\|_{2}^{2}\\right]\n$$\n\n- **무슨 식?**: action expert가 editing KV cache에 조건화돼 길이 H action chunk의 velocity field를 맞추는 action flow-matching loss\n- (메서드 식) action expert의 flow-matching 손실. 속도예측기 v_theta가 noisy action a_s(action flow time s), 현재 관찰/명령, 그리고 editing cache C_edit^tau에 조건화돼, GT action chunk a*_{t:t+H}로 향하는 velocity (eps_a - a*)를 예측. tau에 대해서도 기대값을 취해(랜덤 샘플링) 여러 denoising 단계의 cache에 노출. = \"편집 추론을 실행 가능한 action으로 변환\"하는 항.\n\n$$\n\\mathcal{L}=\\mathcal{L}_{\\mathrm{act}}+\\mathcal{L}_{\\mathrm{img}}\n$$\n\n- **무슨 식?**: image-editing loss + action loss를 합쳐 두 분기를 공동 학습하는 전체 목적함수\n- (메서드 식, 5.2의 \"jointly optimize\"가 가리키는 총 목적함수) image editing branch와 action expert를 동시에 최적화하는 합산 손실. 5.2의 단일 학습 루프(8xH20, AdamW, lr 1e-4)가 이 L 하나를 내린다.\n\n$$\n\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}}=f_{\\mathrm{edit}}^{\\tau^{\\star}}(o_{t},l)\n$$\n\n- **무슨 식?**: 추론: editing branch 1 step만 돌려 tau* 시점 KV cache만 추출(프레임 디코딩 생략)\n- (추론 식, 메서드 Sec3.4) 추론 시에는 full denoising trajectory를 돌리지 않고 고정 timestep tau*에서 editing-branch를 단 1 step forward해 cache C_edit^{tau*}만 얻음. 완성된 편집 이미지는 디코딩하지 않음 -> 여기서 FLOPs/latency 절감이 발생.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H}\\sim p_{\\theta}(\\mathbf{a}_{t:t+H}\\mid o_{t},l,\\mathcal{C}_{\\mathrm{edit}}^{\\tau^{\\star}})\n$$\n\n- **무슨 식?**: 추론: 그 cache만 보고 action chunk를 flow-matching denoising으로 샘플링(미래 영상 생성 없음)\n- (추론 식) action expert가 위에서 얻은 C_edit^{tau*}에만 조건화해 action chunk a_{t:t+H}를 denoising으로 샘플링. 즉 미래 영상/프레임 생성 없이 caches에서 바로 행동을 뽑음 (3 action denoising steps 사용).\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → 5.2의 학습 대상(editing backbone -> KV cache -> joint attention -> action expert)이 어떤 입출력으로 묶여 한 번에 공동 학습되는지를 한 장으로 보여주는 파이프라인 그림.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[Section 5.2 training data-flow / preprocessing — Table 9 설정을 본문 근거로 도식화]\n\nLIBERO (2 views):\n  view1 ─┐ horizontal concat        resize\n  view2 ─┴────────────────►  ┌──────────────┐  ─► input 224x448 ─► editing backbone f_edit\n                              └──────────────┘        (+ instruction l)\n  target: future obs @ +16 frames , action chunk len=16 , 10 epochs (4 suites merged)\n\nRoboTwin (3 views):\n  wristL ─┐ resize+H-concat   ┌─────────────┐\n  wristR ─┴──────────────────►│ wrist strip │─┐ vertical concat   resize\n                              └─────────────┘ ├──────────────►  input 288x256 ─► f_edit\n  main-view ──────────────────────────────────┘                    (+ instruction l)\n  target: future obs @ +16 frames , action chunk len=16 , 5 epochs\n\nJoint optimization (single loop, 8x H20, AdamW lr=1e-4, bf16):\n  o_t,l ─► f_edit(tau~rand) ─► C_edit^tau {(K_l,V_l)}_{l=1..L}\n                                  │ joint attention\n                                  ▼\n        L_img (editing velocity)  +  L_act (action velocity | C_edit^tau)  =  L  ──► AdamW step\n\nTrain vs Infer:\n  TRAIN : tau ~ random over denoising steps  (cache augmentation)\n  INFER : tau = tau* fixed, ONE editing forward step, NO future-frame decode\n          a_{t:t+H} ~ p_theta( . | o_t, l, C_edit^{tau*} )   [3 action denoising steps]]\n```\n\n**학습 / 추론**\n\n학습(train-time): 단일 학습 루프에서 L = L_act + L_img로 image editing branch와 action expert를 공동 최적화. editing denoising timestep tau를 매 스텝 랜덤 샘플링해 editing branch를 그 tau에서 돌리고, 모든 L개 layer의 KV cache C_edit^tau를 추출해 action expert를 조건화한다(다양한 denoising 단계의 cache에 노출시키는 효과). 멀티뷰는 concat 후 단일 이미지로 backbone에 입력. 인프라: 8x H20, bf16, AdamW(lr 1e-4, wd 1e-2, betas 0.9/0.95), warmup cosine(warmup 0.05*T_total, min LR 0.01*lr), grad clip 1.0; LIBERO 10 epoch / RoboTwin 5 epoch / Real-World 10 epoch(30k step).\\n\\n추론(test-time, ImageWAM 핵심): full image-editing denoising trajectory를 돌리지 않는다. 고정된 editing denoising timestep tau*를 골라 editing-branch를 단 1 step만 forward해 cache C_edit^{tau*} = f_edit^{tau*}(o_t, l)만 얻는다. 완성된 편집/미래 프레임을 디코딩하지 않는 것이 핵심 — flow-matching action expert를 이 image-editing denoising의 KV cache에만 조건화한다. 그 다음 a_hat_{t:t+H} ~ p_theta(a | o_t, l, C_edit^{tau*})로 action chunk만 (3 action denoising step) 샘플링. 미래 영상 생성을 통째로 생략하므로 video-WAM 대비 FLOPs 63.65->9.72 TFLOPs(~1/6), latency 1081ms->263ms(~1/4) 절감(본문 Table 5, A6000). 추가로 torch.compile + static CUDA graph로 ~3x(최대 4.38x) 추가 가속(Appendix Table 11, FastWAM식 prefix-only attention + image-denoising-free inference 병용).\n\n**숫자**\n- GPUs: 8x NVIDIA H20\n- Distributed: DeepSpeed ZeRO-1 (FLUX.2 9B만 ZeRO-2)\n- Precision: bf16, Optimizer: AdamW\n- AdamW betas: (0.9, 0.95)\n- Learning rate: 1e-4\n- Weight decay: 1e-2\n- LR scheduler: warmup cosine, warmup = 0.05 x T_total, min LR = 0.01 x lr\n- Gradient clipping: 1.0\n- LIBERO input: 2 views, horizontal concat, 224x448\n- RoboTwin input: 3 views (wrist H-concat + main V-concat), 288x256\n- Future horizon: 16 frames (both); Action chunk length: 16 (both)\n- Epochs: LIBERO 10, RoboTwin 5, Real-World 10 (30k steps)\n- Training time/batch (Table 10): LIBERO 18h (OmniGen2 b12 / Ovis-U1 b16 / FLUX.2-4B b10), FLUX.2-9B 1.6 days b12; RoboTwin 5 days b48 (grad-accum x3 effective); Real-World 18h b16\n- [본문 효율, 5.2 외] FLOPs ~1/6 (63.65 -> 9.72 TFLOPs), latency ~1/4 (1081ms -> 263ms), A6000 (Table 5)\n- [본문 효율, Appendix Table 11] torch.compile ~3x, static CUDA graph 4.38x speedup\n- [본문 성공률] RoboTwin2.0: clean 93.20% / randomized 93.56%; LIBERO avg 98.4%; LIBERO-Plus 83.1% (FLUX.2-4B), 85.21% (larger FLUX.2); Real-World avg 84.5% (vs pi0 55.8%, pi0.5 72.3%, FastWAM 79.0%)\n\n---\n\n## 6 Efficiency Optimization\n\n**핵심**\n- Section 6은 수식 없는 순수 엔지니어링 섹션이다. 목표=inference latency를 더 줄이는 것. 그림 참조 없고, Table 11(latency/speedup) 하나만 존재한다.\n- 두 가지 latency 전략을 FastWAM에서 차용해 ImageWAM에 적용: (1) prefix-only attention training, (2) image-denoising-free inference. 원문: \"we also evaluate on our model the prefix-only attention training and image-denoising-free inference strategy, similar to that adopted in FastWAM.\"\n- 추가로 torch.compile과 static CUDA graphs를 적용. 원문: \"we explore model optimization with 'torch.compile' and static CUDA graphs.\"\n- 컴파일만으로 거의 3x 속도 향상. 이유는 action head(Action DiT) 효율 개선 때문. action chunk가 짧아 action token 수가 적어서 Action DiT의 parallel 효율이 본래 suboptimal이었기 때문.\n- Table 11(모두 3 action denoising steps 기준): FastWAM 1x Vid. Denoise=302ms(1.00x) -> ImageWAM 1x Vid. Denoise=263ms(1.15x) -> Prefix Only(FastWAM 194ms/1.56x, ImageWAM 198ms/1.53x) -> 컴파일 누적: ImageWAM +Action Loop Compile=85ms, +Image Prefill Compile=77ms, +Action Static Graph=69ms(최종 4.38x). Speedup 기준점=FastWAM 1x video denoise(302ms).\n- 대표 효율 수치(abstract 주장, Section 6의 전제): video-based WAM 대비 FLOPs를 1/6, latency를 1/4로 감소. 원문: \"It also reduces FLOPs to 1/6 and latency to 1/4 of video-based WAMs.\"\n- Section 6의 'image-denoising-free inference'가 가리키는 실제 메커니즘(Section 3.4): 추론 시 전체 video 생성도, 완성된 edited image 디코딩도 안 함. 고정 editing denoising timestep tau-star에서 editing-branch를 단 1 step만 돌려 layer-wise KV cache(C_edit^{tau-star})만 뽑고, flow-matching action expert를 그 cache에 조건화해 action chunk를 디노이즈한다.\n- 벤치마크 성공률: RoboTwin2.0 평균 93.38%(Clean 93.20/Randomized 93.56), LIBERO 4-suite 평균 98.4%, LIBERO-Plus(FLUX.2 4B) 평균 83.1%, real-world 4 tasks 평균 84.5%.\n\n**왜 / 직관**\n\n비유: video-generation WAM은 \"미래 전체를 동영상으로 머릿속에 상영\"하는 방식이라 비싸고, task와 무관한 시각 디테일에까지 capacity를 낭비한다. ImageWAM은 미래 frame을 끝까지 그려내지 않고, image-editing backbone이 \"source 이미지를 instruction대로 어떻게 바꿀지\"를 추론하는 중간 표현(KV cache)만 추출해 action 예측의 context로 쓴다. Section 6은 여기서 한 발 더 나아간 \"엔지니어링 가속\" 단계다. 핵심 직관 두 가지: (1) image-denoising-free inference = 미래 이미지를 실제로 픽셀까지 디코딩할 필요가 없다. action을 뽑는 데 필요한 건 디노이징 도중의 layer-wise KV feature뿐이므로, denoising trajectory 전체를 다 돌지 말고 고정 timestep에서 단 한 번 forward만 해 cache를 만들면 된다(요리에 비유하면 완성된 요리 사진을 찍을 필요 없이, 레시피를 따라가는 '중간 조리 상태'만 손에 쥐고 바로 동작을 결정). (2) 컴파일이 3x나 먹히는 이유 = action token이 워낙 적어(짧은 action chunk) GPU가 한가하게 노는 작은 커널들의 launch overhead가 지배적이었고, torch.compile/CUDA graph가 그 overhead(커널 launch, Python 오버헤드)를 제거해주기 때문. 즉 알고리즘이 아니라 '작은 텐서에 대한 실행 오버헤드'를 잡은 것.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image Editing Backbone (f_edit) — KV cache producer** — 목적: 미래를 동영상/완성 이미지로 그리지 않고, source-grounded·instruction-guided 시각 변환을 추론해 그 중간 표현(layer-wise KV cache)을 만드는 것. Section 6의 image-denoising-free inference가 가속하는 대상. · 입력→출력: 입력: 현재 관측 o_t (image) + language instruction l (+ 추론 시 고정 editing timestep tau-star). 출력: editing cache C_edit^{tau-star} = {(K_l, V_l)}_{l=1..L}, 즉 L개 transformer layer 각각의 key/value 쌍. (학습 시엔 미래 frame o_hat_{t+H+1}을 합성할 수 있으나, 추론 시엔 완성 이미지를 디코딩하지 않음.) · 내부: 정의: f_edit^tau(o_t, l)는 editing denoising timestep tau에서 layer별 (K_l, V_l)을 산출(Eq.5). 내부 동작(추론, Section 3.4): 전체 denoising trajectory를 도는 대신 고정 timestep tau-star를 골라 editing-branch를 1회만 forward 해 C_edit^{tau-star}를 prefill(Eq.10). 즉 'image prefill' 단계이며 Section 6에서 +Image Prefill Compile로 따로 컴파일된다.\n- **Action Expert (flow-matching action head, Action DiT)** — 목적: editing KV cache를 context로 받아 미래 action chunk를 예측하는 policy head. flow-matching으로 action noise에서 action을 디노이즈한다. · 입력→출력: 입력: 현재 관측 o_t, instruction l, editing cache C_edit^{tau-star}, action noise epsilon_a (학습 시 추가로 robot state·ground-truth action a*·flow time s). 출력: 미래 action 시퀀스 a_hat_{t:t+H} (길이 H+1의 action chunk). · 내부: 정의: 추론은 p_theta(a_{t:t+H} | o_t, l, C_edit^{tau-star})에서 샘플링(Eq.11), joint attention으로 KV cache에 조건화. 내부 동작(학습): velocity field v_theta(a_s, s | o_t, l, C_edit^tau)를 flow-matching loss L_act(Eq.9)로 학습 — noisy action a_s(flow time s) 입력, target velocity (epsilon_a - a*_{t:t+H}) 회귀. 추론 시 3 action denoising steps만 사용(Table 11). Section 6 관찰: action token 수가 적어 이 Action DiT의 parallel 효율이 suboptimal -> torch.compile(+Action Loop Compile) 및 static CUDA graph(+Action Static Graph)로 가속해 거의 3x overall speedup의 주원인이 됨.\n\n**수식**\n\n$$\n\\mathcal{C}_{\\text{edit}}^{\\tau} = \\{(K_\\ell^{\\tau}, V_\\ell^{\\tau})\\}_{\\ell=1}^{L} = f_{\\text{edit}}^{\\tau}(o_t, l)\n$$\n\n- **무슨 식?**: 관측+instruction을 editing backbone에 넣어 각 layer의 (K,V)를 모은 게 '미래를 안 그리고도 쥐는' 압축된 world-action 중간표현.\n- editing(KV) cache 정의. image-editing backbone f_edit가 현재 관측 o_t와 language instruction l을 받아, editing denoising timestep tau에서 transformer 각 layer ℓ(총 L개)의 key K_ℓ, value V_ℓ 쌍을 모은 집합이 cache C_edit^tau다. K/V = task-conditioned visual transformation 정보를 담되 최종 edited image를 디코딩할 필요는 없음.\n\n$$\n\\mathcal{C}_{\\text{edit}}^{\\tau^\\star} = f_{\\text{edit}}^{\\tau^\\star}(o_t, l)\n$$\n\n- **무슨 식?**: 반복 image denoising을 통째로 버리고 고정 timestep 1-step forward로 KV cache만 prefill.\n- Eq.10 (Section 3.4, image-denoising-free inference). 추론 시 전체 denoising trajectory를 돌지 않고 고정된 단일 timestep tau-star를 골라 editing-branch를 단 1회 forward해 그 시점의 cache만 계산한다. 원문: 'we select a fixed editing denoising timestep tau-star and perform only one editing-branch forward step to obtain C_edit^{tau-star}'.\n\n$$\n\\hat{\\mathbf{a}}_{t:t+H} \\sim p_\\theta(\\mathbf{a}_{t:t+H} \\mid o_t, l, \\mathcal{C}_{\\text{edit}}^{\\tau^\\star})\n$$\n\n- **무슨 식?**: 미래 frame을 디코딩하는 대신, KV cache를 context로 받아 action chunk를 직접 디노이즈해 뽑는다.\n- Eq.11 (Section 3.4). action expert가 위에서 뽑은 단일 cache C_edit^{tau-star}에 조건화되어, 현재 관측 o_t·instruction l과 함께 길이 H+1의 미래 action chunk a_{t:t+H}를 (action noise로부터 디노이징해) 샘플링한다. cache가 곧 action 예측의 context.\n\n$$\n\\mathcal{L}_{\\text{act}} = \\mathbb{E}_{\\mathbf{a}^*, \\epsilon_a, s, \\tau}\\left[\\,\\left\\| v_\\theta(\\mathbf{a}_s, s \\mid o_t, l, \\mathcal{C}_{\\text{edit}}^{\\tau}) - (\\epsilon_a - \\mathbf{a}^*_{t:t+H}) \\right\\|_2^2 \\,\\right]\n$$\n\n- **무슨 식?**: action을 flow-matching으로 학습 — KV cache 조건 하에 noise->action velocity를 회귀(이것이 test-time의 flow-matching action expert).\n- Eq.9 (Section 3.3, action flow matching loss, 학습용). action flow time s에서 보간한 noisy action a_s를 입력으로, editing cache C_edit^tau에 조건화한 velocity field v_theta가 target velocity (epsilon_a - a*_{t:t+H})를 맞추도록 L2 회귀. 기대값은 ground-truth action a*, action noise epsilon_a, flow time s, editing timestep tau에 대해 취한다. 이 flow-matching action expert가 추론 시 Eq.11의 p_theta 역할.\n\n**그림 / 구조도**\n\n- (원본 그림 2 재참조) → Section 6 본문에 직접 인용된 그림은 없지만, 이 섹션이 가속하려는 추론 경로(editing backbone의 KV feature -> joint attention -> Action Expert -> action chunk)를 보여주는 유일한 파이프라인 그림. Section 6의 image-denoising-free inference가 바로 이 KV-feature 조건화 경로를 단일 prefill로 줄이는 것이라 근거 그림으로 적합.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[Section 6 optimization ladder — Table 11 데이터 흐름 재구성, 모두 3 action denoising steps]\n\n  기준점: FastWAM (1x video denoise) ............... 302 ms  (1.00x)\n            |\n            v  [video gen -> image editing 대체]\n  ImageWAM (1x Vid. Denoise) ...................... 263 ms  (1.15x)\n            |\n            v  [prefix-only attn training + image-denoising-free inference]\n  ImageWAM (Prefix Only) ......................... 198 ms  (1.53x)   (cf. FastWAM Prefix Only 194ms/1.56x)\n            |\n            v  [+ Action Loop Compile  (torch.compile on action head)]\n                                          ......... 85 ms  (3.55x)   <- 컴파일 ~3x 효과 (action token 적어 Action DiT 본래 비효율)\n            |\n            v  [+ Image Prefill Compile]\n                                          ......... 77 ms  (3.92x)\n            |\n            v  [+ Action Static Graph  (static CUDA graph)]\n                                          ......... 69 ms  (4.38x)   <- 최종\n\n  추론 시 핵심 메커니즘 (image-denoising-free, Section 3.4 근거):\n    (o_t, l)\n       |\n       v  f_edit^{tau-star}  (고정 timestep, 단 1 forward step -- 전체 denoising trajectory 생략)\n    C_edit^{tau-star} = { (K_l, V_l) }_{l=1..L}   (layer-wise KV cache; edited image 디코딩 안 함)\n       |\n       v  joint attention (조건화)\n    flow-matching Action Expert  p_theta( a | o_t, l, C_edit^{tau-star} )  -- action noise에서 3-step 디노이즈\n       |\n       v\n    a_hat_{t:t+H}  (미래 action chunk)]\n```\n\n**학습 / 추론**\n\nTrain-time: image-editing backbone과 action expert를 함께 학습한다. action expert는 flow-matching loss로 학습되어(L_act, Eq.9) action flow time s에서 보간된 noisy action a_s를, 그 시점의 editing cache C_edit^{tau}에 조건화한 velocity field v_theta가 (epsilon_a - a*) 방향을 맞추도록 회귀한다. 학습 시에는 editing denoising timestep tau가 (그리고 action flow time s가) 샘플링되어 다양한 timestep을 본다. Section 6에서 언급된 prefix-only attention training은 학습 단계에서 attention 구조를 prefix-only로 두어 추론 시 denoising-free 사용을 가능케 하는 정렬(FastWAM 방식 차용).\\n\\nTest-time(핵심 차이): (a) 미래 video를 생성하지 않는다. (b) 완성된 edited image도 디코딩하지 않는다. (c) image-editing denoising trajectory 전체를 돌지 않고, 고정 timestep tau-star에서 editing-branch를 단 1회 forward해 layer-wise KV cache C_edit^{tau-star} = f_edit^{tau-star}(o_t, l)만 계산한다(Eq.10). (d) flow-matching action expert가 이 cache에 joint attention으로 조건화되어 action noise로부터 action chunk를 디노이즈한다: a_hat_{t:t+H} ~ p_theta(a_{t:t+H} | o_t, l, C_edit^{tau-star}) (Eq.11). action denoising은 3 steps만 사용(Table 11). 즉 무거운 iterative image denoising은 1-step prefill로 대체되고, 남는 비용은 가벼운 3-step action denoising뿐 -> 이것이 FLOPs 1/6, latency 1/4의 출처이며, 그 위에 torch.compile + CUDA static graph로 action head 실행 오버헤드까지 제거해 추가 ~3x를 얻어 최종 69ms(4.38x)에 도달한다.\n\n**숫자**\n- FLOPs: video-based WAM 대비 1/6 (abstract: 'reduces FLOPs to 1/6')\n- Latency: video-based WAM 대비 1/4 (abstract: 'latency to 1/4')\n- Table 11 latency(3 action denoising steps): FastWAM 1x Vid.Denoise 302ms(1.00x)\n- ImageWAM 1x Vid.Denoise 263ms(1.15x)\n- FastWAM Prefix Only 194ms(1.56x)\n- FastWAM +Compiled 80ms(3.78x)\n- ImageWAM Prefix Only 198ms(1.53x)\n- ImageWAM +Action Loop Compile 85ms(3.55x)\n- ImageWAM +Image Prefill Compile 77ms(3.92x)\n- ImageWAM +Action Static Graph 69ms(4.38x, 최종)\n- 컴파일 효과: 거의 3x overall speedup\n- action denoising steps: 3 (all variants)\n- image editing: editing-branch forward 1 step (denoising-free)\n- RoboTwin2.0: Clean 93.20%, Randomized 93.56%, 평균 93.38%\n- LIBERO 4-suite 평균 98.4%\n- LIBERO-Plus (FLUX.2 4B) 평균 83.1%\n- real-world 4 tasks 평균 84.5%\n\n---\n\n## 7 Real-World Experiments Detail\n\n**핵심**\n- 실세계 평가는 Dobot XTrainer dual-arm 로봇 플랫폼에서 4개 manipulation task로 진행: T1 Stack Three Bowls(중첩 그릇 3개 쌓기, object manipulation+spatial reasoning), T2 Fold Towel(천 접기, deformable object handling), T3 Open Drawer & Store Marker(서랍 열기→마커 넣기→닫기, sequential manipulation+visual occlusion), T4 Hang Cup On Rack(컵을 페그에 걸기, precision placement).\n- 데이터: task당 100 trajectories(demonstrations) 수집. 모든 task를 합친 combined dataset으로 단일 모델 학습, 30k steps 학습. 평가는 다양한 initial configuration에서 task당 100 trials, 지표는 execution success rate.\n- 결과(Table 4): ImageWAM 평균 success rate 84.5%로 베이스라인 전부 추월 — pi0 55.8%, pi0.5 72.3%, FastWAM 79.0%. ImageWAM 개별: T1=94, T2=84, T3=78, T4=82.\n- FastWAM 대비 향상폭: T1 +6, T2 +9, T3 +1, T4 +6 포인트. deformable(T2)과 다물체 정밀(T1,T4)에서 이득이 크고, 긴 sequential 과제(T3)는 거의 동률.\n- 효율(Table 5): video-generation 베이스라인(FastWAM-IDM) 대비 ImageWAM은 latency 1081ms→263ms(약 1/4), FLOPs 63.65→9.72 TFLOPs(약 1/6). FastWAM(1 Step)은 302ms/13.21 TFLOPs로 그 중간.\n- 추론 메커니즘이 효율의 핵심: 추론 시 full future-video generation을 피하고 완전한 edited image도 디코딩하지 않음. 전체 editing denoising trajectory를 돌리는 대신 고정 timestep tau*에서 editing-branch forward를 단 1 step만 수행하고, 그때 나온 내부 표현(KV cache)에 action expert를 조건화.\n- 학습 vs 추론 비대칭: 학습 때는 editing denoising timestep tau를 무작위로 샘플링해 editing branch를 돌리지만(image loss + action loss 동시 최적화), 추론 때는 고정 tau* 1-step만 돌려 target frame을 실제로 생성하지 않음.\n\n**왜 / 직관**\n\nvideo-generation WAM(예: FastWAM)은 \"미래를 영상으로 끝까지 상상한 뒤 행동을 정한다\"는 방식이라 비싸고, task와 무관한 픽셀(배경 질감 등)에 연산을 낭비한다. ImageWAM의 직관은 \"미래 영상을 다 그릴 필요 없이, 미래를 어떻게 편집(image-editing)할지에 대한 머릿속 스케치만 잡으면 행동을 정할 수 있다\"는 것. 비유하면, 화가가 완성된 그림을 그려놓고 보고 손을 움직이는 대신, 붓을 어디로 가져갈지 마음속 밑그림(편집 denoising의 중간 KV 표현) 하나만 떠올리고 바로 손을 움직이는 셈이다. 실세계 결과는 이 \"compact한 편집 중간표현\"이 dense한 미래 영상보다 행동 예측에 더 신뢰할 만함을 보인다: deformable 천 접기(T2 +9)나 정밀 거치(T1/T4 +6)처럼 물체 디테일이 흔들리기 쉬운 과제에서 이득이 크다. 이는 Figure 5의 주장(미래 영상의 왜곡 artifact가 action conditioning을 오염시켜 실패를 유발)과 일치하는 정성적 그림이다.\n\n**모듈 분해** (top-down: 정의 먼저 · 내부 뒤)\n- **Image-Editing Backbone (f_edit)** — 목적: 현재 관측 o_t와 instruction l로부터 'source-grounded, instruction-guided 미래 편집'을 추론하는 world-action 표현 생성기 (OmniGen2/Ovis-U1/Flux2 같은 image-editing model의 generation branch). · 입력→출력: 입력: (o_t, l) [현재 RGB 관측 프레임 + 언어 지시]  →  학습 출력: 편집된 미래 프레임 latent z*_{t+K}로 향하는 velocity; 추론 출력: timestep tau*에서의 layer별 KV cache C^{tau*}_edit = {(K_l, V_l)}_{l=1..L} · 내부: L_img = E[||u_phi(z_r, r | o_t, l) - (eps_z - z*_{t+K})||^2] 로 편집 flow 학습. VLM/multimodal understanding 부분은 frozen, diffusion generation branch만 학습. 추론 시 전체 denoising trajectory를 돌리지 않고 고정 tau*에서 1 forward step만 수행 → 완전한 edited image를 디코딩하지 않음.\n- **KV-cache Bridge (C^tau_edit)** — 목적: 미래 영상을 픽셀로 디코딩하는 대신, 편집 denoising 과정의 중간 transformer key/value를 'compact한 world-action intermediate'로 추출해 action 모듈에 전달. · 입력→출력: 입력: f_edit의 timestep tau forward  →  출력: C^tau_edit = {(K^tau_l, V^tau_l)}_{l=1..L} (각 layer ell의 key/value 쌍 집합) · 내부: C^tau_edit = f^tau_edit(o_t, l). dense future video token 예측을 대체하는 edit-aware representation. joint attention을 통해 Action Expert가 이 cache를 조건으로 끌어다 씀. 미래 영상의 action-irrelevant 디테일/artifact를 피하는 것이 핵심 이점(Fig.5).\n- **Action Expert (v_theta)** — 목적: 편집 KV cache + 현재 robot state + action noise를 받아 미래 H-step action sequence를 flow-matching으로 예측하는 policy head. · 입력→출력: 입력: (o_t, l, C^tau_edit, robot state, action noise a_s, flow step s)  →  출력: action sequence a_{t:t+H} (현재부터 H step 미래 행동) · 내부: L_act = E[||v_theta(a_s, s | o_t, l, C^tau_edit) - (eps_a - a*_{t:t+H})||^2]. eps_a(action noise)에서 ground-truth a*_{t:t+H}로 향하는 flow. backbone과 함께 L = L_act + L_img 로 joint 학습. 추론 시 action 쪽 flow만 denoise해 실로봇에 보냄.\n\n**수식**\n\n$$\n\\mathcal{L}_{\\text{img}}=\\mathbb{E}\\big[\\,\\lVert u_{\\varphi}(z_r,\\,r\\mid o_t,\\,l)-(\\epsilon_z - z^{*}_{t+K})\\rVert_2^2\\,\\big]\n$$\n\n- **무슨 식?**: 현재 프레임+지시문을 보고 '미래를 어떻게 편집할지'의 flow를 맞추는 항 (편집 backbone 학습).\n- image-editing branch의 flow-matching loss. u_phi = editing(diffusion) branch의 velocity field 예측, z_r = denoising 중간 latent at step r, (o_t, l) = 현재 관측·instruction 조건, target은 noise epsilon_z에서 VAE로 인코딩된 미래(편집) 프레임 latent z*_{t+K}로 향하는 flow. 이 항은 backbone이 source-grounded·instruction-guided 편집을 배우게 한다.\n\n$$\n\\mathcal{C}^{\\tau}_{\\text{edit}}=\\{(K^{\\tau}_{\\ell},\\,V^{\\tau}_{\\ell})\\}_{\\ell=1}^{L}=f^{\\tau}_{\\text{edit}}(o_t,\\,l)\n$$\n\n- **무슨 식?**: 편집 denoising 1-step에서 뽑은 layer별 (K,V) cache — 행동의 조건이 되는 압축된 미래 표현.\n- editing branch를 timestep tau에서 1회 forward(f_edit)했을 때 각 transformer layer ell(=1..L)에서 나오는 key/value 쌍의 집합. 이것이 미래 영상을 디코딩하는 대신 action expert에 넘겨주는 compact한 world-action 중간표현(KV cache).\n\n$$\n\\mathcal{L}_{\\text{act}}=\\mathbb{E}\\big[\\,\\lVert v_{\\theta}(a_s,\\,s\\mid o_t,\\,l,\\,\\mathcal{C}^{\\tau}_{\\text{edit}})-(\\epsilon_a - a^{*}_{t:t+H})\\rVert_2^2\\,\\big]\n$$\n\n- **무슨 식?**: 편집 KV cache에 조건화해 미래 H-step action sequence를 flow-matching으로 예측하는 항.\n- Action Expert의 flow-matching loss. v_theta = action velocity field, a_s = action noise at flow step s, 조건은 (o_t, l)에 더해 편집 KV cache C^tau_edit. target은 action noise epsilon_a에서 ground-truth action sequence a*_{t:t+H}로 향하는 flow. joint attention으로 KV cache를 끌어와 미래 H step action을 예측.\n\n$$\n\\mathcal{L}=\\mathcal{L}_{\\text{act}}+\\mathcal{L}_{\\text{img}}\n$$\n\n- **무슨 식?**: 편집 loss + action loss를 합쳐 한 번에 학습(VLM은 freeze).\n- 전체 학습 목적함수. diffusion image branch(L_img)와 action expert(L_act)를 동시에 최적화. VLM/multimodal understanding 컴포넌트는 frozen, generation branch와 action expert만 학습.\n\n**그림 / 구조도**\n\n- (원본 그림 3 재참조) → Section 7의 real-world 평가 셋업(Dobot XTrainer dual-arm + 4 task)을 시각적으로 담는 그림 — 실험 환경 근거.\n- (원본 그림 5 재참조) → Section 7에서 ImageWAM이 FastWAM 대비 success rate가 높은 이유(미래 영상 artifact가 action conditioning을 오염→실패, ImageWAM은 compact 편집 cache로 회피)를 뒷받침하는 정성 그림.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[real-world inference path — Section 7 효율/추론 메커니즘 근거]\n\n instruction l ─┐\n                ▼\n current obs o_t ──► [Image-Editing Backbone f_edit]   (VLM/understanding: FROZEN)\n                          │  ※ run ONE forward step at FIXED timestep tau*\n                          │  ※ NO full denoising trajectory\n                          │  ※ NO complete edited image decoded\n                          ▼\n                 KV cache  C^{tau*}_edit = {(K_l, V_l)}_{l=1..L}\n                          │  (joint attention 으로 전달)\n                          ▼\n robot state + action noise ──► [Action Expert v_theta]\n                                      │ flow-matching denoise (action 쪽만)\n                                      ▼\n                          actions a_{t:t+H}  ──► dual-arm robot 실행\n\ntrain-time 차이: tau 를 random sample + L_img(target frame z* 까지 flow) 동시 학습\ntest-time   : tau* 고정, 1-step, target frame 미생성 → latency 1081→263ms, FLOPs 63.65→9.72]\n```\n\n**학습 / 추론**\n\nTrain-time: 매 step마다 editing denoising timestep tau를 무작위로 sample하고 editing branch를 돌려 L_img(편집 flow: noise→target frame latent z*_{t+K})와 L_act(편집 KV cache C^tau_edit에 조건화한 action flow)를 합친 L = L_act + L_img로 backbone(generation branch)과 Action Expert를 동시 최적화한다. VLM/multimodal understanding은 frozen. 즉 학습 때는 target(편집된 미래) 프레임으로 향하는 flow를 명시적으로 supervise한다. Test-time(추론): full future-video generation을 하지 않고 완전한 edited image도 디코딩하지 않는다. 전체 image-editing denoising trajectory 대신 고정된 단일 timestep tau*를 골라 editing-branch forward를 단 1 step만 수행하고, 그 step에서 나온 layer별 KV cache C^{tau*}_edit에 flow-matching Action Expert를 joint attention으로 조건화해 곧바로 action a_{t:t+H}만 디코딩한다. target frame 자체를 픽셀로 생성하지 않기 때문에 video-WAM 대비 latency 1081ms→263ms(약 1/4), FLOPs 63.65→9.72 TFLOPs(약 1/6)로 줄어든다(FastWAM 1-step은 302ms/13.21 TFLOPs로 그 중간).\n\n**숫자**\n- 실세계 success rate 평균: ImageWAM 84.5% > FastWAM 79.0% > pi0.5 72.3% > pi0 55.8%\n- ImageWAM 개별 task success(%): T1=94, T2=84, T3=78, T4=82\n- FastWAM 개별 task success(%): T1=88, T2=75, T3=77, T4=76\n- pi0.5 개별(%): T1=83, T2=77, T3=74, T4=55 / pi0 개별(%): T1=57, T2=58, T3=54, T4=54\n- FastWAM 대비 향상: T1 +6, T2 +9, T3 +1, T4 +6 포인트\n- 데이터/학습: task당 100 trajectories, 4 task combined dataset, 30k steps 학습\n- 평가: task당 100 trials, 다양한 initial configuration, 지표 execution success rate\n- 효율(Table 5) latency: FastWAM-IDM 1081ms → FastWAM(1 Step) 302ms → ImageWAM 263ms\n- 효율(Table 5) TFLOPs: FastWAM-IDM 63.65 → FastWAM(1 Step) 13.21 → ImageWAM 9.72\n- Abstract 요약 비율: FLOPs ~1/6, latency ~1/4 (video-based WAM 대비)\n- 플랫폼: Dobot XTrainer dual-arm robotic platform, 4 manipulation tasks (T1-T4)\n\n---\n\n## 7.1 Task settings and evaluation in Real-world Tasks\n\n**핵심**\n- 이 절(부록 '7 Real-World Experiments Detail'의 7.1)은 ImageWAM의 capability/generalizability를 검증하기 위한 real-world manipulation 실험의 task 정의와 evaluation protocol만 기술한다. 수식·인용그림·결과표는 이 절 본문에 없다(결과표는 별도 절 '8 RoboTwin Evaluation Results'의 Table 12).\n- Real-world task 4종(대표적·challenging): (1) Stack Three Bowls (T1) - green nested bowl 3개 쌓기; (2) Fold Towel (T2) - fabric towel 접기; (3) Open Drawer & Store Marker (T3) - 서랍 열고 marker 넣고 다시 닫기(multi-stage); (4) Hang Cup On Rack (T4) - mug를 wooden stand의 지정된 peg에 걸기.\n- 데이터: task당 평균 100 demonstrations 수집(an average of 100 demonstrations per task).\n- 평가: 각 model을 task당 50 trials로 평가(50 trials per task).\n- 주 metric: execution success rate (execution success rate is reported as the primary performance metric).\n- task 난이도 설계 의도: deformable object(towel), multi-step long-horizon(drawer+marker+close), precise placement(cup-on-peg, nested bowls)을 섞어 generalizability를 폭넓게 검증.\n- 주의(추측 금지): 본 절에는 method별 성공률 숫자, FLOPs/latency 효율 수치, 어떤 Figure도 in-text로 등장하지 않는다. 그 수치들은 Abstract/다른 절 소속이며 7.1에 귀속시키면 안 된다.\n\n**왜 / 직관**\n\n이 절은 '시험지 출제 명세서'에 해당한다. 모델을 채점하기 전에 (a) 어떤 문제를 낼지(4개 task), (b) 연습문제를 몇 개 줄지(task당 평균 100 demo), (c) 본시험을 몇 번 보게 할지(task당 50 trial), (d) 점수를 어떻게 매길지(execution success rate)를 못박는 부분이다. 4개 task는 일부러 성격이 다르게 골랐다: 천(towel)처럼 모양이 변하는 물체, '열고-넣고-닫는' 여러 단계를 거쳐야 하는 서랍, 그리고 컵을 정확히 못에 거는 정밀 배치까지 — 한 종류 능력만 잘하는 모델이 점수를 부풀리지 못하도록 다양한 skill을 한 시험지에 섞어 둔 것이다.\n\n**그림 / 구조도**\n\n- (원본 그림 3 재참조) → 7.1이 정의하는 real-world robot 실험 환경(물리 셋업)을 보여주는 유일하게 관련된 그림. 단, 이 그림은 7.1 본문에서 명시적으로 인용되지는 않음(맥락상 연결만 됨).\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\n[ImageWAM Real-world Evaluation Protocol (Sec 7.1) - 본문 명세 그대로 ]\n\n  Real-world manipulation tasks (4종, 의도적으로 skill 다양화)\n  +------+--------------------------+-------------------------------------------+\n  | ID   | Task name                | what / 요구 skill (본문 기술 그대로)      |\n  +------+--------------------------+-------------------------------------------+\n  | T1   | Stack Three Bowls        | three green nested bowls 쌓기 (정밀 stack)|\n  | T2   | Fold Towel               | fabric towel 접기 (deformable object)     |\n  | T3   | Open Drawer &            | drawer 열기 -> marker 넣기 -> drawer 닫기 |\n  |      |   Store Marker           |   (multi-stage / long-horizon)            |\n  | T4   | Hang Cup On Rack         | mug를 wooden stand의 지정 peg에 걸기      |\n  |      |                          |   (precise placement)                     |\n  +------+--------------------------+-------------------------------------------+\n\n  Data / Eval pipeline:\n     [각 task]\n        | 수집\n        v\n     demonstrations  -- 평균 100개 / task -->  [model 학습용]\n        |\n        v\n     [학습된 각 model]\n        | 평가\n        v\n     rollout x 50 trials / task\n        |\n        v\n     metric = execution success rate   (primary performance metric)\n\n  주: 이 절 본문에는 method별 success-rate 수치/표 없음(-> 별도 절 8, Table 12).]\n```\n\n**학습 / 추론**\n\n[7.1 본문에 직접 적힌 train/infer 관련 내용]\n- Train-time(데이터): real-world task마다 평균 100개의 demonstration을 수집해 각 model을 학습. 이 절은 학습 데이터 규모와 task 정의만 다루며, ImageWAM 내부 학습 메커니즘(image-editing denoising, flow-matching action expert 등)은 이 절에서 설명하지 않음.\n- Test/Inference-time(평가 프로토콜): 각 model을 task당 50 trials로 실행(rollout)하고, execution success rate를 primary metric으로 보고. 즉 7.1의 '추론'은 '학습된 policy를 실제 robot에서 50회 굴려 성공률 측정'이라는 평가 절차를 의미.\n\n[프롬프트가 요청한 ImageWAM 추론 메커니즘 - 단, 출처는 7.1이 아니라 Abstract/method임을 명시]\nImageWAM은 추론 시 target frame을 디코딩하지 않는다. 대신 image-editing denoising이 만들어내는 KV cache에 flow-matching action expert를 조건화하여, 그 cache를 compact한 world-action context로 사용한다(Abstract 원문: 'does not decode the target frame at inference time; instead, it conditions a flow-matching action expert on the KV caches produced by image-editing denoising, using them as a compact world-action context'). 이 덕분에 video-based WAM 대비 FLOPs 1/6, latency 1/4로 줄인다(Abstract). 이 수치/메커니즘은 7.1 절에는 등장하지 않으므로 7.1에 귀속시키면 안 된다.\n\n**숫자**\n- real-world manipulation tasks: 4종 (T1~T4)\n- demonstrations: task당 평균 100개 (an average of 100 demonstrations per task)\n- trials: task당 50회 (50 trials per task)\n- primary metric: execution success rate\n- [7.1 외부/Abstract, 7.1에는 없음] FLOPs ~1/6, latency ~1/4 of video-based WAMs\n\n---\n\n## 8 RoboTwin Evaluation Results\n\n**핵심**\n- 섹션 8은 본문의 RoboTwin 평가에 대한 부록형 \"전체 per-task 결과\" 섹션이다. 본문은 단 한 문장(\"Here we present the per-task results on RoboTwin evaluation in Table 12.\")이고, 내용 전체가 Table 12 하나로 구성된다. 새 수식·새 그림·새 방법 설명은 이 섹션에 없다.\n- Table 12 = RoboTwin의 task별 success rate(%)를 Clean(깨끗한 표준 세팅)과 Rand.(randomized=초기화/배치 등을 무작위화한 강건성 세팅) 두 조건으로 나란히 보고. 약 50개 task 행 + 마지막 Average 행으로 구성.\n- 비교 대상 7개 method 그룹(각각 Clean/Rand. 2열): ImageWAM Flux.2 4B (Ours), ImageWAM OmniGen2 (Ours)(50 trials), Fast-WAM-IDM, Fast-WAM w.o. co-train, LingBot-VA, pi_0.5, Motus. 즉 ImageWAM의 두 변형(Flux.2 4B / OmniGen2)을 image-editing 백본별로 둘 다 올렸다.\n- Average(평균 success rate %): ImageWAM Flux.2 4B = Clean 93.20 / Rand. 93.56(전 컬럼 최고), ImageWAM OmniGen2 = 92.48 / 92.80, LingBot-VA = 92.90 / 91.50, Fast-WAM-IDM = 91.16 / 91.34, Motus = 88.66 / 87.02, Fast-WAM w.o. co-train = 82.76 / 84.80, pi_0.5 = 82.74 / 76.76.\n- 강건성(robustness) 신호: ImageWAM 두 변형은 Rand.가 Clean과 비슷하거나 오히려 높음(Flux.2 93.56>93.20). 반면 pi_0.5는 Clean 82.74 -> Rand. 76.76으로 크게 하락(-5.98), randomization에 가장 취약. ImageWAM은 randomized 세팅에서 평균 1위(93.56).\n- co-train의 중요성: Fast-WAM(IDM 포함) 91.16/91.34 대비 \"Fast-WAM w.o. co-train\"은 82.76/84.80으로 약 8~9%p 하락 -> co-training이 성능에 크게 기여함을 per-task 표가 입증.\n- task 난이도 편차가 큼: Grab Roller는 모든 method가 100/100으로 포화(saturated), 반면 Hanging Mug, Turn Switch, Place Can Basket 같은 task는 method 간 격차가 크고 절대값도 낮음(예: Hanging Mug에서 ImageWAM Flux.2 74/84 vs Fast-WAM w.o. co-train 28/40). 어려운 task일수록 ImageWAM의 우위가 더 두드러짐.\n\n**왜 / 직관**\n\n이 섹션은 \\\"우리 방법이 평균만 좋은 게 아니라 거의 모든 종목에서 골고루 좋다\\\"를 보여주는 성적표 부록이다. 비유하면, 메인 논문이 \\\"우리 반 평균 1등\\\"이라고 요약했다면, 섹션 8은 그 평균을 만든 50과목 시험지를 한 장씩 다 펼쳐 보여주는 것이다. 두 시험 조건이 핵심인데, Clean은 \\\"교과서 그대로 나온 문제\\\", Rand.(randomized)는 \\\"물체 위치·초기 상태를 흔들어 놓은 응용 문제\\\"다. 좋은 학생(robust한 모델)은 응용 문제에서도 점수가 안 떨어져야 하는데, ImageWAM은 흔든 시험(Rand. 93.56)에서 오히려 깨끗한 시험(93.20)만큼 잘 봐서 진짜 일반화 능력을 시사하고, pi_0.5는 응용 문제에서 점수가 6점 가까이 떨어져(82.74->76.76) 외운 티가 난다. 또 \\\"w.o. co-train\\\" 열은 보조 학습(co-train)이라는 과외를 뺐을 때 점수가 8~9점 떨어지는 걸 보여주는 대조군이다.\n\n**그림 / 구조도**\n\n- (원본 그림 3 재참조) → 섹션 8의 RoboTwin per-task 결과(Table 12)가 어떤 실험 환경/세팅에서 나온 것인지 보여주는 setup 그림 — 본문이 명시 참조하진 않지만 이 섹션 수치의 근거 환경(RoboTwin2.0)을 시각화.\n**구조 정리(노트 — 논문 그림이 세부 흐름 생략)**\n```\nTable 12 structure (per-task success rate %, RoboTwin)\n== one section body sentence + this table only; no equations/new figures ==\n\nColumns (7 method groups x {Clean, Rand.}):\n  C1 ImageWAM Flux.2 4B (Ours)        [Clean | Rand.]\n  C2 ImageWAM OmniGen2 (Ours) 50trial [Clean | Rand.]\n  C3 Fast-WAM-IDM                     [Clean | Rand.]\n  C4 Fast-WAM w.o. co-train           [Clean | Rand.]\n  C5 LingBot-VA                       [Clean | Rand.]\n  C6 pi_0.5                           [Clean | Rand.]\n  C7 Motus                            [Clean | Rand.]\n\nRows = ~50 RoboTwin tasks, then AVERAGE.\n\nTask            | C1        C2        C3        C4        C5        C6        C7\n                |Cln  Rnd |Cln  Rnd |Cln  Rnd |Cln  Rnd |Cln  Rnd |Cln  Rnd |Cln  Rnd\n----------------+---------+---------+---------+---------+---------+---------+--------\nGrab Roller     |100  100 |100  100 |100  100 |100  100 |100  100 |100  100 |100  100  (saturated)\nHanging Mug     | 74   84 | 50   56 | 66   62 | 28   40 | 40   28 | 18   17 | 38   38  (hard, big gap)\nTurn Switch     | 77   79 | 54   70 | 59   74 | 66   66 | 44   45 | 62   54 | 84   78\n ... (~47 more tasks: Adjust Bottle, Click Bell, Lift Pot, Place*, Stack*, Shake*, ...)\n----------------+---------+---------+---------+---------+---------+---------+--------\nAVERAGE         |93.20 93.56|92.48 92.80|91.16 91.34|82.76 84.80|92.90 91.50|82.74 76.76|88.66 87.02\n                | ^best both |          |          | -co-train |          | Rand drop |\n                |            |          |          |  ~ -9pp   |          |  82.7->76.8|\n\nRead: ImageWAM(C1/C2) wins on Average; robust under Rand (C1 Rand>=Clean).\nco-train ablation = C3 vs C4 (~8-9pp drop). pi_0.5 (C6) most fragile to randomization.\n```\n\n**학습 / 추론**\n\n섹션 8 자체는 결과(Table 12)만 제시하고 train/infer 메커니즘을 새로 설명하지 않는다(메커니즘은 본문 파이프라인 섹션 소관). 다만 표의 평가 프로토콜 차이는 명확하다. (1) Test-time 평가 조건이 두 가지로 나뉜다 — Clean: 표준/고정 세팅에서의 success rate, Rand.(randomized): 물체 위치/초기 상태 등을 무작위화한 강건성 평가 세팅에서의 success rate. ImageWAM 변형들은 Rand.에서 점수가 유지/상승(예: Flux.2 4B 93.20->93.56)하는 반면 pi_0.5는 하락(82.74->76.76)한다. (2) Train-time 측면에서 표가 직접 격리(ablate)하는 유일한 학습 요소는 co-training이다 — \\\"Fast-WAM\\\"(co-train 포함, IDM 변형 91.16/91.34) vs \\\"Fast-WAM w.o. co-train\\\"(82.76/84.80)의 대조로, co-training을 빼면 평균 약 8~9%p 하락. (3) ImageWAM은 image-editing 백본을 바꿔 두 가지로 학습/평가됨(Flux.2 4B, OmniGen2). 사용자가 언급한 추론 메커니즘(추론 시 target frame을 디코딩하지 않고 image-editing denoising의 KV cache에 flow-matching action expert를 조건화)은 이 섹션 8의 본문 텍스트에는 서술되어 있지 않으며(파이프라인 섹션 소관, Fig.2 caption의 \\\"Action Expert integrates the intermediate KV features ... via joint attention\\\"가 그 근거), 섹션 8에서는 그에 대한 추가 문장이 없으므로 여기서 추정하지 않는다.\n\n**숫자**\n- Average success rate (Clean/Rand., %): ImageWAM Flux.2 4B (Ours) 93.20 / 93.56 (both-condition best)\n- ImageWAM OmniGen2 (Ours, 50 trials) 92.48 / 92.80\n- LingBot-VA 92.90 / 91.50\n- Fast-WAM-IDM 91.16 / 91.34\n- Motus 88.66 / 87.02\n- Fast-WAM w.o. co-train 82.76 / 84.80 (co-train ablation: ~8-9pp below Fast-WAM-IDM)\n- pi_0.5 82.74 / 76.76 (largest Clean->Rand. drop, -5.98pp)\n- ~50 RoboTwin tasks reported; e.g. Grab Roller 100/100 all methods (saturated); Hanging Mug ImageWAM Flux.2 74/84 vs pi_0.5 18/17 (hardest, widest gap)\n- Some tasks evaluated with (50 trials) per the ImageWAM OmniGen2 column note\n\n---\n\n## 한눈에 정리\n- **문제**: video-generation WAM은 미래 영상 전체를 합성(많은 spatio-temporal token) → 추론 비싸고, action-무관 detail(배경·조명·카메라)에 capacity 낭비, 부정확한 future가 action을 오도(Fig 5).\n- **해법**: 미래 예측을 **image editing**으로 교체. instruction에 따라 현재 관측 o_t를 target 상태로 바꾸는 'instruction-guided visual transformation'만 모델링 = robot policy가 실제로 필요한 신호(무엇을/어디를/어떻게 바꿀지).\n- **메커니즘**: image-editing backbone이 future frame을 (개념적으로) 생성하되, **추론 시 픽셀 디코딩 없이** 그 denoising의 **KV cache**를 꺼내 flow-matching **Action Expert**가 joint attention으로 받아 robot state·action noise와 함께 action chunk a_{t:t+H}를 예측.\n- **backbone 3종**: OmniGen2(main) / FLUX.2 / Ovis-U1 — image-editing 모델이면 갈아끼울 수 있음(appendix 변형).\n- **효율**: video-WAM 대비 FLOPs ~1/6 · latency ~1/4. 성능: RoboTwin 2.0 / LIBERO / LIBERO-Plus / real-world에서 VLA baseline 능가.\n- **계열 위치**: FastWAM(미래 imagination 자체 제거) · LaWAM(미래를 latent subgoal로 명시) 와 함께 'pixel future-video 폐기' 계열. ImageWAM의 선택 = 미래를 **단일 image-edit + 그 KV cache**로.\n\n## FastWAM / LaWAM 와의 관계 (노트)\n- 셋 다 'pixel 미래영상 생성'의 비용/오류를 공격한다는 점에서 형제. 차이는 **미래를 무엇으로 대체하나**:\n  - **FastWAM**: 테스트타임 미래 imagination을 아예 제거(단일 forward, attention mask로 미래 video 차단) → 사실상 VLA화.\n  - **LaWAM**: 미래를 **latent subgoal**(û_T)로 1-pass 예측 후 action.\n  - **ImageWAM**: 미래를 **단일 image-edit**으로 보고, 그 editing denoising의 **KV cache**를 action-conditioning context로. (픽셀 디코딩은 추론에서 생략.)\n- → 비교 축: 'future representation' = none(FastWAM) / latent-subgoal(LaWAM) / image-edit-KVcache(ImageWAM) / pixel-video(기존 WAM).\n\n## ⚠️ 확인 필요 / 나중에(TODO)\n\n**적대적 검증이 issue로 지적(본문에서 단정 금지)**:\n- [ ] [2] Figure 1 misattributed to Section 2. The extraction lists Figure 1 in this section's `figures` array and its `why` field claims the figure visualizes/ties together Section 2's two camps. Independent fetch confirms Figure 1 is NOT referenced anywhere in Section 2's body text; it is first referenced in Section 1 (Introduction): '...as illustrated in Figure 1(a).' Attributing the figure to the Related Works section is a hallucinated section assignment.\n- [ ] [2] Figure 1 caption is truncated. The extraction gives a 2-sentence caption, but the actual caption has 3 sentences. The omitted final sentence is: 'The resulting edit-aware representation serves as a compact world-action intermediate for action prediction, achieving strong policy performance while reducing inference cost.' The two quoted sentences are ver
