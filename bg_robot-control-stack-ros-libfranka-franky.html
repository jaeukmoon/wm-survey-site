<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WM / VLA Survey</title>
<style>
:root{--panel:#fff;--ink:#1a1f2e;--mut:#6b7280;--line:#e6e8ee;--accent:#3b5bdb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--ink);background:#f4f6fb}
header{background:linear-gradient(135deg,#0b1020,#1e293b);color:#fff;padding:26px 20px}
header .wrap{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
header h1{margin:0 0 6px;font-size:24px;letter-spacing:-.3px}
header h1 a{color:#fff;text-decoration:none}
header p{margin:0;color:#aab3c5;font-size:13px}
header p a{color:#9db4ff}
.nav{display:flex;gap:10px}
.btn{display:inline-block;padding:9px 16px;border-radius:10px;font-size:13.5px;font-weight:700;text-decoration:none;cursor:pointer;border:0}
.btn.primary{background:#3b5bdb;color:#fff}
.btn.primary:hover{background:#4c6ef5}
.btn.ghost{background:rgba(255,255,255,.12);color:#e7ecf5;border:1px solid rgba(255,255,255,.25)}
.btn.ghost:hover{background:rgba(255,255,255,.2)}
#upd-status{font-size:12px;color:#ffdeb0;margin-top:6px;min-height:14px}
main{max-width:1100px;margin:0 auto;padding:24px 20px 64px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 6px}
.chip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--mut);font-size:13px;font-weight:700;cursor:pointer}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .n{opacity:.65;font-weight:600;margin-left:4px;font-size:11.5px}
h2.date{font-size:15px;color:var(--mut);font-weight:600;margin:30px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.card{display:grid;grid-template-columns:340px 1fr;gap:20px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:12px 0;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.card.big{border-left:4px solid #e03131}
.card.pending{border-left:4px solid #f59f00;background:#fffdf5}
.card .L{min-width:0}
.card h3{margin:0 0 8px;font-size:16px;line-height:1.35}
.card h3 a{color:var(--ink);text-decoration:none}
.card h3 a:hover{color:var(--accent);text-decoration:underline}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;background:#eef1f7;color:#374151}
.badge.org{background:#ffe3e3;color:#c92a2a}
.badge.conf{background:#e7f5ff;color:#1971c2}
.badge.arxiv{background:#f1f3f5;color:#495057}
.badge.up{background:#fff4e6;color:#e8590c}
.badge.bw{background:#fff3bf;color:#9a6700}
.badge.pri{font-weight:800;letter-spacing:.2px;cursor:help;border:1px solid transparent}
.badge.pri.gA{background:#12b886;color:#fff}
.badge.pri.gB{background:#40c057;color:#fff}
.badge.pri.gC{background:#fab005;color:#3d2c00}
.badge.pri.gD{background:#fd7e14;color:#fff}
.badge.pri.gE{background:#e9ecef;color:#868e96}
.badge.rig{background:#eef2ff;color:#3b4a8a;font-weight:700;cursor:help;border:1px solid #dbe1f5}
.badge.rig.dd{background:#e6fcf5;color:#0b7285;border-color:#63e6be}
.R{min-width:0}
.sum{margin:0 0 10px;font-size:14px;color:#374151;line-height:1.6}
.muted{color:#9aa3b2;font-style:italic}
.f{font-size:13px;color:#4b5563;display:flex;gap:8px;align-items:baseline;margin:6px 0}
.lbl{flex:0 0 56px;color:#94a3b8;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
.pm{margin:0;padding-left:18px;line-height:1.55}
.pm.plus li::marker{content:"+ ";color:#2b8a3e;font-weight:700}
.pm.minus li::marker{content:"− ";color:#c92a2a;font-weight:700}
.catv{font-weight:600;padding:1px 8px;border-radius:6px}
.catv.catknown{background:#ebfbee;color:#2b8a3e}
.catv.catnew{background:#fff4e6;color:#e8590c}
.f.col{flex-direction:column;align-items:stretch;gap:5px}
.cmps{display:flex;flex-wrap:wrap;gap:5px}
.cmp{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#3b4ba8;border:1px solid #dfe3fb}
.scoretab{border-collapse:collapse;width:100%;font-size:12px;margin-top:2px}
.scoretab th,.scoretab td{border:1px solid var(--line);padding:4px 8px;text-align:left;vertical-align:top}
.scoretab th{background:#f1f3f9;color:#475569;font-weight:700;font-size:11px}
.scoretab td.mt{color:#64748b;white-space:nowrap}
.scoretab td.me{font-weight:800;color:#2b8a3e;white-space:nowrap}
.scoretab .note{color:#9aa3b2;font-size:10.5px}
.fig{max-width:100%;max-height:200px;object-fit:contain;border-radius:10px;border:1px solid var(--line);margin:10px 0 0;background:#fff}
.meta{font-size:12px;color:var(--mut)}
.meta a{color:var(--accent);text-decoration:none}.meta a:hover{text-decoration:underline}
.empty{color:var(--mut);font-size:14px;padding:30px 0}
footer{max-width:1100px;margin:0 auto;padding:0 20px 40px;color:var(--mut);font-size:12px}
.dd-list{list-style:none;padding:0}
.dd-list li{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:10px 0}
.dd-list a{font-size:16px;font-weight:700;color:var(--ink);text-decoration:none}
.dd-list a:hover{color:var(--accent)}
.dd-list .src{font-size:12px;color:var(--mut);margin-top:4px}
article.dd{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px 34px;line-height:1.7;font-size:15px}
article.dd img{max-width:100%;border-radius:8px;border:1px solid var(--line)}
article.dd pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:10px;overflow-x:auto;font-size:13px}
article.dd code{background:#eef1f7;padding:1px 5px;border-radius:4px;font-size:13px}
article.dd pre code{background:none;padding:0}
article.dd table{border-collapse:collapse;width:100%;font-size:13.5px}
article.dd th,article.dd td{border:1px solid var(--line);padding:6px 10px;text-align:left}
article.dd th{background:#f1f3f9}
article.dd blockquote{border-left:4px solid #c5cae9;margin:10px 0;padding:4px 14px;color:#4b5563;background:#f8f9ff}
@media(max-width:760px){.card{grid-template-columns:1fr;gap:10px}header .wrap{flex-direction:column;align-items:flex-start}}
</style>

  <script>
  const MD = "# 로봇 제어 스택 (Robot Control Stack: ROS · libfranka · franky)\n\n> VLA/WM 정책을 실로봇에 deploy할 때 만나는 제어 소프트웨어 계층 — \"어떤 라이브러리로 로봇에 명령을 보내나\".\n\n- **ROS (Robot Operating System)** — 로봇 OS가 아니라 **미들웨어**. 센서·제어기·모터를 노드로 띄우고 topic pub/sub·service로 통신하는 표준 배관. 장점: 모듈성·생태계. 단점: 레이어가 두꺼워 지연·복잡도↑. 일부 로봇은 **ROS 인터페이스만** 제공한다(예: RB-Y1).\n- **libfranka** — Franka 로봇의 **저수준 C++ 제어 라이브러리**. FCI(Franka Control Interface)로 로봇과 직접 통신하며 **1 kHz** 실시간 토크/관절/Cartesian 명령.\n- **franky** — libfranka 위에 얹은 **고수준 Python 래퍼**. \"이 pose로 부드럽게 가라\" 수준의 모션·웨이포인트를 간단히 주고, 가속도·지터 등 모션 파라미터를 노출.\n- **계층**: `franky (high) → libfranka (low) → FCI → 로봇`. Franka는 이 직접 스택으로 1 kHz 제어가 되므로 **ROS를 안 끼우기도** 한다(레이어 절약). 반대로 ROS만 여는 로봇은 그 인터페이스를 따라야 함.\n- **시뮬레이터도 같은 축**: 어떤 데이터수집/시뮬 환경은 franky가 아니라 **ROS 기반**으로 동작 → 실로봇 스택과 호환성을 따로 챙겨야 한다.\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else
    // marked mangles LaTeX (underscores -> <em>, $$ blocks -> <p>) before KaTeX runs.
    let katexInMarked = false;
    try {
      // nonStandard: true — allow inline $...$ followed immediately by Korean particles (와/는/로),
      // otherwise the default regex requires whitespace/punctuation after closing $ and skips them.
      if (window.markedKatex) { marked.use(window.markedKatex({throwOnError: false, nonStandard: true})); katexInMarked = true; }
    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
    // 8~256 GPU); marked pairs two ~ in a line into <del>. Consume ~ runs as literal text.
    try {
      marked.use({ extensions: [{
        name: 'noStrike', level: 'inline',
        start(s) { return s.indexOf('~'); },
        tokenizer(s) { const mm = s.match(/^~+/); if (mm) return { type: 'noStrike', raw: mm[0], text: mm[0] }; },
        renderer(t) { return t.text; }
      }] });
    } catch (e) {}
    el.innerHTML = marked.parse(MD);
    // Fallback only if the extension failed to load (e.g. offline CDN)
    if (!katexInMarked && window.renderMathInElement) renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ], throwOnError: false
    });
  });
  </script>

<script>
async function runUpdate(){
  const st = document.getElementById('upd-status');
  st.textContent = '업데이트 중… (arXiv/HF 수집 → 사이트 재생성, 1~2분)';
  try{
    const r = await fetch('/api/update', {method:'POST'});
    const j = await r.json();
    st.textContent = j.summary || JSON.stringify(j);
    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = '서버가 없습니다 — 터미널에서 `python surveybot/serve.py` 실행 후 http://localhost:8777 로 접속하세요. (요약·딥다이브 생성은 Claude 세션에서 /wm-survey)';
  }
}
</script>
