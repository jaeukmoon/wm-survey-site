*\n  - 목적/task: 사전학습된 LingBot-VLA를 소량의 데모만으로 다운스트림 태스크에 적응시켜 데이터 효율을 측정하는 것\n  - 입력→출력: 입력: 사전학습된 LingBot-VLA 가중치 + GM-100에서 선별한 8개 대표 태스크의 데모(태스크당 80개, 베이스라인 비교 시 최대 130개) -> 출력: 각 태스크에 적응된 정책(policy), 그리고 평가 지표 SR/PS 값. (구체적 텐서 shape은 5.5.2 본문에 명시되지 않음 - 추측하지 않음)\n  - 내부: 대규모 실세계 벤치마킹 프로토콜을 그대로 따라 Agibot G1 플랫폼에서 수행. 동일 8개 태스크에 대해 LingBot-VLA(80 demos)와 pi_0.5(130 demos full set)를 학습/평가하여 비교. post-training 데이터 양을 변화시키며 SR/PS 곡선을 그림(Figure 6). 내부 학습 알고리즘/하이퍼파라미터는 이 절에 기술되지 않음.\n\n- **Evaluation metrics (SR, PS) - 참조 모듈**\n  - 목적/task: 이 절이 성능 비교에 사용하는 두 지표를 산출하는 것(정의는 Evaluation Metrics 절 소속)\n  - 입력→출력: 입력: 태스크당 15회 trial의 실행 결과(성공/실패, 완료 스텝 수) -> 출력: SR(스칼라, 0~1), PS(스칼라, 0~1)\n  - 내부: SR = 성공 trial 수 / 15 (3분 내 전체 스텝 완료 시 성공). PS = (1/15) * sum_{i=1..15} (trial i 완료 스텝 / 태스크 전체 스텝). 종료 조건: 동일 서브태스크 3연속 실패 또는 충돌 등 안전 위험 발생. 산식은 본문에서 주석 처리되어 텍스트 정의만 렌더됨.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 5.5.2 Data-efficient Post-training Setup (본문 근거 기반)\n\n [Pre-trained LingBot-VLA]            [Baseline: pi_0.5]\n        |                                   |\n        |  post-training (downstream 적응)    |  post-training\n        v                                   v\n +----------------------------+     +----------------------------+\n | GM-100 -> 8 representative |     | 동일 8개 태스크             |\n | tasks (Agibot G1 platform)|     | (Agibot G1 platform)       |\n +----------------------------+     +----------------------------+\n        |  태스크당 80 demos                |  태스크당 130 demos (full)\n        v                                   v\n +----------------------------+     +----------------------------+\n | Evaluate: SR, PS           |     | Evaluate: SR, PS           |\n | (3-min limit, 15 trials)   |     | (3-min limit, 15 trials)   |\n +----------------------------+     +----------------------------+\n        \\                                 /\n         \\_______________________________/\n                       |\n                       v\n        결과: LingBot-VLA(80 demos) > pi_0.5(130 demos)\n              in both Progress Rate & Success Rate\n              + demo 수 늘수록 격차 확대 (Figure 6)\n\n주: 8 tasks, 80 vs 130 demos, Agibot G1, GM-100 모두 본문 명시값.\n    \"Progress Rate\"=PS, \"Success Rate\"=SR (Evaluation Metrics 절 정의).\n```\n\n**학습/추론**: 학습(post-training): GM-100에서 선별한 8개 대표 태스크에 대해, 사전학습된 LingBot-VLA를 태스크당 80개 데모로 추가 학습(post-training)한다. 비교 대상 pi_0.5는 동일 태스크를 태스크당 130개(full set) 데모로 학습한다. post-training 데이터 양을 늘려가며 성능 추이를 측정한다(데이터 효율 곡선, Figure 6). 학습 세부 알고리즘/옵티마이저/스텝 수는 5.5.2 본문에 명시되지 않음(추측 금지). 추론/평가: Agibot G1 실물 로봇에서 태스크당 15회 trial을 실행, 3분 시간 제한 내 전체 스텝 완료 여부로 SR을, 완료 서브태스크 비율로 PS를 산출. 동일 서브태스크 3연속 실패 또는 안전 위험(충돌 등) 발생 시 trial 종료하고 그때까지 완료한 서브태스크 기준으로 채점. 결론: LingBot-VLA(80 demos)가 pi_0.5(130 demos)를 SR/PS 모두에서 능가하며, 데모 수 증가에 따라 격차가 확대됨.\n\n**핵심 숫자**\n\n- 8개 대표 태스크 (eight representative tasks, GM-100에서 선별)\n- 80 demonstrations per task (LingBot-VLA의 제한 예산)\n- 130-demonstration set (pi_0.5의 full set)\n- Agibot G1 platform (실험 플랫폼)\n- 비교 지표: Progress Rate(=PS), Success Rate(=SR) 양쪽 모두에서 우세\n- [참조: 평가 프로토콜] 태스크당 15 trials, 3분(3-minute) 제한 시간, 종료 조건 = 동일 서브태스크 3연속 실패 또는 충돌 등 안전 위험\n- [참조: PS 예시] 6스텝 'Stack Bowls'에서 1~4단계 완료 후 5단계 실패 시 4/6 ≈ 0.67\n\n## 6 Conclusion (결론)\n\n**핵심**\n\n- LingBot-VLA를 소개. 대규모 실세계(real-world) 데이터와 최적화된 코드베이스(optimized codebase)를 통해 뛰어난 일반화 성능(generalizability)과 학습 효율(training efficiency)을 동시에 달성한 foundation model이라고 정리.\n- 100개 task에 걸친 종합 평가에서 경쟁 모델 대비 명확한 우위(clear superiority)를 보였고, 강한 성능과 폭넓은 일반화 능력을 입증했다고 주장.\n- 오픈 사이언스(open science)를 위해 코드(code), 모델(model), 벤치마크 데이터(benchmark data)를 공개한다고 명시.\n- 향후 연구 방향: single-arm 및 mobile 로봇 데이터를 통합해 모델의 다재다능함(versatility)을 확장하고, 제약 없는 환경(unconstrained environments)에서의 더 다양하고 이동 가능한 조작(mobile manipulation) 능력을 지향.\n- 이 섹션에는 수식이 전혀 없고, 그림을 번호로 직접 참조하지도 않으며, 등장하는 유일한 숫자는 '100 tasks'다.\n\n**왜 / 직관**\n\n결론의 핵심 직관은 'VLA foundation model에서의 양적 확장이 질적 우위로 이어진다'는 것이다. 비유하자면, 요리사(VLA 모델)를 가르칠 때 다양한 재료와 상황을 담은 거대한 실제 주방 경험(대규모 real-world dual-arm 데이터)을 쌓게 하고, 동시에 주방 동선을 효율적으로 재설계(optimized codebase로 training efficiency 확보)하면, 처음 보는 100가지 요리(100 tasks)에서도 능숙하게 대응한다는 그림이다. 또한 결론은 '레시피를 공개(code/model/benchmark 공개)'해 다른 사람도 같은 실력을 재현하게 하고, 다음 단계로는 한 손(single-arm)과 이동(mobile) 능력까지 갖춰 정해진 작업대를 벗어나 자유로운 환경에서도 일하는 로봇으로 키우겠다는 로드맵을 제시한다. 즉 '큰 실세계 데이터 + 효율적 학습 -> 광범위한 일반화 -> 공개로 생태계 확장 -> 형태(embodiment) 다양화'라는 단방향 논리 흐름이 결론의 골격이다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 결론이 요약하는 4가지 주장(대규모 real-world dual-arm 데이터로 pre-training, 다운스트림 task로의 효율적 전이, 세 embodiment 평가, 경쟁 모델 대비 명확한 우위)을 한 장으로 보여주는 overview 그림이라 결론 내용과 1:1로 대응.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **LingBot-VLA (foundation model, 결론에서 요약된 단일 시스템)**\n  - 목적/task: 대규모 실세계 데이터와 최적화 코드베이스로 학습해, 다양한 다운스트림 로봇 조작 task에 전이 가능한 일반화된 VLA(Vision-Language-Action) foundation model을 제공.\n  - 입력→출력: 결론 본문에서 명시적 입출력 shape는 주어지지 않음. 결론은 '입력: large-scale real-world (dual-arm) data + (멀티)task -> 출력: 100개 task에서의 우월한 동작 성능/일반화'라는 고수준 관계만 진술. (구체 shape는 본 섹션 근거 없음 -> 명시 불가)\n  - 내부: 결론에 따르면 두 축으로 성능을 확보: (1) large-scale real-world data를 통한 generalizability, (2) optimized codebase를 통한 training efficiency. 평가는 100개 task에 걸쳐 수행되어 경쟁 모델 대비 clear superiority를 보였다고 진술. 추가로 code/model/benchmark data를 공개. 향후에는 single-arm 및 mobile robotic data를 통합해 versatility를 확장할 계획. 결론 섹션 자체에는 내부 동작을 정의하는 수식이 없음.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n결론(Sec.6)이 진술하는 고수준 파이프라인 (본문 문장 근거, 추측 없음):\n\n  [Large-scale real-world data]      [Optimized codebase]\n   (대규모 실세계 데이터)              (코드베이스 최적화)\n            |                                |\n            v                                v\n     generalizability                 training efficiency\n     (일반화 성능 확보)                 (학습 효율 확보)\n            \\________________  ________________/\n                             \\/\n                  +---------------------------+\n                  |       LingBot-VLA         |\n                  |  (VLA foundation model)   |\n                  +---------------------------+\n                             |\n                             v\n              comprehensive evaluation across\n                       [100 tasks]\n                             |\n                             v\n        clear superiority over competitors +\n            broad generalizability\n                             |\n            +----------------+-----------------+\n            |                                  |\n            v                                  v\n   release code/model/                future work: integrate\n   benchmark data                     single-arm + mobile data\n   (open science)                     -> mobile manipulation in\n                                         unconstrained env.\n\n근거: 위 모든 노드/화살표는 결론 4개 문장에서 직접 인용된 요소만 사용\n(large-scale real-world data, optimized codebase, generalizability,\ntraining efficiency, 100 tasks, clear superiority, open science 공개,\nsingle-arm+mobile 통합). 내부 모듈 구조/shape는 결론에 없어 미표기.\n```\n\n**학습/추론**: 학습(training): 결론은 학습 레시피의 두 핵심 요소만 요약한다 — (1) 'large-scale real-world data'를 사용한 학습으로 generalizability 확보, (2) 'optimized codebase'를 통한 training efficiency 확보. 즉 데이터 규모 확장과 코드/엔지니어링 최적화가 결론이 강조하는 학습 측면의 두 기둥이다. 향후 학습 데이터 확장 방향으로 'single-arm and mobile robotic data 통합'을 명시한다. 추론/평가(evaluation/inference): '100 tasks'에 걸친 comprehensive evaluation을 수행했고, 그 결과 competitors 대비 clear superiority와 broad generalizability를 입증했다고 진술한다. 결론 섹션에는 구체적 하이퍼파라미터, loss, 추론 디코딩 절차 등 세부 학습/추론 메커니즘은 기술되어 있지 않다(해당 세부는 본 섹션 근거 없음). 재현성/공개: code, model, benchmark data를 공개해 open science를 지원한다고 명시.\n\n**핵심 숫자**\n\n- 100 tasks — comprehensive evaluation이 수행된 task 수 (결론에 등장하는 유일한 숫자)\n\n---\n\n## 한눈에 정리\n\n- **구조**: 사전학습 VLM(Qwen2.5-VL) + 새로 초기화한 action expert를 **BAGEL식 Mixture-of-Transformers**로 결합 — 두 모달리티를 별도 transformer 경로로 처리하되 **층별 공유 self-attention**으로만 섞어, VLM 의미 prior가 전 층에서 행동을 가이드하고 cross-modal 간섭은 억제. 행동은 **flow matching**으로 50-step action chunk를 생성하고, **π0식 blockwise causal attention**으로 미래 행동의 관찰 누수를 차단.\n- **차별 1 — 데이터·scaling**: 9종 dual-arm 로봇 ~2만 시간 실세계 데이터로 사전학습. 3,000h→20,000h로 키워도 SR/PS가 포화 없이 상승 = 저자들이 주장하는 \"real-world robot learning의 favorable scaling에 대한 first empirical evidence\".\n- **차별 2 — depth distillation (유일한 비표준 요소)**: VLM의 learnable query를 외부 LingBot-Depth의 depth token에 $L_{distill}=\\mathbb{E}|\\mathrm{Proj}(Q_t)-D_t|$(L1)로 정렬해, **추론 때 depth 센서 없이도** 기하/깊이 prior를 모델 안에 심음 → w/ depth 변형이 전 벤치 최고.\n- **차별 3 — 학습 효율**: FSDP2 + action expert 전용 HSDP shard group + 혼합정밀도(reduce fp32 / comm bf16) + FlexAttention·torch.compile → 8-GPU 261 samples/s, 기존 VLA 코드베이스 대비 1.5~2.8x.\n- **결과**: GM-100 실세계(3 플랫폼×100 task) 평균 SR **17.30%** (π0.5 13.02%, +4.28pp; PS 35.41 vs 27.65). RoboTwin 2.0 sim clean 88.56 / randomized 86.68로 최고. post-training에서 **task당 80 demo의 LingBot-VLA가 130 demo의 π0.5를 능가**(데이터 효율).\n- **계보 위치**: ① VLM+Action Expert. 미래 관측을 예측하는 ②/③/④(WAM·WM+IDM)와 달리 \"world model\"이 아니며, 핵심 기여는 데이터 규모·평가 엄밀성·학습 효율이라는 엔지니어링 축. Fast-WAM·Next Forcing이 baseline으로 인용하는 그 **LingBot-VA**가 이 모델.\n\n## ⚠️ 확인 필요 / 나중에(TODO)\n\n- [ ] **§3.2 검증 실패(ok=False) 정정 3건**: (1) instruction 라벨러로 명시된 **Qwen3-VL-235B-A22B**의 인용 [2]가 실제로는 *Qwen2.5-VL* tech report(bai2025qwen2, arXiv 2502.13923)를 가리킴 — 논문 내부 citation mismatch. (2) **Figure 3 캡션**은 \"atomic action word cloud of **(a) Pre-training datasets and (b) Benchmark**\" — 추출이 (b) Benchmark 절반을 누락. (3) \"테스트셋 atomic action의 ~50%가 학습 top-100에 없음\" 통계는 **§5.1.2** 소속(추출이 §4로 잘못 지목).\n- [ ] **SR/PS displayed 수식은 게재본에 없음**: 5.1.4/5.2/5.5.2에 실은 SR=…, PS=… 식은 LaTeX 소스에 **주석 처리(commented-out)**되어 실제 렌더 논문엔 산문 정의 + 예시(4/6≈0.67)만 있음. 특히 분모 15(=task당 trial 수)도 주석 소스 기반 → 본문 수치로 단정 금지.\n- [ ] **\"~20,000 hours\"·\"8 platforms\" 수치**: LaTeX 소스에서 일부가 주석 처리되어 게재본 §3 본문엔 미포함(Abstract/Intro에는 등장). 20k h는 abstract/intro 출처로 취급.\n- [ ] **적대적 검증 미완 섹션**(rate-limit): Abstract·2.2·3.1·5.1.1·5.1.2·5.1.3만 ok 확정. §1,2,2.1,2.3,3,4,4.1,4.2,5,5.1,5.1.4,5.2,5.3,5.4,5.5,5.5.1,5.5.2
