head\n - grads   완화)\n        |\n        v\n+---------------------------------------------------------------+\n| 결과: 동일 자원에서 throughput up + mem footprint down         |\n| (실증 -> 논문 5.4 / Figure 4: 8~256 GPU, near-linear scaling)  |\n+---------------------------------------------------------------+\n\n주: 4.2 본문에는 수식/그림 직접참조 없음. 위 흐름은 본문 문장만 근거,\n    텐서 shape은 본문 미명시이므로 표기하지 않음(추측 배제).\n```\n\n**학습/추론**: 학습(training) 방법 세부 (이 서브섹션 범위): 분산 학습은 FSDP(=ZeRO의 PyTorch 구현)로 optimizer states/parameters/gradients를 샤딩. action expert 모듈에 한정한 전용 shard group(HSDP, VeOmni에서 영감)으로 통신 오버헤드 완화. mixed-precision은 reduction을 torch.float32로, storage/communication을 torch.bfloat16로 분리. 연산 효율은 sparse multimodal attention에 FlexAttention, torch.compile operator fusion으로 kernel launch overhead 감소 + memory bandwidth 활용 극대화. 추론(inference) 방법: 이 서브섹션(4.2)은 학습 효율 최적화만 다루며 추론 절차에 대한 별도 기술은 본문에 없음(추측 금지). 참고로 효율 최적화의 실증 결과는 별도 서브섹션 5.4 Training Throughput Analysis에 있다: Libero 데이터셋에서 표준화된 pi-형 아키텍처로 baseline(StarVLA, Dexbotic, OpenPI)과 비교, 로컬 batch size는 모든 실험에서 32로 표준화, throughput 지표는 samples/s. StarVLA/Dexbotic은 ZeRO, 본 codebase는 동등한 FSDP2, OpenPI는 DDP(통신 오버헤드 더 낮음) 사용. 두 모델(Qwen2.5-VL-3B-pi, PaliGemma-3B-pt-224-pi)에서 본 codebase가 가장 빠른 학습 속도를 달성했고, 8/16/32/128/256 GPU 구성에서 이론적 linear scaling limit에 근접하는 우수한 scaling 효율을 보였다.\n\n**핵심 숫자**\n\n- mixed-precision: reduction은 torch.float32, storage/communication은 torch.bfloat16\n- (5.4 throughput 실증, 동일 효율 스택 검증) local batch size = 32 (모든 실험 표준화)\n- (5.4) GPU 구성 = 8, 16, 32, 128, 256 GPUs + 이론적 linear scaling limit 비교\n- (5.4) 비교 baseline = StarVLA, Dexbotic, OpenPI / 데이터셋 = Libero / 지표 = sample throughput (samples/s)\n- (5.4) 분산 방식: StarVLA·Dexbotic = ZeRO, 본 codebase = FSDP2, OpenPI = DDP\n- (5.4) 검증 대상 모델 2종: Qwen2.5-VL-3B-pi, PaliGemma-3B-pt-224-pi\n\n## 5 Experiments (실험)\n\n**핵심**\n\n- 대규모 실세계 평가: 3개 상용 플랫폼(AgileX, Agibot G1, Galaxea R1Pro)의 물리 로봇 25대 + GM-100 벤치마크(100개 조작 태스크, 39,000개 전문가 시연) + 통제된 평가 프로토콜(22,500회 시행, 3개 SOTA 베이스라인 동일 조건 비교).\n- 모든 임베디먼트는 dual-arm + parallel-jaw gripper 구성. 각 로봇은 손목 카메라 2개 + 머리 장착 카메라 1개(egocentric/human-eye 시점). 모든 태스크는 tabletop 기반, chassis와 waist는 고정.\n- 데이터 수집: 태스크당 raw 궤적 150개 teleoperation 수집 → 실행 품질(태스크 완료, 동작 부드러움, 프로토콜 준수) 상위 130개만 학습에 사용. 객체 pose(위치·방향)는 워크스페이스 내에서 무작위화하여 overfitting 방지. 자동 필터링 + 수동 검토(동기화 multi-view 영상)로 품질 보증.\n- 테스트셋의 atomic action 중 약 50%가 학습셋 top-100 빈출 action에 없음 → 테스트셋의 다양성과 일반화 능력 검증의 엄격성을 강조(Figure 3 word cloud).\n- 베이스라인: π0.5, GR00T N1.6, WALL-OSS. 공정 비교를 위해 모두 공개 사전학습 체크포인트에서 동일 post-training 파이프라인·동일 검증 데이터(태스크당 130궤적)·동일 하이퍼파라미터(batch size=256, epochs=20)로 fine-tune. 데이터 수집에 쓴 정확히 같은 로봇 유닛에서 순차·무작위 순서로 평가(하드웨어 편향 제거).\n- 평가 지표 2개: Success Rate(SR, 3분 내 전 단계 완료 비율, 주 지표) 및 Progress Score(PS, 순차 subtask 체크포인트 진행도로 부분 완료 측정, 진단 지표). 종료 조건: 연속 3회 subtask 실패 또는 안전-치명 이벤트(충돌 등).\n- 실세계 결과(Table 1): LingBot-VLA w/o depth가 모든 플랫폼에서 WALL-OSS·GR00T N1.6를 SR·PS 모두 크게 앞섬. depth 추가 시(w/ depth) π0.5 대비 평균 SR +4.28%, PS +7.76% 향상. 평균 SR: WALL-OSS 4.05%, GR00T N1.6 7.59%, π0.5 13.02%, Ours w/o depth 15.74%, Ours w/ depth 17.30%.\n- GR00T N1.6는 Galaxea R1Pro에서 π0.5에 필적 → 사전학습에 Galaxea R1Pro 데이터가 대량 포함되었기 때문. 구조적으로 유사한 downstream 태스크에서 사전학습이 성능을 크게 높일 수 있음을 시사.\n- 시뮬레이션 결과(Table 2, RoboTwin 2.0, 50개 대표 태스크): clean scenes에서 w/o depth가 π0.5 대비 절대 SR +3.76%, w/ depth +5.82%. randomized scenes에서 w/o depth +8.58%, w/ depth +9.92%. depth는 learnable query-based alignment로 LingBot-Depth 모델에서 spatial prior를 추출.\n- 학습 throughput(5.4, Libero 데이터셋, π-like 아키텍처): 자체 코드베이스가 StarVLA·Dexbotic·OpenPI 대비 두 모델(Qwen2.5-VL-3B-π, PaliGemma-3B-pt-224-π) 모두에서 가장 빠른 학습 속도. 8/16/32/128/256 GPU에서 측정, 이론적 linear scaling 한계에 근접하는 scaling 효율.\n- Scaling law(5.5.1): 25개 대표 태스크에서 사전학습 데이터를 3,000→20,000시간으로 늘릴수록 PS·SR 모두 일관된 상승. 3개 임베디먼트 개별 추세도 aggregate와 일치 → scaling law의 견고성 입증.\n- 데이터 효율(5.5.2): Agibot G1, GM-100의 8개 대표 태스크. 태스크당 단 80 시연만으로도 LingBot-VLA가 130 시연을 쓴 π0.5를 PS·SR 모두 능가. post-training 데이터가 늘수록 성능 격차가 더 벌어짐 → 우수한 data efficiency·scalability.\n\n**왜 / 직관**\n\n이 섹션은 \"더 큰 모델·더 좋은 알고리즘\"이 아니라 \"더 많은 실세계 데이터 + 공정한 비교 + depth 보강\"이 어떻게 실제 로봇 성능으로 이어지는지를 측정하는 데 집중한다. 비유하자면, 운전 실력 평가를 시뮬레이터가 아니라 실제 도로에서, 그것도 여러 종류의 차(3개 플랫폼)로, 모든 응시자에게 똑같은 차·똑같은 코스를 무작위 순서로 배정해(strict machine-task pairing) 치르게 하는 것과 같다. 합격(SR)뿐 아니라 \"6단계 중 4단계까지 갔다\"는 부분 점수(PS, 4/6≈0.67)도 매겨 실패 지점을 진단한다. 테스트셋의 절반이 학습에서 거의 본 적 없는 동작이라는 점은 시험 문제의 절반이 처음 보는 응용문제라는 의미로, 암기가 아닌 일반화를 본다. Depth는 한쪽 눈만 쓰던 모델에 거리 감각(입체시)을 더해주는 보조 센서 역할이고, scaling 실험은 \"교과서(데이터)를 3천 시간에서 2만 시간으로 늘리면 성적이 계속 오른다\"는 학습 곡선을 보여 데이터 투자에 대한 정당성을 제공한다.\n\n**수식**\n\n$$\n\\frac{4}{6}\\approx 0.67\n$$\n\n- **무슨 식?**: 완료 subtask 수 / 전체 subtask 수 = 부분 진행 점수(연속값)\n- **설명**: Progress Score(PS) 계산 예시. 'Stack Bowls' 6-step 태스크에서 step 1~4까지 완료하고 step 5에서 실패한 경우의 부분 완료 점수. 분자=완료한 subtask 수(4), 분모=전체 subtask 수(6). PS는 SR(전부 완료=1, 아니면 0의 이진 평가)이 놓치는 부분 진행도를 0~1 연속값으로 포착해 실패 모드를 진단하고 부분 성공에 보상을 준다.\n\n**그림**\n\n원본 그림 3a: [arXiv Figure 3a](https://arxiv.org/html/2601.18692v2/x3.png)\n![](https://arxiv.org/html/2601.18692v2/x3.png)\n→ 5.1.2가 직접 참조 — 사전학습 데이터셋의 atomic action 분포(word cloud)로 학습셋 동작 다양성을 시각화.\n\n원본 그림 3b: [arXiv Figure 3b](https://arxiv.org/html/2601.18692v2/x4.png)\n![](https://arxiv.org/html/2601.18692v2/x4.png)\n→ 5.1.2가 직접 참조 — 벤치마크(테스트)셋 atomic action word cloud. 테스트셋의 ~50%가 학습 top-100에 없다는 일반화 난이도 주장의 근거.\n\n원본 그림 4a: [arXiv Figure 4a](https://arxiv.org/html/2601.18692v2/x5.png)\n![](https://arxiv.org/html/2601.18692v2/x5.png)\n→ 5.4가 직접 참조 — Qwen2.5-VL-3B-π 모델의 학습 throughput을 StarVLA/Dexbotic/OpenPI와 비교, 8~256 GPU scaling 효율.\n\n원본 그림 4b: [arXiv Figure 4b](https://arxiv.org/html/2601.18692v2/x6.png)\n![](https://arxiv.org/html/2601.18692v2/x6.png)\n→ 5.4가 직접 참조 — PaliGemma-3B-pt-224-π 모델의 학습 throughput 비교, 자체 코드베이스가 최고 속도임을 입증.\n\n원본 그림 5a: [arXiv Figure 5a](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n→ 5.5.1이 직접 참조 — 사전학습 데이터 3,000→20,000시간 증가에 따른 Progress Rate 상승(scaling law) 시각화.\n\n원본 그림 5b: [arXiv Figure 5b](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n→ 5.5.1이 직접 참조 — 동일 데이터 scaling에 따른 Success Rate 상승, 3개 임베디먼트별 추세가 aggregate와 일치.\n\n원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2601.18692v2/figures/experiment/post_training_data_scaling_law/Dual_Axis_Success_Progress.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/post_training_data_scaling_law/Dual_Axis_Success_Progress.png)\n→ 5.5.2가 직접 참조 — post-training data efficiency. 80 시연 LingBot-VLA가 130 시연 π0.5를 능가함을 보여줌.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 5 평가 파이프라인 (본문 5.1.2~5.1.4 근거, 추측 없음)\n\n[Data Collection: per GM-100 task]\n  teleoperation 150 raw trajectories\n      | rank by execution quality\n      | (completion, smoothness, protocol)\n      v\n  top 130 retained ----> Automated Filtering ----> Manual Review\n                          (technical anomalies)     (multi-view video)\n      | object pose randomized (position+orientation)\n      v\n  Verified dataset (130 traj/task)\n\n[Standardized Training: all models identical]\n  pretrained checkpoint --> same post-training pipeline\n      hyperparams: batch=256, epochs=20\n      models: WALL-OSS / GR00T N1.6 / pi0.5 / Ours(w/o,w/ depth)\n\n[Strict Machine-Task Pairing + Controlled Eval]\n  same robot unit used in data collection\n  sequential, randomized order, 15 trials / task-robot pair\n      | 3 platforms x 100 tasks\n      v\n  rosbag recording (3rd-person view, robot state, predictions)\n\n[Metrics]                         [Termination]\n  SR = all steps done <=3min   <- (1) 3 consecutive subtask fails\n  PS = done_subtasks/total        (2) safety event (collision)\n       e.g. 4/6 ~= 0.67\n\nRobot perception (5.1.1): 2 wrist cam + 1 head cam(egocentric)\n                          dual-arm + parallel-jaw gripper\n                          tabletop, chassis/waist fixed\n```\n\n**학습/추론**: 학습(이 섹션 기준): (post-training/fine-tuning) 모든 비교 모델은 공개 사전학습 체크포인트에서 시작해 동일한 post-training 파이프라인·동일 검증 데이터(태스크당 130 filtered trajectory)·동일 하이퍼파라미터(batch size=256, epochs=20)로 fine-tune (5.1.3). 시뮬레이션(5.3)은 RoboTwin clean 2,500 demos(50/task) + randomized 25,000 demos(500/task)로 finetune. Throughput 학습(5.4)은 Libero 데이터셋, local batch size=32, 자체 코드베이스는 FSDP2(베이스라인은 ZeRO/DDP)로 8~256 GPU 분산 학습. 사전학습 데이터 규모는 3,000~20,000시간 (5.5.1). 추론/평가: task-robot pair당 15 trials, 무작위 순서, 데이터 수집에 쓴 동일 로봇 유닛에서 평가(5.1.3). SR은 3분 시간 제한 내 전 단계 완료 여부, PS는 subtask 체크포인트 진행도(예 4/6≈0.67)로 측정. trial 종료는 연속 3회 subtask 실패 또는 안전-치명 이벤트(충돌). 평가 데이터는 rosbag(3인칭 뷰, 로봇 상태, 모델 예측) 기록으로 open-source 예정 (5.1.4).\n\n**핵심 숫자**\n\n- 물리 로봇 25대, 상용 플랫폼 3개(AgileX, Agibot G1, Galaxea R1Pro)\n- GM-100: 100개 조작 태스크, 39,000개 전문가 시연\n- 통제 평가: 22,500 trials, SOTA 베이스라인 3개\n- 데이터 수집: 태스크당 raw 궤적 150개 → 상위 130개 retention\n- 테스트셋 atomic action의 약 50%가 학습 top-100 빈출 action에 없음\n- 학습 하이퍼파라미터: batch size=256, epochs=20; task-robot pair당 15 trials\n- SR 시간 제한 3분; 종료 조건 연속 3회 subtask 실패 또는 안전 이벤트\n- PS 예시: Stack Bowls 6-step 중 4-step 완료 = 4/6 ≈ 0.67\n- Table 1 평균 SR — WALL-OSS 4.05%, GR00T N1.6 7.59%, π0.5 13.02%, Ours w/o depth 15.74%, Ours w/ depth 17.30%\n- Table 1 평균 PS — WALL-OSS 10.35%, GR00T N1.6 15.99%, π0.5 27.65%, Ours w/o depth 33.69%, Ours w/ depth 35.41%\n- w/ depth vs π0.5 (실세계): 평균 SR +4.28%, PS +7.76%\n- Table 1 플랫폼별 Ours w/ depth SR — Agibot G1 11.98%, AgileX 18.93%, Galaxea R1Pro 20.98%\n- RoboTwin 2.0: 50개 대표 태스크; clean 2,500 demos(50/task), randomized 25,000 demos(500/task)\n- Table 2 Clean SR — π0.5 82.74%, w/o depth 86.50%, w/ depth 88.56%\n- Table 2 Randomized SR — π0.5 76.76%, w/o depth 85.34%, w/ depth 86.68%\n- 시뮬레이션 절대 향상 vs π0.5: w/o depth +3.76%(clean)/+8.58%(randomized), w/ depth +5.82%/+9.92%\n- Throughput(5.4): local batch size=32; GPU 구성 8/16/32/128/256\n- Scaling(5.5.1): 25개 태스크, 사전학습 데이터 3,000~20,000시간\n- Data-efficient(5.5.2): Agibot G1, 8개 대표 태스크; 80 demos(Ours) vs 130 demos(π0.5)\n\n## 5.1 Large-scale Real-world Benchmark (대규모 실세계 벤치마크)\n\n**핵심**\n\n- 이 섹션은 LingBot-VLA를 multi-embodiment 일반화와 실세계 robustness 관점에서 엄밀히 평가하기 위한 벤치마크 자체를 정의한다(모델 구조가 아니라 '평가 인프라' 설명). 세 가지 핵심 구성요소: (1) 3개 상용 플랫폼에 걸친 물리 로봇 25대, (2) 100개의 다양한 manipulation task와 39,000개 expert demonstration을 포함하는 GM-100 벤치마크, (3) 22,500회 trial을 생성하는 통제된 평가 프로토콜. 모든 비교는 3개 SOTA baseline과 동일 학습/테스트 조건 하에서 수행된다.\n- 5.1.1 Hardware Platforms: 3개 로봇 플랫폼(AgileX, Agibot G1, Galaxea R1Pro). 모두 dual-arm + parallel-jaw gripper 구성. 각 로봇은 카메라 3대(손목 장착 2대 + 머리 장착 1대로 egocentric/인간 시점 확보). 모든 task는 tabletop 기반이고 로봇의 chassis와 waist는 고정된다.\n- 5.1.2 Data Collection: GM-100 각 task마다 teleoperation으로 expert demo 수집. task당 raw trajectory 150개 수집 -> 실행 품질(완료도/모션 부드러움/프로토콜 준수) 기준 상위 130개만 학습용으로 보존. 표준화된 객체, 객체 pose 랜덤화(공간 과적합 방지), teleoperation 지침 3가지, 자동 필터링 + 사람 수동 검수의 2단계 품질 관리.\n- 5.1.2 다양성 분석: word cloud(Figure 3)로 train/test atomic action 분포를 시각화. 정량 분석 결과 test set atomic action의 약 50%가 train의 상위 100개 빈출 action에 존재하지 않음 -> test set의 다양성과 일반화 평가의 엄밀성을 강조.\n- 5.1.3 Benchmarking Protocol: baseline 3종(\\pi_{0.5}, GR00T N1.6, WALL-OSS)과 비교. 공정 비교를 위해 (a) 모두 공개 pre-trained checkpoint에서 동일 post-training 파이프라인으로 fine-tune, 동일 dataset(task당 130개)과 동일 hyperparameter(batch size=256, epochs=20) 사용, (b) 데이터 수집에 쓴 바로 그 로봇 유닛에서 평가하는 엄격한 machine-task pairing으로 하드웨어 편차 제거, 모든 모델은 동일 hardware-task pair에서 randomized 순서로 순차 테스트, (c) 객체 위치/방향 랜덤화로 memorization이 아닌 generalization 평가, (d) task-robot pair당 15 trial, rosbag 형식으로 전체 기록 후 오픈소스화 예정.\n- 5.1.4 Evaluation Metrics: 두 지표. Success Rate(SR) = 3분 제한 내 모든 task step을 완료한 trial 비율(주 지표, 실제 배포 가능성 반영). Progress Score(PS) = 순차 subtask checkpoint 진행도로 부분 완료 측정(진단 지표, 부분 성공 보상). 종료 조건: (1) subtask 3회 연속 실패 또는 (2) 충돌 등 safety-critical event 발생. 종료 시점까지 완료된 subtask 기준으로 채점. 100개 task 전체 SR/PS와 로봇 종류별 per-platform 지표 모두 보고.\n\n**왜 / 직관**\n\n이 섹션의 핵심 직관은 \"VLA 모델을 공정하게 비교하려면 모델보다 '시험장'을 먼저 엄격하게 설계해야 한다\"이다. 비유하면, 여러 운전자(VLA 모델)의 실력을 비교하는 운전 시험과 같다. 핵심은 (1) 똑같은 차량(같은 로봇 유닛)에서, (2) 똑같은 코스 규격(GM-100 task)으로, (3) 매번 콘(객체)을 랜덤하게 재배치(generalization 평가, 코스 암기 방지)하고, (4) 합격(SR)뿐 아니라 코스 어디까지 갔는지(PS) 부분 점수도 매긴다는 것이다. machine-task pairing은 \"차이가 운전자 실력인지 차 성능인지\"를 분리하기 위해 모두를 똑같은 차에 태우는 것에 해당하고, train과 겹치지 않는 test action 50%는 \"연습 코스에 없던 새 구간\"을 일부러 넣어 진짜 응용력을 보는 것에 해당한다. SR을 합격/불합격(이진), PS를 부분 점수(연속)로 둔 것은 어려운 task에서 모델 간 미세한 능력 차이까지 진단하기 위함이다.\n\n**그림**\n\n원본 그림 3a: [arXiv Figure 3a](https://arxiv.org/html/2601.18692v2/x3.png)\n![](https://arxiv.org/html/2601.18692v2/x3.png)\n→ 5.1.2가 직접 참조하는 그림(Figure 3a): pre-training/train set의 atomic action 빈도 word cloud로, test action 50%가 train 상위 100개에 없다는 다양성 주장을 시각적으로 뒷받침한다.\n\n원본 그림 3b: [arXiv Figure 3b](https://arxiv.org/html/2601.18692v2/x4.png)\n![](https://arxiv.org/html/2601.18692v2/x4.png)\n→ 5.1.2가 직접 참조하는 그림(Figure 3b): benchmark(test set)의 atomic action word cloud로, train 분포와의 차이(일반화 난이도)를 보여준다.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n벤치마크 구성 (5.1 본문 근거: 25 robots / 3 platforms / GM-100 / 22,500 trials)\n\n[3 Platforms x 25 physical robots]\n  AgileX        Agibot G1        Galaxea R1Pro\n   |  dual-arm + parallel-jaw gripper (3 platforms 공통)\n   |  cameras: wrist x2 + head x1 (egocentric)\n   |  tabletop only; chassis & waist fixed\n   v\n+-------------------- DATA COLLECTION (5.1.2) ----------------------+\n| per GM-100 task (100 tasks):                                      |\n|   teleoperation -> 150 raw trajectories                          |\n|        | rank by execution quality                              |\n|        | (completion / smoothness / protocol adherence)         |\n|        v  top 130 retained                                       |\n|   object pose randomized + standardized objects                  |\n|        v                                                         |\n|   [Automated Filtering] --> [Manual Review (multi-view video)]    |\n|        v                                                         |\n|   verified set: 130 trajectories / task  (총 ~39,000 demos)       |\n+------------------------------------------------------------------+\n                              |\n                              v\n+--------------- BENCHMARKING PROTOCOL (5.1.3) --------------------+\n| models: pi_0.5 , GR00T N1.6 , WALL-OSS , LingBot-VLA            |\n|   all: same checkpoint->post-train, batch=256, epochs=20         |\n|   strict machine-task pairing (same robot unit as collection)    |\n|   randomized object pos/orient (generalization, not memorize)    |\n|   15 trials / (task x robot) pair  -> recorded as rosbag         |\n+------------------------------------------------------------------+\n                              |\n                              v\n+----------------- EVALUATION METRICS (5.1.4) --------------------+\n|  per trial (3-min limit):                                        |\n|     SR = 1 if all steps done else 0                              |\n|     PS = (#subtasks completed) / (#total subtasks)               |\n|  terminate if: 3 consecutive subtask fails  OR  safety event     |\n|  report: overall SR/PS over 100 tasks + per-platform breakdown   |\n+------------------------------------------------------------------+\n(총 trial 수: 100 tasks x 3 platforms x ... -> 22,500 trials, 본문 명시)\n```\n\n**학습/추론**: 학습(5.1.3 Standardized Training): 모든 비교 모델은 공개된 pre-trained checkpoint에서 출발해 동일한 post-training(fine-tuning) 파이프라인으로 학습된다. 학습 데이터는 task당 검증된 130개 trajectory, hyperparameter는 batch size=256, epochs=20으로 모두 통일하여 공정 비교를 보장한다(아키텍처 성능만 분리). 추론/평가(5.1.3 Inference & 5.1.4): 데이터 수집에 사용한 동일 로봇 유닛에서, 객체 위치/방향을 랜덤화한 상태로 task-robot pair당 15 trial씩 수행한다. 각 trial은 3분 time limit을 가지며, 모든 step 완료 시 성공(SR=1), 그렇지 않으면 subtask checkpoint까지의 진행도로 PS를 매긴다. trial은 subtask 3회 연속 실패 또는 충돌 등 안전 이벤트 발생 시 종료된다. 모든 실행은 3인칭 뷰/robot state/모델 예측과 함께 rosbag으로 기록되어 오픈소스로 공개될 예정이다. 최종 보고는 100 task 전체의 SR/PS와 로봇 종류별 per-platform 지표(cross-embodiment 일반화 평가)로 이루어진다.\n\n**핵심 숫자**\n\n- 물리 로봇 25대, 상용 플랫폼 3종 (AgileX, Agibot G1, Galaxea R1Pro)\n- GM-100: 100개 manipulation task, 39,000개 expert demonstration\n- 통제 평가 프로토콜: 22,500회 trial 생성\n- baseline 3종: \\pi_{0.5}, GR00T N1.6, WALL-OSS\n- task당 raw trajectory 150개 수집 -> 상위 130개 보존(학습용)\n- 카메라: 손목 장착 2대 + 머리 장착 1대 = 로봇당 3대\n- test set atomic action의 약 50%가 train 상위 100개 빈출 action에 부재\n- 공통 hyperparameter: batch size = 256, epochs = 20\n- task-robot pair당 15 trial\n- SR time limit = 3분\n- PS 예시: 6단계 task 중 4단계 완료 = 4/6 ≈ 0.67\n- Termination: subtask 3회 연속 실패 시 종료\n\n## 5.1.1 Hardware Platforms (하드웨어 플랫폼)\n\n**핵심**\n\n- LingBot-VLA의 실제 환경 벤치마크는 3개의 서로 다른 상용 로봇 플랫폼에서 수행된다: AgileX, Agibot G1, Galaxea R1Pro. (multi-embodiment 일반화를 검증하기 위한 구성)\n- 3개 embodiment 모두 동일한 형태를 공유한다: dual-arm(양팔) 구성에 parallel-jaw gripper(평행 집게형 그리퍼) 장착. 즉 서로 다른 브랜드이지만 morphology(형태)는 통일되어 있어 cross-embodiment 비교가 공정하다.\n- 각 로봇은 총 3대의 카메라로 perception(인지)을 구성한다: wrist-mounted(손목 장착) 카메라 2대 + head-mounted(머리 장착) 카메라 1대. head 카메라는 egocentric, human-eye(사람 눈 시점) 관점을 포착한다.\n- 모든 task는 tabletop(탁상) 기반이며, embodiment의 chassis(차대)와 waist(허리)는 고정(fixed)되어 있다. 즉 mobile base 이동이나 허리 굽힘은 평가 대상이 아니고, 양팔 manipulation 자체에 집중한다.\n- (섹션 5.1 도입부 맥락) 이 하드웨어는 총 25대의 물리 로봇, 3개 상용 플랫폼, GM-100 벤치마크(100개 task, 39,000개 expert demonstration), 22,500 trial 평가 프로토콜이라는 대규모 실험 인프라의 일부다.\n- 이 subsection에는 수식이 없으며(prose만 존재), 본문 내에서 직접 참조하는 그림 번호도 없다. (HTML/LaTeX 원문 양쪽에서 확인)\n\n**왜 / 직관**\n\n왜 이렇게 구성했는가에 대한 직관: VLA foundation model의 핵심 주장은 '하나의 모델이 여러 종류의 로봇(embodiment)에서 작동한다'는 것이다. 이를 공정하게 증명하려면, 서로 '다르되 비교 가능한' 로봇 집합이 필요하다. 그래서 (1) 브랜드는 일부러 3개로 다르게 하되(AgileX/Agibot/Galaxea) — generalization을 시험하고, (2) 형태(dual-arm + parallel-jaw gripper)와 센서 배치(손목 2 + 머리 1)는 통일해 — 변수를 통제했다. 카메라 배치를 사람 눈처럼(head egocentric) + 양손 근접뷰(wrist)로 둔 것은 '사람이 작업할 때 보는 시야 + 손 끝 디테일'을 모방한 것이다. 비유하자면, 요리 실력을 검증할 때 주방(브랜드)은 세 곳을 다르게 하되, 칼·도마·앞치마(형태/센서)는 똑같이 맞춰두고, 셰프의 시점 카메라(머리)와 손 위 카메라(손목)로 녹화하는 것과 같다. chassis/waist를 고정한 것은 '걸어다니며 하는 작업'이라는 추가 난이도를 배제하고 순수 양팔 조작 능력만 깨끗하게 측정하려는 통제 장치다.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Robotic Platforms (3종 embodiment)**\n  - 목적/task: multi-embodiment 일반화 및 실제 환경 robustness를 평가하기 위한 3개 서로 다른 상용 로봇 집합\n  - 입력→출력: 입력: 정책(policy)이 내는 양팔 action 명령 → 출력: 실제 tabletop manipulation 수행 결과 (성공/진행). 본문에 구체적 DoF/joint 수/제어 주파수 shape는 명시되지 않음.\n  - 내부: AgileX, Agibot G1, Galaxea R1Pro 3종. 브랜드는 다르지만 형태(morphology)는 통일: 모두 dual-arm + parallel-jaw gripper. 브랜드 차이는 generalization 시험용, 형태 통일은 비교 변수 통제용.\n\n- **Manipulator Configuration (조작부)**\n  - 목적/task: 물체를 집고 다루는 양팔 + 그리퍼 구성\n  - 입력→출력: 입력: 양팔 관절/그리퍼 제어 신호 → 출력: 물리적 파지(grasp) 및 조작. (구체 DoF/제어 hz는 본문 미기재)\n  - 내부: dual-arm configuration, 각 팔 끝에 parallel-jaw gripper. 모든 task가 tabletop 기반이고 chassis와 waist는 고정 -> base 이동/허리 굽힘은 action 공간에서 제외, 순수 양팔 조작에 집중.\n\n- **Perception / Camera Setup (인지/카메라)**\n  - 목적/task: robust perception을 위한 다중 시점 시각 입력 확보\n  - 입력→출력: 입력: 환경/물체 장면 → 출력: 멀티뷰 이미지 스트림(wrist 2 + head 1, 총 3뷰). 본문에 해상도/FPS 등 수치 shape는 미기재.\n  - 내부: 로봇 1대당 카메라 3대: wrist-mounted 2대(양손 근접 디테일) + head-mounted 1대(egocentric, human-eye 시점). 손끝 정밀 정보 + 전체 작업 시야를 동시에 제공.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n로봇 1대당 하드웨어/센서 구성 (본문 근거: dual-arm + parallel-jaw gripper, wrist x2 + head x1, chassis/waist fixed)\\n\\n           [ Head-mounted Camera ]   <- egocentric, human-eye 시점 (1대)\\n                   |\\n            +------+------+\\n            |   머리/몸통   |\\n            |  (waist 고정)  |\\n            +--+--------+--+\\n               |        |\\n        Left Arm        Right Arm        <- dual-arm 구성\\n        [wrist cam]     [wrist cam]      <- 손목 장착 카메라 (총 2대)\\n            |              |\\n     parallel-jaw      parallel-jaw      <- 평행 집게형 그리퍼\\n        gripper           gripper\\n            \\\\              /\\n        ========= TABLETOP =========      <- 모든 task는 탁상 기반\\n        (chassis 고정: 이동 없음)\\n\\n3개 플랫폼은 위 구성을 공유하되 브랜드만 다름:\\n  +-----------+------------+--------------+\\n  |  AgileX   | Agibot G1  | Galaxea R1Pro|\\n  +-----------+------------+--------------+\\n  | dual-arm  | dual-arm   | dual-arm     |  (형태 동일)\\n  | jaw grip  | jaw grip   | jaw grip     |  (그리퍼 동일)\\n  | 2 wrist   | 2 wrist    | 2 wrist      |  (센서 동일)\\n  | +1 head   | +1 head    | +1 head      |\\n  +-----------+------------+--------------+\\n           |          |            |\\n           +----------+------------+\\n                      v\\n        총 25대 물리 로봇 / GM-100(100 task) / 39,000 demo\\n        (섹션 5.1 도입부 수치)\n```\n\n**학습/추론**: 이 subsection(5.1.1) 자체는 학습/추론 알고리즘을 기술하지 않고, 학습/평가가 돌아가는 '물리적 토대'(하드웨어)만 정의한다. 본문 근거로 말할 수 있는 범위: (1) 평가 setting은 tabletop manipulation이며 chassis/waist 고정이므로, 모델이 다루는 action은 양팔 + parallel-jaw gripper 조작에 한정된다. (2) 관측(observation)은 wrist x2 + head x1의 멀티뷰 카메라 이미지로 구성된다. (3) 동일 하드웨어 형태를 3개 브랜드(AgileX/Agibot G1/Galaxea R1Pro)에 걸쳐 통일했기 때문에, 같은 정책을 여러 embodiment에 transfer/평가하는 cross-embodiment 일반화 실험이 가능하다. 구체적 학습 절차(데이터 수집·필터링)는 인접 subsection 5.1.2(Data Collection and Processing), 평가 프로토콜은 5.1.3에서 다루며 5.1.1 범위 밖이다. DoF 수, 제어 주파수, 카메라 해상도/FPS 등은 본문에 명시되지 않아 추정하지 않는다.\n\n**핵심 숫자**\n\n- 로봇 플랫폼 종류: 3개 (AgileX, Agibot G1, Galaxea R1Pro)\n- 구성: dual-arm (양팔) + parallel-jaw gripper\n- 카메라: 로봇당 3대 = wrist-mounted 2대 + head-mounted 1대\n- task 형태: tabletop 기반 (전부)\n- 고정 부위: chassis + waist (fixed)\n- [섹션 5.1 도입부 맥락 수치] 물리 로봇 총 25대 / 상용 플랫폼 3종\n- [섹션 5.1 도입부 맥락 수치] GM-100 벤치마크: 100개 manipulation task, 39,000개 expert demonstration\n- [섹션 5.1 도입부 맥락 수치] 평가 trial 총 22,500회, baseline VLA 모델 3종과 비교\n\n## 5.1.2 Data Collection and Processing (데이터 수집 및 처리)\n\n**핵심**\n\n- GM-100 벤치마크의 각 task마다, 표준화된 프로토콜에 따라 teleoperation(원격조작)으로 전문가 시연(expert demonstration)을 수집한다. 프로토콜의 목표는 '높은 데이터 품질'과 '환경 다양성' 두 가지다. (source: 'we collect expert demonstrations via teleoperation following a standardized protocol designed to ensure high data quality and environmental diversity')\n- Trajectory Volume(궤적 수량): task당 3개 플랫폼에 걸쳐 raw trajectory 150개를 수집하고, 실행 품질(execution quality) 기준 상위 130개만 학습에 사용한다. 실행 품질은 task completion(과제 완수), motion smoothness(동작 부드러움), protocol adherence(프로토콜 준수) 3가지로 랭킹한다. 모든 궤적은 GM-100 task 사양을 엄격히 따른다. (source: '150 raw trajectories are collected per task across three platforms. The top 130, ranked by execution quality ... are retained for training.')\n- Standardized Objects(표준화 객체): task에 쓰는 객체는 GM-100 material specification에 맞춰 표준화·조달하여, 여러 수집 현장(sites) 간 재현성(reproducibility)을 보장한다. (source: 'task objects are standardized and sourced according to GM-100 material specifications to ensure reproducibility across sites.')\n- Environmental Diversity(환경 다양성): 매 궤적마다 작업공간 내에서 객체 자세(position과 orientation)를 무작위화(randomize)한다. 이는 특정 공간 배치에 overfitting되는 것을 막고, 좌표 암기 대신 task-relevant invariance(과제 본질적 불변성)를 학습하도록 유도한다. (source: 'object poses (positions and orientations) are randomized within the workspace for each trajectory to prevent overfitting ... and encourage learning of task-relevant invariances.')\n- Teleoperation Guidelines(원격조작 지침) 3가지: (1) end-effector와 작업면 사이 간격(clearance) 유지로 충돌 방지, (2) 객체 접촉(contact) 단계에서 속도를 줄여 부드러운 조작, (3) episode 시작과 종료 시점의 image observation을 서로 구별 가능하게 만들어 안정적인 policy 학습 지원. (source: '(1) maintaining clearance ... (2) reducing velocity during object contact phases ... (3) ensuring distinct image observations at episode start and termination ...')\n- 품질 보증(QA)은 2단계 파이프라인이다. 1단계 Automated Filtering(자동 필터링): 알고리즘 스크리닝으로 technical anomaly(기술적 이상)를 보이는 episode를 자동 제외. 2단계 Manual Review(수동 검수): 사람 리뷰어가 동기화된 multi-view 비디오 스트림으로 검증하고, 불필요한 객체(extraneous object)가 포함되거나 task 프로토콜에서 벗어난 episode를 제거. (source: 'an algorithmic screening procedure automatically excludes episodes exhibiting technical anomalies.' / 'human reviewers validate the filtered dataset using synchronized multi-view video streams. Episodes are removed if they include extraneous objects or deviate from task protocols.')\n- 다양성 정량 분석: 학습/테스트셋의 atomic action(원자적 동작) 분포를 word cloud로 시각화. 정량 분석 결과 테스트셋 atomic action의 약 50%가 학습셋 상위 100개 최빈 action에 없음 -> 테스트셋의 다양성과 일반화 능력에 대한 엄격한 평가를 입증. (source: 'approximately 50\\% of the atomic actions in the test set are absent from the top 100 most frequent training actions.')\n- 이 섹션에는 수식이 없다. (NO EQUATIONS) — 진행률 점수(progress score) 같은 수식은 별도 하위섹션인 5.1.x Evaluation Metrics에 있으며 본 5.1.2에는 등장하지 않음.\n\n**왜 / 직관**\n\n왜 이렇게 하는가: 이 섹션 전체의 직관은 '쓰레기를 넣으면 쓰레기가 나온다(garbage in, garbage out)'를 막기 위한 데이터 위생(data hygiene) 설계다. 비유하자면, 요리 경연에서 심사받을 레시피를 만들 때 (1) 같은 등급의 재료만 쓰고(Standardized Objects), (2) 매번 재료 위치를 바꿔 배치해서 '특정 도마 위치에서만 잘하는' 요리사가 되지 않게 하고(Environmental Diversity = 좌표 암기 방지), (3) 칼질할 때 도마를 긁지 않고 천천히 썰며(Teleoperation Guidelines), (4) 150번 만든 것 중 상위 130개 잘 된 것만 골라(Trajectory Volume 랭킹 필터), (5) 마지막에 자동 검수기 + 사람 검수자가 두 번 거른다(2단계 QA)는 것이다. 무작위화의 핵심 직관은 'coordinate memorization(좌표 암기)' 대신 'task-relevant invariance(과제 본질 불변성)'를 배우게 하는 것 — 즉 '컵이 정확히 (x,y)에 있을 때 집기'가 아니라 '컵이 어디 있든 집기'를 배우게 한다. 테스트셋의 50%가 학습 최빈 100개에 없다는 비유는, 시험 문제의 절반이 교과서 '자주 나오는 100문제'에 없다는 뜻 — 외운 게 아니라 진짜 일반화했는지 보는 까다로운 시험이라는 것.\n\n**그림**\n\n원본 그림 3a: [arXiv Figure 3a](https://arxiv.org/html/2601.18692v2/x3.png)\n![](https://arxiv.org/html/2601.18692v2/x3.png)\n→ 5.1.2가 직접 인용하는 그림. 학습(pre-training) 데이터셋의 atomic action을 word cloud로 시각화 — 본문 '테스트의 50%가 학습 상위 100개 action에 없다'는 분포 비교의 학습셋 쪽 근거(\\cref{fig:train_data_action}).\n\n원본 그림 3b: [arXiv Figure 3b](https://arxiv.org/html/2601.18692v2/x4.png)\n![](https://arxiv.org/html/2601.18692v2/x4.png)\n→ 5.1.2가 직접 인용하는 그림. 벤치마크(테스트) 데이터셋의 atomic action word cloud — 학습셋 대비 다양성/분포 차이를 보여주는 테스트셋 쪽 근거(\\cref{fig:benchmark_data_action}).\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Teleoperation Collection (원격조작 수집)**\n  - 목적/task: GM-100 각 task에 대해 표준 프로토콜로 전문가 시연 데이터를 원격조작으로 수집한다.\n  - 입력→출력: 입력: GM-100 task 사양 + 3개 플랫폼(AgileX / Agibot G1 / Galaxea R1Pro, 모두 dual-arm + parallel-jaw gripper, wrist 2 + head 1 카메라) -> 출력: task당 raw trajectory 150개. (개별 trajectory의 텐서 shape는 본문에 명시 없음 — 추측 금지)\n  - 내부: 표준화 프로토콜 3원칙으로 수집: (1) end-effector와 작업면 간 clearance 유지(충돌 방지), (2) 객체 contact 단계에서 속도 감소(부드러운 조작), (3) episode start/termination에서 구별되는 image observation 확보(안정적 policy 학습). 환경 다양성을 위해 매 궤적 객체 pose(position+orientation)를 작업공간 내 무작위화. 객체는 GM-100 material spec에 맞춰 표준화·조달(사이트 간 재현성). 수식 없음.\n\n- **Quality Ranking & Selection (품질 랭킹·선별)**\n  - 목적/task: 수집된 raw trajectory를 실행 품질로 랭킹하고 상위만 학습용으로 남긴다.\n  - 입력→출력: 입력: task당 raw trajectory 150개 -> 출력: task당 상위 130개 trajectory(나머지 20개 제외).\n  - 내부: execution quality = task completion + motion smoothness + protocol adherence 3개 기준으로 랭킹 후 top-130 retain. 모든 잔존 궤적은 GM-100 task 사양 엄격 준수. 가중치/스코어링 함수는 본문에 수식으로 제시되지 않음(추측 금지).\n\n- **Automated Filtering (자동 필터링, QA 1단계)**\n  - 목적/task: 기술적 이상(technical anomaly)을 보이는 episode를 알고리즘으로 자동 제외한다.\n  - 입력→출력: 입력: 선별된 top-130 trajectory 집합 -> 출력: anomaly 제거된 필터링 데이터셋.\n  - 내부: algorithmic screening procedure가 technical anomaly episode를 자동 배제. (본문 published 텍스트에는 anomaly 세부 종류가 나열되지 않음 — LaTeX 소스에는 주석 처리된 항목(joint immobility, constraint violation, motion jitter, temporal desync 등)이 있으나 최종 본문에는 미포함이므로 본문 근거 한정).\n\n- **Manual Review (수동 검수, QA 2단계)**\n  - 목적/task: 자동 필터링을 통과한 데이터를 사람이 최종 검증하여 비준수 episode를 제거한다.\n  - 입력→출력: 입력: 자동 필터링된 데이터셋 + 동기화된 multi-view 비디오 스트림 -> 출력: 고품질·task 준수 최종 학습 데이터셋.\n  - 내부: human reviewer가 synchronized multi-view video stream으로 검증. extraneous object(불필요 객체)가 포함되거나 task protocol에서 벗어난 episode 제거. 결과적으로 high-quality·task-compliant 시연만 학습에 사용.\n\n- **Diversity Analysis (다양성 분석, word cloud)**\n  - 목적/task: 학습/테스트셋의 atomic action 분포·다양성을 정량·시각 분석한다.\n  - 입력→출력: 입력: 학습셋 및 테스트셋의 atomic action 라벨 -> 출력: word cloud 시각화(Fig.3a/3b) + 정량 통계(테스트셋 action의 ~50%가 학습 top-100에 부재).\n  - 내부: 가장 빈번한 atomic action을 word cloud로 시각화(\\cref{fig:train_data_action,fig:benchmark_data_action}). 정량 분석: 테스트셋 atomic action의 약 50%가 학습셋 최빈 top-100 action에 없음 -> 테스트셋 다양성 + 모델 generalization 평가의 엄격함을 입증.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n2-stage QA data pipeline (본문 근거: 5.1.2 'Automated Filtering' + 'Manual Review' + 'Trajectory Volume')\n\n Teleoperation (per GM-100 task, 3 platforms)\n standardized protocol: clearance / slow-on-contact / distinct start-end frames\n        |\n        v\n +---------------------------+\n | 150 raw trajectories      |   <- per task, across 3 platforms\n | (per task)                |\n +---------------------------+\n        |\n        | rank by execution quality\n        |  = task completion\n        |  + motion smoothness\n        |  + protocol adherence\n        v\n +---------------------------+\n | keep TOP 130              |   <- (drop bottom 20)\n +---------------------------+\n        |\n        v   [ Stage 1: Automated Filtering ]\n +---------------------------+\n | algorithmic screening     | -> exclude episodes with\n | (technical anomalies)     |    technical anomalies\n +---------------------------+\n        |\n        v   [ Stage 2: Manual Review ]\n +---------------------------+\n | human reviewers           | -> remove episodes if:\n | synchronized multi-view   |    - extraneous objects, or\n | video streams             |    - deviate from task protocol\n +---------------------------+\n        |\n        v\n final training demonstrations (high-quality, task-compliant)\n\n (analysis side) atomic actions -> word cloud\n   train set  vs  test set\n   => ~50% of TEST atomic actions absent from TOP-100 TRAIN actions\n\n注: '150 -> 130' 외 단계별 잔존 개수는 본문에 명시 없음(추측 금지).\n```\n\n**학습/추론**: 학습/추론 방법(이 섹션 한정): 이 섹션은 '데이터 준비' 섹션이므로 모델 학습 알고리즘 자체가 아니라 '학습 데이터를 어떻게 만드는가'에 대한 detail이다. (1) 학습 데이터 구성: task당 teleoperation으로 raw 150개 수집 -> 실행 품질 랭킹으로 top-130 선별 -> 자동 필터링(anomaly 제거) -> 수동 검수(extraneous object/protocol 위반 제거) -> 최종 고품질 시연만 학습 입력으로 사용. (2) 일반화를 위한 데이터 설계: 매 궤적 객체 pose 무작위화로 좌표 암기(coordinate memorization)를 막고 task-relevant invariance를 학습하도록 유도 — 즉 학습 단계에서 spatial overfitting을 방지하는 것이 핵심. (3) 평가용 데이터의 엄격성: 테스트셋 atomic action의 ~50%가 학습 top-100에 부재하도록 구성해, 추론(평가) 시 진짜 generalization을 측정. 본 섹션에는 loss/objective/optimizer 등 모델 학습 수식은 없음(NO EQUATIONS). 전체 벤치마크 맥락(섹션 5.1 도입부)상 GM-100은 100개 task·39,000개 전문가 시연, 평가는 22,500 trial의 통제된 프로토콜로 3개 SOTA baseline과 동일 조건 비교 — 단, 이는 5.1 도입부 근거이며 5.1.2 본문 외부 컨텍스트임.\n\n**핵심 숫자**\n\n- 150 = task당 수집하는 raw trajectory 수 (3개 플랫폼에 걸쳐)\n- 130 = 학습에 남기는 상위 trajectory 수 (실행 품질 랭킹 top-130; 하위 20개 제외)\n- 3 = 데이터 수집 플랫폼 수 (AgileX / Agibot G1 / Galaxea R1Pro)\n- ~50% = 테스트셋 atomic action 중 학습셋 최빈 top-100 action에 없는 비율\n- 100 = 비교 기준이 되는 '학습셋 최빈 atomic action' 개수 (top 100)\n- [섹션 5.1 도입부 컨텍스트] 100 = GM-100의 manipulation task 수 / 39,000 = 전문가 시연 수 / 25 = 물리 로봇 수 / 22,500 = 평가 trial 수 (5.1.2 본문이 아닌 5.1 도입부 근거)\n\n## 5.1.3 Benchmarking and Evaluation Protocol (벤치마킹 및 평가 프로토콜)\n\n**핵심**\n\n- 비교 대상: LingBot-VLA를 3개의 SOTA VLA 모델, 즉 π0.5, GR00T N1.6, WALL-OSS와 비교한다. 목적은 \"엄격한 실험적 통제 하에 아키텍처 성능만 분리(isolate architectural performance)\"하는 것.\n- Standardized Training(표준화된 학습): 모든 모델을 공개된 사전학습 체크포인트에서 동일한 post-training 파이프라인으로 fine-tune한다. 검증된 데이터셋(task당 130개 필터링된 trajectory)과 동일 하이퍼파라미터(batch size=256, epochs=20)를 적용해 공정 비교를 보장.\n- Strict Machine-Task Pairing(엄격한 기계-태스크 페어링): 하드웨어로 인한 분산을 제거하기 위해, 데이터 수집 때 사용한 \"바로 그 로봇 유닛(exact robot units)\"에서 평가. 모든 모델을 동일 하드웨어-태스크 쌍에서 무작위 순서로 순차 테스트. 예) \"Stack Bowls\" 태스크는 AgileX, Agibot G1, Galaxea R1pro 플랫폼에서 같은 유닛으로 평가.\n- Controlled Evaluation Setup(통제된 평가 환경): 데이터 수집 절차를 그대로 재현하되 물체 위치/방향을 무작위화하고 태스크 명세는 일관되게 유지. 이는 암기(memorization)가 아니라 일반화(generalization)를 평가하기 위함.\n- Inference and Recording(추론 및 기록): 각 모델은 task-robot 쌍당 15회 trial을 수행(통계적 견고성 확보). 평가 환경은 일정하게 유지하고, 종합 데이터(3인칭 시점, 로봇 상태, 모델 예측 등)를 rosbag 포맷으로 기록. 이 기록은 오픈소스로 공개되어 검증 가능한 벤치마크를 구축할 예정.\n- 이 섹션 자체에는 수식이 없다(인라인 math는 베이스라인 모델명 표기 π0.5뿐). SR/PS의 정량 정의식(예: 4/6≈0.67)은 바로 다음 섹션 5.1.4 Evaluation Metrics에 속하므로 여기서는 제외했다.\n- 이 섹션은 그림이나 표를 인라인으로 인용하지 않는다(본문에 figure/table 참조 링크 없음). 순수 프로토콜 서술 문단 1개로 구성.\n\n**왜 / 직관**\n\n이 섹션의 직관은 \\\"과학 실험의 대조군 통제(controlled experiment)\\\"다. VLA 모델 비교에서 점수 차이가 정말 모델(아키텍처) 때문인지, 아니면 \\\"운 좋게 더 좋은 로봇 유닛/조명/물체 배치를 만나서\\\"인지 헷갈리기 쉽다. 비유하자면 두 육상 선수를 비교할 때 한 명은 바람을 등지고, 한 명은 맞바람을 맞으며 달리게 하면 기록 차이가 선수 실력인지 바람인지 알 수 없는 것과 같다. 그래서 저자들은 (1) 같은 트랙(동일 로봇 유닛-exact unit), (2) 같은 훈련량(동일 데이터·batch·epoch), (3) 매 시도마다 코스를 살짝 바꿔 외운 길이 아닌 진짜 주행 능력(generalization)을 보고, (4) 충분한 반복(15 trials)으로 운을 평균내고, (5) 경기 전체를 비디오(rosbag)로 녹화해 누구나 검증할 수 있게 한다. 핵심 메시지는 \\\"우리가 이긴 게 환경 덕이 아니라 모델 덕임을 통제로 증명한다\\\"이다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 이 섹션의 핵심인 \"세 임베디먼트(AgileX/Agibot G1/Galaxea R1pro)에 걸친 systematic assessment\" 평가 설계를 한눈에 보여주는 그림이라 프로토콜의 맥락을 잡아준다.\n\n원본 그림 3b: [arXiv Figure 3b](https://arxiv.org/html/2601.18692v2/x4.png)\n![](https://arxiv.org/html/2601.18692v2/x4.png)\n→ 5.1.3이 평가하는 대상은 Benchmark 데이터셋이며, 이 그림이 그 벤치마크가 다루는 atomic action 분포(평가 태스크의 성격)를 직접 시각화한다.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Standardized Training**\n  - 목적/task: 모든 비교 모델의 학습 조건을 동일하게 맞춰 학습량 차이로 인한 성능 교란을 제거한다.\n  - 입력→출력: 입력: 각 모델의 공개 사전학습 체크포인트 + 검증된 데이터셋(task당 130개 필터링 trajectory) → 출력: 동일 파이프라인으로 fine-tune된 모델들\n  - 내부: 동일 post-training 파이프라인 사용. 공통 하이퍼파라미터 batch size=256, epochs=20. 데이터는 task당 130개의 필터링된(verified) trajectory. (수식 없음, 본문 line 540 근거.)\n\n- **Strict Machine-Task Pairing**\n  - 목적/task: 하드웨어 개체차(unit variance)로 인한 분산을 제거해 점수 차이가 모델 차이만 반영하도록 한다.\n  - 입력→출력: 입력: fine-tune된 각 모델 + 데이터 수집에 쓰인 바로 그 로봇 유닛 → 출력: 동일 하드웨어-태스크 쌍에서 무작위 순서로 순차 실행된 평가 런\n  - 내부: 데이터 수집 때 사용한 exact robot unit에서 평가. 모든 모델을 같은 hardware-task 쌍에서 randomized order로 sequentially 테스트. 예: \"Stack Bowls\"를 AgileX, Agibot G1, Galaxea R1pro 세 플랫폼의 동일 유닛에서 평가. (본문 line 542.)\n\n- **Controlled Evaluation Setup**\n  - 목적/task: 암기가 아닌 일반화 능력을 측정하도록 평가 조건을 통제·변주한다.\n  - 입력→출력: 입력: 데이터 수집 절차 사양 → 출력: 물체 위치/방향이 무작위화되고 태스크 명세는 일관된 평가 시나리오\n  - 내부: 데이터 수집 절차를 그대로 미러링하되 object position/orientation을 randomize, task specification은 consistent하게 유지. 목적은 generalization 평가(memorization 배제). (본문 line 544.)\n\n- **Inference and Recording**\n  - 목적/task: 통계적으로 견고한 결과를 얻고 평가 과정을 투명·검증가능하게 기록한다.\n  - 입력→출력: 입력: 통제된 평가 시나리오 + 각 모델 → 출력: task-robot 쌍당 15 trials의 실행 결과 및 rosbag 기록\n  - 내부: task-robot pair당 15회 trial로 통계 견고성 확보. 평가 환경 constant 유지. 3인칭 시점·로봇 상태·모델 예측 등 종합 데이터를 rosbag 포맷으로 기록하고 오픈소스로 공개 예정(검증 가능 벤치마크 구축). (본문 line 546.)\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 5.1.3 Evaluation Protocol  (본문 5개 통제 축의 데이터 흐름)\n근거: lines 537-546 (each label is verbatim italic subheading)\n\n [Public pre-trained ckpt]   (per model: pi0.5 / GR00T N1.6 / WALL-OSS / LingBot-VLA)\n          |\n          v\n +-------------------------------------------+\n | (1) Standardized Training                 |\n |  same post-training pipeline              |\n |  data = 130 filtered trajs / task         |\n |  batch=256, epochs=20  (identical for all)|\n +-------------------------------------------+\n          |  fine-tuned model\n          v\n +-------------------------------------------+\n | (2) Strict Machine-Task Pairing           |\n |  run on the EXACT robot unit used in      |\n |  data collection                          |\n |  all models -> same hardware-task pair,   |\n |  randomized order                         |\n |  e.g. \"Stack Bowls\" on AgileX / Agibot G1 |\n |       / Galaxea R1pro (same unit)         |\n +-------------------------------------------+\n          |\n          v\n +-------------------------------------------+\n | (3) Controlled Evaluation Setup           |\n |  mirror data-collection procedure         |\n |  randomized object pos/orient             |\n |  consistent task spec                     |\n |  => tests generalization, not memorization|\n +-------------------------------------------+\n          |\n          v\n +-------------------------------------------+\n | (4) Inference and Recording               |\n |  15 trials per (task, robot) pair         |\n |  env held constant                        |\n |  record: 3rd-person views + robot states  |\n |          + model predictions -> rosbag    |\n |  -> to be open-sourced (verifiable bench) |\n +-------------------------------------------+\n          |\n          v\n   [comparable, isolated architecture scores]\n   (scoring metrics SR/PS defined in 5.1.4, not here)\n```\n\n**학습/추론**: 학습(여기서 정의되는 평가용 학습 셋업): 비교 대상 4개 모델(LingBot-VLA, π0.5, GR00T N1.6, WALL-OSS)을 모두 공개 사전학습 체크포인트에서 시작해 동일한 post-training 파이프라인으로 fine-tune한다. 학습 데이터는 task당 130개의 필터링된(verified) trajectory, 하이퍼파라미터는 batch size=256, epochs=20으로 전 모델 공통이다. 추론/평가: 데이터 수집에 실제 쓰인 바로 그 로봇 유닛에서, 모든 모델을 동일 hardware-task 쌍에 대해 무작위 순서로 순차 추론한다. 평가 환경은 일정하게 유지하되 물체 위치/방향만 무작위화하여 generalization을 측정하고, task-robot 쌍마다 15회 trial을 돌려 통계적 견고성을 확보한다. 매 trial의 3인칭 영상·로봇 상태·모델 예측을 rosbag으로 기록해 오픈소스 공개한다. (성공 판정에 쓰이는 SR/PS의 수식적 정의·시간제한·종료조건은 본 섹션이 아니라 5.1.4에서 정의됨.)\n\n**핵심 숫자**\n\n- 비교 베이스라인 수: 3개 SOTA VLA (π0.5, GR00T N1.6, WALL-OSS)\n- 학습 데이터: task당 130개 필터링된(verified) trajectory\n- batch size = 256\n- epochs = 20\n- 평가 반복: task-robot 쌍당 15 trials\n- 평가 플랫폼 3종: AgileX, Agibot G1, Galaxea R1pro\n- 기록 포맷: rosbag (오픈소스 공개 예정)\n\n## 5.1.4 Evaluation Metrics (평가 지표)\n\n**핵심**\n\n- 이 섹션은 LingBot-VLA의 실세계 벤치마크 성능을 측정하기 위한 두 가지 평가 지표를 정의한다: Success Rate(SR, 성공률)와 Progress Score(PS, 진행 점수). 두 지표는 각각 '완전한 작업 완수'와 '부분적 진행 정도'를 포착한다.\n- Success Rate(SR)는 3분 시간 제한 내에 모델이 작업의 모든 단계를 완수한 시도(trial)의 비율이다. 이것이 주요(primary) 지표이며, 실세계 배치 가능성(real-world deployment viability)을 반영한다.\n- Progress Score(PS)는 순차적 서브태스크 체크포인트를 추적하여 부분적 작업 완수도를 측정한다. 예시로 6단계 'Stack Bowls'(그릇 쌓기) 작업에서 1~4단계를 완료하고 5단계에서 실패하면 점수는 4/6 ≈ 0.67이다. 이는 진단(diagnostic) 지표로, 실패 양상(failure modes)을 드러내고 부분 성공을 보상한다.\n- 종료 기준(Termination Criteria): 한 시도는 (1) 서브태스크 실패가 3회 연속 발생하거나, (2) 안전 관련 사건(예: 충돌)이 발생하면 종료된다. 진행 점수는 종료 직전까지 완료한 서브태스크 기준으로 매겨진다.\n- 보고 방식: 100개 작업(tasks)에 대해 전체(overall) SR과 PS를 보고하며, 추가로 로봇 종류별로 계층화한(per-platform, stratified by robot type) 지표를 보고하여 교차-임베디먼트 일반화(cross-embodiment generalization)를 평가한다.\n- 이 섹션 자체에는 별도의 디스플레이 수식, 그림(Figure) 참조, 표(Table) 참조가 없다. 유일한 수식은 PS를 설명하는 인라인 분수 예시(4/6)뿐이다.\n\n**왜 / 직관**\n\nSR과 PS는 시험 채점에 비유하면 직관적이다. SR은 '합격/불합격'(pass/fail)처럼 이진적이다. 작업의 모든 단계를 3분 안에 완벽히 끝내야만 1점, 하나라도 못 끝내면 0점이다. 따라서 SR은 모델을 실제로 현장에 투입할 수 있는지를 보여주는 냉정한 최종 성적표 역할을 한다. 반면 PS는 '부분 점수'(partial credit)와 같다. 6문제짜리 시험에서 4문제를 맞히면 4/6점을 주듯, 다단계 작업에서 어디까지 진행했는지를 비례적으로 점수화한다. PS가 진단 지표인 이유는, 두 모델의 SR이 똑같이 0%여도 한 모델은 '5단계 중 4단계까지 갔다(PS 높음)'고 다른 모델은 '1단계에서 막혔다(PS 낮음)'고 구분해 주기 때문이다. 즉 SR은 결과를, PS는 과정과 실패 지점을 보여준다. 종료 기준(3연속 실패 또는 충돌)은 가망 없는 시도나 위험한 행동을 일찍 끊어 평가를 안전하고 효율적으로 만드는 안전장치다.\n\n**수식**\n\n$$\n\\text{PS} = \\frac{4}{6} \\approx 0.67\n$$\n\n- **무슨 식?**: 완료 단계 / 전체 단계 = 부분 작업 완수도 (이 예시는 4/6 ≈ 0.67)\n- **설명**: Progress Score(PS)를 설명하는 본문 내 유일한 인라인 예시 수식이다. 분자(4) = 종료 전까지 완료한 서브태스크 수, 분모(6) = 작업의 전체 서브태스크 단계 수. 6단계 'Stack Bowls' 작업에서 1~4단계 완료 후 5단계 실패 시의 점수를 보여준다. 일반화하면 PS = (완료한 서브태스크 수) / (전체 서브태스크 수)이며, 0~1 범위의 부분 완수도를 나타낸다.\n\n**그림**\n\n원본 그림 5b: [arXiv Figure 5b](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n→ 이 섹션이 정의하는 첫 번째 지표 Success Rate(SR)가 실제로 결과 플롯에서 어떻게 보고/시각화되는지 보여주는 그림 (섹션 5.1.4는 SR을 정의만 하고 자체 그림은 없음).\n\n원본 그림 5a: [arXiv Figure 5a](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n→ 이 섹션이 정의하는 두 번째 지표 Progress Score(PS)에 대응하는 결과 시각화로, 정의된 PS 지표가 스케일링 실험에서 어떻게 집계되어 표시되는지 연결됨.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Success Rate (SR)**\n  - 목적/task: 주요(primary) 지표 — 모델이 작업 전체를 완수했는지를 이진적으로 측정해 실세계 배치 가능성을 평가\n  - 입력→출력: 입력: 한 작업당 여러 trial의 결과(각 trial = 3분 내 전 단계 완수 여부, 0/1) → 출력: 성공한 trial의 비율 (스칼라, 0~1 범위의 비율). 100개 작업 전체(overall) 및 로봇 플랫폼별(per-platform)로 집계\n  - 내부: 정의: SR = (전 작업 단계를 3분 시간 제한 내에 완수한 trial 수) / (전체 trial 수). 한 trial은 모든 task step을 시간 내에 끝내야만 성공으로 카운트(부분 완수는 SR에 반영 안 됨). 종료 기준에 걸려 끝난 trial은 미완수로 처리. 본문 근거: 'the proportion of trials where the model completes all task steps within a 3-minute time limit. This primary metric reflects the model's real-world deployment viability.'\n\n- **Progress Score (PS)**\n  - 목적/task: 진단(diagnostic) 지표 — 작업을 완전히 끝내지 못해도 어디까지 진행했는지 부분 완수도를 측정해 실패 양상을 드러내고 부분 성공을 보상\n  - 입력→출력: 입력: 작업의 순차적 서브태스크 체크포인트 진행 상황(완료한 서브태스크 수, 전체 서브태스크 수) → 출력: 완료 비율 점수 (스칼라, 0~1). 100개 작업 전체 및 플랫폼별 집계\n  - 내부: 정의: PS = (종료 전까지 완료한 서브태스크 수) / (전체 서브태스크 수). 순차적 subtask checkpoint를 추적하여 산출. 예시: 6단계 'Stack Bowls'에서 1~4단계 완료, 5단계 실패 → PS = 4/6 ≈ 0.67. SR이 부분 진행을 무시하는 한계를 보완하는 보조 지표. 본문 근거: 'measures partial task completion by tracking progress through sequential subtask checkpoints ... results in a score of 4/6 ≈ 0.67. This diagnostic metric highlights failure modes and rewards partial success.'\n\n- **Termination Criteria (종료 기준)**\n  - 목적/task: 한 trial을 언제 끝낼지 결정해 가망 없는/위험한 시도를 조기 중단하고 PS 채점 시점을 고정\n  - 입력→출력: 입력: trial 진행 중 서브태스크 실패 이벤트 시퀀스 및 안전 이벤트(충돌 등) → 출력: trial 종료 신호 + 그 시점까지 완료한 서브태스크 수(PS 산출에 사용)\n  - 내부: trial은 다음 중 하나가 발생하면 종료된다: (1) 서브태스크 실패가 3회 연속(three consecutive subtask failures) 발생, 또는 (2) 안전 관련 사건(safety-critical events, 예: collisions) 발생. 종료 후 PS는 종료 직전까지 완료한 서브태스크를 기준으로 산정. 본문 근거: 'A trial ends if: (1) three consecutive subtask failures occur, or (2) safety-critical events (e.g., collisions) arise. Progress is scored based on subtasks completed before termination.'\n\n- **Reporting / Aggregation (보고·집계)**\n  - 목적/task: 측정한 SR·PS를 전체 및 임베디먼트별로 집계해 교차-임베디먼트 일반화 능력을 평가\n  - 입력→출력: 입력: 100개 작업 각각의 SR·PS, 로봇 종류 라벨 → 출력: overall SR·PS 2개 지표 + 로봇 타입별로 계층화한 per-platform SR·PS\n  - 내부: 100개 작업에 대해 전체(overall) SR과 PS를 보고하고, 로봇 타입(robot type)별로 stratified한 per-platform 지표를 추가로 보고하여 cross-embodiment generalization을 평가. 본문 근거: 'We report overall SR and PS across 100 tasks, and per-platform metrics stratified by robot type to assess cross-embodiment generalization.'\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 5.1.4 Evaluation Pipeline (per trial), reconstructed from body text:\n\n   [trained LingBot-VLA on real robot]\n              |\n              v\n   +-------------------------------+\n   |  Run ONE TRIAL of a task      |\n   |  (multi-step, sequential      |\n   |   subtask checkpoints)        |\n   +-------------------------------+\n              |\n              | track progress through\n              | sequential subtask checkpoints\n              v\n   +-------------------------------+      yes\n   | Termination check:            |---------> end trial early\n   |  (1) 3 consecutive subtask     |          (score PS on subtasks\n   |      failures, OR              |           completed before\n   |  (2) safety event (collision) |           termination)\n   +-------------------------------+\n              | no\n              v\n   +-------------------------------+\n   | All task steps done within    |\n   |   3-min time limit ?          |\n   +-------------------------------+\n        | yes              | no\n        v                  v\n   SR += 1            SR += 0\n   (full success)     (not counted as success)\n        |                  |\n        +--------+---------+\n                 v\n   PS = (completed subtasks) / (total subtasks)\n        e.g. Stack Bowls: 4/6 ~= 0.67\n                 |\n                 v\n   +-------------------------------+\n   | Aggregate over 100 tasks      |\n   |  -> overall SR, overall PS    |\n   |  -> per-platform (stratified  |\n   |     by robot type) SR, PS     |\n   |     => cross-embodiment       |\n   |        generalization         |\n   +-------------------------------+\n```\n\n**학습/추론**: 이 섹션은 학습 방법이 아니라 평가(inference-time evaluation) 프로토콜을 다룬다. 추론/평가 방식 세부: (1) 학습된 모델을 실세계 로봇에서 실행하고 각 작업을 trial 단위로 시도한다. (2) 각 trial은 3분 시간 제한을 가지며, 이 안에 모든 task step을 완수하면 성공(SR 카운트). (3) trial 진행 중 순차적 subtask checkpoint를 추적해 부분 진행도를 기록한다. (4) 서브태스크 3연속 실패 또는 충돌 등 안전 사건이 나면 trial을 조기 종료하고, 종료 시점까지 완료한 서브태스크 수로 PS를 매긴다. (5) 100개 작업에 대해 SR·PS를 집계하고, 3종 로봇 임베디먼트별로 분리(per-platform stratification)해 일반화 성능을 본다. 본문에 옵티마이저, 학습률, trial 반복 횟수 등 학습 하이퍼파라미터는 이 섹션에 명시되어 있지 않다(추측 금지).\n\n**핵심 숫자**\n\n- 3분(3-minute) — SR 측정 시 한 trial의 시간 제한\n- 100 tasks — overall SR/PS를 집계하는 작업 수\n- 6 (steps) — 'Stack Bowls' 예시 작업의 전체 서브태스크 단계 수 (PS 분모)\n- 4 (steps 1–4) — 'Stack Bowls' 예시에서 완료한 단계 수 (PS 분자)\n- 5 (step 5) — 'Stack Bowls' 예시에서 실패한 단계\n- 4/6 ≈ 0.67 — 위 예시의 Progress Score 값\n- 3 (three consecutive subtask failures) — trial 종료 기준 1: 연속 서브태스크 실패 횟수\n- 2개(SR, PS) — 이 섹션이 정의하는 평가 지표의 개수\n- 3종 로봇 임베디먼트(three robotic embodiments) — per-platform 계층화 평가 대상 (섹션 문맥상 작업이 각 플랫폼에서 실행됨)\n\n## 5.2 Comparison on Real-world Benchmark (실세계 벤치마크 비교)\n\n**핵심**\n\n- GM-100 실세계 벤치마크에서 LingBot-VLA 두 변형(w/o depth, w/ depth)을 세 개의 강력한 베이스라인(WALL-OSS, GR00T N1.6, π0.5)과 세 개의 로봇 플랫폼(Agibot G1, AgileX, Galaxea R1Pro)에서 비교한다. 결과는 Table 1에 정리됨.\n- 모든 플랫폼에서 LingBot-VLA w/o depth가 WALL-OSS와 GR00T N1.6을 SR(성공률), PS(진행 점수) 두 지표 모두에서 유의미하게 능가한다.\n- Depth 기반 공간 정보를 추가한 LingBot-VLA w/ depth는 세 임베디먼트 평균으로 π0.5 대비 SR +4.28%, PS +7.76% 향상을 달성한다.\n- GR00T N1.6은 Agibot G1과 AgileX에서는 평범하지만, Galaxea R1Pro에서는 π0.5에 필적하는 SR/PS를 낸다. 이는 GR00T 사전학습에 Galaxea R1Pro 데이터가 대량 포함되었기 때문 — 구조적 유사도가 높은 다운스트림 태스크에서는 사전학습이 성능을 크게 끌어올린다는 점을 시사.\n- 전체 상세 결과는 Appendix 참조. 평가 지표 SR/PS의 정의는 5.1.4에서 가져옴: SR은 3분 제한 내 전체 단계 완료 비율, PS는 순차 체크포인트 기반 부분 완료도(예: 6단계 중 4단계 완료 시 4/6≈0.67).\n- Depth 추가가 항상 이득은 아님: Agibot G1에서는 w/ depth(SR 11.98%)가 w/o depth(SR 12.82%)보다 약간 낮음. 그러나 AgileX·Galaxea·평균에서는 depth가 더 높아 전체적으로는 depth 변형이 최고 성능.\n\n**왜 / 직관**\n\n학생 여러 명에게 똑같은 100개짜리 실기 시험(GM-100)을 세 종류의 다른 실험실 장비(Agibot/AgileX/Galaxea)로 치르게 한 것과 같다. SR은 '시험을 끝까지 통과했는가(합격/불합격)'를, PS는 '몇 단계까지 갔는가(부분 점수)'를 본다. PS가 SR보다 항상 훨씬 높은 이유는, 모델이 끝까지 성공(SR)하진 못해도 중간 단계까지는 자주 진행(PS)하기 때문 — 시험을 통째로 통과하긴 어려워도 객관식 부분 점수는 잘 받는 것과 같다. Depth(깊이 센서)를 더하는 것은 '한쪽 눈으로 보던 로봇에게 양안 입체시를 주는 것'에 비유할 수 있어 물체 거리·공간 배치 파악이 좋아져 평균 성능이 오른다. 마지막으로 GR00T가 Galaxea에서만 갑자기 잘하는 것은, 그 시험 장비로 미리 연습(사전학습 데이터 포함)을 많이 했기 때문 — 본 적 있는 환경에서 시험을 잘 치는 것과 같은 이치다.\n\n**수식**\n\n$$\n\\mathrm{SR} = \\frac{\\#\\{\\text{trials completing all task steps within 3-min limit}\\}}{\\#\\{\\text{total trials}\\}}\n$$\n\n- **무슨 식?**: 3분 안에 전 단계 완료한 시도의 비율 (이진 성공/실패)\n- **설명**: 성공률(SR). 분자=3분 제한 내에 태스크의 모든 단계를 완료한 시도 수, 분모=전체 시도 수. 전부-아니면-전무(all-or-nothing)식 이진 판정의 비율. 주의: 논문에 이 displayed equation은 명시되어 있지 않으며, 5.1.4의 산문 정의('the proportion of trials where the model completes all task steps within a 3-minute time limit')를 LaTeX로 재구성한 것임.\n\n$$\n\\mathrm{PS} = \\frac{\\text{(completed sequential subtask checkpoints)}}{\\text{(total subtask checkpoints)}} \\quad\\Big(\\text{e.g., } \\tfrac{4}{6}\\approx 0.67\\Big)\n$$\n\n- **무슨 식?**: 통과한 순차 체크포인트 / 전체 체크포인트 = 부분 점수\n- **설명**: 진행 점수(PS). 순차적 서브태스크 체크포인트를 얼마나 통과했는지의 비율로 부분 완료도를 측정. 논문 예시: 6단계 'Stack Bowls' 태스크에서 1~4단계 완료·5단계 실패 시 4/6≈0.67. 분자=완료한 순차 체크포인트 수, 분모=전체 체크포인트 수. 주의: 논문에 displayed equation 형태는 없고 산문+예시 분수(4/6≈0.67)만 제시됨. 위 식은 그 산문 정의의 LaTeX 재구성임.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 5.2가 다루는 '세 로봇 임베디먼트(Agibot G1/AgileX/Galaxea R1Pro)에 걸친 체계적 평가와 모델 우월성'을 한눈에 보여주는 개요 그림으로, 이 섹션의 비교 실험 셋업을 시각적으로 대표한다.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **GM-100 Benchmark (평가 데이터/태스크 집합)**\n  - 목적/task: 100개 다양한 manipulation 태스크로 구성된 실세계 평가 벤치마크로, 모든 모델을 동일 태스크 셋에서 비교하기 위한 기준.\n  - 입력→출력: 입력: 학습된 VLA 정책 + 로봇 임베디먼트 -> 출력: 태스크별 rollout 성공/진행 기록 (집계되어 SR%, PS%)\n  - 내부: 본문 근거상 GM-100은 100개 manipulation 태스크와 39,000개 expert demonstration을 포함. 각 태스크는 순차 서브태스크 체크포인트로 구성되어 SR(이진)과 PS(부분)를 산출 가능.\n\n- **Embodiment platforms (세 로봇 플랫폼)**\n  - 목적/task: 동일 모델을 서로 다른 물리 로봇에서 실행해 임베디먼트 일반화/우월성을 검증.\n  - 입력→출력: 입력: 카메라 관측(RGB 또는 RGB-D/stereo) + 정책 출력 액션 -> 출력: 실제 로봇 동작 및 태스크 진행\n  - 내부: Agibot G1 = 2x 7-DoF arm + 3x RGB-D camera; AgileX = 2x 6-DoF arm + 3x camera; Galaxea R1Pro = 2x 7-DoF arm + 1 stereo camera + 2 wrist camera. 모두 dual-arm, parallel-jaw gripper, 테이블탑 고정 셋업.\n\n- **Compared models (비교 대상 모델군)**\n  - 목적/task: LingBot-VLA의 두 변형을 세 baseline과 동일 조건에서 SR/PS로 비교.\n  - 입력→출력: 입력: 카메라 관측(+ w/ depth 변형은 depth 기반 공간 정보 추가) -> 출력: 로봇 액션\n  - 내부: Baseline: WALL-OSS, GR00T N1.6, pi0.5. 제안: LingBot-VLA w/o depth, LingBot-VLA w/ depth. w/ depth 변형은 'depth-based spatial information'을 통합해 평균 SR/PS를 끌어올림(pi0.5 대비 SR +4.28%, PS +7.76%).\n\n- **Evaluation metrics (SR / PS) — 5.1.4 정의 사용**\n  - 목적/task: 이진 성공률(SR)과 부분 완료도(PS) 두 축으로 정책 성능을 정량화.\n  - 입력→출력: 입력: 각 trial의 체크포인트 통과 기록 (3분 제한) -> 출력: 태스크/임베디먼트별 평균 SR%, PS%\n  - 내부: SR = 3분 내 전 단계 완료 trial 비율. PS = 통과한 순차 체크포인트 / 전체 체크포인트 (예: 6단계 중 4단계 완료 -> 4/6 ~= 0.67). displayed equation은 논문에 없고 산문 정의.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 5.2 evaluation setup (본문 근거: Table 1 + 5.1.4 metric defs + embodiment specs)\n\n           GM-100 benchmark (100 manipulation tasks, 39k expert demos)\n                                    |\n        ============== run each model on each embodiment ==============\n        |                          |                          |\n   [Agibot G1]               [AgileX]                  [Galaxea R1Pro]\n   2x 7-DoF arms             2x 6-DoF arms             2x 7-DoF arms\n   3x RGB-D cam              3x cam                    1 stereo + 2 wrist cam\n        |                          |                          |\n        +-------- each rollout: 3-min time limit per trial ----------+\n                                    |\n                 +------------------+------------------+\n                 |                                     |\n            SR (binary)                          PS (partial)\n       all steps done in 3 min?            completed_ckpts / total_ckpts\n       -> proportion of trials             e.g. Stack Bowls 4/6 ~= 0.67\n                                    |\n            ==================== Models compared ====================\n            WALL-OSS | GR00T N1.6 | pi0.5 | Ours w/o depth | Ours w/ depth\n                                    |\n                          (results -> Table 1)\n\nTable 1 numbers (SR% / PS%):\n                 WALL-OSS    GR00T N1.6   pi0.5        w/o depth    w/ depth\n Agibot G1       2.99/8.75   5.23/12.63   7.77/21.98   12.82/30.04  11.98/30.47\n AgileX          2.26/8.16   3.26/10.52   17.20/34.82  15.50/36.31  18.93/40.36\n Galaxea R1Pro   6.89/14.13  14.29/24.83  14.10/26.14  18.89/34.71  20.98/35.40\n Average         4.05/10.35  7.59/15.99   13.02/27.65  15.74/33.69  17.30/35.41\n\n Headline gain (w/ depth vs pi0.5, avg): SR +4.28% , PS +7.76%\n```\n\n**학습/추론**: 학습/추론 방법은 5.2 본문에 직접 기술되어 있지 않다(이 섹션은 평가·비교 결과만 보고). 5.2에 명시된 추론/평가 프로토콜은: 각 trial을 3분 시간 제한 내에서 실행하고, 모든 단계를 완료하면 SR 성공으로 카운트, 통과한 순차 체크포인트 비율로 PS를 산출한다. 모델 비교는 동일한 GM-100 태스크 셋과 동일한 세 임베디먼트(Agibot G1/AgileX/Galaxea R1Pro)에서 수행된다. 제안 모델의 핵심 변수는 'depth-based spatial information' 사용 여부(w/o depth vs w/ depth)이며, depth 추가가 평균 성능을 향상시킨다. 또한 본문은 베이스라인 GR00T N1.6이 Galaxea R1Pro 데이터를 사전학습에 대량 포함했기 때문에 그 플랫폼에서만 pi0.5에 필적한다고 지적하며, 이는 '구조적 유사도가 높은 다운스트림 태스크에서 사전학습이 성능을 크게 향상시킨다'는 점을 시사한다. (구체적 사전학습/파인튜닝 절차·하이퍼파라미터는 이 섹션 범위 밖이며 다른 섹션/Appendix 소관.)\n\n**핵심 숫자**\n\n- w/ depth vs π0.5 (평균): SR 향상 +4.28%, PS 향상 +7.76%\n- Average SR: WALL-OSS 4.05% / GR00T N1.6 7.59% / π0.5 13.02% / Ours w/o depth 15.74% / Ours w/ depth 17.30%\n- Average PS: WALL-OSS 10.35% / GR00T N1.6 15.99% / π0.5 27.65% / Ours w/o depth 33.69% / Ours w/ depth 35.41%\n- Agibot G1 (SR/PS): WALL-OSS 2.99/8.75 · GR00T 5.23/12.63 · π0.5 7.77/21.98 · w/o depth 12.82/30.04 · w/ depth 11.98/30.47 (단위 %)\n- AgileX (SR/PS): WALL-OSS 2.26/8.16 · GR00T 3.26/10.52 · π0.5 17.20/34.82 · w/o depth 15.50/36.31 · w/ depth 18.93/40.36 (단위 %)\n- Galaxea R1Pro (SR/PS): WALL-OSS 6.89/14.13 · GR00T 14.29/24.83 · π0.5 14.10/26.14 · w/o depth 18.89/34.71 · w/ depth 20.98/35.40 (단위 %)\n- 평가 시간 제한: trial당 3분 (3-minute time limit)\n- PS 예시: 6단계 'Stack Bowls' 태스크에서 4단계 완료 시 4/6 ≈ 0.67\n- GM-100: 100개 manipulation 태스크, 39,000개 expert demonstration\n\n## 5.3 Comparison on Simulation Benchmark (시뮬레이션 벤치마크 비교)\n\n**핵심**\n\n- 벤치마크: RoboTwin 2.0 suite의 대표 manipulation task 50개로 시뮬레이션 성능을 평가한다 (Table 2). 모든 모델은 공개 pre-trained checkpoint에서 시작해 RoboTwin 데이터로 추가 fine-tuning한다.\n- 학습 세팅(멀티태스크 일반화 평가용): clean scene는 2,500 demo(태스크당 50개), highly randomized scene는 25,000 demo(태스크당 500개)로 모든 모델을 학습한다.\n- Randomization 요인: 다양한 배경(varied backgrounds), 테이블 위 잡동사니(table-top clutter), 테이블 높이 교란(table-height perturbations), 다양한 조명(diverse lighting conditions).\n- 결과 (평균 Success Rate, SR): Clean — pi_0.5 82.74% / Ours w/o depth 86.50% / Ours w/ depth 88.56%. Randomized — pi_0.5 76.76% / Ours w/o depth 85.34% / Ours w/ depth 86.68%.\n- depth 없는 LingBot-VLA(w/o depth)도 pi_0.5 baseline 대비 clean에서 절대 +3.76% 이상, randomized에서 절대 +8.58% 향상 (82.74->86.50, 76.76->85.34).\n- depth 정보를 learnable query-based alignment로 통합하면(w/ depth) baseline 대비 clean에서 절대 +5.82%, randomized에서 절대 +9.92%로 격차가 더 벌어진다 (82.74->88.56, 76.76->86.68).\n- 핵심 해석: depth 통합의 이득은 clean(+2.06%p, 86.50->88.56)보다 randomized(+1.34%p, 85.34->86.68) 둘 다에서 나타나며, randomized scene에서 LingBot-VLA의 격차 확대(절대 +9.92%)가 가장 크다 = 강한 도메인 randomization에서 공간 prior의 가치가 두드러진다.\n- 이 절은 그림을 인용하지 않는다. 인용 대상은 본문 Table 2(tab:robotwin_avg)와 부록의 상세 per-task 결과 Table S7(tab:robotwin)뿐이다. (HTML에서 절 뒤에 떠 있는 Figure 4 training throughput은 다음 절 5.4 소속이다.)\n\n**왜 / 직관**\n\n직관: pi_0.5는 RGB+텍스트만 보고 행동을 예측하는 '평면 사진만 보는 작업자'다. LingBot-VLA의 depth 통합은 그 작업자에게 '깊이/입체 감각'을 추가로 주입한 것에 비유할 수 있다. 깨끗하고 정돈된 작업대(clean)에서는 평면 사진만으로도 대부분 잘 집어내지만(이미 86.50%), 배경이 어지럽고 조명이 바뀌고 테이블 높이까지 흔들리는 난잡한 현장(randomized)에서는 '어느 물체가 얼마나 가까이/멀리 있는지'를 아는 입체 감각이 결정적이다 -- 그래서 baseline 대비 격차가 randomized에서 +9.92%로 가장 크게 벌어진다. 단, depth는 추론 시 별도 센서로 주는 게 아니라(주: 본문 근거상 LingBot-Depth tokens를 distillation으로 '미리 베껴두는' 방식 -- 학생이 시험 전에 전문가의 깊이 직관을 흡수해 시험장에선 혼자 푸는 것과 같다, 정의는 3절). w/o depth만으로도 baseline을 큰 폭(특히 randomized +8.58%)으로 이긴다는 점은, 향상의 상당 부분이 depth 이전에 이미 모델/사전학습 자체에서 나온다는 뜻이다.\n\n**그림**\n\n원본 그림 4a: [arXiv Figure 4a](https://arxiv.org/html/2601.18692v2/x5.png)\n![](https://arxiv.org/html/2601.18692v2/x5.png)\n→ 주의: 5.3 본문은 어떤 그림도 인용하지 않는다. Figure 4(a/b)는 HTML 레이아웃상 5.3 직후에 떠 있지만 실제로는 다음 절 5.4 'Training Throughput Analysis' 소속이다. 5.3 자체와 직접 관련된 그림은 없고 인용은 Table 2와 Table S7뿐이라는 점을 명확히 하기 위해 참고용으로만 표기.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **RoboTwin 2.0 simulation evaluation protocol (5.3 평가 절차)**\n  - 목적/task: 50개 대표 manipulation task에서 멀티태스크 일반화 성능을 시뮬레이션으로 측정 (pi_0.5 대비 LingBot-VLA의 우위 입증)\n  - 입력→출력: 입력: 공개 pre-trained checkpoint + RoboTwin fine-tuning 데이터(clean 2,500 demos = 50/task, randomized 25,000 demos = 500/task) -> 출력: Average Success Rate(%) 2개 조건(clean, randomized) x 3개 모델 변형 (Table 2), 상세 per-task 50개는 Table S7\n  - 내부: 각 모델을 pretrained ckpt에서 시작해 RoboTwin 데이터로 추가 fine-tuning. randomization 요인 = varied backgrounds, table-top clutter, table-height perturbations, diverse lighting. 보고 지표는 SR(success rate; 정의는 5.1: 3분 제한 내 모든 task step 완료 비율). 이 절은 SR만 표로 보고.\n\n- **pi_0.5 baseline**\n  - 목적/task: 비교 기준선(RGB+텍스트 기반 VLA). LingBot-VLA의 절대 향상폭을 재는 기준\n  - 입력→출력: 입력: 관측 O_t (3-view 이미지 + text) -> 출력: action; 평가상 Average SR Clean 82.74% / Randomized 76.76%\n  - 내부: depth 통합이 없는 외부 baseline. 두 LingBot-VLA 변형 모두 이 값 대비 절대 향상폭(+3.76/+8.58, +5.82/+9.92)으로 보고됨.\n\n- **LingBot-VLA w/o depth**\n  - 목적/task: depth 통합 없이도 baseline을 능가하는지 확인(모델/사전학습 자체의 기여 분리)\n  - 입력→출력: 입력: 관측 O_t (3-view RGB + text) -> 출력: action; Average SR Clean 86.50% / Randomized 85.34%\n  - 내부: baseline 대비 clean 절대 +3.76% 이상, randomized 절대 +8.58%. randomized에서 향상폭이 훨씬 커, 강한 randomization 환경에서 모델 본체의 강건성이 두드러짐.\n\n- **LingBot-VLA w/ depth (learnable query-based alignment)**\n  - 목적/task: depth 정보 통합으로 공간 prior를 주입해 성능을 더 끌어올림\n  - 입력→출력: 입력: 관측 O_t(3-view RGB+text) + (학습 시) LingBot-Depth tokens D_t -> 출력: action; Average SR Clean 88.56% / Randomized 86.68% (전 조건 최고)\n  - 내부: learnable queries [Q_t^1,Q_t^2,Q_t^3]을 VLM이 처리한 뒤 LingBot-Depth의 depth tokens [D_t^1,D_t^2,D_t^3]에 정렬. 정렬은 distillation loss L_distill = E_{Q_t}|Proj(Q_t) - D_t| 최소화로 수행하며 Proj(.)는 cross-attention으로 차원 정렬하는 projection layer(정의는 §3 method). baseline 대비 clean 절대 +5.82%, randomized 절대 +9.92%로 격차가 가장 큼. (LingBot-Depth는 외부 인용 모델 lingbotdepth로, 본 절은 세부 미기술.)\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n5.3 평가 구조 (본문 근거: Table 2 + 학습세팅 + depth 분기)\\n\\n  RoboTwin 2.0 suite  ──  50 representative manipulation tasks\\n        │\\n        ├── Clean scenes      : 2,500 demos  (50 per task)\\n        └── Randomized scenes : 25,000 demos (500 per task)\\n             randomization = {backgrounds, table-top clutter,\\n                              table-height perturb., lighting}\\n\\n  fine-tune from pretrained ckpt  -->  3 model variants 비교\\n\\n  변형(top-down):\\n    [pi_0.5 baseline]            RGB + text only\\n    [LingBot-VLA w/o depth]      depth 통합 없음\\n    [LingBot-VLA w/ depth]       learnable query --(Proj, cross-attn)--> align to\\n                                 LingBot-Depth tokens (L_distill, def in §3)\\n\\n  결과 (Average SR), [Table 2]:\\n                      Clean        Randomized\\n    pi_0.5            82.74%       76.76%\\n    Ours w/o depth    86.50%       85.34%      (vs base: +3.76 / +8.58)\\n    Ours w/ depth     88.56%       86.68%      (vs base: +5.82 / +9.92)\\n                      ^best        ^best\\n\\n  depth 순효과(w/depth - w/o depth): Clean +2.06%p, Rand +1.34%p\\n\\n  상세 per-task 50개 결과 --> Appendix Table S7 (tab:robotwin)\\n\\n(주: 이 절은 figure 인용 없음. SR/PS 정의·L_distill·L_FM은 각각 §5.1·§3에 정의)\n```\n\n**학습/추론**: 학습(5.3 범위): 모든 모델을 공개 pre-trained checkpoint에서 시작해 RoboTwin 2.0 데이터로 추가 fine-tuning한다. 멀티태스크 일반화를 보기 위해 clean scene 2,500 demos(50/task)와 highly randomized scene 25,000 demos(500/task)로 학습한다. 기본 행동 예측 목적은 conditional flow matching L_FM(§3 정의, action chunk length T=50 in pre-training). w/ depth 변형은 추가로 distillation loss L_distill로 VLM learnable query를 LingBot-Depth tokens에 정렬(증류)해 공간 prior를 모델 내부에 주입한다(§3). 즉 depth는 학습 시 distillation 타깃으로만 쓰이며, 추론 시 별도 depth 입력 의존성은 본 절에 명시되지 않는다 -- query가 이미 depth 표현을 흡수했기 때문. 추론/평가: 각 trial에서 3분 제한 내 모든 task step을 완료하면 success로 집계하여 task별 평균 SR(%)을 산출(SR 정의는 §5.1). 본 절은 SR만 표로 보고하고 50개 task 평균을 clean/randomized 두 조건으로 제시한다. (주: 공정 비교를 위한 동일 verified dataset 130 trajectories/task, batch 256, 20 epochs 등은 5.1/실험 세팅 기술이며 5.3 본문 외부.)\n\n**핵심 숫자**\n\n- RoboTwin 2.0 평가 task 수: 50 representative manipulation tasks\n- Clean fine-tuning 데이터: 2,500 demonstrations (50 per task)\n- Randomized fine-tuning 데이터: 25,000 demonstrations (500 per task)\n- Clean SR -- pi_0.5: 82.74%\n- Clean SR -- Ours w/o depth: 86.50%\n- Clean SR -- Ours w/ depth: 88.56% (best)\n- Randomized SR -- pi_0.5: 76.76%\n- Randomized SR -- Ours w/o depth: 85.34%\n- Randomized SR -- Ours w/ depth: 86.68% (best)\n- w/o depth 향상 (절대): clean >3.76%, randomized 8.58%\n- w/ depth 향상 (절대) vs baseline: clean 5.82%, randomized 9.92%\n- depth 순효과(파생): clean +2.06%p, randomized +1.34%p\n- (맥락) flow matching action chunk length T=50 (pre-training, §3)\n\n## 5.4 Training Throughput Analysis (학습 처리량 분석)\n\n**핵심**\n\n- 목적: LingBot-VLA 자체 codebase의 학습 효율(training efficiency)을 다른 오픈소스 프레임워크와 정량 비교한다. 비교 baseline은 3개 오픈소스 codebase, 즉 StarVLA, Dexbotic, OpenPI이다.\n- 공정 비교(fair comparison)를 위해 모든 실험은 Libero 데이터셋에서, 표준화된 π-like model architecture로 수행했다. (π-like = OpenPI/π0 계열의 flow-matching action expert를 붙인 VLA 구조를 가리킴.)\n- codebase마다 VLM 구현이 다르기 때문에, baseline과 직접 정렬(direct alignment)·비교가 가능하도록 Qwen2.5-VL-3B-π 와 PaliGemma-3B-pt-224-π 두 모델을 자체 codebase 안에서 재현(reproduce)했다.\n- 학습 설정: local batch size를 모든 실험에서 32로 표준화했다.\n- 분산 학습 전략 차이: StarVLA·Dexbotic은 기본 ZeRO, 자체 codebase는 그에 상응하는(comparable) FSDP2를 사용한다. 반면 OpenPI는 DDP를 쓰는데, DDP는 본질적으로 통신 오버헤드(communication overhead)가 더 낮다 (즉 OpenPI는 통신 면에서 유리한 조건). 이 차이를 명시하여 비교가 자체 codebase에 무조건 유리하지 않음을 밝힌다.\n- 주요 평가지표(primary evaluation metric): sample throughput, 단위는 samples/s (초당 처리 샘플 수).\n- 결과: 두 모델 설정 모두에서 자체 codebase가 가장 빠른 학습 속도(fastest training speeds)를 달성했다.\n- 스케일링 측정: Figure 4는 8, 16, 32, 128, 256 GPU 구성에서의 throughput과 함께 theoretical linear scaling limit(이론적 선형 확장 한계)를 같이 보여준다.\n- 결론: 자체 솔루션은 단순히 throughput만 높은 게 아니라, GPU 수가 늘어날 때 theoretical limit를 거의 그대로 따라가는 우수한 scaling efficiency(확장 효율)를 보인다.\n- 주의: 이 섹션 본문에는 구체적 samples/s 수치나 배율이 등장하지 않는다. 실제 처리량 값은 Figure 4 (a)/(b) 플롯에 그려져 있고, 본문은 셋업과 결론만 서술한다. 따라서 정확한 수치를 인용할 경우 Figure 4 곡선을 봐야 한다.\n\n**왜 / 직관**\n\n직관: 같은 모델·같은 데이터(Libero)·같은 batch size(32)로 여러 '요리 도구 세트(codebase)'를 두고 같은 요리(π-like VLA 학습)를 시켜보고 '단위 시간당 몇 인분(samples/s)'을 내는지 재는 벤치마크다. 핵심 비유: 분산 학습의 ZeRO/FSDP2는 큰 짐을 여러 사람이 나눠 드는 방식(메모리는 아끼지만 서로 자주 물건을 주고받느라 통신비가 듦)이고, DDP는 각자 짐을 통째로 들고 가는 방식(통신은 적지만 메모리를 더 씀). 저자들은 일부러 'DDP를 쓰는 OpenPI가 통신 측면에서 유리하다'는 핸디캡을 인정하면서도, 그래도 자기 codebase(FSDP2 + action expert 전용 shard group)가 더 빠르다고 주장한다. Scaling efficiency 직관: GPU를 2배로 늘리면 이상적으로 속도도 2배여야 하는데(theoretical linear limit = 45도 직선), 통신 오버헤드 때문에 보통 직선 아래로 휜다. LingBot-VLA 곡선이 그 이상적 직선에 거의 붙어 간다는 것은 GPU를 추가해도 손실 없이 거의 비례해서 빨라진다(=대규모 확장에 강하다)는 뜻이다.\n\n**그림**\n\n원본 그림 4a: [arXiv Figure 4a](https://arxiv.org/html/2601.18692v2/x5.png)\n![](https://arxiv.org/html/2601.18692v2/x5.png)\n→ 이 섹션의 핵심 근거 그림 — Qwen2.5-VL-3B-π 모델에서 자체 codebase vs StarVLA/Dexbotic/OpenPI의 samples/s를 8~256 GPU에 걸쳐 이론적 선형 한계선과 함께 비교한다.\n\n원본 그림 4b: [arXiv Figure 4b](https://arxiv.org/html/2601.18692v2/x6.png)\n![](https://arxiv.org/html/2601.18692v2/x6.png)\n→ 섹션이 직접 참조하는 두 번째 근거 그림 — PaliGemma-3B-pt-224-π 모델에 대해 동일한 throughput·scaling efficiency 비교를 제시한다.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Throughput Benchmark Protocol (벤치마크 프로토콜)**\n  - 목적/task: 여러 VLA codebase의 학습 효율을 공정하게 비교하기 위한 통제된 실험 설정 정의.\n  - 입력→출력: 입력: Libero dataset + 표준화된 π-like 아키텍처 + local batch size 32 (codebase 4종에 공통 적용) → 출력: sample throughput (samples/s) 측정값 (각 codebase·각 GPU 수에 대해)\n  - 내부: 통제 변수를 dataset(Libero), architecture(π-like), local batch(32), metric(samples/s)으로 고정. baseline은 StarVLA, Dexbotic, OpenPI 3종. 평가지표는 samples/s 단일. 본문에 수식·구체 수치 없음 — 결과 곡선은 Figure 4에 위임.\n\n- **Reproduced Models (재현 모델 2종)**\n  - 목적/task: codebase 간 VLM 구현 차이를 제거하고 baseline과 직접 비교(direct alignment)하기 위해 동일 모델을 자체 codebase 안에서 재현.\n  - 입력→출력: 입력: 두 VLM backbone (Qwen2.5-VL-3B, PaliGemma-3B-pt-224) + π action expert head → 출력: 각 모델별 throughput 곡선 (Figure 4(a), 4(b))\n  - 내부: 두 모델 모두 '-π' 접미사 = π-like(OpenPI/π0 계열 flow-matching action expert) 구성을 backbone에 부착한 형태. 자체 codebase 내에서 재현하여 baseline과 1:1 정렬. shape/하이퍼파라미터 세부는 본문 미기재(local batch 32만 명시).\n\n- **Distributed Strategy Layer (분산 학습 전략)**\n  - 목적/task: 멀티 GPU에서 메모리 점유와 throughput의 트레이드오프를 결정하는 병렬화 방식. 비교 공정성에 영향.\n  - 입력→출력: 입력: model params/grads/optimizer states + N개 GPU (N ∈ {8,16,32,128,256}) → 출력: 분산 학습 처리량 (samples/s) 및 scaling 곡선\n  - 내부: Ours = FSDP2 (ZeRO에 comparable, 파라미터/그래디언트/옵티마이저 상태를 shard). StarVLA·Dexbotic = ZeRO(default). OpenPI = DDP(통신 오버헤드 본질적으로 더 낮음 — 즉 비교에서 OpenPI에 유리한 조건임을 저자가 명시). 참고: §4.2에 따르면 본 codebase의 FSDP는 action expert 모듈에 전용 'shard group'을 구성하는 HSDP 기반 변형으로, 과도한 파라미터 sharding의 통신 오버헤드를 완화 — 이것이 5.4의 우수 scaling efficiency의 배경 메커니즘.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 5.4 throughput benchmark setup (본문 근거 기반, 추측 없음)\n\n  공통 통제 변수 (모든 실험 동일):\n    dataset      = Libero\n    architecture = standardized \"pi-like\" model\n    local batch  = 32\n    metric       = sample throughput (samples/s)\n\n  비교 대상 (codebase x distributed strategy):\n   +-------------+-------------------+--------------------------------+\n   | codebase    | dist. strategy    | note (본문 명시)               |\n   +-------------+-------------------+--------------------------------+\n   | Ours        | FSDP2             | ZeRO에 상응(comparable)        |\n   | StarVLA     | ZeRO (default)    |                                |\n   | Dexbotic    | ZeRO (default)    |                                |\n   | OpenPI      | DDP               | 통신 오버헤드 본질적으로 낮음   |\n   +-------------+-------------------+--------------------------------+\n\n  재현한 두 모델 (자체 codebase 내, baseline 정렬용):\n    (a) Qwen2.5-VL-3B-pi        --> Figure 4(a)\n    (b) PaliGemma-3B-pt-224-pi  --> Figure 4(b)\n\n  측정 축 (Figure 4):\n    x축: #GPUs in {8, 16, 32, 128, 256}\n    y축: throughput (samples/s)\n    참조선: theoretical linear scaling limit\n\n         samples/s\n           ^                          . theoretical linear limit\n           |                      .  /\n           |                  .   /  o Ours (가장 빠름, 한계선에 근접)\n           |              .   / o\n           |          .  / o   x baselines (한계선 아래로 더 휨)\n           |      . / o   x\n           |  . /o  x\n           +------------------------------> #GPUs\n            8  16  32      128    256\n\n  결론(본문): Ours = 두 설정 모두 fastest +\n             #GPU 증가 시 theoretical limit를 거의 따라가는 scaling efficiency\n```\n\n**학습/추론**: 학습/측정 방법 detail (본문 근거): (1) 이 섹션은 추론(inference)이 아니라 학습 처리량(training throughput)만 측정한다. (2) 통제 조건 — 데이터셋 Libero, 표준화된 π-like 아키텍처, local batch size = 32 고정, 평가지표 = sample throughput (samples/s). (3) 두 backbone(Qwen2.5-VL-3B-π, PaliGemma-3B-pt-224-π)을 자체 codebase 내에서 재현하여 StarVLA/Dexbotic/OpenPI와 직접 비교. (4) 분산 전략 — Ours는 FSDP2, StarVLA/Dexbotic은 ZeRO, OpenPI는 DDP. (5) 스케일링 실험 — 8/16/32/128/256 GPU 구성에서 측정하고 theoretical linear scaling limit와 대조해 scaling efficiency를 평가. (6) 결과 — 두 모델 모두 Ours가 최고 throughput, GPU 증가 시에도 이론적 선형 한계에 근접하는 확장 효율. 구체적 samples/s 수치는 본문에 없고 Figure 4 플롯에 존재.\n\n**핵심 숫자**\n\n- baseline codebase 수: 3개 (StarVLA, Dexbotic, OpenPI)\n- local batch size: 32 (모든 실험 표준화)\n- GPU 구성: 8, 16, 32, 128, 256 (5가지)\n- 재현 모델 수: 2개 (Qwen2.5-VL-3B-π, PaliGemma-3B-pt-224-π)\n- 평가지표: sample throughput, samples/s\n- VLM 파라미터 규모: 둘 다 3B (Qwen2.5-VL-3B, PaliGemma-3B)\n- 비교 기준선: theoretical linear scaling limit (이론적 선형 확장 한계)\n- 주의: 본문에 구체적 throughput 수치/속도 배율은 없음 — Figure 4 곡선에 위치\n\n## 5.5 Ablation Studies (스케일링 실험 · 데이터 효율 분석)\n\n**핵심**\n\n- 5.5는 두 개의 ablation으로 구성된다: (5.5.1) 사전학습 데이터 스케일링 실험, (5.5.2) 사후학습(post-training) 데이터 효율 분석. 표/수식 없이 두 그림(Fig.5, Fig.6)으로 결론을 제시한다.\n- 5.5.1 스케일링: 벤치마크에서 뽑은 25개 대표 task subset으로 평가. 사전학습 데이터를 3,000시간 → 20,000시간으로 늘리면 progress rate와 success rate가 모두 일관되게 상승(scaling law 확인).\n- 스케일링 법칙이 단일 플랫폼에 국한되지 않음을 보임: 3개 임베디먼트(Agibot G1, AgileX, Galaxea R1Pro) 각각의 개별 추세가 aggregate 성능과 대체로 일치 → scaling law가 robust하고 플랫폼 비특이적.\n- 결론(5.5.1): 실세계 사전학습 데이터 스케일업이 다양한 downstream task·임베디먼트에 걸쳐 generalization과 성능을 향상시킨다 = 저자들의 scaling 접근법의 유효성 검증.\n- 5.5.2 데이터 효율: GM-100 데이터셋에서 8개 대표 task를 골라 Agibot G1 플랫폼에서 data-efficient post-training 실험 수행(대규모 실세계 벤치마킹 프로토콜 준수).\n- 핵심 결과(5.5.2): task당 단 80개 시연(demonstration)만 쓴 LingBot-VLA가, 전체 130개 시연을 다 쓴 베이스라인 π0.5를 Progress Rate·Success Rate 양쪽에서 능가.\n- LingBot-VLA와 π0.5의 성능 격차는 post-training 데이터 양이 늘수록 유의하게 더 벌어짐 → 우월한 data efficiency와 scalability 입증.\n- 이 섹션에는 디스플레이 수식이 없다. 등장하는 수학 표기는 베이스라인 모델명 π0.5(인라인) 뿐이며, 평가지표는 PS(Progress Rate)와 SR(Success Rate)로 명명만 됨(정의식은 5.5 본문에 없음).\n\n**왜 / 직관**\n\n이 섹션은 '모델 구조를 바꿔 끼우는' 전형적 ablation이 아니라 '데이터 축(axis) 두 개를 따로 빼서(ablate) 각각의 기여를 측정하는' 데이터 중심 ablation이다. 직관 비유: (1) 사전학습 스케일링은 '독서량 vs 일반 상식' 관계와 같다 — 책(데이터)을 3천 시간어치에서 2만 시간어치로 늘릴수록 처음 보는 시험(downstream task)에서도 점수가 꾸준히 오르고, 이 향상이 특정 과목(특정 로봇 플랫폼)에만 국한되지 않고 모든 과목에서 비슷하게 나타나므로 '진짜 실력(robust scaling law)'이라 부를 수 있다. (2) 데이터 효율은 '족집게 과외 효율' 비유다 — 우리 학생(LingBot-VLA)은 사전학습으로 이미 기초가 탄탄해서 과외 문제 80개만 풀어도, 기초가 약해 130개를 다 풀어야 하는 경쟁 학생(π0.5)을 이긴다. 게다가 과외 문제를 더 줄수록 격차가 더 벌어진다 = 같은 데이터를 줘도 우리 모델이 더 잘 흡수한다(높은 data efficiency). 요약하면, '많이 사전학습할수록 좋아지고(5.5.1), 사전학습이 잘 됐기에 적은 사후학습 데이터로도 베이스라인을 이긴다(5.5.2)'는 두 주장이 서로를 보강한다.\n\n**그림**\n\n원본 그림 5a: [arXiv Figure 5a](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n→ 5.5.1의 핵심 주장(데이터 3,000→20,000시간 증가 시 progress rate가 일관 상승)을 직접 보여주는 그래프 — aggregate 및 3개 임베디먼트 개별 추세가 함께 나타나 scaling law의 robustness 근거가 됨.\n\n원본 그림 5b: [arXiv Figure 5b](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n→ 5.5.1의 다른 절반 지표(success rate도 데이터 증가에 따라 상승)를 입증 — PS와 함께 scaling law가 두 지표 모두에서 성립함을 보이는 근거.\n\n원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2601.18692v2/figures/experiment/post_training_data_scaling_law/Dual_Axis_Success_Progress.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/post_training_data_scaling_law/Dual_Axis_Success_Progress.png)\n→ 5.5.2의 핵심 결과(80-demo LingBot-VLA가 130-demo π0.5를 PS·SR에서 능가, 데이터 늘수록 격차 확대)를 시각화한 유일한 그림 — data-efficiency 주장의 직접 근거.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n5.5 Ablation Studies — 두 ablation 축의 실험 데이터흐름 (본문 근거)\n\n[5.5.1 Scaling Experiments] (사전학습 데이터 축을 ablate)\n  benchmark\n     |  select 25 representative tasks (subset)\n     v\n  +-----------------------------------------------------+\n  | pre-training data duration 를 sweep:                 |\n  |   3,000 h ----------------------------> 20,000 h     |\n  +-----------------------------------------------------+\n     | 각 데이터 규모로 학습된 generalist policy 평가\n     v\n  3 embodiments 에서 측정 (개별 + aggregate):\n     - Agibot G1\n     - AgileX\n     - Galaxea R1Pro\n     |\n     v\n  metrics: Progress Rate (PS) [Fig.5a] , Success Rate (SR) [Fig.5b]\n     |\n     v\n  결론: 데이터 증가 -> PS, SR 일관 상승 (scaling law)\n        개별 임베디먼트 추세 == aggregate 추세\n        => scaling law robust, 플랫폼 비특이적\n\n[5.5.2 Data-efficient Analysis] (사후학습 데이터 축을 ablate)\n  GM-100 dataset\n     |  select 8 representative tasks\n     v\n  platform: Agibot G1 (단일 플랫폼)\n     |\n     v\n  +-------------------------------+     +-----------------------------+\n  | LingBot-VLA                   |     | pi_0.5 (baseline)           |\n  | post-train: 80 demos / task   |     | post-train: 130 demos / task|\n  +-------------------------------+     +-----------------------------+\n     |                                       |\n     v                                       v\n        ---- compare on PS & SR [Fig.6] ----\n     |\n     v\n  결과: 80-demo LingBot-VLA  >  130-demo pi_0.5  (PS & SR 둘 다)\n        post-training 데이터 ↑ => 격차 ↑\n        => superior data efficiency & scalability\n```\n\n**학습/추론**: 학습(이 섹션이 다루는 두 학습 단계): (1) 사전학습(pre-training) — 실세계 dual-arm 로봇 데이터를 3,000~20,000시간 규모로 사용해 generalist policy를 학습. 5.5.1은 이 데이터 duration을 변수로 두고 스케일링 효과를 측정한다(평가는 벤치마크 25-task subset, 3개 임베디먼트). (2) 사후학습(post-training, 다운스트림 적응) — GM-100의 8개 task에 대해 task당 demonstration 수를 제한해 fine-tune. 5.5.2는 이 demonstration budget(LingBot-VLA 80개 vs π0.5 130개)을 변수로 둔다. 추론/평가: 두 실험 모두 Progress Rate(PS)와 Success Rate(SR) 두 지표로 정책을 roll-out 평가하며(정의식은 5.5 본문에 없음), 결과는 표가 아니라 Fig.5(스케일링 곡선)·Fig.6(데이터 효율 이중축)로 보고된다. 결론: 사전학습 데이터를 키울수록 성능이 오르고(scaling law, robust across embodiments), 잘된 사전학습 덕분에 더 적은 사후학습 데이터로 베이스라인을 능가한다(data efficiency).\n\n**핵심 숫자**\n\n- 사전학습 데이터 duration sweep 범위: 3,000시간 → 20,000시간\n- 스케일링 실험 평가용 task subset: 벤치마크에서 25개 대표 task\n- 스케일링 검증 임베디먼트 3종: Agibot G1, AgileX, Galaxea R1Pro\n- 데이터 효율 실험 task 수: GM-100 데이터셋에서 8개 대표 task\n- 데이터 효율 실험 플랫폼: Agibot G1 (단일)\n- LingBot-VLA 사후학습 budget: task당 80 demonstrations\n- 베이스라인 π0.5 사후학습 budget: 전체 130 demonstrations\n- 비교 지표: Progress Rate(PS), Success Rate(SR) — 두 지표 모두에서 80-demo LingBot-VLA가 130-demo π0.5를 능가\n\n## 5.5.1 Scaling Experiments (사전학습 데이터 스케일링)\n\n**핵심**\n\n- 사전학습(pre-training) 데이터의 scaling law를 검증하는 것이 이 섹션의 목적이다. 벤치마크에서 추출한 대표 task 25개 subset 위에서 실험한다. (\"we conduct experiments on a subset of 25 representative tasks drawn from the benchmark\")\n- 사전학습 데이터 양(duration)을 3,000시간 → 20,000시간으로 늘리면 progress rate와 success rate가 모두 일관되게 상승한다. (\"both the progress rate and success rate demonstrate a consistent upward trend as the pre-training data duration increases from 3,000 to 20,000 hours\")\n- 이는 실세계 사전학습 데이터를 늘릴수록 다양한 downstream task와 embodiment 전반의 일반화/성능이 향상됨을 의미한다. (\"scaling up real-world pre-training data contributes to improved generalization and performance across diverse downstream tasks and embodiments\")\n- 세 개 embodiment(Agibot G1, AgileX, Galaxea R1Pro) 각각의 개별 추세가 집계(aggregated) 성능 추세와 대체로 일치한다 → 관측된 scaling law가 특정 플랫폼에만 국한되지 않고 robust 함을 시사. (\"the individual trends of the three embodiments ... generally align with the aggregated performance, suggesting the observed scaling law is robust and not specific to a single platform\")\n- 이 섹션에는 수식이 없다. scaling law를 그래프(Figure 5)로만 제시하며, 멱법칙 지수 등 명시적 수학 표현은 본문에 등장하지 않는다.\n- 성능 지표는 SR(Success Rate)과 PS(Progress Score, 본문에서 progress rate로도 지칭). SR = 3분 제한 내 모든 task step을 완료한 trial 비율. PS = 순차 subtask 체크포인트 진행도로 부분 완료를 측정(예: 4/6≈0.67). (정의는 5.1.4 평가지표 절 출처)\n\n**왜 / 직관**\n\n직관: \"데이터를 부으면 실력이 는다\"를 로봇 정책에 대해 실험적으로 확인한 절이다. LLM에서 토큰 수를 늘리면 성능이 예측 가능하게 좋아지는 scaling law가 있듯, 여기서는 실세계 dual-arm 로봇 데이터의 누적 시간(3천→2만 시간)을 X축에 놓고 SR/PS를 Y축에 놓으니 우상향 곡선이 나온다는 것. 비유하자면 운동선수가 훈련 시간을 늘릴수록 경기 성적이 오르는 것과 같고, 핵심은 \"한 종목(한 로봇)만 잘하는 게 아니라 세 종목(세 embodiment) 모두에서 같은 추세가 보인다\"는 점 — 즉 특정 로봇에 과적합된 향상이 아니라 데이터를 늘리면 범용적으로 좋아진다는, 일반화 가능한(robust) 법칙이라는 메시지다. 수식 없이 그래프만으로 주장을 펴는 이유는, 이 절의 핵심 증거가 정량적 곡선의 단조 상승 그 자체이기 때문이다.\n\n**그림**\n\n원본 그림 5a: [arXiv Figure 5a](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Progress_Rate.png)\n→ 이 절의 핵심 주장(데이터 3천→2만 시간 증가 시 progress rate 우상향)을 직접 보여주는 그래프 — 집계 및 3개 embodiment별 PS 추세.\n\n원본 그림 5b: [arXiv Figure 5b](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/pre_training_data_scaling_law/Aggregated_Success_Rate.png)\n→ 같은 데이터 스케일 축에서 success rate가 일관되게 상승함을 보여, scaling law 주장의 나머지 절반(SR)을 뒷받침.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Pre-training Data Scaling 실험 setup**\n  - 목적/task: 실세계 사전학습 데이터 양을 늘릴 때 정책 성능이 scaling law를 따르는지 검증\n  - 입력→출력: 입력: pre-training data duration(3,000h → 20,000h)으로 사전학습된 LingBot-VLA 정책 + 25개 대표 task subset → 출력: 데이터 양 대비 SR/PS 곡선(Figure 5)\n  - 내부: 벤치마크 전체가 아닌 25개 representative task subset으로 평가 비용을 줄여 스케일 축(데이터 시간)을 따라 성능을 측정. 수식 없음 — 곡선의 단조 상승 자체가 결과물.\n\n- **3-embodiment 교차 검증**\n  - 목적/task: 관측된 scaling law가 단일 로봇에 과적합된 것이 아니라 robust 함을 확인\n  - 입력→출력: 입력: Agibot G1 / AgileX / Galaxea R1Pro 각각의 rollout 결과 → 출력: embodiment별 개별 추세 vs aggregated 추세 비교\n  - 내부: 세 embodiment의 개별 SR/PS 추세가 aggregated 추세와 'generally align' 함을 근거로, scaling law가 platform-agnostic(robust)하다고 결론.\n\n- **평가 지표 SR / PS (5.1.4 정의)**\n  - 목적/task: 스케일링 곡선의 Y축을 정의 — task 성공/진행도 정량화\n  - 입력→출력: 입력: 각 trial의 rollout(3분 제한) → 출력: SR(0~1 비율), PS(0~1 부분점수)\n  - 내부: SR = 3분 내 모든 task step을 완료한 trial 비율. PS = 순차 subtask 체크포인트를 따라 부분 완료를 추적(예: step 1~4 완료, 5에서 실패 시 4/6≈0.67). 명시적 수식은 본문에 없고 prose + 예시로만 정의됨.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n5.5.1 사전학습 데이터 스케일링 실험 — 데이터 흐름/평가 구조\n(본문 + 5.1.4 지표정의 + Figure 5 근거. 추측 항목 없음)\n\n[입력 변수: pre-training data duration]\n   3,000 h ───────────────────────────────> 20,000 h   (X축)\n        │\n        ▼\n[사전학습된 LingBot-VLA 정책]\n        │  벤치마크에서 추출한 25개 대표 task subset에서 평가\n        ▼\n┌──────────────────────────────────────────────────────────┐\n│  3개 embodiment에서 각각 rollout (3분 제한)                 │\n│   ├─ Agibot G1                                             │\n│   ├─ AgileX                                                │\n│   └─ Galaxea R1Pro                                         │\n└──────────────────────────────────────────────────────────┘\n        │\n        ▼  각 trial 결과를 두 지표로 환산\n┌────────────────────────────┐   ┌────────────────────────────┐\n│ SR (Success Rate)          │   │ PS (Progress Score)        │\n│ = 3분 내 모든 step 완료한  │   │ = 순차 subtask 체크포인트  │\n│   trial 비율               │   │   진행도 (부분점수)        │\n│                            │   │   예: 4/6 ≈ 0.67           │\n└────────────────────────────┘   └────────────────────────────┘\n        │                                  │\n        ▼ (Figure 5b, Y축)                 ▼ (Figure 5a, Y축)\n   SR ↑ 우상향                        PS ↑ 우상향\n        │                                  │\n        └───────────┬──────────────────────┘\n                    ▼\n   관측: 3개 embodiment 개별 추세 ≈ aggregated 추세\n        → scaling law가 특정 플랫폼에 국한되지 않고 robust\n```\n\n**학습/추론**: 학습/평가 방법(이 절 + 5.1.4 근거): (1) 사전학습 — 실세계 dual-arm 로봇 데이터를 3,000시간에서 20,000시간까지 점진적으로 늘려가며 LingBot-VLA를 pre-training 하고, 각 데이터 규모마다 별도 체크포인트를 평가한다. (2) 평가(추론) — 벤치마크에서 뽑은 25개 대표 task subset에서, 세 embodiment(Agibot G1, AgileX, Galaxea R1Pro)로 rollout을 수행한다. 각 trial은 3분 제한 안에서 실행되며, 모든 step을 완료하면 success(SR에 반영), 부분 완료는 순차 subtask 체크포인트 진행도로 PS에 반영된다. (3) 결과 집계 — 데이터 양을 X축, SR/PS를 Y축으로 두어 scaling 곡선(Figure 5a/5b)을 그리고, embodiment별 곡선이 aggregated 곡선과 일치하는지로 robust성을 판정한다. 이 절에는 학습 손실함수나 추론 수식은 등장하지 않는다(스케일링 분석은 전적으로 그래프 기반).\n\n**핵심 숫자**\n\n- 사전학습 데이터 duration 범위: 3,000시간 → 20,000시간\n- 평가에 사용한 대표 task subset 크기: 25개 task\n- embodiment 수: 3개 (Agibot G1, AgileX, Galaxea R1Pro)\n- SR 평가 제한 시간: 3분(3-minute time limit) — 5.1.4 정의\n- PS 부분점수 예시: 4/6 ≈ 0.67 (step 1~4 완료, step 5 실패) — 5.1.4 정의\n\n## 5.5.2 Data-efficient Analysis (데이터 효율성 분석)\n\n**핵심**\n\n- 이 섹션은 'post-training(다운스트림 적응) 단계에서 데모(시연) 데이터를 얼마나 적게 쓰고도 좋은 성능을 내는가'를 측정한다. 즉 사전학습 스케일링(5.5.1)과 달리, 여기서는 후처리 학습 데이터 효율을 본다.\n- 실험 세팅: GM-100 데이터셋에서 대표 태스크 8개(eight representative tasks)를 골라, Agibot G1 플랫폼 위에서 data-efficient post-training 실험을 수행한다. (대규모 실세계 벤치마킹 프로토콜을 그대로 따름)\n- 핵심 결과 1: LingBot-VLA는 태스크당 단 80개 데모(80 demonstrations per task)라는 제한된 예산만으로도, 전체 130개 데모(full 130-demonstration set)를 쓴 베이스라인 pi_0.5를 Progress Rate와 Success Rate 양쪽에서 능가한다.\n- 핵심 결과 2: post-training 데이터 양이 늘어날수록 LingBot-VLA와 pi_0.5 간 성능 격차(performance margin)가 '크게(significantly) 벌어진다' -> 우수한 데이터 효율성(data efficiency)과 확장성(scalability)을 입증.\n- 이 섹션 자체에는 새로운 수식이 없다. 평가에 쓰인 지표 SR(Success Rate), PS(Progress Score)는 별도의 'Evaluation Metrics' 절에서 정의되며, 본문에서는 산식이 주석 처리되어 텍스트 정의만 남아 있다(아래 equations에 주석 산식과 출처를 명시).\n- 참조 그림은 Figure 6 (Dual_Axis_Success_Progress.png): post-training 데모 수에 따른 SR/PS 추이를 LingBot-VLA vs pi_0.5로 비교한 이중축(dual-axis) 그래프 하나뿐이다.\n\n**왜 / 직관**\n\n비유로 보면, pi_0.5가 한 과목을 마스터하는 데 130장짜리 문제집(데모 130개)이 필요하다면, LingBot-VLA는 80장만 풀고도 그 130장 학생보다 시험을 더 잘 본다. 이게 가능한 이유는 사전학습(pre-training)에서 이미 '로봇 일반 상식'을 충분히 쌓아둔 모델이기 때문이다. 즉 다운스트림 태스크에 새로 배워야 할 양이 적어서, 소량의 새 데모만으로도 빠르게 적응한다(전이학습에서 'fine-tuning은 적은 데이터로 충분하다'와 같은 직관). 게다가 데모를 더 많이 줄수록 격차가 더 벌어진다는 것은, 좋은 사전학습 표현이 '추가 데이터를 흡수하는 효율'까지 높여준다는 의미다. 데이터를 부어줄수록 둘 다 좋아지지만 LingBot-VLA가 더 가파르게 좋아진다는 뜻.\n\n**수식**\n\n$$\n\\text{SR} = \\dfrac{\\text{Number of successful trials}}{15}\n$$\n\n- **무슨 식?**: 성공 trial 비율 = 성공 수 / 15\n- **설명**: Success Rate(SR): 분자=성공한 trial 수, 분모=15(태스크당 총 trial 수). 한 trial은 3분 제한 시간 안에 모든 태스크 스텝을 완료해야 성공으로 인정. 이 절에서 LingBot-VLA가 pi_0.5를 능가한다고 말하는 두 지표 중 하나. 주의: 이 산식은 본문 'Evaluation Metrics' 절에 주석(commented-out)으로만 존재하며, 렌더링된 논문에는 산식 없이 텍스트 정의('proportion of trials where the model completes all task steps within a 3-minute time limit')만 남아 있음. 5.5.2 섹션 자체에는 수식이 전혀 없음.\n\n$$\n\\text{PS} = \\dfrac{1}{15} \\sum_{i=1}^{15} \\dfrac{\\text{Steps completed in trial } i}{\\text{Total steps in task}}\n$$\n\n- **무슨 식?**: 평균 부분 진행도 = (완료 스텝/전체 스텝)을 15 trial 평균\n- **설명**: Progress Score(PS): 15개 trial 각각에 대해 (완료한 스텝 수 / 태스크 전체 스텝 수)로 부분 진행도를 매기고, 15개 trial 평균을 취함. 부분 성공도 보상하여 실패 모드를 진단하는 보조 지표. 예: 6스텝 'Stack Bowls'에서 1~4단계 완료 후 5단계 실패 시 4/6 ≈ 0.67. 이 산식 역시 'Evaluation Metrics' 절에 주석으로만 존재하고, 본문에는 텍스트 정의와 0.67 예시만 표시됨. 5.5.2가 'Progress Rate'로 부르는 지표가 바로 이 PS임.\n\n**그림**\n\n원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2601.18692v2/figures/experiment/post_training_data_scaling_law/Dual_Axis_Success_Progress.png)\n![](https://arxiv.org/html/2601.18692v2/figures/experiment/post_training_data_scaling_law/Dual_Axis_Success_Progress.png)\n→ 5.5.2가 유일하게 참조하는 그림(\\cref{fig:data_efficient_post_training}). post-training 데모 수 증가에 따른 SR/PS를 LingBot-VLA vs pi_0.5로 비교한 이중축 그래프로, '80 데모로 130 데모 베이스라인을 능가'와 '데모 늘수록 격차 확대'라는 두 핵심 주장을 그대로 시각화.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Data-efficient post-training (다운스트림 적응 학습)*
