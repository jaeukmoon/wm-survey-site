  <script>
  const MD = "# LingBot-VLA: A Pragmatic VLA Foundation Model — Deep-Dive\n\n> **이 논문이 달성하려는 것**: 약 2만 시간 규모의 실세계 dual-arm 데이터와 자체 고효율 코드베이스로 학습해, \"real-world robot 데이터를 부을수록 성능이 포화 없이 오르는가\"라는 VLA scaling 질문에 처음으로 실증적 답을 내놓고, 그 위에서 SOTA 성능·강한 cross-embodiment 일반화·저비용 적응을 동시에 보이는 **pragmatic(실용) VLA foundation model**.\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2601.18692 · v2 (2026-02-26) |\n| 저자/소속 | Robbyant / Ant Group *(소속명은 계보 메모 기반, 워크플로 author 미수집)* |\n| 코드 | github.com/Robbyant/lingbot-vla *(계보 메모 기반)* · code+base model+benchmark 공개 표방 |\n| 계보 분류 | **① VLM + Action Expert** (미래 관측 예측 없음 — world model 아님) |\n| 한 줄 위치 | π0 계열의 \"강한 데이터·엔지니어링 축\" VLA. 비표준 요소는 depth distillation 한 가지 |\n\n> ⚠️ **검증 범위 주의**: 이 노트는 paper-deepdive 워크플로의 섹션별 추출(전 섹션, source_quote 근거)로 만들어졌으나, 적대적 검증(2차 fact-check) 패스가 세션/서버 rate-limit으로 **일부만 완료**됐다. 검증 완료(ok) 섹션 = Abstract·2.2·3.1·5.1.1·5.1.2·5.1.3. **§3.2는 검증에서 오류가 잡혔다**(맨 아래 TODO 참조). 그 외 섹션은 추출 근거는 있으나 2차 검증 미완.\n\n---\n\n## Abstract\n\n**핵심**\n\n- LingBot-VLA는 실용성(pragmatic)을 지향하는 VLA(Vision-Language-Action) foundation model로, 핵심 목표는 (1) task/platform 간 충실한 일반화(faithful generalization)와 (2) 비용 효율성(cost efficiency, 즉 적응에 드는 데이터·GPU 시간) 두 가지를 동시에 달성하는 것이다.\n- 사전학습 데이터 규모: 약 20,000시간(around 20,000 hours)의 real-world 데이터를, 널리 쓰이는 9종 dual-arm robot configuration에서 수집해 사용했다.\n- 평가 규모: 3개 robotic platform에서 systematic assessment를 수행했고, 각 platform마다 100개 task를, task당 130개의 post-training episode로 평가했다.\n- 성능 결과: 경쟁 모델 대비 명확한 우위(clear superiority)를 보였으며, 강한 성능(strong performance)과 폭넓은 일반화(broad generalizability)를 입증했다.\n- 효율적 codebase를 자체 구축: 8-GPU 학습 환경에서 초당 261 sample(261 samples per second)의 throughput을 달성했다.\n- 이는 기존 VLA 전용 codebase 대비 1.5~2.8배(의존하는 VLM base model에 따라 다름)의 속도 향상(speedup)에 해당한다.\n- 이 특성들(성능·일반화·효율) 덕분에 real-world deployment에 적합(well-suited)하다고 주장한다.\n- 오픈 액세스 공개: code, base model, benchmark data를 모두 공개하며, 더 도전적인 task를 가능케 하고 건전한 평가 기준(sound evaluation standards)을 촉진하는 데 초점을 둔다.\n\n**왜 / 직관**\n\n비유로 설명하면, 기존 VLA 모델 연구가 \"좋은 요리사(모델)를 한 가지 주방(robot platform)에서 몇 개 요리(task)만 시켜보고 평가\"하는 식이었다면, LingBot-VLA는 \"엄청나게 많은 실전 요리 경험(20,000시간 real-world 데이터, 9종 로봇)으로 훈련시킨 뒤, 서로 다른 3개 주방에서 각각 100가지 요리를 시켜보는\" 식의 대규모·다중 플랫폼 검증을 한다. 동시에 저자들은 \"맛(성능)만 좋으면 끝이 아니라, 빨리·싸게 만들 수 있어야 실제로 식당에 들일 수 있다\"는 실용주의(pragmatic) 관점을 강조한다. 그래서 모델 성능뿐 아니라 학습 throughput(초당 261 sample, 기존 대비 1.5~2.8배 빠름)이라는 '비용 효율' 축을 abstract의 동등한 핵심 메시지로 내세운다. 즉 이 논문의 직관적 메시지는 \"일반화 잘 되고 + 싸고 빠르게 적응 가능한 VLA여야 진짜 배포 가능하다\"이며, 이를 뒷받침하는 세 기둥이 강한 성능, 넓은 일반화, 계산 효율이다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ Abstract 본문은 수식·그림을 직접 인용하지 않지만, Abstract가 서술하는 세 메시지(real-world dual-arm 데이터 scaling으로 pre-training, downstream task로의 쉬운·효율적 전이, 3개 embodiment에 걸친 systematic assessment에서의 명확한 우위)를 그대로 시각화한 것이 바로 Abstract 직후의 Figure 1 overview이다(캡션이 Abstract 주장과 1:1 대응).\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **LingBot-VLA (VLA foundation model)**\n  - 목적/task: 자연어 지시 기반 robotic manipulation을 위한 VLA foundation model로, task·platform 간 일반화와 비용 효율을 동시에 달성하는 것이 목표(Abstract 수준 서술).\n  - 입력→출력: 입력→출력: Abstract에서는 구체 shape를 명시하지 않음. Abstract 수준에서는 '약 20,000시간 real-world dual-arm 데이터(9종 config)로 pre-training' → 'downstream task에서 강한 성능·일반화를 내는 학습된 정책'으로 기술됨. (정확한 token/state/action shape는 Abstract 범위 밖 — 4장 Architecture에 정의됨.)\n  - 내부: Abstract는 내부 동작·수식을 제시하지 않는다. 제시된 사실은: (1) ~20,000 hours real-world data / 9 dual-arm robot configurations로 학습, (2) 3 platform x 100 tasks x (task당 130 post-training episodes)로 평가, (3) competitor 대비 clear superiority, (4) 별도 효율 codebase가 8-GPU에서 261 samples/sec throughput, 기존 VLA codebase 대비 1.5~2.8x speedup. MoT·action expert·flow matching 등 내부 메커니즘은 Abstract에 없음(본문 4장 소관)이므로 여기서는 기술하지 않음.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nAbstract가 압축적으로 서술하는 LingBot-VLA의 high-level 파이프라인을\n본문 근거(Abstract + Fig.1 캡션)만으로 풀어쓴 데이터 흐름:\n\n  [9종 dual-arm robot configs]\n   ~20,000 hours real-world data\n            |\n            v\n   +---------------------------+\n   |  PRE-TRAINING (scaling)   |   <- \"scale dual-arm robot data ... for pre-training\"\n   |   VLA foundation model    |\n   +---------------------------+\n            |\n            |  easy & efficient transfer\n            |  (130 post-training episodes / task)\n            v\n   +---------------------------+\n   |   DOWNSTREAM TASKS        |\n   +---------------------------+\n            |\n            v\n   +-----------------------------------------------+\n   |  SYSTEMATIC ASSESSMENT (3 robotic platforms)  |\n   |   each: 100 tasks x 130 episodes/task         |\n   |   => clear superiority over competitors       |\n   +-----------------------------------------------+\n\n  [효율 축 - 별도 메시지]\n   Efficient codebase, 8-GPU setup\n     -> 261 samples/sec throughput\n     -> 1.5~2.8x speedup vs existing VLA codebases\n       (배수는 의존하는 VLM base model에 따라 달라짐)\n\n  [공개]\n   open access: code + base model + benchmark data\n   (목표: 더 challenging한 task 가능 + sound evaluation standards)\n\n주: Abstract 자체에는 모듈 내부 구조(MoT, action expert, flow matching 등)가\n나오지 않으므로 위 ASCII는 Abstract가 명시한 항목만 포함(추측 배제).\n```\n\n**학습/추론**: 학습/추론 방법에 대해 Abstract가 명시하는 것만: (학습 데이터) 약 20,000시간의 real-world manipulation 데이터를 9종 dual-arm robot configuration에서 수집해 pre-training에 사용. (적응/후학습) downstream 적응 시 task당 130개의 post-training episode를 사용하며, '쉽고 효율적으로(easily and efficiently)' 전이된다고 서술. (학습 인프라/효율) 자체 구축한 efficient codebase가 8-GPU 학습 setup에서 초당 261 sample throughput을 내고, 의존하는 VLM base model에 따라 기존 VLA 전용 codebase 대비 1.5~2.8배 속도 향상. (평가/추론) 3개 robotic platform에서 각 100 task를 수행하는 systematic assessment로 검증해 경쟁 모델 대비 우위를 확인. 주의: Abstract에는 loss function·optimizer·action head(flow matching) 등 구체적 학습 알고리즘이나 추론(inference) 디코딩 절차가 기술되어 있지 않음(본문 4장에 위치) — 따라서 그 부분은 추측하지 않음.\n\n**핵심 숫자**\n\n- ~20,000 hours: real-world pre-training 데이터 총량 (around 20,000 hours of real-world data)\n- 9: pre-training에 쓰인 popular dual-arm robot configuration 수 (9 popular dual-arm robot configurations)\n- 3: systematic assessment를 수행한 robotic platform 수 (3 robotic platforms)\n- 100: platform 각각이 완료한 task 수 (each completing 100 tasks)\n- 130: task당 post-training episode 수 (130 post-training episodes per task)\n- 261 samples/sec: 8-GPU 학습 setup에서의 codebase throughput (throughput of 261 samples per second with an 8-GPU training setup)\n- 8: 학습에 쓴 GPU 수 (8-GPU training setup)\n- 1.5~2.8x: 기존 VLA-oriented codebase 대비 speedup 범위 (의존하는 VLM base model에 따라 다름)\n\n## 1 Introduction\n\n**핵심**\n\n- VLA(Vision-Language-Action) foundation model은 자연어 지시에 따라 로봇이 다양한 manipulation task를 수행하게 해주는 유망한 방법이다. 대규모 pre-training을 통해 일반화 가능한 skill을 얻어 다양한 task/플랫폼에 빠르게 적응한다. [6,5,27 인용]\n- 핵심 공백(gap) 제기: (1) real-robot 성능이 거대한 pre-training 데이터셋에 따라 어떻게 scale 되는지에 대한 포괄적 실증 연구가 부족하고, (2) 대용량 데이터에서 이런 scaling 평가를 효율적으로 수행할 고도로 최적화된 training codebase가 커뮤니티에 없다.\n- 본 논문이 던지는 근본 질문(논문 전체의 동기): \"VLA 모델은 대규모 real-world robot 데이터에 따라 실제로 어떻게 scale 되는가?\" (How do VLA models truly scale with massive real-world robot data?)\n- Scaling 발견(주장): pre-training 데이터를 3,000시간 → 20,000시간으로 늘리면 downstream success rate가 일관되고 크게(consistently and substantially) 향상된다. 20,000시간 지점에서도 saturation(포화) 징후가 전혀 없어, 데이터를 더 늘리면 성능이 계속 좋아질 여지가 있음을 시사한다. 저자들은 이를 real-world robot learning에서 favorable scaling property에 대한 '최초의 실증적 증거(first empirical evidence)'라고 주장한다.\n- 평가 프레임워크: GM-100 [29]이 제공하는 100개의 정교하게 설계된 task를 활용해, 3개의 robotic platform(embodiment)에 걸쳐 task·embodiment당 130 episode 규모로 체계적 평가를 수행한다. task diversity와 multi-platform consistency를 강조해 새로운 VLA 벤치마킹 표준을 제시한다고 주장.\n- 제안 모델: LingBot-VLA. 9개 robotic platform에서 수집한 약 20,000시간의 real-world manipulation 데이터로 학습한 'pragmatic(실용적) VLA foundation model'. 포괄적 벤치마크에서 기존 방법 대비 SOTA 성능과 뛰어난 일반화를 달성한다고 주장.\n- 계산 효율성(엔지니어링 기여): 대규모 robot learning에는 높은 계산 효율이 필수임을 강조하며, 8-GPU 클러스터에서 초당 261 samples throughput을 내는 최적화된 codebase를 개발했다. 이로 training cycle을 단축하고 계산 overhead·비용을 낮춘다.\n- 개방성: 커뮤니티 발전을 위해 code, base model, benchmark data를 공개하며, 더 어려운 task 지원과 건전한(sound) 평가 표준 촉진에 초점을 둔다.\n- 섹션 내 수식은 없음 — Introduction은 전적으로 서술형이며, 첫 수식은 Section 4(S4.E1, S4.E2)에서 처음 등장한다. shape가 정의된 모듈/데이터흐름 명세도 이 섹션에는 없다(상위 동기·기여 요약 수준).\n\n**왜 / 직관**\n\n비유로 보면 이 Introduction은 \"데이터를 더 많이 부으면 로봇이 정말 더 똑똑해지는가?\"를 묻는다. LLM에서는 '데이터·모델 키우면 성능 오른다'는 scaling law가 이미 정설이지만, 로봇(real-robot)에서는 실제 하드웨어로 검증한 사례가 거의 없었다 — 시뮬레이션이 아니라 실물 로봇으로 수만 시간 데이터를 모아 돌려보는 비용이 막대하기 때문이다. 저자들의 직관은 두 가지다. 첫째, '연료를 더 넣을수록 더 멀리 간다' — 3천→2만 시간으로 늘려도 연비가 떨어지지(saturate) 않으니, 아직 데이터가 병목이 아니라 자원(데이터·연산)을 더 투입하면 계속 이득이라는 것. 둘째, '저울 없이 다이어트 효과를 논할 수 없다' — scaling을 주장하려면 신뢰할 수 있는 대규모 실측 저울(GM-100, 3 embodiment × 100 task × 130 episode)이 필요하고, 동시에 그 많은 데이터를 감당할 효율적 엔진(261 samples/s codebase)이 없으면 실험 자체가 불가능하다. 즉 '큰 발견(scaling) = 큰 데이터 + 큰 저울 + 빠른 엔진'의 삼각 구도로 LingBot-VLA를 정당화한다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ Introduction이 주장하는 3대 축(real-world dual-arm 데이터 대규모 pre-training → downstream으로의 손쉽고 효율적인 transfer → 3개 embodiment 전반의 체계적 평가/우월성)을 한 장으로 요약한 overview teaser이며, 본문 S1 직전(S0.F1)에 배치되어 Introduction의 시각적 근거다.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **LingBot-VLA (제안 모델, 상위 개념)**\n  - 목적/task: 자연어 지시 기반 로봇 manipulation을 수행하는 pragmatic VLA foundation model. Introduction에서는 상위 정의만 제시되고 내부 구조(backbone, action head)는 후속 섹션 소관.\n  - 입력→출력: 입력: 시각 관측 + 자연어 instruction → 출력: 로봇 action (Introduction 수준 기술; 구체 텐서 shape는 본 섹션에 명시되지 않음)\n  - 내부: 약 20,000시간의 real-world manipulation 데이터(9개 robotic platform)로 pre-training. 포괄적 벤치마크에서 SOTA·고일반화 주장. 내부 동작 수식은 Introduction에 없음(첫 수식은 Section 4).\n\n- **Scaling 실증 연구 (기여 1)**\n  - 목적/task: pre-training 데이터 volume/diversity 증가에 따른 downstream success rate 변화를 실증.\n  - 입력→출력: 입력: pre-training 데이터 규모(3,000h → 20,000h) → 출력: downstream success rate(일관·대폭 향상, 20,000h에도 비포화)\n  - 내부: data volume과 diversity에 대한 systematic empirical investigation. 결과를 real-world robot learning에서 favorable scaling property의 first empirical evidence로 규정.\n\n- **평가 프레임워크 (기여 2)**\n  - 목적/task: 실물 로봇 플랫폼에서 대규모로 정책(policy)을 신뢰성 있게 평가해 scaling 주장을 뒷받침.\n  - 입력→출력: 입력: GM-100의 100개 task × 3 robotic platform → 출력: task·embodiment당 130 episode 기반 성능 측정/표준\n  - 내부: GM-100 [29]의 100개 설계된 task 활용. 3 platform × 100 task × 130 episode/task/embodiment. task diversity + multi-platform consistency를 평가 표준으로 제시.\n\n- **최적화 training codebase (기여 3)**\n  - 목적/task: 대용량 데이터에서 효율적으로 학습/scaling 평가를 가능케 하는 엔지니어링 인프라.\n  - 입력→출력: 입력: 대규모 학습 데이터 + 8-GPU 클러스터 → 출력: 261 samples/sec throughput (학습주기·비용 절감)\n  - 내부: 커뮤니티에 부족했던 highly optimized codebase를 직접 개발. throughput 261 samples/s @ 8-GPU로 계산 overhead·비용 절감. 코드/base model/benchmark data 공개.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nIntroduction이 제시하는 논리 구조 (본문 S1.p1~p4 문장 근거, 추측 없음):\n\n[Gap]                              [핵심 질문]\nreal-robot scaling 실증 부족   ─┐\n효율적 대규모 training codebase 부재 ─┴──▶ \"How do VLA models truly\n                                          scale with massive\n                                          real-world robot data?\"\n                                                  │\n                                                  ▼\n                                    ┌─────────────────────────────┐\n                                    │  3개 기여로 답한다 (LingBot-VLA) │\n                                    └─────────────────────────────┘\n   ┌──────────────────────┬──────────────────────┬──────────────────────┐\n   ▼                      ▼                      ▼\n(1) Scaling 실증        (2) 대규모 실측 평가     (3) 효율적 codebase\n 3,000h ─▶ 20,000h        GM-100 [29]            8-GPU cluster\n success rate ↑↑          100 tasks              261 samples/sec\n 20,000h에도 포화 없음    × 3 platforms          → 학습주기·비용 ↓\n = real-world의           × 130 episodes\n   first empirical          /task/embodiment\n   evidence\n   │                       │                       │\n   └───────────┬───────────┴───────────┬───────────┘\n               ▼                        ▼\n   학습 데이터: ~20,000h real-world      공개: code + base model\n   manipulation, 9 robotic platforms    + benchmark data (open access)\n               │\n               ▼\n        SOTA 성능 + 뛰어난 일반화 (주장)\n```\n\n**학습/추론**: 학습(주장 수준): LingBot-VLA는 9개 robotic platform에서 수집한 약 20,000시간 real-world manipulation 데이터로 대규모 pre-training된다. Pre-training 데이터를 3,000h에서 20,000h까지 점증시키며 downstream success rate의 scaling 거동을 측정했고, 20,000h에서도 포화가 없었다. 학습 효율은 자체 개발한 최적화 codebase로 확보되며 8-GPU 클러스터에서 261 samples/sec throughput을 낸다. 사전학습 후에는 downstream task로 손쉽고 효율적으로 transfer(적응)된다고 기술된다(Figure 1). 추론/평가: GM-100 벤치마크의 100개 task를, 3개 robotic embodiment에 걸쳐 task·embodiment당 130 episode로 실측 평가한다. 주의: 이 모든 절차의 구체적 손실함수·objective·텐서 shape는 Introduction 본문에 명시되지 않으며(첫 수식은 Section 4 등장), 본 섹션은 동기·결과·기여의 상위 요약 수준이다.\n\n**핵심 숫자**\n\n- pre-training 데이터: 약 20,000 hours (real-world manipulation)\n- scaling 실험 범위: 3,000 hours → 20,000 hours\n- 로봇 플랫폼(학습 데이터 출처): 9 robotic platforms\n- 평가 task 수: 100 tasks (GM-100 [29])\n- 평가 embodiment/platform 수: 3 robotic platforms\n- 평가 episode 수: 130 episodes / task / embodiment\n- 학습 throughput: 261 samples per second\n- 학습 클러스터: 8-GPU cluster\n- 비포화 지점: 20,000-hour mark에서도 success rate saturation 징후 없음\n- 인용된 VLA foundation model 참고문헌: [6], [5], [27]\n\n## 2 Related Work (관련 연구)\n\n**핵심**\n\n- 섹션 2는 수식·도표가 전혀 없는 순수 서술형 선행연구 정리로, LingBot-VLA를 (1) VLA 모델, (2) 로봇 정책 평가, (3) 효율적 VLA 학습 세 축에서 위치시킨다.\n- 2.1 Vision-Language-Action Models: VLA foundation model은 보통 '강력한 사전학습 VLM(Qwen2.5-VL, PaliGemma)을 의미 backbone으로 쓰고 diffusion 기반 action head를 결합'하는 구조다. 최근 모델들(pi_0, pi_0.5, GR00T N1/N1.6, Gemini Robotics, GR-3 등)은 대규모·다양한 데이터 사전학습으로 멀티태스크 실행력과 멀티-embodiment 적응력을 끌어올렸다.\n- LingBot-VLA의 차별점: 약 20,000시간의 multi-embodiment 데이터로 사전학습 → 선행 VLA foundation model 대비 훨씬 큰 규모이며, 높은 행동 다양성(behavioral diversity)이 일반화를 크게 강화한다고 주장.\n- Spatial VLA: 전통적 VLA는 semantic 이해는 잘 하지만 정밀한 기하학적 추론(geometric reasoning)·깊이 인지(depth perception)에 약하다. 이를 보완하려 공간 표현을 VLA에 통합하는 연구들(SpatialVLA, Spatial Forcing, InternVLA-M1, OmniVLA, Magma, GeoVLA 등)이 등장. Spatial Forcing은 VLA의 visual embedding을 spatial representation과 정렬(align)시켜 공간 이해를 향상.\n- 2.2 Evaluation on Robot Policy: 평가는 simulation 기반(LIBERO, CALVIN, SimplerEnv, RoboCasa, RoboTwin2)과 real-world embodiment 기반(RoboChallenge, RoboArena)으로 이분된다. Sim은 빠르고 저비용·대규모 병렬 테스트가 가능하나 이상화된 물리모델이라 현실 복잡성을 다 반영 못함. Real-world는 하드웨어 병렬성 요구로 효율이 병목 → 기존 VLA 연구 대부분이 소수 방법·소수 task 비교에 그침.\n- LingBot-VLA의 평가 차별점: 3개의 서로 다른 로봇 플랫폼 각각에서 100개 task를 수행해 현실 성능을 더 포괄적으로 평가하고, 주류 VLA가 real-world 다양성에 어떻게 적응하는지 분석.\n- 2.3 Efficient VLA Training: 기존 오픈소스 코드베이스들 — OpenPI(JAX·PyTorch 둘 다 지원, pi 계열 학습), StarVLA(VLA·VLM co-training용 모듈형 코드베이스), Dexbotic(데이터 수집→배포까지 파이프라인 표준화) — 은 각기 다른 우선순위를 가진다. 하지만 멀티노드 클러스터 대규모 VLA 학습은 데이터 I/O 병목과 통신 overhead가 여전히 난제.\n- LingBot-VLA(저자들의 코드베이스)는 data loading, distributed training 전략, operator-level 가속에 걸친 systemic optimization으로 throughput과 확장성을 종합 개선한다고 주장(이 섹션에서는 정성적 서술; 구체 수치 261 samples/s, 1.5~2.8x speedup은 Abstract·Introduction에 등장하며 섹션 2 본문에는 없음).\n- 섹션 2 본문에 실제로 존재하는 숫자는 세 개뿐: 약 20,000시간 데이터, 로봇 플랫폼 3개, 플랫폼당 task 100개. 그 외 수치는 다른 섹션 소속이다.\n\n**왜 / 직관**\n\n비유하면, 이 섹션은 LingBot-VLA가 들어설 '동네 지도'를 세 갈래로 그린다. 첫째 갈래(VLA 모델)는 '요리사 양성소' 같다 — VLM이라는 똑똑한 두뇌(레시피 이해)에 diffusion action head라는 손(연속 동작 생성)을 붙이는데, LingBot-VLA는 남보다 압도적으로 많은 2만 시간짜리 식재료(데이터)로 훈련해 어떤 주방(embodiment)에서도 요리하게 한다는 주장. 또 기존 요리사가 '맛(semantic)'은 알아도 '거리·깊이 감각(spatial)'이 둔하다는 약점을 짚으며, 시야 표현을 공간 표현과 맞춰 보정하는 흐름(Spatial VLA)을 소개한다. 둘째 갈래(평가)는 '시험 방식'에 관한 것 — 시뮬레이터는 모의고사처럼 싸고 빠르지만 실제 시험장(현실 물리)과 다르고, 실제 로봇 시험은 장비가 모자라 소수 문제만 풀어본 게 한계였다. 그래서 저자들은 '플랫폼 3곳 × 100문제'라는 대규모 실전 시험을 친다. 셋째 갈래(효율 학습)는 '주방 설비' — 기존 코드베이스들은 각자 강점이 있지만 대형 클러스터에서 재료 나르기(I/O)와 주방 간 통신이 막혀 느렸고, 저자 코드베이스는 그 배관을 전반적으로 뚫었다는 이야기. 한마디로 섹션 2는 '데이터 규모 · 평가 엄밀성 · 학습 효율' 세 축에서 기존 연구의 빈틈을 지적하고 그 빈틈이 곧 본 논문의 기여라고 깔아두는 정지(整地) 작업이다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 섹션 2가 글로 주장하는 세 차별점(대규모 real-world 데이터 사전학습 · 다운스트림 전이 · 3개 embodiment 평가)을 한 장에 시각화한 유일한 그림이라, 관련연구에서 깔아둔 '빈틈 vs 본 논문' 위치를 한눈에 대응시켜 줌. (섹션 2 본문에는 명시적 figure 참조가 없으므로 high-level overview로 보조 인용)\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 2 taxonomy (본문 서술 기반, 추측 없음 — 인용 그룹 그대로):\n\nLingBot-VLA Related Work\n|\n+-- 2.1 Vision-Language-Action Models\n|     |\n|     +-- Foundation VLA\n|     |     structure: pre-trained VLM backbone  ---->  diffusion action head\n|     |       (VLM: Qwen2.5-VL, PaliGemma)            (continuous action)\n|     |     refs: pi_0, pi_0.5, GR00T N1/N1.6, Gemini Robotics,\n|     |           walloss, GalaxeaG0, Magma, GR-3\n|     |     >> ours: ~20,000 h multi-embodiment data (larger scale)\n|     |\n|     +-- Spatial VLA  (fix: weak geometric reasoning / depth)\n|           refs: SpatialVLA, Spatial Forcing, InternVLA-M1,\n|                 OmniVLA, Magma, Gemini-Robotics-1.5, GeoVLA\n|           Spatial Forcing: align VLA visual embedding <-> spatial repr.\n|\n+-- 2.2 Evaluation on Robot Policy\n|     |\n|     +-- Simulation-based  : LIBERO, CALVIN, SimplerEnv, RoboCasa, RoboTwin2\n|     |     (+) fast, cheap, large-scale parallel\n|     |     (-) idealized physics =/= real-world complexity\n|     |\n|     +-- Real-world embodiment-based : RoboChallenge, RoboArena\n|           (-) bottleneck: hardware parallelism -> few methods / few tasks\n|     >> ours: 3 platforms x 100 tasks each (comprehensive real-world)\n|\n+-- 2.3 Efficient VLA Training\n      existing codebases:\n        OpenPI   -> JAX + PyTorch, train pi-series\n        StarVLA  -> modular, VLA<->VLM co-training\n        Dexbotic -> unified pipeline (ingestion -> deployment)\n      challenge: multi-node -> data I/O bottleneck + comm. overhead\n      >> ours (LingBot-VLA codebase): systemic opt. =\n           data loading + distributed training + operator-level accel.\n```\n\n**학습/추론**: 섹션 2(Related Work)는 학습/추론 알고리즘을 직접 기술하지 않는다. 다만 선행 연구를 통해 본 논문이 따르는 패러다임을 정성적으로 명시한다: (1) 학습 구조 — VLA는 사전학습 VLM(backbone) + diffusion 기반 action head 결합이 표준이며, 본 모델은 약 20,000시간 multi-embodiment 데이터로 대규모 사전학습 후 다운스트림으로 전이(2.1). (2) 추론/평가 — sim이 아닌 real-world 3 플랫폼 × 각 100 task 실전 실행으로 정책을 평가하고 주류 VLA의 현실 다양성 적응을 분석(2.2). (3) 학습 인프라 — multi-node 클러스터에서의 data I/O 병목·통신 overhead를 data loading·distributed training·operator-level 가속의 systemic optimization으로 완화(2.3). 구체적 손실함수·flow-matching 수식·throughput 수치(261 samples/s, 1.5~2.8x)는 이 섹션이 아니라 Abstract/Introduction 및 Method/Experiments 섹션에 위치한다.\n\n**핵심 숫자**\n\n- ~20,000 hours: 본 모델 사전학습용 multi-embodiment 데이터 양 (섹션 2.1 본문에 명시)\n- 3 platforms: 평가에 사용한 서로 다른 로봇 플랫폼 수 (섹션 2.2)\n- 100 tasks per platform: 각 플랫폼에서 수행한 task 수 (섹션 2.2)\n- (참고, 섹션 2 본문에는 없음 — Abstract/Intro 소속) 261 samples/sec @ 8-GPU, 1.5~2.8x speedup: 코드베이스 throughput·가속 수치\n\n## 2.1 Vision-Language-Action Models (Related Work)\n\n**핵심**\n\n- 섹션 2.1은 본 논문의 Related Work(섹션 2) 첫 하위 섹션으로, LingBot-VLA의 위치를 선행 연구 대비 자리매김한다. 두 문단으로 구성: (1) Foundation VLA, (2) Spatial VLA. 이 섹션에는 수식이 없고, 직접 참조하는 그림도 없다 (순수 서술형 문헌 정리).\n- Foundation VLA 정의: VLA foundation 모델은 보통 강력한 사전학습 VLM(vision-language model)을 의미 백본(semantic backbone)으로 채택하고, 거기에 diffusion 기반 action head를 결합한다. (본문 인용 백본 예: Qwen2.5-VL, PaliGemma)\n- 최근 VLA foundation 모델들(pi_0, pi_0.5, GR00T-N1, Gemini Robotics, GR-3 등 다수 인용)은 더 크고 다양한 데이터로 사전학습되면서 multi-task 실행 능력과 multi-embodiment 적응력이 향상되었다고 정리한다.\n- 본 논문의 차별점(핵심 주장): 선행 VLA foundation 모델이 쓴 데이터셋과 구별되게, LingBot-VLA는 약 20,000시간(approximate 20,000 hours)의 multi-embodiment 데이터 코퍼스로 사전학습된다. 이 대규모·고행동다양성 데이터가 다양한 로봇 조작 task에 대한 일반화 능력을 크게 끌어올린다고 주장.\n- Spatial VLA 정의/문제의식: 전통적 VLA는 의미 이해(semantic understanding)에는 강하지만, 복잡한 공간 조작에 필요한 정밀한 기하 추론(geometric reasoning)과 깊이 인지(depth perception)에는 약하다.\n- Spatial VLA 해결 방향 두 갈래: (a) embodied 시나리오에서 VLM의 공간 인지력을 강화해 다운스트림 spatial manipulation을 개선(Magma, InternVLA-M1, Gemini Robotics 인용), (b) VLA 학습 단계에서 깊이 정보를 명시적/암시적으로 통합. 대표 예로 Spatial Forcing은 정렬(alignment) 전략으로 VLA의 visual embedding을 spatial representation과 강제로 통합시켜 공간 이해를 크게 향상.\n- 이 섹션은 LingBot-VLA 자체가 Foundation VLA 계열(VLM 백본 + diffusion/flow action head, 대규모 multi-embodiment 사전학습)에 속함을 암시하지만, 모델의 구체 아키텍처/수식은 섹션 3(Method)으로 미룬다. 2.1에는 학습/추론 디테일이 서술되지 않음.\n\n**왜 / 직관**\n\n비유로 보면, Foundation VLA는 \"이미 세상을 글과 그림으로 잘 아는 가정교사(사전학습 VLM)에게, 손동작을 그려내는 화가의 붓(diffusion action head)을 쥐여준\" 구조다. 가정교사는 '컵을 집어라'는 말과 장면을 이해하고, 붓은 그 의미를 부드러운 연속 동작(action chunk)으로 그려낸다. 본 논문이 강조하는 것은 이 가정교사를 '얼마나 많은 현장 경험으로 훈련시켰는가'인데, 약 20,000시간이라는 대규모·다양한 양팔 로봇 데이터가 핵심 차별점이다 — 즉 모델 구조 혁신보다 데이터 스케일/다양성에 베팅한다. Spatial VLA는 이 가정교사의 약점을 짚는다: 말귀는 밝지만 \"이 물체가 정확히 얼마나 멀리, 어느 깊이에 있는가\" 같은 3D 공간 감각이 떨어진다. 그래서 깊이/공간 표현을 학습에 끼워 넣어(Spatial Forcing처럼 시각 임베딩을 공간 표현에 '강제 정렬') 손-눈 협응의 정밀도를 보강하려는 흐름으로 정리된다. 요약하면 2.1은 \"의미는 VLM이, 동작은 diffusion이, 정밀 공간감은 spatial 표현이 책임진다\"는 VLA 분야의 3축 지형도를 그려 놓고, 본 논문을 데이터-스케일 축의 Foundation VLA로 위치시킨다.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Foundation VLA (선행연구 계열, 본 논문이 속한 범주)**\n  - 목적/task: 사전학습 VLM의 의미 이해 능력 위에 동작 생성을 얹어 multi-task / multi-embodiment 로봇 조작을 수행하는 VLA foundation 모델 계열을 정의.\n  - 입력→출력: 입력: 시각 관측 + 언어 지시 (vision-language) -> 출력: 연속 로봇 동작(diffusion action head가 생성하는 action chunk). 주: 섹션 2.1은 서술형이라 구체적 텐서 shape는 본문에 명시되지 않음(섹션 3 Method 영역).\n  - 내부: 구조: 강력한 사전학습 VLM(인용 백본: Qwen2.5-VL, PaliGemma)을 semantic backbone으로 채택하고 diffusion 기반 action head를 결합. 인용된 최근 모델들(pi_0, pi_0.5, GR00T-N1/N1.6, Gemini Robotics, WALL-OSS, Galaxea-G0, Magma, GR-3)은 더 크고 다양한 데이터로 사전학습되며 multi-task 실행력과 multi-embodiment 적응력을 향상. 본 논문은 약 20,000시간의 multi-embodiment 데이터로 사전학습한다는 점을 차별점으로 강조(데이터 규모·행동 다양성 -> 일반화 향상). 이 섹션에 수식은 없음. (소스에 주석 처리된 문장은 'flow-matching으로 단일 step discrete token 대신 연속 action chunk를 생성한다'는 취지였으나 최종본에서는 빠짐 -> 본문 내용으로 취급하지 않음.)\n\n- **Spatial VLA (선행연구 계열, 본 논문이 대비하는 범주)**\n  - 목적/task: 전통적 VLA가 약한 정밀 기하 추론·깊이 인지를 보강하기 위해 공간 표현(spatial representation)을 VLA에 통합하는 연구 흐름을 정의.\n  - 입력→출력: 입력: 시각 관측 + 언어 지시 (+ 깊이/공간 정보를 명시적 또는 암시적으로 활용) -> 출력: 공간 인지가 강화된 동작/표현. (섹션 2.1 서술 수준, 구체 shape 미명시.)\n  - 내부: 문제의식: 전통 VLA는 semantic understanding엔 강하나 복잡한 spatial manipulation에 필요한 geometric reasoning과 depth perception에 약함. 두 접근으로 정리: (1) embodied 시나리오에서 VLM의 spatial awareness를 강화(Magma, InternVLA-M1, Gemini Robotics), (2) VLA 학습 단계에서 depth 정보를 명시/암시적으로 통합. 대표 사례 Spatial Forcing: 간소화된 alignment 전략으로 VLA의 visual embedding을 spatial representation과 강제로 통합시켜 spatial comprehension을 크게 향상. 이 섹션에 수식은 없음.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 2.1 taxonomy (본문 서술 근거, 추측 없음)\n\nRelated Work / 2.1 Vision-Language-Action Models\n|\n+-- (A) Foundation VLA  [cite: Qwen2.5-VL, PaliGemma backbones; pi_0, pi_0.5,\n|        |               GR00T-N1, GR00T-N1.6, Gemini Robotics, WALL-OSS,\n|        |               Galaxea-G0, Magma, GR-3]\n|        |\n|        |   typical architecture (본문: \"adopt a pre-trained VLM as\n|        |   semantic backbone, coupled with diffusion-based action head\")\n|        |\n|        |     [ pre-trained VLM ]  --(semantic backbone)-->  [ diffusion action head ]\n|        |       (vision+language)                              (continuous actions)\n|        |\n|        +-- 본 논문(LingBot-VLA)의 차별점:\n|              pre-training corpus ~= 20,000 hours, multi-embodiment,\n|              high behavioral diversity  ==> better generalization\n|\n+-- (B) Spatial VLA  [cite: SpatialVLA, Spatial Forcing, InternVLA-M1,\n         |            OmniVLA, Magma, Gemini Robotics 1.5, GeoVLA]\n         |\n         | 문제: semantic 이해는 강하나 geometric reasoning / depth perception 약함\n         |\n         +-- 경로1: VLM의 spatial awareness 강화 (embodied)  [Magma, InternVLA-M1, Gemini Robotics]\n         +-- 경로2: 학습 중 depth 정보 명시/암시 통합\n                +-- 예: Spatial Forcing\n                      VLA visual embedding  --(forced alignment)-->  spatial representation\n                      ==> improved spatial comprehension\n```\n\n**학습/추론**: 섹션 2.1 자체에는 LingBot-VLA의 학습/추론 절차(목적함수, optimizer, sampling step 등)가 서술되지 않는다 — 순수 Related Work 문헌 정리이며 구체 방법은 섹션 3(Method)로 미뤄진다. 2.1에서 추출 가능한 학습 관련 정보는 다음 두 가지뿐: (1) 사전학습 데이터 규모 — 본 모델은 약 20,000시간(approximate 20,000 hours)의 multi-embodiment 데이터로 사전학습되며, 이 대규모·고행동다양성 코퍼스가 일반화 능력을 끌어올린다고 명시. (2) 일반적 VLA foundation 학습 패러다임의 요약 — 사전학습 VLM을 의미 백본으로 두고 diffusion 기반 action head로 연속 동작을 생성하며, 더 크고 다양한 데이터로 사전학습할수록 multi-task / multi-embodiment 능력이 향상된다는 관찰. 추론(inference) 절차에 대한 명시적 기술은 이 섹션에 없음(diffusion action head로 동작을 생성한다는 구조적 언급 수준).\n\n**핵심 숫자**\n\n- 사전학습 코퍼스 규모: approximate 20,000 hours (약 2만 시간) of multi-embodiment data — 본 논문의 핵심 차별 숫자\n- 데이터 유형: multi-embodiment, high behavioral diversity (정성 표현; 본 섹션 내 추가 수치 없음)\n- 참고: 섹션 2.1에는 위 시간 수치 외의 다른 정량 숫자(파라미터 수, step 수 등)는 등장하지 않음\n\n## 2.2 Evaluation on Robot Policy (로봇 정책 평가)\n\n**핵심**\n\n- 이 섹션은 Related Work(2장)의 한 소절로, LingBot-VLA 자체의 방법이 아니라 '기존 로봇 정책 평가 방법론'을 정리하고 본 논문의 평가 기여를 위치시키는 배경 설명이다. 수식·그림·모듈은 없다.\n- 기존 로봇 정책 평가는 크게 두 갈래로 나뉜다: (1) 시뮬레이션 기반(simulation-based) [libero, calvin, simplerenv, robocasa, robotwin2], (2) 실제 로봇 임베디먼트 기반(real-world embodiment-based) [robochallenge, roboarena].\n- 시뮬레이션 기반의 장점: 빠르고 편리하며, 매우 낮은 비용으로 방대하고 다양한 상호작용 시나리오에 대해 대규모 병렬 테스트가 가능하다.\n- 시뮬레이션 기반의 한계: 보통 이상화된 물리 모델(idealized physical models)을 쓰기 때문에 결과가 실제 물리 세계의 복잡성을 온전히 대표하지 못한다.\n- 실제 로봇 기반 평가의 한계: 효율이 '광범위한 하드웨어 병렬성(extensive hardware parallelism) 요구'에 의해 병목된다 — 즉 실제 로봇을 여러 대 동시에 돌려야 해서 비싸고 느리다.\n- 그 결과(Consequently), 대다수 선행 VLA 연구는 소수의 방법(a limited number of methods)을 소수의 task(a few tasks)에서만 비교하는 데 그쳤다 — 평가 범위가 좁았다는 문제 제기.\n- 본 논문의 평가 기여: 보다 포괄적으로 실제 성능을 측정하기 위해 3개의 서로 다른 로봇 플랫폼(three distinct robotic platforms)에 걸쳐, 플랫폼마다 100개 task(100 tasks per platform)를 실행하는 평가를 수행한다.\n- 추가로, 주류 VLA 모델들이 실제 시나리오에서 마주치는 다양성(diversity)에 어떻게 적응하는지에 대한 철저한 분석(thorough analysis)을 제공한다.\n- 주의: HTML 본문에는 이 소절 안에 SR(Success Rate)·PR/PS(Progress Rate) 같은 지표 수식이 정의되어 있지 않다. 그 지표 정의/수식은 본 소절이 아니라 4장(Experiments)에 등장하며, 본 소절 범위 밖이라 본 추출에서는 다루지 않는다(추측 금지).\n\n**왜 / 직관**\n\n왜 이 소절이 존재하는가에 대한 직관: 새 모델을 평가할 무대를 고르는 일은 '시험장 선택' 문제다. 시뮬레이션 시험장은 컴퓨터 안의 가상 시험장이라 시험지를 무한정 복사해 수천 명을 동시에 싸게 시험 볼 수 있지만(대규모 병렬·저비용), 출제 환경이 이상화돼 있어 '실전 난이도'를 반영 못 한다(비유: 무중력 가정으로 푼 물리 문제는 실제 운동장에서 틀린다). 반대로 실제 로봇 시험장은 진짜 실전이지만, 응시생 한 명당 진짜 로봇 한 대가 필요해 시험장을 늘리려면 하드웨어를 그만큼 사야 한다(하드웨어 병렬성 병목). 그래서 지금까지 연구들은 '소수 응시생을 소수 문제로만' 시험 본 셈이라 일반화 결론을 내리기 어려웠다. 본 논문은 이 딜레마를 '실제 시험장을 세 종류(3 플랫폼) 마련하고 각 시험장마다 문제를 100개씩' 내는 식으로 정면 돌파한다 — 즉, 시뮬레이션의 편의 대신 실전성을 택하되, 규모(3×100=300 task)를 키워 기존 실제 평가의 '범위가 좁다'는 약점을 메운다.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 2.2 \"Evaluation on Robot Policy\" — 평가 패러다임 분류 (본문 근거 기반)\n\n  로봇 정책 평가 방법론 (Robot Policy Evaluation)\n  =============================================\n            |\n   ┌─────────┴──────────────────────────────────┐\n   │                                             │\n (1) Simulation-based                    (2) Real-world embodiment-based\n [libero, calvin, simplerenv,            [robochallenge, roboarena]\n  robocasa, robotwin2]                          │\n   │                                             │\n 장점:                                       한계:\n  - 빠르고 편리(rapid & convenient)          - 효율이 \"광범위한 하드웨어\n  - 대규모 병렬 테스트(large-scale parallel)    병렬성 요구\"에 병목\n  - 매우 낮은 비용(very low cost)              (extensive hardware parallelism)\n  - 방대/다양한 시나리오 커버\n 한계:\n  - 이상화된 물리 모델(idealized physical)\n  - 실제 물리 세계 복잡성 미반영\n            │                                    │\n            └──────────────┬─────────────────────┘\n                           ▼\n        선행 VLA 연구 공통 문제(Consequently):\n          소수 method × 소수 task 비교에 국한\n          (limited methods, only a few tasks)\n                           │\n                           ▼\n        ┌──────────────────────────────────────┐\n        │  본 논문(this work)의 평가 기여        │\n        │  - 3개 distinct robotic platforms      │\n        │  - 각 platform당 100 tasks 실행        │\n        │    (총 3 × 100 = 300 task-실행)        │\n        │  - 주류 VLA의 real-world diversity      │\n        │    적응력에 대한 thorough analysis     │\n        └──────────────────────────────────────┘\n\n  주: 본 소절 자체에는 수식·그림·표가 없음.\n      SR/PR 등 지표 정의는 4장(Experiments) 소관(본 추출 범위 밖).\n```\n\n**학습/추론**: 해당 없음 — 본 소절(2.2 Evaluation on Robot Policy)은 Related Work 배경 설명으로, 모델 학습(training)이나 추론(inference) 방법을 기술하지 않는다. 본 소절이 다루는 것은 '평가(evaluation) 방법론'의 분류뿐이다. 본 소절에 기술된 평가 프로토콜(evaluation protocol) 측면만 정리하면: (a) 평가 형태는 simulation-based가 아닌 real-world embodiment-based를 채택, (b) 평가 규모는 서로 다른 3개 로봇 플랫폼 × 각 100 task = 총 300 task 실행, (c) 평가 분석 관점은 주류 VLA 모델들이 실제 시나리오의 diversity에 적응하는 정도에 대한 분석. 구체적 성공률 지표 정의·수치·학습 레시피는 본 소절 밖(4장 Experiments)에 있으므로 여기서는 추측하지 않는다.\n\n**핵심 숫자**\n\n- 3 (distinct robotic platforms / 서로 다른 로봇 플랫폼 수)\n- 100 (tasks per platform / 플랫폼당 task 수)\n- 300 (파생값: 3 platforms × 100 tasks — 본문에 명시된 두 숫자의 곱, 직접 언급된 합산값은 아님)\n- 2 (평가 방법론 대분류 수: simulation-based / real-world embodiment-based)\n\n## 2.3 Efficient VLA Training (효율적 VLA 학습)\n\n**핵심**\n\n- [중요 - 섹션 정체성] arXiv v2 기준 \"2.3 Efficient VLA Training\"은 Method가 아니라 Related Work(2장)의 한 소절이다. 본문은 학습 인프라/코드베이스에 대한 문헌 정리 + 자기 포지셔닝 문단 하나뿐이며, 수식/모듈/그림 참조가 전혀 없다. (출처: HTML 렌더링 '2.3 Efficient VLA Training' 소절)\n- 이 소절의 메시지: VLA 모델이 빠르게 발전하면서 전용 학습 인프라 개발이 촉발되었고, 커뮤니티에 잘 설계된 오픈소스 코드베이스들이 등장했다. 각각 다른 연구 우선순위를 가진다.\n- 선행 코드베이스 3종 정리: (1) OpenPI[6] - JAX와 PyTorch를 모두 지원하며 π 시리즈 모델 학습용 범용 프레임워크. (2) StarVLA[22] - VLA와 VLM의 co-training에 특화된 모듈식·사용자 친화적 코드베이스로, 의미적 지식을 로봇 제어로 전이시키는 것을 돕는다. (3) Dexbotic[30] - 데이터 수집부터 모델 배포까지 파이프라인을 표준화하는 데 초점을 둔 통합·효율 솔루션.\n- 한계 지적(이 섹션의 핵심 동기): 이러한 발전에도 불구하고, 멀티노드 클러스터에서 대규모 VLA 모델을 학습하는 것은 데이터 I/O 병목과 통신 오버헤드 때문에 여전히 큰 도전 과제로 남아 있다.\n- 제안: 이 간극을 메우기 위해 대규모 VLA 학습용 고성능 오픈소스 코드베이스인 LingBot-VLA를 제시한다. 기존 프레임워크와 달리, (1) 데이터 로딩, (2) 분산 학습 전략, (3) 연산자(operator) 수준 가속이라는 시스템적 최적화를 구현한다. 이로써 학습 throughput과 확장성이 종합적으로 개선되어, 로봇 파운데이션 모델의 스케일링 한계를 탐구할 더 효율적 기반을 제공한다.\n- [프롬프트 의도 보정] 프롬프트가 요청한 '모듈/수식/Figure 4 throughput' 같은 기술적 내용은 2.3에는 없고, 실제로는 본문의 Section 4.2 'Training Efficiency Optimization'(분산 전략 + 연산자 최적화)과 실험부의 'Training Throughput Analysis'(Figure 4)에 존재한다. 아래 modules/figures/numbers는 이 4.2 및 처리량 분석에서 가져온 것으로, 출처를 명확히 구분해 함께 제공한다.\n- 4.2의 분산 전략(Distributed Strategy): FSDP(ZeRO의 PyTorch 구현)로 optimizer state·파라미터·gradient를 sharding해 메모리 footprint를 최소화. VeOmni[18]의 HSDP에서 영감을 받아 action expert 모듈 전용 'shard group'을 구성해 과도한 파라미터 sharding으로 인한 통신 오버헤드를 완화. 혼합정밀도: reduction은 torch.float32(수치 안정성), 저장·통신은 torch.bfloat16.\n- 4.2의 연산자 수준 최적화(Operator-Level Optimization): 비전·언어·행동의 멀티모달 융합이 본질적으로 sparse attention이라는 점에 착안해 FlexAttention으로 계산을 최적화. 추가로 torch.compile을 통한 operator fusion으로 커널 launch 오버헤드를 줄이고 메모리 대역폭 활용을 극대화.\n- 처리량 실험(Figure 4): Libero 데이터셋, 표준화된 π-like 아키텍처, local batch size 32로 StarVLA·Dexbotic·OpenPI 세 베이스라인과 비교. Qwen2.5-VL-3B-π와 PaliGemma-3B-pt-224-π 두 모델을 자체 코드베이스에 재현. 평가지표는 samples/s. 8/16/32/128/256 GPU 구성에서 모두 가장 빠른 학습 속도를 달성했고 이론적 선형 스케일링 한계에 근접하는 확장 효율을 보였다.\n\n**왜 / 직관**\n\n비유로 보면, 이 소절(2.3)은 본격적인 요리(모델 학습 방법)를 설명하기 전에 '주방 설비 시장'을 정리하는 부분이다. 이미 OpenPI(다용도 멀티버너), StarVLA(VLM-VLA 합동 조리 특화), Dexbotic(재료 입고부터 배식까지 표준화한 시스템) 같은 좋은 주방들이 있지만, 대규모 식당(멀티노드 클러스터)으로 가면 재료를 나르는 통로가 막히고(데이터 I/O 병목) 주방 직원들끼리 소통하느라 시간을 낭비한다(통신 오버헤드). 그래서 저자들은 통로(데이터 로딩)·인력 배치(분산 전략)·조리 도구(연산자 가속)를 통째로 손본 새 주방 LingBot-VLA를 내놓는다. 즉 '무엇을 요리할까'가 아니라 '어떻게 하면 같은 요리를 훨씬 빠르고 크게 만들 수 있나'에 대한 답이다. 실제 그 손질의 디테일(FSDP로 짐을 GPU들에 잘게 나눠 들기, action expert만 따로 묶어 불필요한 소통 줄이기, sparse한 주의집중을 FlexAttention으로 빠르게, torch.compile로 도구들을 하나로 융합)은 4.2에서, 그 효과(GPU를 늘려도 속도가 이론치만큼 따라붙음)는 Figure 4 처리량 그래프에서 확인된다.\n\n**그림**\n\n원본 그림 4a: [arXiv Figure 4a](https://arxiv.org/html/2601.18692v2/x5.png)\n![](https://arxiv.org/html/2601.18692v2/x5.png)\n→ 2.3가 약속한 'throughput·확장성 개선'을 정량 검증하는 그림. Qwen2.5-VL-3B-π에서 8~256 GPU에 걸친 samples/s를 베이스라인(StarVLA/Dexbotic/OpenPI) 및 이론적 선형 스케일링 한계와 비교. (실제 참조 위치는 4.2/Training Throughput Analysis; 2.3 본문은 그림을 참조하지 않음)\n\n원본 그림 4b: [arXiv Figure 4b](https://arxiv.org/html/2601.18692v2/x6.png)\n![](https://arxiv.org/html/2601.18692v2/x6.png)\n→ PaliGemma-3B-pt-224-π에 대한 동일한 throughput·스케일링 비교로, 코드베이스 효율 주장이 특정 VLM에 국한되지 않음을 보임. (4.2/Training Throughput Analysis 참조)\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **LingBot-VLA codebase (Section 2.3에서 선언, 4.2에서 구현)**\n  - 목적/task: 멀티노드 클러스터에서 대규모 VLA를 효율적으로 학습하기 위한 고성능 오픈소스 학습 코드베이스. 데이터 I/O 병목과 통신 오버헤드를 해소하는 것이 목적.\n  - 입력→출력: 입력: 대규모 텔레오퍼레이션 행동 데이터(고주파) + π-like VLA 모델 -> 출력: 높은 training throughput(samples/s)과 GPU 수에 따른 선형에 가까운 스케일링.\n  - 내부: 세 축의 시스템적 최적화로 구성(2.3 명시): data loading, distributed training strategies, operator-level acceleration. 구체 구현은 아래 하위 모듈(분산 전략, 연산자 최적화)에서 4.2에 기술됨. 2.3 본문 자체는 이 코드베이스의 '선언'까지만 다루고 내부 수식/모듈 세부는 없음.\n\n- **Distributed Strategy (분산 전략, 4.2)**\n  - 목적/task: GPU 메모리 점유와 학습 throughput 사이의 최적 trade-off 달성. VLA는 파라미터 수가 중간 규모이지만 이 균형이 여전히 핵심.\n  - 입력→출력: 입력: 모델 파라미터 + optimizer states + gradients(여러 GPU/노드에 분산) -> 출력: 메모리 footprint가 최소화되고 통신 오버헤드가 완화된 분산 학습 상태.\n  - 내부: FSDP(ZeRO의 효율적 PyTorch 구현)로 optimizer states·model params·gradients를 sharding. VeOmni[18]의 HSDP에서 영감을 받아 action expert 모듈에 한정한 전용 'shard group'을 구성하여 과도한 파라미터 sharding이 유발하는 통신 오버헤드를 완화. 혼합정밀도 정책: reduction은 torch.float32(수치 안정성), 저장·통신은 torch.bfloat16. (실험부에서는 ours가 FSDP2 전략 사용으로 명시; 베이스라인 StarVLA/Dexbotic은 ZeRO, OpenPI는 DDP.)\n\n- **Operator-Level Optimization (연산자 수준 최적화, 4.2)**\n  - 목적/task: 멀티모달 융합 계산을 가속해 커널 오버헤드를 줄이고 메모리 대역폭 활용을 극대화.\n  - 입력→출력: 입력: vision·language·action 토큰 시퀀스에 대한 attention/연산 그래프 -> 출력: 가속된(fused) 연산 실행과 더 높은 처리량.\n  - 내부: 비전·언어·행동의 멀티모달 융합이 본질적으로 sparse attention 과정이라는 관찰에 기반해 FlexAttention으로 attention 계산을 최적화. 추가로 torch.compile을 통한 operator fusion으로 kernel launch 오버헤드를 줄이고 memory bandwidth utilization을 극대화.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n[Section 2.3 자체의 데이터흐름은 없음 — 순수 서술 문단이므로, 프롬프트가 의도한 '효율적 학습'의 세부 모듈/데이터흐름을 본문 근거(2.3 + 4.2 + Throughput Analysis)만으로 ASCII화]\n\n  LingBot-VLA codebase: 3대 시스템 최적화 (근거: 2.3 \"data loading, distributed training strategies, operator-level acceleration\")\n  ====================================================================================================\n\n  (1) DATA LOADING                (2) DISTRIBUTED STRATEGY (4.2)          (3) OPERATOR-LEVEL ACCEL (4.2)\n  -----------------               ----------------------------           -----------------------------\n  high-frequency action data      FSDP (= PyTorch ZeRO 구현)              multimodal fusion = sparse attn\n  -> I/O 병목 해소 목적            shard: optimizer states                 -> FlexAttention 으로 최적화\n  (2.3: \"data I/O bottlenecks\")          + model params                          |\n                                          + gradients                    operator fusion (torch.compile)\n                                   ------------------------------         -> kernel launch 오버헤드 감소\n                                   HSDP 영감 (VeOmni[18]):                 -> memory bandwidth 활용 극대화\n                                     action expert 전용\n                                     \"shard group\" 구성\n                                     -> 과도 sharding 통신 완화\n                                   ------------------------------\n                                   mixed precision:\n                                     reduce  : torch.float32 (안정성)\n                                     store/comm: torch.bfloat16\n\n\n  학습 throughput 검증 흐름 (Figure 4 / Training Throughput Analysis)\n  ==================================================================\n      Libero dataset, 표준 π-like arch, local batch size = 32\n                         |\n        +----------------+----------------+\n        |                                 |\n   Qwen2.5-VL-3B-π                 PaliGemma-3B-pt-224-π     (자체 코드베이스에 재현)\n        |                                 |\n   GPU 구성: 8 -> 16 -> 32 -> 128 -> 256  (각 구성에서 samples/s 측정)\n        |\n   vs baselines: StarVLA(ZeRO), Dexbotic(ZeRO), OpenPI(DDP)   vs  이론적 선형 스케일링 한계\n        |\n   결과: 두 모델 모두 최고 학습속도 + 이론 한계에 근접한 스케일링 효율\n        (ours = FSDP2)\n```\n\n**학습/추론**: [학습(이 섹션 관점)] 2.3은 '어떻게 효율적으로 학습하는가'에 대한 인프라 선언으로, 세 축(데이터 로딩 / 분산 전략 / 연산자 가속)을 제시. 구체 학습 인프라(4.2): FSDP로 파라미터·옵티마이저·gradient를 sharding하고, action expert에 전용 shard group(HSDP 영감, VeOmni[18])을 둬 통신을 줄이며, reduction은 fp32 · 저장/통신은 bf16의 혼합정밀도 적용. 연산은 FlexAttention(sparse attention)과 torch.compile operator fusion으로 가속. [학습 목표(4.1, 참고)] action chunk(길이 T=50)를 conditional flow matching으로 예측하도록 L_FM을 최소화하며, blockwise causal attention과 LingBot-Depth로의 vision distillation(L_distill)을 함께 사용. [추론] 2.3 소절에는 추론 절차에 대한 별도 서술이 없음(추측 금지). throughput 평가는 samples/s를 지표로 8~256 GPU 구성에서 측정.\n\n**핵심 숫자**\n\n- 선행 코드베이스 3종 참조: OpenPI[6], StarVLA[22], Dexbotic[30] (2.3)\n- 시스템 최적화 축 = 3개: data loading, distributed training strategies, operator-level acceleration (2.3)\n- 혼합정밀도: reduction = torch.float32, 저장/통신 = torch.bfloat16 (4.2)\n- VeOmni 참조 = [18]; action expert 전용 'shard group' (4.2)\n- [처리량 실험] 비교 베이스라인 3종: StarVLA(ZeRO), Dexbotic(ZeRO), OpenPI(DDP); ours = FSDP2\n- [처리량 실험] local batch size = 32, 데이터셋 = Libero, 지표 = samples/s\n- [처리량 실험] GPU 구성 = 8 / 16 / 32 / 128 / 256 + 이론적 선형 스케일링 한계\n- [처리량 실험] 재현 모델 = Qwen2.5-VL-3B-π, PaliGemma-3B-pt-224-π (Figure 4 a/b)\n\n## 3 Pre-training Dataset (사전학습 데이터셋)\n\n**핵심**\n\n- 사전학습 데이터셋은 9종의 대표적인 dual-arm(양팔) 로봇 embodiment에서 수집한 대규모 teleoperation(원격조작) 데이터로 구성된다 (소스: '9 popular dual-arm robot embodiments'). 즉 단일 로봇이 아니라 cross-embodiment(이기종 로봇 혼합) 데이터다.\n- 9종 embodiment: AgiBot G1, AgileX, Galaxea R1Lite, Galaxea R1Pro, Realman Rs-02, Leju KUAVO 4 Pro, Qinglong, ARX Lift2, Bimanual Franka. 각 로봇은 팔의 DoF(자유도), 카메라 구성, gripper 유무가 서로 다르다.\n- 로봇별 핵심 사양 차이: 팔 DoF는 6-DoF 또는 7-DoF, 카메라 수는 2~3대(head/wrist/stereo/RGB-D 조합), 일부 로봇은 16차원 configuration/action space를 가진다(Realman Rs-02, Bimanual Franka).\n- 데이터 수집 방식도 embodiment마다 다르다: AgiBot G1은 VR 기반 teleoperation, AgileX는 isomorphic arm(동형 팔, 마스터-슬레이브식 모방 조작)으로 수집.\n- Data Labeling(데이터 라벨링)은 2단계로 이뤄진다: (1) Video Segment(영상 분할) — 여러 시점 영상을 atomic action(원자적 동작) 단위 clip으로 사람이 분해하고 영상 앞뒤 정지 프레임 제거, (2) Instruction Annotation(지시문 주석) — Qwen3-VL-235B-A22B로 task/sub-task 지시문을 정밀 생성.\n- 라벨링의 목적은 '정밀한 language instruction(언어 지시문)' 확보다. VLA 모델이 자연어 지시→동작을 학습하려면 각 동작 clip에 정확한 텍스트가 붙어야 하므로, 분할→대형 VLM 주석의 파이프라인을 쓴다.\n- 이 섹션에는 수식이 없다(검증: \\begin{equation}/\\begin{align}은 모두 Section 4 Model Training에서 시작). 또한 데이터 규모(시간/episode 수)를 정리한 표나 본문 수치도 게재본에는 없다(20,000시간 등은 LaTeX 소스에서 주석 처리되어 출판 텍스트에 미포함).\n- redundant frame(중복 프레임) 제거 — 영상 시작/끝의 static frame(정지 프레임)을 라벨링 단계에서 제거해 데이터 효율과 학습 신호 품질을 높인다.\n\n**왜 / 직관**\n\n직관: 사람 로봇 기능공 한 명만 보고 배우는 대신, 손가락 개수도 팔 길이도 카메라 위치도 다른 9개 작업장에서 일하는 수많은 작업자의 시연을 모아 '범용 일꾼'을 키우는 것에 비유할 수 있다. 로봇이 서로 다르기 때문에(6-DoF vs 7-DoF, 카메라 수 차이) 모델은 특정 하드웨어에 과적합되지 않고 '물건을 집어 옮긴다' 같은 본질적 조작 능력을 배운다. 라벨링은 마치 요리 영상을 잘게 잘라 '계란을 깬다', '저어준다'처럼 동작마다 자막을 다는 작업인데, 이걸 사람(영상 자르기)과 대형 VLM(자막 생성)이 분업한다. 정지 화면(아무 일도 안 일어나는 구간)을 잘라내는 것은, 학습 데이터에서 '가만히 있기'를 과하게 배우지 않도록 신호 대 잡음비를 높이는 가지치기다.\n\n**그림**\n\n원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2601.18692v2/x2.png)\n![](https://arxiv.org/html/2601.18692v2/x2.png)\n→ 이 섹션 전용 그림. 3.1 Data Collection 본문이 직접 인용(\\cref{fig:data})하며 9종 dual-arm embodiment로 구성된 사전학습 데이터 분포/구성을 시각화한다.\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 3.2 Data Labeling 본문이 instruction annotation 과정을 설명하며 teaser(\\cref{fig:teaser}=Figure 1)를 인용한다. task/sub-task 지시문 주석 흐름의 전체 그림 맥락 제공.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 3 데이터 파이프라인 (본문 근거: 3.1 Data Collection + 3.2 Data Labeling)\n\n[3.1 DATA COLLECTION] -- 9 dual-arm embodiments, real-world teleoperation\n +---------------------+-------+----------------+---------------------------+\n | Embodiment          | Arms  | Cameras        | 수집/특이사항             |\n +---------------------+-------+----------------+---------------------------+\n | AgiBot G1           | 2x7DoF| 3x RGB-D       | VR-based teleoperation    |\n | AgileX              | 2x6DoF| 3              | isomorphic arms로 제어    |\n | Galaxea R1Lite      | 2x6DoF| 1 stereo+2wrist|                           |\n | Galaxea R1Pro       | 2x7DoF| 1 stereo+2wrist|                           |\n | Realman Rs-02       | 2x7DoF| 3              | 16-dim config/action,     |\n |                     |       |                | 2x parallel grippers      |\n | Leju KUAVO 4 Pro    | 2x7DoF| 1 head+2 wrist | 2x parallel grippers      |\n | Qinglong (humanoid) | 2x7DoF| 1 head+2 wrist |                           |\n | ARX Lift2           | 2x6DoF| 3              |                           |\n | Bimanual Franka     | 2x7DoF| 3              | 16-dim action,            |\n |                     |       |                | 2x parallel grippers      |\n +---------------------+-------+----------------+---------------------------+\n        | (multi-view raw videos + robot trajectories)\n        v\n[3.2 DATA LABELING]\n (1) Video Segment  -- 사람 annotator\n      multi-view video --> atomic-action 단위 clip 분해\n                       --> 시작/끝 static frame 제거 (redundancy 감소)\n        |\n        v  (full motion trajectory video + per-atomic-action clips)\n (2) Instruction Annotation -- Qwen3-VL-235B-A22B (VLM)\n      clip --> task instruction + sub-task instruction (자연어)\n        |\n        v\n [labeled (video clip, language instruction) pairs] --> 사전학습용 데이터셋\n\n주: 게재본 Section 3에는 수식/통계표/규모수치 없음. dim/카메라/DoF만 본문 명시.\n```\n\n**학습/추론**: 학습/추론 방법(본 섹션 범위): Section 3은 모델 학습 알고리즘이 아니라 '사전학습 데이터셋 구축' 절차만 다룬다. 학습용 데이터 준비 파이프라인은 (A) 9종 dual-arm 로봇에서 real-world teleoperation으로 시연 수집 → (B) 사람 annotator가 multi-view 영상을 atomic action 단위 clip으로 분할하고 앞뒤 static frame 제거 → (C) Qwen3-VL-235B-A22B(대형 VLM)로 task/sub-task 자연어 지시문 주석 → (D) 결과적으로 (video clip, language instruction) 쌍으로 구성된 cross-embodiment 사전학습 코퍼스 생성. 핵심 설계 의도는 다양한 embodiment(6/7-DoF, 카메라·gripper 구성 상이)를 섞어 특정 하드웨어 과적합을 피하고 일반화 가능한 manipulation 표현을 학습하게 하는 것. 실제 모델 architecture/학습 목적함수(Flow Matching 등 식 (1)~(5))와 throughput 최적화는 Section 4(Model Training)에 있으며 본 섹션 범위 밖이다(추측 금지를 위해 미기재).\n\n**핵심 숫자**\n\n- 9 — 데이터를 수집한 dual-arm 로봇 embodiment 종류 수 ('9 popular dual-arm robot embodiments')\n- 7-DoF / 6-DoF — 각 embodiment 팔의 자유도 (대부분 2x7-DoF, AgileX·Galaxea R1Lite·ARX Lift2는 2x6-DoF)\n- 16-dim — Realman Rs-02(16-dimensional configuration and action space)와 Bimanual Franka(16-dimensional action space)의 차원 수\n- 3 / 2 — embodiment별 카메라 수(대다수 3대, 일부는 stereo 1 + wrist 2 = 3대 구성)\n- 2 — atomic action별 라벨링 단계 수: (1) Video Segment, (2) Instruction Annotation\n- Qwen3-VL-235B-A22B — instruction annotation에 사용한 VLM (235B 파라미터급, A22B = active 22B MoE)\n- 주의: '약 20,000시간', '8 platforms' 수치는 LaTeX 소스에서 주석 처리(%)되어 게재본 Section 3 본문에 미포함 — 소스 근거 수치로 인용 불가\n\n## 3.1 Data Collection (데이터 수집)\n\n**핵심**\n\n- 사전학습(pre-training) 데이터셋은 9종의 인기 dual-arm(양팔) 로봇 embodiment에서 수집한 대규모 teleoperation(원격조작) 데이터로 구축된다. (Fig. 2 참조)\n- 각 embodiment는 팔 개수/자유도(DoF), 카메라 구성, 그리퍼, action space 차원이 서로 다르며, 이 이질성(heterogeneity)이 곧 데이터의 다양성이 된다.\n- 9종 embodiment: AgiBot G1, AgileX, Galaxea R1Lite, Galaxea R1Pro, Realman Rs-02, Leju KUAVO 4 Pro, Qinglong, ARX Lift2, Bimanual Franka.\n- 데이터 수집 방식이 embodiment마다 다름 — AgiBot G1은 VR 기반 teleoperation, AgileX는 isomorphic(동형) arm을 사용한 제어.\n- 팔 자유도는 6-DoF 또는 7-DoF로 양분되고, 카메라는 대부분 3개(머리/양 손목 또는 stereo+wrist 2개) 구성이다.\n- Realman Rs-02와 Bimanual Franka는 명시적으로 16차원 action space(양팔 7-DoF + 양 parallel gripper)를 가진다고 기술됨.\n- 이 섹션에는 수식이 전혀 없음 — 순수하게 하드웨어/embodiment 인벤토리를 서술하는 descriptive 섹션이다.\n- 이 섹션은 Figure 2만 참조함. Figure 3(atomic action word cloud)은 3.1이 아니라 5.1.2에서 참조됨.\n\n**왜 / 직관**\n\n직관: VLA foundation model을 만들려면 한 가지 로봇으로 찍은 데이터만으로는 부족하다. 사람으로 비유하면, 오른손잡이 한 명만 보고 '손 쓰는 법'을 배운 사람보다, 키·팔 길이·손 모양이 제각각인 여러 사람이 같은 작업(컵 집기 등)을 하는 걸 두루 본 사람이 '집기'라는 개념을 더 잘 일반화한다. 그래서 저자들은 일부러 팔 자유도(6/7-DoF), 카메라 배치, 그리퍼 종류, action 차원이 다른 9종의 양팔 로봇에서 데이터를 모은다. 수집 방식도 로봇 몸체(embodiment)에 맞춰 VR 텔레오퍼레이션 또는 동형(isomorphic) 마스터-슬레이브 조작으로 사람이 직접 시연을 입력한다. 즉 3.1은 '모델을 무엇으로 먹일 것인가'의 재료 목록이며, 다양한 몸을 가진 로봇들의 실제(real-world) 시연을 한데 모아 cross-embodiment 사전학습의 토대를 만드는 단계다.\n\n**그림**\n\n원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2601.18692v2/x2.png)\n![](https://arxiv.org/html/2601.18692v2/x2.png)\n→ 3.1 본문이 명시적으로 참조하는 유일한 그림 — 9종 embodiment에서 수집한 사전학습 데이터셋의 시각화(Visualization of pre-training dataset)로, 본 섹션이 정의하는 데이터 출처를 한눈에 보여줌.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **AgiBot G1**\n  - 목적/task: 양팔 7-DoF 시연 데이터 수집 (VR 텔레오퍼레이션)\n  - 입력→출력: VR teleoperation 입력 → RGB-D 관측(카메라 3대) + 양팔 action 궤적\n  - 내부: 두 개의 7-DoF arm, 세 대의 RGB-D 카메라. 로봇 데이터는 이 셋업에서 VR 기반 teleoperation으로 수집됨.\n\n- **AgileX**\n  - 목적/task: 양팔 6-DoF 시연 데이터 수집 (isomorphic arm 제어)\n  - 입력→출력: isomorphic(동형) arm 제어 입력 → 카메라 3대 관측 + 양팔 6-DoF action\n  - 내부: 세 대의 카메라와 두 개의 6-DoF arm. 데이터 수집 과정에서 isomorphic arm을 사용해 로봇 제어를 수행.\n\n- **Galaxea R1Lite**\n  - 목적/task: 양팔 6-DoF 시연 데이터 수집 (stereo + wrist 카메라)\n  - 입력→출력: teleoperation → stereo 카메라 1대 + wrist 카메라 2대 관측 + 양팔 6-DoF action\n  - 내부: 두 개의 6-DoF arm, stereo 카메라 1대와 wrist 카메라 2대로 구성.\n\n- **Galaxea R1Pro**\n  - 목적/task: 양팔 7-DoF 시연 데이터 수집 (stereo + wrist 카메라)\n  - 입력→출력: teleoperation → stereo 카메라 1대 + wrist 카메라 2대 관측 + 양팔 7-DoF action\n  - 내부: 두 개의 7-DoF arm, stereo 카메라 1대, wrist 카메라 2대 사용.\n\n- **Realman Rs-02**\n  - 목적/task: 양팔 7-DoF 시연 데이터 수집 (16차원 config/action space)\n  - 입력→출력: teleoperation → 카메라 3대 관측 + 16차원 action(양팔 7-DoF + parallel gripper 2개)\n  - 내부: 세 대의 카메라, 16차원 configuration/action space를 특징으로 함: 두 개의 7-DoF arm과 두 개의 parallel gripper.\n\n- **Leju KUAVO 4 Pro**\n  - 목적/task: 양팔 7-DoF 시연 데이터 수집 (head + wrist 카메라)\n  - 입력→출력: teleoperation → head 카메라 1대 + wrist 카메라 2대 관측 + 양팔 7-DoF action + gripper\n  - 내부: 두 개의 7-DoF arm, 두 개의 parallel gripper, head 카메라 1대, wrist 카메라 2대.\n\n- **Qinglong**\n  - 목적/task: 휴머노이드 양팔 7-DoF 시연 데이터 수집\n  - 입력→출력: teleoperation → head 카메라 1대 + wrist 카메라 2대 관측 + 양팔 7-DoF action\n  - 내부: 휴머노이드 로봇으로 두 개의 7-DoF arm과 카메라 3대(머리 1대, 양 손목 각 1대).\n\n- **ARX Lift2**\n  - 목적/task: 양팔 6-DoF 시연 데이터 수집\n  - 입력→출력: teleoperation → 카메라 3대 관측 + 양팔 6-DoF action\n  - 내부: 세 대의 카메라와 두 개의 6-DoF arm 사용.\n\n- **Bimanual Franka**\n  - 목적/task: 양팔 7-DoF 시연 데이터 수집 (16차원 action space)\n  - 입력→출력: teleoperation → 카메라 3대 관측 + 16차원 action(양팔 7-DoF + parallel gripper 2개)\n  - 내부: 두 개의 7-DoF arm과 두 개의 parallel gripper로 16차원 action space를 형성, 카메라 3대.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 3.1 Pre-training Data Sources (9 dual-arm embodiments)\n근거: 본문 embodiment 서술 + Fig.2 참조. 추측 없음(미명시는 \"-\").\n\n[Human teleoperation] --(embodiment-specific interface)--> [Real-world dual-arm robot] --> [demos: obs + action traj] --> Pre-training dataset (Fig.2)\n\nEmbodiment        | Arms x DoF | Cameras                    | Gripper          | Action dim\n------------------|------------|----------------------------|------------------|-----------\nAgiBot G1         | 2 x 7-DoF  | 3 x RGB-D                   | -                | -   (VR teleop)\nAgileX            | 2 x 6-DoF  | 3                          | -                | -   (isomorphic arm)\nGalaxea R1Lite    | 2 x 6-DoF  | 1 stereo + 2 wrist         | -                | -\nGalaxea R1Pro     | 2 x 7-DoF  | 1 stereo + 2 wrist         | -                | -\nRealman Rs-02     | 2 x 7-DoF  | 3                          | 2 parallel       | 16\nLeju KUAVO 4 Pro  | 2 x 7-DoF  | 1 head + 2 wrist           | 2 parallel       | -\nQinglong(humanoid)| 2 x 7-DoF  | 1 head + 2 wrist (=3)      | -                | -\nARX Lift2         | 2 x 6-DoF  | 3                          | -                | -\nBimanual Franka   | 2 x 7-DoF  | 3                          | 2 parallel       | 16\n```\n\n**학습/추론**: 학습/추론 방법: 3.1 자체는 학습/추론 알고리즘이 아니라 사전학습용 데이터의 출처(source)를 정의하는 단계다. 핵심은 (1) 데이터가 9종의 서로 다른 dual-arm 로봇 embodiment에서 나온 cross-embodiment 데이터라는 점, (2) 모두 사람이 개입한 teleoperation(원격조작) 시연 데이터라는 점이다. 수집 인터페이스는 embodiment에 종속적이다 — 예: AgiBot G1은 VR 기반 텔레오퍼레이션, AgileX는 isomorphic(동형) arm을 통한 직접 마스터-슬레이브 제어. 관측은 embodiment별 카메라 배치(RGB-D 3대 / stereo+wrist / head+wrist)로, action은 팔 자유도(6 또는 7-DoF)와 그리퍼 유무에 따라 16차원 등 서로 다른 차원으로 기록된다. 이렇게 모인 이질적(heterogeneous) 실세계 데이터가 이후 섹션(데이터 라벨링·전처리, 모델 사전학습)의 입력이 된다. 본문 3.1에는 구체적 trajectory/시간/episode 수치나 학습 하이퍼파라미터는 제시되지 않는다(그런 통계·라벨링 절차는 별도 섹션에서 다룸).\n\n**핵심 숫자**\n\n- embodiment 종류: 9종 (9 popular dual-arm robot embodiments)\n- 팔 자유도: 6-DoF (AgileX, Galaxea R1Lite, ARX Lift2) / 7-DoF (AgiBot G1, Galaxea R1Pro, Realman Rs-02, Leju KUAVO 4 Pro, Qinglong, Bimanual Franka)\n- 팔 개수: 모든 embodiment 각 2개(dual-arm)\n- 카메라 수: 대부분 3대 (AgiBot G1=RGB-D 3대, AgileX=3대, ARX Lift2=3대, Realman Rs-02=3대, Qinglong=3대, Bimanual Franka=3대); stereo 1대 + wrist 2대 (Galaxea R1Lite, R1Pro); head 1대 + wrist 2대 (Leju KUAVO 4 Pro, Qinglong)\n- action space 차원: Realman Rs-02 = 16차원, Bimanual Franka = 16차원 (양팔 7-DoF + parallel gripper 2개)\n- parallel gripper: Realman Rs-02, Leju KUAVO 4 Pro, Bimanual Franka에서 각 2개\n\n## 3.2 Data Labeling (데이터 라벨링)\n\n> ⚠️ **이 섹션은 적대적 검증에서 issue가 발견됨** — 아래 내용 중 일부는 맨 끝 TODO의 정정 사항을 함께 볼 것.\n\n**핵심**\n\n- 목표: 로봇 데모 영상에 '정확한 자연어 명령(language instruction)'을 붙이는 것. 즉 (영상 관측) -> (언어 명령) 정렬쌍을 만들어 VLA 사전학습에 쓸 수 있게 함. 본문: 'To obtain precise language instructions, we perform the following annotations'.\n- 라벨링은 정확히 2단계로 구성됨: (1) Video Segment(영상 분절), (2) Instruction Annotation(명령 주석).\n- (1) Video Segment: 로봇이 촬영한 여러 시점(multiple viewpoints)의 영상을, 사람 주석자(human annotators)가 '미리 정의된 원자 행동(predefined atomic actions)' 기준으로 함께(jointly) 클립으로 분해함. 즉 멀티뷰 영상이 같은 시간 경계로 동시에 잘림.\n- (1) 추가 처리: 영상 시작/끝의 정지 프레임(static frames)을 제거해 영상 내 중복 정보(redundant information)를 줄임. -> 학습 신호 밀도/효율을 높이는 전처리.\n- (2) Instruction Annotation: 위에서 얻은 두 종류 영상(로봇 전체 동작 궤적 full motion trajectories 영상 + 원자 행동별 클립)에 대해, VLM인 Qwen3-VL-235B-A22B를 사용해 'task instruction'과 'sub-task instruction'을 자동 주석함.\n- 라벨 위계가 task / sub-task 두 레벨로 나뉨: 전체 궤적 영상 -> task instruction(상위), 원자 행동 클립 -> sub-task instruction(하위)에 대응되는 구조(섹션이 두 영상 종류와 두 명령 종류를 함께 언급).\n- 이 라벨링 파이프라인의 전체 흐름은 Figure 1(\\cref{fig:teaser}, Overview of LingBot-VLA)에 도식화되어 있다고 본문이 명시함.\n- 주의: 이 섹션(3.2)에는 수식이 전혀 없음. 모든 수식(식 1~5)은 다음 섹션 4 'Model Training'에 속함. 또한 9개 로봇 임베디먼트 수치 등은 3.1 Data Collection 소관이며 3.2에서는 언급되지 않음.\n- 사람(human-in-the-loop 분절) + 대규모 VLM(자동 명령 생성)을 결합한 하이브리드 라벨링: 시간 경계 같은 구조적 판단은 사람이, 비용 큰 자연어 서술은 대형 VLM이 담당하도록 역할 분담.\n\n**왜 / 직관**\n\n비유: 요리 영상에 자막을 다는 작업과 같다. 먼저 사람이 긴 영상을 '재료 씻기 / 자르기 / 볶기' 같은 의미 단위(=원자 행동)로 가위질해 나눈다(=Video Segment). 이때 여러 각도에서 동시에 찍은 카메라들을 같은 시점에 함께 자르고, 아무 일도 안 일어나는 앞뒤 멈춤 구간(정지 프레임)은 잘라 버린다. 그다음 똑똑한 자동 자막 작가(대형 VLM Qwen3-VL-235B-A22B)가 전체 영상에는 '요리를 완성하라' 같은 상위 task 자막을, 잘린 각 클립에는 '양파를 썰어라' 같은 하위 sub-task 자막을 달아 준다. 왜 이렇게 하나? 로봇이 행동을 배우려면 '무엇을 보는가(영상)'와 '무엇을 하라는 것인가(언어)'가 정확히 짝지어져야 하는데, 영상만으로는 의미 경계와 의도가 모호하기 때문이다. 시간 경계를 끊는 구조적 판단은 사람이 잘하고, 그 안에서 자연어 서술을 대량으로 뽑는 일은 대형 VLM이 싸고 빠르게 하므로 둘을 나눠 맡긴 것이다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 섹션 3.2가 유일하게 직접 인용하는 그림(\\cref{fig:teaser}). 영상 분절->VLM 명령 주석으로 이어지는 데이터 라벨링 파이프라인 전체 개요를 도식화한다고 본문이 명시.\n\n원본 그림 3a: [arXiv Figure 3a](https://arxiv.org/html/2601.18692v2/x3.png)\n![](https://arxiv.org/html/2601.18692v2/x3.png)\n→ 3.2의 라벨링 산출물인 'atomic actions'(분절 기준이자 sub-task 명령의 어휘)이 실제로 어떤 단어 분포인지 보여주는 보조 그림. 단, 본문상 정의/인용은 섹션 4이며 3.2가 직접 인용하지는 않음(맥락 보강용).\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Data Labeling pipeline (전체)**\n  - 목적/task: 로봇 데모 영상에 정확한 자연어 명령을 부여해 (관측 영상)->(언어 명령) 정렬쌍을 만드는 것. 사전학습용 supervision 생성.\n  - 입력→출력: 입력: 로봇이 촬영한 멀티뷰 데모 영상(raw multi-view videos) -> 출력: (영상 클립, language instruction) 라벨쌍 (task + sub-task 레벨)\n  - 내부: 두 하위 단계로 구성: (1) Video Segment, (2) Instruction Annotation. 본문: 'To obtain precise language instructions, we perform the following annotations'. 전체 흐름은 Fig.1에 도식. 섹션 내 정량 수치/수식 없음.\n\n- **(1) Video Segment**\n  - 목적/task: 멀티뷰 데모 영상을 의미 단위(원자 행동)로 시간 분절하고 잡음 프레임을 제거하는 전처리.\n  - 입력→출력: 입력: multiple viewpoints raw videos -> 출력: (a) 로봇 full motion trajectory 영상, (b) atomic action별 video clip. (정지 프레임 제거된 상태). shape/프레임 수 등 수치는 본문 미명시.\n  - 내부: 행위 주체는 human annotators. 여러 시점 영상을 'predefined atomic actions' 기준으로 jointly(동시·동일 경계) 클립 분해. 추가로 영상 시작/끝의 static frames를 제거해 redundant information 감소. 정의 먼저: atomic action = 미리 정의된 행동 단위(분절 기준).\n\n- **(2) Instruction Annotation**\n  - 목적/task: 분절된 영상들에 자연어 task/sub-task 명령을 자동으로 다는 것(언어 라벨 생성).\n  - 입력→출력: 입력: (full-trajectory 영상) + (atomic-action 클립) -> 출력: task instruction(전체) + sub-task instruction(클립별). 텍스트 라벨. 길이/토큰 수 등은 본문 미명시.\n  - 내부: 라벨러 모델 = Qwen3-VL-235B-A22B (cite bai2025qwen2). 정의 먼저: Qwen3-VL-235B-A22B는 235B 규모(A22B = MoE active 약 22B 추정 표기, 본문은 모델명만 제시)의 대형 비전-언어 모델. 내부 동작: VLM이 영상을 보고 'precise annotation of task and sub-task instructions' 생성. 본문 인용 그림: Fig.1.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nSection 3.2 Data Labeling pipeline (본문 근거: video segment -> instruction annotation)\n\n [Raw multi-view robot videos]            (3 views per dual-arm setup; 본문: \"multiple viewpoints\")\n            |\n            v\n ===== (1) Video Segment =====  (actor: human annotators)\n   - jointly decompose all viewpoints into clips\n     by \"predefined atomic actions\" (time boundaries shared across views)\n   - eliminate static frames at start/end  -> reduce redundant info\n            |\n            +------------------------------+\n            |                              |\n            v                              v\n [Full-trajectory videos]        [Per-atomic-action clips]\n (robots' full motion             (one clip = one atomic action)\n  trajectories)\n            |                              |\n            v                              v\n ===== (2) Instruction Annotation =====  (actor: VLM = Qwen3-VL-235B-A22B)\n   full-trajectory video --->  task instruction      (high level)\n   atomic-action clip    --->  sub-task instruction  (low level)\n            |                              |\n            +--------------+---------------+\n                           v\n        [Labeled (video clip, language instruction) pairs]\n        -> used for LingBot-VLA pre-training\n        (overview shown in Fig.1 / fig:teaser)\n\nNOTE: 3.2 본문에 수식 없음. 위 두-레벨(task/sub-task) 대응은 본문이\n\"full motion trajectories\" 영상과 \"video clips for each atomic action\"을\n\"task and sub-task instructions\"와 함께 언급한 것에 근거.\n```\n\n**학습/추론**: 이 섹션(3.2)은 모델 학습/추론 알고리즘이 아니라 '학습 데이터 라벨 생성' 단계다. 학습 관점에서의 역할: 여기서 만든 (영상 클립, task/sub-task language instruction) 정렬쌍이 LingBot-VLA 사전학습(pre-training)의 언어 조건(supervision)으로 사용됨(전체 개요 Fig.1). 라벨 생성 절차 자체의 '추론'은 두 곳에서 일어난다 -- 사람 주석자가 원자 행동 경계로 영상을 분절하는 단계(human), 그리고 Qwen3-VL-235B-A22B가 영상을 입력받아 명령 텍스트를 생성하는 VLM 추론 단계(자동). 정지 프레임 제거는 중복 축소를 통한 라벨/학습 효율 향상 목적의 전처리다. 실제 VLA 모델의 학습 목적함수(Flow Matching 등 식 1~5)와 추론 절차는 섹션 4 Model Training 소관이며 3.2에는 없음.\n\n**핵심 숫자**\n\n- 라벨링 단계 수: 2개 ((1) Video Segment, (2) Instruction Annotation)\n- 명령 라벨 위계: 2레벨 (task instruction / sub-task instruction)\n- 주석용 VLM: Qwen3-VL-235B-A22B (235B 파라미터 규모 / A22B 표기)\n- 섹션 3.2 내 수식 개수: 0개 (식 1~5는 섹션 4 소속)\n- 참고(섹션 외, 맥락): 데이터는 9개 dual-arm 로봇 임베디먼트에서 수집됨(섹션 3.1); 테스트셋 atomic action의 약 50%가 학습셋 top-100 빈출 행동에 없음(섹션 4) -- 이 수치는 3.2 본문에는 없음\n\n## 4 Model Training (모델 학습)\n\n**핵심**\n\n- LingBot-VLA는 사전학습된 VLM(Qwen2.5-VL)에 새로 초기화한 'action expert'(행동 생성 모듈)를 결합한다. 둘은 BAGEL처럼 Mixture-of-Transformers(MoT) 구조로 묶여, vision-language와 action 모달리티가 각자 별도의 transformer 경로로 처리되되 공유 self-attention으로 층별(layer-wise) 통합 시퀀스 모델링을 한다.\n- MoT의 핵심 효과: VLM의 고차원 의미(semantic) prior가 모든 층에서 행동 생성에 연속적으로 가이드를 주면서, 동시에 모달리티별 처리를 유지해 모달리티 간 간섭(cross-modal interference)을 완화한다.\n- 입력 흐름: 멀티뷰 조작 이미지 3장 + task instruction을 VLM으로 인코딩해 multimodal conditioning을 만들고, 로봇의 proprioceptive(고유감각) 시퀀스(초기 state + action chunk)를 action expert에 넣어 행동을 예측한다.\n- 연속 행동 모델링은 Flow Matching으로 한다. 이는 부드럽고 매끄러운(fluid and smooth) 로봇 제어를 가능하게 해 복잡한 task와 다양한 로봇에서 고정밀 실행을 보장한다.\n- timestamp t의 결합 모델링 시퀀스는 관찰 조건 O_t와 행동 청크 A_t의 concatenation [O_t, A_t]이다. action chunk 길이 T는 사전학습 단계에서 50으로 설정한다.\n- 학습 목표는 조건부 flow matching으로 p(A_t|O_t)를 특성화하는 것. flow timestep s∈[0,1]에서 Gaussian noise ε과 ground-truth 행동 A_t를 선형 보간해 중간 행동 A_{t,s}=s·A_t+(1−s)·ε을 정의하고, action expert v_θ가 목표 벡터장 (A_t−ε)을 예측하도록 Flow Matching loss를 최소화한다.\n- π0를 따라 결합 시퀀스 [O_t, A_t]에 blockwise causal attention을 적용한다. 시퀀스는 세 블록 [이미지 3장 + instruction], [state], [action chunk]로 나뉘며, 블록 간에는 causal mask(자기+앞선 블록만 attend), 블록 내부는 bidirectional attention이다. 이로써 action expert는 모든 관찰 지식을 활용하되, 미래 행동 토큰이 현재 관찰 표현으로 누설되는 것을 막는다.\n- 공간 인지(spatial awareness)와 실행 robustness 강화를 위해 vision distillation을 채택한다. 3개 뷰에 대응하는 learnable query [Q_t^1, Q_t^2, Q_t^3]를 VLM으로 처리한 뒤, LingBot-Depth가 만든 depth token [D_t^1, D_t^2, D_t^3]와 distillation loss로 정렬해 기하 정보(geometric information)를 모델에 주입한다.\n- 학습 효율 최적화(4.2): 행동 데이터가 본질적으로 고주파(high-frequency)라서 분산학습 + 연산자 최적화 파이프라인이 필수. 분산 전략은 FSDP(ZeRO의 PyTorch 구현)로 optimizer state/파라미터/gradient를 샤딩하고, VeOmni의 HSDP에서 영감 받아 action expert 모듈에만 전용 'shard group'을 구성해 과도한 파라미터 샤딩의 통신 오버헤드를 완화한다.\n- 혼합 정밀도(mixed-precision): 수치 안정성을 위해 reduction은 torch.float32로, 저장·통신은 torch.bfloat16로 수행한다. 연산자 수준 최적화는 멀티모달 융합이 본질적으로 sparse attention임에 착안해 FlexAttention으로 계산을 최적화하고, torch.compile 기반 operator fusion으로 커널 실행 오버헤드를 줄이고 메모리 대역폭 활용을 극대화한다.\n\n**왜 / 직관**\n\nVLM은 '눈과 머리'(무엇을 보고 무엇을 해야 하는지 이해), action expert는 '운동 피질'(연속적이고 부드러운 손 움직임을 만들어냄)에 해당한다. MoT는 이 둘을 한 척추(공유 self-attention)로 이어 붙이되, 시각·언어를 처리하는 신경다발과 행동을 만드는 신경다발을 분리해 둔 형태다. 그래서 머리의 의미 이해가 매 층마다 손에 가이드를 주면서도, 서로 다른 종류의 신호가 뒤섞여 혼란(간섭)을 일으키지 않는다. Flow Matching은 '노이즈 덩어리(ε)에서 출발해 정답 행동(A_t)까지 일직선으로 흘러가는 강물'을 상상하면 된다. 모델은 그 강의 '물살 방향(벡터장 A_t−ε)'을 매 지점에서 맞히도록 배우고, 추론 때는 그 물살을 따라 노이즈를 점점 깔끔한 행동 궤적으로 흘려보낸다. blockwise causal attention은 '시험 중 미래 답안지 훔쳐보기 금지' 규칙과 같다: 행동 블록은 관찰 전체를 볼 수 있지만, 관찰 블록이 미래 행동을 미리 엿보지 못하게 막는다. depth distillation은 2D 이미지만 보는 학생(VLM query)에게 깊이 정보를 아는 선생(LingBot-Depth)의 답을 베끼게 해, 평면 그림만 보고도 3D 공간 감각을 갖추게 만드는 과외 수업이다.\n\n**수식**\n\n$$\n\\mathbf{O}_t = [\\mathbf{I}_t^{1}, \\mathbf{I}_t^{2}, \\mathbf{I}_t^{3}, \\mathbf{T}_t, \\mathbf{s}_t]\n$$\n\n- **무슨 식?**: 관찰 = [3뷰 이미지, 명령어, 로봇 상태]를 하나로 묶은 조건 입력.\n- **설명**: 관찰 컨텍스트 O_t의 정의. 각 항: I_t^{1,2,3}=듀얼암 로봇의 3개 뷰 조작 이미지 토큰, T_t=task instruction 토큰, s_t=로봇 state. 이들을 이어 붙여 행동 생성을 위한 멀티모달 조건을 구성한다.\n\n$$\n\\mathbf{A}_t = [\\mathbf{a}_t, \\mathbf{a}_{t+1}, \\ldots, \\mathbf{a}_{t+T-1}]\n$$\n\n- **무슨 식?**: 행동 = 미래 T스텝(=50)의 행동을 한 덩어리로 예측.\n- **설명**: 행동 시퀀스(action chunk)의 정의. T=action chunk 길이(예측 궤적의 시간 지평, temporal horizon)이며 사전학습 단계에서 50으로 설정. 한 번에 T스텝치 미래 행동을 묶어 예측한다.\n\n$$\n\\mathbf{A}_{t,s} = s\\,\\mathbf{A}_t + (1-s)\\,\\boldsymbol{\\epsilon}, \\quad \\boldsymbol{\\epsilon} \\sim \\mathcal{N}(\\mathbf{0}, \\mathbf{I})\n$$\n\n- **무슨 식?**: 노이즈(s=0)와 정답 행동(s=1) 사이를 직선으로 잇는 중간 상태.\n- **설명**: flow timestep s∈[0,1]에서 Gaussian noise ε과 정답 행동 A_t를 선형 보간한 중간 행동 A_{t,s}. s=0이면 순수 노이즈, s=1이면 정답 행동. 노이즈→행동으로 가는 선형 확률 경로(probability path)를 정의한다.\n\n$$\np(\\mathbf{A}_{t,s}\\,|\\,\\mathbf{A}_t) = \\mathcal{N}(s\\,\\mathbf{A}_t, (1-s)\\,\\mathbf{I})\n$$\n\n- **무슨 식?**: 중간 행동의 분포 — s가 1에 가까울수록 정답에 가깝고 노이즈가 작다.\n- **설명**: 중간 행동 A_{t,s}의 조건부 분포. 평균은 s·A_t(정답 쪽으로 s만큼 당겨짐), 분산은 (1−s)·I(s가 커질수록 노이즈 감소). 위 선형 보간을 확률분포로 정식화한 것.\n\n$$\n\\mathcal{L}_{\\mathrm{FM}} = \\mathbb{E}_{s\\sim\\mathcal{U}[0,1],\\,\\mathbf{A}_t,\\,\\boldsymbol{\\epsilon}} \\left\\| v_\\theta(\\mathbf{A}_{t,s}, \\mathbf{O}_t, s) - (\\mathbf{A}_t - \\boldsymbol{\\epsilon}) \\right\\|^2\n$$\n\n- **무슨 식?**: expert가 '노이즈→정답' 물살의 방향(A_t−ε)을 맞히도록 학습.\n- **설명**: Flow Matching 학습 목표. action expert v_θ가 중간 행동 A_{t,s}, 관찰 O_t, flow timestep s를 입력받아 예측한 벡터장을, 선형 경로에서 유도된 이상적 목표 벡터장 (A_t−ε)에 L2로 맞춘다. s는 균등분포 U[0,1], A_t·ε에 대한 기댓값.\n\n$$\n\\mathcal{L}_{\\mathrm{distill}} = \\mathbb{E}_{\\mathbf{Q}_t} \\left| \\mathrm{Proj}(\\mathbf{Q}_t) - \\mathbf{D}_t \\right|\n$$\n\n- **무슨 식?**: VLM query를 깊이 토큰에 맞춰 3D 공간 감각을 주입(L1 정렬).\n- **설명**: vision distillation 손실. VLM의 learnable query Q_t를 projection layer Proj(·)(차원 정렬용 cross-attention)로 변환한 뒤, LingBot-Depth의 depth token D_t와 L1 거리로 정렬. 기하/깊이 정보를 VLM 표현에 주입한다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 섹션 4가 본문에서 명시적으로 참조하는 유일한 그림 — VLM + action expert를 MoT(공유 self-attention)로 결합하고 멀티뷰 이미지·명령어·state·action chunk가 흐르는 LingBot-VLA 전체 아키텍처를 보여준다.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nLingBot-VLA Model Training (Sec. 4) — MoT joint sequence + Flow Matching\n========================================================================\n\nINPUTS                          MoT (shared self-attention, layer-wise)\n------                          ----------------------------------------\n3-view imgs  I_t^1,I_t^2,I_t^3 ┐\ntask instr   T_t               ┘──> [ VLM pathway: Qwen2.5-VL ]──┐\nrobot state  s_t ─────────────────> (state block)               │ shared\n                                                                 │ self-\nnoise eps ~ N(0,I) , gt A_t                                      │ attn\n   |  A_{t,s}=s*A_t+(1-s)*eps                                    │ (every\n   v                                                             │  layer)\naction chunk A_t=[a_t..a_{t+T-1}] -> [ Action-expert pathway ]──┘\n                                          v_theta(A_{t,s},O_t,s)\n                                              |\n                                              v\n                                  predicted vector field  ->  L_FM = || v_theta - (A_t - eps) ||^2\n\nJoint sequence  [ O_t , A_t ] ,  O_t=[I^1,I^2,I^3,T_t,s_t] , T=50\n\nBlockwise causal attention (a la pi0)\n-------------------------------------\n Block1 [I_t^1,I_t^2,I_t^3,T_t]   Block2 [s_t]   Block3 [a_t..a_{t+T-1}]\n   <--- bidir --->                 <-bidir->        <----- bidir ----->\n   B1: sees B1 only\n   B2: sees B1,B2\n   B3: sees B1,B2,B3        (causal across blocks: attend self + preceding only;\n                             blocks future actions leaking into observations)\n\nVision distillation (spatial awareness)\n---------------------------------------\n learnable queries [Q_t^1,Q_t^2,Q_t^3] --VLM--> Proj(.) (cross-attn align)\n                                                    |\n LingBot-Depth --> depth tokens [D_t^1,D_t^2,D_t^3] |\n                                                    v\n                              L_distill = | Proj(Q_t) - D_t |  (L1)\n\nTraining efficiency (Sec 4.2)\n-----------------------------\n Distributed: FSDP (ZeRO) shard {opt-state, params, grads}\n              + HSDP-style \"shard groups\" for action-expert only (cut comm)\n              + mixed precision: reduce in fp32, store/comm in bf16\n Operators:   FlexAttention (sparse attn) + torch.compile operator fusion\n```\n\n**학습/추론**: 학습(Training): 핵심 목표는 조건부 Flow Matching으로 p(A_t|O_t)를 학습하는 것. (1) flow timestep s~U[0,1]을 뽑고, Gaussian noise ε~N(0,I)과 정답 행동 A_t를 선형 보간해 중간 행동 A_{t,s}=s·A_t+(1−s)·ε를 만든다. (2) action expert v_θ가 (A_{t,s}, O_t, s)를 입력받아 벡터장을 예측하고, 이상적 목표 벡터장 (A_t−ε)과의 L2 차이인 Flow Matching loss L_FM를 최소화. (3) 동시에 vision distillation loss L_distill(VLM query Q_t의 Proj 결과를 LingBot-Depth token D_t에 L1 정렬)로 깊이/기하 정보를 주입. action chunk 길이 T=50으로 사전학습. attention은 π0식 blockwise causal로, 관찰→행동만 흐르고 미래 행동의 누설은 차단. 효율 측면(4.2): FSDP(ZeRO) 샤딩 + action expert 전용 HSDP shard group + 혼합정밀도(reduce fp32 / store·comm bf16), FlexAttention + torch.compile operator fusion으로 처리량을 끌어올린다. 추론(Inference): 섹션 4에는 추론 절차가 명시되어 있지 않다. 다만 학습된 구조상 Flow Matching의 표준 추론은 노이즈 ε에서 시작해 학습된 벡터장 v_θ를 따라 s를 적분(integrate)하며 노이즈를 행동 청크 A_t로 흘려보내는 방식이지만, 이 적분 절차의 구체적 내용은 본 섹션 본문에 기술되어 있지 않다(추측 배제).\n\n**핵심 숫자**\n\n- Action chunk 길이 T = 50 (사전학습 단계의 temporal horizon)\n- Flow timestep s ∈ [0,1] (균등분포 U[0,1]에서 샘플링)\n- 관찰 이미지 뷰 수 = 3 (three-view operational images, I_t^1·I_t^2·I_t^3)\n- VLM = Qwen2.5-VL (사전학습 vision-language 모델)\n- 혼합정밀도: reduction은 torch.float32, 저장·통신은 torch.bfloat16\n\n## 4.1 Architecture (Model Training)\n\n**핵심**\n\n- LingBot-VLA = pre-trained VLM(Qwen2.5-VL) + 새로 초기화한 'action expert'(행동 생성 모듈)을 Mixture-of-Transformers(MoT) 구조로 결합. BAGEL과 유사하게 vision-language 모달리티와 action 모달리티를 서로 다른 transformer 경로로 처리하되, layer-wise로 공유 self-attention을 통해 하나의 통합 시퀀스로 묶는다.\n- MoT 설계 의도: VLM의 고차원 의미 prior(semantic prior)가 모든 레이어에 걸쳐 행동 생성에 지속적으로 가이드를 주면서(continuous guidance across all layers), 동시에 모달리티별 처리(modality-specific processing)를 유지해 cross-modal 간섭을 줄인다.\n- 입력 구성: 멀티뷰(3-view) 작업 이미지 + task instruction은 VLM으로 인코딩되어 multimodal conditioning을 만들고, 로봇의 proprioceptive 시퀀스(초기 state + action chunk)는 action expert로 들어가 행동을 예측한다.\n- 연속 행동 모델링에 Flow Matching을 사용한다 -> 부드럽고 유연한(fluid/smooth) 로봇 제어, 복잡한 task와 다양한 로봇에서 고정밀 실행을 보장.\n- joint sequence는 timestamp t에서 observation conditions O_t 와 action chunk A_t 의 concatenation으로 구성. O_t = [I_t^1, I_t^2, I_t^3, T_t, s_t], A_t = [a_t, ..., a_{t+T-1}], action chunk 길이 T=50 (pre-training 단계).\n- 학습 목표는 conditional flow matching으로 p(A_t | O_t)를 모델링하는 것. flow timestep s∈[0,1]에서 가우시안 노이즈 ε와 정답 행동 A_t 사이를 선형 보간하여 중간 행동 A_{t,s}=sA_t+(1-s)ε 를 만들고, action expert v_θ가 vector field를 예측하도록 L_FM을 최소화. target velocity는 A_t - ε.\n- π_0를 따라 blockwise causal attention 적용: joint 시퀀스 [O_t, A_t]를 3개 블록 [I_t^1,I_t^2,I_t^3,T_t], [s_t], [a_t,...,a_{t+T-1}]으로 분할. 블록 간에는 causal mask(자기 자신 + 앞선 블록만 attend), 같은 블록 안에서는 bidirectional attention. 미래 action 토큰 정보가 현재 observation 표현으로 새는 것(leakage) 방지.\n- spatial awareness/실행 robustness 강화를 위해 vision distillation 추가: 3뷰 이미지에 대응하는 learnable query [Q_t^1,Q_t^2,Q_t^3]를 VLM으로 처리한 뒤, LingBot-Depth의 depth token [D_t^1,D_t^2,D_t^3]과 정렬. distillation loss L_distill 최소화로 기하(depth) 정보를 주입한다. Proj(·)는 cross-attention 기반 차원 정렬 projection layer.\n\n**왜 / 직관**\n\n두 개의 전문가를 한 회의실에 앉혀 놓는다고 보면 된다. 한 명은 '눈과 말귀'를 담당하는 VLM(이미 잘 학습된 vision-language 전문가)이고, 다른 한 명은 '손동작'을 만드는 action expert(처음부터 배우는 신입)다. 보통이라면 둘을 따로 두거나 억지로 한 모델로 합치는데, 합치면 서로 말이 섞여(cross-modal 간섭) 혼란스럽고, 따로 두면 VLM의 의미 정보가 손동작 담당에게 전달이 잘 안 된다. MoT는 두 사람에게 각자의 노트(modality-specific pathway)를 주되, 매 레이어마다 같은 테이블에서 self-attention으로 회의(shared attention)를 하게 해서 VLM의 지혜가 매 단계 손동작 설계에 흘러들어가게 한다. Flow Matching은 '노이즈로 흐릿하게 시작한 행동 궤적을 정답 궤적 쪽으로 밀어주는 속도(벡터장)'를 배우는 것 -> 디퓨전처럼 한 번에 깔끔한 행동을 못 만들고, 노이즈에서 정답까지 직선 경로를 따라 매끄럽게 이동하는 법을 배운다. blockwise causal attention은 '관찰은 미래 행동을 미리 엿보면 안 된다(컨닝 방지)'는 규칙, 단 같은 종류 토큰끼리는 자유롭게 본다는 것. vision distillation은 RGB만 보던 VLM에게 깊이(depth) 감각을 옆에서 가르쳐 입체 공간을 더 정확히 인지하게 하는 과외다.\n\n**수식**\n\n$$\n\\mathbf{A}_t = [\\mathbf{a}_t, \\mathbf{a}_{t+1}, \\dots, \\mathbf{a}_{t+T-1}]\n$$\n\n- **무슨 식?**: 행동 청크 A_t = 현재부터 T(=50)스텝의 행동 시퀀스\n- **설명**: 예측 대상 action chunk(행동 청크). a_{t+k} = 미래 각 시점의 행동, T = action chunk 길이(예측 궤적의 temporal horizon), pre-training에서 T=50. 즉 한 번에 50 스텝짜리 행동 궤적을 통째로 예측한다.\n\n**그림**\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2601.18692v2/x1.png)\n![](https://arxiv.org/html/2601.18692v2/x1.png)\n→ 본문에서 'The architecture of LingBot-VLA is illustrated in Fig. 1'로 직접 참조하는 유일한 그림 — VLM + action expert MoT 결합과 입력(멀티뷰 이미지/지시문/state)→행동 생성 전체 구조를 보여줌.\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **LingBot-VLA (전체, MoT 백본)**\n  - 목적/task: 멀티뷰 이미지+언어 지시+로봇 상태를 조건으로 dual-arm 로봇의 연속 행동 청크를 생성하는 VLA foundation 모델.\n  - 입력→출력: 입력: 3뷰 이미지 I_t^{1,2,3} + 지시문 T_t + 상태 s_t (-> O_t) , 학습 시 GT action A_t와 noise ε / 출력: 행동 청크 A_t=[a_t,...,a_{t+T-1}], T=50\n  - 내부: VLM과 action expert를 Mixture-of-Transformers(BAGEL식)로 결합. 두 모달리티는 서로 다른 transformer pathway로 처리되며 layer-wise 공유 self-attention으로만 결합되어, VLM의 의미 prior가 전 레이어에 걸쳐 행동 생성을 가이드하고 modality-specific 처리로 cross-modal 간섭을 억제. joint 시퀀스 = [O_t, A_t].\n\n- **VLM (Qwen2.5-VL, vision-language pathway)**\n  - 목적/task: 멀티뷰 작업 이미지와 task instruction을 통합 인코딩해 행동 생성을 위한 multimodal conditioning을 만든다.\n  - 입력→출력: 입력: 3뷰 이미지 I_t^{1,2,3}, task instruction T_t (+ vision distillation용 learnable query Q_t) / 출력: 멀티모달 조건 토큰(O_t의 이미지·지시 부분), 처리된 query Q_t\n  - 내부: pre-trained Qwen2.5-VL을 그대로 활용(well-trained VL 표현 leverage). 행동 expert와 shared self-attention으로 매 레이어 결합. distillation 분기에서는 learnable query Q_t도 함께 처리한다.\n\n- **Action Expert (action pathway, v_θ)**\n  - 목적/task: O_t 조건 하에 conditional flow matching으로 연속 행동 청크의 분포 p(A_t|O_t)를 모델링/예측.\n  - 입력→출력: 입력: 중간 행동 A_{t,s}=sA_t+(1-s)ε, 관찰 조건 O_t, flow step s∈[0,1] / 출력: vector field 예측 v_θ(A_{t,s},O_t,s) -> 행동 청크 A_t\n  - 내부: 새로 초기화된 모듈. Flow Matching으로 학습: target velocity A_t-ε에 대해 L_FM=E||v_θ-(A_t-ε)||^2 최소화. 입력에 로봇 proprioceptive 시퀀스(초기 state, action chunk) 사용. π_0식 blockwise causal attention으로 미래 action 누수 차단하면서 전체 관찰을 활용.\n\n- **Vision Distillation 분기 (depth 정렬)**\n  - 목적/task: VLM 표현에 기하(depth) 정보를 주입해 spatial awareness와 실행 robustness 강화.\n  - 입력→출력: 입력: 3뷰 learnable query [Q_t^1,Q_t^2,Q_t^3] (VLM 처리 후 Q_t), LingBot-Depth의 depth token [D_t^1,D_t^2,D_t^3]=D_t / 출력: 정렬 손실 L_distill\n  - 내부: Proj(Q_t)를 D_t에 L1로 정렬: L_distill=E_{Q_t}|Proj(Q_t)-D_t|. Proj(·)는 cross-attention으로 차원을 맞추는 projection layer. 최근 vision distillation 연구에서 영감. LingBot-Depth가 depth 토큰 공급원.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\nFigure 1은 고수준 overview라 본문이 서술하는 토큰 시퀀스/attention mask/distillation 세부 데이터흐름이 드러나지 않으므로, 본문 근거 기반으로 아래에 재구성 (추측 없음).\n\n[1] 전체 MoT 데이터 흐름 (Eq.1~4)\n====================================================\n 입력\n  멀티뷰 이미지 I_t^1, I_t^2, I_t^3 ┐\n  task instruction  T_t           ├─► [ VLM (Qwen2.5-VL) ]  ← VL pathway\n                                   │      (pre-trained)\n  robot state s_t  ────────────────┘            │\n                                                │  shared self-attention\n  noise ε~N(0,I) ─┐                             │  (layer-wise, 매 레이어 결합)\n                  │  A_{t,s}=sA_t+(1-s)ε        ▼\n  GT action A_t ──┴──► 중간행동 A_{t,s} ─► [ Action Expert v_θ ] ← Action pathway\n                          flow step s ─────────►│   (newly initialized)\n                                                ▼\n                              예측 vector field  v_θ(A_{t,s}, O_t, s)\n                                                │  target = A_t - ε\n                                                ▼   L_FM = || v_θ - (A_t-ε) ||^2\n                              행동 청크 A_t=[a_t,...,a_{t+T-1}], T=50\n\n  ※ O_t = [I_t^1,I_t^2,I_t^3, T_t, s_t]   (Eq.1)\n  ※ VL과 Action은 별도 transformer pathway, 공유 self-attention으로만 결합 (MoT)\n\n\n[2] Blockwise causal attention mask (π_0 방식)\n====================================================\n joint sequence [O_t, A_t] 를 3블록으로 분할:\n   B1 = [I_t^1, I_t^2, I_t^3, T_t]   (이미지+지시문)\n   B2 = [s_t]                        (로봇 상태)\n   B3 = [a_t, a_{t+1}, ..., a_{t+T-1}] (행동)\n\n attend 가능(✔) / 차단(�’) 행렬  (행=query 블록, 열=key 블록):\n            B1    B2    B3\n      B1  [ ✔ ]  ✗     ✗      (B1: 자기 자신만, 양방향)\n      B2  [ ✔ ]  ✔     ✗      (B2: B1+자기, 자기내 양방향)\n      B3  [ ✔ ]  ✔     ✔      (B3: 전체 관찰+자기, 자기내 양방향)\n 규칙: 블록 간 = causal(앞선 블록만), 블록 내 = bidirectional.\n 효과: action expert는 모든 관찰 활용 가능 / 미래 action -> observation 정보 누수 차단.\n\n\n[3] Vision distillation 분기 (Eq.5)\n====================================================\n  learnable query [Q_t^1, Q_t^2, Q_t^3] ─► [ VLM 처리 ] ─► Q_t\n                                                            │ Proj(·): cross-attn 차원정렬\n                                                            ▼\n                                              Proj(Q_t) ── L1 정렬 ──► D_t\n                                                            ▲\n  LingBot-Depth ─► depth token [D_t^1, D_t^2, D_t^3] = D_t ─┘\n  L_distill = E_{Q_t} | Proj(Q_t) - D_t |   ⇒ 기하/depth 정보를 VLM 표현에 주입\n```\n\n**학습/추론**: 학습(pre-training): (1) 행동 모델링은 conditional Flow Matching. flow step s를 U[0,1]에서 균등 샘플, ε~N(0,I)와 GT 행동 A_t를 선형 보간해 중간 행동 A_{t,s}=sA_t+(1-s)ε 생성(조건부 분포 N(sA_t,(1-s)I)). action expert v_θ가 ideal vector field A_t-ε를 예측하도록 L_FM=E_{s,A_t,ε}||v_θ(A_{t,s},O_t,s)-(A_t-ε)||^2 최소화. action chunk 길이 T=50. (2) attention은 π_0식 blockwise causal: 3블록([이미지+지시], [state], [action])에 대해 블록 간 causal mask + 블록 내 bidirectional, 미래 action->observation 정보 누수 차단. (3) 보조 손실로 vision distillation L_distill=E|Proj(Q_t)-D_t| (VLM learnable query를 LingBot-Depth의 depth 토큰에 L1 정렬)로 기하 정보 주입. 백본은 VLM(Qwen2.5-VL, pretrained) + action expert(초기화)를 MoT로 결합, 두 pathway가 layer-wise shared self-attention으로 상호작용. 추론: 본 섹션(4.1 Architecture)에는 추론 절차의 구체적 디테일(예: ODE 적분 스텝 수 등)은 명시되어 있지 않음 — 학습된 v_θ로 O_t 조건 하 행동 청크 A_t를 생성한다는 일반 흐름만 제시됨. 추측 금지 차원에서 그 이상은 본문 근거 없음.\n\n**핵심 숫자**\n\n- action chunk 길이 T = 50 (pre-training 단계의 temporal horizon)\n- 입력 이미지 뷰 수 = 3 (three-view operational images, I_t^1/I_t^2/I_t^3)\n- joint 시퀀스 블록 수 = 3 ([이미지+지시], [state], [action])\n- flow timestep s 범위 = [0,1] (s~U[0,1])\n- VLM 백본 = Qwen2.5-VL\n- 사용 robot embodiment(데이터 수집, 인접 섹션 근거) = 9개 dual-arm 로봇\n\n## 4.2 Training Efficiency Optimization (학습 효율 최적화)\n\n**핵심**\n\n- 이 섹션의 동기: action 데이터는 본질적으로 high-frequency(고빈도)이므로, 분산 학습(distributed training)과 연산자 최적화(operator optimization)를 아우르는 '고효율 파이프라인'을 구축하는 것이 필수적이다. 최적화 방법론은 (1) Distributed Strategy, (2) Operator-Level Optimization 두 축으로 구성된다.\n- [Distributed Strategy] VLA 모델은 파라미터 수가 보통(moderate) 수준이지만, GPU 메모리 점유와 학습 throughput 사이의 최적 trade-off 달성이 여전히 핵심이다. 이를 위해 FSDP(Fully Sharded Data Parallel)를 사용 — FSDP는 ZeRO(Zero Redundancy Optimizer)의 효율적인 PyTorch 구현으로, optimizer states / model parameters / gradients를 샤딩(shard)하여 메모리 footprint를 최소화한다.\n- [Distributed Strategy - HSDP 응용] VeOmni가 제안한 HSDP(Hybrid Sharded Data Parallel) 방식에서 영감을 받아, action expert 모듈에 한해서만(exclusively) 별도의 'shard group'을 구성한다. 이는 과도한 파라미터 샤딩에 따르는 통신 오버헤드(communication overhead)를 효과적으로 완화한다. 즉 '전부 다 샤딩'이 아니라 모듈별로 샤딩 범위를 차등 적용하는 것이 핵심.\n- [Distributed Strategy - mixed precision] 혼합 정밀도(mixed-precision) 정책 적용: reduction(누적/집계) 연산은 torch.float32로 수행해 수치 안정성(numerical stability)을 보장하고, 저장(storage)과 통신(communication)은 torch.bfloat16을 사용한다. 즉 '정확도가 중요한 곳은 fp32, 대역폭이 중요한 곳은 bf16'으로 나눈다.\n- [Operator-Level Optimization] 본 아키텍처에서 vision/language/action의 멀티모달 융합은 근본적으로 sparse attention(희소 어텐션) 과정이다. 이를 위해 FlexAttention을 활용해 연산을 최적화한다.\n- [Operator-Level Optimization - fusion] 추가로 torch.compile을 통한 operator fusion(연산자 융합)을 적용해 커널 실행(kernel launch) 오버헤드를 줄이고 메모리 대역폭(memory bandwidth) 활용도를 극대화한다.\n- 주의(섹션 경계): HTML에서 '4.2 Training Efficiency Optimization'은 방법론(method) 서브섹션으로, 자체적으로 수식이나 그림을 직접 참조하지 않는다. 이 최적화의 실증 결과(처리량 비교, 그림 4=x5/x6)는 별도 서브섹션 '5.4 Training Throughput Analysis'에 있으며, 본 답변에서는 직접적으로 연결되는 figure로 함께 제시한다.\n\n**왜 / 직관**\n\n왜 이런 최적화가 필요한가에 대한 직관: 로봇 action 데이터는 고빈도(high-frequency) 스트림이라 학습 시 데이터/연산 부하가 크다. 그래서 '메모리를 아끼되 속도는 안 죽이는' 균형이 관건이다. 비유하면, FSDP/ZeRO는 큰 짐(모델 상태)을 여러 GPU에 '나눠 들기'다 — 혼자 다 들면(메모리 폭발) 못 들지만, 너무 잘게 나눠 모두가 끊임없이 서로에게 부품을 건네면(통신 오버헤드) 오히려 느려진다. 그래서 HSDP처럼 'action expert만 따로 shard group으로 묶어' 통신이 잦은 부분의 분산 범위를 좁히는 것이 핵심이다. mixed-precision은 '계산기 정밀도'를 상황별로 바꾸는 것 — 더하다 보면 오차가 누적되는 reduction은 정밀한 fp32 자로 재고, 단순히 옮기고 저장만 하는 곳은 가벼운 bf16 자를 써서 짐을 가볍게 한다. Operator 단의 FlexAttention/torch.compile은 '주방 동선 최적화'에 가깝다 — 멀티모달 어텐션이 실제로는 군데군데 비어있는(sparse) 패턴이니 빈 칸 계산을 건너뛰고(FlexAttention), 여러 작은 요리(커널)를 매번 따로 불 켜는 대신 한 번에 묶어 처리(operator fusion)해 불 켜는 시간(kernel launch overhead)을 줄이고 재료 운반(memory bandwidth)을 최대로 돌린다.\n\n**그림**\n\n원본 그림 4a: [arXiv Figure 4a](https://arxiv.org/html/2601.18692v2/x5.png)\n![](https://arxiv.org/html/2601.18692v2/x5.png)\n→ 4.2의 효율 최적화(FSDP2 등)가 실제로 가장 빠른 학습 throughput과 거의 선형에 가까운 GPU scaling을 만들어냄을 Qwen2.5-VL-3B-pi 모델에서 실증한 그림(논문 5.4와 직접 연결).\n\n원본 그림 4b: [arXiv Figure 4b](https://arxiv.org/html/2601.18692v2/x6.png)\n![](https://arxiv.org/html/2601.18692v2/x6.png)\n→ 동일한 효율 스택을 PaliGemma-3B-pt-224-pi 모델에서 재현해, 8~256 GPU에서 이론적 linear scaling limit에 근접하는 scaling 효율을 보여주는 그림(4.2 최적화의 일반성 근거).\n\n**모듈 분해** (top-down — 목적/입출력 먼저, 내부는 뒤)\n\n- **Training Efficiency Pipeline (전체 학습 효율 파이프라인)**\n  - 목적/task: 고빈도(high-frequency) action 데이터에 대해 분산 학습 + 연산자 최적화를 결합한 고효율 학습 파이프라인을 구성하는 것이 목적. GPU 메모리 점유와 학습 throughput 간 최적 trade-off 달성이 task.\n  - 입력→출력: 입력: VLA 학습 부하(모델 파라미터 + optimizer states + gradients, 멀티모달 시퀀스 vision/language/action) → 출력: 동일 자원에서 더 높은 학습 throughput(samples/s)과 더 낮은 메모리 footprint. (구체적 텐서 shape은 본 서브섹션 본문에 명시되지 않음 — 추측하지 않음)\n  - 내부: 두 하위 전략으로 구성: (1) Distributed Strategy, (2) Operator-Level Optimization. 본문상 별도 수식 없음.\n\n- **Distributed Strategy (분산 전략)**\n  - 목적/task: 메모리 footprint를 최소화하면서 통신 오버헤드를 억제해 분산 학습 효율을 높이는 것이 목적.\n  - 입력→출력: 입력: optimizer states, model parameters, gradients (전 GPU에 걸친 학습 상태) + action expert 모듈 파라미터 → 출력: 샤딩된 분산 상태(메모리 절감) + 차등 샤딩으로 줄어든 통신량. (정확한 shape은 본문 미명시)\n  - 내부: (a) FSDP 적용 — ZeRO의 PyTorch 구현으로 optimizer states/model parameters/gradients를 샤딩하여 메모리 footprint 최소화. (b) HSDP(VeOmni 영감) — action expert 모듈에만 전용 'shard group'을 구성, 과도한 파라미터 샤딩의 통신 오버헤드를 완화. (c) Mixed-precision policy — reduction은 torch.float32(수치 안정성), storage/communication은 torch.bfloat16.\n\n- **Operator-Level Optimization (연산자 수준 최적화)**\n  - 목적/task: 멀티모달 어텐션 연산과 커널 실행 비용을 줄여 연산 효율을 극대화하는 것이 목적.\n  - 입력→출력: 입력: vision/language/action 멀티모달 융합 시퀀스(근본적으로 sparse attention 형태) → 출력: 최적화된 attention 연산 + fusion된 커널(낮은 launch overhead, 높은 memory bandwidth 활용). (정확한 shape은 본문 미명시)\n  - 내부: (a) FlexAttention — vision/language/action 멀티모달 융합이 본질적으로 sparse attention이므로 FlexAttention으로 해당 연산을 최적화. (b) torch.compile 기반 operator fusion — 커널 launch 오버헤드 감소 및 메모리 대역폭 활용 극대화.\n\n**구조 정리** (노트 — 논문 그림이 세부 흐름을 안 보여줄 때 보완)\n\n```\n4.2 Training Efficiency Optimization (본문 근거 기반 구조도)\n\n[고빈도 action 데이터 + VLA 학습 부하]\n (parameters / optimizer states / gradients,  vision|language|action 시퀀스)\n                 |\n                 v\n+===============================================================+\n|         Training Efficiency Pipeline (고효율 학습 파이프라인)   |\n+===============================================================+\n        |                                   |\n        v                                   v\n+---------------------------+      +-------------------------------+\n| (1) Distributed Strategy  |      | (2) Operator-Level Optim.     |\n| 목표: mem footprint 최소 +|      | 목표: 멀티모달 attention 및   |\n|       comm. overhead 억제 |      |       kernel 비용 최소화      |\n+---------------------------+      +-------------------------------+\n   |        |          |                 |              |\n   v        v          v                 v              v\n[FSDP]   [HSDP]   [mixed precision] [FlexAttention] [torch.compile\n(=ZeRO   action    reduce: fp32      sparse multi-   operator fusion]\n PyTorch  expert    storage/comm:    modal attn      -> kernel launch\n impl)    전용      bf16             최적화           overhead down\nshard:    shard                                       -> mem bandwidth\n - opt    group                                          util up\n   states (통신\n - params  over
