  <script>
  const MD = "# π0.7: a Steerable Generalist Robotic Foundation Model with Emergent Capabilities — Deep-Dive\n\n> **이 논문이 달성하려는 것**: 학습 시 **다양한 컨텍스트(subtask 지시 · subgoal 이미지 · episode 메타데이터 · control mode)를 프롬프트로 조건화**해, 별도 미세조정 없이 **즉시(out-of-the-box)** 다양한 환경·작업·로봇에서 정밀하게 **조종(steer)** 가능한 일반화 로봇 파운데이션 모델. 핵심 = \"어떻게 입력 프롬프트를 구성하느냐\"로 모델을 정밀 제어.\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2604.15483v1 · 2026-04-16 |\n| 저자/소속 | Physical Intelligence (Levine·Finn·Hausman·Pertsch·Black 등 ~90명) |\n| 코드/프로젝트 | https://pi.website/pi07 |\n| 계보 | π0(2410.24164) → π0-FAST → π0.5(2504.16054) → π0.6/π*0.6(RECAP) → π0.6-MEM → **π0.7** |\n\n> 읽는 법: 이 노트의 **§5(프롬프트 구성)**가 핵심 — π0.7의 정체성이 \"프롬프트를 어떻게 짜서 모델을 조종하나\"이기 때문. 공통 용어(flow matching·action expert·MoT·VLM 구조·BAGEL)는 [basic_theory.md](basic_theory.md) 참조.\n\n---\n\n## 0. 한 줄 요약 (Abstract + Introduction)\n\n### Abstract — 무엇을 주장하나\n- **주장**: π0.7은 \"광범위한 시나리오에서 강력한 **out-of-the-box** 성능\"을 내는 새 로봇 파운데이션 모델이다. 구체적으로 ① 처음 보는 환경에서 다양한 언어 지시 수행(주방 가전 다루는 다단계 작업 포함), ② **zero-shot cross-embodiment**(빨래 접기를 한 번도 학습 안 한 로봇으로 전이), ③ 에스프레소 머신 조작 같은 고난도 작업을 **RL로 특화 fine-tune한 전문가 모델 수준**으로 수행.\n- **방법의 핵심 한 줄**: 학습 때 \"**diverse context conditioning**\" — 언어 명령 + strategy metadata + subgoal 이미지라는 멀티모달 정보로 조건화. 이 덕분에 \"시연 데이터 + (실패 포함) 준최적 자율 데이터 + 비로봇 소스 데이터\"까지 **폭넓은 데이터를 그냥 섞어 써도** 성능이 오른다.\n\n### Introduction — 문제의식의 흐름(문단별)\n1. **출발 전제**: 파운데이션 모델의 일반성은 \"크고 다양한 데이터로 학습하면 일반 능력이 창발한다\"는 원리에서 온다. LLM은 지식을 **조합(compositional generalization)** 해 새 문제를 푼다 — 새 포맷 적용, chain-of-thought 추론 등.\n2. **로봇의 현실**: 이 조합적 일반화가 \"일반 능력의 초석\"인데 **physical intelligence(로봇) 영역에선 잡기 어려웠다**. 기존 VLA는 크기·성능은 컸지만 새 task로 일반화하거나 스킬을 새롭게 재조합하는 능력이 제한적. 심지어 **학습한 지시조차 task별 fine-tune 없이는 유창하게 수행 못 하는 경우**가 많았다.\n3. **π0.7의 위치**: \"강한 조합적 일반화의 징후\"를 보인다 — 다양한 언어 지시 따르기 + 특화 모델급 dexterity + 이 행동들을 새 방식으로 조합.\n4. **이걸 가능케 한 재료**: 여러 로봇의 **다양한 전략 데이터** + 자율 실행에서 나온 **준최적/실패 데이터**(RL 사후학습 에이전트가 만든 것 포함) + 사람 작업 비디오 + 인터넷 일반 멀티모달 데이터.\n5. **핵심 난점**: 이 데이터를 **그냥(naïvely) 쓰면 실패한다.** 전략·수행 품질이 제각각인 예시를 섞으면 모델이 여러 mode를 **평균 내버려** 준최적 결과를 낸다.\n6. **해법**: 데이터에 \"**무엇을 할지뿐 아니라 어떻게 할지**\"까지 담은 상세 컨텍스트를 라벨링하고, 이를 멀티모달 조건 신호로 모델에 준다 — 상세 언어 라벨 + strategy metadata + subgoal 이미지.\n7. **왜 텍스트만으론 부족한가**: 이미지/비디오 생성 모델은 \"prompt expansion\"으로 품질을 올린다. 하지만 로봇에선 **텍스트 캡션만 더 다는 것으로는 부족** — 성공·숙련도를 가르는 요소가 더 미묘하거나(에피소드 전체 품질 같은), 애초에 언어로 표현하기 어렵다. 그래서 **episode quality(strategy metadata) · control modality · subgoal 이미지**를 프롬프트에 추가한다.\n\n> **창발 능력 4종(Intro가 약속하는 것)**: ① out-of-the-box 장기과제(에스프레소·빨래·쓰레기 배출·상자 접기·채소 껍질 벗기기) 무-사후학습 수행, ② 처음 보는 환경에서 instruction following + 복잡·비정형 지시 일반화, ③ zero-shot cross-embodiment(t-shirt 접기를 학습 안 한 로봇으로, 그 로봇 첫 시도 전문가 텔레옵 수준), ④ 스킬을 새로 조합하는 compositional task generalization.\n> **핵심 시너지 주장**: 다양한 데이터 × 상세 컨텍스트는 **상승작용**한다 — 상세 컨텍스트가 있으면 혼합 품질·비표준 데이터가 성능을 **해치지 않고** 오히려 **끌어올린다**.\n\n---\n\n## 1. Related Work (§II) — 세 갈래로 자기 위치 잡기\n\n**(1) Generalist robot manipulation policies.** 일반화 로봇 정책 연구는 방대하다. 처음부터 학습하기도 하지만 보통 **사전학습 VLM 또는 사전학습 비디오 생성 모델로 초기화**한다. VLA의 아키텍처 구성요소로 **memory · 장기과제용 hierarchy · goal-image conditioning**가 개별 연구돼 왔는데, π0.7은 **이 셋을 한 모델에 다 통합**한다(π0.6-MEM 위에 구축). 또 로봇 시연뿐 아니라 **web 데이터 · 사람 egocentric 비디오 · 자율 로봇 경험**을 사전학습에 넣는 이점도 알려져 있었고, π0.7은 이를 **전부 결합** + 상세 프롬프팅을 더해 조합적 일반화의 징후를 얻는다.\n\n**(2) Generalization across tasks and embodiments.** 환경·물체·배경뿐 아니라 **새 task·새 embodiment**로의 일반화를 노린 연구들 — 사람 비디오 활용(표현학습/직접 motion 지도/2D point track 추출), 인터넷 사전학습 모델을 학습·추론에 직접 활용, 대규모 cross-embodiment 로봇 데이터셋, 여러 embodiment로 일반화되는 **전용 수집 디바이스** 등. π0.7의 입장: **올바른 프롬프팅**이면 다양한 로봇·사람·인터넷 데이터를 활용해 task·embodiment 일반화가 가능하다.\n\n**(3) Prompting robots with subgoal images.** π0.6-MEM 대비 핵심 추가가 **(생성된) goal 이미지로 프롬프팅**하는 능력이다. goal 이미지/비디오 조건화는 많은 선행연구가 있다 — 사용자 제공 이미지, 별도 모델이 생성한 goal 이미지(또는 chain-of-thought식), 혹은 이미지/비디오 생성을 정책 **학습 목표에 통합**해 표현을 개선. **저자의 차별점 선언**: \"새 아키텍처/모델 설계를 제안하는 게 아니라, VLA가 **더 다양한 데이터 소스를 활용하게 하는 방법론**과, 그것이 조합적 일반화로 이어진다는 **실증 분석**을 제시한다.\" 그리고 결과가 선행연구의 정량 개선을 **크게 상회** — dexterous skill(빨래 접기)의 zero-shot 로봇 간 전이, air fryer 조작 같은 새 물체 상호작용 일반화까지.\n\n> 한 줄: **\"우리는 새 모델이 아니라 새 레시피(데이터+프롬프트)를 판다\"** — 이 자기규정이 §5(프롬프트)와 §6(레시피)에서 그대로 증명된다.\n\n---\n\n## 2. Flow-Based VLA — 토대 (§III), 문단별 + 수식 쉬운 설명\n\nπ0.7은 **사전학습 VLM 백본에서 출발해 로봇 제어용으로 적응**시킨 flow-based VLA다. 토대를 문단 단위로:\n\n1. **데이터의 정의.** 학습 데이터 $\\mathcal{D}$는 로봇 trajectory들 — 관측 $\\mathbf{o}_t$와 행동 $\\mathbf{a}_t$의 시퀀스. 관측은 $\\mathbf{o}_t = [\\mathbf{I}_t^1, \\dots, \\mathbf{I}_t^n, \\mathbf{q}_t]$로, $n$개 카메라 이미지 $\\mathbf{I}_t^i$와 로봇 관절 상태 $\\mathbf{q}_t$. 행동 $\\mathbf{a}_t$는 관절(joint) 또는 end-effector 명령.\n2. **무엇을 예측하나(action chunk).** VLA는 보통 한 스텝이 아니라 **action chunk** $\\mathbf{a}_{t:t+H}$(앞으로 $H$스텝짜리 짧은 미래 궤적)를 **최근 관측 이력** $\\mathbf{o}_{t-T:t}$로부터 예측한다. 이 chunk는 **action expert**(VLM 백본에 attend하는 작은 transformer)가 생성해 추론을 빠르게 한다. action expert는 보통 **flow matching(또는 diffusion)** 목적을 써서 로봇 행동의 **multi-modality**(같은 상황에서 여러 정답 행동)를 포착.\n3. **Knowledge Insulation(KI) 레시피.** 좋은 표현을 위해 백본을 **FAST 토큰으로 지도**하고, action expert는 백본의 모든 활성에 attend하되 **action expert의 gradient는 백본으로 흘러들지 않게 차단**한다. 그러면 VLM은 상대적으로 **안정적인 이산 cross-entropy loss**로만 학습돼 표현이 망가지지 않는다. (→ flow matching의 노이즈 많은 gradient가 VLM을 오염시키는 걸 막는 장치.)\n4. **컨텍스트의 도입.** 각 학습 예시엔 **prompt/context** $\\mathcal{C}_t$가 붙는다. 관행적으로는 언어 지시 하나, 즉 $\\mathcal{C}_t = (\\ell_t)$ (\"clean up the kitchen\" 같은 사람 주석). **π0.7의 출발점이 바로 이 $\\mathcal{C}_t$를 풍부하게 만드는 것.**\n\n**학습 목적식:**\n\n$$\n\\max_\\theta\\ \\mathbb{E}_{\\mathcal{D}}\\big[\\log \\pi_\\theta(\\mathbf{a}_{t:t+H}\\mid \\mathbf{o}_{t-T:t},\\ \\mathcal{C}_t)\\big]\n$$\n\n> **쉬운 풀이**: \"데이터에서 뽑은 (관측 이력 $\\mathbf{o}_{t-T:t}$, 컨텍스트 $\\mathcal{C}_t$)가 주어졌을 때, **실제로 일어난 미래 행동 청크 $\\mathbf{a}_{t:t+H}$에 모델이 높은 확률을 주도록** 파라미터 $\\theta$를 키운다.\" 즉 **조건부 행동 예측**의 최대우도. 단, **flow matching action expert는 닫힌 형태의 정확한 log-likelihood가 아니라 그 근사 하한(lower bound)을 최적화**한다(diffusion류의 ELBO와 같은 사정). 그래서 위 식은 \"개념적 목표\"이고 실제 손실은 flow matching loss.\n\n5. **데이터의 비표준성.** $\\mathcal{D}$는 보통 고품질 사람 시연이지만, π0.7은 **실패 에피소드 + 준최적 자율 rollout + egocentric 사람 비디오**까지 넓게 쓴다. 논문의 메시지: **충분히 상세하고 정보가 풍부한 $\\mathcal{C}_t$를 주면** 이렇게 다양한 데이터를 흡수할 수 있고, 놀랍게도 **정책 성능·일반화가 오히려 좋아진다**.\n\n→ action expert·flow matching·action chunk의 내부 수식 디테일은 [basic_theory.md](basic_theory.md#action-expert) 참조. **π0.7의 신규성은 토대가 아니라 $\\mathcal{C}_t$ 구성(§5)에 있다.**\n\n---\n\n## 3. π0.7 Overview — 전체 아키텍처 (§IV, Figure 2)\n\n**한 문장 정의**: π0.7 = **5B 파라미터 VLA** = ① **4B VLM 백본**(Gemma3, 400M 비전 인코더 포함) + ② **MEM-style video history encoder** + ③ **860M action expert**.\n\n**문단별 정리**\n- **비전/히스토리 압축**: 비전 인코더는 history 관측에 **temporal + spatial 압축**을 적용해, **프레임 수가 몇이든 고정 개수의 토큰**으로 내보낸다 → 긴 history도 일정 비용으로 처리.\n- **백본**: Gemma3 4B VLM + 400M 비전 인코더.\n- **컨텍스트 확장이 핵심 변화**: 이전 버전들은 컨텍스트 = \"task에 대한 짧은 텍스트\" 하나였다. π0.7은 이를 **더 표현력 있는 언어 명령 + episode metadata + subgoal 이미지**로 확장 → **다양하고 준최적인 데이터로도 학습 가능**해진 결정적 차이.\n\n원본 그림 2 (전체 아키텍처 — 컨텍스트 모달리티가 모델로 들어가는 그림):\n원본 그림: [arXiv Figure 2](https://arxiv.org/html/2604.15483v1/x1.png)\n![](https://arxiv.org/html/2604.15483v1/x1.png)\n> Figure 2 (π0.7): 5B VLA = 4B VLM backbone + MEM-style video history encoder + 860M action expert. context = language commands + episode metadata + subgoal images(멀티모달). 런타임에 언어는 high-level 정책이, subgoal 이미지는 경량 world model(BAGEL 기반)이 생성.\n\n**모듈 분해 (top-down)**\n- **A) VLM 백본 (4B, Gemma3)** — 목적: 이미지·언어·컨텍스트를 이해하는 의미 두뇌. 입력: 멀티뷰 이미지 + 전체 프롬프트 $\\mathcal{C}_t$(언어·메타데이터·subgoal 이미지 토큰) → 출력: action expert가 attend할 시맨틱 latent.\n- **B) MEM-style video history encoder** — 목적: **과거 프레임을 기억**해 memory-필요 task(가린 물체, 이전 행동 추적)를 가능케. 입력: 과거 관측 프레임 시퀀스 → 출력: temporal/spatial로 압축된 고정 길이 history 표현(백본 컨텍스트에 합류).\n- **C) Action expert (860M)** — 목적: 시맨틱 맥락을 **연속 행동**으로 변환. 입력: proprioception $\\mathbf{q}_t$ + noisy action $\\mathbf{a}_t^\\tau$ (+ 백본 attention) → 출력: action chunk $\\mathbf{a}_{t:t+H}$ (flow matching). → [basic_theory#action-expert](basic_theory.md#action-expert).\n- **D) (런타임 보조) 경량 world model** — 목적: subgoal **이미지** 생성. 입력: 현재 관측 + subtask(+metadata) → 출력: 멀티뷰 미래 목표 이미지(BAGEL 14B 기반). → §5-B, §6-C.\n\n---\n\n## 4. ★ Diversifying the Prompt — 입력 프롬프트를 어떻게 만드나 (§V, 핵심)\n\n> 사용자 주목 포인트. **π0.7의 정체성이 여기 있다.** 프롬프트 구성 = Figure 3(Prompt overview)에 한 장으로 요약. (전체 아키텍처는 Fig 2, 프롬프트 구성 도식은 **Fig 3**.)\n\n원본 그림 3 (Prompt overview — 프롬프트 구성):\n원본 그림: [arXiv Figure 3](https://arxiv.org/html/2604.15483v1/x2.png)\n![](https://arxiv.org/html/2604.15483v1/x2.png)\n> Figure 3 (π0.7): 프롬프트는 **subtask instructions + subgoal images + episode metadata** 등 다중 모달리티로 구성. 각 컴포넌트를 **dropout으로 학습** → 테스트 시 유연하게 조합. 예: UR5e 양팔로 셔츠 접기엔 **subgoal image + metadata** 프롬프팅을 쓴다.\n\n전체 프롬프트 $\\mathcal{C}_t$는 아래 4개 컴포넌트를 결합한 것. 하나씩 문단 단위로.\n\n### V-A. Subtask Instructions $\\hat\\ell_t$\nπ0.5의 방식을 계승: 전체 task 설명 $\\ell_t$ 위에, **다음 의미적 하위작업을 담은 중간 수준 텍스트** $\\hat\\ell_t$를 프롬프트에 추가한다.\n- 예: 전체 $\\ell_t$=\"clean up the kitchen\" 위에 $\\hat\\ell_t$=\"open the fridge door\".\n- 이 중간 텍스트가 **단계별 코칭(verbal coaching)**을 가능케 한다. 추론 때 $\\hat\\ell_t$는 **학습된 high-level 정책**이 생성하거나, **사람이 실시간으로** 줄 수도 있고, **생략**할 수도 있으며, 시간에 따라 바뀐다.\n- 데이터는 다양한 task/시나리오의 segment마다 **상세 텍스트 설명**을 단 것. 사람이 말로 코칭해 가며 모델에게 \"sweet potato를 air fryer에 넣기\" 같은 새 작업을 단계적으로 시킬 수 있다.\n\n### V-B. Subgoal Images $\\mathbf{g}_t$\n**텍스트보다 강한 목표 명세**: subgoal 이미지는 \"성공적으로 진행됐을 때 **세상이 어떻게 보여야 하는가**\"를 이미지로 보여줘, 텍스트보다 풍부하게 목표를 규정한다.\n- **멀티뷰 형태**: $\\mathbf{g}_t = [G_t^1, \\dots, G_t^n]$, $G_t^i$ = 카메라 $i$의 원하는 near-future 이미지. **base view**는 환경·물체 중심 결과(어디에 무엇이 놓이는지)를, **wrist view**는 팔/그리퍼 결과(어떻게 잡는지)를 표현하기 좋다 → 두 종류 결과를 **동시에 규정**.\n- **왜 좋은가**: 텍스트로 표현하기 어려운 \"문을 정확히 어떻게 잡고 여는지\"까지 **disambiguate** → language following·일반화 향상.\n- **런타임 생성**: subgoal 이미지는 **경량 world model**이 만든다. 이 world model은 main 모델과 **같은 $\\hat\\ell_t$를 입력**받지만 **web-scale 사전학습**의 이점을 가진다(처음 보는 task도 일반화).\n\n**world model 학습 목적식:**\n\n$$\n\\max_\\psi\\ \\mathbb{E}_{\\mathcal{D}_g}\\big[\\mathcal{L}_{\\text{CFM}}\\big(\\mathbf{g}_t^\\star,\\ g_\\psi(\\mathbf{o}_t,\\hat\\ell_t,m)\\big)\\big]\n$$\n\n> **쉬운 풀이**: world model $g_\\psi$는 (현재 관측 $\\mathbf{o}_t$, subtask $\\hat\\ell_t$, metadata $m$)을 받아 **미래 목표 이미지를 생성**한다. $\\mathcal{L}_{\\text{CFM}}$은 **conditional flow matching loss** — \"생성한 이미지\"가 \"실제 미래 목표 이미지 $\\mathbf{g}_t^\\star$\"에 가까워지도록 (노이즈→이미지 변환 벡터장을 맞추는) 손실. 정답 $\\mathbf{g}_t^\\star$는 **그 segment의 끝 관측**으로 둔다($\\mathbf{g}_t^\\star=\\mathbf{o}_{t_\\text{end}}$). 데이터 $\\mathcal{D}_g$는 **고품질로 주석된 segment**들. 초기화는 **BAGEL**(14B mixture-of-transformers, 이미지 이해·편집·생성 가능). 즉 \"현재 장면을 보고 subtask대로 진행됐을 때의 미래 장면을 그려내는 화가\"를 BAGEL에서 출발해 로봇 데이터로 미세조정한 것.\n\n### V-C. Episode Metadata $m$\n저품질·실패·자율수집 데이터까지 폭넓게 학습하되, **테스트 시 최적 동작을 끌어내는 라벨**. 세 속성:\n- **Overall speed**: 에피소드 길이(timestep). **500스텝 간격으로 이산화**(예: 1750~2250 → \"2000\"). 보통 빠를수록 고품질.\n- **Overall quality**: 수행 품질을 **1~5점**(5가 최고)으로.\n- **Mistake**: 주어진 action segment 안에서 로봇이 **실수했는지**(잡기 실패·잘못된 subtask)를 사람이 라벨.\n- π0.7은 이 셋을 **ground-truth speed + 사람 수동 주석(quality·mistake segment)**으로, 다양한 데이터 혼합에서 학습한다. → 추론 시 \"빠르게·고품질(5점)·실수 없이\" 하라고 프롬프트하면 **데이터에 섞인 저품질을 흉내내지 않고** 최선의 mode를 뽑아낸다.\n\n### V-D. Control Mode $c$\n텍스트 식별자 $c \\in \\{\\text{joint}, \\text{ee}\\}$로 **joint 제어 vs end-effector 제어** 공간을 표시. cross-embodiment에서 중요 — **런타임에 task에 맞는 제어 모드를 골라** 프롬프트할 수 있다.\n\n### V-E. Full Prompt + Dropout (★ 유연 조합의 비결)\n**전체 프롬프트 예시(논문 그대로):**\n```\n<Multi-view observation><Multi-view subgoals> Task: peel vegetables. Subtask: pick up the peeler. Speed: 8000. Quality: 5. Mistake: false. Control Mode: joint.<Proprioception>\n```\n학습 때 **각 컴포넌트를 다른 비율로 dropout** → 테스트 때 **임의 부분집합**으로 프롬프트해도 동작:\n- **subgoal image**: 배치의 **25%**에만 포함. (subgoal을 주면 action 예측이 \"현재→미래 프레임 사이의 **inverse dynamics**\"로 쉬워져 학습이 빨라지므로, **과의존 방지**로 25%로 제한.)\n- subgoal image가 있는 예시에선 **subtask instruction $\\hat\\ell_t$를 30% drop**(시각 subgoal이 더 풍부한 텍스트 대체재이니까).\n- **episode metadata**: 통째 **15% drop** + 각 항목(speed/quality/mistake) **각 5% drop**.\n- **control mode**: dropout **안 함**(항상 제공).\n\n> **이 dropout이 핵심인 이유**: 한 모델이 \"텍스트만 / 이미지만 / 둘 다 / 메타만\" **어떤 조합으로 프롬프트해도** 동작하게 만든다. 게다가 학습 때 각 항을 끄고도 학습했으니, 추론 때 **classifier-free guidance(CFG)**로 그 항을 강조할 수 있는 토대가 된다(→ §6 런타임).\n\n### 🔧 한눈에 보이는 프롬프트 구성 흐름 (worked example)\n예: **\"clean the kitchen\"** 작업, 처음 보는 부엌, UR5e 양팔.\n```\n[전체 task]  ℓ_t = \"clean the kitchen\"\n      │\n      ▼  (high-level 의미 정책: 같은 아키텍처)\n[subtask]    ℓ̂_t = \"open the fridge door\"            ← V-A\n      │\n      ├─►(경량 world model = BAGEL 기반)──► [subgoal image] g_t = 멀티뷰 \"냉장고 문 열린 near-future\" ← V-B\n      │\n      ├─► [episode metadata] m = { speed:\"2000\", quality:5, mistake:false } (\"빠르게·고품질로\") ← V-C\n      │\n      └─► [control mode] = end-effector                ← V-D\n      ▼\n[full prompt C_t] = ℓ_t ⊕ ℓ̂_t ⊕ g_t ⊕ m ⊕ control     ← V-E (학습 땐 각 항 dropout)\n      │\n      ▼  π0.7 (4B VLM + MEM history + 860M action expert, flow matching)\n[action chunk A_t]  →  로봇 실행\n```\n- **셔츠 접기(UR5e) 예(Fig 3 캡션)**: 이 경우엔 **subgoal image + metadata**만 프롬프트 — 텍스트 subtask 없이도 \"접힌 셔츠\" 목표 이미지 + \"고품질\" 메타로 정밀 조종.\n- **핵심 직관**: dropout 덕에 상황에 맞춰 **가장 잘 통하는 컨텍스트로 steer**.\n\n---\n\n## 5. 모델 & 학습 레시피 (§VI) — 본문 핵심 ①\n\n> 이 장의 메시지: **\"같은 토대(π0.6-MEM)라도, 데이터를 어떻게 모으고 어떻게 라벨링·조건화하느냐\"**가 π0.7을 만든다. 아키텍처 자랑이 아니라 **레시피** 장.\n\n### VI-A. Training datasets — 무엇을, 왜 이렇게 섞나 (문단별)\n1. **데이터 출처의 폭.** 여러 로봇 플랫폼(static·mobile·single-arm·bimanual)의 **사람 시연** + **자율 정책 평가 데이터**(이전 모델이 평가 돌릴 때 나온 rollout) + **사람 개입(intervention)** 데이터 + 오픈소스 로봇 데이터셋 + **egocentric 사람 비디오** + web 비로봇 데이터(visual QA·텍스트 예측). → 한마디로 \"**깨끗한 시연만\"이 아니라 손에 잡히는 건 다 넣는다**.\n2. **핵심 차별 = 준최적 데이터를 일부러 쓴다.** 저품질 시연(**실패 에피소드**, 실수 많은 성공) + **이전 버전 모델들이 평가 중 수집한 데이터**까지 학습에 포함. 보통은 이런 걸 버리는데, π0.7은 **버리지 않고 metadata로 품질을 라벨링**해서 쓴다.\n3. **왜 그게 되나(=distillation 관점).** episode metadata가 \"이 예시는 품질 몇 점짜리\"인지 **꼬리표를 달아 disambiguate**하므로, 모델은 좋은 예시와 나쁜 예시를 **헷갈려 평균 내지 않고** 구분해 배운다. 결과적으로 generalist π0.7이 여러 **RL 특화 전문가**의 능력을 한 모델로 **흡수(distill)**하면서도, 다양 데이터 덕에 **넓은 일반화**를 유지.\n   > **쉽게**: 잡탕 데이터를 그냥 먹이면 \"그저 그런 평균 로봇\"이 된다. 각 데이터에 \"이건 A급/이건 실패\" 딱지를 붙여 먹이면, 추론 때 \"A급처럼 해\" 하고 시킬 수 있어 **잡탕이 오히려 자산**이 된다.\n\n### VI-B. Model architecture — 입력이 모델에 어떻게 꽂히나 (문단별)\n1. **전체 규모.** 4B Gemma3 VLM(400M 비전 인코더 포함) + MEM video history encoder(temporal·spatial 압축) + **860M flow-matching action expert** ≈ **총 5B**.\n2. **시각 입력.** 카메라 최대 **4개**(front · wrist 2 · optional rear), 각 **최대 6 history 프레임**, 거기에 **subgoal 이미지 최대 3장**, 전부 **448×448**로 리사이즈. history 프레임은 **1초 간격(stride)**으로 샘플. 학습 때 **전체 history를 30% 확률로 drop**, **rear view도 30% 확률로 drop**(특정 입력에 과의존 방지 + 그 입력이 없는 런타임에도 대비).\n3. **attention mask(block-causal) — 누가 누구를 보나.** 관측 토큰끼리, 그리고 subgoal 이미지 토큰끼리는 **양방향(bidirectional)**으로 서로 본다. goal-image 토큰은 관측까지 추가로 본다. **텍스트 토큰만 causal**(앞쪽만 봄). proprioception($\\mathbf{q}_t$)은 선형 사영으로 백본 차원에 올리고 **history state마다 개별 토큰**으로 넣는다.\n   > **쉽게**: 이미지는 \"전체를 한눈에 봐야\" 이해되니 양방향, 글자는 \"왼→오 순서로 읽고 쓰는\" 것이라 causal. 그래서 모달리티마다 보는 범위를 다르게 준 것.\n4. **action expert(860M).** 연속 행동을 flow matching으로 생성. 노이즈 시각 정보(τ)는 **adaptive RMSNorm**으로 주입 — 정규화 스케일에 \"지금 얼마나 노이즈 낀 단계인지\"를 실어 모델이 단계를 인지하게 한다. 행동은 **고정 50토큰 = 50스텝 chunk**, 토큰 간 양방향, 백본 활성에 attend.\n5. **지연 강건성(RTC).** **real-time action chunking** 학습 구현으로 **0~12 timestep 지연**(50Hz에서 최대 **240ms**)을 일부러 시뮬레이션해 학습.\n   > **쉽게**: 실제 로봇은 추론에 시간이 걸려 \"방금 계산한 행동\"이 **살짝 늦게** 도착한다. 학습 때 미리 그 지연 상황을 흉내내 두면, 실전에서 명령이 늦어도 **버벅임 없이** 이어 붙는다.\n\n### VI-C. Training with subgoal images — world model을 어떻게 학습하나 (문단별)\n1. **다양한 goal을 수용하도록.** 학습 때 goal로 쓰는 미래 이미지의 **지연·품질을 일부러 다양하게** 한다(심지어 생성된 이미지도 섞음) → 런타임에 world model이 만든 불완전한 subgoal에도 강건.\n2. **goal 샘플링 규칙.** 확률 **0.25**로 **segment 끝 이미지**를, 확률 **0.75**로 **0~4초 앞의 미래 이미지를 균등 샘플**해서 goal로 쓴다. 추가로 일부 예시는 **world model이 생성한 subgoal**을 진짜 미래 이미지 자리에 넣어 **train-test mismatch**(학습 땐 진짜, 추론 땐 생성 이미지라 생기는 괴리)를 줄인다.\n3. **world model 목적식(재게재).**\n\n$$\n\\max_\\psi\\ \\mathbb{E}_{\\mathcal{D}_g}\\big[\\mathcal{L}_{\\text{CFM}}\\big(\\mathbf{g}_t^\\star,\\ g_\\psi(\\mathbf{o}_t,\\hat\\ell_t,m)\\big)\\big],\\qquad \\mathbf{g}_t^\\star = \\mathbf{o}_{t_\\text{end}}\n$$\n\n   > **쉬운 풀이**: $g_\\psi$가 (현재 관측·subtask·metadata)로 **미래 장면을 그리게** 학습. 정답 미래 이미지 $\\mathbf{g}_t^\\star$ = **그 segment의 끝 관측**. $\\mathcal{L}_{\\text{CFM}}$(conditional flow matching)으로 생성 이미지를 정답에 맞춘다. $\\mathcal{D}_g$는 **고품질 주석 segment**만(나쁜 미래를 그리게 하면 안 되니까).\n4. **초기화 = BAGEL.** 14B **mixture-of-transformers** 이미지 생성·편집 모델에서 출발. **web 데이터 + egocentric 사람 비디오 + 기타 비디오**로 증강 → 의미·물리 개념(예: \"문이 열린 모습\", \"껍질이 벗겨진 채소\")을 이미 알고, 그 지식을 **생성된 subgoal 이미지를 통해 π0.7로 흘려보낸다**.\n   > **쉽게**: π0.7 본체는 로봇 데이터만 봤지만, world model은 **인터넷 비디오로 세상을 본** 모델이다. 그래서 π0.7이 처음 보는 task도, world model이 \"이렇게 되면 성공\"이라는 그림을 그려주면 본체가 그 그림을 따라가 **일반화**된다.\n\n> ⚠️ 데이터 mix의 정확한 비율·총 학습 step·world model 세부 loss 항(τ 분포 등)은 본문 캡션 범위 밖 — 정밀 수치는 논문 §VI·Appendix 대조.\n\n---\n\n## 6. 런타임 프롬프팅 (§VII) — 본문 핵심 ② : 추론 때 컨텍스트를 어떻게 채우나\n\n> 이 장의 메시지: 학습 때 dropout으로 \"어떤 컨텍스트 조합이든 받게\" 만들어 놨으니, **추론 때는 그 컨텍스트에 '최선의 값'을 박아 넣어 모델을 원하는 방향으로 민다.** π0.7은 **task별 사후학습 없이** 모든 task에 같은 규칙으로 컨텍스트를 채운다:\n- **Overall speed**: 그 task **에피소드 길이의 15th percentile** 값으로 설정.\n  > **쉽게**: \"상위 15% 빠른 시연만큼 빠르게 해\" 라는 주문. 평균이 아니라 빠른 쪽을 목표로 줘야 굼뜬 행동을 피한다(너무 극단값을 주면 불안정해서 15%선).\n- **Overall quality**: 항상 **5**(최고). → \"A급으로 해.\"\n- **Mistake**: 항상 **false**. → \"실수하지 마.\"\n  > **쉽게**: 학습 데이터엔 느리고·엉성하고·실수한 예시가 섞여 있다. 추론 때 \"빠르게·5점·무실수\"라고 못박으면 모델이 **그 좋은 mode만 골라** 흉내 낸다(나쁜 데이터를 학습한 게 오히려 \"이렇게 하면 안 돼\"의 대조군이 됨).\n- **Subtask $\\hat\\ell_t$**: **학습된 high-level 언어 정책**이 생성하거나 **사람 코칭**으로 제공(같은 아키텍처가 관측·task·과거 subtask 이력 → 다음 subtask).\n- **Subgoal 이미지**: **의미 의도가 바뀔 때(새 $\\hat\\ell_t$)** 또는 **마지막 생성 후 Δ=4초 경과** 중 먼저 오는 시점에 갱신.\n  > **쉽게**: 이미지 생성은 무거우니 매 스텝 새로 그리지 않는다. \"할 일이 바뀌었거나(새 subtask) 4초 지났을 때만\" 다시 그려서 비용을 아낀다.\n\n**비동기 추론(Algorithm 1)**: 시각 subgoal 생성 · subtask 생성은 **별도 스레드**에서 돌고, VLA 추론은 **가장 최신 컨텍스트**를 사용. 모델은 **5 denoising step**으로 **50스텝 action chunk**를 만들고, chunk당 $\\hat H \\in \\{15, 25\\}$ 스텝을 실제 실행(나머지는 다음 chunk로 갱신).\n\n**Classifier-Free Guidance(CFG)**: 모든 프롬프트 항을 dropout으로 학습했으므로, 추론 때 임의 항에 CFG를 걸 수 있다. action denoising은:\n\n$$\n\\nabla_{\\mathbf{a}}\\log\\pi_\\theta(\\mathbf{a}_{t:t+H}\\mid\\mathbf{o}_t,\\mathcal{C}_t)\\ +\\ \\beta\\big(\\nabla_{\\mathbf{a}}\\log\\pi_\\theta(\\mathbf{a}_{t:t+H}\\mid\\mathbf{o}_t,\\mathcal{C}_t)-\\nabla_{\\mathbf{a}}\\log\\pi_\\theta(\\mathbf{a}_{t:t+H}\\mid\\mathbf{o}_t,\\mathcal{C}_t^{\\text{uncond}})\\big)\n$$\n\n> **쉬운 풀이**: denoising 방향(score)을 두 개 계산한다 — **컨텍스트 $\\mathcal{C}_t$를 준 것**과 **그 항을 비운 $\\mathcal{C}_t^{\\text{uncond}}$**. 둘의 차이는 \"그 컨텍스트가 행동을 **어느 방향으로 밀어내는지**\"다. 그 차이에 가중치 $\\beta$를 곱해 **더 세게 민다** → 컨텍스트의 영향을 증폭. $\\beta \\in \\{1.3, 1.7, 2.2\\}$, 주로 **episode metadata**에 적용해 \"고품질·빠른\" dexterous 수행을 **강하게 끌어낸다**. (β=0이면 일반 조건부 생성, β가 클수록 컨텍스트 과장.)\n\n### ★ 런타임 계층 파이프라인 — $\\hat\\ell_t$가 두 곳으로 fan-out\n\n핵심은 **subtask instruction $\\hat\\ell_t$가 \"허브\"**라는 것. 맨 처음 사용자가 전체 지시 $\\ell_t$를 주면, **high-level 정책**(저수준과 같은 아키텍처)이 그걸 받아 $\\hat\\ell_t$를 만들고, 이 **$\\hat\\ell_t$ 하나가 두 갈래로 동시에 흘러간다** — ① 저수준 π0.7의 프롬프트에 텍스트로 직접 더해지고, ② **world model에도 입력**돼 subgoal 이미지로 변환된 뒤 그 이미지가 다시 프롬프트에 합류한다.\n\n```\n[사용자 전체 지시]  ℓ_t = \"clean up the kitchen\"\n        │\n        ▼\n┌─────────────────────────────────────────────┐\n│ High-level 정책 (π0.7과 같은 아키텍처)        │\n│  입력: 관측 o_t + 전체 task ℓ_t + 과거 subtask 이력 │\n│  출력: 다음 subtask instruction  ℓ̂_t          │\n└─────────────────────────────────────────────┘\n        │\n        │  ★ ℓ̂_t = \"open the fridge door\"  (이 한 줄이 허브)\n        │\n        ├──────────────[갈래 ①: 텍스트로]──────────────┐\n        │                                              │\n        ▼                                              │\n┌────────────────────────────────────┐                │\n│ World Model g_ψ (BAGEL 14B 기반)     │                │\n│  입력: 현재 관측 o_t + ℓ̂_t + metadata m│                │\n│  출력: 멀티뷰 subgoal 이미지 g_t       │                │\n│  (의도 바뀌면=새 ℓ̂_t / 또는 Δ=4s마다 갱신)│                │\n└────────────────────────────────────┘                │\n        │  [갈래 ②: 이미지로] g_t                        │\n        ▼                                              ▼\n┌─────────────────────────────────────────────────────────────┐\n│ 저수준 π0.7 프롬프트  C_t =                                     │\n│   ℓ_t(전체) ⊕ ℓ̂_t(텍스트, 갈래①) ⊕ g_t(이미지, 갈래②)           │\n│            ⊕ m(speed15%·quality5·mistake false) ⊕ control mode │\n└─────────────────────────────────────────────────────────────┘\n        │\n        ▼  π0.7 (4B VLM + MEM history + 860M action expert, 5 denoising step, +CFG β)\n[action chunk A_t (50스텝)]  →  앞쪽 Ĥ∈{15,25}스텝만 실행 → 다시 위로 루프\n```\n\n- **왜 같은 $\\hat\\ell_t$를 양쪽에 주나**: world model이 \"main 모델과 **같은** subtask $\\hat\\ell_t$를 입력받는다\"는 게 논문의 명시 사항(§5-B). 즉 텍스트 목표와 시각 목표가 **같은 의도에서 갈라져 나와** 서로 정합(consistent)하도록 보장된다 — 텍스트는 \"무엇을\", 이미지는 \"어떻게 보여야 하는지\"를 같은 의도로 동시에 규정.\n- **비동기(Algorithm 1)**: high-level의 $\\hat\\ell_t$ 생성과 world model의 $g_t$ 생성은 **별도 스레드**에서 돌고, 저수준 π0.7은 **그 순간 가장 최신의 $\\hat\\ell_t$·$g_t$**를 컨텍스트로 써서 50Hz로 행동을 뽑는다. 그래서 느린 생성(특히 이미지 생성)이 저수준 제어 루프를 막지 않는다.\n- **한 줄 요약**: **instruction → (high-level) → $\\hat\\ell_t$ → {프롬프트에 직접 + world model→subgoal 이미지→프롬프트} → π0.7 → 행동.**\n\n---\n\n## 7. 실험 (§VIII–IX) — 본문 핵심 ③ : 무엇을·어떤 로봇으로·숫자로\n\n**실험 셋업(공통).**\n- **로봇 플랫폼**: 가벼운 **static bimanual**(논문의 \"BiPi\" 계열, 50Hz), 크고 무거운 **UR5e 양팔**(Robotiq 그리퍼, **20Hz**), **single-arm UR5e**, mobile 등. → 같은 모델을 **서로 다른 몸체**에 그대로 올려본다.\n- **baseline/변형**: 이전 세대 **π0.5·π0.6**, task별 **RL 특화 전문가 π0.6***, **SFT 특화 모델**. π0.7 변형으로 **π0.7(GC)** = 생성된 **subgoal 이미지로 조건화(goal-conditioned)**한 버전.\n- **용어 쉽게**: **success rate** = 끝까지 성공한 비율. **task progress** = 부분 점수(예: 셔츠를 절반 접었으면 50%). **throughput** = 단위 시간당 처리량(= 얼마나 **빠르고 끊김 없이** 해내나).\n\n### IX-A. Out-of-the-box dexterity — 특화 RL 모델과 맞붙기\n- **과제**: 에스프레소 제조, 상자 만들기(box building), 빨래 접기, 쓰레기봉투 교체, 주키니 썰기, 채소 껍질 벗기기. 전부 **무-사후학습**으로.\n- **결과(Fig 6)**: π0.7이 **task별 RL 전문가(π0.6*)와 대등한 성능**. 특히 **어려운 빨래·상자 만들기에선 throughput(처리율)에서 전문가를 능가** — 즉 비슷한 성공률을 **더 빠르게** 낸다.\n  > **의미**: 보통 \"하나의 task에 RL로 특화시킨 모델\"이 generalist보다 세다. π0.7은 **특화 안 하고도** 그 수준이고, 속도는 더 낫다는 게 핵심 주장.\n- **Memory-필요 과제(Fig 8)**: 이전 상황을 기억해야 푸는 과제에서 **fine-tuned 특화 메모리 정책과 비슷하거나 더 나음**(MEM video encoder 효과).\n- **Ablation(Fig 7)**: **episode metadata 제거** 또는 **평가(자율) 데이터 제거** → 둘 다 성능 하락, **특히 throughput 격차가 가장 큼**. → metadata와 준최적 평가 데이터가 out-of-box 숙련도에 실제로 기여함을 입증.\n\n원본 그림: [arXiv Figure 7 (ablation)](https://arxiv.org/html/2604.15483v1/x6.png)\n![](https://arxiv.org/html/2604.15483v1/x6.png)\n> Figure 7: π0.7 vs (no-metadata) vs (no-eval-data) — 둘 다 빼면 떨어짐(특히 throughput).\n\n### IX-B. Instruction following — 처음 보는 환경에서 말 알아듣기\n- **환경 일반화(Fig 9)**: **처음 보는 부엌 4곳 + 침실 2곳**, 시나리오당 **3~6개 연속 open-ended 지시**, 총 **14 시나리오**. π0.7이 **π0.5·π0.6를 전반적으로 크게 상회**하며 높은 절대 성공률.\n- **복잡/referential 지시(Fig 10)**: 표준 지시 vs **비정형 지시**(\"내가 **수프 먹을 때 쓸 물건**을 집어\" 같은 우회·공간 참조). π0.7이 복잡 지시에서 **유의하게 우수**, 여기에 **subgoal 이미지(π0.7 GC)를 더하면 instruction following이 추가로 향상**.\n- **데이터 편향 깨기(Fig 11)**: 학습 데이터와 **반대로** 시키는 과제 — **\"Reverse Bussing\"**(쓰레기를 식기통에, 그릇을 쓰레기통에), **\"Reverse Fridge→Microwave\"**(평소 방향과 반대). π0.7이 prior 모델을 크게 상회. 특히 fridge→microwave 역방향은 **생성 subgoal(π0.7 GC)이 성공에 결정적**.\n  > **의미**: 보통 모델은 \"데이터에서 자주 본 방향\"으로 끌려간다(편향). 향상된 language following이 그 편향을 **지시대로 꺾는다** — 진짜 \"말을 따른다\"는 증거.\n\n### IX-C. Cross-embodiment transfer — 다른 몸체로 옮기기\n- **단순 재배치(Fig 12 좌)**: Table Setting / Bag In Backpack / Organize Tupperware / Shirt Bagging 등. 몸체 차이가 작으면 다들 잘하지만, **embodiment 격차가 커질수록 prior 모델은 무너지고 π0.7만 강건**.\n- **★ Dexterous 전이 = UR5e 셔츠 접기(Fig 12 우, 핵심 결과)**:\n  - **셋업**: 빨래 접기 데이터는 **가벼운 static bimanual에서만** 수집. 이걸 **더 크고 무거운 UR5e(20Hz)**에 **zero-shot**으로 올림 — UR5e용 빨래 데이터는 **0개**.\n  - **사람 baseline**: 숙련 텔레옵 **10명**(평균 **375시간**, 상위 2%)이 그 UR5e로 **처음** 셔츠 접기 시도 → **task progress 90.9% / success 80.6%**.\n  - **π0.7**: **task progress 85.6% / success 80%** → **그 로봇 처음 잡은 전문가 사람과 사실상 동급**. 여기에 subgoal 이미지(GC)를 더하면 더 오른다.\n- **전략 적응(Fig 13)**: 원본(양팔) 기법을 **그대로 복제하지 않고**, 대상 몸체에 맞는 **새 조작 전략**(예: 단일 팔 활용)을 스스로 찾아냄.\n  > **의미**: \"다른 로봇에 그대로 복붙\"이 아니라 **몸에 맞게 동작을 재발명** → 진짜 cross-embodiment 일반화.\n\n### IX-D. Compositional task generalization — 스킬을 새로 조합\n- **짧은 새 task(Fig 17)**: 밥솥에 쌀 푸기, 기어·탁상 선풍기 돌리기, 천으로 헤드폰·자 닦기 등 — **전용 로봇 데이터가 0인데도** out-of-box로 수행. **언어로 시키든 / 생성 이미지 goal로 시키든 성능이 거의 동등**(두 경로가 상호 보완).\n- **장기 과제 + 언어 코칭(Fig 15)**: air fryer에 고구마 넣기/꺼내기, 토스터로 베이글 굽기(행동 단위 학습 데이터 없음). 사람이 **\"고구마 집어\" → \"에어프라이어 열어\"** 식으로 단계 코칭하면 π0.7이 **prior보다 훨씬 잘 따라옴**. 생성 subgoal을 더하면 더 향상.\n- **코칭 → 자율화(Fig 16)**: 그 **코칭 지시들로 high-level 정책을 학습**시키면, **추가 텔레옵 데이터 없이** 만든 **자율 정책(π0.7 autonomous)이 코칭 수준에 근접** — 5개 unseen task에서 검증.\n  > **의미**: \"사람이 말로 가르친다 → 그 말 자체가 학습 데이터가 된다 → 다음엔 혼자 한다\"는 **저비용 신규 task 습득 루프**.\n\n### IX-E. Mixed-quality / diverse data — \"잡탕인데 더 좋아진다\"의 증명\n- **혼합 품질 스케일링(Fig 18 좌)**: 빨래(티셔츠·반바지) 데이터를 품질·속도 기준 **top 30% / 50% / 80% / 전체** 버킷으로. **metadata 없는 π0.7은 데이터가 늘수록(평균 품질↓) 오히려 나빠짐**. 반면 **metadata 있는 π0.7은 데이터가 늘수록 계속 향상** — metadata가 품질·전략을 **disambiguate**하기 때문.\n- **다양성의 가치(Fig 18 우)**: **\"가장 다양한 20% 제거\"** 모델은 **\"랜덤 20% 제거\"**보다 **유의하게 나쁨** → 성능은 그냥 양이 아니라 **task 다양성**에서 온다.\n  > **의미**: Intro의 \"다양 데이터 × 상세 컨텍스트 = 상승작용\" 주장을, **빼보는 실험(ablation)**으로 직접 입증한 장.\n\n---\n\n## 8. Discussion / Limitations (§X)\n\n- **강점 요약**: out-of-box dexterity(특화 모델급) + compositional 일반화(task 재조합) + 멀티모달 프롬프팅을 통한 **steerability**.\n- **한계(정직한 수치)**: **학습한 task는 90% 초과 성공률**이 흔하지만, **처음 보는 task / 처음 보는 task-로봇 조합은 60~80% 범위**.\n- **방법론적 고민**: 데이터가 크고 다양해지면 \"**무엇이 진짜 새로운가**\"를 판정하기 어렵다 — 모델이 조합적 일반화를 주로 **스킬 'remixing'**으로 달성하는 것일 수 있음을 저자도 인정.\n- **future work**: π0.7의 높은 steerability를 살려 **테스트 task 데이터로 효율적 학습**(상세 언어 코칭, 또는 **자율 RL**)을 더하는 방향.\n\n---\n\n## 한눈에 정리\n- π0.7 = π 계열 flow-matching VLA(5B: 4B Gemma3 VLM + MEM video encoder + 860M action expert) + **\"프롬프트를 다중 모달리티로 구성하고 dropout으로 학습\"**이라는 한 방. **새 아키텍처가 아니라 새 데이터+프롬프트 레시피**가 기여.\n- 프롬프트 = subtask 텍스트($\\hat\\ell_t$) + subgoal 이미지($\\mathbf{g}_t$, world model=BAGEL 생성) + episode metadata($m$=speed/quality/mistake) + control mode($c$). 각 항 dropout → 테스트 시 유연 조합 + **CFG로 증폭**하여 **steer**.\n- 학습 목적: 조건부 행동 예측 $\\max_\\theta \\mathbb{E}[\\log\\pi_\\theta(\\mathbf{a}\\mid\\mathbf{o},\\mathcal{C})]$ (flow matching 하한). world model: $\\max_\\psi\\mathbb{E}[\\mathcal{L}_{\\text{CFM}}(\\mathbf{g}^\\star, g_\\psi(\\mathbf{o},\\hat\\ell,m))]$.\n- 효과: out-of-the-box 정밀 조작(특화 RL 모델급, throughput은 능가), 강한 instruction following(편향 깨기), zero-shot cross-embodiment(UR5e 셔츠 접기 80% ≈ 사람 80.6%), memory task, mixed-quality 데이터로도 우상향 스케일링.\n\n## ⚠️ 확인 필요 / 나중에 (TODO)\n- [ ] §VI 정확한 데이터 mix 비율 · 총 학습 step · world model loss의 정확한 형태(τ 분포) — 본문·Appendix 대조 필요.\n- [ ] §IX 각 막대그래프(Fig 6·8·9·10·11·12·15·16·17·18)의 **개별 막대 수치**는 본문 텍스트에 안 나온 것이 많음 — 본 노트는 텍스트에 명시된 수치(셔츠 접기 85.6%/80% vs 사람 90.9%/80.6%, 14 시나리오·4부엌+2침실, 데이터 버킷 30/50/80/all 등)만 반영. 막대값 전체는 원본 그림 확인.\n- [ ] Algorithm 1(비동기 추론) 의사코드 세부, Appendix(attention pattern·추론 속도 최적화) 미반영.\n- [ ] 사용자가 \"Fig 2\"라 부른 프롬프트 그림은 arXiv v1 기준 **Fig 3(Prompt overview)** — 버전/판본에 따라 번호 다를 수 있음(둘 다 임베드함).\n- [ ] arxiv-mcp-server MCP는 **Claude Code 재시작 후** 활성 — 다음 세션부터 원문 직접 조회로 막대 수치 보강 가능.\n\n---\n## Source Provenance\n- Source: arXiv HTML (arxiv.org/html/2604.15483v1) — 본문 §0~§X 직접 fetch 후 문단 단위 재작성\n- Fetched: 2026-06-12 (본문 §VIII–IX 실험 수치 2차 보강), 1차: 2026-06-11\n- 신뢰도: Abstract·Intro·§II–§V는 본문 verbatim 기반(고신뢰). §VI·§VII·§IX는 본문 추출 + 단락 재작성(수치는 텍스트 명시분 반영, 막대 개별값은 TODO).\n- 그림: arXiv 원본 src URL 그대로 임베드(Fig 2 x1.png, Fig 3 x2.png, Fig 7 x6.png)\n";
