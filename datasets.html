  <script>
  const MD = "<div align=\"center\">\n\n# 🌍 World Model · VLA Datasets — Reference Catalog\n\n**우리 World Model / VLA 계보(14+ 모델)가 학습·평가에 쓰는 데이터셋을 한눈에.**\n\"이거 쓴다 = 아 그거\"가 바로 떠오르도록 — 카테고리 · 규모 · 라이선스 · 사용 모델 · 원문 링크.\n\n![datasets](https://img.shields.io/badge/datasets-23-2563eb)\n![categories](https://img.shields.io/badge/categories-6-0b366e)\n![models](https://img.shields.io/badge/WM%2FVLA_models-14%2B-16a34a)\n![fact-checked](https://img.shields.io/badge/fact--checked-web%20%2B%20adversarial-orange)\n![updated](https://img.shields.io/badge/updated-2026--06--16-informational)\n\n<\/div>\n\n> 📄 **상세 카드**(실제 타이핑 지시·장면 예시·검증 노트 포함)는 [`datasets_reference.md`](datasets_detail.html) 참고.\n> 이 문서는 그 22+1개 카드를 스캔용으로 압축한 공개 카탈로그다.\n\n**Legend** — 공개: ✅ open · 🔶 partial | 모달리티: 🗣️ 언어지시 · 📷 RGB · 🦾 action · 🧊 depth/3D · 🎬 video\n\n---\n\n## 📚 Table of Contents\n\n- [At a Glance](#glance)\n- [🦾 Action 표현 치트시트](#action)\n- [🎮 1. 핵심 조작 벤치 (평가·학습)](#cat1)\n- [🤖 2. 대형 로봇 데이터 (cross-embodiment)](#cat2)\n- [🎥 3. Human Video (latent-action)](#cat3)\n- [🦿 4. 실로봇 플랫폼](#cat4)\n- [🖼️ 5. 멀티모달 (BAGEL 계열)](#cat5)\n- [🧩 6. Planning · Toy (WM 계열)](#cat6)\n- [Sources & Reliability](#sources)\n\n---\n\n<a id=\"glance\"><\/a>\n\n## At a Glance\n\n| # | 카테고리 | 데이터셋 | 한 줄 |\n|:-:|---|:-:|---|\n| 1 | 🎮 핵심 조작 벤치 | **7** | 언어조건 조작 시뮬 벤치 — 정책 성공률 평가 표준 |\n| 2 | 🤖 대형 로봇 데이터 | **6** | cross-embodiment 실로봇 사전학습 코퍼스 |\n| 3 | 🎥 Human Video | **3** | latent-action / 무라벨 사전학습용 사람 영상 |\n| 4 | 🦿 실로봇 플랫폼 | **1** | 양팔 teleop 리그 + 실세계 데모 |\n| 5 | 🖼️ 멀티모달 | **3** | 이미지·영상·멀티뷰 — BAGEL 통합 사전학습 |\n| 6 | 🧩 Planning · Toy | **3** | goal-conditioned / contact-rich WM 벤치 |\n\n---\n\n<a id=\"action\"><\/a>\n\n## 🦾 Action 표현 치트시트\n\n데이터셋마다 \"행동을 적는 언어\"가 다르다 — 모델을 섞어 학습할 때 이게 핵심이다.\n\n| 표현 | 뜻 | 대표 데이터 |\n|---|---|---|\n| **delta end-effector** | 손끝을 Cartesian으로 \"오른쪽 2cm\" 식 증분 명령 (6D pose + gripper) | BridgeData V2, LIBERO, RoboCasa, OXE |\n| **absolute joint** | 각 관절 각도를 직접 명령 | CALVIN(절대 tcp), ALOHA(14-DoF joint), MolmoAct2-Bimanual |\n| **discretized token** | 위 연속값을 차원당 256-bin으로 이산화 → 토큰 | OXE/RT-1, **MolmoAct(256-bin)** |\n| **goal observation** | 행동 라벨 없이 \"목표 이미지/상태\"로 task 지정 | OGBench, Push-T |\n\n> 💡 **MolmoAct2의 통합 트릭**: 각 action을 **고정 32차원으로 패딩**해 absolute-joint·delta-eef 데이터를 *한 토크나이저 입력공간*에 같이 담아 cross-embodiment 공동학습. → \"eef냐 joint냐\"를 고르지 않고 **둘 다** 학습.\n\n---\n\n<a id=\"cat1\"><\/a>\n\n## 🎮 1. 핵심 조작 벤치 (평가·학습)\n\n| Dataset | 한 줄 | 규모 | 공개 | Used by | Links |\n|---|---|---|:-:|---|---|\n| **LIBERO** 🗣️📷🦾 | 언어조건 조작 시뮬 벤치 (VLA 평가 표준) | 130 task · demo 50/task | ✅ MIT/CC BY | π0 · ACoT · VLA-JEPA · StarVLA · Cosmos-P · Fast-WAM · JEPA-WMs | [📄](https://arxiv.org/abs/2306.03310) · [🌐](https://libero-project.github.io) · [💻](https://github.com/Lifelong-Robot-Learning/LIBERO) |\n| **RoboTwin 2.0** 🗣️📷🦾 | 양팔 조작 시뮬 데이터생성기 + 벤치 | 50 task · 10만+ 궤적 · 5 embod | ✅ MIT | StarVLA · Fast-WAM · InternVLA-A1 | [📄](https://arxiv.org/abs/2506.18088) · [🌐](https://robotwin-platform.github.io/) · [💻](https://github.com/RoboTwin-Platform/RoboTwin) |\n| **RoboCasa** 🗣️📷🦾 | 주방 일상조작 대규모 시뮬 | 100 task · 100K+ traj · 120 씬 | ✅ MIT/CC BY | StarVLA · Cosmos-P · JEPA-WMs | [📄](https://arxiv.org/abs/2406.02523) · [🌐](https://robocasa.ai/) · [💻](https://github.com/robocasa/robocasa) |\n| **SimplerEnv** 🗣️📷🦾 | 실→sim 정책 평가 환경 (real-to-sim) | 2 robot · 8 task family | ✅ MIT | VLA-JEPA · StarVLA | [📄](https://arxiv.org/abs/2405.05941) · [🌐](https://simpler-env.github.io/) · [💻](https://github.com/simpler-env/SimplerEnv) |\n| **CALVIN** 🗣️📷🦾 | 장기 언어조건 조작 (play data) 시뮬 | ~24h play · 34 task · 389 문장 | ✅ MIT | SuSIE | [📄](https://arxiv.org/abs/2112.03227) · [🌐](http://calvin.cs.uni-freiburg.de) · [💻](https://github.com/mees/calvin) |\n| **BEHAVIOR-1K** 🗣️📷🧊🦾 | 1,000 가사활동 시뮬 벤치 (OmniGibson) | 1000 활동 · 데모 10K traj/1200h | ✅ MIT* | StarVLA | [📄](https://arxiv.org/abs/2403.09227) · [🌐](https://behavior.stanford.edu/) · [💻](https://github.com/StanfordVL/BEHAVIOR-1K) |\n| **VLABench** 🗣️📷🧊🦾 | 상식·추론 요구 장기 조작 벤치 | 100 task · 2,164 객체 | ✅ MIT | ACoT-VLA | [📄](https://arxiv.org/abs/2412.18194) · [🌐](https://vlabench.github.io/) · [💻](https://github.com/OpenMOSS/VLABench) |\n\n---\n\n<a id=\"cat2\"><\/a>\n\n## 🤖 2. 대형 로봇 데이터 (cross-embodiment)\n\n| Dataset | 한 줄 | 규모 | 공개 | Used by | Links |\n|---|---|---|:-:|---|---|\n| **Open X-Embodiment** 🗣️📷🦾 | 60+ 로봇데이터 RLDS 통합 (cross-embodiment 표준) | 22 embod · 100만+ traj · 527 skill | ✅ 혼합 | π0/π0.5 · StarVLA | [📄](https://arxiv.org/abs/2310.08864) · [🌐](https://robotics-transformer-x.github.io/) · [💻](https://github.com/google-deepmind/open_x_embodiment) |\n| **DROID** 🗣️📷🧊🦾 | in-the-wild Franka teleop (13기관) | 7.6만 demo · 350h · 564 씬 | ✅ CC BY | π0/π0.5 · JEPA-WMs | [📄](https://arxiv.org/abs/2403.12945) · [🌐](https://droid-dataset.github.io/) · [💻](https://github.com/droid-dataset/droid) |\n| **BridgeData V2** 🗣️📷🦾 | WidowX 저가팔 조작 (사실상 표준 입력원) | 6.0만 궤적 · 24 환경 · 13 skill | ✅ CC BY | SuSIE | [📄](https://arxiv.org/abs/2308.12952) · [🌐](https://rail-berkeley.github.io/bridgedata/) · [💻](https://github.com/rail-berkeley/bridge_data_v2) |\n| **Fractal / RT-1** 🗣️📷🦾 | Everyday Robots 데모 (OXE 핵심 구성요소) | 8.7만 traj · 700+ task · 13대 | ✅ CC BY | (π0 간접) | [📄](https://arxiv.org/abs/2212.06817) · [🌐](https://robotics-transformer1.github.io/) · [📦](https://www.tensorflow.org/datasets/catalog/fractal20220817_data) |\n| **AgiBot World** 🗣️📷🧊🦾 | 휴머노이드 양손조작 실데이터 + 합성 | 100만+ traj · 217 task (Alpha 100K) | ✅ CC BY-NC-SA | ACoT-VLA · InternVLA-A1 | [📄](https://arxiv.org/abs/2503.06669) · [🌐](https://opendrivelab.com/AgiBot-World/) · [📦](https://huggingface.co/datasets/agibot-world/AgiBotWorld-Alpha) |\n| **MolmoAct** 🆕 🗣️📷🧊🦾 | Ai2 ARM 학습데이터 — depth→trace→action chain-of-thought | Franka 1.07만 traj + bimanual 720h(v2) | ✅ Ai2 풀오픈 | *(참고)* MolmoAct/MolmoBot | [📄v1](https://arxiv.org/abs/2508.07917) · [📄v2](https://arxiv.org/abs/2605.02881) · [🌐](https://allenai.org/blog/molmoact) · [💻](https://github.com/allenai/molmoact) |\n\n---\n\n<a id=\"cat3\"><\/a>\n\n## 🎥 3. Human Video (latent-action / 사전학습)\n\n| Dataset | 한 줄 | 규모 | 공개 | Used by | Links |\n|---|---|---|:-:|---|---|\n| **Something-Something V2** 🎬 | 손동작 영상 174 클래스 (action recognition) | 22.1만 클립 · 174 class | 🔶 Qualcomm RUL | VLA-JEPA · SuSIE | [📄](https://arxiv.org/abs/1706.04261) · [🌐](https://www.qualcomm.com/developer/artificial-intelligence/datasets) |\n| **EgoDex** 🎬🧊 | Vision Pro 1인칭 손조작 + 3D 손포즈 | 829h · 90M frame · 338K demo · 194 task | 🔶 CC BY-NC-ND | DreamDojo | [📄](https://arxiv.org/abs/2505.11709) · [🌐](https://machinelearning.apple.com/research/egodex-learning-dexterous-manipulation) · [💻](https://github.com/apple/ml-egodex) |\n| **YT-Temporal-1B** 🎬 | 유튜브 2천만 영상 + ASR (행동 라벨 0) | 20M 영상 · ~1B frame | 🔶 접근제한 | JEPA-Wild | [📄](https://arxiv.org/abs/2201.02639) · [🌐](https://rowanzellers.com/merlotreserve/) · [💻](https://github.com/rowanz/merlot_reserve) |\n\n---\n\n<a id=\"cat4\"><\/a>\n\n## 🦿 4. 실로봇 플랫폼\n\n| Dataset | 한 줄 | 규모 | 공개 | Used by | Links |\n|---|---|---|:-:|---|---|\n| **ALOHA / ALOHA 2** 🗣️📷🦾 | 저가 양팔 teleop 리그 + ACT 정책 | 실물 6 task·50 demo + sim ~18 task | 🔶 MIT | Cosmos-Policy | [📄](https://arxiv.org/abs/2304.13705) · [🌐](https://tonyzhaozh.github.io/aloha/) · [💻](https://github.com/google-deepmind/aloha_sim) |\n\n---\n\n<a id=\"cat5\"><\/a>\n\n## 🖼️ 5. 멀티모달 (BAGEL 계열)\n\n| Dataset | 한 줄 | 규모 | 공개 | Used by | Links |\n|---|---|---|:-:|---|---|\n| **OmniCorpus** 📷 | 웹 image-text interleaved 100억장 코퍼스 | 8.6B img · 2.2B doc | ✅ CC BY* | BAGEL | [📄](https://arxiv.org/abs/2406.08418) · [💻](https://github.com/OpenGVLab/OmniCorpus) · [📦](https://huggingface.co/datasets/OpenGVLab/OmniCorpus-CC) |\n| **Koala-36M** 🎬 | 유튜브 영상 3,600만 + 장문 캡션(평균 202단어) | 36M 클립 · 172K h | ✅ 메타 공개* | BAGEL | [📄](https://arxiv.org/abs/2410.08260) · [🌐](https://koala36m.github.io/) · [📦](https://huggingface.co/datasets/Koala-36M/Koala-36M-v1) |\n| **MVImgNet2.0** 📷🧊 | 일상 물체 멀티뷰 이미지 + 3D 주석 | ~30만 물체 · 347 class · 9M frame | 🔶 비상업 | BAGEL | [📄](https://arxiv.org/abs/2412.01430) · [🌐](https://luyues.github.io/mvimgnet2/) · [💻](https://github.com/GAP-LAB-CUHK-SZ/MVImgNet2.0) |\n\n---\n\n<a id=\"cat6\"><\/a>\n\n## 🧩 6. Planning · Toy (WM 계열)\n\n| Dataset | 한 줄 | 규모 | 공개 | Used by | Links |\n|---|---|---|:-:|---|---|\n| **Push-T** 📷🦾 | 2D T블록 밀기 (contact-rich, 언어 없음) | ~206 ep · 25.6K frame | ✅ MIT | LeWM · JEPA-WMs(PLDM) | [📄](https://arxiv.org/abs/2303.04137) · [🌐](https://diffusion-policy.cs.columbia.edu/) · [💻](https://github.com/real-stanford/diffusion_policy) |\n| **OGBench** 📷🦾 | 오프라인 goal-conditioned RL 8환경 (goal로 task 지정) | 85 dataset · 410 task · ~1M tr/set | ✅ MIT | LeWM | [📄](https://arxiv.org/abs/2410.20092) · [🌐](https://seohong.me/projects/ogbench/) · [💻](https://github.com/seohongpark/ogbench) |\n| **Meta-World** 🦾 | Sawyer 50-task 멀티/메타 RL 벤치 | 50 task (MT10/50, ML10/45) | ✅ MIT | JEPA-WMs | [📄](https://arxiv.org/abs/1910.10897) · [🌐](https://meta-world.github.io/) · [💻](https://github.com/Farama-Foundation/Metaworld) |\n\n---\n\n<a id=\"sources\"><\/a>\n\n## Sources & Reliability\n\n- 22개 원본 카드는 **web 검색 + 적대적 사실검증 1패스**(2026-06)를 거침. **RoboCasa · OmniCorpus**는 최종 검증 패스 누락(1차 리서치본 — 검증 강도 한 단계 낮음).\n- **MolmoAct**(🆕 2026-06-16 추가)는 web 확인 기반이나 예시 지시는 **verbatim 미확정(대표 예시)**.\n- `*` 표시 라이선스: 코드/메타데이터는 공개이나 **원본 미디어 저작권은 출처 귀속**(OmniCorpus·Koala-36M) 또는 asset 라이선스 별도(BEHAVIOR-1K). 라이선스가 출처마다 다른 경우(LIBERO·DROID 등) 상세 카드에 둘 다 표기.\n- **Used by**는 내부 14모델 계보(+MolmoAct 참고) 기준 — 외부 web 검증 대상 아님.\n- 전체 상세(실제 지시문·장면·입출력·검증 노트): [`datasets_reference.md`](datasets_detail.html) · 모델 계보: `world_model_lineage_easy.md`\n";
