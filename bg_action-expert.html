:root{--panel:#fff;--ink:#1a1f2e;--mut:#6b7280;--line:#e6e8ee;--accent:#3b5bdb}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--ink);background:#f4f6fb}
header{background:linear-gradient(135deg,#0b1020,#1e293b);color:#fff;padding:26px 20px}
header .wrap{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
header h1{margin:0 0 6px;font-size:24px;letter-spacing:-.3px}
header h1 a{color:#fff;text-decoration:none}
header p{margin:0;color:#aab3c5;font-size:13px}
header p a{color:#9db4ff}
.nav{display:flex;gap:10px}
.btn{display:inline-block;padding:9px 16px;border-radius:10px;font-size:13.5px;font-weight:700;text-decoration:none;cursor:pointer;border:0}
.btn.primary{background:#3b5bdb;color:#fff}
.btn.primary:hover{background:#4c6ef5}
.btn.ghost{background:rgba(255,255,255,.12);color:#e7ecf5;border:1px solid rgba(255,255,255,.25)}

#upd-status{font-size:12px;color:#ffdeb0;margin-top:6px;min-height:14px}
main{max-width:1100px;margin:0 auto;padding:24px 20px 64px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 6px}
.chip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--mut);font-size:13px;font-weight:700;cursor:pointer}
.chip:hover{border-color:var(--accent);color:var(--accent)}

.card{display:grid;grid-template-columns:340px 1fr;gap:20px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:12px 0;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.card.big{border-left:4px solid #e03131}
.card.pending{border-left:4px solid #f59f00;background:#fffdf5}
.card .L{min-width:0}

.f.col{flex-direction:column;align-items:stretch;gap:5px}

  <article class="dd" id="dd-body"><p class="muted">렌더링 중… (오프라인이면 CDN 로드 실패 — 원본: basic_theory.md)</p></article>
  <script>
  const MD = "# Action Expert\n\n> 출처: [π0] \"π0: A Vision-Language-Action Flow Model for General Robot Control\" (Physical Intelligence, arXiv 2410.24164) — action expert를 처음 명명·정식화. (MoT 섹션의 구체 사례 = modality {vision-language, action}.)\n\n**한 줄 정의**: VLA에서 VLM 백본과 **분리된**, 로봇 고유 입출력(proprioceptive state $q_t$ + action chunk $A_t$)을 전담하는 **별도 transformer weight 집합**. π0 원문: \"we refer to the second set of weights as the **action expert** ... analogous to a mixture of experts with two mixture elements.\" 이미지·텍스트는 큰 VLM 백본(PaliGemma init, ~3B), VLM이 사전학습 때 못 본 입력($q_t, A_t^\\tau$)은 작은 action expert(~300M, width 1024)로 **라우팅**되고, 둘은 **self-attention으로만** 매 레이어 상호작용(= MoT 구조).\n\n**직관**: VLM = 인터넷 규모로 사전학습된 \"눈·언어 두뇌\"(이미지·지시는 잘 알지만 50Hz 연속 관절 명령은 안 해봤다). 거대 두뇌를 통째로 제어용 재학습하면 사전학습 지식이 손상 → action expert는 그 두뇌에 **\"운동 피질\"을 따로 이식**하는 것. 통역사(VLM)와 피아니스트(action expert)가 한 책상에서, 머릿속(weight)은 다르지만 같은 메모(attention/KV)를 공유. **작게** 만든 이유 = 추론 속도(매 flow 적분 스텝마다 재계산되는 게 action expert라 크기가 곧 지연 → 50Hz 제어).\n\nASCII:\n```\n             observation o_t = [ I_t^1..I_t^n , l_t , q_t ]\n             ┌──────────────────────────────┬───────────────┐\n             │  images + language prompt     │  state q_t +  │\n             │  (VLM 사전학습서 본 입력)       │  noisy action │\n             │                               │  A_t^τ        │\n             ▼                               ▼\n   ┌───────────────────────┐        ┌────────────────────────┐\n   │   VLM BACKBONE        │        │   ACTION EXPERT        │\n   │   (PaliGemma init,    │        │   (~300M, width=1024)  │\n   │    ~3B, weights W_vlm)│        │    weights W_act       │\n   └───────────┬───────────┘        └───────────┬────────────┘\n               │   shared self-attention only    │\n               └───────────►◄────────────────────┘\n                 (MoT: 토큰마다 자기 expert weight, attention만 공유)\n\n   blockwise CAUSAL attention, 3 blocks (블록 내부는 bidirectional):\n     [ images+text ] ─► [ state q_t ] ─► [ action chunk A_t^τ ]\n\n   action expert 출력: v_θ(A_t^τ, o_t)  (flow-matching velocity)\n                 │ Euler 적분 τ:0→1 (10 step)\n                 ▼\n     A_t = [ a_t, a_{t+1}, ..., a_{t+H-1} ]   (chunk, π0는 H=50)\n```\n\n**수식** (flow matching으로 action chunk 생성):\n\n$$\nA_t^\\tau = \\tau\\,A_t + (1-\\tau)\\,\\epsilon,\\qquad \\epsilon\\sim\\mathcal N(0,I)\n$$\n\n- 노이즈 낀 action을 만드는 선형 경로. $\\tau{=}1$이면 깨끗한 $A_t$, $\\tau{=}0$이면 순수 노이즈 $\\epsilon$.\n\n$$\n\\mathcal L^\\tau(\\theta)=\\mathbb E_{p(A_t\\mid o_t),\\,q(A_t^\\tau\\mid A_t)}\\big\\lVert v_\\theta(A_t^\\tau, o_t)-u(A_t^\\tau\\mid A_t)\\big\\rVert^2,\\qquad u(A_t^\\tau\\mid A_t)=\\epsilon - A_t\n$$\n\n- action expert가 velocity field $v_\\theta$를 conditional flow matching으로 학습. $o_t$=관측(이미지·언어·state) 조건.\n- **⚠️ 부호 주의**: π0 본문은 target을 $u=\\epsilon-A_t$로 **인쇄**한다. 다만 위 선형경로 $A_t^\\tau=\\tau A_t+(1-\\tau)\\epsilon$의 $\\tau$-미분은 $A_t-\\epsilon$이라, 구현/표기에 따라 부호가 뒤집혀 보일 수 있다 — [Flow Matching] 섹션의 \"부호·방향 컨벤션\" 경고가 그대로 적용되는 사례. **항상 보간 줄을 보고 확인.**\n\n$$\nA_t^{\\tau+\\delta}=A_t^\\tau + \\delta\\, v_\\theta(A_t^\\tau, o_t)\n$$\n\n- 추론: 순수 노이즈($\\tau{=}0$)에서 Euler로 $\\tau{=}1$까지 적분(π0는 $\\delta{=}0.1$, **10 step**). 각 step에서 **VLM KV는 캐싱, action expert만 재계산** → 빠른 추론.\n\n원본 그림: [arXiv Figure (π0)](https://arxiv.org/html/2410.24164v1/x1.png)\n![](https://arxiv.org/html/2410.24164v1/x1.png)\n> π0 (arXiv 2410.24164): VLM 백본(PaliGemma init) + 작은 action expert가 robot state·action 전담, flow matching으로 action chunk 생성. 여러 embodiment 제어.\n\n### ⚠️ gotchas (못박기)\n- **별도로 떨어진 후단(後段) head가 아니다.** 같은 transformer 레이어 안에서 토큰이 자기 modality weight(VLM or action expert)로 처리되는 **MoT** — 매 레이어 self-attention으로 상호작용.\n- **DDPM diffusion이 아니라 flow matching.** 노이즈→데이터 선형 경로 + velocity 회귀. (EDM의 Karras preconditioning과도 무관.)\n- **한 forward로 action chunk 전체(π0는 H=50) 생성.** flow ODE를 10 step 적분하는 것은 chunk 길이와 별개의 축.\n- **작을수록 추론이 빠르다** — π0는 50Hz 실시간 제어 위해 의도적으로 ~300M로 downsize.\n\n### 우리 계보에서의 쓰임 (used_by)\nπ0/π0.5(원조)·LingBot-VLA·Fast-WAM(video-DiT + action expert)·InternVLA-A1·BagelVLA. (`world_model_lineage_easy.md` 각 카드 + `FastWAM_deepdive.md` §3.2.)\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else
    // marked mangles LaTeX (underscores -> <em>, $$ blocks -> <p>) before KaTeX runs.
    let katexInMarked = false;
    try {
      // nonStandard: true — allow inline $...$ followed immediately by Korean particles (와/는/로),
      // otherwise the default regex requires whitespace/punctuation after closing $ and skips them.
      if (window.markedKatex) { marked.use(window.markedKatex({throwOnError: false, nonStandard: true})); katexInMarked = true; }
    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
    // 8~256 GPU); marked pairs two ~ in a line into <del>. Consume ~ runs as literal text.
    try {
      marked.use({ extensions: [{
        name: 'noStrike', level: 'inline',
        start(s) { return s.indexOf('~'); },
        tokenizer(s) { const mm = s.match(/^~+/); if (mm) return { type: 'noStrike', raw: mm[0], text: mm[0] }; },
        renderer(t) { return t.text; }
      }] });
    } catch (e) {}
    el.innerHTML = marked.parse(MD);
    // Fallback only if the extension failed to load (e.g. offline CDN)
    if (!katexInMarked && window.renderMathInElement) renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ], throwOnError: false
    });
  });
  </script>

<script>
async function runUpdate(){
  const st = document.getElementById('upd-status');
  st.textContent = '업데이트 중… (arXiv/HF 수집 → 사이트 재생성, 1~2분)';
  try{
    const r = await fetch('/api/update', {method:'POST'});
    const j = await r.json();
    st.textContent = j.summary || JSON.stringify(j);
    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = '서버가 없습니다 — 터미널에서 `python surveybot/serve.py` 실행 후 http://localhost:8777 로 접속하세요. (요약·딥다이브 생성은 Claude 세션에서 /wm-survey)';
  }
}
</script>
