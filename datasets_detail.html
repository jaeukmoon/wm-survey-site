  <script>
  const MD = "# 데이터셋 레퍼런스 — World Model / VLA 14모델이 쓰는 데이터\n\n> 목적: 계보 문서(world_model_lineage_easy.md)의 14개 모델이 학습/평가에 쓰는 데이터셋을, **\"이거 쓴다 = 아 그거\"가 바로 떠오르게** 정리. 각 카드는 **실제 타이핑 지시(언어 명령) + 장면 예시**를 핵심으로 한다.\n> 작성: 2026-06-09 · web 검증 + 적대적 사실검증 1패스(22 데이터셋). · 2026-06-16 MolmoAct(참고, ARM 계열) 추가 → 23.\n>\n> **예시 신뢰도**: 예시 지시/라벨은 가능한 한 데이터셋에 **실제 존재하는 것(verbatim)**만 넣고, 지어낸 예시는 검증 패스에서 잡아 제거/강등했다(예: CALVIN \"move the slider left\"는 실제 라벨이 \"push the door to the left\", YT-Temporal의 팝콘 자막은 논문에 비존재, DROID 예시는 verbatim 미확인 → \"대표 예시·추정\" 표기). 언어 지시가 **없는** 데이터(toy/멀티모달/human-video)는 그 점을 명시했다.\n> **주의**: RoboCasa·OmniCorpus 카드는 최종 적대적 검증 단계가 세션 한도로 누락 — 1차 리서치본이라 검증 강도가 한 단계 낮다. \"쓰는 모델\" 줄은 계보 문서(내부 14모델 집합) 기준이라 web 검증 대상 아님.\n\n---\n\n## 빠른 참조표\n\n| 데이터셋 | 한 줄 | 공개 | 우리 모델 중 |\n|---|---|---|---|\n| **LIBERO** | 언어조건 조작 시뮬 벤치(VLA 평가 표준) | 공개(MIT/CC BY) | π0·ACoT·VLA-JEPA·StarVLA·Cosmos-P·Fast-WAM·JEPA-WMs |\n| **RoboTwin 2.0** | 양팔 조작 시뮬 데이터생성기+벤치 | 공개(MIT) | StarVLA·Fast-WAM·InternVLA-A1 |\n| **RoboCasa** | 주방 일상조작 대규모 시뮬 | 공개(MIT/CC BY) | StarVLA·Cosmos-P·JEPA-WMs |\n| **SimplerEnv** | 실→sim 정책 평가 환경 | 공개(MIT) | VLA-JEPA·StarVLA |\n| **CALVIN** | 장기 언어조건 조작(play data) 시뮬 | 공개(MIT) | SuSIE |\n| **BEHAVIOR-1K** | 1000 가사활동 시뮬 벤치 | 공개(MIT) | StarVLA |\n| **VLABench** | 상식·추론 요구 장기 조작 벤치 | 공개(MIT) | ACoT-VLA |\n| **Open X-Embodiment** | 60+ 로봇데이터 통합(cross-embodiment) | 공개(혼합) | π0/π0.5·StarVLA |\n| **DROID** | in-the-wild Franka teleop 7.6만 | 공개(CC BY) | π0/π0.5·JEPA-WMs |\n| **BridgeData V2** | WidowX 조작 6만 궤적 | 공개(CC BY) | SuSIE |\n| **Fractal/RT-1** | Everyday Robots 데모(OXE 핵심) | 공개(CC BY) | (π0 간접) |\n| **AgiBot World** | 휴머노이드 양손조작 실데이터/합성 | 공개(CC BY-NC-SA) | ACoT-VLA·InternVLA-A1 |\n| **MolmoAct** | Franka tabletop 1.07만 traj + bimanual 720h(v2) | 공개(Ai2 풀오픈) | (참고) MolmoAct/MolmoBot |\n| **SSv2** | 손동작 영상 174클래스(human video) | 부분공개(Qualcomm) | VLA-JEPA·SuSIE |\n| **EgoDex** | Vision Pro 1인칭 손조작 829h | 부분공개(CC BY-NC-ND) | DreamDojo |\n| **YT-Temporal-1B** | 유튜브 2천만 영상(라벨0, ASR) | 부분공개(접근제한) | JEPA-Wild |\n| **ALOHA** | 양팔 teleop 리그 + ACT | 부분공개(MIT) | Cosmos-Policy |\n| **OmniCorpus** | 웹 image-text interleaved 100억 | 공개(메타 CC BY) | BAGEL |\n| **Koala-36M** | 유튜브 영상 3600만 + 장문캡션 | 공개(메타) | BAGEL |\n| **MVImgNet2.0** | 물체 멀티뷰 이미지 + 3D | 부분공개(비상업) | BAGEL |\n| **Push-T** | 2D T블록 밀기(언어 없음) | 공개(MIT) | LeWM·JEPA-WMs(PLDM) |\n| **OGBench** | 오프라인 goal-conditioned RL 8환경 | 공개(MIT) | LeWM |\n| **Meta-World** | Sawyer 50 task RL 벤치 | 공개(MIT) | JEPA-WMs |\n\n---\n\n## 1. 핵심 조작 벤치 (평가·학습)\n\n### LIBERO (LIBERO: Benchmarking Knowledge Transfer for Lifelong Robot Learning, 2023; NeurIPS 2023 D&B, arXiv 2306.03310)\n- 한 줄: 평생학습(lifelong learning)·지식전이 연구용 **언어조건 로봇 조작 시뮬 벤치마크** — 130개 테이블탑 task와 사람 텔레오퍼레이션 시연을 묶어 제공. World Model/VLA 논문들이 표준 \"정책 성공률\" 평가판으로 가장 널리 쓴다.\n- task: 단일 7-DoF Franka(Panda) 팔이 짧은 자연어 지시 한 줄을 받아 물체를 집고/놓고/서랍 여는 등 조작을 수행. 4개 suite(LIBERO-Spatial / -Object / -Goal / -Long[=libero_10]) 각 10 task + 대규모 LIBERO-90, 합쳐 130 task. Spatial/Object/Goal은 의도적으로 한 종류의 분포 변화(공간배치/물체/목표)만 바꿔 \"어떤 지식이 전이되는가\"를 분리해서 본다.\n- 입력 → 출력: (멀티뷰 RGB: 3인칭 agentview + 손목 eye-in-hand 카메라, 보통 128×128) + 자연어 지시 + 로봇 proprioception(관절/그리퍼 상태) → 연속 7-DoF end-effector delta + 그리퍼 행동. 시뮬레이터는 MuJoCo/robosuite. 평가는 행동 매칭이 아니라 **task 성공 여부**만 본다(어떤 경로로 성공해도 정답).\n- 예시(타이핑 지시 + 장면) — 아래 3개는 실제 BDDL task 파일명과 verbatim 일치 확인:\n  - \"pick up the alphabet soup and place it in the basket\" — LIBERO-Object: 식탁 위 여러 식료품(알파벳수프, 크림치즈, 케첩, 토마토소스 등 10종) 중 알파벳수프만 집어 바구니에 담는 장면.\n  - \"put both the alphabet soup and the tomato sauce in the basket\" — LIBERO-Long(libero_10, LIVING_ROOM_SCENE2): 두 개의 식료품을 차례로 바구니에 넣는 장기(long-horizon) 다단계 장면.\n  - \"turn on the stove and put the moka pot on it\" — LIBERO-Long(libero_10, KITCHEN_SCENE3): 주방 장면에서 가스레인지를 켠 뒤 모카포트를 그 위에 올리는 순차 작업 장면.\n  - (참고·대표 예시: LIBERO-Goal에 \"open the top drawer of the cabinet and put the bowl in it\" 류 서랍 task도 실제 존재 — 위 3개를 대표 verbatim으로 채택.)\n- 예시 영상/이미지(전부 실재 확인): 프로젝트 페이지 https://libero-project.github.io · 데이터셋 갤러리 https://libero-project.github.io/datasets · GitHub https://github.com/Lifelong-Robot-Learning/LIBERO · 문서 https://lifelong-robot-learning.github.io/LIBERO/ · 논문 https://arxiv.org/abs/2306.03310\n- 규모/공개: 130 task / 4 suite(+LIBERO-90; 90+10 결합 100-task는 공식 페이지에서 \"LIBERO-100\"으로 명명, 전체 130 task는 \"LIBERO-130\") · task당 사람 텔레오퍼레이션 시연 **50개**(표준 4-suite 평가셋 = 40 task×50 = 2,000 demos) · **공개** — 코드 MIT 라이선스. 데이터 라이선스: 공식 GitHub README는 **데이터셋 CC BY 4.0**으로 명시하나, 실제 다운로드처인 HF 레포 `yifengzhu-hf/LIBERO-datasets`는 자체 태그가 **apache-2.0**으로 표기됨(두 출처 라이선스 표기가 불일치 — 사용 전 확인 권장; 커뮤니티 미러로 IPEC-COMMUNITY/libero-benchmark-dataset 등 존재). 데모 수·해상도는 공식 자료 및 downstream 논문 다수 보고와 일치.\n- 쓰는 모델(내부 14모델 기준 — 웹 검증 대상 아님): **ACoT-VLA**(평가: LIBERO 98.5%, LIBERO-Plus 84.1%) · **VLA-JEPA**(평가) · **StarVLA**(학습+평가, HF 공개셋) · **Cosmos Policy**(학습/평가: LIBERO-Cosmos-Policy 2,000 demos, 98.5%) · **Fast-WAM**(학습: 4-suite 전체, 전처리본 yuanty/LIBERO-fastwam). → ① VLA·② WAM 계열의 표준 조작 벤치.\n\n### RoboTwin 2.0 (RoboTwin 2.0: A Scalable Data Generator and Benchmark with Strong Domain Randomization for Robust Bimanual Robotic Manipulation, 2025)\n- 한 줄: 양팔(bimanual) 로봇 조작용 **시뮬레이터 기반 데이터 생성기 + 벤치마크**. MLLM 에이전트가 task 코드를 합성하고, 강한 domain randomization(축 5종: clutter·lighting·background·tabletop height·언어 지시)으로 100k+ 전문가 궤적을 자동 수집한다.\n- task: 5종 임베디먼트(Franka, Piper, UR5, ARX-X5, Aloha-AgileX) 위 **50개 양팔 테이블탑 조작 task** — pick/place, stack, handover, open(서랍/노트북/전자레인지), press/click, pour 등. 객체 라이브러리 RoboTwin-OD = 147 카테고리 / 731 인스턴스.\n- 입력 → 출력: (멀티뷰 RGB 관측 + 언어 지시 + proprioception) → 양팔 action 궤적(action chunk). 데이터셋 = 시뮬에서 생성된 (관측·지시·action) 전문가 데모. 언어 지시는 task 템플릿 × 객체 묘사를 조합해 다양화(어휘 randomization).\n- 예시(타이핑 지시 + 장면) — 논문의 언어 randomization 예시(verbatim, arXiv 본문 확인):\n  - \"Use left arm to place sauce can to the left of gray kitchenpot\" — 회색 냄비 옆에 소스 캔을 왼팔로 놓는 장면(Move Can Pot 류).\n  - \"Use left arm to place white plastic lid sauce can to the left of kitchenpot for boiling and cooking\" — 같은 장면류의 어휘 randomization 변형 예시(객체 묘사가 더 길고 다양해짐). ※ 두 문장이 정확히 동일 에피소드의 원본↔randomized 쌍이라는 단정은 논문 명시 사항이 아님(대표 예시·추정).\n  - task 식별자 예(공식 task 문서, verbatim 확인): \"Handover Block\"(한 팔→다른 팔로 블록 건네기), \"Stack Bowls Two\"(그릇 2개 쌓기), \"Open Laptop\"(노트북 열기), \"Pick Dual Bottles\"(양손으로 병 2개 집기), \"Move Can Pot\".\n- 예시 영상/이미지: 프로젝트 페이지 https://robotwin-platform.github.io/ · task 갤러리 https://robotwin-platform.github.io/doc/tasks/ · 논문 https://arxiv.org/abs/2506.18088 · GitHub(데모 영상 README 내장) https://github.com/RoboTwin-Platform/RoboTwin · 데이터 https://huggingface.co/datasets/TianxingChen/RoboTwin2.0 (모두 실재 확인)\n- 규모/공개: 50 tasks · 100,000+ 전문가 궤적(task–임베디먼트 쌍당 100 clean + 400 randomized) · 5 임베디먼트 · 731 객체/147 카테고리. **공개** — 코드/벤치 MIT 라이선스(GitHub), 데이터·객체셋 HuggingFace 공개(MIT). (원 RoboTwin v1.0은 CVPR 2025 Highlight)\n- 쓰는 모델: **StarVLA**(통합 벤치 LIBERO·SimplerEnv·RoboTwin 2.0·RoboCasa-GR1·BEHAVIOR-1K 중 하나), **Fast-WAM**(학습데이터에 RoboTwin 2.0 약 2.75만 demos = clean 2.5천 + randomized 2.5만, HF 전처리본 yuanty/robotwin2.0-fastwam, LeRobot v2.1), **InternVLA-A1**(eval/fine-tune, pi0.5 대비 Easy/Hard +2.6%).\n\n### RoboCasa (RoboCasa: Large-Scale Simulation of Everyday Tasks for Generalist Robots, 2024)  ※최종 검증 패스 누락(1차 리서치본)\n- 한 줄: 단일 Franka 팔 로봇이 사진수준 주방 시뮬레이터(MuJoCo/robosuite 기반)에서 일상 조작을 수행하는 대규모 imitation-learning 벤치/데이터셋. 각 데모에 짧은 자연어 지시가 붙어 VLA·world-model 사전학습/평가에 널리 쓰임.\n- task: 멀티뷰 RGB(3인칭+손목 카메라)와 한 줄 언어 지시를 보고, 주방 8대 기초 스킬(pick-and-place / 문 여닫기 / 서랍 여닫기 / 손잡이 돌리기 / 레버 돌리기 / 버튼 누르기 / 끼워넣기 / 이동)을 수행. 원논문 기준 25개 atomic task + 75개 composite task = 100 task.\n- 입력 → 출력: (멀티뷰 RGB 이미지 + proprioception + 언어 지시 `ep_meta[\"lang\"]`) → 로봇 end-effector delta action 시퀀스(저수준 제어). 데이터는 robomimic HDF5 trajectory 형태(관측·행동·언어 라벨 포함).\n- 예시(타이핑 지시 + 장면):\n  - \"Pick the {obj} from the counter and place it in the sink.\" — 카운터 위 물체(예: 빵·과일)를 집어 옆 싱크대에 넣는 atomic pick-and-place 장면. (`{obj}`는 실제로는 구체 물체명으로 치환됨)\n  - \"Press the button on the coffee machine to serve coffee.\" — 머그가 놓인 커피머신의 버튼을 눌러 커피를 내리는 button-press 장면.\n  - \"Open the toaster oven door.\" — 카운터 위 토스터오븐의 문을 잡고 여는 door 조작 장면.\n  - (이상 verbatim — RoboCasa 소스 `get_ep_meta()`의 `lang` 필드에서 직접 확인. 그 외 실제 라벨: \"Pick the {obj} from the counter and place it in the cabinet.\" / \"{behavior} the sink faucet.\" 등 템플릿 f-string.)\n- 예시 영상/이미지: 프로젝트 페이지 https://robocasa.ai/ · 논문 https://arxiv.org/abs/2406.02523 (Fig.9에 task별 장면) · 코드/데이터 https://github.com/robocasa/robocasa · RSS'24 PDF https://robocasa.ai/assets/robocasa_rss24.pdf\n- 규모/공개: 원논문(2024) 120개 주방 씬, 2,509개 3D 오브젝트(153카테고리), 100 task, 100K+ trajectory(인간 데모 + MimicGen 합성). 공개 — 코드 MIT License, 에셋/데이터셋 CC BY 4.0 (repo LICENSE 및 README 확인). (주의: robocasa.ai 현행 페이지는 후속 확장판 RoboCasa365 = 65 atomic/365 composite, 2,500 씬으로 수치가 다름.)\n- 쓰는 모델: **StarVLA**(학습/평가 통합 벤치) · **Cosmos Policy**(RoboCasa 24-task×50demo=1,200 데모로 post-train, RoboCasa 67.1%) · **JEPA-WMs**(photorealistic RoboCasa에 DINOv3 ViT-L/16 encoder 사용).\n\n### SimplerEnv / SIMPLER (Evaluating Real-World Robot Manipulation Policies in Simulation, CoRL 2024)\n- 한 줄: 실로봇 조작 정책(RT-1, RT-1-X, Octo 네이티브 지원; OpenVLA는 커뮤니티 포크)을 **시뮬레이터에서 평가**하기 위한 real-to-sim 벤치마크 — 실제 환경 이미지를 sim 배경에 오버레이(Visual Matching)해 sim 성공률이 실세계 성공률과 강하게 상관되도록 맞춘 평가 환경. (데이터 수집용이 아니라 \"평가용\" 시뮬레이션 task 집합.)\n- task: 두 로봇 플랫폼(Google Robot, WidowX+Bridge)에서 짧은 언어 지시로 테이블탑 조작. **공식 리포 기준 Google Robot 6개**(pick coke can / pick object / move-near / open drawer / close drawer / place-in-closed-drawer) **+ WidowX/Bridge 4개**(spoon-on-towel / carrot-on-plate / stack-cube / eggplant-in-basket) = 총 10개 task 변형, **논문에서는 8 task families로 집계** + 다수 intra-task 변형. SAPIEN/ManiSkill2(CPU) 및 ManiSkill3(GPU 병렬, Bridge 환경 통합) 기반.\n- 입력 → 출력: (단일/멀티뷰 RGB 관측 + 짧은 언어 지시 string) → 정책이 로봇 action(end-effector 제어) 출력. SimplerEnv 자체는 **정책을 굴려 성공률을 매기는 평가 루프**(입력=정책, 출력=task별 success rate). 평가 모드 2종: Visual Matching, Variant Aggregation.\n- 예시(타이핑 지시 + 장면):\n  - \"put spoon on towel\" — WidowX 팔, 테이블 위 숟가락을 천(towel) 위에 올리기\n  - \"put eggplant in basket\" — WidowX 팔, 가지를 바구니에 담기\n  - \"stack green block on yellow block\" — WidowX 팔, 초록 블록을 노랑 블록 위에 쌓기\n  - \"close bottom drawer\" — Google Robot, 캐비닛 맨 아래 서랍 닫기\n  - \"move redbull can near orange\" — Google Robot, 레드불 캔을 오렌지 근처로 이동\n  - (위 5개 지시문은 공식 프로젝트 페이지 데모 캡션에 verbatim 표기 — 단 페이지 캡션엔 모델명 접두어가 붙음, 예: \"Octo-Small put spoon on towel\".)\n- 예시 영상/이미지: 프로젝트 페이지 https://simpler-env.github.io/ · 공식 영상 https://www.youtube.com/watch?v=SIcPxapIgBI · 논문 https://arxiv.org/abs/2405.05941 (CoRL 2024, PMLR v270) · 코드 https://github.com/simpler-env/SimplerEnv (모든 링크 실재 확인)\n- 규모/공개: 2개 로봇 setup(Google Robot/WidowX-Bridge), 8 task families(리포 기준 10 task 변형); 논문은 **2개 embodiment × 8 task family에서 1500+ paired sim-and-real evaluation** 수행 명시. **공개** — GitHub MIT 라이선스(Copyright (c) 2024 simpler-env). (OpenVLA 평가는 별도 포크 DelinQu/SimplerEnv-OpenVLA.)\n- 쓰는 모델: **VLA-JEPA**(평가 벤치: LIBERO·LIBERO-Plus·SimplerEnv·실로봇), **StarVLA**(통합 벤치 중 하나로 SimplerEnv 사용).\n\n### CALVIN (Composing Actions from Language and Vision, 2022)\n- 한 줄: 한 테이블 위 Franka Emika Panda 로봇이 \"play data\"(목적 없이 이것저것 만지는 텔레오퍼레이션)를 ~24시간 모아두고, 그 1%에만 사람이 짧은 영어 명령을 붙인 **시뮬레이션(PyBullet)** 벤치마크 — 언어 명령만으로 긴 연쇄 작업(long-horizon)을 closed-loop으로 풀게 하는 게 목표.\n- task: language-conditioned long-horizon manipulation. 한 번에 한 줄짜리 명령을 받아 슬라이딩 도어/서랍/버튼/스위치/색 블록을 조작하고, 평가 때는 5개 task를 연속으로(앞 task 성공해야 다음으로) 이어 푸는 능력을 측정. 환경 A·B·C·D 4종(책상 색·물체 배치가 다름)으로 미지 환경 zero-shot(예: ABC→D)도 평가.\n- 입력 → 출력: (입력) static RGB 200x200 + gripper RGB 84x84 (+선택적으로 depth·로봇 상태 등) + 짧은 영어 지시 한 줄 → (출력) 매 스텝 로봇 action. 표준 action은 7-DoF 절대 좌표: tcp position(x,y,z 절대 world) + tcp orientation(euler 절대 world) + gripper(binary). 상대(delta) action 공간도 제공.\n- 예시(타이핑 지시 + 장면):\n  - \"push the door to the left\" — 테이블 위 슬라이딩 도어를 왼쪽으로 민다. (task key `move_slider_left`)\n  - \"open the drawer\" — 테이블 하단 서랍을 잡고 바깥으로 당겨 연다. (task key `open_drawer`)\n  - \"turn on the green light\" / \"turn on the led light\" — 버튼을 눌러 초록색 LED를 켠다. (task key `turn_on_led`)\n  - (위 문장들은 CALVIN 공식 라벨 annotation에 실재. task당 ~11개 동의 표현 변형 존재. 단 'move the slider left' 같은 문자열은 라벨에 그대로 있지 않고 'move/push the door to the left' 형태로 존재.)\n- 예시 영상/이미지: 프로젝트/리더보드 http://calvin.cs.uni-freiburg.de · GitHub https://github.com/mees/calvin (teaser https://github.com/mees/calvin/raw/main/media/teaser.png) · 논문 https://arxiv.org/abs/2112.03227\n- 규모/공개: ~24시간 텔레오퍼레이션 play data(환경당 ~6시간 × 4환경), 그중 ~1%(≈20,000개 윈도우)에만 언어 라벨, 34개 task, 389개 고유 크라우드소싱 영어 문장(task당 ~11개 동의 표현). **공개** — D(166GB)/ABC(517GB)/ABCD(656GB) 스플릿 + debug(1.3GB), **MIT License**.\n- 쓰는 모델: **SuSIE**(arXiv 2310.10639) — CALVIN을 평가 설정 중 하나로 사용(ABC→D zero-shot 등). image-editing diffusion subgoal로 long-horizon task 분절.\n\n### BEHAVIOR-1K (BEHAVIOR-1K: A Human-Centered, Embodied AI Benchmark with 1,000 Everyday Activities and Realistic Simulation, CoRL 2022 / arXiv 2024 확장판)\n- 한 줄: 실제 사람 설문(\"로봇이 뭘 해줬으면 좋겠나\")으로 고른 1,000개 일상 가사 활동을 사실적 물리 시뮬레이터(OmniGibson, NVIDIA Omniverse 기반)에서 정의한 임바디드 AI 벤치마크. 50개 장면 + 9,000+ 객체. 2025 BEHAVIOR Challenge용으로 50개 task에 10,000개 텔레오퍼레이션 데모(공식 1,200+시간) 공개.\n- task: 자연어 활동 이름(짧은 가사 명령)을 받아, 시뮬에서 R1 Pro(wheeled humanoid, 7-DOF 양팔 mobile manipulator)가 네비게이션 + 장기 horizon 조작(잡기·놓기·자르기·세척·요리 등)으로 목표 상태(BDDL 논리 술어)를 만족. 데모 기준 task당 평균 ~6.6분, 평균 27.06 skill/trajectory(고유 skill 31종).\n- 입력 → 출력: (입력) head RGB 720×720 + wrist RGB 480×480(좌/우), depth(0~10m), instance segmentation, proprioception, 활동 이름(언어 지시)·subtask 주석. (출력) 모바일 베이스 + 양팔 연속 action(LeRobot 포맷, raw HDF5도 제공).\n- 예시(공식 50-task 데모 갤러리의 verbatim task 이름, 검증 완료):\n  - \"Cook Bacon\" — 베이컨을 팬/스토브에 올려 굽는 요리 활동(thermal·상태변화 포함).\n  - \"Picking Up Trash\" — 바닥/테이블 위 쓰레기를 집어 쓰레기통에 버리는 정리 활동.\n  - \"Putting Dishes Away After Cleaning\" — 세척이 끝난 접시를 찬장/선반에 정리해 넣는 활동.\n  - 그 외 verbatim: \"Make Pizza\", \"Chop an Onion\", \"Sorting Vegetables\", \"Make Microwave Popcorn\", \"Tidying Bedroom\" (모두 공식 50-task 목록에 실재).\n- 예시 영상/이미지: 프로젝트·데모 갤러리 https://behavior.stanford.edu/ · 2025 Challenge 데이터셋 https://behavior.stanford.edu/challenge/dataset.html · GitHub https://github.com/StanfordVL/BEHAVIOR-1K · 논문 https://arxiv.org/abs/2403.09227 · 데모 데이터 https://huggingface.co/datasets/behavior-1k/2025-challenge-demos\n- 규모/공개: 1,000 활동 + 50 장면 + 9,000+ 객체; 2025 Challenge 데모 = 50 task / 10,000 trajectory / 1,200+시간 / LeRobot 포맷(총 ~1.95 TB). 공개(코드 GitHub + 데모/asset HuggingFace, 데모 라이선스 MIT; OmniGibson/3D asset 라이선스는 별도일 수 있음).\n- 쓰는 모델: **StarVLA**(학습데이터 통합 벤치로 BEHAVIOR-1K 명시). 14모델 중 이걸 데이터/벤치로 쓰는 건 StarVLA 하나.\n\n### VLABench (VLABench: A Large-Scale Benchmark for Language-Conditioned Robotics Manipulation with Long-Horizon Reasoning Tasks, 2024/2025·ICCV 2025)\n- 한 줄: 자연어 지시 → 로봇 조작을 \"상식·세계지식·공간추론·물리·장기계획\"까지 요구하도록 설계한 시뮬레이션(MuJoCo) 벤치마크. VLA·foundation-model 워크플로우·VLM 세 부류를 같은 잣대로 평가.\n- task: 100개 task 카테고리(primitive 60 + composite 40), 163 카테고리 2,164 객체. 단순 pick-and-place가 아니라 \"어느 게 정답인지\"를 지시문 의미·상식으로 추론해야 푸는 long-horizon 조작(예: 책 정렬, 음료 데우기, 라떼 만들기).\n- 입력 → 출력: 멀티뷰 RGB-D + 분할/포인트클라우드 + 로봇 상태 + 자연어 지시 → 연속 행동(EEF pose에서 IK로 푼 7-DoF joint + gripper). (정확한 카메라 대수는 논문 미명시)\n- 예시(타이핑 지시 + 장면):\n  - \"I want a toy in the Disney series.\" — SelectToy: 여러 인형 중 디즈니 계열(target: Donald)을 집어야 함(지시문엔 \"Donald\"가 없고 \"디즈니\"라는 의미로 추론). [논문 verbatim]\n  - \"I'm a big fan of DC series, please help me choose a suitable toy.\" — SelectToy(semantic): DC 계열(target: batman)을 골라 집기. [논문 verbatim]\n  - \"Pick the fruit with Heat-clearing character into the plate.\" — SelectFruit: 한방/상식상 '열을 내리는' 과일을 골라 접시에 담기(상식·세계지식 요구). [공식 페이지 verbatim]\n- 예시 영상/이미지: 프로젝트 페이지 https://vlabench.github.io/ · GitHub https://github.com/OpenMOSS/VLABench · 논문 https://arxiv.org/abs/2412.18194 (ICCV 2025) · HF https://huggingface.co/VLABench\n- 규모/공개: 100 task / 2,164 객체. 공개 FT 데이터셋(HF)은 primitive 10 task × 500 episode(≈5,000; 전체 ≈7,649 trajectory·약 817GB). 평가 축 = primitive 5차원(Mesh&Texture, Spatial, Common Sense&World Knowledge, Semantic, Physical Law) + composite/long-horizon. 공개(MIT).\n- 쓰는 모델: **ACoT-VLA** — VLABench를 시뮬 학습/평가 벤치로 사용(LIBERO·LIBERO-Plus와 함께). 나머지 13모델엔 사용 기록 없음.\n\n---\n\n## 2. 대형 로봇 데이터 (cross-embodiment 사전학습)\n\n### Open X-Embodiment (Open X-Embodiment / OXE, RT-X 모델, 2023)\n- 한 줄: 21~34개 연구실의 기존 로봇 데이터셋 60여 개를 **하나의 RLDS 포맷으로 통합**한 cross-embodiment 대규모 실로봇 조작 데이터 — \"여러 종류 로봇을 한 정책으로\" 학습시키려는 표준 데이터셋.\n- task: 언어 지시 기반 실로봇 조작(주로 pick-and-place + wiping/assembling 등 long-tail). 각 에피소드 = (관측 시퀀스, 언어 지시, 로봇 행동)의 시계열. RT-1-X/RT-2-X는 이 데이터로 학습된 generalist 정책.\n- 입력 → 출력: (작업공간 카메라 RGB + task string=언어 지시) → 이산화된 end-effector 행동(델타 위치/자세 + 그리퍼). RLDS 에피소드 = step들의 시계열. 시계열+토큰 출신에겐 \"프레임 시퀀스 + 한 줄 텍스트 명령 → 다음 행동 토큰\".\n- 예시(타이핑 지시 + 장면):\n  - \"move red pepper to tray\" — 테이블 위 빨간 피망을 집어 트레이로 옮기는 RT-1-X 장면\n  - \"move apple near cloth\" — 사과를 천 옆으로 이동(near/on/between 변형이 한 세트: \"move apple on cloth\", \"move apple between can & orange\")\n  - \"pick ice cream\" — 진열된 물건 중 아이스크림 집기\n  - (위 3개는 공식 프로젝트 페이지에 RT-1-X/RT-2-X 데모 캡션으로 표기된 **verbatim 라벨** — 실재 확인됨.)\n- 예시 영상/이미지: 공식 프로젝트 페이지 https://robotics-transformer-x.github.io/ (RT-1-X/RT-2-X 데모 애니메이션) · 논문 https://arxiv.org/abs/2310.08864 · 코드 https://github.com/google-deepmind/open_x_embodiment · 비공식 HF 미러 https://huggingface.co/datasets/jxu124/OpenX-Embodiment (55-in-1, 일부 서브셋)\n- 규모/공개: ~22개 로봇 embodiment, 60개 데이터셋(34개 랩, 21개 기관) 통합, 100만+ 실로봇 trajectory, 527 스킬/160,266 task. **공개** — 코드 Apache-2.0, 자료 CC-BY 4.0 (단 단일 라이선스 아님 — 컴포넌트 데이터셋별 상이, 일부 research-only. 사용 전 공식 스프레드시트 확인).\n- 쓰는 모델: **π0/π0.5**(학습 데이터에 OXE 포함), **StarVLA**(OXE를 LeRobot 포맷으로 통합 학습). (line 참조는 내부 레지스트리 기준)\n\n### DROID (Distributed Robot Interaction Dataset, 2024)\n- 한 줄: 전 세계 13개 기관에서 사람이 직접 원격조작(teleop)한 Franka 팔의 \"실생활(in-the-wild)\" 조작 시연 7.6만 개. 각 시연에 크라우드소싱 자연어 지시가 붙음.\n- task: 한 가지 task가 아니라 \"범용 실로봇 조작 시연 + 언어 라벨\" 코퍼스. 주방·책상·세탁 등 564개 장면에서 집기/넣기/열기/닦기/붓기 등 86개 동사 분포의 조작. VLA·world model 사전학습/평가용.\n- 입력 → 출력: (시점당) 외부 ZED 2 스테레오 2대 + 손목 ZED-Mini의 멀티뷰 RGB(원시 1280×720, 15Hz; RLDS 빌드는 180×320 다운샘플) + depth/캘리브 + proprioception + 자연어 지시 → action. 기본 RLDS action은 7-dim = `[6x joint velocity, 1x gripper position]`(cartesian/joint position·velocity 대체 표현도 저장). 에피소드당 language 필드 최대 3개(독립 크라우드 라벨).\n- 예시(타이핑 지시 + 장면, **대표 예시·추정** — verbatim 미확정):\n  - \"Open the microwave door\" — 주방에서 전자레인지 문을 여는 류의 장면.\n  - \"Put the marker in the pot on the table\" — 책상 위 마커펜을 집어 냄비에 넣는 류.\n  - \"Unfold the white towel\" — 접힌 흰 수건을 펼치는 류.\n  - (DROID 언어 라벨은 크라우드 자유 기술이라 31k+ 고유 문장 존재. 위 3개는 데이터 성격을 보여주는 대표 추정 예시.)\n  - 참고 — 논문 Fig.5 평가 task명(짧은 대문자형, 실제 verbatim): \"Put Apple in Pot\", \"Close Waffle Maker\", \"Place Chips on Plate\".\n- 예시 영상/이미지: 프로젝트 페이지 https://droid-dataset.github.io/ · 비주얼라이저 https://droid-dataset.github.io/visualizer/ · 논문 https://arxiv.org/abs/2403.12945 · GitHub https://github.com/droid-dataset/droid\n- 규모/공개: 76,000 시연 / ~350시간 / 564 장면(52건물) / 86 task / 13기관·18대 Franka Panda·50명, 12개월. **공개** — 원본 CC-BY 4.0(GCS gsutil/TFDS·RLDS, ~1.7TB); 언어 어노테이션은 2024-12 HF 업데이트로 성공 에피소드 95%(≈75k)에 각 3개. (LeRobot 포트 `lerobot/droid_1.0.1`·`cadene/droid`는 Apache-2.0 — 원본과 표기 다름.)\n- 쓰는 모델: **π0/π0.5**(OXE·DROID 혼합 사전학습), **JEPA-WMs**(DROID 학습 → RoboCasa zero-shot; DROID/Robocasa엔 DINOv3 ViT-L/16).\n\n### BridgeData V2 (\"BridgeData V2: A Dataset for Robot Learning at Scale\", 2023)\n- 한 줄: UC Berkeley RAIL이 공개한 저가 WidowX 로봇팔 조작 데이터셋 — 짧은 자연어 지시 + RGB 영상 + 7D 행동을 묶은 약 6만 궤적. VLA/World Model 사전학습·벤치마크의 사실상 표준 입력원.\n- task: 언어 지시(또는 goal 이미지) 조건부 조작. pick-and-place, pushing, sweeping, stacking, folding, 문/서랍 개폐 등 13개 skill을 24개 환경(토이 키친·테이블탑 등)에서 수행. 각 궤적에 작업자가 직접 쓴 자연어 지시(오타·동의어 포함).\n- 입력 → 출력: (입력) over-the-shoulder RGBD + 무작위 RGB 2대 + wrist RGB — 원본 **640×480** 저장(정책 학습 시 128×128 다운샘플; RT-1만 320×256) + 짧은 언어 지시 → (출력) 5Hz, **7차원 행동 — 연속 6D end-effector 상대 pose + discrete 1D 그리퍼 open/close**.\n- 예시(타이핑 지시 + 장면):\n  - \"put the carrot on the plate\" — 조리대 위 당근을 집어 접시 위로 옮기는 장면.\n  - \"flip the pot upright\" — 싱크 안에 엎어진 냄비를 바로 세우는 장면.\n  - \"put the mushroom in the pot\" — 버섯을 집어 냄비 안에 넣는 장면.\n  - (이상 3개는 공식 프로젝트 페이지 verbatim 확인. 그 외 \"close cabinet\" 확인; \"set table\"·\"fold cloth pnp\" 류는 작성자 자유서술 스타일이나 일부 verbatim 미검증.)\n- 예시 영상/이미지: 프로젝트 페이지 https://rail-berkeley.github.io/bridgedata/ · 논문 https://arxiv.org/abs/2308.12952 · 코드 https://github.com/rail-berkeley/bridge_data_v2 · 데이터 https://rail.eecs.berkeley.edu/datasets/bridge_release/data/\n- 규모/공개: 60,096 궤적(텔레오퍼레이션 50,365 + 스크립트 9,731), 24개 환경, 13개 skill, WidowX 250 6DOF, 5Hz, 평균 38스텝. 공개 (CC BY 4.0 — 프로젝트 페이지 명시).\n- 쓰는 모델: **SuSIE** — low-level controller로 BridgeData V2 repo의 미수정 gc_ddpm_bc(goal-conditioned diffusion BC, horizon 4, delta_goals relabeling)를 그대로 사용.\n\n### Fractal-RT1 (RT-1 / \"fractal20220817_data\" — Robotics Transformer 1, 2022, Google · Everyday Robots)\n- 한 줄: Everyday Robots 이동 매니퓰레이터 13대가 17개월간 모은 실세계 탁상 조작 데모를, 짧은 영어 타이핑 지시 한 문장으로 라벨링한 대규모 imitation-learning 데이터셋. OXE 믹스의 핵심 구성요소(코드네임 `fractal20220817_data`).\n- task: 자연어 지시 한 문장에 조건부로 단일 로봇 팔이 탁상 위 객체(17종) 조작. 스킬군 = pick(130), move A near B(337), pick from receptacle/place(162), place into receptacle(84), open/close drawer(6), place upright(8), knock(8), long-horizon(9) — 합 744개 지시(RT-1 논문 Table 1).\n- 입력 → 출력: 입력 = 단일 head-mounted 카메라의 최근 6프레임 히스토리(256×320 RGB) + 자연어 지시. 출력 = 한 step의 action(world_vector + rotation_delta + gripper + base 이동 + terminate). 한 에피소드 = (이미지+지시 → action) step 시퀀스(RLDS). ※ 단일 헤드 카메라(손목/전방 2-카메라 아님).\n- 예시(타이핑 지시 + 장면, 모두 RT-1 논문 Table 1/본문 verbatim — 확인됨):\n  - \"pick iced tea can\" — 탁상 위 캔/스낵 사이에서 아이스티 캔을 집어 든다.\n  - \"move pepsi can near rxbar blueberry\" — 펩시 캔을 RXBAR 블루베리 바 옆으로 옮긴다.\n  - \"place water bottle upright\" — 옆으로 누운 물병을 똑바로 세운다.\n  - \"open the top drawer\" — 카운터 서랍장 맨 위 서랍을 당겨 연다.\n  - \"pull napkin out of dispenser\" — 디스펜서에서 냅킨 한 장을 뽑아낸다.\n- 예시 영상/이미지: 프로젝트·데모 영상 https://robotics-transformer1.github.io/ · 논문 https://arxiv.org/abs/2212.06817 · 공개 데이터 https://www.tensorflow.org/datasets/catalog/fractal20220817_data · OXE 시각화 뷰어 https://dibyaghosh.com/rtx_viz/\n- 규모/공개: 공개. RT-1 원논문 ~130,000 데모 / 700+ task(744) / 13대 / 17개월. 공개 릴리스본 `fractal20220817_data`(TFDS·OXE) = 87,212 trajectory, 111.38 GiB, RLDS. 라이선스: 콘텐츠 CC BY 4.0, 코드 Apache 2.0.\n- 쓰는 모델: 14모델 중 RT-1/Fractal/OXE를 데이터 줄에 **명시한 모델은 없음**. 다만 π0/π0.5는 계보가 Octo·OpenVLA(OXE 사전학습, OXE에 Fractal 포함)를 거쳐 **간접적으로** 물려받을 가능성이 큼(문서에 적시되어 있지는 않음 — 추정).\n\n### AgiBot-World (AgiBot World Colosseo / InternData-A1, 2024-2025)\n- 한 줄: 100여 대 동종 휴머노이드(AgiBot G1)로 수집한 대규모 **양손 조작(bimanual)** 실데이터 플랫폼. 각 에피소드가 atomic skill 단위로 쪼개지고 sub-step마다 자연어 지시 라벨링. (InternData-A1은 같은 계열의 **합성 데이터** 동반본.)\n- task: 슈퍼마켓 진열·물류 분류·테이블 정리·커피 만들기 같은 일상/리테일 조작. \"make a coffee\"처럼 긴 task를 pick/place atomic skill 시퀀스로 구성. (AgiBot World 217 tasks / InternData-A1 70 tasks·18 skills)\n- 입력 → 출력: 멀티뷰 RGB(+depth) + proprioception(H5) + sub-step 언어 지시 → atomic skill 라벨 + keyframe 구간 + (정책 학습용) action. 메타데이터는 LeRobot 스펙 + `label_info`(→ `action_config`/`action_text`/`skill`)·`key_frame`·`init_scene_text`.\n- 예시(타이핑 지시 + 장면):\n  - \"Pick up onion from the shelf.\" — 슈퍼마켓 진열대 앞 로봇이 양파를 집음(skill: Pick). 초기 장면: \"The robot is in front of the fruit shelf in the supermarket.\" (HF Alpha README verbatim)\n  - \"Place onion into the plastic bag in the shopping cart.\" — 집은 양파를 카트 안 비닐봉지에 담음(skill: Place). (HF Alpha README verbatim)\n  - (대표 예시·추정) \"The left arm picks up the red-capped drink from the shopping cart.\" — 좌/우팔 단일암 지시 형식의 대표 예시(공개 자료 verbatim 미확인).\n  - (InternData-A1은 공개 자료에 verbatim 지시 거의 없음 — 확인된 task명 `sort_the_rubbish` 정도.)\n- 예시 영상/이미지: 공식 YouTube https://youtu.be/foTDYU1lIPE · 프로젝트 https://opendrivelab.com/AgiBot-World/ · HF(실데이터) https://huggingface.co/datasets/agibot-world/AgiBotWorld-Alpha · InternData-A1(합성) https://huggingface.co/datasets/InternRobotics/InternData-A1 · 논문 arXiv 2503.06669(AgiBot World), 2511.16651(InternData-A1)\n- 규모/공개:\n  - AgiBot World — 전체 100만+ trajectory·217 task·~2976.4h. 공개 Alpha 서브셋 = 100k+ trajectory·36 task·595.31h.\n  - InternData-A1 — 637,498 trajectory·7,433.9h·401.4M frame·70 task·4 embodiment. **현재 공개분은 전량 합성**(real-world post-training data는 추후 공개 예정).\n  - **공개** — 둘 다 **CC BY-NC-SA 4.0**(비상업), HF 다운로드 시 라이선스·프라이버시 동의 필요.\n- 쓰는 모델: **ACoT-VLA**(AgiBot World Challenge @ ICRA 2026 공식 VLA 베이스라인) · **InternVLA-A1**(InternRobotics 계열, hybrid synthetic-real 학습; InternData-A1과 동일 조직·embodiment).\n\n### MolmoAct Dataset (MolmoAct: Action Reasoning Models that can Reason in Space, 2025 · Ai2; MolmoAct2, 2026)  ※14모델 외 참고(ARM 계열)\n- 한 줄: Ai2의 오픈 **Action Reasoning Model(ARM)** MolmoAct의 학습 데이터. 일반 로봇 데모를 \"공간 추론 → 행동\"의 **action chain-of-thought**(depth perception token → 이미지공간 visual reasoning trace → action token)로 변환한 것이 핵심. (MolmoBot = MolmoAct 계열 통칭)\n- task: 실세계 단일팔 매니퓰레이션 + 공간추론. tabletop split은 open/pick/flip/close 같은 **재사용 motion primitive**로 분해해 compositional 학습을 유도.\n- 입력 → 출력: (단안 RGB + 언어 지시) → ① **depth token**(DepthAnything-v2 depth map을 VQVAE로 토큰화, M=100) → ② **visual reasoning trace**(그리퍼가 지나갈 이미지공간 polyline, 1~5점, 좌표 [0,255]) → ③ **action token**. 행동은 차원당 **256-bin 이산화**(1~99 퍼센타일 정규화) + Qwen2 마지막 256 심볼(순서보존 ordinal). 학습은 next-token이되 **loss는 action token에만**(depth·trace는 보조 감독). LIBERO 평가는 delta-eef, post-train은 action chunk N=8.\n  - **eef/joint 통합(MolmoAct2)**: 각 action을 **고정 32차원으로 패딩** → absolute joint(예: BimanualYAM 양팔)과 delta-end-effector(소형 데이터셋)를 **한 토크나이저 입력공간에 함께** 담아 cross-embodiment 공동학습. 그리퍼(open/close)는 연속 정규화에서 분리 처리.\n- 예시(타이핑 지시 + 장면, **대표 예시·추정** — verbatim 미확정): \"pick up the cup and place it on the plate\" / \"open the drawer\" / \"flip the bowl upright\" 류의 tabletop atomic 조작(tabletop split 20 atomic task를 primitive 조합으로 구성).\n- 예시 영상/이미지: 블로그 https://allenai.org/blog/molmoact · 논문(v1) https://arxiv.org/abs/2508.07917 · (v2) https://arxiv.org/abs/2605.02881 · 코드 https://github.com/allenai/molmoact (v2 https://github.com/allenai/molmoact2) · 모델 https://huggingface.co/allenai/MolmoAct-7B-D-0812\n- 규모/공개: **MolmoAct Dataset** = single-arm Franka **10,689 trajectory**(평균 112 step, 93 task, home+tabletop; tabletop split 2,959 traj / 20 atomic task). depth VQVAE는 **RT-1·BridgeData V2·BC-Z**의 depth map **1,000만 장**으로 학습. **MolmoAct2** = +**720h+ bimanual**. **공개** — Ai2 풀오픈(데이터·가중치·코드 HF·GitHub; 데이터 라이선스는 출처별 확인 권장). 사전학습 효율 9,216 GPU-h(경쟁 ~50,000 대비).\n- 쓰는 모델: **14모델 외 참고 모델**(MolmoAct/MolmoAct2, Ai2). 우리 surveybot `papers.json`엔 VoLoAgent/RoboVoLo 벤치의 비교모델로 `MolmoBot`·`MolmoAct2`가 등재. depth VQVAE 소스(RT-1·BridgeData V2)는 본 문서 §2에 이미 존재.\n\n---\n\n## 3. human video (latent-action / 사전학습)\n\n### Something-Something V2 (The \"something-something\" video database, V2 / 2018; V1 논문 2017)\n- 한 줄: 사람이 일상 사물을 손으로 조작하는 짧은 영상에 \"동작 템플릿 문장\"을 라벨로 단 대규모 action-recognition 데이터셋. 객체가 무엇인지보다 \"무슨 일이 벌어지는가(밀기/들기/덮기)\"를 알아맞히게 설계.\n- task: video action recognition — 짧은 클립 하나를 174개 동작 클래스 중 하나로 분류. \"something\" 슬롯 placeholder가 들어간 템플릿 문장이 클래스명이라, 객체 외형이 아니라 동작/물리 상식을 학습.\n- 입력 → 출력: 입력 = 2~6초 RGB 클립(사람 손 + 사물). 출력 = 174개 동작 클래스 1개(예: \"Pushing something from left to right\"). (video) → (action label 문장). 로봇 action·미래 frame 없음 — 라벨형 human video.\n- 예시(동작 라벨 + 장면) — 아래 라벨 3개는 모두 공식 174-class 셋에 그대로 존재(검증됨):\n  - \"Pushing something from left to right\" — 손으로 책상 위 물건(펜·컵)을 왼→오른쪽으로 미는 장면.\n  - \"Moving something up\" — 손에 쥔 물건을 아래→위로 들어 올리는 장면.\n  - \"Putting something onto something\" — 한 물건을 다른 물건(상자·책) 위에 올려놓는 장면.\n  - (라벨은 \"지시\"가 아니라 \"동작 설명 문장\"이며 \"something\"은 클래스명에 그대로 들어가는 placeholder 슬롯.)\n- 예시 영상/이미지: 공식 데이터셋/라이선스 페이지 https://www.qualcomm.com/developer/artificial-intelligence/datasets · 원논문(V1, ICCV 2017) https://arxiv.org/abs/1706.04261 · V2 릴리스 소개(TwentyBN, 2018) https://medium.com/twentybn/something-something-v2-release-9107b4a8ce99\n- 규모/공개: V2 = 영상 220,847개(train 168,913 / val 24,777 / test 27,157), 174 클래스, 2~6초(V1은 108,499). **부분공개** — Qualcomm Research Use License(연구용 한정) 동의 후 다운로드(원 호스트 TwentyBN이 Qualcomm에 인수).\n- 쓰는 모델: **VLA-JEPA**(JEPA pretraining용 human video, ~220K; HF morpheushoc/something-something-v2 — 단 이 HF 항목은 메타데이터 중심·영상 파일 없음·뷰어 깨짐), **SuSIE**(InstructPix2Pix subgoal-editing 학습에 human video; 실세계 학습 = SSv2 60% + BridgeData V2 40%).\n\n### EgoDex (EgoDex: Learning Dexterous Manipulation from Large-Scale Egocentric Video, 2025 · Apple)\n- 한 줄: Apple Vision Pro로 찍은 1인칭(egocentric) 사람 손 조작 영상 + 3D 손/손가락 포즈가 짝지어진, 현재까지 최대 규모의 dexterous manipulation 데이터셋. 로봇이 아니라 \"사람이 직접 손으로\" 일상 물건을 다룬다.\n- task: 데이터셋 자체는 학습용 코퍼스. 용도 = 영상에서 dexterous manipulation을 imitation learning / world-model 사전학습으로 배우기. 전부 tabletop 능동 조작, 194개 작업.\n- 입력 → 출력: (샘플 1개) 1인칭 RGB 영상(MP4, 30Hz·1080p) + 동기화 3D 포즈(HDF5, 상체·양손 68 joint = 상체 20 + 왼손 24 + 오른손 24의 SE(3)) + 카메라 intrinsics/extrinsics + 자연어 task 설명(GPT-4가 수집 메타데이터를 합쳐 1문장 생성, attribute `llm_description`). → 정해진 정답 출력 없음(라벨=task명 + 손 포즈 trajectory).\n- 예시(task 라벨 + 장면): ※ 사람 1인칭 데이터라 로봇식 \"타이핑 명령\"은 없음. 아래는 **실제 task 라벨**(폴더/태스크명, arXiv Appendix A.1 verbatim). 각 영상의 자연어 설명은 GPT-4 자동 생성이라 개별 문장은 verbatim 공개 안 됨.\n  - `tie_and_untie_shoelace` — 테이블 위 신발끈을 손가락으로 묶었다 푸는 1인칭 손 조작.\n  - `fold_stack_unstack_unfold_cloths` — 천/빨래를 접고 쌓고 다시 펴는 양손 조작.\n  - `screw_unscrew_bottle_cap` — 병뚜껑을 손가락으로 돌려 잠그고 푸는 장면. (그 외 `insert_remove_plug_socket`, `assemble_disassemble_furniture_bench_chair`, `flip_pages`, `throw_and_catch_ball`, `basic_pick_place` 등 총 194 task.)\n- 예시 영상/이미지: 프로젝트 페이지 https://machinelearning.apple.com/research/egodex-learning-dexterous-manipulation · 논문 https://arxiv.org/abs/2505.11709 (Fig.5 = task 물체) · 코드+데이터 https://github.com/apple/ml-egodex\n- 규모/공개: 829시간 · ~90M 프레임 · 338,000 시연 · 194 task. **부분공개** — 코드 GitHub 공개, 데이터셋 다운로드 가능하나 라이선스가 **CC-BY-NC-ND**(비상업·변형금지)라 자유 재사용 제한.\n- 쓰는 모델: **DreamDojo**(NVIDIA, 2026) — 사전학습용 DreamDojo-HV(총 44,711h human video) 구성요소 중 하나로 EgoDex 829h 포함(나머지는 크라우드소싱 자체 수집 + 소량 자체 실험실). EgoDex만 외부 공개 부분이고 DreamDojo-HV 본체는 비공개.\n\n### YT-Temporal-1B (YT-Temporal-1B / MERLOT Reserve, 2022)\n- 한 줄: 2천만 개 in-the-wild 유튜브 영상(다큐·how-to·vlog 등)을 프레임 + 자동 음성인식(ASR) 자막/오디오로만 모은 self-supervised 멀티모달 사전학습 코퍼스. **행동(action) 라벨이 전혀 없다** — 명령/지시가 아니라 영상에서 실제로 말해진 내레이션(자막)뿐.\n- task: masked multimodal pretraining. 영상 프레임 + 자막 + 오디오를 시간축으로 정렬하고, 한 구간(text/audio snippet)을 [MASK]로 가린 뒤 맞히게 학습. (시계열 직관: 멀티모달판 masked-LM/contrastive.)\n- 입력 → 출력: 입력 = (프레임들, 시간정렬 ASR 자막, 오디오 스펙트로그램) + 일부 [MASK]. 출력 = 가려진 구간의 올바른 text/audio 임베딩 선택(contrastive). 데이터셋 자체엔 정답 행동라벨 없고 ASR가 유일 약지도.\n- 예시(영상에 실제 말해진 ASR 내레이션 자막) — 주의: \"명령/지시\"가 아니라 영상의 **ASR 자막/오디오**(행동 라벨 없음):\n  - \"why\" — 논문 **Figure 9**(MASKed audio) 검증 예시 verbatim: 텍스트는 \"why\"뿐이고 오디오에서 화자가 사회적 대화에 놀라 웃는 vlog/대화 장면. [verbatim 확인]\n  - (팝콘 요리 장면) — Figure 9에 가려진 오디오 정답이 팝콘 요리 클립인 예시가 있으나, ⚠️ \"the sound of popcorn pops slowing\" 같은 **verbatim 자막 문장은 논문에 존재하지 않음**(지어낸 예시로 판명) — \"팝콘 요리 장면(개념 예시)\"으로만 취급.\n  - \"cook avocado\" / \"cook apple\" — (다운스트림 평가용 라벨) EPIC-Kitchens zero-shot action-anticipation의 verb-noun 라벨 공간 예시. YT-Temporal-1B 원본 라벨이 아니라 평가용 라벨 공간.\n- 예시 영상/이미지: 프로젝트 페이지 https://rowanzellers.com/merlotreserve/ · 논문 https://arxiv.org/abs/2201.02639 · 데모 https://merlot.apps.allenai.org/ · 코드 https://github.com/rowanz/merlot_reserve\n- 규모/공개: 20M(2천만) 영어 자막 영상, ~1B(10억) 프레임. 행동 라벨 0(ASR 자막+메타데이터만). **부분공개(접근제한)**: 영상 ID·메타데이터만 GCS로 공개됐었고 실제 영상은 비배포(유튜브 직접 수집)였으나, 현재 GCS 버킷(gs://merlot/yttemporal1b/...)이 셧다운되어 접근 불가(facebookresearch/vjepa2 #58). 라이선스 = 코드 MIT, 데이터셋 자체 라이선스 공식 미명시.\n- 쓰는 모델: **JEPA-Wild**(arXiv 2601.05230) — YouTube-Temporal-1B로 ~10억 클립 규모 latent-action world-model 사전학습. 행동 라벨이 0인 점이 이 모델이 IDM으로 라벨 없이 latent action을 복원하는 설계의 출발점.\n\n---\n\n## 4. 실로봇 플랫폼\n\n### ALOHA (A Low-cost Open-source Hardware System for Bimanual Teleoperation, 2023) / ALOHA 2 (2024)\n- 한 줄: 두 팔 leader-follower 텔레오퍼레이션으로 정밀 양팔(bimanual) 조작 시연을 싸게(<$20k) 모으는 하드웨어 플랫폼 + 그 데이터로 정책을 학습하는 ACT 알고리즘. \"양팔 조작 데모 수집의 사실상 표준 리그\".\n- task: 책상 위 정밀 양팔 조작(open cup, slot battery, thread velcro 등). ALOHA 2 계열은 자연어 지시-따르기(instruction-following) 시뮬레이션 task 묶음 추가(MuJoCo `aloha_sim`).\n- 입력 → 출력: 4개 RGB 카메라(고정 2 + 양손목 2, 480×640) + 양팔 joint position (+ALOHA 2 시뮬은 언어 지시) → 14-DoF 양팔 목표 joint position을 50Hz로 예측(ACT는 chunk size k=100).\n- 예시(타이핑 지시 + 장면):\n  - \"put the banana in the bowl\" — 식탁 위 바나나를 한 팔로 집어 그릇에 넣음 (aloha_sim `DiningPlaceBananaInBowl`, 뷰어 기본 지시)\n  - \"remove the cap from the marker\" — 한 팔로 마커 몸통을 잡고 다른 팔로 뚜껑을 빼는 양손 협응 (aloha_sim `MarkerRemoveLid`; 지시 문구는 대표 예시)\n  - \"place the can opener in the left compartment of the caddy\" — 캔따개를 정리함 왼쪽 칸에 넣음 (aloha_sim `ToolsPlaceCanOpenerInLeftCompartment`; 대표 예시)\n  - (참고: 원조 ALOHA 2023 실물 6개 task 라벨은 언어 지시가 아닌 task 이름 — Open Cup / Slot Battery / Prep Tape / Thread Velcro / Slide Ziploc / Put On Shoe)\n- 예시 영상/이미지: 프로젝트 페이지 https://tonyzhaozh.github.io/aloha/ · ALOHA 2 https://aloha-2.github.io/ · 원 논문 https://arxiv.org/abs/2304.13705 · 시뮬 task repo https://github.com/google-deepmind/aloha_sim\n- 규모/공개: 부분공개. 원조 ALOHA는 실물 6개 task, task당 50 데모(Thread Velcro만 100). 하드웨어 설계·코드·MuJoCo 모델·`aloha_sim` 시뮬 task(약 18종)는 공개. 라이선스: ACT 코드 MIT, `aloha_sim` Apache-2.0(에셋 BSD-3 / CC-BY-4.0). 대규모 실물 에피소드 공식 통합 데이터셋은 단일 릴리스로는 없어 규모 미확인.\n- 쓰는 모델: **Cosmos Policy** — 실세계 양팔(ALOHA 2) 4개 task 평가 평균 93.6%로 baseline 대비 평균 1위, HF `nvidia/Cosmos-Policy-ALOHA-Predict2-2B` 공개.\n\n---\n\n## 5. 멀티모달 (BAGEL 계열)\n\n### OmniCorpus (OmniCorpus: A Unified Multimodal Corpus of 10 Billion-Level Images Interleaved with Text, 2024)  ※최종 검증 패스 누락(1차 리서치본)\n- 한 줄: 웹(Common Crawl·중국어 웹·YouTube)에서 긁어온 \"이미지와 글이 자연스럽게 섞인 문서\" 100억장 규모 멀티모달 코퍼스 — 멀티모달 LLM **사전학습용** 원천 데이터(로봇 task 아님).\n- task: 데이터셋 자체는 task가 아니라 **pre-training corpus**. MLLM 사전학습, multimodal in-context learning, 긴 text-image retrieval. (액션 라벨·로봇 지시 없음)\n- 입력 → 출력: 한 \"문서\"가 곧 샘플 = 이미지·텍스트가 번갈아 나오는 한 시퀀스. 구조 = `images`(URL or None) / `texts`(문단 or None) / `metadata`가 같은 길이로 정렬돼 `<txt>,<img>,<img>,<txt>...` 흐름. 모델은 이 stream을 그대로 먹고 next-token 예측.\n- 예시(타이핑 지시 + 장면): 이 데이터엔 \"명령\"이 아니라 **웹 문서 본문 + 그 자리의 이미지**가 들어있다.\n  - `texts: [None, \"<문단 텍스트>\", None, \"<다음 문단>\"]` + `images: [<img_url>, None, <img_url>, None]` — 한 문서 안에서 `이미지1 → 글 → 이미지2 → 글` 식 교차 배열(공식 HF 카드 실제 sample 구조). 본문은 일반 웹페이지 텍스트라 고정된 \"지시 문장\"은 없음.\n  - 논문 Fig.1 문서 모식: `<txt1>, <img1>, <img2>, <txt2>, <txt3>, <img3>, <txt4>` — 한 웹 문서를 레이아웃 순서대로 쪼갠 것.\n- 예시 영상/이미지: 논문 https://arxiv.org/abs/2406.08418 · GitHub https://github.com/OpenGVLab/OmniCorpus · HF 데이터 https://huggingface.co/datasets/OpenGVLab/OmniCorpus-CC\n- 규모/공개: 8.6B 이미지 / 1,696B 텍스트 토큰 / 2.2B 문서. 서브셋 = CC(영어 Common Crawl) / CW(중국어 웹) / YT(YouTube 프레임+자막). **공개** — 메타데이터·어노테이션 CC BY 4.0(코드 Apache-2.0)이나 **이미지 원본 저작권은 출처에 귀속**(URL로 제공). ICLR 2025 Spotlight.\n- 쓰는 모델: **BAGEL**(ByteDance-Seed) — 통합 이해+생성의 핵심 공개 interleaved 사전학습 구성요소(Koala-36M·MVImgNet2.0 등과 함께). 파생 로봇 스택 BagelVLA가 그 위에 action expert를 붙임.\n\n### Koala-36M (Koala-36M: A Large-scale Video Dataset Improving Consistency between Fine-grained Conditions and Video Content, 2024)\n- 한 줄: YouTube 출처 영상(HD-VILA-100M→Panda-70M 계보)을 정확히 컷 분할하고 평균 200단어짜리 \"구조화된 상세 캡션\" + 품질 점수를 붙인 3,600만 클립 규모의 대형 video-text 데이터셋(Shenzhen Univ.·Tsinghua·Kuaishou 산학, Kling/KlingAIResearch 공개, CVPR 2025).\n- task: text-to-video / 영상 생성 모델의 사전학습 코퍼스. 로봇 행동 라벨이 아니라 \"영상 ↔ 자세한 텍스트 설명\"의 일관성을 높이는 게 목적.\n- 입력 → 출력: 입력 = 짧은 영상 클립(평균 13.75초, 720p). 출력 = 장문 캡션(평균 202.1단어) + 메트릭(clarity/aesthetic/motion score, 종합 VTSS). 한 row = {videoID, url, timestamp, caption, *_score}. (행동/명령 라벨 없음 — 자막식 묘사 캡션)\n- 예시(영상 묘사 캡션): ※ 로봇 명령이 아니라 영상 묘사 캡션. 실제 캡션은 200단어 장문이라 공식 페이지의 verbatim 도입 문장만 인용:\n  - \"A scuba diver is exploring a shallow coral reef underwater, observing a large shark swimming nearby.\" — 다이버가 산호초를 탐험하며 옆을 지나는 상어를 관찰하는 수중 장면.\n  - \"A white car is driving along a winding road in a rural area.\" — 흰 자동차가 시골 구불구불한 도로를 달리는 장면.\n  - \"Two men in a workshop or garage setting, where one man is demonstrating how to put on a black jacket.\" — 작업장에서 한 남자가 검은 재킷 입는 법을 시연하는 장면.\n  - (위 셋은 공식 koala36m.github.io 데모에 표기된 캡션 도입부 verbatim — 검증됨. 실제 데이터의 전체 캡션은 훨씬 김.)\n- 예시 영상/이미지: 프로젝트 페이지 https://koala36m.github.io/ · 논문 https://arxiv.org/abs/2410.08260 · 코드 https://github.com/KlingAIResearch/Koala-36M · 데이터 https://huggingface.co/datasets/Koala-36M/Koala-36M-v1\n- 규모/공개: 3,600만 클립(≈35.96M rows) / ~172K시간 / 평균 13.75초·720p / 캡션 평균 202.1단어. **공개** — HuggingFace에서 캡션·URL·점수 배포(~48.9GB 메타데이터). 단 영상 본체는 원 출처(HD-VILA-100M→Panda-70M, YouTube)라 원본 라이선스 종속.\n- 쓰는 모델: **BAGEL** — 통합 이해·생성 사전학습의 영상 구성요소로 OmniCorpus·MVImgNet2.0과 함께 Koala-36M 사용.\n\n### MVImgNet2.0 (MVImgNet2.0: A Larger-scale Dataset of Multi-view Images, 2024)\n- 한 줄: 일상 물체를 휴대폰으로 360° 빙 돌며 찍은 영상에서 뽑은 멀티뷰 이미지 + 3D 주석(마스크·카메라 포즈·점군) 대규모 데이터셋. \"한 물체 = 여러 각도 사진 묶음\"이 기본 단위(로봇/언어 명령 데이터 아님 — 2D↔3D 비전용).\n- task: 멀티뷰 이미지로부터의 3D 인식/재구성 표현 학습(\"3D판 ImageNet\"). 대형 3D 재구성 모델(LRM·LGM 등) 사전학습·생성모델 학습용 멀티뷰 소스.\n- 입력 → 출력: 입력 = 한 물체를 둘러싸고 찍은 ~10초 360° 영상 → 추출 = 물체당 30뷰 이상(멀티뷰 RGB). 각 프레임 주석 = (전경 물체 마스크 + 카메라 파라미터) + 물체당 1개 dense 점군.\n  - 마스크: Grounding-DINO + SAM + DeAOT. 카메라 포즈: PixSfM 추정, **공개 데이터는 COLMAP 바이너리 포맷**. 점군: Neural-Angelo. 폴더 구조: `class_label/instance_id/{images/, masks/, sparse/0/(cameras.bin, images.bin, points3D.bin)}`.\n- 예시(카테고리 라벨 + 장면): 라벨은 언어 명령이 아니라 **WordNet 기반 카테고리명**. 아래는 원조 MVImgNet `mvimgnet_category.txt`의 **실제 카테고리명**(verbatim 확인). MVImgNet2.0은 이 택소노미 확장(347클래스, 277 신규).\n  - \"chair\" — 의자를 책상 옆에 두고 360° 촬영, 30뷰+ + 마스크 + 점군.\n  - \"sofa\" — 소파를 정면→측면→후면까지 빙 돌며 찍은 멀티뷰, COLMAP 포맷 카메라 포즈 동봉.\n  - \"bottle\" — 병 하나를 근접 360° 촬영, 마스크로 전경 분리 + dense 점군.\n- 예시 영상/이미지: 프로젝트 페이지 https://luyues.github.io/mvimgnet2/ · 논문 https://arxiv.org/abs/2412.01430 · GitHub https://github.com/GAP-LAB-CUHK-SZ/MVImgNet2.0 · 원조 MVImgNet https://github.com/GAP-LAB-CUHK-SZ/MVImgNet\n- 규모/공개: v2.0 신규 = ~300k 물체 / 347 클래스(277 신규), ≈9M 프레임; v1.0과 합쳐 총 ~520k 물체 / 515 카테고리. **부분공개** — form 작성 후 다운로드, 현재 1차분(~180k 영상)만 공개. 라이선스: 데이터=커스텀 비상업 Terms of Use, 코드=CC BY-NC 4.0. 게재: ACM TOG 43(6), 2024.\n- 쓰는 모델: **BAGEL** — 통합 이미지 이해·생성의 멀티뷰 공개 구성요소로 OmniCorpus·Koala-36M과 함께 MVImgNet2.0 사용(공간 이해용).\n\n---\n\n## 6. planning / toy (WM · LeWM 계열)\n\n### Push-T (Push-T / PushT, IBC 2021 발원 · Diffusion Policy로 대중화 2023)\n- 한 줄: 2D 평면에서 원형 엔드이펙터로 T자 블록을 밀어 목표 위치에 맞추는 토이 조작 벤치마크. **언어 지시 없음** — 시각/상태만으로 정밀 푸시를 학습하는 contact-rich 평가용 task.\n- task: 회색 T자 블록을 빨간 목표 윤곽에 90% 이상 겹치도록 밀어 넣고, 이어 엔드이펙터를 종료 구역으로 옮겨 에피소드 종료. multimodal·접촉이 많은 push라 정밀 제어 요구.\n- 입력 → 출력: (입력) 96×96 RGB 또는 저차원 state/keypoint(블록 pose 9개 2D keypoint + pusher 위치). (출력) 다음 타임스텝 엔드이펙터 목표 2D 위치 (x,y). 한 프레임 = {image, state, keypoint, action}. 자연어 토큰 없음.\n- 예시(장면 묘사 — verbatim 언어 지시는 비존재):\n  - \"(언어 지시 없음)\" — 파란 원형 pusher가 회색 T블록의 한쪽 변을 밀어 빨간 T 윤곽 안으로 회전·정렬시키는 장면(색상은 원논문 'block=gray, target=red, end-effector=blue'와 일치).\n  - \"(언어 지시 없음)\" — 블록이 목표 윤곽을 90% 덮은 뒤 pusher가 종료 구역으로 이동해 끝나는 장면.\n  - 주: 데이터셋·env에 텍스트 명령/라벨 필드가 전혀 없음(LeRobot total_tasks=1, 텍스트 설명 없음 — 검증됨). 따옴표 안에 넣을 verbatim 지시는 존재하지 않음.\n- 예시 영상/이미지: 프로젝트 페이지 https://diffusion-policy.cs.columbia.edu/ (rollout 결과 https://diffusion-policy.cs.columbia.edu/pusht_results.html) · 코드/데이터 https://github.com/real-stanford/diffusion_policy · 데이터 zip https://diffusion-policy.cs.columbia.edu/data/training/pusht.zip · LeRobot 포팅 https://huggingface.co/datasets/lerobot/pusht\n- 규모/공개: 약 206 에피소드 / 약 25,650 프레임(인간 텔레오퍼레이션, `pusht_cchi_v7_replay.zarr`). 별도 real-robot 변형(`pusht_real`)도 존재. **공개** — Diffusion Policy 리포 및 LeRobot 포팅 모두 MIT. (원조 task는 IBC, Florence et al. **2021**, CoRL 2021.)\n- 쓰는 모델: **JEPA-WMs/DINO-WM 계열**(navi·조작 벤치마크로 PushT, PLDM 데이터) · **LeWM**(오프라인 픽셀 trajectory 4종 중 Push-T 2D 조작, PLDM 출처).\n\n### OGBench (Benchmarking Offline Goal-Conditioned RL, 2024 arXiv / ICLR 2025)\n- 한 줄: 미로 내비게이션·로봇팔 조작·퍼즐·그림그리기(Powderworld) 등 8종 환경의 오프라인 trajectory를 모은, **목표 상태(goal)** 도달을 평가하는 goal-conditioned RL/world-model 벤치마크. **언어 명령이 아니라 \"목표 관측(이미지/상태)\"으로 task를 지정**한다.\n- task: 오프라인 데이터(전문가 아닌, reward-free trajectory)로 학습한 policy/WM이 임의의 **goal observation**에 도달하도록 행동·계획. stitching, long-horizon, 고차원 입력, 확률성 같은 능력을 직접 probe.\n- 입력 → 출력: 입력 = 현재 관측 + **goal 관측**(state 벡터 또는 pixel 64×64×3 RGB) → 출력 = 연속 제어 행동(로봇/locomotion) 또는 이산 행동(Powderworld). 데이터 한 transition = (obs, action, next_obs), reward 없음.\n- 예시(태스크 이름 + 장면): **OGBench는 언어 지시가 없다 — 아래는 실제 데이터셋/태스크 이름과 장면 묘사이며, 텍스트 명령으로 존재하지 않는다(목표는 이미지/상태로 지정).** (세 이름은 모두 공식 데이터셋에 `-v0`로 실재)\n  - `cube-double-play` — 6-DoF UR5e 로봇팔(+Robotiq 2F-85)이 색깔 큐브를 집어 목표 배치(goal 이미지/상태)대로 옮기는 pick-and-place.\n  - `puzzle-3x3-play` — 로봇팔이 버튼을 눌러 \"Lights Out\"식 퍼즐(누른 버튼+인접 버튼 색 토글)을 풀어 목표 색으로 만드는 장면.\n  - `humanoidmaze-large-navigate` — 21-DoF 휴머노이드(또는 8-DoF Ant)가 큰 미로에서 목표 좌표까지 전신 제어로 이동.\n- 예시 영상/이미지: 프로젝트 페이지 https://seohong.me/projects/ogbench/ · 논문 https://arxiv.org/abs/2410.20092 · GitHub https://github.com/seohongpark/ogbench · Powderworld 데모 https://kvfrans.com/powder/\n- 규모/공개: 8개 환경(PointMaze·AntMaze·HumanoidMaze·AntSoccer·Cube·Scene·Puzzle·Powderworld), **85개 데이터셋** + 총 **410 tasks**, 데이터셋당 ~1M transitions(100M 대용량 변형도 제공), state·pixel 관측 모두 지원. **공개**(pip install ogbench, **MIT**).\n- 쓰는 모델: **LeWM** — 학습 데이터 4종 중 하나로 OGBench의 3D 조작 환경 **Cube** 사용(픽셀 trajectory, \"OGBench-Cube\").\n\n### Meta-World (Meta-World: A Benchmark and Evaluation for Multi-Task and Meta RL, 2019)\n- 한 줄: Sawyer 로봇 팔로 50가지 테이블탑 조작(문 열기·서랍·버튼 등)을 시뮬레이터(MuJoCo)에서 수행하는 멀티태스크/메타-RL **벤치마크**. \"언어 명령 데이터셋\"이 아니라 **task가 이름표(env-id 문자열)로 식별**되는 RL 환경이라, 타이핑 자연어 지시는 데이터에 없다.\n- task: 단일·멀티·메타 RL 평가. 모드 = ML1/MT1, ML10/MT10, ML45·MT50. 각 task마다 목표·물체 위치 무작위화. shaped dense reward, success metric로 성공 판정.\n- 입력 → 출력: 입력 = 상태 관측(저차원 ~39차원: EE 위치·그리퍼·물체 pos/quat·이전 스텝·목표 위치; 옵션 카메라 RGB) + task 식별자. 출력 = 4차원 연속 행동(EE Δ(x,y,z) + 그리퍼 정규화 토크). 자연어 출력 없음.\n- 예시(task 라벨 + 장면): ※ Meta-World엔 타이핑 자연어 지시가 없다. 아래는 **실제 task 라벨(env-id, verbatim)** + 논문 Table 2 공식 task 설명(verbatim, 전부 실재 확인).\n  - `door-open-v3` — \"Open a door with a revolving joint.\" (경첩 달린 문 손잡이를 당겨 여는 장면; 문 위치 무작위)\n  - `drawer-close-v3` — \"Push and close a drawer.\" (서랍 손잡이를 밀어 닫는 장면; 서랍 위치 무작위)\n  - `button-press-topdown-v3` — \"Press a button from the top.\" (위에서 빨간 버튼을 누르는 장면; 버튼 위치 무작위)\n- 예시 영상/이미지: 프로젝트 페이지 https://meta-world.github.io/ · 논문 https://arxiv.org/abs/1910.10897 (Table 2 task 설명) · 공식 repo https://github.com/Farama-Foundation/Metaworld · docs https://metaworld.farama.org/\n- 규모/공개: 50개 조작 task(MT10/MT50, ML10/ML45). **공개** — MIT 라이선스(Farama-Foundation 유지보수판; `pip install metaworld`). 데이터는 \"고정 데이터셋\"이 아니라 시뮬레이터로 trajectory를 생성하는 환경.\n- 쓰는 모델: **JEPA-WMs** — 보조 벤치마크 중 하나로 Metaworld 사용. 단 실제로는 **Reach·Reach-Wall(MW-R, MW-RW) 두 task만** 사용(TD-MPC2 agent로 trajectory 생성). 주력은 DROID→RoboCasa zero-shot.\n\n---\n\n## 출처 & 신뢰도 노트\n\n- 위 22개 데이터셋 카드는 web 검색 + 적대적 사실검증 1패스를 거쳤다(2026-06 기준). MolmoAct(23번째)는 2026-06-16 추가분으로 web 확인 기반이나 예시 지시는 verbatim 미확정(대표 예시) 표기. 단 **RoboCasa·OmniCorpus**는 세션 한도로 최종 적대적 검증 단계가 누락된 1차 리서치본이라 검증 강도가 한 단계 낮다.\n- **예시 진위**: 예시 지시/라벨은 가능한 한 데이터셋의 실제 항목(verbatim)만 채택했고, 검증 패스에서 잡힌 지어낸 예시는 제거/강등했다(YT-Temporal \"popcorn pops\" 자막, CALVIN \"move the slider left\", DROID 3예시, RoboTwin 원본↔randomized 단정 등 → \"대표 예시·추정\" 또는 실제 문자열로 교정).\n- **언어 지시가 없는 데이터**(Push-T, OGBench, Meta-World, MVImgNet2.0, SSv2, EgoDex, YT-Temporal, OmniCorpus, Koala-36M)는 \"타이핑 명령\" 대신 task 라벨/카테고리명/캡션/ASR 자막/문서 구조로 예시를 대체하고 그 점을 명시했다.\n- **공개여부**는 데이터셋 자체 기준(모델 가중치 공개와 별개)이며, post-cutoff(2025-12 이후) id는 라이브 web 확인에 의존한다. 라이선스가 출처마다 다른 경우(LIBERO·DROID 등) 둘 다 표기했다.\n- **\"쓰는 모델\"** 줄은 계보 문서(내부 14모델 집합)의 데이터/공개·평가 줄 기준이라 외부 web 검증 대상이 아니다.\n";
  window.addEventListener('DOMContentLoaded', () => {
