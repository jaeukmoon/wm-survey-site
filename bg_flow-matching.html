  <article class="dd" id="dd-body"><p class="muted">렌더링 중… (오프라인이면 CDN 로드 실패 — 원본: basic_theory.md)</p></article>
  <script>
  const MD = "# Flow Matching\n\n> 출처: [FM] \"Flow Matching for Generative Modeling\" (Lipman et al., arXiv 2210.02747), [RF] \"Flow Straight and Fast: Rectified Flow\" (Liu et al., arXiv 2209.03003). ※ 둘 다 arXiv HTML 404, 원본 그림은 ar5iv 호스트.\n\n**한 줄 정의**: 단순한 노이즈 분포(가우시안)를 데이터 분포로 **부드럽게 흘려보내는 속도장**(velocity field) $v_t(x)$ 를 배우는 생성법. 생성 = 노이즈에서 출발해 ODE $dx/dt=v_t(x)$를 몇 step 적분하면 데이터가 복원된다. diffusion과 친척이지만 **autoregressive 아님**(한꺼번에 정제), 보통 더 빠르고 안정적.\n\n> **30초 큰 그림 비유**: 데이터(정답)에 모래폭풍(노이즈)을 끼얹어 가는 **직선 길**을 그어 놓고, 그 길 위 아무 지점에서나 \"집(데이터)으로 가려면 어느 방향으로 얼마나 빨리?\"라는 **화살표(속도)**를 맞히도록 신경망을 훈련한다. 정답을 외우는 게 아니라 **되돌아오는 화살표**를 배우는 것. 추론 땐 노이즈에서 출발해 이 화살표 따라 몇 걸음 걸으면 끝.\n\n### AR이 아닌 이유 (자주 하는 오해)\n\n> 흔한 오해: \"디퓨전 = 노이즈 더하는 과정을 거꾸로 = AR 아닌가?\". **아니다 — 디퓨전도 flow matching도 둘 다 non-AR**이다.\n\n**AR(autoregressive)**은 GPT처럼 **출력을 한 조각씩, 앞선 조각에 조건부로** 만드는 것: `p(x)=p(x₁)·p(x₂|x₁)·…`. GPT(토큰 1개씩)·PixelCNN(픽셀 1개씩)이 예. 스텝이 **출력 차원(다음 토큰/픽셀)**을 따라 진행 → 출력이 한 조각씩 자란다.\n\n**디퓨전·flow matching**은 반대로 **이미지 전체를 한 번에 만들어 놓고 반복해서 정제**한다. 스텝이 출력 조각을 늘리는 게 아니라 **노이즈 레벨(시간 t)**을 따라가며 전체를 통째로 또렷하게 만든다.\n\n```\nAR        : 스텝 = 출력 차원(다음 토큰)   → \"새 조각 하나씩 붙임\", 순차·병렬불가\n디퓨전/flow: 스텝 = 노이즈 레벨(시간 t)   → \"전체를 통째로 점점 깨끗하게\", 모든 픽셀 병렬\n```\n\n- **\"스텝이 없어서 AR이 아닌 건가?\" → 아니다.** flow matching도 추론 시 ODE 적분 스텝이 있다(보통 ~10 Euler step). 디퓨전도 마찬가지. **스텝 유무가 AR 기준이 아니라, 스텝이 무엇을 따라가느냐**(출력 차원 vs 노이즈 레벨)가 기준이다.\n- **디퓨전 vs flow matching 차이**(둘 다 non-AR): 노이즈↔데이터 경로가 **곡선(SDE, 노이즈 ε 예측)**이냐 **직선(ODE, 속도 v=x₁−x₀ 예측)**이냐. flow는 직선이라 적분이 쉬워 few-step. 그래서 [DiT](bg_diffusion-transformer.html) 백본은 그대로 두고 목적함수만 flow로 갈아끼우기도 함(SD3·[Wan](bg_wan.html)).\n- **참고**: 비디오엔 진짜 **AR 방식**(프레임을 앞 프레임 조건부로 1장씩 생성)도 있다. Wan 같은 디퓨전 비디오는 클립 전체를 한 번에 만들고 denoise → world-model에서 의미 있는 갈림길(FastWAM에서 재등장).\n\n### 비유로 읽는 수식 (EQ1–EQ6, 쉬운 버전)\n\n> 정식 유도는 바로 아래 `### 수식` 참조. 여기선 각 식을 \"강물 위 나뭇잎(직선이면 집→회사 도로)\" 비유로 직관만 잡는다. (멀티에이전트 설명 + 적대적 검증 통과본)\n\n**무대**: 강 곳곳에 \"여기선 이 방향으로 이만큼\"의 물살(=속도장)이 깔려 있고, 잎을 띄우면 물살 따라 흐른다. 노이즈 한 줌을 띄우면 시간이 지나며 데이터 분포 모양이 된다.\n\n- **EQ1 흐름/ODE** `dφ_t/dt = v_t(φ_t(x)), φ_0=x` — 잎의 순간 속도 = **지금 떠 있는 위치**의 물살(처음 놓은 자리 아님 = 자기참조 ODE). noise 항 없는 **결정론적** 흐름(diffusion의 SDE 아님), 무작위성은 시작점 뽑기에만. 이 목표 속도장을 이후 `u_t`(정답)/`v_θ`(신경망 추정)로 부른다.\n- **EQ2 목적함수** `L_FM = E‖v_θ − u_t‖²` — \"**물살 지도 베껴 그리기**\": 강 여기저기 점·시각을 찍어 내 화살표와 실제 물살 화살표 차이(MSE)를 줄인다. 맞히는 건 도착지가 아니라 **매 순간 물살**. 단 정답 `u_t`·분포 `p_t`를 닫힌형태로 몰라 **이대로는 계산 불가**(정의식).\n- **EQ3 CFM** `L_CFM = E‖v_θ − u_t(x|x₁)‖²` — 전체 강물 대신 **\"노이즈 x₀ → 목적지 x₁ 한 가닥 물길\"**만 본다(내가 그었으니 목표 유속을 정확히 앎). 잎(목적지)을 여러 개 띄워 평균내면 합쳐진 전체 강물이 복원됨(`u_t(x)=E[u_t(x|x₁)|x_t=x]`). ⇒ **학습 때 ODE 안 풀어도 됨(simulation-free)**. `v_θ`는 x₁을 입력으로 안 받음(추론 땐 x₁ 없이 적분).\n- **EQ4 기울기 동일** `∇_θ L_FM = ∇_θ L_CFM` — **안개 낀 산**: 진짜 산(`L_FM`)은 안 보여도 **발밑 경사(gradient)**는 더듬을 수 있고, 가짜 지도(`L_CFM`)의 경사가 그것과 모든 지점에서 같다 → 가짜만 따라가도 진짜 정상 도달. 두 손실은 **θ-무관 상수**만큼 차이(미분하면 사라짐). ⇒ `L_CFM` **절대값**은 적합도 척도 아님(바닥이 0 아님), 줄이는 방향·최적점만 동일.\n- **EQ5 직선 경로** `x_t = (1−t)x₀ + t·x₁` — (EQ3 한 가닥을 가장 단순하게 직선으로) **집(x₀)→회사(x₁) 직선 도로 등속 주행**. t=0 노이즈, t=1 데이터. 매 스텝 노이즈·데이터를 새로 무작위 페어링해 직선 하나 긋고 그 위 한 점을 본다. (t=0.5가 두 분포 mixture가 아니라 두 점을 끌고 가는 선형결합.)\n- **EQ6 목표속도** `u_t = x₁ − x₀` — 직선을 미분하면 그대로 `x₁−x₀` → 그 직선 위에선 **등속**(t 무관). 서울→부산 직선을 일정 속도로: 속도계는 항상 \"부산−서울\". 회귀 타깃이 **자명한 상수** → 학습 쉽고, diffusion 곡선보다 덜 휘어 few-step 추론.\n\n#### ⚠️ 꼭 짚을 미묘한 점 2가지 (초보 함정)\n1. **\"타깃이 상수\" ≠ \"학습된 속도장이 상수\".** `u_t=x₁−x₀`는 **고정된 한 쌍의 직선 위에서만** 상수다. 실제 모델 `v_θ(x,t)`가 배우는 **marginal 속도장은 위치·시간 의존**(여러 직선이 한 점에서 교차하니까). 같은 식을 현재 위치 x의 함수로 쓰면 `u_t(x|x₁)=(x₁−x)/(1−t)`로 위치·시간 의존이고, 경로 위 점 x=x_t를 넣을 때만 (1−t)가 약분돼 `x₁−x₀`이 된다. → \"위치 무관\"이라 외우면 틀림.\n2. **\"OT path\" 이름 주의.** 노이즈·데이터를 **무작위 페어링**해 그은 직선은 엄밀히 **선형보간(linear/I-CFM) 경로**이지 진짜 optimal-transport가 아니다. 진짜 OT는 미니배치에서 비용 최소가 되게 매칭(OT-CFM)해야 얻어진다. 직선이 되는 이유는 \"OT라서\"가 아니라 EQ5에서 **선형보간을 골랐기** 때문.\n\n### 수식 — 왜 \"simulation-free\"가 가능한가\n\n**(1) 흐름(flow)과 ODE 정의**:\n\n$$\n\\frac{d}{dt}\\,\\phi_t(x) = v_t\\big(\\phi_t(x)\\big),\\qquad \\phi_0(x)=x\n$$\n\n- **무슨 식?**: $\\phi_t$는 시작점 $x$를 시간 $t$ 동안 속도장 $v_t$를 따라 이동시키는 **흐름 지도**. $\\phi_0$는 제자리. 이 흐름이 노이즈 분포 $p_0$를 시간에 따라 $p_t$로 밀어낸다.\n- **비유**: 강물의 유속장 $v_t$. 나뭇잎($x$)을 띄우면 물살 따라 흘러간다. $\\phi_t$ = \"$t$초 뒤 나뭇잎 위치\".\n\n**(2) Flow Matching 목적함수** [FM 식 5]:\n\n$$\n\\mathcal{L}_{\\mathrm{FM}}(\\theta) = \\mathbb{E}_{t,\\,p_t(x)}\\,\\big\\lVert v_t(x) - u_t(x)\\big\\rVert^2\n$$\n\n- **무슨 식?**: 학습 속도장 $v_t$(파라미터 $\\theta$)가 **진짜 목표 속도장** $u_t$ 와 같아지도록 제곱오차로 맞춘다.\n- **문제**: $u_t$도 $p_t$도 **닫힌 형태로 모름** → 이대로는 계산 불가. 그래서 (3)이 등장.\n\n**(3) Conditional Flow Matching (CFM)** [FM 식 9] — 핵심 트릭:\n\n$$\n\\mathcal{L}_{\\mathrm{CFM}}(\\theta) = \\mathbb{E}_{t,\\,q(x_1),\\,p_t(x\\mid x_1)}\\,\\big\\lVert v_t(x) - u_t(x\\mid x_1)\\big\\rVert^2\n$$\n\n- **무슨 식?**: 다루기 어려운 전체(marginal) 목표 대신, **데이터 샘플 $x_1$ 하나로 조건을 건** 경로의 목표 속도 $u_t(x\\mid x_1)$를 맞힌다. 이건 **닫힌 형태로 계산 가능** → 학습 때 ODE를 풀 필요가 없다(**simulation-free**).\n- **왜 이게 같은가** [FM 정리 2]: 두 목적함수의 **기울기가 같다**.\n\n$$\n\\nabla_\\theta\\,\\mathcal{L}_{\\mathrm{FM}}(\\theta) = \\nabla_\\theta\\,\\mathcal{L}_{\\mathrm{CFM}}(\\theta)\n$$\n\n  즉 계산 가능한 CFM을 최적화하면 원래 풀고 싶던 FM을 푸는 것과 **정확히 동일**. 이게 flow matching을 실용적으로 만든 결정적 한 줄.\n- **비유**: 반 전체 평균 성적($u_t$, 측정 불가)을 직접 맞히는 대신, **학생 한 명씩($x_1$) 점수를 맞히는 연습**을 무수히 반복한다. 개개인을 다 맞히면 평균도 자동으로 맞는다(기울기 동일).\n\n**(4) 조건부 경로 = 직선 보간 (OT path)** [FM 식 20–23, RF]:\n\n가장 흔한 선택은 노이즈 $x_0$와 데이터 $x_1$을 **직선으로** 잇는 것:\n\n$$\nx_t = (1-t)\\,x_0 + t\\,x_1,\\qquad x_0\\sim\\mathcal{N}(0,I),\\ \\ x_1\\sim q_{\\text{data}}\n$$\n\n이때 목표 속도(직선의 기울기)는 **위치와 무관하게 일정**:\n\n$$\nu_t = x_1 - x_0\n$$\n\n- **무슨 식?**: 노이즈→데이터를 직선으로 긋고, 그 직선을 따라가는 일정한 속도 $x_1-x_0$를 신경망이 맞히게 한다.\n- **왜 좋은가**: 한 쌍 $(x_0,x_1)$을 고정하면 그 직선 위에선 목표속도가 시간에 따라 안 변해(등속) 회귀 타깃이 단순 → **배우기 쉽고**, 직선이라 diffusion의 곡선 경로보다 덜 휘어 **few-step 적분으로도 오차가 작다**(빠른 추론).\n- **비유**: (2)~(3)의 \"화살표 맞히기\"에서 길을 **직선**으로 택한 것. 단 '속도가 일정'한 건 *그 한 쌍의 직선 위*에서일 뿐 — 여러 직선이 섞인 **학습된 속도장 $v_\\theta(x,t)$는 위치·시간에 의존**한다('어느 지점에서나 같다'가 아님). 현재 위치 $x$의 함수로 쓰면 $u_t(x\\mid x_1)=(x_1-x)/(1-t)$로 위치·시간 의존이고, 경로 위 점 $x=x_t$를 넣을 때만 $x_1-x_0$로 약분된다.\n\n### ⚠️ 부호·방향 컨벤션 (꼭 확인)\n**원논문 [FM]/[RF]는 둘 다 $t=0$이 노이즈, $t=1$이 데이터**, 목표 속도는 노이즈→데이터 방향 $x_1-x_0$.\n하지만 일부 코드베이스/논문(예: 일부 로봇 정책)은 이를 **뒤집어** $t=0$을 데이터, $t=1$을 노이즈로 두기도 한다 → 그러면 보간이 $x_t=(1-t)\\,x_{\\text{data}}+t\\,\\epsilon$이 되고 목표 속도 부호가 $\\epsilon - x_{\\text{data}}$로 바뀐다.\n- 예: **Fast-WAM**은 뒤집힌 컨벤션 — `식(5) y_t=(1-t)y+t·ε` (clean이 $t=0$), 목표 $\\epsilon - y$ (`FastWAM_deepdive.md` §3.3). **항상 코드의 보간 줄을 보고 부호를 확인할 것.**\n\n### 로봇 정책에서의 쓰임 (맥락)\n- action chunk 정책(예: π0 류)은 노이즈에서 시작해 $dx/dt=v_t(x)$를 **~10 Euler step** 적분해 행동 청크 전체를 한꺼번에 생성(non-autoregressive).\n- score-based diffusion 대비: 직선(OT) 경로는 속도 방향이 시간에 일정해 **few-step으로도 정확** → 실시간 제어에 유리.\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else
    // marked mangles LaTeX (underscores -> <em>, $$ blocks -> <p>) before KaTeX runs.
    let katexInMarked = false;
    try {
      // nonStandard: true — allow inline $...$ followed immediately by Korean particles (와/는/로),
      // otherwise the default regex requires whitespace/punctuation after closing $ and skips them.
      if (window.markedKatex) { marked.use(window.markedKatex({throwOnError: false, nonStandard: true})); katexInMarked = true; }
    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
    // 8~256 GPU); marked pairs two ~ in a line into <del>. Consume ~ runs as literal text.
    try {
      marked.use({ extensions: [{
        name: 'noStrike', level: 'inline',
        start(s) { return s.indexOf('~'); },
        tokenizer(s) { const mm = s.match(/^~+/); if (mm) return { type: 'noStrike', raw: mm[0], text: mm[0] }; },
        renderer(t) { return t.text; }
      }] });
    } catch (e) {}
    el.innerHTML = marked.parse(MD);
    // Fallback only if the extension failed to load (e.g. offline CDN)
    if (!katexInMarked && window.renderMathInElement) renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ], throwOnError: false
    });
  });

async function runUpdate(){

    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = '서버가 없습니다 — 터미널에서 `python surveybot/serve.py` 실행 후 http://localhost:8777 로 접속하세요. (요약·딥다이브 생성은 Claude 세션에서 /wm-survey)';
  }
}
</script>
<script>
let _qsel = '';
document.addEventListener('selectionchange', () => {
  const s = String(window.getSelection() || '').trim();
  if (s) _qsel = s.slice(0, 400);
});
function qToggle(){
  const d = document.getElementById('qdrawer');
  d.hidden = !d.hidden;
  if (!d.hidden) { qShowSel(); qLoad(); }
}
function qShowSel(){
  const box = document.getElementById('qselbox');
  box.hidden = !_qsel;
  if (_qsel) document.getElementById('qseltxt').textContent = _qsel;
}
function qClearSel(){ _qsel = ''; qShowSel(); }
async function qLoad(){
  const ul = document.getElementById('qlist');
  try {
    const r = await fetch('/api/questions');
    const j = await r.json();
    const qs = j.questions || [];
    ul.innerHTML = qs.length ? '' : '<li class="qempty">없음</li>';
    for (const q of qs) {
      const li = document.createElement('li');
      const a = document.createElement('a'); a.href = q.page || '#';
      a.textContent = q.title || q.page || '(페이지 미상)';
      const t = document.createElement('div'); t.className = 'qbody'; t.textContent = q.text;
      const meta = document.createElement('span'); meta.className = 'qmeta'; meta.textContent = q.ts + ' · ' + q.id;
      const del = document.createElement('button'); del.className = 'qdel'; del.textContent = '삭제';
      del.onclick = () => qDismiss(q.id);
      li.append(a, t, meta, del);
      ul.appendChild(li);
    }
  } catch (e) {
    ul.innerHTML = '<li class="qempty">서버 필요 — python surveybot/serve.py 실행 후 localhost:8777 접속</li>';
  }
}
async function qSave(){
  const txt = document.getElementById('qtext').value.trim();
  const msg = document.getElementById('qmsg');
  if (!txt) { msg.textContent = '내용을 입력하세요'; return; }
  const h1 = document.querySelector('h1');
  const payload = {
    page: location.pathname.split('/').pop() || 'index.html',
    title: h1 ? h1.innerText.trim() : document.title,
    selection: _qsel, text: txt,
  };
  try {
    const r = await fetch('/api/question', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const j = await r.json();
    if (j.ok) {
      msg.textContent = '저장됨 (' + j.id + ') — 다음 Claude 세션에서 처리';
      document.getElementById('qtext').value = ''; _qsel = ''; qShowSel(); qLoad();
    } else msg.textContent = j.summary || '저장 실패';
  } catch (e) {
    msg.textContent = '서버 필요 — python surveybot/serve.py 실행 후 localhost:8777 접속';
  }
}
async function qDismiss(id){
  try {
    await fetch('/api/question_dismiss', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})});
    qLoad();
  } catch (e) {}
}
</script>
</body></html>
