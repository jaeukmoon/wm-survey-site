  <script>
  const MD = "# InternVLA-M1: A Spatially Guided Vision-Language-Action Framework for Generalist Robot Policy — Deep-Dive\n\n> **이 논문이 달성하려는 것**: 텍스트 명령과 체화별 모터 명령 사이를 잇는 **embodiment-agnostic spatial prior(체화 무관 공간 사전지식)**를 먼저 대규모로 학습한 뒤, 이를 조건으로 **action expert를 spatial prompting으로 유도**하는 dual-system VLA를 만들어, 미지 객체·명령·환경에 강한 generalist 로봇 정책을 구현.\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2510.13778 (v1) · 날짜 (미명시) |\n| 저자/소속 | (미명시) — InternVLA-M1 팀 (본문 메타 미확보) |\n| 코드/프로젝트 | (미명시 — repo URL 미확보) |\n| 백본 | System 2 = Qwen2.5-VL-3B-instruct · System 1 = DiT/diffusion policy action expert (86M) |\n\n> 읽는 법: 이 논문의 핵심은 **§1(왜 spatial prior인가)** → **§2(dual-system 구조 + 2-stage 레시피)** → **§3(데이터 파이프라인)** → **§4(실험)** 흐름이다. \"어떻게 공간 감각(System 2)과 손동작(System 1)을 분리하되 spatial prompting으로 잇느냐\"가 정체성. 아래는 논문 저자 섹션 순서 그대로 내려간다.\n\n---\n\n## 0. 한 줄 요약 (Abstract + Introduction)\n\n### Abstract — 무엇을 주장하나\n- **주장**: InternVLA-M1은 고수준 추론과 grounded 실행을 통합하는 **dual-system VLA 프레임워크**다. ① 언어 명령을 해석하고 공간 관계를 추론하는 **spatial prior VLM planner**(System 2)와 ② grounded 표현을 모터 명령으로 변환하는 **action expert**(System 1)로 구성된다.\n- **방법의 핵심 한 줄**: **spatially guided 2-stage 학습** — (i) VLM에 대한 spatial grounding pre-training으로 전이 가능한 공간 이해를 확립하고, (ii) spatially guided action post-training으로 그 사전지식을 체화별 제어로 특화한다. 둘을 잇는 장치가 **spatial prompting**(명령 뒤에 \"핵심 객체를 짚어라\" 같은 공간 단서를 prepend)이다.\n- **데이터·성능**: 3M+ 멀티모달 샘플(2.3M spatial grounding + 0.7M multimodal understanding)을 web·real-world·simulated 출처에서 구축. SimplerEnv(Google Robot, WidowX)에서 SOTA, 자기 변형 대비 평균 성공률 최대 +5.9%/+9.8% 향상. 일반화 pick-and-place 200 tabletop에서 선행연구 대비 평균 +6.2%, 실세계 clustered pick-and-place에서 미지 객체·신규 셋업 +20.6%.\n\n### Introduction — 문제의식의 흐름(문단별)\n1. **출발 전제**: 멀티모달 파운데이션 모델은 웹 스케일 vision-language 정렬로 강한 일반화를 보인다. 하지만 로봇은 명령의 **'의미(what)'**뿐 아니라 3D 세계에서 **'어디서(where)·어떻게(how)'** 행동할지까지 알아야 한다. 텍스트 추상화는 공간 단서를 간접적으로만 담고, 실제 행동은 VLM 학습 데이터에 거의 없는 연속적·체화된 상호작용을 요구한다.\n2. **간극의 정체**: 이 텍스트-행동 간극을 메우는 핵심이 **embodiment-agnostic spatial prior**이며, 이를 텍스트 명령과 체화별 모터 명령 사이의 **다리(bridge)**로 제안한다.\n3. **선행연구의 두 한계**: (1) **계층적 로봇 시스템**은 파운데이션 모델로 공간 사전지식을 명시적으로 인코딩하지만 규칙 기반 task 분해·수작업 플래닝 휴리스틱에 의존해 자동 확장이 어렵고 end-to-end 학습을 방해한다. (2) **데이터 기반 VLA**는 사전학습 VLM + 대규모 teleoperation으로 제어를 직접 학습하지만, 세밀한 모터 행동에 **과적합**하고 절대/상대 위치를 포함하는 고수준 언어 명령에는 일반화가 약하다.\n4. **핵심 아이디어 = 분리**: object recognition, affordance grounding, visual trajectory reasoning, relative localization, scaling 같은 핵심 공간 사전지식은 **로봇 플랫폼 간 전이 가능**한 지식이다. 이를 먼저 확립하면 체화별 학습은 구체적 제어 전략(manipulator 관절, end-effector 궤적, 휴머노이드 보행 등)에만 집중할 수 있다. 즉 **공간 사전지식 = 범용 기반**, **체화별 세부 = downstream 적응**으로 역할을 나눈다.\n5. **제안 = InternVLA-M1**: spatial prior VLM planner + action expert의 dual-system. 3M+ 멀티모달 샘플로 학습.\n6. **2-stage 레시피**: (i) spatial grounding pre-training — points/boxes/traces에 대한 대규모 멀티모달 감독으로 전이 가능한 공간 이해 확립, (ii) spatially guided action post-training — joint supervision 하에 그 사전지식을 체화별 제어로 특화.\n\n> **30초 큰 그림 비유**: 요리에 비유하면 — 기존 데이터 기반 VLA는 특정 주방에서 손동작을 통째로 외운 요리사다. 그 주방에선 잘하지만 '왼쪽 위 선반의 그릇을 집어'처럼 위치를 말로 바꾸면 헤맨다. 반대로 계층적 시스템은 메뉴얼대로만 움직이는 로봇 팔이라 메뉴얼에 없는 상황엔 손도 못 댄다. InternVLA-M1은 먼저 '공간 감각'(어디에 뭐가 있고 어떻게 닿는지)을 어느 주방에서나 통하는 보편 상식으로 익힌 뒤(planner=느리지만 신중한 System 2), 실제 손동작(action expert=빠른 System 1)은 그 감각의 지시를 받아 수행한다. 머리가 손에게 공간 단서를 명시적으로 귀띔(spatial prompting)해 둘을 잇는다.\n\n원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2510.13778v1/x1.png)\n![](https://arxiv.org/html/2510.13778v1/x1.png)\n> Figure 1: task instruction이 주어지면 VLM planner가 **explicit spatial prompting**으로 latent plan을 만들고, 이것이 action expert의 control signal 생성을 효과적으로 유도한다. Introduction의 핵심 주장을 한 장으로 보여주는, 본문이 직접 참조하는 그림.\n\n구조 정리: dual-system(VLM Planner → querying transformer → Action Expert)의 세부 흐름 다이어그램은 §2 참조 — 이 파이프라인(System 2 계획 → latent plan → System 1 제어)이 파라미터 수치까지 포함해 그쪽에 정리돼 있다.\n\n**핵심 수치(Intro)**: 3M+ 멀티모달 샘플 = 2.3M spatial grounding + 0.7M multimodal understanding · SimplerEnv Google Robot 변형 대비 +5.9% / WidowX +9.8%(new SOTA) · 200 tabletop 일반화 +6.2% · 실세계 clustered +20.6% · long-horizon 추론 집약 시나리오에서 기존 연구 대비 over 10% 우위.\n\n---\n\n## 1. Introduction (Section 1)\n\n> §0에서 Abstract+Introduction을 합쳐 정리했다. 이 절은 본문 §1의 모듈/학습 관점만 보강한다.\n\n**핵심**\n- 텍스트 명령과 체화별 모터 명령 사이의 다리로 **embodiment-agnostic spatial prior**를 제안.\n- 공간 사전지식(object recognition·affordance grounding·visual trajectory reasoning·relative localization·scaling)은 플랫폼 간 전이 가능 → 범용 기반으로 분리.\n- InternVLA-M1 = spatial prior VLM planner + action expert의 dual-system.\n\n**왜/직관**: 위 §0의 요리 비유 참조 — 공간 감각(보편 상식)을 먼저 익히고, 손동작은 그 감각의 지시를 받아 체화별로만 특화한다.\n\n**모듈 분해 (top-down)**\n- **A) Spatial Prior VLM Planner (System 2)** — 목적: 언어 명령 해석 + 공간 관계 추론, explicit spatial prompting으로 전이 가능한 latent plan 생성(느리지만 신뢰성 있는 reasoner). 입력: task instruction(텍스트) + 시각 관측 → 출력: latent plans / grounded 표현(points·boxes·traces 기반). 구체적 텐서 shape는 Introduction 본문에 (미명시). Stage 1에서 대규모 멀티모달 감독으로 공간 이해를 확립.\n- **B) Action Expert (System 1)** — 목적: grounded 표현을 실행 가능한 모터 명령으로 변환하는 빠른 컨트롤러. 입력: planner의 latent plans(조건) → 출력: control signals. Stage 2의 spatially guided action post-training에서 joint supervision 하에 공간 사전지식을 체화별 제어로 특화.\n\n**학습/추론 (Introduction 범위)**\n- **학습**: spatially guided 2-stage. Stage 1 = spatial grounding pre-training(points/boxes/traces 멀티모달 감독), Stage 2 = spatially guided action post-training(joint supervision). 데이터 3M+(2.3M spatial + 0.7M multimodal; web·real·sim).\n- **추론**: task instruction → VLM planner가 explicit spatial prompting으로 latent plan 생성 → action expert를 유도해 control signal 생성. Introduction은 고수준 파이프라인만 기술하며, 손실함수·하이퍼파라미터는 본 절에 없음.\n\n> ⚠️ Introduction에는 \"+14.6% on Google Robot, +17% on WidowX, +4.3% on LIBERO Franka\"(spatial guidance 없는 variant 대비)라는 더 큰 프레이밍 수치도 등장한다. §4에서 이를 본격적으로 다룬다.\n\n---\n\n## 2. InternVLA-M1: 모델 구조와 학습 레시피 (Section 2)\n\n**핵심**\n- InternVLA-M1 = 단일 모델 안에 **language head + action head**를 함께 둔 dual-system end-to-end VLA. language head는 spatial pretraining/co-training으로 instruction-to-visual grounding을 확립, action head는 학습된 spatial prior를 조건으로 체화별 모터 명령을 생성.\n- **System 2** = Qwen2.5-VL-3B-instruct 멀티모달 인코더. **System 1** = diffusion policy 기반 Action Expert(86M) + DINOv2 비전 인코더(21M) + 경량 state 인코더(0.4M). 전체 **약 4.1B 파라미터**.\n- VLM Planner와 Action Expert를 잇는 핵심 = **latent planning via spatial prompting**. 경량 **querying transformer(8.7MB)**가 가변 길이 latent embedding을 고정 개수의 learnable query token으로 매핑(k-layer cross-attention; k=1이면 최종 layer만).\n- Action Expert→VLM 역전파 gradient는 querying transformer 내 **gradient decay factor(예: 0.5)**로 감쇠시켜 멀티모달 지식 손상을 막는다.\n- 학습은 2-stage. Stage 1(spatial grounding pre-training)은 VLM만 최적화, Stage 2(spatially guided action post-training)는 VLM+Action Expert를 demonstration data로 공동 최적화하되 spatial prompting + spatial grounding data와의 co-training을 함께 쓴다.\n\n**왜/직관**\n사람이 물건을 집을 때 뇌는 두 시스템으로 일한다. 느리지만 신중한 '계획가'(System 2)가 지시를 듣고 '저 장난감을 상자에 넣으려면 어디를 봐야 하지?'라며 공간을 짚어보고, 빠른 '손'(System 1)이 그 짚어준 위치를 받아 반사적으로 움직인다. InternVLA-M1은 이 분업을 그대로 모방한다. VLM Planner가 spatial prompting으로 '핵심 물체 위치를 찍어'주면, querying transformer가 그 모호한 생각을 손이 알아들을 수 있는 고정된 형식의 쪽지(query token)로 정리해 Action Expert(손)에게 건넨다. 손이 너무 세게 계획가를 끌어당겨 생각을 흐트러뜨리지 않도록, 둘 사이 신경(gradient)은 절반쯤 약하게(0.5) 연결해 둔다.\n\n원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2510.13778v1/x2.png)\n![](https://arxiv.org/html/2510.13778v1/x2.png)\n> Figure 2: InternVLA-M1 overview. **Stage 1(spatial grounding pre-training)**: VLM을 대규모 multisource 멀티모달 spatial grounding 데이터로 학습해 embodiment-agnostic 공간 prior 획득. **Stage 2(spatially guided action post-training)**: VLM Planner(느리지만 신뢰성 있는 System 2 reasoner)가 spatial prompting으로 latent planning token을 생성, 이것이 action expert(DiT Actor=fast System 1 controller)의 조건으로 들어간다.\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\nTask instruction + spatial prompt\n(\"...locate the key object needed.\")\n          |\n          v\n+---------------------------+   System 2 (slow, reliable reasoner)\n| VLM Planner               |\n| Qwen2.5-VL-3B-instruct    |\n| -> latent planning tokens |\n+---------------------------+\n          | latent planning embeddings\n          v  (attend to k intermediate VLM layers; k=1 -> final layer)\n+---------------------------+\n| Querying Transformer      |  8.7 MB, k-layer cross-attention\n| variable tokens -> fixed  |  gradient decay (e.g. 0.5) on\n| learnable query tokens    |  backward path to VLM\n+---------------------------+\n          | fixed query tokens (condition)\n          v\n+---------------------------+   System 1 (fast executor)\n| Action Expert             |\n| diffusion policy (86M)    |\n|  + DINOv2 enc (21M)       |\n|  + state enc (0.4M)       |\n+---------------------------+\n          |\n          v\n   embodiment-specific motor commands\n\nTotal ~4.1B params | infer: 1x RTX 4090, ~12GB, VLM ~10 FPS (FlashAttn)\n\nDual-supervision (per training step):\n  spatial grounding data --> VLM (next-token / multimodal loss)\n  robot demo trajectory  --> VLM + Action Expert (L2 noise loss)\n  gradients aggregated -> single optimization update\n```\n\n**모듈 분해 (top-down)**\n- **VLM Planner (System 2)** — 목적: 느린/신뢰성 높은 reasoner. task instruction에 spatial prompt를 결합해 spatial prior 기반 latent planning token을 생성, 추상적 언어 목표를 grounded 단서로 변환. 입력: 이미지 + task instruction + spatial prompt 텍스트 → 출력: latent planning embeddings(가변 길이). 백본 Qwen2.5-VL-3B-instruct. Stage 1에서 단독 최적화되어 object detection·affordance recognition·visual trajectory planning 능력 학습.\n- **Querying Transformer** — 목적: VLM Planner와 Action Expert를 잇는 경량 브리지. 가변 길이 입력 토큰을 고정 개수의 learnable query token으로 매핑해 expert 학습/추론을 안정화. 입력: latent planning embeddings(가변 길이) → 출력: 고정 개수 query tokens. 크기 8.7 MB. k-layer cross-attention(k=1이면 최종 layer만 attend). gradient decay factor(예: 0.5)로 Action Expert→VLM 역전파를 감쇠해 VLM 의미 추론 능력 보존.\n- **Action Expert (System 1)** — 목적: 빠른 executor. planner의 spatial prior를 조건으로 받아 체화별 모터 제어 명령 생성. 입력: querying transformer의 고정 query tokens(조건) + 현재 관측 → 출력: action. diffusion policy 86M. DINOv2 비전 인코더(21M)+경량 state 인코더(0.4M) 위에 구축. chunking + KV caching으로 실행 가속.\n\n**학습/추론 (train/test 차이)**\n- **학습**: spatially guided 2-stage. Stage 1(spatial grounding pre-training)은 VLM만 최적화 — 인터넷 규모 멀티모달 코퍼스 + 로봇 데이터(RefCOCO, RoboRefIt, A0, MolmoAct, Pixmo-Points)를 bounding-box detection/trajectory prediction/affordance recognition/chain-of-thought를 아우르는 통일된 QA 구조로 재포맷, 일반 VLM과 같은 SFT 프레임워크로 학습. Stage 2(spatially guided action post-training)는 VLM+Action Expert를 demonstration data로 공동 최적화하며 두 전략 사용 — (1) **spatial prompting**: action 예측 전 instruction 앞에 공간 단서를 prepend(예: 'store all toys into the toy box'에 'Identify all relevant toys and their spatial relationships to the container.' 추가), VLM이 명시적 응답을 내지 않아도 공간 인지/일반화 향상; (2) **co-training**: robot trajectory data(VLM 백본+Action Expert를 예측 noise vs GT noise L2 loss)와 grounding data(VLM 백본만 next-token prediction)를 번갈아 학습. dual-supervision은 매 스텝 두 데이터 타입 배치를 함께 처리해 두 loss의 gradient를 집계 후 단일 최적화 업데이트.\n- **추론**: 단일 RTX 4090 GPU, 약 12GB 메모리. FlashAttention으로 VLM 컴포넌트 약 10 FPS, action 실행은 chunking·KV caching으로 추가 가속.\n\n**숫자**: System 2 = Qwen2.5-VL-3B-instruct · Action Expert = diffusion policy 86M · DINOv2 21M · state encoder 0.4M · 전체 ~4.1B · 추론 1×RTX 4090/~12GB · VLM ~10 FPS · querying transformer 8.7MB · gradient decay 예: 0.5 · cross-attn layer 수 k(예: k=1).\n\n> ⚠️ 전체 ~4.1B 분해: Qwen2.5-VL-3B(~3B) + 86M+21M+0.4M(~0.1B) ≈ 3.1B로, 4.1B 총합에 ~1B 미달. 4.1B 자체는 본문 명시이나 나머지 ~1B의 출처는 본문 미명시(→ TODO). querying transformer만 'MB'(저장 단위)로 표기된 점도 단위 의미가 본문에서 명확히 해소되지 않음. VLM '~10 FPS'는 end-to-end가 아니라 'VLM component' 단독 속도.\n\n---\n\n## 2.1 Model Architecture\n\n> §2에서 dual-system 구조·querying transformer·gradient decay를 이미 정리했다. 이 절은 본문 2.1의 **dual-supervision** 측면을 보강한다.\n\n**핵심**\n- **Dual-System**: System 2(Qwen2.5-VL-3B-instruct, spatial prior 포착) + System 1(diffusion policy Action Expert, embodiment-specific 제어). 전체 약 4.1B.\n- **Dual-Supervision**: 매 학습 스텝에서 멀티모달(spatial grounding) 배치와 action(robot demo) 배치를 함께 처리해 두 supervision 손실을 계산, gradient를 합쳐 한 번의 최적화 업데이트로 적용. perception과 control을 **분리 학습이 아니라 co-adapt**한다.\n- **Latent planning via spatial prompting**: 경량 querying transformer(8.7MB)가 가변 길이 토큰을 고정 query token으로 매핑(k-layer cross-attention; k=1이면 마지막 layer만).\n- **Spatial prompting**: task instruction 뒤에 'Figure out how to execute it, then locate the key object needed.' 같은 prompt를 붙여 planner에 명시적 spatial cue 제공.\n- **Gradient decay factor**: Action Expert→VLM 역전파 gradient를 querying transformer 내부에서 감쇠(예: 0.5배)해 Planner의 의미 추론 능력을 보존하면서 joint optimization을 가능케 함(선행연구가 action↔VLM 직접 gradient 흐름이 멀티모달 지식을 왜곡할 수 있다고 지적).\n\n**왜/직관**\n한 사람의 머릿속에 '신중한 두뇌'와 '날쌘 손'이 함께 있다고 보면 된다. 두뇌(System 2)는 시간을 들여 '무엇을 어디서 집어야 하는가'라는 공간적 판단(latent plan)을 내리는 느리지만 믿을 만한 사고자이고, 손(System 1)은 그 판단을 받아 즉각 움직이는 빠른 실행자다. 둘 사이의 '통역사'가 querying transformer로, 두뇌가 쏟아내는 들쭉날쭉한 말(가변 길이 토큰)을 손이 알아듣기 쉬운 고정된 몇 마디(고정 query token)로 추려준다. 또 손이 잘못 움직였다고 두뇌까지 마구 흔들어 똑똑함을 망치지 않도록, 손에서 두뇌로 가는 피드백(gradient)을 절반쯤(0.5배)으로 줄여 전달한다.\n\n**모듈 분해 (top-down)**\n- **System 2 — VLM Planner** — spatial prior 포착, spatial prompting으로 latent planning 토큰 생성. 백본 Qwen2.5-VL-3B-instruct. object detection·affordance recognition·visual trajectory planning 등 실/합성 spatial grounding 데이터로 정렬. FlashAttention 시 약 10 FPS.\n- **Querying Transformer** — 가변 길이 입력 토큰을 고정 learnable query token으로 매핑. 8.7 MB. k-layer cross-attention(k=1이면 마지막 layer만). gradient decay(예: 0.5)로 Action Expert→VLM 역전파 감쇠.\n- **System 1 — Action Expert** — embodiment-specific 제어를 모델링해 control signal 생성. diffusion policy 86M, DINOv2 visual encoder 21M + state encoder 0.4M의 compact vision-action 모델. robot demonstration으로 학습. 추론 시 chunking·KV caching으로 가속.\n\n**학습/추론**\n- **학습(dual-supervision)**: 매 스텝마다 멀티모달(spatial grounding) 배치와 action(robot demonstration) 배치를 함께 처리해 두 supervision 신호의 손실을 계산, gradient들을 합산(aggregate)해 단일 optimization update로 적용. perception(VLM Planner)과 control(Action Expert)이 co-adapt된다. querying transformer 내부 gradient decay(예: 0.5)로 Action Expert→VLM 역전파를 감쇠.\n- **추론**: 단일 RTX 4090, 약 12GB. FlashAttention 시 VLM 컴포넌트 약 10 FPS. action 실행은 chunking·KV caching으로 추가 가속.\n\n**숫자**: 전체 ~4.1B · Action Expert 86M · DINOv2 21M · state encoder 0.4M · querying transformer 8.7MB · gradient decay 예: 0.5 · k(예: k=1) · 추론 1×RTX 4090/~12GB · VLM ~10 FPS.\n\n> ⚠️ 'k=1', '0.5'는 본문이 'e.g.'(예시)로 표기 — 실제 채택값 확정 여부는 fetch 범위에서 단정 불가. chunking·KV caching 문장의 절 귀속(2.1 vs 인접 구현 절)은 HTML 절 경계상 미확인(내용 자체는 확인됨).\n\n---\n\n## 2.2 Training Recipe (학습 레시피)\n\n**핵심**\n- 공간 사전지식을 활용해 instruction-following 제어를 강화하는 **spatially guided 2-stage 파이프라인**.\n- **Stage 1 (Spatial grounding pre-training)**: VLM만 최적화. 일반적 vision-language 사전학습이 아니라 로보틱스에 필수적인 **공간 추론·계획 능력** 강화가 목표. 인터넷 규모 코퍼스 + 로봇 데이터셋(RefCOCO, RoboRefIt, A0, MolmoAct, Pixmo-Points)을 통일된 QA 구조(box detection, trajectory prediction, affordance recognition, CoT)로 재포맷, 기존 VLM과 동일한 SFT로 학습.\n- **Stage 2 (Spatially guided action post-training)**: VLM과 Action Expert를 demonstration data로 공동 최적화해 의미 이해와 동작 생성을 긴밀히 결합. 두 전략(spatial prompting, co-training) 사용.\n- **전략 1 — Spatial prompting**: 행동 예측 전 task instruction 앞에 공간 cue를 prepend해 객체 관계·작업 제약에 대한 구조적 추론을 유도(예: '모든 장난감을 상자에' → '관련 장난감과 컨테이너 간 공간 관계를 식별하라' 추가). VLM이 명시적 답을 안 내도 공간 인지·일반화 향상.\n- **전략 2 — Co-training**: trajectory 데이터(VLM backbone + Action Expert를 **예측 노이즈와 GT 노이즈 간 L2 loss**)와 grounding 데이터(next-token prediction으로 VLM backbone만)를 번갈아 학습.\n\n**왜/직관**\n두뇌(System 2 VLM 플래너)와 손발(System 1 Action Expert)을 따로 길들이는 것과 같다. Stage 1은 손을 묶어두고 머리에게 '어디에 무엇이 있는지' 보는 눈을 먼저 키우는 단계(공간 감각 가정교사 수업)이고, Stage 2는 그 머리에 손을 붙여 실제 작업을 함께 연습시키는 단계다. 이때 머리에게는 일을 시키기 전 '주변 물건 배치를 한 번 살펴봐'라는 귓속말(spatial prompting)을 넣어주고, 머리가 공간 감각을 잊지 않도록 손동작 연습(trajectory) 사이사이에 공간 퀴즈(grounding)를 끼워 복습시키는 것이다.\n\n원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2510.13778v1/x2.png) (2-stage 파이프라인 재참조 — §2 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\nStage 1: Spatial grounding pre-training  (VLM만 최적화)\n  [인터넷규모 멀티모달 코퍼스]\n  [로봇 데이터셋: RefCOCO/RoboRefIt/A0/MolmoAct/Pixmo-Points]\n        |  통일된 QA 구조로 재포맷 (box det / traj pred / affordance / CoT)\n        v\n   +-----------+\n   |    VLM    |  <-- 동일 SFT 프레임워크로 학습\n   +-----------+\n        |  embodiment-agnostic 공간 prior 획득\n        v\nStage 2: Spatially guided action post-training  (VLM + Action Expert 공동 최적화)\n  task instruction\n        |\n        +--[Spatial prompting]-- 공간 cue prepend (예: \"객체-컨테이너 공간관계 식별\")\n        v\n   +-----------+   latent plan/cond    +----------------+\n   |    VLM    |---------------------->| Action Expert  |\n   +-----------+                       +----------------+\n        ^                                     |\n        |                                     v\n   [Co-training, 번갈아 학습]               action\n   ├─ trajectory data : VLM backbone + Action Expert -> L2 loss(예측노이즈, GT노이즈)\n   └─ grounding data  : VLM backbone만               -> next-token prediction\n```\n\n**모듈 분해 (top-down)**\n- **Stage 1 — Spatial grounding pre-training** — VLM만 최적화해 embodiment-agnostic 공간 prior 확립. 모든 로봇 데이터셋(RefCOCO, RoboRefIt, A0, MolmoAct, Pixmo-Points)을 QA-style(box det/traj pred/affordance/CoT)로 재포맷하고 web-scale 데이터와 정렬, 기존 VLM과 동일한 SFT로 학습.\n- **Stage 2 — Spatially guided action post-training** — VLM+Action Expert를 demonstration data로 공동 최적화해 semantic understanding과 motion generation을 결합. 아래 두 전략 적용.\n  - **Spatial prompting**: task instruction 앞에 공간 cue prepend(예: 'store all toys...' → 'Identify all relevant toys and their spatial relationships to the container.'). VLM은 보조 cue에 명시적 응답을 내지 않음(암묵적 활용).\n  - **Co-training with spatial grounding data**: robot trajectory data와 grounding data를 번갈아 학습. trajectory = VLM backbone + Action Expert를 예측-GT 노이즈 간 L2 loss로, grounding = VLM backbone만 next-token prediction으로 업데이트.\n\n**학습/추론**\n- 본 절은 학습 레시피만 기술하며 **추론 절차는 명시되지 않음**.\n- Stage 1: VLM만 SFT로 사전학습(공간 grounding). Stage 2: VLM+Action Expert 공동 최적화 — instruction에 공간 cue prepend(spatial prompting) + trajectory(VLM backbone+Action Expert, L2 노이즈 loss)와 grounding(VLM backbone만, next-token prediction)을 번갈아 co-training.\n- **손실**: trajectory = L2 loss(예측 vs GT 노이즈), grounding = next-token prediction loss. 둘 다 수식 형태가 아닌 **서술로만** 제시됨.\n\n**숫자**: 본 절에는 데이터 규모/학습률/스텝 수 등 구체 수치가 제시되지 않음(2.3M·3M·gradient decay 0.5 등은 §2.1 및 데이터 섹션에 위치). L2 loss(예측 노이즈 vs GT 노이즈)가 절 내 유일한 정량 표현.\n\n---\n\n## 3. Data (데이터)\n\n**핵심**\n- 데이터 섹션은 세 하위절로 구성: **3.1 사전학습용 spatial grounding** → **3.2 action post-pre-training용 합성** → **3.3 instruction-following용 확장형 합성 엔진**.\n- **사전학습(3.1)**: 총 3M+ 규모, 4종(General QA / Box QA / Trajectory QA / Point QA). 이 중 2.3M+가 spatial reasoning — General 637K, Box 879K, Trajectory 684K, Point 832K. 모든 point 좌표는 절대좌표로 변환, 예측은 JSON/XML 포맷.\n- **Action Post-Pre-Training(3.2)**: VLM-VLA 격차를 메우기 위해 GenManip 합성 파이프라인으로 만든 **InternData-M1 pick-and-place 데이터셋(244K closed-loop 샘플)**으로 action head 초기화 + action representation 학습. 조명/텍스처 랜덤화로 시각 다양성 강화.\n- **확장형 합성 엔진(3.3)**: GenManip + Isaac Sim 위에 구축한 완전 자동 파이프라인. 특권정보(object pose/mesh, robot state)로 scene graph solver가 레이아웃 생성, mesh 기반 grasp 후보 계산, physics에서 1회 실행 후 scene-graph validator로 검증 — **성공+검증 통과 trajectory만 채택**해 물리적 타당성 보장.\n- **핵심 효율 전략**: robot planning과 rendering을 완전 분리(decouple) — planner가 구조화된 scene/trajectory를 기록 → renderer가 랜덤 조명/재질/시점으로 replay. ArUco 마커로 카메라 캘리브레이션. asset 라이브러리 = 14K 객체, 211 테이블, 1.6K 텍스처, 87 dome light.\n\n**왜/직관**\n요리사를 훈련시키는 과정에 비유할 수 있다. (1) 사전학습은 식재료(객체)의 위치·모양·방향을 알아보는 '눈썰미'를 길러주는 단계로, 박스/점/궤적이라는 여러 방식으로 '어디를 봐야 하는지'를 가르친다. (2) Post-Pre-Training은 눈썰미를 실제 손동작과 연결하는 '손풀기' 단계로, 대량의 가상 집기-놓기 연습으로 손(action head)을 깨운다. (3) 합성 데이터 엔진은 무한정 다양한 주방 세트를 자동으로 차려주는 공장과 같다. 다만 '물리 실험(요리)'과 '사진 촬영(렌더링)'을 분리해, 망친 요리는 빠르게 버리고 성공한 레시피만 골라 여러 조명·식기로 다시 촬영함으로써 헛수고(wasted failures)를 줄이고 데이터 다양성을 극대화한다.\n\n원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2510.13778v1/x3.png)\n![](https://arxiv.org/html/2510.13778v1/x3.png)\n> Figure 3: VLM 사전학습 데이터 구성. **general VQA data**(범용 멀티모달 능력 유지) + **spatial VQA data**(로봇 관련 grounding·공간 인지를 VQA 포맷으로). 3.1의 4종 카테고리 분류를 한눈에 보여준다.\n\n원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2510.13778v1/x4.png)\n![](https://arxiv.org/html/2510.13778v1/x4.png)\n> Figure 4: 시뮬레이션 데이터 합성 파이프라인. 대형 asset 라이브러리에서 다양한 조작 데이터를 생성하고, 중간 표현을 VQA 데이터로 변환하며, **physics와 rendering을 분리**해 wasted failures를 줄이고 효율을 높인다. 3.3의 핵심 도식.\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n[Stage 1: VLM Pre-training Data (3.1)]  총 3M+ (spatial 2.3M+)\n  ├─ General QA   ~637K  (LLaVA-OneVision, InternVL3)\n  ├─ Box QA       ~879K  (RefCOCO, ASv2, COCO-ReM, InternData-M1, RoboRefIt)\n  ├─ Trajectory QA~684K  (A0 ManiSkill, InternData-M1 waypoint, MolmoAct)\n  └─ Point QA     ~832K  (Pixmo-Points, RoboPoint, RefSpatial, InternData-M1)\n        └─ point 좌표 → 절대좌표 변환 → JSON/XML 포맷 출력\n\n[Stage 2: Action Post-Pre-Training Data (3.2)]\n  GenManip 합성 → InternData-M1 (244K closed-loop pick-and-place)\n        └─ action head 초기화 + action representation 학습\n        └─ lighting / texture 랜덤화 → 시각 다양성\n\n[Scalable Synthetic Data Engine (3.3)]  on GenManip + Isaac Sim\n  Asset Library: 14K objects | 211 tables | 1.6K textures | 87 dome lights\n        │  privileged signals (object pose/mesh, robot arm state)\n  ── PLANNER (physics) ──\n     scene graph solver → layout · mesh 기반 grasp 후보\n     physics 1회 실행(closed-loop) · scene-graph validator(목표 달성 검증)\n     → 성공 AND 검증통과 trajectory만 채택 (joint state, object pos, action 기록)\n        │  decouple\n  ── RENDERER ──\n     랜덤 lighting / material / viewpoint · ArUco 캘리브레이션\n     출력: hi-res images + object bbox + 2D EE traj → VLM data + VLA data\n```\n\n**모듈 분해 (top-down)**\n- **3.1 Spatial Grounding Data (VLM 사전학습)** — embodiment-agnostic 공간 사전지식 + vision-language 정렬 학습용. 4 카테고리: General QA(caption/VQA/OCR/knowledge/creative, 범용 능력 유지), Box QA(grounding; 합성 InternData-M1·로보틱스 전용 RoboRefIt 포함), Trajectory QA(A0 ManiSkill subset+InternData-M1 waypoint+MolmoAct로 정밀 EE 궤적), Point QA(Pixmo-Points[해상도 1024 초과 제외, 이미지당 최대 10 point]·RoboPoint·RefSpatial). 총 3M+(General 637K/Box 879K/Trajectory 684K/Point 832K), point는 절대좌표, 예측은 JSON·XML.\n- **3.2 Synthetic Data for Action Post-Pre-Training** — VLM↔VLA 격차를 메우는 단계용. action head 초기화 + action representation 학습. InternVLA-M1-Interface와 동일 object set·위치 분포를 GenManip에 투입 → InternData-M1, 244K closed-loop. 각 샘플은 정확성·일관성 엄밀 검증, 조명·텍스처에 controlled randomization.\n- **3.3 Scalable Synthetic Data Engine** — generalizable pick-and-place용 대규모 end-to-end 데이터 자동 생성. asset library(14K objects, 211 tables, 1.6K textures, 87 dome lights) + privileged 신호. Task synthesis: scene graph solver 레이아웃 → mesh 기반 grasp 후보 → physics 1회 실행 → scene-graph validator 검증 → 성공+통과만 채택. Planning-rendering decouple: planner가 joint state·object position·action 기록 → renderer가 랜덤 lighting/material/viewpoint replay, ArUco로 실세계 intrinsic/extrinsic 정합.\n\n**학습/추론**\n이 섹션은 데이터 자체에 대한 설명이다. 데이터 공급 흐름: (1) VLM Pre-training — 3M+ spatial grounding QA(box/point/trajectory)로 embodiment-agnostic 공간 사전지식 학습. (2) Action Post-Pre-Training(3.2) — 244K closed-loop 합성 데이터로 action head 초기화·action representation 학습. 추론(inference) 절차는 Section 3에 별도 기술되지 않음. 합성 엔진은 planning(physics 실행+검증)과 rendering(랜덤화 replay)을 분리해 실패 trajectory를 조기 폐기하고 성공 trajectory만 다양한 시점/조명으로 재렌더링하는 것이 핵심 효율 전략.\n\n**숫자**: 사전학습 총 3M+ · spatial 2.3M+ · General 637K / Box 879K / Trajectory 684K / Point 832K · Pixmo-Points 필터(해상도 1024 초과 제외, 이미지당 최대 10 point) · InternData-M1 244K closed-loop · asset 14K objects / 211 tables / 1.6K textures / 87 dome lights.\n\n> ⚠️ '3단계 데이터 구성(3-stage)' 프레이밍 주의. Section 3 본문은 3.1/3.2/3.3 세 하위절(모두 데이터 생성 설명)뿐이며, '실로봇 long-horizon demo로 미세조정'하는 별도 post-training **데이터 스테이지**는 §3에 존재하지 않는다(논문 §2.2는 'two-stage training pipeline'으로 기술). 본 노트에서는 §3을 데이터 파이프라인 설명으로만 다루고, 학습 스테이지 구획은 §2.2를 정본으로 본다. → TODO. 또한 '보조 데이터셋을 VQA format으로'의 근거는 본문 텍스트가 아니라 Figure 4 캡션.\n\n---\n\n## 3.1 Spatial Grounding Data for Pre-training\n\n**핵심**\n- 사전학습용 멀티모달 데이터셋 총 3M+, 4 카테고리(General/Box/Trajectory/Point QA), 그 중 2.3M+가 공간추론. 일반 멀티모달 이해 유지 + tabletop 로봇 embodied task 적응.\n- **General QA(637K)**: LLaVA-OneVision, InternVL3 → caption/VQA/OCR/knowledge/creative writing. 범용 멀티모달 능력 유지.\n- **Box QA(879K)**: RefCOCO, ASv2, COCO-ReM, InternData-M1, RoboRefIt → bbox 기반 grounding/지시 표현 이해.\n- **Trajectory QA(684K)**: A0 ManiSkill subset, InternData-M1 waypoint, MolmoAct → 정밀 end-effector 궤적 예측.\n- **Point QA(832K)**: Pixmo-Points, RoboPoint, RefSpatial, InternData-M1 point subset → 정밀 point localization. 모든 좌표는 절대좌표, 출력은 JSON·XML.\n\n**왜/직관**\n로봇에게 손을 쓰는 법(action)을 가르치기 전에 먼저 \"공간 감각\"을 길러주는 단계다. 마치 아이에게 물건을 집게 하기 전에 그림책을 보며 \"저 컵이 어디 있지?\"(박스로 가리키기), \"손이 어떤 경로로 가야 하지?\"(궤적 그리기), \"정확히 어느 점을 짚어야 하지?\"(점 찍기)를 말로 묻고 답하게 시키는 것과 같다. 이렇게 4종류의 '공간 받아쓰기(VQA) 문제집'으로 신체(embodiment)에 무관한 공간 사전지식을 머릿속에 심는다. 동시에 일반 상식 문제집(General QA)도 섞어 풀려 공간만 잘하고 평범한 대화/인식 능력을 잃지 않게 균형을 맞춘다.\n\n원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2510.13778v1/x3.png) (4 카테고리·일반 VQA vs 공간 VQA 구성 — §3 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\nPre-training Data (>3M total, >2.3M spatial)  [Figure 3]\n+-- General QA (~637K)  : LLaVA-OneVision, InternVL3  -> general multimodal 유지\n+-- Box QA (~879K)      : RefCOCO, ASv2, COCO-ReM, InternData-M1, RoboRefIt -> bbox grounding\n+-- Trajectory QA(~684K): A0 ManiSkill subset, InternData-M1 waypoint, MolmoAct -> EE traj 예측\n+-- Point QA (~832K)    : Pixmo-Points, RoboPoint, RefSpatial, InternData-M1 -> point localization\n       -> 모든 좌표 = absolute coords; 출력 = JSON / XML\nv\nVLM (Stage-1) : embodiment-agnostic spatial prior 학습\n```\n\n**모듈 분해 (top-down)**\n- **General QA** — 범용 멀티모달 능력(captioning/VQA/OCR/knowledge/creative writing) 유지. LLaVA-OneVision, InternVL3 → ~637K. 공간 데이터 편중으로 일반 능력이 퇴화하는 것을 막는 균형용.\n- **Box QA** — bbox 기반 grounding/지시 표현 이해. RefCOCO, ASv2, COCO-ReM, InternData-M1, RoboRefIt → ~879K.\n- **Trajectory QA** — 정밀 EE 궤적 예측(waypoint 형태). A0 ManiSkill subset, InternData-M1 waypoint, MolmoAct → ~684K.\n- **Point QA** — 정밀 point localization. Pixmo-Points, RoboPoint, RefSpatial, InternData-M1 point subset → ~832K. 모든 좌표를 absolute coords로 변환, 예측은 JSON·XML로 출력.\n\n**학습/추론**\n이 절은 학습(pre-training, Stage 1)에 쓰이는 데이터 구성만 다룬다. 4종 카테고리를 모두 VQA 형식으로 통합해 VLM을 학습하며 목표는 embodiment-agnostic 공간 사전지식 습득. 추론 절차/action 생성 언급은 이 절에 없다. 출력 포맷은 좌표를 절대좌표로 변환하고 JSON/XML로 직렬화하는 규약.\n\n**숫자**: >3M total · >2.3M spatial · General 637K / Box 879K / Trajectory 684K / Point 832K · 4 categories.\n\n---\n\n## 3.2 Synthetic Data For Action Post-Pre-training\n\n**핵심**\n- VLM과 VLA 사이 간극을 메우기 위해 **'Post-Pre-Training' 단계** 도입 — VLM 사전학습 이후 대규모 시뮬레이션 데이터로 VLA를 추가 사전학습.\n- 목적: **action head 초기화 + action representation 학습 촉진**.\n- instruction 수준·object 수준 모두에서 다양성(diversity) 유지 필요.\n- InternVLA-M1-Interface Data와 일관되게 GenManip을 합성 파이프라인으로 사용 → **InternData-M1, 244K closed-loop 샘플**. object set·positional distribution은 Interface Data와 동일.\n- 각 샘플은 정확성·일관성 엄밀 검증, 시각 다양성 위해 조명·텍스처 매핑에 controlled randomization.\n\n**왜/직관**\n언어/시각만 아는 모범생(VLM)을 곧장 로봇 조작 실전에 투입하면 '손발(action)'이 따로 논다. 그래서 실전 투입 전에, 진짜 로봇 데이터가 아니라 값싸게 무한정 찍어낼 수 있는 시뮬레이터(GenManip)로 만든 244K개의 '모의고사 문제집'(InternData-M1)을 먼저 풀린다. 이 워밍업이 action head라는 '운동신경 회로'를 초기화해 준다. 다만 문제집이 똑같은 책상·똑같은 조명만 보여주면 그 환경에만 과적합되므로, 물체 종류·배치는 본 데이터와 같게 두되 조명과 표면 무늬는 일부러 무작위로 바꿔(domain randomization) '다양한 시험장'을 경험시킨다.\n\n원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2510.13778v1/x4.png) (GenManip 합성 파이프라인 — §3 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n[VLM pre-training]\n        |\n        v\n+-----------------------------+\n| Post-Pre-Training (VLA)      |\n|  - init action head          |\n|  - learn action representation|\n+-----------------------------+\n        ^  large-scale simulated data\n[GenManip synthesis pipeline]\n   - same object set / positional dist. as InternVLA-M1-Interface Data\n   - controlled randomization: lighting + texture mapping\n   - per-sample validation (correctness & consistency)\n        |\n        v\n[InternData M1 : 244K closed-loop pick-and-place samples]\n```\n\n**학습/추론**\n학습 측면만 다룬다. 전체 2-stage 중 Stage 2(action post-training)의 사전 워밍업에 해당하는 'Post-Pre-Training' 단계로, VLM 사전학습 후 대규모 시뮬레이션 데이터(InternData-M1, 244K closed-loop)로 VLA를 추가 사전학습한다. 이 과정에서 action head가 초기화되고 action representation이 학습된다. 추론 절차 언급은 이 절에 없다.\n\n**숫자**: 244K closed-loop 샘플(InternData M1 규모).\n\n---\n\n## 3.3 Scalable Synthetic Data Engine for Instruction-Following\n\n**핵심**\n- GenManip + Isaac Sim 위에 구축한 확장 가능·유연·완전 자동 시뮬레이션 파이프라인으로 VLM 사전학습용 대규모 end-to-end 데이터 생성.\n- **자동 태스크 합성**: privileged 신호(object pose/mesh, robot arm state)로 scene graph solver가 레이아웃을 빠르게 생성, mesh 기반 grasp 후보 계산.\n- **물리 검증 루프**: 각 후보 trajectory를 물리엔진에서 **1회 실행**(closed-loop verification) + scene-graph validator로 목표 달성 확인 → 실행 성공 **AND** 검증 통과 trajectory만 채택.\n- **planning-rendering decouple**: planner가 구조화 데이터(관절 상태·객체 위치·행동) 기록, renderer가 무작위 조명/재질/시점으로 replay. ArUco 마커로 카메라 intrinsic/extrinsic을 실제 카메라와 정합.\n- **renderer 산출**: 고해상도 이미지 + object bbox + 2D EE trajectory → action 학습의 dense supervision + spatial grounding/affordance/trajectory 보조 데이터. asset 라이브러리 14K objects/211 tables/1.6K textures/87 dome lights.\n\n**왜/직관**\n영화 제작에 비유할 수 있다. 먼저 '물리 촬영팀(planner)'이 배우(로봇 팔)와 소품(객체)의 동선을 한 번만 실제로 연기시켜보고, 동선이 말이 되는(grasp 성공 + 목표 달성) 테이크만 골라 대본(구조화된 trajectory 데이터)으로 남긴다. 그 다음 '후반 작업팀(renderer)'이 동일한 대본을 가지고 조명·배경·카메라 앵글만 바꿔가며 수없이 다시 찍어낸다. 물리(연기)와 렌더링(촬영)을 분리했기 때문에, 실패한 동작에 비싼 물리 시뮬레이션을 반복 낭비하지 않고도 시각적으로 다양한 데이터를 대량으로 찍어낼 수 있다.\n\n원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2510.13778v1/x4.png) (assets→layout→physics→synthetic generation — §3 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n[ Asset Library: 14K objects | 211 tables | 1.6K textures | 87 dome lights ]\n        v\n===================== PHYSICS (planner) =====================\nrandomized object layouts + lighting\n  -> privileged signals (object poses, meshes, robot arm state)\n  -> scene graph solver ---> candidate grasps (from object meshes)\n  -> execute ONCE in physics (closed-loop verification)\n  -> scene-graph validator (task goals achieved?)\n  accept only: execute-success AND pass-validation\n  -> structured scene/trajectory data (joint states, object positions, action)\n        v  DECOUPLED\n===================== RENDERING (renderer) ==================\nreplay under randomized lighting / materials / viewpoints\ncameras calibrated via ArUco markers (intrinsic+extrinsic matched to real)\n  -> outputs: high-res images / object bboxes / 2D EE trajectories\n  -> dense supervision for action learning\n  -> auxiliary datasets: spatial grounding / affordance reasoning / trajectory prediction (VQA)\n```\n\n**모듈 분해 (top-down)**\n- **자동 태스크 합성** — 무작위화된 객체 레이아웃·조명에서 다양한 조작 trajectory 생성, 물리적으로 타당하며 task를 완수하는 데이터만 채택. 입력: asset 라이브러리(14K objects 등) + privileged 신호. 출력: 검증 통과한 구조화 scene/trajectory(joint states, object positions, action info). scene graph solver로 레이아웃 생성, mesh 기반 candidate grasp 계산, physics 1회 실행(closed-loop), scene-graph validator로 목표 달성 검증.\n- **VLM/VLA 데이터 합성** — planner와 renderer를 완전히 decouple. planner 기록 데이터를 renderer가 무작위 조명/재질/시점으로 replay, ArUco로 calibration. 산출 중간 표현은 action learning dense supervision + spatial grounding/affordance/trajectory 보조 데이터 생성에 사용.\n\n**학습/추론**\n이 섹션은 학습/추론 알고리즘이 아니라 사전학습용 데이터 생성(데이터 엔진) 파이프라인을 다룬다. 생성된 데이터는 VLM pre-training의 end-to-end 학습 데이터로 사용되며, 특히 spatial grounding 보조 데이터셋과 action learning dense supervision을 제공한다. 핵심 효율화는 physics(planning)와 rendering 분리로 실패 trajectory에 대한 물리 시뮬레이션 낭비를 줄이는 것. 추론 절차 언급은 이 섹션에 없다.\n\n**숫자**: asset 14K annotated objects / 211 tables / 1.6K textures / 87 dome lights · 각 candidate trajectory는 물리엔진에서 1회 실행(closed-loop verification).\n\n> ⚠️ 보조 데이터셋을 'VQA format'으로 묶은 근거는 본문 텍스트가 아니라 Figure 4 캡션('converts intermediate representations into VQA data')에만 등장. 환각은 아니나 출처가 캡션임. intuition·ascii는 검증된 본문과 일치하는 해석적 재구성.\n\n---\n\n## 4. Experiments\n\n**핵심**\n- 공개 벤치마크(SimplerEnv·LIBERO)에서 SOTA. SimplerEnv: Google Robot Visual Matching **80.7%**(prior SOTA +5.9%), Variant Aggregation **76.0%**(+5.3%), WidowX **71.7%**(+9.8%). LIBERO 평균 **95.9%**로 GR00T N1·π0 능가(Spatial 98.0%·Long 92.6%).\n- **Vanilla VLA**(Qwen2.5-VL-3B + DiT head) 대비 Google VM **+14.6%**, VA +12.4%, WidowX **+17.0%** — spatial grounding 사전학습 + spatially-guided action 후학습 효과 입증.\n- **Dual-supervision co-training ablation**(Table 3, Fig.5): spatial 데이터/프롬프팅을 빼면 grounding이 급격히 퇴화하고 manipulation 수렴이 느려짐. SVD 기반 **PSS(Projection-space Similarity)**가 vanilla co-train **0.25 → spatially-guided 0.42**로 상승해 gradient subspace 정합성 개선을 정량 확인.\n- **Isaac-Sim 대규모 200-task pick-and-place**(3K+ 물체): 4가지 일반화 설정(In-distribution/Unseen Object/New Background/Unseen Instruction) 모두 π0 능가, mid-train 변형은 GR00T N1.5 대비 평균 **+6.2%**.\n- **실제 로봇**(Franka FR3 + ARX LIFT2): co-train 변형이 unseen object/position/orientation/instruction 일반화에서 우위. Long-horizon·reasoning에서 VLM planner가 GPT-5보다 후학습 후 더 강함(Ours-3B 90~93 vs GPT-5 62~82, Table 5).\n\n**왜/직관**\n두 명이 한 팀으로 일하는 요리사 듀오라고 보면 된다. System 2 VLM 플래너는 '머릿속으로 공간을 짚어가며 계획을 세우는 느리지만 신중한 헤드셰프', DiT 액터(System 1)는 '손이 빠른 라인쿡'이다. 실험 파트는 이 듀오를 다양한 주방에서 시험한다 — 익숙한 주방(In-distribution), 처음 보는 재료(Unseen Object), 낯선 조리대 배경(New Background), 다르게 표현된 주문서(Unseen Instruction), 그리고 누가 중간에 서랍을 닫아버리거나(physical interference) 주문을 바꿔버리는(task replanning) 방해까지. 핵심 통찰은 '공간을 머릿속으로 짚는 습관(spatial grounding)을 manipulation과 같이 가르치면 두 목표의 학습 방향(gradient)이 서로 안 싸우게 정렬돼(PSS 0.25→0.42) 더 빨리·더 잘 배운다'는 것이다.\n\n원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2510.13778v1/x5.png)\n![](https://arxiv.org/html/2510.13778v1/x5.png)\n> Figure 5: auxiliary spatial prompting ablation. (a) spatial grounding(IoU@0.5 on RefCOCO-g), (b) manipulation(SimplerEnv-WidowX SR), (c) 두 목적의 gradient similarity(PSS 0.25 vs 0.42). 4.1.1 핵심 ablation 근거.\n\n원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2510.13778v1/x6.png)\n![](https://arxiv.org/html/2510.13778v1/x6.png)\n> Figure 6: 대규모 시뮬 일반화 평가 설정(In-distribution/Unseen Object/New Background/Unseen Instruction)을 시각적으로 정의.\n\n원본 그림 7: [arXiv Figure 7](https://arxiv.org/html/2510.13778v1/x7.png)\n![](https://arxiv.org/html/2510.13778v1/x7.png)\n> Figure 7: 200 시뮬 벤치마크 결과. mid-train 변형이 GR00T N1.5 대비 평균 +6.2% 우위를 보이는 막대 비교.\n\n원본 그림 10: [arXiv Figure 10](https://arxiv.org/html/2510.13778v1/x10.png)\n![](https://arxiv.org/html/2510.13778v1/x10.png)\n> Figure 10: 실세계 instruction-following pick-and-place. 5개 일반화 regime에서 w/ co-train이 GR00T N1.5·π0 능가.\n\n원본 그림 12: [arXiv Figure 12](https://arxiv.org/html/2510.13778v1/x12.png)\n![](https://arxiv.org/html/2510.13778v1/x12.png)\n> Figure 12: 실세계 long-horizon task planning. physical interference·task replanning 하에서의 견고성 비교.\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n[4 Experiments]\n  +-- 4.1 Public Benchmarks\n  |     +-- 4.1.1 SimplerEnv (16xA100, 50k step ~2.5ep)\n  |     |     action chunk=16, batch robot=256/mm=64\n  |     |     Google VM -> 80.7 (+5.9 SOTA / +14.6 Vanilla)\n  |     |     Google VA -> 76.0 (+5.3 SOTA / +12.4 Vanilla)\n  |     |     WidowX VM -> 71.7 (+9.8 SOTA / +17.0 Vanilla)\n  |     |     Ablation(Table3,Fig5): PSS 0.25 -> 0.42\n  |     +-- 4.1.2 LIBERO (8xA100, ~30k step ~20h, 500 trials/suite)\n  |           Spatial 98.0 / Object 99.0 / Goal 93.8 / Long 92.6 / Avg 95.9\n  +-- 4.2 자체 구축 환경 Instruction-Following\n        +-- 4.2.1 Sim large-scale (Isaac-Sim, 200 tasks, 3K+ items)\n        |     16xA100, batch=256, chunk=16, 20k step, delta-joint\n        |     w/ mid-train (InternData-M1) -> +6.2 vs GR00T N1.5\n        +-- 4.2.2 Real-world (Franka FR3 + Robotiq 2F-85)\n        |     23 seen obj + 5 container, 60x90cm, 6h teleop\n        |     300 rollouts, 설정당 >=50회, delta-EE\n        +-- 4.2.3 Long-horizon & Reasoning (22h teleop, ~500 demo/task)\n              System2 planner -> atomic actions -> System1 actor\n              In-dist / Physical Interference / Replanning\n```\n\n**모듈 분해 (top-down)**\n- **4.1.1 SimplerEnv** — 시각 외관 변화(조명·색·텍스처·카메라)에 대한 robustness 평가. Google Robot(VM/VA)+WidowX(VM). 학습: OXE subset(fractal_rt_1, bridge_v1)+spatial grounding co-train, 16×A100 50k step. 결과 Google VM 80.7 / VA 76.0 / WidowX 71.7.\n- **4.1.1 Dual-supervision ablation** — spatial 데이터+prompting이 manipulation 수렴·grounding 보존에 미치는 효과 검증. SVD 기반 PSS: vanilla 0.25 → spatially-guided 0.42. Table3에서 InternVLA-M1(MME 1411, RefCOCO-g IoU 71.2)이 Vanilla co-train(MME 1106, RefCOCO-g 47.1) 대비 전 범주 우위.\n- **4.1.2 LIBERO** — 언어 조건부 manipulation 4 suite(Spatial/Object/Goal/Long). wrist+third-person 뷰, 8×A100 batch=128 ~30k step, suite당 500 trial. Avg 95.9.\n- **4.2.1 Isaac-Sim 대규모** — 200 task(물체 상호 배타적), 3K+ items. 2 RGB(3인칭+EE 1인칭) 224×224, 16×A100 batch=256 20k step, delta joint. mid-train은 GR00T N1.5 대비 +6.2%.\n- **4.2.2 실세계 cluttered** — Franka FR3 + Robotiq 2F-85, 2×RealSense D435. 60×90cm, 23 seen obj+5 container, 6h teleop. 300 rollout(설정당 ≥50회), delta EE. 5 regime.\n- **4.2.3 Long-horizon·Reasoning** — System2 planner가 task 분해 → System1 actor 실행. 22h teleop(~500 demo/task), subtask 분할+zero-action padding. 5 task(Desktop Sorting/Drawers/Sandwiches/Math/Goods Purchase). Table5: Ours-3B(90/91/91/93/92) > GPT-5(75/67/62/79/82).\n\n**학습/추론 (train/test 차이)**\n- **학습**: 태스크별 별도 fine-tune. (1) SimplerEnv — OXE subset + spatial grounding co-train, robot/multimodal 합산 loss, 16×A100 50k step(~2.5ep), batch robot=256/mm=64, chunk 16. (2) LIBERO — 실패 데모·pause frame 필터링 후 suite 독립 fine-tune, 8×A100 batch=128 ~30k step, chunk 8. (3) Isaac-Sim 200-task — task당 5 trajectory fine-tune, 선택적 InternData-M1 mid-train, 16×A100 batch=256 20k step, delta joint. (4) 실세계 — 6h teleop, w/ co-train은 실세계+InternData-M1 동시 학습, 16×A100 batch=256 20k step, delta EE. (5) Long-horizon — 22h teleop(~500 demo/task), subtask 분할 + 각 subtask 뒤 zero-action vector padding, idle/pause frame 제거.\n- **추론**: VLM Planner(System 2)가 spatial prompting으로 latent planning token 생성 → DiT Actor(System 1)가 control 실행. Long-horizon에서는 단일 통합 모델이 task 분해→subtask 식별→action을 end-to-end 수행. 평가: SimplerEnv 공식 protocol, LIBERO suite당 500 trial, 실세계 모델당 300 rollout(설정당 ≥50회).\n\n**숫자**: SimplerEnv Google VM 80.7(+5.9 SOTA/+14.6 Vanilla)·VA 76.0(+5.3/+12.4)·WidowX 71.7(+9.8/+17.0; Vanilla 54.7) · LIBERO Spatial 98.0/Object 99.0/Goal 93.8/Long 92.6/Avg 95.9(GR00T N1 93.9, π0 94.2, π0.5-KI 94.3) · PSS 0.25→0.42 · Table3 InternVLA-M1: MME 1411/MMVet 23.3/TextVQA 28.6/POPE 86.2/RefCOCO-g IoU 71.2/A0-maniskill Traj.MAE 5.1 · Isaac-Sim 200 task·3K+ items·mid-train +6.2% vs GR00T N1.5 · Table5 Ours-3B 90/91/91/93/92, GPT-5 75/67/62/79/82, Gemini-2.5 Pro 57/62/83/53/61.\n\n---\n\n## 4.1 공개 벤치마크 실험 (Experiments on Public Benchmarks)\n\n> §4에서 SimplerEnv·LIBERO 결과·ablation을 정리했다. 이 절은 두 벤치마크의 역할 구분과 PSS 분석을 보강한다.\n\n**핵심**\n- SimplerEnv = 시각 외형 변화 robustness(Google Robot-VM/VA, WidowX-VM), LIBERO = 언어 조건부 조작 4 suite(Spatial/Object/Goal/Long).\n- SimplerEnv: SOTA 대비 Google VM +5.9%/VA +5.3%/WidowX +9.8%, Vanilla VLA 대비 +14.6%/+12.4%/+17.0%(Table 1, 2).\n- Dual-supervision co-training ablation(Table 3, Fig 5): spatial 데이터/prompting 제거 시 grounding 급격 퇴화·조작 수렴 지연. spatially-guided는 수렴 가속 + 조작 성공률·grounding 정확도 동시 향상.\n- 그래디언트 정렬: SVD 기반 PSS 0.25 → 0.42로 두 목적의 최적화 부분공간 정합 개선(Fig 5(c)).\n- LIBERO 평균 95.9%로 강한 베이스라인 능가(특히 Spatial 98.0%, Long 92.6%, Object 99.0%).\n\n**왜/직관**\n두 명이 한 몸으로 로봇을 모는 상황에 비유할 수 있다. '느리지만 신중한 길잡이(VLM 플래너=System 2)'가 먼저 공간을 짚어주고(spatial prompting), '빠른 운전자(DiT 액션 전문가=System 1)'가 그 지시를 받아 손을 움직인다. 핵심 통찰은 '지도 읽기(공간 grounding) 연습과 운전(조작) 연습을 따로 시키면 서로 발목을 잡지만(PSS 0.25, 서로 다른 방향으로 당김), 길잡이가 미리 공간 단서를 던져주는 방식(spatial prompting)으로 함께 연습시키면 두 연습이 같은 방향을 향하게 되어(PSS 0.42) 둘 다 빨리·잘 는다'는 것이다.\n\n원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2510.13778v1/x5.png) ((a) RefCOCO-g IoU@0.5, (b) WidowX SR, (c) PSS 0.25→0.42 — §4 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n입력: primary obs image + task instruction + auxiliary spatial prompt\n        v\n[ VLM Planner (Sys 2) ]  ← Qwen2.5-VL-3B 백본 -> latent plan tokens\n        v  condition\n[ Action Expert (Sys 1) ]  ← DiT Actor\n        SimplerEnv: action chunk=16 / LIBERO: chunk=8\n        v\n   [환경 실행]\n   ├─ SimplerEnv: Google VM/VA, WidowX VM  -> Table 1 / Table 2\n   └─ LIBERO:     Spatial/Object/Goal/Long -> Table 4\n   (+ Table 3 ablation, Figure 5: PSS 0.25 -> 0.42)\n```\n\n**모듈 분해 (top-down)**\n- **SimplerEnv 평가(4.1.1)** — OXE subset(fractal_rt_1, bridge_v1) post-train + spatial grounding co-train. 입력: primary obs image + instruction + auxiliary spatial prompt → action chunk(16). 16×A100, 50k step(~2.5ep), robot batch 256/mm 64, 합산 loss. 결과: Google VM +5.9%/+14.6%, VA +5.3%/+12.4%, WidowX +9.8%/+17.0%.\n- **Dual-supervision ablation(4.1.1)** — manipulation(WidowX SR)·perception(RefCOCO IoU@0.5)·PSS 측정. vanilla PSS 0.25 → spatially-guided 0.42. Table3 전 범주 우위.\n- **LIBERO 평가(4.1.2)** — wrist+third-person 뷰, action chunk 8. Kim et al.(2025) 따라 실패 데모·pause frame 필터링. 8×A100 batch 128, ~30k step. Avg 95.9.\n\n**학습/추론**\n- **학습**: SimplerEnv — OXE subset에 spatial grounding co-train, 16×A100 50k step(~2.5ep), robot batch 256/mm 64, action chunk 16, SFT QA 포맷. LIBERO — 실패 데모/pause frame 필터링 후 wrist+3rd-person 입력, 8×A100 batch 128, action chunk 8, suite 독립 ~30k step(~20h).\n- **추론/평가**: SimplerEnv 공식 protocol로 Google VM/VA·WidowX VM 성공률 측정. LIBERO suite당 500 trial. 입력 = primary obs + instruction + auxiliary spatial prompt, VLM 플래너가 latent plan 생성해 DiT action expert 조건화.\n\n**숫자**: SimplerEnv 향상 SOTA 대비 VM +5.9%/VA +5.3%/WidowX +9.8%, Vanilla 대비 VM +14.6%/VA +12.4%/WidowX +17.0% · Google VM Avg 80.7 / VA 76.0(Δ +12.5) / WidowX 71.7(Put Eggplant in Yellow Basket 100.0) · PSS 0.25→0.42 · LIBERO Avg 95.9(GR00T N1 93.9, π0 94.2, π0.5-KI 94.3, Vanilla VLA 91.6).\n\n> ⚠️ Variant Aggregation의 Vanilla VLA 대비 향상치가 본문 prose에서는 +12.4%(stated), Table 1 raw 차이(76.0−63.5)로는 +12.5로 0.1 불일치한다. 두 값 모두 논문에 존재.\n\n---\n\n## 4.1.1 SimplerEnv Benchmark\n\n**핵심**\n- OXE 일부(fractal_rt_1 + bridge_v1)로 action post-training + spatial grounding co-training. VLM이 관측 이미지·instruction·auxiliary spatial prompt 입력, action expert는 action chunk size 16. SimplerEnv 공식 protocol 평가.\n- prior SOTA 대비 Google VM +5.9%, VA +5.3%, WidowX +9.8%.\n- 동일 백본(Qwen2.5-VL-3B-Instruct + DiT head) Vanilla VLA 대비 Google VM +14.6%, VA +12.4%, WidowX +17.0%.\n- Dual-supervision co-training ablation(Fig 5): spatial 데이터·prompting 제거 시 grounding 급격 저하·manipulation 수렴 지연.\n- SVD 기반 PSS: vanilla 0.25(부분공간 충돌) → spatially-guided 0.42(최적화 일관성 개선).\n\n**왜/직관**\n한 명의 일꾼에게 '물건을 정확히 집어라(manipulation)'와 '이 물체가 화면 어디 있는지 짚어라(spatial grounding)' 두 가지를 동시에 시킨다고 하자. 그냥 둘을 섞어 가르치면(vanilla co-train) 두 지시가 서로 다른 방향으로 손을 끌어당겨(gradient 충돌, PSS 0.25) 둘 다 어설퍼진다. InternVLA-M1은 'auxiliary spatial prompt'라는 공통 언어로 두 과제를 같은 방향으로 정렬시켜(PSS 0.42), 위치를 먼저 머릿속으로 짚은 다음 그 자리로 손을 보내게 만든다. 그 결과 위치 감각도 유지되고 집기 성공률도 더 빨리·더 높이 오른다.\n\n원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2510.13778v1/x5.png) (4.1.1 유일한 본문 인용 그림 — §4 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\ntask instruction ─┐\nprimary obs image ─┼──► [VLM Planner (Qwen2.5-VL-3B)] ──► latent plan\nauxiliary spatial ─┘            │ (spatial prompting)        │\n     prompt                     ▼                            ▼\n                       [Action Expert / DiT]  chunk=16 -> action a_{t:t+16}\n        ┌──────── summed loss (robot + multimodal) ────────┐\n        │  robot data (OXE: fractal_rt_1 + bridge_v1)  bs=256 │\n        │  multimodal data (SFT QA format)             bs=64  │\n        └─────────────────────────────────────────────────────┘\n            16x A100 · 50k steps (~2.5 epochs)\n  평가: SimplerEnv 공식 프로토콜\n    ├─ Google Robot-VM (Table 1, Avg 80.7)\n    ├─ Google Robot-VA (Table 1, Avg 76.0)\n    └─ WidowX-VM (Table 2, Avg 71.7)\n```\n\n**모듈 분해 (top-down)**\n- **VLM Planner (System 2)** — task instruction·관측 이미지·auxiliary spatial prompt를 받아 spatial prompting으로 latent plan 생성. Qwen2.5-VL-3B-Instruct. spatial grounding 데이터와 co-train해 embodiment-agnostic spatial prior 유지. 텐서 shape (미명시).\n- **Action Expert (DiT Actor, System 1)** — VLM latent plan을 condition으로 받아 action chunk 생성(chunk size 16). Vanilla VLA도 동일하게 DiT action head 사용(공정 비교).\n\n**학습/추론**\n- **학습**: OXE 일부(fractal_rt_1 + bridge_v1) action post-training + spatial grounding(§3.1) co-train. action chunk 16, SFT식 QA 포맷. 16×A100, 50k step(~2.5ep), robot batch 256/mm 64, 합산 loss.\n- **추론/평가**: 전부 SimplerEnv 공식 protocol. Google Robot-VM(시점·조명 변화), VA(텍스처·색 변화), WidowX-VM(cross-robot 일반화). Ablation은 step별 manipulation/perception 곡선 + SVD 기반 PSS로 gradient 정렬 분석.\n\n**숫자**: action chunk 16 · 16 A100 · 50k step(~2.5ep) · robot batch 256/mm 64 · SOTA 대비 VM +5.9%/VA +5.3%/WidowX +9.8% · Vanilla 대비 +14.6%/+12.4%/+17.0% · Google VM Avg 80.7(Pick Coke Can 95.3/Move Near 90.0/Open·Close Drawer 75.5/Apple in Top Drawer 62.0) · VA Avg 76.0 · WidowX Avg 71.7(Spoon on Towel 87.5/Carrot on Plate 67.9/Stack Green on Yellow 31.3/Eggplant in Basket 100.0) · PSS 0.25 vs 0.42.\n\n---\n\n## 4.1.2 LIBERO Benchmark\n\n**핵심**\n- LIBERO 4 suite(Spatial/Object/Goal/Long)를 각각 독립 fine-tune. GR00T N1·π0 등 강한 베이스라인 대비 특히 spatial·long-horizon에서 뚜렷한 개선(SR 98.0%, 92.6%).\n- object placement(LIBERO-Object) 99.0% SR로 견고한 object grounding 입증.\n- 평균 SR 95.9%로 Table 4 모든 비교 모델 중 최고(π0 94.2, π0.5-KI 94.3, GR00T N1 93.9 대비 우위).\n- 세팅: Kim et al.(2025) 따라 실패 시연·pause frame 필터링, wrist-mounted + third-person 뷰 모두 입력.\n- 학습: suite당 8×A100, batch 128, action chunk 8, ~30K step(~20h), suite당 500 trial 평가.\n\n**왜/직관**\nLIBERO는 로봇 매니퓰레이션의 표준 시험장으로, 같은 책상 위 작업을 네 종류 시험지(공간 배치 Spatial, 물체 식별 Object, 목표 상태 Goal, 다단계 Long)로 나눠 본다. InternVLA-M1은 손으로 더듬는 감각(wrist 카메라)과 전체 장면을 보는 눈(third-person 카메라)을 함께 쓰는 학생과 같아서, '어디에·무엇을' 놓는지를 묻는 공간·물체 문제와 여러 단계를 순서대로 풀어야 하는 장기 과제에서 특히 강점을 보인다. 평균 점수가 반에서 1등이지만 과목별로는 일부 다른 학생에게 한두 과목을 양보하는 모범생에 비유할 수 있다.\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n입력 관측 (per timestep)\n  wrist-mounted camera view + third-person camera view\n        v\n[ InternVLA-M1 (VLM + Actor) ]  스위트별 독립 fine-tune\n   8xA100 / bs=128 / ~30K step / ~20h\n        v  action chunk (size = 8)\n[ 로봇 제어 실행 ]  500 trials per suite\n        v\n4개 스위트 SR: Spatial 98.0 | Object 99.0 | Goal 93.8 | Long 92.6 | Avg 95.9\n학습 데이터 전처리: 실패 demo + pause frame 필터링 (Kim et al. 2025)\n```\n\n**학습/추론**\n- **학습**: 4 suite 각각 독립 fine-tune. Kim et al.(2025) 따라 실패 시연·pause frame 제거. wrist+third-person 뷰 입력. 8×A100, batch 128, action chunk 8, ~30K step(~20h).\n- **추론/평가**: suite당 500 trial로 SR 측정. Table 4: Spatial 98.0/Object 99.0/Goal 93.8/Long 92.6/Avg 95.9.\n\n**숫자**: Spatial 98.0 / Object 99.0 / Goal 93.8 / Long 92.6 / Avg 95.9 · 8×A100, batch 128, chunk 8, ~30K step(~20h), 500 trial/suite · 비교: OpenVLA 76.5/SpatialVLA 78.1/CoT-VLA 83.9/GR00T N1 93.9/π0 94.2/π0-FAST 85.5/π0.5-KI 94.3/Vanilla VLA 91.6.\n\n> ⚠️ InternVLA-M1은 평균 최고이나 **Spatial 컬럼 단독 최고는 아니다** — Table 4의 Spatial 최고치는 Vanilla VLA 98.8로 InternVLA-M1(98.0)을 앞선다. (\"InternVLA-M1이 Spatial 단독 최고\"라고 읽지 말 것.)\n\n---\n\n## 4.2 자체 구축(in&#8209;house) 환경에서의 지시-따르기(Instruction-Following) 실험\n\n> §4에서 4.2.1~4.2.3 핵심 결과를 정리했다. 이 절은 공통 셋업과 dual-system 추론 루프를 보강한다.\n\n**핵심**\n- **대규모 시뮬(4.2.1)**: Isaac-Sim 200 pick-and-place task(배경 포함 3K+ items). In-distribution/Unseen Object/New Background/Unseen Instruction 4 설정. mid-train(InternData-M1) 시 GR00T N1.5 대비 +6.2%, 두 변형 모두 π0 능가.\n- **실세계 cluttered(4.2.2)**: Franka FR3 + Robotiq 2F-85, RealSense D435 2대(손목+후방). 60×90cm, seen 23 obj/5 container, 6h teleop. w/o vs w/ co-train(real+InternData-M1)을 GR00T N1.5·π0와 5 regime 비교. 모델당 300 rollout, 설정당 ≥50회. co-train이 novel object/position/orientation 일반화 크게 향상.\n- **Long-horizon·reasoning(4.2.3)**: dual-system(System2 분해, System1 실행)으로 Desktop Sorting/Drawers/Sandwiches/Math/Goods Purchase 5 task. 22h teleop(~500 demo/task). In-distribution/Physical Interference/Task Replanning 3 설정. 외란·재계획 상황에서 baseline 대비 성능 저하 훨씬 작음.\n- **공통 학습**: 2 RGB 뷰(3인칭+EE 1인칭) 224×224, 16 A100, batch 256, action chunk 16, 20K step. 시뮬 delta joint, 실세계 delta end-effector.\n- **VLM planner task scheduling(Table 5)**: post-training된 Ours-3B가 GPT-5의 강한 추론력에도 long-horizon/reasoning에서 더 우수 → 고수준 task planning에 post-training 필요성 입증.\n\n**왜/직관**\n느린 '두뇌'(System 2 = VLM planner)와 빠른 '손'(System 1 = action model)을 가진 일꾼에 비유할 수 있다. 두뇌는 '클래식 샌드위치 만들기' 같은 긴 명령을 (1)빵 놓기 (2)고기 놓기 (3)양상추 놓기 (4)빵 놓기처럼 작은 단계로 나누고, 손은 각 단계를 정밀 실행한다. 각 단계 끝에 zero-action 패딩(잠깐 멈춤 신호)을 넣어, 한 단계를 끝내면 손이 멈추고 두뇌가 다음 단계를 지시한다. 실세계 데이터만으로는 책상 위 모든 위치/방향을 다 가르칠 수 없으므로, 무한히 다양한 시뮬레이션 데이터(InternData-M1)를 '교과서 보충 문제집'처럼 함께 학습(co-train)시켜 처음 보는 물체나 낯선 배치에도 일반화하게 만드는 것이 핵심이다.\n\n원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2510.13778v1/x6.png) ((§4 임베드) 4가지 일반화 설정 정의)\n원본 그림 7: [arXiv Figure 7](https://arxiv.org/html/2510.13778v1/x7.png) ((§4 임베드) 200 시뮬 +6.2% 결과)\n\n원본 그림 8: [arXiv Figure 8](https://arxiv.org/html/2510.13778v1/x8.png)\n![](https://arxiv.org/html/2510.13778v1/x8.png)\n> Figure 8: 실세계 벤치마크의 seen 23 객체/5 컨테이너 및 seen/unseen disjoint set을 보여주는 자산 목록.\n\n원본 그림 9: [arXiv Figure 9](https://arxiv.org/html/2510.13778v1/x9.png)\n![](https://arxiv.org/html/2510.13778v1/x9.png)\n> Figure 9: 실세계 5개 평가 체제(In-Distribution/Unseen Objects/Position/Orientation/Instructions) 실제 장면 예시.\n\n원본 그림 11: [arXiv Figure 11](https://arxiv.org/html/2510.13778v1/x11.png)\n![](https://arxiv.org/html/2510.13778v1/x11.png)\n> Figure 11: 5개 long-horizon/reasoning 태스크(Desktop Sorting, Drawers, Sandwiches, Math, Goods Purchase) 실제 셋업 showcase.\n\n원본 그림 10·12: §4에 임베드(실세계 pick-and-place 결과 / long-horizon task planning 결과).\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\nSystem 2 (VLM Planner, 느림/신뢰성)\n   |  task instruction: \"make a classic sandwich\"\n   v\n[Task decomposition into atomic subtasks]\n   (1) Put a piece of bun on the plate.\n   (2) Put a piece of meat on the plate.\n   (3) Put a piece of lettuce on the plate.\n   (4) Put a piece of bun on the plate.\n   |  각 subtask 끝 -> zero-action vectors padding (정지/전이 신호)\n   v\nSystem 1 (Action Model, 빠름/실행)\n   v\nRobot (Franka FR3 + Robotiq 2F-85 / ARX LIFT2)  -> 환경\n   ^   physical interference / task replanning 발생 시\n   +---- System 2가 subtask sequence on-the-fly 재구성 후 다시 지시\n관측: 2x RGB (후방 3인칭 + 손목 1인칭, 224x224)\n```\n\n**모듈 분해 (top-down)**\n- **대규모 시뮬 벤치마크(4.2.1)** — 2 RGB(고정 3인칭 + Franka EE 1인칭) 224×224. 200 task(객체 상호 배타적), 3K+ items. task당 5 trajectory(랜덤 레이아웃) 수집. w/o vs w/ mid-train(InternData-M1). delta joint control.\n- **실세계 객체 정렬 벤치마크(4.2.2)** — 2×RealSense D435(EE+후방 3인칭) 224×224. Franka FR3+Robotiq 2F-85, 60×90cm, seen 23 obj/5 container, 6h teleop. w/o co-train(real만) vs w/ co-train(real+InternData-M1). 300 rollout/모델, 설정당 ≥50회, 위치 고정. delta EE control.\n- **Long-horizon/Reasoning 스위트(4.2.3)** — 멀티모달(task decomposition·subtask 식별·numerical reasoning·action supervision). 22h teleop(~500/task). 5 task: Desktop Sorting(60×90cm, 5 container/5 category), Drawers(35×35cm, stepwise), Sandwiches(50×70cm, 5 recipe), Math(40×40cm 버튼), Goods Purchase(ARX LIFT2 dual-arm). subtask 분할+zero-action padding, idle/pause 제거. 단일 통합 모델이 planning+reasoning+action을 end-to-end 처리.\n\n**학습/추론**\n- **학습**: 각 suite 독립 fine-tune. 공통 = 16 A100, batch 256, action chunk 16, 20K step. 시뮬 delta joint, 실세계 delta end-effector. 변형: (시뮬) w/o mid-train = task당 5 traj만, w/ mid-train = InternData-M1 추가; (실세계) w/o co-train = real만, w/ co-train = real+InternData-M1. long-horizon은 trajectory를 subtask로 분할·atomic action 주석, subtask 경계 zero-action vector padding, pause/idle 제거; 레시피는 실세계 short-horizon과 동일.\n- **추론**: System 2(VLM planner)가 명령을 atomic subtask 시퀀스로 분해, System 1(action model)이 실행. physical interference·task replanning 발생 시 planner가 subtask 시퀀스를 on-the-fly 재구성. SR = 지정 객체가 지정 컨테이너에 들어간 비율(drawers/sandwiches는 선행 단계 모두 성공해야 유효한 stepwise success).\n\n**숫자**: 시뮬 200 task·3K+ items·task당 5 traj·mid-train +6.2% vs GR00T N1.5 · 입력 224×224(2 RGB) · 16 A100/batch 256/chunk 16/20K step · 실세계 60×90cm, 23 obj/5 container, 6h teleop, 300 rollout(설정당 ≥50회) · long-horizon 22h teleop(~500/task) · Table 5 Ours 90/91/91/93/92 vs GPT-5 75/67/62/79/82.\n\n> ⚠️ 논문은 이것이 **하나의 통합 end-to-end 모델**임을 강조한다('in contrast to prior VLA models that depend on an additional VLM as a task planner'). System 1/System 2를 분리 가능한 두 모듈로 묘사한 ASCII는 직관적 단순화이며, '재지시 루프'는 본문이 'on the fly'로만 기술. 일부 fine-grained 수치(컨테이너 3개 고정 위치, Math 버튼 색 등)는 figure 이미지에서만 확인 가능해 텍스트-검증되지 않음.\n\n---\n\n## 4.2.1 대규모 시뮬레이션 Pick-and-place 평가\n\n**핵심**\n- 기존 벤치마크(SimplerEnv·LIBERO)는 규모가 작아 다양·복잡 환경 instruction-following을 충분히 평가 못 함 → Isaac-Sim 200 task(3K+ items)로 대규모 평가 구축.\n- 4 일반화 설정(In-distribution/Unseen Object/New Background/Unseen Instruction). 변형 = w/o mid-train(task당 5 traj만) vs w/ mid-train(InternData-M1 추가).\n- 모든 설정에서 두 변형 모두 π0 능가, w/ mid-train은 GR00T N1.5를 일관 상회(평균 +6.2%).\n- Unseen Object = simulation-enhanced 시각 일반화 이득, New Background = scene-level shift 강건성, Unseen Instruction = 템플릿 넘어선 instruction grounding·언어 일반화.\n\n**왜/직관**\n실력 있는 요리사를 평가하려면 시험에서 본 똑같은 재료 몇 개로 만든 요리만 보면 안 되고, 처음 보는 재료(Unseen Object), 낯선 주방(New Background), 평소와 다르게 돌려 말한 주문(Unseen Instruction)까지 줘 봐야 한다. 이 섹션은 딱 그런 종합 시험장(200 task, 3K+ 객체)을 차린 것이다. mid-train은 본 시험 전에 대규모 모의고사(InternData-M1)를 한 번 치르게 하는 것과 같아서, 처음 보는 상황에서도 흔들리지 않고 평균 +6.2%만큼 더 잘하게 만든다.\n\n원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2510.13778v1/x6.png) (4 일반화 설정 정의 — §4 임베드 참고)\n원본 그림 7: [arXiv Figure 7](https://arxiv.org/html/2510.13778v1/x7.png) (200 벤치마크 +6.2% — §4 임베드 참고)\n\n**학습/추론**\n- **학습**: 각 suite 독립 fine-tune. 16×A100, batch 256, action chunk 16, 20K step, delta joint(본 모델+전 베이스라인 공통). task당 5 trajectory(동일 객체셋·랜덤 레이아웃). w/o mid-train = 5 traj만, w/ mid-train = InternData-M1 추가 mid-train. 입력 = 3인칭 고정 + Franka EE 1인칭 RGB 2장(224×224).\n- **추론/평가**: 200 task를 4 설정에서 평가, 자연어 지시대로 지정 객체를 집어 올바른 컨테이너에 배치하는 성공 여부로 π0·GR00T N1.5 대비.\n\n**숫자**: 200 task · 3K+ items/containers · task당 5 traj · 224×224(2 RGB) · 16×A100, batch 256, chunk 16, 20K step, delta joint · w/ mid-train +6.2% vs GR00T N1.5.\n\n---\n\n## 4.2.2 실세계 혼잡 장면(Cluttered-scene) Pick-and-Place 평가\n\n**핵심**\n- Franka Research 3 + Robotiq 2F-85, Intel RealSense D435 2대(EE + 후방 3인칭) RGB.\n- 정량 평가: 60×90cm 탁상에서 단일 호라이즌 pick-and-place. seen 23 obj + 5 container, 매 에피소드 컨테이너 3개 고정·물체 랜덤 배치.\n- 변형: w/o co-train(real만) vs w/ co-train(real + InternData-M1). 베이스라인 GR00T N1.5, π0. post-training용 6h teleop(seen 세트만).\n- 5 평가 regime: In-Distribution/Unseen Objects/Unseen Position/Unseen Orientation/Unseen Instructions. SR로 측정, 모델당 300 rollout, 설정당 ≥50회, 위치 고정.\n- 결과(Fig 10): 두 변형 모두 in-distribution에서 GR00T N1.5·π0 능가. InternData-M1 co-train이 novel 물체 시각 일반화 크게 향상 — 합성 데이터가 제한된 실세계 시연을 보완. 시뮬 데이터가 위치/방향 분포 확장해 unseen 구성 일반화 대폭 개선.\n\n**왜/직관**\n실세계 시연만으로 학습하면 6시간 분량으로는 60×90cm 작업공간의 모든 물체 위치·방향을 다 커버할 수 없다. 이는 좁은 동네에서만 운전 연습을 한 운전자와 같아서 처음 보는 도로(unseen 위치/방향/물체)에서 헤맨다. 여기에 시뮬레이션 데이터(InternData-M1)를 섞어 공동학습하면, 다양한 가상 도로를 미리 달려본 운전자처럼 처음 보는 상황에도 자연스럽게 대응한다 — 합성 데이터가 실세계가 놓친 공간 분포의 '빈칸'을 메워주는 보충 교재 역할을 한다.\n\n원본 그림 8: [arXiv Figure 8](https://arxiv.org/html/2510.13778v1/x8.png) (23 obj/5 container, seen/unseen disjoint — §4.2 임베드 참고)\n원본 그림 9: [arXiv Figure 9](https://arxiv.org/html/2510.13778v1/x9.png) (5 평가 설정 showcase — §4.2 임베드 참고)\n원본 그림 10: [arXiv Figure 10](https://arxiv.org/html/2510.13778v1/x10.png) (변형 vs GR00T N1.5·π0 SR 비교 — §4 임베드 참고; 본문엔 수치 없음)\n\n**학습/추론**\n- **학습**: seen 세트만 사용한 6h teleop. w/o co-train = real만, w/ co-train = real+InternData-M1. 2 RGB 뷰 224×224. 16 A100, batch 256, action chunk 16, 20K step, 각 suite 독립. 모든 모델(베이스라인 포함) delta end-effector space control.\n- **추론/평가**: 5 설정(In-Distribution/Unseen Objects/Position/Orientation/Instructions), 모델당 300 rollout, 설정당 ≥50회, 위치 고정. SR(지정 물체가 지정 컨테이너에 정확히 놓인 trial 비율).\n\n**숫자**: 60×90cm · seen 23 obj/5 container · 6h teleop · 224×224 · 16 A100, batch 256, chunk 16, 20K step · RealSense D435 2대 · 300 rollout/모델, 설정당 ≥50회, 컨테이너 3개 고정 · 베이스라인 GR00T N1.5/π0 · 5 regime.\n\n---\n\n## 4.2.3 장기 지평(Long-horizon) 및 추론 기반 조작 평가\n\n**핵심**\n- dual-system 핵심 강점 검증: 고수준 planner(System 2)가 장기·추론 과제를 atomic action 시퀀스로 분해, 저수준 action model(System 1)이 견고하게 실행. 과제는 multi-step planning + 객체 속성 추론 + 진행 모니터링 + 변화 적응 요구.\n- 5 과제: 장기(Desktop Sorting, Sort into Drawers, Make Sandwiches) + 추론(Math Calculation, Goods Purchase). Franka 단일팔 + ARX LIFT2 양팔. stepwise execution success(직전 단계 모두 성공해야 유효).\n- VLM planner task scheduling(Table 5): Ours-3B가 5 과제 모두 최고(90/91/91/93/92). GPT-5(75/67/62/79/82)도 강하나 통합 모델 post-training이 장기·추론 성능을 크게 끌어올림.\n- 기존 VLA가 별도 VLM을 task planner로 의존하는 것과 달리, 단일 모델을 task decomposition·subtask 식별·numerical reasoning·action supervision 멀티모달 입력으로 joint training해 planning·reasoning·action을 end-to-end 통합.\n- 3 평가 설정(In-distribution/Physical Interference/Task Replanning, Fig 12). 외란·재계획 상황에서 subtask 시퀀스를 즉석 수정해 성능 저하 최소화(baseline은 큰 하락).\n\n**왜/직관**\n유능한 주방장(System 2 planner)과 손이 빠른 보조 요리사(System 1 actor)가 함께 일하는 셰프 듀오에 비유할 수 있다. 주방장은 \"클래식 샌드위치 만들기\"라는 큰 주문을 '빵 → 고기 → 양상추 → 빵'처럼 재료별 단계로 쪼개 보조에게 하나씩 지시하고, 보조는 각 지시를 손놀림으로 정확히 수행한다. 손님이 도중에 \"치즈도 추가요\"라고 끼어들거나(task replanning) 누가 접시를 옮겨버려도(physical interference), 주방장이 남은 순서를 즉석에서 다시 짜서 흐트러지지 않고 요리를 끝낸다. 핵심은 이 둘이 별개 사람이 아니라 한 명의 머릿속(통합 단일 모델)에서 동시에 돌아가, 계획을 세우는 즉시 손이 움직인다는 점이다.\n\n원본 그림 11: [arXiv Figure 11](https://arxiv.org/html/2510.13778v1/x11.png) (5개 long-horizon/reasoning 과제 셋업 — §4.2 임베드 참고)\n원본 그림 12: [arXiv Figure 12](https://arxiv.org/html/2510.13778v1/x12.png) (In-distribution/Physical Interference/Task Replanning 결과 — §4 임베드 참고)\n\n구조 정리(노트 — 논문 그림엔 세부 흐름 없음):\n```\n[task instruction]\n       v\n[System 2: VLM Planner]  task decomposition + subtask 식별 + numerical reasoning\n       | subtask 1 -> 2 -> 3 ...  (각 subtask 뒤 zero-action vector padding -> 완료시 정지/전이)\n       v\n[System 1: Action Model]  atomic action 실행\n       v\n[robot: Franka / ARX LIFT2]  ->  환경\n       ^   physical interference / task replanning 피드백\n       +---- subtask 시퀀스 on-the-fly 수정\n예: \"make a classic sandwich\"\n  (1) bun (2) meat (3) lettuce (4) bun\n```\n\n**모듈 분해 (top-down)**\n- **System 2: VLM Planner** — 장기·추론 과제를 atomic action 시퀀스로 분해. task decomposition·subtask 식별·numerical reasoning 담당(느리지만 신뢰성 있는 reasoner). 별도 VLM planner 없이 단일 모델에 통합. Table 5에서 GPT-5/Gemini-2.5 Pro/GPT-4o/Qwen2.5-VL 등과 비교, post-training된 Ours-3B 전 과제 최고.\n- **System 1: Action Model** — planner의 각 sub-instruction을 견고하게 실행하는 빠른 저수준 제어기. subtask segment 뒤 zero-action vector padding으로 완료 시 정지·다음 subtask 전이 예측. idle/멈춤 프레임 제거.\n- **Unified joint-training pipeline** — planning·reasoning·action을 한 모델에서 end-to-end 통합 학습. 22h teleop(~500/task), trajectory를 subtask 분할·atomic action 주석, 레시피는 실세계 short-horizon과 동일.\n\n**학습/추론**\n- **학습**: 22h teleop(~500/task). 각 trajectory를 subtask 분할·atomic action 주석. subtask 경계 zero-action vector padding(완료 시 정지→다음 subtask 전이 예측). 팔 멈춤·idle 프레임 제거. task decomposition·subtask 식별·numerical reasoning·action supervision 멀티모달 입력으로 단일 모델 joint training.\n- **추론/평가**: 통합 단일 모델이 planning·reasoning·action을 end-to-end 수행. 3 설정 — In-distribution, Physical Interference(열린 서랍 닫기·grasping 중 대상 변위), Task Replanning(실행 중 새 지시, 예: 서랍에 객체 넣은 뒤 닫기 전 \"Also put the cow toy into the top drawer\"). stepwise execution success + clustered pick-and-place metric.\n\n**숫자**: 작업 영역 Desktop 60×90cm/Drawers 35×35cm/Sandwiches 50×70cm/Math 40×40cm · Desktop 5 container·5 category(fruits/toys/vegetables/bottles/snacks), 1~3 category, trial당 3 pick-place · Sandwiches seen recipe 5 · Goods Purchase ARX LIFT2 dual-arm, 가격 cue 1~9 · 22h teleop(~500/task) · Table 5 Ours 90/91/91/93/92, GPT-5 75/67/62/79/82, Gemini-2.5 Pro 57/62/83/53/61, GPT-4o 37/57/35/39/41, Qwen2.5-VL-72B 31/71/34/33/29, Qwen2.5-VL-3B 30/49/52/41/38.\n\n---\n\n## 5. Related Work (관련 연구)\n\n**핵심**\n- **계층적 로봇 시스템**: 고수준 명령과 저수준 행동을 잇는 핵심 난제를 **중간 표현(IR)** 생성으로 다뤄옴 — 텍스트 계획(CoT), bounding box, 3D 점, scene graph, 로봇 컨트롤러가 직접 소비 가능한 spatial localizer. InternVLA-M1은 **spatial guidance를 downstream action training에 통합하는 통합 latent 모델링 프레임워크**로 차별화.\n- **VLA의 체화 추론·계획**: LLM에서 효과적이던 CoT 프롬프팅을 embodied AI로 확장하는 흐름(텍스트 기반 → visual·spatial → graph 기반). 이들은 추론 단계를 inference 시점에 생성해 연산 오버헤드 발생. InternVLA-M1은 **명시적 생성 추론 없이 VLM 내재 추론 능력을 푸는 post-training**을 제안.\n- **일반화 로봇 정책**: 세 주류 패러다임 — (1) monolithic VLA(입력→행동 직접 매핑), (2) unified architecture(인지·행동 분리), (3) world model(계획용 환경 동역학 학습). InternVLA-M1은 전형적 dual-system을 채택하되 unified architecture VLA 위에 추가 planning 설계를 도입.\n\n**왜/직관**\n기존 로봇 VLA들이 고수준 명령을 행동으로 옮길 때 '생각을 글이나 그림으로 일일이 받아쓴 뒤(중간 표현을 명시적으로 생성) 움직이는' 방식이었다면, InternVLA-M1은 시험 볼 때 풀이를 말로 다 적지 않고도 머릿속 직관으로 바로 답을 쓰는 숙련자처럼, 공간 추론을 latent(잠재 표현) 속에 녹여 두고 추가 출력 단계 없이 곧장 행동을 끌어낸다. 즉 '추론을 말로 뱉지 않고 몸이 기억하게 만든' 셈이다.\n\n**학습/추론**\n본 절은 방법 자체가 아니라 관련 연구 대비 위치만 규정한다. (학습) InternVLA-M1은 VLM의 내재 추론 능력을 직접 unlock하는 post-training 단계를 두고 spatial guidance를 downstream action training에 통합. (추론) 기존 CoT·graph 기반은 inference 시점에 중간 추론 단계를 명시적으로 생성해 오버헤드를 유발하지만, InternVLA-M1은 explicit generative reasoning을 제거해 그 오버헤드 없이 동작. 패러다임상 dual-system(인지/행동 분리) + unified architecture에 planning 설계 추가.\n\n**숫자**: 세 주류 패러다임 — monolithic VLA / unified architecture(인지-행동 분리) / world model.\n\n> ⚠️ '세 가지 주류 패러다임'의 'three' 명시 표현은 원문에 그대로 없음(원문은 'several mainstream technical paradigms' + 'A third paradigm is based on world models'). 패러다임 3종 열거 자체는 충실 요약.\n\n---\n\n## 6. Discussion and conclusion (논의 및 결론)\n\n**핵심**\n- InternVLA-M1 = spatial grounding priors로 고수준 멀티모달 추론과 저수준 로봇 실행을 연결하는 통합 VLA.\n- 대규모 멀티모달 pre-training + spatially guided post-training으로 공간적으로 grounded된 이해를 embodied control로 전이, 미지 객체·지시·환경에 강한 일반화 달성.\n- 시뮬·실세계 광범위 평가에서 기존 VLA·특화 시스템을 instruction following·long-horizon manipulation·멀티모달 grounding에서 능가.\n- spatial reasoning을 확장 가능·신뢰성 있는 범용 로봇을 위한 **통합 기반(unifying substrate)**으로 제시.\n\n**왜/직관**\n결론은 '공간 추론'을 머리(언어로 무엇을 어디에 할지 추론하는 System 2 플래너)와 손(빠르게 동작을 내는 System 1 액터)을 잇는 공통 언어/접착제로 본다. 사람이 새 부엌에서도 \"저 컵을 싱크대 옆에 놓아\"를 해낼 수 있는 이유는 물체와 위치 관계를 공간적으로 파악하는 능력이 모든 작업에 깔린 공통 토대이기 때문인데, 이 논문도 그 공간 감각을 미리 학습시켜 보지 못한 물체·지시·환경으로의 일반화를 끌어낸다고 비유적으로 정리한다.\n\n**학습/추론**\n결론 본문은 학습/추론 절차를 새로 기술하지 않고 전체 파이프라인을 한 줄로 회고한다: (1) 대규모 멀티모달 사전학습으로 공간 grounding 사전지식 습득, (2) spatially guided 사후학습으로 그 공간적 이해를 embodied control로 전이. 추론 측면 별도 기술은 없으며, 평가가 시뮬·실세계 모두에서 수행되었다고만 언급.\n\n---\n\n## 한눈에 정리\n- InternVLA-M1 = dual-system end-to-end VLA(~4.1B). System 2 = Qwen2.5-VL-3B-instruct VLM Planner(공간 추론), System 1 = diffusion policy Action Expert(86M, DINOv2 21M + state enc 0.4M). 둘을 잇는 건 querying transformer(8.7MB, k-layer cross-attn) + gradient decay(0.5).\n- 핵심 레시피 = spatially guided **2-stage**. Stage 1 = spatial grounding pre-training(VLM만, points/boxes/traces QA). Stage 2 = spatially guided action post-training(VLM+Action Expert 공동, **spatial prompting** + grounding **co-training**, dual-supervision).\n- 데이터 = 3M+(2.3M spatial: Box 879K/Trajectory 684K/Point 832K + General 637K) + InternData-M1 244K closed-loop + 확장형 합성 엔진(physics-rendering decouple, asset 14K objects).\n- 핵심 발견: spatial grounding과 manipulation을 함께 가르치면 gradient subspace 정합이 PSS 0.25→0.42로 개선(Fig 5c). 결과: SimplerEnv SOTA(VM 80.7/WidowX 71.7), LIBERO Avg 95.9, 200-task 시뮬 +6.2% vs GR00T N1.5, 실세계 +20.6%, long-horizon에서 VLM planner가 GPT-5 능가.\n\n## ⚠️ 확인 필요 / 나중에 (TODO)\n- [ ] **저자·소속·날짜·코드 repo URL** 미확보 — 본문 메타데이터 대조 필요(상단 표 (미명시) 항목).\n- [ ] **~4.1B 파라미터 분해 정합성**: Qwen2.5-VL-3B(~3B) + 86M+21M+0.4M(~0.1B) ≈ 3.1B로 4.1B에 ~1B 미달. 4.1B 자체는 본문 명시이나 나머지 ~1B 출처는 본문 미명시. querying transformer만 'MB'(저장 단위) 표기.\n- [ ] **k(cross-attn layer 수) 및 gradient decay factor의 실제 채택값**: 본문이 'e.g. k=1', 'e.g. 0.5'로만 표기 — 확정 수치 여부는 fetch 범위에서 단정 불가.\n- [ ] **Section 3의 '3-stage 데이터 구성' 프레이밍 주의**: §3 본문은 3.1/3.2/3.3 세 하위절(데이터 생성 설명)뿐. 논문 §2.2의 'two-stage training pipeline'이 학습 스테이지 정본. '실로봇 long-horizon demo로 미세조정'하는 별도 post-training 데이터 스테이지는 §3에 존재하지 않음.\n- [ ] **Variant Aggregation Vanilla 대비 향상치**: 본문 prose +12.4%, Table 1 raw 차이 +12.5(76.0−63.5) — 0.1 불일치. 두 값 모두 논문에 존재.\n- [ ] **LIBERO Spatial 컬럼 최고**: Vanilla VLA 98.8 > InternVLA-M1 98.0. InternVLA-M1은 평균 최고이나 Spatial 단독 최고는 아님.\n- [ ] **각 막대그래프(Fig 7·10·12) 개별 막대 수치**는 본문 텍스트에 안 나온 것이 많음 — 원본 그림 확인 필요. 본 노트는 텍스트 명시 수치(+6.2%, +20.6%, Table 5 등)만 반영.\n- [ ] **4.2.3 단일 통합 모델 vs 분리 모듈**: 논문은 단일 end-to-end 모델 강조. System 1/System 2 분리 묘사·재지시 루프 ASCII는 직관적 단순화('on the fly').\n- [ ] **4.2 fine-grained 수치 일부**(컨테이너 3개 고정 위치, Math 버튼 색 red/yellow/blue, Goods Purchase 가격 1~9 등)는 figure 이미지에서만 확인 가능 — 텍스트-검증되지 않음.\n- [ ] **그림 캡션 일부 절단/패러프레이즈**: Fig 4/5/7/12 등은 본 노트가 캡션 접두부 또는 요약형 인용 — 전체 캡션은 원본 figure 인벤토리 참조(내용·번호·URL은 정확).\n\n---\n## Source Provenance\n- Source: HTML (arxiv.org/html/2510.13778) — 멀티에이전트 섹션 추출 + 적대적 검증 데이터를 문단 단위로 재작성\n- Fetched: 2026-06 (paper-deepdive 워크플로 제공 검증 데이터
