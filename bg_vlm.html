  <script>
  const MD = "# VLM 구조 — 비전 인코더를 LLM에 어떻게 붙이나\n\n**큰 그림**: VLM(Vision-Language Model)은 거의 다 \"**이미 똑똑한 비전 인코더(ViT)**\"와 \"**이미 똑똑한 LLM**\"을 가져다, 둘 사이에 **커넥터(connector)**를 끼워 붙인 것이다. 핵심 설계 선택은 단 하나 — **\"이미지에서 나온 시각 토큰을 LLM에 어떻게 먹이느냐\"**. 여기서 4가지 계열이 갈린다.\n\n| 계열 | 커넥터 메커니즘 | 시각 토큰 수 | 비전/LLM 동결? | 대표 |\n|---|---|---|---|---|\n| **Cross-attention 주입** | Perceiver Resampler + gated cross-attn 층을 **LLM 내부에 삽입** | 고정(예: 64) | 둘 다 frozen | Flamingo |\n| **Linear/MLP projection (앞에 붙이기)** | ViT 특징을 LLM 임베딩 공간으로 사영 → 텍스트 토큰과 **concat** | 가변(=ViT 패치 수) | 비전 frozen, LLM tune | LLaVA |\n| **Query 기반 커넥터** | Q-Former: 학습되는 query가 cross-attn으로 시각 토큰 추출 | 고정(예: 32) | 둘 다 frozen | BLIP-2 |\n| **Native dynamic resolution** | 원해상도 ViT + 2×2 patch-merge, M-RoPE로 위치 인코딩 | 가변(해상도 비례) | 함께 학습 | Qwen2-VL |\n\n> **한 줄 직관**: \"시각 토큰을 **LLM 옆구리(cross-attention)에 주입**하느냐(Flamingo), **프롬프트 맨 앞에 그냥 끼워넣느냐**(LLaVA/BLIP-2), 토큰 수를 **고정**하느냐 **가변**으로 두느냐\"의 조합.\n\n### 1) Cross-attention 주입 — Flamingo\n- **원리**: frozen 비전 인코더 특징을 **Perceiver Resampler**가 고정 개수 토큰으로 압축 → frozen LLM 사이사이에 새로 끼운 **gated cross-attention** 층의 key/value로 주입. 텍스트는 LLM의 self-attention 경로에 그대로 있고, 시각 정보는 cross-attention으로만 들어온다. tanh 게이트(초기값 0)로 학습 시작 시점엔 원래 LLM을 그대로 보존.\n- **흐름**: `이미지/비디오 → frozen ViT → 가변 특징 격자 → Perceiver Resampler(학습 latent query) → 고정 N개 시각 토큰 → gated cross-attn의 K/V로 LLM에 주입 → 텍스트 출력`\n- **장단점**: 비전·LLM 둘 다 얼려서 resampler+gated층만 학습 → 파라미터 효율·안정적, 이미지-텍스트 interleave/다중이미지/비디오 자연 지원. 단 LLM 내부를 수술해야 함(drop-in 아님), 층마다 cross-attn 연산 추가.\n\n원본 그림 (architecture overview):\n![Flamingo architecture](https://ar5iv.labs.arxiv.org/html/2204.14198/assets/x38.png)\n> Figure 3 (Flamingo, arXiv 2204.14198): 시각 데이터+텍스트를 interleave로 받아 자유 형식 텍스트를 출력.\n\ngated xattn-dense 층:\n![Flamingo gated xattn-dense](https://ar5iv.labs.arxiv.org/html/2204.14198/assets/x39.png)\n> Figure 4: frozen LLM 층 사이에 cross-attention 층을 삽입. query=언어, key/value=시각 특징. tanh 게이트로 초기엔 LLM 보존.\n\nPerceiver Resampler:\n![Flamingo Perceiver Resampler](https://ar5iv.labs.arxiv.org/html/2204.14198/assets/x42.png)\n> Figure 5: 가변 크기 시공간 시각 특징을 **고정 개수** 토큰으로 매핑. 학습된 latent를 query로, 시각 특징을 key/value로.\n\n### 2) Linear/MLP projection — LLaVA\n- **원리**: 가장 단순. frozen CLIP-ViT 특징을 **선형 사영(MLP)** 하나로 LLM 단어 임베딩 공간에 맞춰 → 그 시각 토큰을 텍스트 토큰 앞에 **그냥 이어붙여** 한 시퀀스로 LLM에 입력.\n- **흐름**: `이미지 → frozen CLIP ViT-L/14 → 시각 특징 Z_v → 사영행렬 W → 시각 토큰 H_v(LLM 임베딩 차원) → 텍스트 토큰 H_q와 concat → LLM(Vicuna) → 텍스트`. 시각 토큰 수 = ViT 패치 수(해상도 고정 시 고정, 예: 336px→256개).\n- **장단점**: 커넥터가 행렬 하나라 학습·재현이 매우 쌈, LLM 수술 불필요(시각 토큰이 그냥 프롬프트에 삶). 단 해상도 올리면 토큰 수 증가 → 시퀀스 길어지고 self-attention O(n²) 부담, 얇은 projector라 정렬이 약할 수 있음.\n\n원본 그림:\n![LLaVA architecture](https://arxiv.org/html/2304.08485v2/x1.png)\n> Figure 1 (LLaVA, arXiv 2304.08485): 비전 인코더 → projection W → 시각 토큰을 언어 토큰과 함께 LLM에.\n\n### 3) Query 기반 커넥터 — BLIP-2 (Q-Former)\n- **원리**: 경량 **Q-Former**가 소수의 **학습되는 query 임베딩**을 들고, frozen 이미지 인코더에서 cross-attention으로 **고정 개수**(예: 32) 시각 토큰만 뽑아냄 → 선형층으로 frozen LLM 입력 공간에 사영(soft prompt). 이미지 인코더·LLM 둘 다 frozen.\n- **흐름**: `이미지 → frozen 이미지 인코더 → 이미지 특징 → Q-Former(32개 query가 cross-attend) → 32개 query 출력 → 선형 사영 → 텍스트 토큰 앞 soft prompt → frozen LLM(OPT/FlanT5) → 텍스트`. Q-Former는 2단계로 사전학습(표현학습 → vision-to-language 생성학습).\n- **장단점**: 이미지 크기와 무관하게 토큰 수 작고 고정(정보 병목) → LLM 컨텍스트 쌈, 둘 다 frozen이라 파라미터 효율 최고. 단 2단계 사전학습이 복잡, 고정 병목이 세밀한 디테일(고해상 OCR 등)을 떨굴 수 있음.\n\n원본 그림 (framework / Q-Former):\n![BLIP-2 framework](https://arxiv.org/html/2301.12597v3/x1.png)\n> Figure 1 (BLIP-2, arXiv 2301.12597): Q-Former를 2단계로 사전학습해 frozen 이미지 인코더와 frozen LLM 사이 modality gap을 메움.\n\n![BLIP-2 Q-Former](https://arxiv.org/html/2301.12597v3/x2.png)\n> Figure 2: (좌) Q-Former 구조와 1단계 표현학습 목적함수 3종. (우) query-text 상호작용을 제어하는 self-attention 마스킹.\n\n### 4) Native dynamic resolution — Qwen2-VL\n- **원리**: ViT가 이미지를 **원해상도 그대로**(\"naive dynamic resolution\") 처리 → **가변** 패치 수 생성 → 인접 2×2 패치를 작은 MLP로 합쳐 시각 토큰으로 압축 → LLM 시퀀스에 삽입. 위치는 **M-RoPE**(rotary 위치 임베딩을 시간/높이/너비로 분해)로 인코딩해 텍스트·이미지·비디오 위치를 한 틀에서 모델링.\n- **흐름**: `원해상도 이미지 → ViT(가변 패치) → 2×2 patch-merge(MLP) → 가변 시각 토큰(<|vision_start|>..<|vision_end|>로 감쌈) → M-RoPE 위치와 함께 LLM 시퀀스에 삽입 → 텍스트`. 토큰 수는 이미지 크기에 비례(min/max_pixels로 조절).\n- **장단점**: 원해상도·종횡비 보존 → OCR·차트·다양한 크기에 강함, M-RoPE가 텍스트/이미지/비디오 위치를 통일하고 길이 외삽에 도움. 단 가변 토큰 수라 배칭/서빙·메모리 예측이 어렵고, 고해상이면 시퀀스 폭증(그래서 min/max_pixels 제어).\n\n> Qwen2-VL 논문 HTML엔 **전체 아키텍처 블록도 그림이 없다**(Flamingo Fig3/LLaVA Fig1/BLIP-2 Fig1 같은 게 없음). 메커니즘을 보여주는 대표 그림은 M-RoPE:\n\n![Qwen2-VL M-RoPE](https://arxiv.org/html/2409.12191v2/images/mrope.png)\n> Figure 3 (Qwen2-VL, arXiv 2409.12191): rotary 임베딩을 시간·높이·너비로 분해(M-RoPE)해 텍스트/이미지/비디오 위치를 LLM에서 명시적으로 모델링.\n\n### LLaVA(vanilla ViT) vs Qwen2-VL 요약 비교\n\n| 항목 | LLaVA (vanilla ViT) | Qwen2-VL |\n|---|---|---|\n| 입력 해상도 | 224²/336² 고정 resize | 원해상도 가변(dynamic) |\n| 비전 위치 인코딩 | learnable 1D PosEmb | 2D-RoPE |\n| 시각 토큰 수 | 고정(256/576) | 가변(크기 비례), 2×2 압축 |\n| 멀티모달 위치 | 1D(텍스트 RoPE만) | M-RoPE(t/h/w) |\n| 비디오 | 약함/프레임 나열 | 3D tube 통합 |\n| 커넥터 | MLP projection | MLP merge + 직접 concat |\n\n> 같은 표가 [Qwen2-VL](bg_qwen2-vl.html) 토픽 끝에도 있다(거긴 vanilla ViT 기반 VLM 일반과의 비교).\n\n---\n";
