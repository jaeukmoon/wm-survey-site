  <script>
  const MD = "# LingBot-VA 2.0: Native Video-Action Pretraining for Generalizable Robot Control — Deep-Dive\n\n> **이 논문이 달성하려는 것**: 범용 비디오 생성 모델을 로봇용으로 \"개조\"하는 대신, tokenizer부터 backbone까지 전체 스택을 로봇 제어를 위해 **처음부터(native·causal) 사전학습**한 video-action foundation model. 세 축 — ① 시각 표현을 semantics와 action에 동시에 정렬하는 **semantic visual-action tokenizer**, ② bidirectional→causal 개조가 유발하는 catastrophic forgetting을 피하려 **from-scratch causal 사전학습** + **sparse MoE** 비디오 백본, ③ 행동 실행과 미래 예측을 겹쳐 돌리되 매 실관측으로 재정합하는 **Foresight Reasoning** 비동기 추론 — 으로 \"실험실 → 실전\"을 잇는다.\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2607.08639v1 · 2026-07-09 |\n| 제목 | Native Video-Action Pretraining for Generalizable Robot Control |\n| 모델명 | **LingBot-VA 2.0** (전작 LingBot-VA(1.0, [50])의 개선판; VA = Video-Action) |\n| 저자 | Qihang Zhang, Lin Li, Luyao Zhang, Shuai Yang, Yiming Luo 외 (총 29명) |\n| 소속 | 미명시(abs 페이지) · LingBot 팀(§7 Contributors) |\n| 코드/프로젝트 | — (초록/abs에 URL 미기재) |\n| 완성도(rigor) | 79/100 (평가 17·abl 16·base 16·재현 15·근거 15) |\n\n## 0. 핵심 개념 정리 (처음이면 여기부터)\n\n- **VA (Video-Action model)**: 관측→행동을 직접 매핑하는 반응형 VLA와 달리, \"장면이 어떻게 변할지(미래 시각)\"와 \"그 안에서 어떻게 행동할지(액션)\"를 **함께 예측**해 제어를 물리 동역학에 grounding하는 정책. 이 논문의 패러다임.\n- **VLA (Vision-Language-Action model)**: 이미지+언어 지시를 곧바로 로봇 행동으로 매핑하는 정책(예: π0.5). 미래를 내다보지 않는 reactive 계열 — 이 논문의 비교 대상.\n- **causal DiT (Diffusion Transformer)**: 확산/flow의 디노이징을 트랜스포머로 구현한 백본. \"causal\"은 각 시점이 **과거만** 참조(미래 프레임 차단)한다는 뜻 — 폐루프 제어의 시간 구조와 일치.\n- **flow matching (흐름 정합)**: 노이즈 $\\epsilon$에서 데이터 $x$로 가는 **직선 경로의 속도(velocity)** $x-\\epsilon$ 를 회귀하는 생성 학습. diffusion보다 경로가 곧다. 이 논문의 모든 생성 목적이 이 형식.\n- **latent action (잠재 행동)**: 로봇 action 라벨 없이, 연속한 두 시각 latent 사이의 **압축된 변화**(전이)로 정의한 행동 변수. IDM/FDM로 self-supervised 학습(§2.2.2).\n- **IDM / FDM (inverse / forward dynamics model, 역·순 동역학)**: IDM=두 관측에서 \"무슨 행동이 있었나\"를 역추론, FDM=현재+행동에서 \"다음 관측\"을 예측.\n- **MoE (Mixture-of-Experts) / MoT (Mixture-of-Transformers)**: MoE=FFN을 여러 expert로 쪼개 토큰마다 소수만 켜는 sparse layer(용량↑·연산↔). MoT=modality(video/action)마다 별도 expert 스트림을 두되 **causal self-attention은 공유**하는 구조.\n- **teacher forcing (교사 강제)**: 정답 과거(prefix)를 조건으로 다음 chunk를 예측하도록 학습하는 방식.\n- **action chunk (액션 청크)**: 비디오 tokenizer가 시간축을 다운샘플하므로, latent 한 전이($z_t\\to z_{t+1}$)에 대응하는 여러 개의 저수준 제어 명령을 한 덩어리로 묶은 것.\n- **KV cache**: autoregressive 디코딩에서 과거 key/value를 저장·재사용하는 캐시. 여기선 Foresight Reasoning의 \"grounded history 요약본\"으로 쓰임.\n- **consistency distillation (일관성 증류)**: 여러 스텝이 필요한 확산/flow 샘플러를 소수(2) 스텝으로 줄이는 증류 — 실시간화의 핵심.\n- **egocentric data (1인칭 데이터)**: 사람 머리 시점 카메라로 찍은 손 조작 영상. 값싸고 대규모라 로봇 데이터를 보완.\n- **proprioception / robot state**: 로봇 자신의 관절·상태 입력.\n\n---\n\n## 1 Introduction\n\n- **핵심 주장**: 비디오-액션 모델은 로봇 제어의 유망한 경로지만, **디지털 콘텐츠 생성용으로 설계된 비디오 생성기를 물리 환경에 그대로 재활용(repurpose)하는 것은 본질적으로 부적절**하다. 그래서 embodiment(로봇 몸체)를 위해 바닥부터 만든 video-action foundation model, LingBot-VA 2.0을 제시한다.\n- **왜 VA가 좋은가**: 반응형 VLA가 관측→행동만 학습하는 것과 달리, VA는 \"장면이 어떻게 변할지\"와 \"그 안에서 어떻게 행동할지\"를 함께 예측해 제어를 물리 동역학에 grounding한다 → sample efficiency·일반화 향상. 다만 이 능력의 상당 부분이 비디오 사전학습 백본에서 상속된다.\n\n- **기존 VA 모델의 3가지 구조적 한계**:\n  1. **표현이 appearance에 최적화됨** — 재구성용 VAE latent은 시각 디테일은 보존하나 의미·물리 구조가 빈약하고, 나중에 붙인 action module이 world state와 action을 정렬 안 된 공간에 방치한다.\n  2. **추론이 너무 느려 closed-loop 제어 불가** — 고차원 비디오 토큰 + 반복 denoising.\n  3. **사전학습 신호가 제어로 확장 안 됨** — generic video objective는 \"action이 세계를 어떻게 바꾸는가\"를 못 가르쳐, action 신호가 비싼 로봇 데이터에 묶인다.\n- **구조적 불일치(mismatch)**: 백본은 bidirectional attention(과거·미래 양방향)으로 사전학습되지만, closed-loop 제어는 엄격히 시간 순방향으로 전개된다. 전작 LingBot-VA는 스택을 causal 하게 finetune해 이를 해결했으나, 희소한 로봇 데이터에 의존하고 웹스케일 prior를 약화시킬 수 있다.\n\n- **왜 \"native\"인가 (직관)**: 기존 방식은 영화 촬영용 카메라를 개조해 드론에 다는 격이다. 재구성 VAE는 \"어떻게 보이는지(appearance)\"는 잘 담지만 \"어떻게 움직이고 상호작용하는지(dynamics)\"는 못 담는다. 로봇은 후자가 필요하므로 처음부터 semantics·action에 맞춘 표현을 짜야 한다. 또 문장 전체를 한눈에 읽도록 훈련된 사람에게 갑자기 \"왼→오로 하나씩만 보라\"고 재훈련시키면(bidirectional→causal 개조) 원래 알던 지식이 침식되고 catastrophic forgetting이 온다 → 처음부터 인과(순방향) 형태로 배운다.\n\n- **4가지 핵심 설계 원리(LingBot-VA로부터의 진화)**:\n  1. 재구성 중심 VAE 탈피 → **semantic visual-action tokenizer**(시각 표현을 semantics·action에 정렬).\n  2. 시간 동역학의 엄격한 인과성 → **causal pretraining from scratch**(catastrophic forgetting 회피).\n  3. 고빈도 추론 요구 → **sparse MoE** 백본.\n  4. **Foresight Reasoning** 비동기 추론으로 실시간 closed-loop 제어(행동 실행과 병렬로 미래 latent 예측 + 학습된 forward dynamics로 매 rollout을 최신 관측에 재정합).\n\n- **성과 예고**: action 신호가 더는 희소한 로봇 시연에 의존하지 않아 웹 비디오 스케일로 제어 지식을 획득 → **10–15개 시연만으로 적응**, 대규모 재수집 없이 embodiment 간 전이, 일부 세팅에선 zero-shot. 배포 시 sparse MoE 추론 + few-step consistency distillation + Foresight Reasoning + quantized 실행으로 **peak 225 Hz** 비동기 실행. hierarchical VLM planner와 결합해 π0.5·LingBot-VA 등 강한 baseline 대비 시뮬레이션·실세계 모두에서 개선.\n\n- **그림 / 구조도**:\n  원본 그림 1: [arXiv Figure 1](https://arxiv.org/html/2607.08639v1/x1.png)\n  ![](https://arxiv.org/html/2607.08639v1/x1.png)\n  → 전체 파이프라인 개요 — Planner(§2.3.1)가 장기 목표를 subtask로 분해 → semantic visual-action tokenizer(§2.2)가 관측·사람 영상 프롬프트를 visual latent으로 인코딩 → MoE 비디오 모델(§2.3.2) + action 모델이 미래 latent·행동을 autoregressive 예측 → MCP(§2.3.3)의 future-chunk 감독 → 비동기 실행(§2.3.7)으로 실시간 제어.\n\n---\n\n## 2 Native Video-Action Model\n\n이 장은 (1) 배경(Preliminary, §2.1), (2) 표현 학습기(semantic visual-action tokenizer, §2.2), (3) 그 표현 위의 비디오-액션 모델 사전학습·추론(§2.3), (4) 사후학습(post-training, §2.4)을 정의한다. 세부는 아래 하위 절에 있다.\n\n### 2.1 Preliminary — 비디오 생성기와 그 재활용\n\n#### 2.1.1 Video Generative Models (배경)\n\n현대 비디오 생성기는 두 부품이다: **(1) VAE 압축기**, **(2) latent 공간의 flow-matching transformer 생성기**.\n\n**수식**:\n\n$$\nz=\\mathcal{E}(o)\\in\\mathbb{R}^{T'\\times h\\times w\\times c},\\qquad \\hat{o}=\\mathcal{D}(z)\\approx o \\qquad (1)\n$$\n\n- **무슨 식?**: 원본 비디오 $o$를 저차원 latent $z$로 압축(E)했다가 다시 복원(D)하는 오토인코더 왕복.\n- **비유**: 무손실에 가까운 \"영상 코덱(zip 압축기)\". 상자에 욱여넣었다 풀어낸다.\n- $T'{=}T/f_t$, $h{=}H/f_s$ = 시간 $f_t$·공간 $f_s$ 다운샘플. **핵심 복선**: 이 VAE는 오직 **복원 충실도**로만 학습돼 action/control 개념이 원리적으로 없다.\n\n$$\n\\mathcal{L}_{\\mathrm{gen}}=\\mathbb{E}_{s,\\epsilon,z}\\big[\\lVert v_\\theta(z(s),s\\mid c_{\\text{text}})-(z-\\epsilon)\\rVert^2\\big],\\qquad z(s)=(1-s)\\epsilon+sz \\qquad (2)\n$$\n\n- **무슨 식?**: 노이즈에서 데이터로 가는 직선의 **속도** $z-\\epsilon$ 를 맞히는 flow-matching 손실.\n- **비유**: \"안갯속에서 집으로 가는 GPS 화살표(방향+속도) 맞히기\". $s{=}0$은 노이즈, $s{=}1$은 데이터.\n- **두 번째 복선**: 생성기 $v_\\theta$의 attention이 $T'$개 프레임에 대해 **bidirectional**(미래 참조) — 오프라인 생성엔 좋지만 실시간 인과 제어엔 안 맞는다(다음 절 개조 대상).\n\n#### 2.1.2 Repurposing Video Generative Models for Robot Control\n\n비디오 생성기를 제어기로 바꾸려면 두 가지를 손본다: **(i) Video Causality**(양방향→causal mask), **(ii) Action injection**(액션을 조건/출력으로 주입). 또 비디오는 시간압축돼 있으므로 latent 한 전이당 $f_t$개의 저수준 명령을 하나의 **action chunk**로 묶는다(Eq.3).\n\n**수식(핵심 인수분해)**:\n\n$$\np_{\\theta}(z_{1:N},a_{0:N-1}\\mid z_0)=\\prod_{t=0}^{N-1}\\underbrace{p_{\\theta}(z_{t+1}\\mid z_{\\leq t},a_{<t})}_{\\text{video generation}}\\;\\underbrace{p_{\\theta}(a_t\\mid z_{\\leq t},a_{<t},z_{t+1})}_{\\text{inverse dynamics}} \\qquad (5)\n$$\n\n- **무슨 식?**: 매 스텝을 \"다음 장면 상상(video gen)\" × \"그 장면으로 가는 손동작 역산(inverse dynamics)\"의 곱으로 분해.\n- **비유**: 요리사가 (1) 한 박자 뒤 접시 모습을 그리고 → (2) \"지금 상태에서 거기로 가려면 손을 어떻게?\"를 역으로 계산. Eq.4(causal mask)로 \"미래를 못 보게\" 눈가리개를 씌운 위에 얹는다.\n\n학습은 비디오·액션을 **별도 flow-matching 손실**로 명시(DreamZero류의 concat-후-공동denoise와 달리 전이 감독을 분리):\n\n$$\n\\mathcal{L}_{\\text{vid}}=\\mathbb{E}\\big[\\lVert v^{\\text{vid}}_{\\theta}(z_{t+1}^{(s)},s\\mid z_{\\leq t},a_{<t})-(z_{t+1}-\\epsilon^{z}_{t})\\rVert^{2}\\big],\\qquad\n\\mathcal{L}_{\\text{act}}=\\mathbb{E}\\big[\\lVert v^{\\text{act}}_{\\theta}(a_{t}^{(s)},s\\mid z_{\\leq t},a_{<t},z_{t+1})-(a_{t}-\\epsilon^{a}_{t})\\rVert^{2}\\big] \\qquad (6,7)\n$$\n\n$$\n\\mathcal{L}_{\\text{VA}}=\\mathcal{L}_{\\text{vid}}+\\lambda_{\\text{act}}\\mathcal{L}_{\\text{act}} \\qquad\n\\hat{z}_{t+1}=v^{\\text{vid}}_{\\theta}(z_{\\leq t},a_{<t}),\\quad \\hat{a}_{t}=v^{\\text{act}}_{\\theta}(z_{\\leq t},a_{<t},\\hat{z}_{t+1}) \\qquad (8)\n$$\n\n- **비유**: 손실 가중합 $\\mathcal{L}_{\\text{vid}}+\\lambda_{\\text{act}}\\mathcal{L}_{\\text{act}}$ = \"본업(영상 예측) + 부업(액션 예측)\". Eq.8은 추론 롤아웃 — 상상한 다음 장면 $\\hat z_{t+1}$을 다리로 삼아 액션 $\\hat a_t$를 뽑는다.\n- **콕 집어 못박기**: 두 expert $v^{\\text{vid}}_\\theta, v^{\\text{act}}_\\theta$는 **Mixture-of-Transformers(MoT)** — 별도 FFN 네트워크지만 **causal self-attention은 공유**한다. Eq.8의 표기 $v_\\theta$는 velocity field 자체가 아니라 그것을 적분해 얻은 latent·action을 가리킨다(표기 남용).\n\n### 2.2 Semantic Visual-Action Tokenizer\n\nStage 1 표현 학습기. RepWAM[98]을 따르며, **(a) 의미 정렬된 시각 토크나이저(§2.2.1)** + **(b) 라벨 없는 latent action 토크나이저(§2.2.2)** 두 부분.\n\n- **그림 / 구조도**:\n  원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2607.08639v1/x2.png)\n  ![](https://arxiv.org/html/2607.08639v1/x2.png)\n  → visual tokenizer는 복원 지향 latent을 visual foundation model feature에 정렬하고, latent action tokenizer는 inverse/forward dynamics로 compact transition 변수를 학습한다(캡션: \"Adapted from RepWAM\").\n\n#### 2.2.1 Visual Tokenization with Semantic Alignment\n\nViT 오토인코더로 비디오를 시각 토큰으로 압축하되, **frozen Perception Encoder(teacher $G$)** 특징에 정렬해 latent에 \"의미\"를 주입한다.\n\n**수식**:\n\n$$\n\\mathcal{L}_{rec}=\\lambda_1\\lVert o-\\hat{o}\\rVert_1+\\lambda_{perc}\\mathcal{L}_{perc}(o,\\hat{o})+\\lambda_{gan}\\mathcal{L}_{gan}(\\hat{o}),\\qquad\n\\mathcal{L}_{align}=\\lVert \\mathrm{avg}(W_{align}z)-\\mathrm{avg}(G(o))\\rVert_2^2\n$$\n\n$$\n\\mathcal{L}_{vis}=\\mathcal{L}_{rec}+\\lambda_{align}\\mathcal{L}_{align}\n$$\n\n- **무슨 식?**: 복원(픽셀 L1 + perceptual + GAN) 위에, 내 압축코드를 선생님 feature에 **시간평균 수준**에서 맞추는 정렬항($\\mathcal{L}_{align}$)을 더한다.\n- **비유**: 세상 의미를 잘 아는 선생님($G$) 옆에 두고, 내 압축코드 $z$를 번역기 $W_{align}$로 번역해 \"영상 전체 요약(시간평균)\"을 맞춰본다. 그래서 $z$는 프레임별 복원 디테일은 품으면서 의미도 정렬된다.\n- **구조(입력 처리)**: 첫 프레임은 16×16 spatial patch, 이후 프레임은 4×16×16 spatiotemporal tubelet. 프레임 **내부는 full spatial attention**, 프레임 **사이는 causal attention**으로 시간 인과성을 토크나이저 단계부터 심는다. $G$는 frozen(그래디언트 안 흐름), $W_{align}$만 학습.\n\n#### 2.2.2 Latent Action Tokenization\n\n시각 tokenizer를 **freeze**하고, 그 위에서 **action label 없이** IDM $q_\\phi$·FDM $f_\\psi$만 학습한다.\n\n**수식**:\n\n$$\n\\ell_t = q_\\phi(z_t, z_{t+1}) \\in \\mathbb{R}^{d_\\ell},\\quad d_\\ell \\ll \\dim(z_t);\\qquad\n\\hat{z}_{t+1} = f_\\psi(z_t, \\ell_t) = K_t z_t + \\delta_t\n$$\n\n$$\n\\hat{z}_t = \\bar{f}_\\psi(z_{t+1}, \\ell_t);\\qquad\n\\mathcal{L}_\\ell = \\sum_t \\lVert \\hat{z}_{t+1} - z_{t+1} \\rVert_2^2 + \\lVert \\hat{z}_t - z_t \\rVert_2^2\n$$\n\n- **무슨 식?**: IDM은 앞/뒤 latent 차이에서 \"무슨 행동\"을 작은 벡터 $\\ell_t$로 역추론, FDM은 그 $\\ell_t$로 다음 latent을 재구성. reverse transport로 되감기까지 맞춘다.\n- **비유**: \"두 사진 사이의 **동사** 배우기\". 통로($d_\\ell$)를 아주 좁게 뚫어(bottleneck) $\\ell_t$가 장면 전체를 베끼지 못하게 → \"무엇이 바뀌었나(control-relevant change)\"만 짜내게 강제.\n- $K_t$ = transport map(공간 token 간 정보 이동), $\\delta_t$ = residual(이동으로 설명 못 하는 새 등장/소멸). backward consistency($\\bar{f}_\\psi$)는 \"진짜 행동이면 거꾸로도 돌릴 수 있어야\" 한다는 부정행위 방지 장치.\n\n### 2.3 Video-action Model Pretraining and Inference\n\n#### 2.3.1 Hierarchical Planning (dual-system)\n\n고수준 **VLM Planner**가 장기 목표를 subtask로 분해하고, 저수준 video-action 정책이 그 subtask context를 조건으로 폐루프 액션을 생성한다.\n\n- **핵심**: 플래너의 3임무 = 목표를 subtask로 분해 / 현재 subtask 추적 / 전환 시점 판단. 출력은 구조화 JSON 4필드 — `done`(전환 신호), `instruction`(정책이 실제 조건으로 쓰는 핵심 지시), `generation_instruction`, `local_scene_description`.\n- **비동기 디커플링**: 플래너는 백그라운드에서 **~2 Hz**로 느리게 돌며 결과를 **공유 버퍼**에 써 두고, 저수준 정책은 chunk 경계에서 최신 값을 읽는다 → 플래너 지연이 실행 루프를 막지 않는다.\n- **학습**: 사전학습 VLM을 **LoRA**로 미세조정(vision tower frozen). **boundary-crossing sampling** — 세그먼트 경계마다 `done=false`(현재 subtask echo)와 `done=true`(다음 subtask 예측) 두 샘플로 \"전환 시점 판단\"을 학습. 입력 keyframe 3장(t*-2s/t*-1s/t*).\n- **비유**: 플래너=PM, 저수준 정책=현장 작업자. PM은 매 순간 붙어 지시하지 않고 ~0.5초마다 상황판(버퍼)만 갱신 → PM이 생각하는 동안에도 작업이 멈추지 않는다.\n\n  원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2607.08639v1/x3.png)\n  ![](https://arxiv.org/html/2607.08639v1/x3.png)\n  → dual-system 계층 정책: 상위 VLM planner가 subtask context를 만들고, robot state와 함께 저수준 video-action 정책을 조건화한다.\n\n#### 2.3.2 Architecture: Mixture-of-Experts Video Stream\n\nMoT 구조(§2.1.2 Eq.8)를 유지하되, **시각 동역학이 모델링 부담의 대부분**이므로 두 스트림을 **비대칭 스케일링** — video expert의 dense FFN을 sparse MoE로 교체, action expert는 dense 유지.\n\n**수식**:\n\n$$\nr_i(h) = \\sigma(g_i^\\top h);\\qquad\n\\mathcal{R}(h) = \\mathrm{TopK}_{\\mathrm{group}}(r(h)+b,\\,k),\\ \\ |\\mathcal{R}(h)|=k\n$$\n\n$$\n\\alpha_i(h) = \\gamma\\,\\frac{r_i(h)}{\\sum_{j\\in\\mathcal{R}(h)} r_j(h)};\\qquad\n\\mathrm{MoE}(h) = E_{\\text{shared}}(h) + \\sum_{i\\in\\mathcal{R}(h)} \\alpha_i(h)\\,E_i(h)\n$$\n\n- **무슨 식?**: 라우터가 각 전문가 점수를 매기고($r_i$), 그룹 단위 top-$k$만 골라($\\mathcal{R}$), 정규화 가중($\\alpha_i$)으로 섞는다. 항상 도는 shared expert + 고른 $k$개 routed expert의 합.\n- **비유**: 병원에 전문의 $N_e{=}128$명이 있지만 환자(토큰)마다 접수대가 관련 있는 $k{=}8$명에게만 배정하고, 모든 환자를 보는 상주 일반의(shared)를 항상 더한다. 병원 전체 전문성(총 13B)은 크지만 환자당 비용(활성 1.9B)은 작다.\n\n부하 균형은 **auxiliary-loss-free**(보조 손실 없이 선택 편향만 조정):\n\n$$\nv_i = \\mathrm{sign}(c_i - \\bar{c}),\\qquad b_i \\leftarrow b_i - \\eta_{lb}\\Big(v_i - \\tfrac{1}{N_e}\\textstyle\\sum_j v_j\\Big)\n$$\n\n- **비유**: 각 전문의의 \"대기열 우선순위(bias $b_i$)\"를 매 스텝 살짝 조정하는 스케줄러 — 붐비면 낮추고 한가하면 높여 전문가 붕괴를 막되, 진료(확산 목적)엔 벌점 그래디언트를 안 끼얹는다.\n- **검증 결과**: MoE-13B-A1.9B vs Dense-5B(Figure 4) — 같은 스텝에선 손실 궤적이 거의 같고(dense가 약간 낮음), **같은 wall-clock에선 최종 손실이 거의 일치** → 용량↑, 최적화 페널티 사실상 없음.\n\n  원본 그림 4: [arXiv Figure 4](https://arxiv.org/html/2607.08639v1/x4.png)\n  ![](https://arxiv.org/html/2607.08639v1/x4.png)\n  → MoE-13B-A1.9B와 Dense-5B의 학습 손실 비교(왼쪽=step 정렬, 오른쪽=wall-clock 정렬).\n\n#### 2.3.3 Multi-chunk Prediction (MCP)\n\n**문제(myopic supervision)**: 표준 teacher forcing은 다음 1-chunk만 감독하는데, 고프레임레이트에서 인접 chunk는 거의 같아 보여 모델이 dynamics 대신 \"appearance 복사\"라는 지름길을 학습한다.\n\n**해법**: Next Forcing[111]을 따라 현재 context에서 **다음 $K{=}3$개 chunk 블록**을 예측하는 보조 목적.\n\n**수식**:\n\n$$\np_{\\theta}(z_{t+1:t+K}\\mid z_{\\leq t},a_{<t})\\approx\\prod_{k=1}^{K}p_{\\theta,k}(z_{t+k}\\mid h_{t}^{(k-1)}),\\qquad h_{t}^{(0)}=f_{\\theta}(z_{\\leq t},a_{<t}) \\qquad (21)\n$$\n\n$$\n\\mathcal{L}^{\\text{MCP}}_{k}=\\mathbb{E}\\big[\\lVert v^{\\text{MCP}}_{\\theta,k}(z_{t+k}^{(s)},s\\mid h_{t}^{(k-1)})-(z_{t+k}-\\epsilon^{k}_{t})\\rVert^{2}\\big],\\qquad\n\\mathcal{L}_{\\text{MCP}}=\\sum_{k=1}^{K}w_{k}\\mathcal{L}^{\\text{MCP}}_{k}\n$$\n\n- **무슨 식?**: 각 미래 horizon $k$를 main model과 동일한 flow-matching으로 학습하되, 이전 MCP feature $h_t^{(k-1)}$에만 조건화하는 causal chain. 가중치 $(w_1,w_2,w_3)=(0.5,0.2,0.1)$.\n- **비유**: \"다음 한 프레임만 맞혀봐\"는 옆 프레임 베끼기(커닝)가 통하지만, \"3칸 뒤까지 다 말해봐\"는 진짜 운동 법칙을 이해해야 한다. 각 MCP 예측기엔 노이즈를 더 심하게(더 큰 timestep shift) 넣어 자기 입력만으론 못 풀고 backbone 표현에 의존하게 만든다.\n- **효과**: future-chunk denoising 그래디언트가 backbone으로 역류 = dense temporal supervision. MCP는 visual stream에만 작용하지만, 더 예측적인 시각 상태가 shared attention·inverse-dynamics 경로로 action decoding도 개선한다.\n- **배포 2모드(같은 checkpoint)**: MCP 모듈을 **버려 zero-overhead 추론**하거나, **유지해 다음 chunk를 병렬 예측**해 rollout latency를 낮춘다. Foresight Reasoning(§2.3.7)과는 **독립**이라 따로 켤 수 있다.\n\n  원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2607.08639v1/x5.png)\n  ![](https://arxiv.org/html/2607.08639v1/x5.png)\n  → 경량 MCP 모듈들이 backbone 표현에서 증가하는 horizon의 여러 미래 latent chunk를 예측(dense temporal supervision).\n\n#### 2.3.4 In-context Learning (비디오 ICL)\n\n언어 지시만으론 희귀 물체·복합 상호작용·롱호라이즌의 세밀한 시간 구조를 다 명세 못 한다 → **텍스트 대신 영상**을 태스크 명세로 쓰는 video ICL(Zero-WAM[60] 따름).\n\n**수식**:\n\n$$\np_\\theta(z_{1:N}, a_{0:N-1}\\mid z_0, z_{\\mathrm{icl}}) = \\prod_{t=0}^{N-1} p_\\theta(z_{t+1}\\mid z_{\\leq t},a_{<t},z_{\\mathrm{icl}})\\; p_\\theta(a_t\\mid z_{\\leq t},a_{<t},z_{t+1},z_{\\mathrm{icl}})\n$$\n\n- **무슨 식?**: §2.3의 teacher-forced 목적(Eq.5)을 그대로 쓰되, 매 로봇 chunk 예측을 **사람 시연 latent $z_{\\mathrm{icl}}$에 조건화**만 추가(새 손실항 아님).\n- **콕 집어 못박기(causality)**: $z_{\\mathrm{icl}}$은 로봇 궤적의 \"미래\"가 아니라 별개의 사람 시연에서 온 **외부 프롬프트**다. 그래서 로봇 chunk끼리는 causal mask로 미래를 못 봐도, $z_{\\mathrm{icl}}$ 전체는 자유롭게 attend해도 인과성 위반이 아니다.\n- 사람 시연 영상은 같은 물체 인스턴스·시점·장면을 공유할 필요 없이 \"이 조작을 어떻게 펼치는지\"만 보여주는 dynamic visual example.\n\n#### 2.3.5 Human-Robot Data Co-training\n\n로봇 데이터는 비싸고, 1인칭 사람 조작 영상은 값싸게 대규모 확보 가능 → \"사람 pretrain 후 로봇 adapt\"가 아니라 **사람+로봇 동시 co-train**(공유 world model이 학습 내내 실로봇 제어를 개선).\n\n- **두 gap**: (1) **action-space mismatch**(사람 손 vs 로봇 그리퍼), (2) **motion gap**(자연스러운 사람 움직임 vs 로봇 kinematics). world model(Eq.5)에선 어긋난 사람 action이 공유 dynamics를 오염시켜 특히 치명적.\n- **해결**: 사람 손 pose를 로봇 action space로 **retarget**하되(Φ), 공유 world model 주위에 **embodiment별 action encoder/decoder** $E_d, P_d$ 를 따로 둔다. 몸통(dynamics)은 공유, 입출력 어댑터만 분리.\n\n**수식**:\n\n$$\na^{H}=\\Phi(\\tilde{a}^{H})\\in\\mathcal{A};\\qquad\n\\hat{a}^{(d)}_{t}=P_{d}\\big(v^{\\text{act}}(z_{\\leq t},E_{d}(a_{<t}),\\hat{z}_{t+1})\\big)\n$$\n\n$$\n\\mathcal{L}_{\\text{co-train}}=\\mathbb{E}_{\\mathcal{D}_{R}}\\big[\\mathcal{L}_{\\text{vid}}+\\mathcal{L}^{R}_{\\text{act}}\\big]+\\mathbb{E}_{\\mathcal{D}_{H}}\\big[\\mathcal{L}_{\\text{vid}}+\\mathcal{L}^{H}_{\\text{act}}\\big]\n$$\n\n- **비유**: 영상 손실은 공유(같은 몸통), action 손실만 도메인별로 합산(embodiment별 플러그). 사람 손을 로봇 action 좌표계에 \"더빙\"해 두 도메인이 동일한 action 표현을 쓰게 만든다.\n- **핵심 트릭**: 선행연구 [52]를 따라 사람 손을 no-op placeholder가 아니라 **기능하는 그리퍼 열림**(functional gripper opening)으로 매핑 → 사람 데이터가 \"언제 잡을지\"까지 supervise. 통합 cross-embodiment layout은 손마다 6-DoF root pose + 스칼라 그리퍼 열림, 없는 채널은 zero-pad+mask.\n- **공짜 이득**: 배포 시엔 **로봇 branch $(E_R,P_R)$만 사용** → co-training이 추론 비용을 전혀 늘리지 않는다. 사람 action head는 로봇 head로 초기화해 안정적 출발점 확보.\n\n#### 2.3.6 Training Recipe\n\n**사전학습 백본을 빌려오지 않고 from scratch** 학습. 이유: 범용 생성기(Wan류)는 (a) 합성용이라 embodied용이 아니고, (b) 양방향 attention이 causal 제어와 충돌하며, (c) 자체 tokenizer의 semantic latent 공간이 기성 생성기와 호환 안 됨.\n\n**핵심 결정 = staged 커리큘럼 대신 multi-task co-training**. 5개 objective를 사전학습 내내 **항상** 동시 최적화하고, **상대 혼합 가중치만** 시간에 따라 바꾼다.\n\n**수식**:\n\n$$\n\\mathcal{L}(\\tau)=\\sum_{i\\in\\mathcal{T}}\\pi_i(\\tau)\\,\\mathcal{L}_i,\\qquad \\pi_i(\\tau)\\ge 0,\\quad \\sum_{i\\in\\mathcal{T}}\\pi_i(\\tau)=1 \\qquad (28)\n$$\n\n- **무슨 식?**: 5개 과제 손실의 **시간가변 볼록결합** 하나로 전부 공동최적화하고, 배합 $\\pi(\\tau)$만 coarse→fine으로 미끄러뜨린다.\n- **비유**: 요리 학원에서 \"① 데생 → ② 정지화면 → ③ 요리\"를 순서대로 졸업시키면(staged) 나중 단계에서 앞 실력을 까먹지만(catastrophic forgetting), 매일 셋을 다 조금씩 하되 비중만 옮기면(co-train) 일반 실력을 보존하며 특화된다.\n- **5개 과제**: T2I(시각-의미 grounding), T2V(temporal dynamics prior), **TI2VA**(핵심 제어 = 미래 latent 예측 + inverse-dynamics, Eq.5), ICL(§2.3.4), HCT(human-robot co-training, §2.3.5). 스케줄: 초기 T2I 집중 → 중반 T2V → 후반 video-action(TI2VA·ICL·HCT). 파라미터 공유라 앞 objective도 뒤 단계에서 \"작지만 0 아닌\" 정규화 신호를 계속 준다.\n\n### 2.4 Post-training\n\n#### 2.4.1 Diffusion Distillation\n\npost-train된 policy는 각 chunk를 PF-ODE로 적분해 샘플링(기본 denoising step: **video 5, action 10**) → 느려서 실시간 불가. 이를 **few-step consistency model**[85]로 distill한다.\n\n**수식**:\n\n$$\nf_{\\xi}(x^{(s)},s)=f_{\\xi}(x^{(s')},s')\\ \\ \\forall s,s';\\qquad f_{\\xi}(x^{(1)},1)=x^{(1)}\n$$\n\n$$\n\\hat{x}^{(s_{n+1})}=x^{(s_n)}+(s_{n+1}-s_n)\\,v_{\\theta}(x^{(s_n)},s_n);\\qquad\n\\mathcal{L}_{\\text{CD}}=\\mathbb{E}\\big[d\\big(f_{\\xi}(x^{(s_n)},s_n),\\,f_{\\xi^{-}}(\\hat{x}^{(s_{n+1})},s_{n+1})\\big)\\big] \\qquad (31,32)\n$$\n\n- **무슨 식?**: consistency model $f_\\xi$는 궤적 위 어느 점에서 물어봐도 같은 clean 끝점을 주도록(self-consistency), 인접 격자점 $s_n, s_{n+1}$에서의 학생 예측이 일치하게 학습한다(EMA target $\\xi^-$, squared ℓ2).\n- **비유**: 여러 정거장을 거쳐 도착하던 완행($v_\\theta$ 여러 스텝)을, \"어느 역에서 타든 종점을 바로 찍는\" 급행($f_\\xi$)으로 증류.\n- **결과**: video 5-step·action 10-step 샘플러를 각각 **2-step**으로 축소 → 배포 policy는 매 chunk를 단 **2번의 function evaluation**으로 생성(실시간 확보).\n\n#### 2.4.2 Inference Acceleration\n\n추론 가속을 **3개 레벨**로 조직(각 레벨이 다른 병목을 겨냥):\n\n- **Model level (compilation)**: 각 스텝의 지배 연산인 DiT forward를 ONNX→TensorRT로 컴파일(kernel selection + operation fusion). KV cache 같은 runtime state를 **explicit engine input/output**로 표현해 static interface 요건을 만족. FP8 양자화(transformer block 내부 linear는 FP8, head/tail은 BF16).\n- **Sequence level (attention)**: autoregressive rollout은 horizon이 길수록 attention 비용↑ → **paged/ragged KV-cache**(vLLM PagedAttention 계열)로 반복 padding/repacking 회피(buffer capacity = sliding-window length, in-place 업데이트). generic TensorRT attention을 **FlashInfer** plugin으로 교체해 padded dense tensor 없이 paged cache 위에서 직접 attention.\n- **System level (runtime amortization)**: async loop의 반복 host-side 준비 비용(bindings/shape 캐싱, tensor view 재사용, cross-attention KV precompute, 불필요한 CPU-GPU 동기화 제거)을 amortize.\n- **비유**: 조립라인 병목 3곳 — (1) 트랜스포머 연산, (2) 긴 이력에 대한 attention, (3) 모델 호출 주변 잔업 — 을 각각 뚫는다.\n\n  원본 그림 6: [arXiv Figure 6](https://arxiv.org/html/2607.08639v1/x6.png)\n  ![](https://arxiv.org/html/2607.08639v1/x6.png)\n  → §2.3.7 Foresight Reasoning의 비동기 추론/실행 흐름(cold start → 실행/ObsQueue → KV 재정합 → FDM 상상 → 다음 chunk 예측).\n\n> ⚠️ 이 절이 서술하는 가속 기법(consistency distillation, FP8 TensorRT, FlashInfer KV-cache, 3-level 스택)은 원문에 확인되지만, **단계별 latency 수치(예: 927 ms→142 ms, 35 Hz→225 Hz, 6.5×)는 arXiv HTML이 가속 ablation에서 잘려 원문 대조로 확인 불가**했다(초기 추출은 그 수치를 지어냈고, 독립 검증에서 문자열 부재 확인). 배포 성능으로 확정된 정량치는 **peak 225 Hz**(intro)뿐. 자세한 내용은 문서 끝 TODO 참조.\n\n#### 2.3.7 Foresight Reasoning (비동기 추론)\n\n**문제(self-blocking)**: 직렬 실행이면 chunk $a_t$ 실행 뒤 로봇이 놀며 모델이 다음 chunk를 denoise → 모델 지연이 곧 제어 지연.\n\n**핵심 아이디어**: 폐루프 rollout을 서로 다른 속도로 도는 **인과적으로 연결된 두 스트림** — prediction stream(모델이 앞서 미래 예측) + execution stream(로봇이 현재 chunk 실행) — 으로 조직해 겹쳐 돌린다.\n\n**수식**:\n\n$$\n\\hat{z}_{t+1}=\\mathrm{FDM}_{\\theta}(C_{t}\\cup\\{a_{t}\\})=v^{\\text{vid}}_{\\theta}(z_{\\leq t},a_{\\leq t}) \\qquad (29)\n$$\n\n$$\n\\mathcal{L}_{\\text{FDM}}=\\mathbb{E}\\big[\\lVert v^{\\text{vid}}_{\\theta}(z^{(s)}_{t+1},s\\mid z_{\\leq t},a_{\\leq t})-(z_{t+1}-\\epsilon)\\rVert^{2}\\big] \\qquad (30)\n$$\n\n- **무슨 식?**: 로봇이 $a_t$를 실행하는 동안, 정책의 video expert가 **온라인 forward-dynamics pass**로 현재 chunk의 시각 결과 $\\hat z_{t+1}$을 상상(Eq.29)하고 → action expert가 그로부터 다음 chunk $a_{t+1}$을 미리 디코드. Eq.30은 이를 지원하는 post-training 손실.\n- **비유(GPS 내비게이션)**: 지금 구간을 운전하는 동안(execution) 내비가 다음 경로를 미리 계산(prediction) → 코너에 닿으면 다음 지시가 준비돼 있다. 제어 이론의 predict-then-correct(칼만 필터).\n- **drift 위험과 해결**: 내비가 실제 GPS를 무시하고 자기 상상 경로만 따라가면($\\hat z$를 계속 되먹임 → open-loop) video 백본의 temporal smoothness 선호 때문에 환각 궤적으로 표류한다. → **실관측이 도착할 때마다 re-ground**: 돌아온 관측을 true latent $z_{t+1}$로 인코딩해 KV 캐시의 낡은 $\\hat z_{t+1}$을 실행 행동 $a_t$와 함께 덮어쓴다. 다음 예측은 검증된 캐시 $C_{t+1}$에서 시작.\n- **콕 집어 못박기**: 이 online FDM은 tokenizer의 frozen $f_\\psi$(§2.2.2)가 아니라 **정책 자신**(video expert)이 온라인으로 수행한다. $\\mathcal{L}_{\\text{FDM}}$은 $\\mathcal{L}_{\\text{vid}}$(Eq.6, $a_{<t}$만 조건)와 달리 **실행된 행동까지** 조건에 넣어($a_{\\leq t}$, 실행 중 $a_t$ 포함) video expert를 현재 전이의 진짜 forward-dynamics 예측기로 만든다. Cold start로 KV 캐시 초기화 + 첫 chunk 사전계산 후 루프 진입.\n\n---\n\n## 3 Data Recipe\n\n§2의 커리큘럼(text-to-image → text-to-video → embodied)에 맞춘 3단계 데이터 공급. \"무슨 데이터를 어떻게 전처리해 넣는가\"만 다룬다(새 수식 없음).\n\n- **3.1 General image/video**: 새로 수집하지 않고 **LingBot-Video[70]가 이미 큐레이션한 web-scale 코퍼스를 재사용**. 앞 두 단계(T2I·T2V)에만 쓰여 appearance·dynamics prior를 저비용으로 심는다.\n- **3.2 Robot data**: 1세대 LingBot-VA 코퍼스(수천 시간)를 유지하며 내부 시연 수천 시간을 추가. 소스 7종 — AgiBot, RoboMind, InternData-A1, Open X-Embodiment(OXE, DROID 포함), UMI-style, RoboCOIN. **통일된 annotation pipeline**으로 재처리: 긴 궤적을 atomic action clip으로 분절하고, clip별 language prompt + global task instruction을 **Qwen3.5-397B**로 자동 부여(누락·generic prompt 보정, 언어 감독 일관성↑).\n- **3.3 Ego-centric human data**: 내부 1인칭 손조작 코퍼스 — **65.4k 에피소드**, 수천 시간, 5개 tabletop 환경(kitchen/dining/vanity/office/tool bench), **600+ operators**, 3.0k+ scene-task 조합. 프레임마다 양손 6-DoF world-frame root pose + 손당 22 finger-joint angle 기록. **로봇 호환 변환**: 6-DoF root 궤적은 보존, 고차원 finger-joint는 좌/우 스칼라 parallel-gripper aperture로 축약 → §2.3.5 co-training 입력.\n- **3.4 In-context learning data**: Zero-WAM[60] 파이프라인으로 robot video를 \"같은 task 의미의 human video\"로 변환(Figure 7). taxonomy 샘플 → VLM(Gemini-3.1-Pro)이 첫 프레임을 사람 조작 편집 프롬프트로 변환 → 영상 생성(WAN-2.6 / Kling-V3)으로 human video 합성 → VLM 필터(task 의미 보존 + physical plausibility) → 원본 robot trajectory와 pairing. 규모: **10+ 데이터셋, 5,000+ tasks, 50,000+ samples**.\n\n  원본 그림 7: [arXiv Figure 7](https://arxiv.org/html/2607.08639v1/x7.png)\n  ![](https://arxiv.org/html/2607.08639v1/x7.png)\n  → in-context human-robot 데이터 큐레이션: robot video를 task 의미로 샘플 → VLM으로 human demo 프롬프트화 → human video 합성 → 필터 → 원본 robot trajectory와 pairing.\n\n---\n\n## 4 Experiments\n\n### 4.1 Implementation & Training Details\n\n#### 4.1.1 Network Architecture\n\n- **백본**: from scratch DiT, semantic tokenizer의 **96채널** latent 공간 위에서 동작. Video latent은 1×2×2(T×H×W) patchify(공간만 2×2로 묶어 토큰 1/4) 후 linear patch embedding.\n- **Video backbone**: 30 블록, hidden **2048**, joint self-attention은 **3072-dim**(24 heads × 128). Video FFN = sparse MoE(**128 routed SwiGLU experts, top-8, shared 1개**, per-expert intermediate 512).\n- **Action 스트림(MoT parallel)**: hidden **768**(공유 attention 폭의 1/4), raw action은 **30-dim 통일 action space**(dataset별 quantile-normalize, 결측 zero-pad+mask), bias-free linear로 임베딩, action FFN은 3072 dense.\n- **Joint self-attention**: video q/k/v 2048→3072, action q/k/v 768→3072로 lift, 출력은 각 폭으로 복귀. Cross-attention에서 action은 자기 query/output projection을 갖되 text key/value는 video와 공유. MoE·dense FFN·LayerNorm·AdaLN·condition embedder·output head는 modality별 분리.\n- **Causal chunked generation**: chunk 단위 autoregressive, self-attention = block-causal + past chunk sliding window. 학습 chunk size 1–4, window 1–64 chunk를 매 step uniform 재샘플(추론은 chunk 2 / window 64). Exposure bias 완화를 위해 diffusion-forcing식 context noise(확률 0.5로 clean history를 작은 noise로 대체).\n- **MCP head(학습 전용)**: backbone 레이어 {3,11,19,29} hidden을 2-layer SiLU MLP(4×2048→2048→2048)로 fuse 후 3개 depth group(각 3블록)에 투입, next 너머 1–3 chunk 예측, loss 가중치 0.5/0.2/0.1. **추론은 backbone만 실행**.\n- **Conditioning**: text는 UMT encoder로 4096-dim(최대 512 token) → 2-layer MLP → cross-attention. timestep은 sinusoidal 256-dim → MLP → AdaLN. video·action 스트림은 **독립 timestep**(noise level decouple).\n- **파라미터(approx.)**: video backbone **≈13.0B total / ≈1.9B active**, action expert ≈0.6B, MCP head ≈1.7B → **total ≈15.3B 학습 파라미터**, 추론 시 **토큰당 ≈2.5B active**(MoE sparsity + 학습전용 MCP 덕에 total의 ~1/6).\n\n#### 4.1.2 Training Recipe\n\n- **통일 목적함수**: 모든 스테이지를 rectified-flow(=flow-matching, velocity MSE 회귀) 하나로, 스케줄러의 timestep 의존 loss reweighting 적용.\n- **Modality별 timestep shift**: image 2 / web·video 2 / robot video-action 5 / MCP branch 10 / action modality 1(unshifted). action timestep은 video와 독립 샘플. CFG용 text embedding drop 확률 0.1.\n- **하이브리드 옵티마이저 Muon + AdamW**: transformer block 내부 2D weight(attention/dense action-FFN/routed MoE projection)는 **Muon**(lr 2e-3, momentum 0.95, wd 0.1), 나머지(embedder/norm/AdaLN/bias/head)는 **AdamW**(lr 1e-4, β(0.9,0.95), wd 0.01). 2000-step linear warm-up 후 constant, grad global-norm clip 1.0.\n- **Systems**: FSDP full-parameter sharding(tensor/pipeline/context 병렬 없음), bf16 mixed precision + FP32 grad reduction, full activation checkpointing, elastic multi-node. rank당 packed sequence 1개(local batch 1), 데이터 1% validation hold-out.\n\n### 4.2 Real-world Deployment\n\n#### 4.2.1 Real-world Evaluation\n\n- **셋업**: 자체 로봇 벤치의 일상 조작 4태스크 — Fruit Sorting(사과·배·오렌지 바구니), Pen Collection(펜 3자루 순차), Drawer Tidying(서랍 열고 정리), Plate Handover(접시 밀기→패드→물체). 태스크당 20개 teleoperation 데모.\n- **핵심 설계**: 태스크별 전용 모델이 아니라 **하나의 generalist policy**를 multi-task SFT로 학습하고, **동일 checkpoint를 전 태스크에 배포**해 success rate + 평균 task progress를 측정. → 과적합이 아닌 진짜 일반화를 드러냄.\n- **결과(Figure 8)**: LingBot-VA 2.0이 성공률·진행도 모두에서 VLA(π0.5)·이전 VA(LingBot-VA)를 앞선다. π0.5 대비 개선은 **긴 horizon 시각 grounding이 필요한 연속 조작**에서 뚜렷 — 미래 시각 상태 예측으로 여러 단계에 걸쳐 task-level 맥락을 유지하고, video grounding이 국소 정밀도도 높인다. LingBot-VA 대비 이득은 **causal video-action pretraining**(다운스트림 파인튜닝 전에 더 일반화 가능한 video-action 대응을 노출)에서 오며, 멀티태스크 설정에서 특히 유리.\n\n  원본 그림 8: [arXiv Figure 8](https://arxiv.org/html/2607.08639v1/x8.png)\n  ![](https://arxiv.org/html/2607.08639v1/x8.png)\n  ![](https://arxiv.org/html/2607.08639v1/x9.png)\n  → 실세계 배치 결과(Fig.8은 x8/x9 두 이미지로 구성): 태스크별 성공률·task progress에서 LingBot-VA 2.0 vs 대표 baseline.\n\n#### 4.2.2 In-context Learning Demo\n\n- 텍스트 대신 **시각 시연 영상**을 태스크 컨텍스트로 쓸 수 있는지 정성 확인. 접시 3개 + 물체 7개 배치, **seen 태스크 4개**(태스크당 15 데모)만 finetune 후 **unseen 조합 4개**(calabash→green plate 등)를 사람 참조영상 컨텍스트 + 로봇 관측으로 **파라미터 갱신 없이** 실행. video-action backbone이 컨텍스트 영상의 절차적 단서를 새 조합·배치·인스턴스로 전이하는지 평가(Fig.9).\n\n  원본 그림 9: [arXiv Figure 9](https://arxiv.org/html/2607.08639v1/x10.png)\n  ![](https://arxiv.org/html/2607.08639v1/x10.png)\n  → 4개 unseen 태스크의 ICL 롤아웃 — 참조 영상 하나로 파라미터 업데이트 없이 조작 절차 전이.\n\n### 4.3 Simulation\n\n- **벤치마크**: RoboTwin 2.0 양팔 조작, clean·domain-randomized 두 조건 success rate(%). 학습은 LingBot-VA 따라 멀티태스크 — clean 2,500(태스크당 50) + 심한 randomization 25,000(태스크당 500) = **27,500 데모**, 전 모델 동일 조건.\n\n| 모델 | 평균 success (%) |\n|---|---|\n| X-VLA | 72.9 |\n| π0.5 (VLA) | 79.8 |\n| Motus | 87.9 |\n| LingBot-VA (VA, 이전 세대) | 92.2 |\n| **LingBot-VA 2.0** | **93.6** (clean 93.8 / rand 93.4) |\n\n- **해석**: π0.5 대비 평균 **+14.0%p**(저자 표기; Table 1 수치로는 93.6−79.8=13.8 → 논문 자체의 소소한 반올림 불일치) → native video-action pretraining이 양팔 조작에 더 강한 physical grounding을 준다는 증거. 이전 최강 VA인 LingBot-VA(92.2)도 소폭·일관되게 상회. **clean vs randomized 격차 0.6%p**로 매우 작아 도메인 변이 아래서도 성능 유지(장면 암기가 아닌 실제 조작 학습 시사).\n\n### 4.4 Ablation\n\n세 구성요소를 각각 제거/교체(방법 정의는 §2, 여기선 효과·수치만).\n\n- **(a) Tokenizer (Table 2, RoboTwin 2.0, 1.3B 모델, scratch 학습)**: 재구성 지향 WAN2.2 VAE를 저자 tokenizer로 교체 시 모든 horizon에서 성공률↑, **특히 예측 horizon이 길수록 이득이 커진다**.\n\n| horizon | WAN2.2 VAE (Easy/Hard) | Our tokenizer (Easy/Hard) |\n|---|---|---|\n| hor=1 | 81.1 / 78.4 | 86.2 / 83.1 |\n| hor=2 | 75.5 / 73.9 | 85.7 / 84.0 |\n| hor=3 | 67.2 / 68.0 | **92.0 / 85.4** |\n| avg (50 tasks) | 78.0 / 76.0 | 86.6 / 83.1 |\n\n  → 해석: semantic tokenization이 world-action modeling·downstream 제어에 더 유용한 state 정보를 보존(긴 horizon에서 격차 누적).\n\n- **(b) MCP (Figure 10)**: 5B baseline을 동일 data·optimization으로 RoboTwin post-training하되 한 variant만 MCP on. MCP는 12·50 fps 모두 더 빨리 수렴하고 최종 성공도 높다. **50 fps에서 가장 극적** — 5k step에서 randomized 기준 baseline을 **+29.7%p** 앞서고, baseline의 45k-step 정확도를 **20k step만에** 달성.\n\n  원본 그림 10: [arXiv Figure 10](https://arxiv.org/html/2607.08639v1/x11.png)\n  ![](https://arxiv.org/html/2607.08639v1/x11.png)\n  → MCP on/off의 RoboTwin 학습곡선: MCP가 12·50 fps 모두 더 빨리 수렴·최종 정확도↑.\n\n- **(c) Inference acceleration**: §2.4.1/§2.4.2의 4단계 누적 최적화(consistency distillation → FP8 TensorRT → paged KV-cache/FlashInfer → runtime amortization)가 각각 기여. (단계별 latency/Hz 수치는 원문 대조 불가 — TODO 참조. 확정치는 peak 225 Hz.)\n\n### 4.5 Demonstration\n\n정성 시연(Figure 11) — 4개 real-world 태스크로 서로 다른 능력 축을 각각 스트레스 테스트:\n- **Desk Tidying** = long-horizon planning(어질러진 tabletop 파싱 → object state 유지 → 다단계 정리).\n- **Conveyor Belt** = temporal grounding + dynamic prediction(움직이는 물체 예측, action chunk를 컨베이어 운동과 동기).\n- **Chip Picking** = fine-grained manipulation(**촉각 센서 0개**, 순수 시각 유도로 얇은 물체 grasp).\n- **Air Hockey** = fast inference + reactive control(puck 궤적 빠른 예측, 최근 관측만으로 저지연 폐루프).\n\n  원본 그림 11: [arXiv Figure 11](https://arxiv.org/html/2607.08639v1/x12.png)\n  ![](https://arxiv.org/html/2607.08639v1/x12.png)\n  → 4개 대표 태스크의 정성 롤아웃(계획성/타이밍/정밀도/반응속도).\n\n---\n\n## 5 Related Work\n\n- **5.1 Generalist robot policies & VLA models**: VLA 계열은 인터넷 규모 사전학습의 semantic prior를 물려받는다(산업 파운데이션: LingBot-VLA[110], Qwen-RobotManip[118], WALL-OSS[120,117]). 밀접 계열 = visuomotor policy(ACT[124], Diffusion Policy[21])로 시연에서 행동을 회귀하며, visual chain-of-thought·instruction reasoning·explicit memory 등을 얹는다. **비판**: 이들은 모두 reactive이고 dynamics를 모델링하지 않아 long-horizon 일관성·sample efficiency가 제한된다. **차별점**: LingBot-VA 2.0은 예측된 물리 동역학에 제어를 grounding한다.\n- **5.2 Video generation & world-action models**: 예측된 scene evolution을 action 생성의 중간 표현으로 쓰는 계열. DreamZero[115]는 대형 video diffusion을 joint video-action에 adapt, 전작 LingBot-VA[50]는 causal world modeling으로 frame prediction+policy를 함께 학습. 학습 테크닉은 Diffusion Forcing[18]·Self Forcing[37] 위에 선다. **차별점**: 기존이 off-the-shelf **bidirectional** 생성기를 continued training으로 개조하는 반면, LingBot-VA 2.0은 native·causal 스택을 from scratch로 사전학습.\n- **5.3 Representations for control**: embodied control용 표현은 semantic visual feature 또는 latent action 변수를 학습한다. 가장 직접적으로 **RepWAM**[98]·**Motus**[8]가 unlabeled video에서 compact latent action을 학습하고, LingBot-VA 2.0은 이 방향에서 **world state와 latent action을 language-aligned visual foundation model에 앵커된 단일 semantic latent 공간에 배치**한다 — 재구성 전용 VAE에 action 모듈을 따로 붙이는 방식과 대비된다.\n\n---\n\n## 6 Conclusion\n\n- **정체성**: 범용 비디오 생성기를 개조한 것이 아니라, 로봇 제어를 위해 처음부터 **native**로 설계된 video-action foundation model. 관통 원칙 = 표현부터 추론까지 모든 구성요소가 embodied control 요구에 맞춰 형성.\n- **구성요소 회고**: (1) semantic visual-action tokenizer가 world state·latent action을 visual foundation model에 정렬된 단일 latent 공간에 배치. (2) 그 위에서 causal DiT + sparse MoE video stream을 from scratch 사전학습. (3) MCP·ICL·human-robot co-training이 학습 신호를 풍부하게. (4) Foresight Reasoning + few-step distillation + system-level acceleration이 사전학습 모델을 real-time closed-loop 컨트롤러로 전환.\n- **한계·향후(이 섹션 고유 기여)**: (a) planner와 policy가 현재 **따로** 학습·고정 인터페이스로 결합 → 더 긴밀한 joint training이 long-horizon 일관성을 높일 수 있음. (b) latent-action 공간이 **수동적(passive) 비디오**에서만 학습 → interactive/RL 신호로 더 날카롭게 다듬을 여지. (c) 사전학습 코퍼스·sparse backbone을 키우고 bimanual을 넘어 embodiment 커버리지를 넓히는 것이 범용 embodied foundation model로 가는 다음 단계.\n\n---\n\n## 한눈에 정리\n\n- **문제**: 기존 video-action 모델은 콘텐츠 생성용 비디오 스택(재구성 VAE + bidirectional 백본 + 나중에 붙인 action 모듈)을 로봇에 개조 → ① appearance 편향 표현, ② 느린 추론, ③ 제어로 확장 안 되는 사전학습 신호, ④ bidirectional↔causal 불일치.\n- **해법(4축)**: ① **semantic visual-action tokenizer**(복원 latent을 frozen foundation model에 정렬 + 라벨 없는 latent action을 IDM/FDM bottleneck으로 학습). ② **from-scratch causal 사전학습** + **sparse MoE**(128 expert/top-8, video 13B/1.9B-active) video stream, action은 dense(MoT). ③ **MCP**(다음 3 chunk 감독으로 appearance 복사 차단) + **ICL**(사람 영상을 태스크 프롬프트로) + **human-robot co-training**(공유 dynamics, 배포 시 로봇 branch만). ④ **Foresight Reasoning**(행동 실행과 미래 예측을 겹치되 매 실관측으로 re-ground) + consistency distillation(2-step) + 3-level 가속.\n- **결과**: RoboTwin 2.0 sim 93.6 평균(π0.5 대비 +14.0%p, 이전 LingBot-VA 92.2 상회, clean-rand 격차 0.6%p), 실세계 4태스크에서 π0.5·LingBot-VA 우위, 10–15 데모 few-shot 적응, peak 225 Hz 비동기 실행.\n- **핵심 아이디어 한 줄**: \"비디오 생성기를 개조하지 말고, semantics·action에 정렬된 표현 위에서 causal·sparse video-action 모델을 처음부터 키우고, 미래를 상상하되 매 관측으로 재정합해 실시간 폐루프 제어를 얻는다.\"\n\n## ⚠️ 확인 필요 / 나중에(TODO)\n\n- [ ] **가속 latency 수치 전체 미확인**: 단계별 chunk latency(예: 927 ms→466→369→272→142 ms), 단계별 Hz(35→69→87→118→225), \"6.5× end-to-end speedup\", `Async Hz=(1000/t_chunk)×K, K=32` 정의, \"Table 3\", 개별 배수(1.8×/1.4×/1.3×), \"8 ms 2-frame chunk\", \"450 fps 이론 최대\" — arXiv HTML v1이 가속 ablation(S4.4.3)에서 잘려 원문 대조 불가. 독립 검증 2회 모두 해당 문자열 부재 확인(초기 추출의 confabulation으로 판단). 확정된 배포 성능은 **peak 225 Hz**(intro)뿐. e-print LaTeX 또는 v2 확보 시 재확인.\n- [ ] MCP \"2.3× training speedup\" 표현은 원문 텍스트에 없음(45k-step 정확도를 20k step에 달성 → 유도 가능하나 논문이 \"2.3×\"로 명시하진 않음). +29.7%p·45k/20k는 확인됨.\n- [ ] 소속(affiliation)이 abs 페이지에 미명시 — 본문/PDF에서 확인 필요. 저자 29명 중 대표 5명만 기재.\n- [ ] 코드/체크포인트 공개 URL 미확인(초록/abs에 없음).\n- [ ] 일부 하이퍼파라미터 미명시: $\\lambda$ 계열(정렬/action 손실 가중치), latent action 차원 $d_\\ell$, 총 학습 step/token 수, data mixture 실제 비율.\n- [ ] Table 1의 π0.5 대비 \"+14.0%p\"는 표 수치(93.6−79.8=13.8)와 0.2%p 불일치 — 논문 자체의 반올림 표기로 보이나 원문 재확인 여지.\n\n---\n## Source Provenance\n- Source: HTML(arxiv.org/html/2607.08639v1) 섹션별 추출 + abs 페이지(제목·저자) 대조. 그림 URL은 HTML `<img src>` 실측(x1–x12.png).\n- Fetched: 2026-07-15\n- Parse reliability: Medium~High (HTML; 42섹션 멀티에이전트 추출 + 적대적 검증 1패스). **가속 ablation 구간은 HTML 절단으로 Low** → 해당 수치 본문 제외, TODO 격리.\n- Unconfirmed: §2.4.2/§4.4 가속 latency·Hz 수치(HTML 절단), 소속, 코드 URL — 상기 TODO 참조.\n";
