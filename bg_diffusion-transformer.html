  <script>
  const MD = "# Diffusion Transformer (DiT)\n\n> м¶ңмІҳ: [DiT] Peebles & Xie, \"Scalable Diffusion Models with Transformers\" (arXiv 2212.09748). вҖ» arXiv HTML 404 вҶ’ к·ёлҰјмқҖ ar5iv нҳёмҠӨнҠё.\n\n**н•ң мӨ„ м •мқҳ**: нҷ•мӮ°лӘЁлҚё л°ұліёмқ„ U-Net лҢҖмӢ  **Transformer**лЎң л°”кҫј кІғ. мһ мһ¬ мқҙлҜём§ҖлҘј нҢЁм№ҳлЎң мӘјк°ң нҶ нҒ° мӢңнҖҖмҠӨлЎң л§Ңл“Өкі  ViTмӢқ лё”лЎқмңјлЎң л…ёмқҙмҰҲлҘј мҳҲмёЎн•ңлӢӨ. н•өмӢ¬мқҖ timestep $t$В·мЎ°кұҙ $c$(нҒҙлһҳмҠӨ л“ұ)лҘј **adaptive LayerNorm-Zero(adaLN-Zero)**лЎң мЈјмһ… вҖ” LayerNormмқҳ scale/shift/gateлҘј мЎ°кұҙ мһ„лІ л”©м—җм„ң **нҡҢк·Җ(regress)**н•ңлӢӨ.\n\n**м§ҒкҙҖ**: \"нҷ•мӮ°мқҖ U-Netмқҙм–ҙм•ј н•ңлӢӨ\"лҠ” нҶөл…җмқ„ к№Ёкі , мһ мһ¬ мқҙлҜём§ҖлҘј **нҢЁм№ҳ нҶ нҒ° мӢңнҖҖмҠӨ**лЎң ліҙкі  нҠёлһңмҠӨнҸ¬лЁёлЎң л…ёмқҙмҰҲлҘј мҳҲмёЎ. ViTк°Җ л¶„лҘҳм—җм„ң н•ң мқјмқ„ л””л…ёмқҙм Җм—җм„ң н•ң м…Ҳ вҶ’ **scaleмқ„ нӮӨмҡёмҲҳлЎқ н’Ҳм§Ҳмқҙ л§ӨлҒ„лҹҪкІҢ мўӢм•„м§„лӢӨ**(л…јл¬ё н•өмӢ¬).\nмЎ°кұҙнҷ”(adaLN-Zero) л№„мң : л””л…ёмқҙм ҖлҠ” \"м§ҖкёҲ лӘҮ лӢЁкі„м§ё($t$)В·лӯҳ к·ёлҰҙм§Җ($c$)\"лҘј л§Ө лё”лЎқл§ҲлӢӨ м•Ңм•„м•ј н•ңлӢӨ. adaLNмқҖ к·ё м •ліҙлҘј к°Ғ лё”лЎқ LayerNormмқҳ **scale ОіВ·shift ОІ мҶҗмһЎмқҙ**лЎң л„Јкі , кұ°кё°м—җ **gate Оұ**лҘј н•ҳлӮҳ лҚ” лӢ¬лҗҳ **н•ҷмҠө мӢңмһ‘ мӢң Оұ=0** вҶ’ лё”лЎқмқҙ \"м•„л¬ҙкІғлҸ„ м•Ҳ лҚ”н•ҳлҠ” н•ӯл“ұн•ЁмҲҳ\"лЎң м¶ңл°ңн•ҙ м җм§„м ҒмңјлЎң кё°м—¬лҘј мј лӢӨ(ResNet zero-init мһ”м°Ё нҠёлҰӯ). мқҙ \"мЎ°мҡ©нһҲ мӢңмһ‘н•ҙ м„ңм„ңнһҲ мјңкё°\"к°Җ к№ҠмқҖ DiTлҘј м•Ҳм •м ҒмңјлЎң н•ҷмҠөмӢңмјң к°ҷмқҖ FLOPsм—җм„ң FIDлҘј нҒ¬кІҢ лӮ®м¶ҳлӢӨ.\n\nASCII:\n```\n   Latent z в”Җ(patchifyвҶ’нҶ нҒ°+pos)в”Җв–әв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                                  в”Ӯ   DiT block Г— N  в”Ӯв—„в”Җв”Җ cond = emb(t)+emb(c)\n   cond(t,c) в”Җв–ә MLP в”Җв–ә(Оі,ОІ,Оұ)в”Җв”Җв”Җв”Җв–әв”Ӯ   (adaLN-Zero)   в”Ӯ\n                                  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                                           в–ј\n                            LayerNorm вҶ’ Linear&Reshape вҶ’ Оө_Оё, ОЈ_Оё (л…ёмқҙмҰҲВ·кіөл¶„мӮ°)\n\n   adaLN-Zero лё”лЎқ лӮҙл¶Җ (Self-Attn, FFN к°Ғк°Ғ лҸҷмқј нҢЁн„ҙ):\n     x в”Җв–ә LN в”Җв–ә(scale Оі, shift ОІ)в”Җв–ә [Attn лҳҗлҠ” FFN] в”Җв–ә(Г— gate Оұ)в”Җв–ә(+)в”Җв–ә x\n                                                         в”” Оұ=0 init вҶ’ мІҳмқҢм—” identity(мһ”м°Ёл§Ң нҶөкіј)\n```\n\n**мҲҳмӢқ**:\n\n$$\nq(x_t\\mid x_0)=\\mathcal N\\big(x_t;\\ \\sqrt{\\bar\\alpha_t}\\,x_0,\\ (1-\\bar\\alpha_t)I\\big)\n$$\n\n- нҷ•мӮ° м „л°©кіјм •(л…ёмқҙмҰҲ м җм§„ мЈјмһ…). $\\bar\\alpha_t=\\prod_{s\\le t}\\alpha_s$=лҲ„м Ғ мӢ нҳё ліҙмЎҙл№„. мһ¬л§Өк°ңліҖмҲҳнҷ”: $x_t=\\sqrt{\\bar\\alpha_t}x_0+\\sqrt{1-\\bar\\alpha_t}\\,\\epsilon_t$.\n\n$$\n\\mathcal L_{\\text{simple}}=\\big\\lVert\\epsilon_\\theta(x_t)-\\epsilon_t\\big\\rVert_2^2\n$$\n\n- DiT мЈј н•ҷмҠөлӘ©м Ғ(л…ёмқҙмҰҲ мҳҲмёЎ MSE). $\\Sigma_\\theta$(н•ҷмҠөлҗң кіөл¶„мӮ°)лҠ” лі„лҸ„ full VLBлЎң н•ҷмҠө(Nichol & Dhariwal л°©мӢқ).\n\n$$\n\\text{adaLN-Zero: } x\\leftarrow x+\\alpha\\odot\\mathrm{Block}\\big(\\gamma\\odot\\mathrm{LN}(x)+\\beta\\big),\\quad (\\gamma,\\beta,\\alpha)=\\mathrm{MLP}\\big(\\mathrm{emb}(t)+\\mathrm{emb}(c)\\big),\\ \\ \\alpha\\big|_{\\text{init}}=\\mathbf 0\n$$\n\n- scale $\\gamma$В·shift $\\beta$м—җ лҚ”н•ҙ **мһ”м°Ё м§Ғм „ gate $\\alpha$**лҘј нҡҢк·Җ. MLPк°Җ $\\alpha{=}0$мқ„ м¶ңл Ҙн•ҳлҸ„лЎқ мҙҲкё°нҷ” вҶ’ н•ҷмҠө мӢңмһ‘ мӢң лё”лЎқ м „мІҙк°Җ **н•ӯл“ұн•ЁмҲҳ**. л…јл¬ё мқёмҡ©: \"this initializes the full DiT block as the identity function.\" (self-attentionВ·FFN к°Ғк°Ғ лі„лҸ„ gate $\\alpha_1,\\alpha_2$.)\n\nмӣҗліё к·ёлҰј: [arXiv Figure 3 (DiT)](https://ar5iv.labs.arxiv.org/html/2212.09748/assets/x3.png)\n![](https://ar5iv.labs.arxiv.org/html/2212.09748/assets/x3.png)\n> Figure 3 (DiT, arXiv 2212.09748): (мўҢ) мЎ°кұҙл¶Җ мһ мһ¬ DiT вҖ” мһ мһ¬ нҢЁм№ҳ вҶ’ Nк°ң DiT лё”лЎқ. (мҡ°) мЎ°кұҙнҷ” ліҖнҳ• вҖ” adaLN-Zero(мөңкі  м„ұлҠҘ)/cross-attention/in-context. \"Adaptive layer norm works best.\" (HTTP 200В·image/png кІҖмҰқ; arxiv.org/htmlмқҖ 404лқј ar5ivл§Ң м„ңл№ҷ.)\n\n### вҡ пёҸ gotchas (лӘ»л°•кё°)\n- **\"DiT = к·ёлғҘ ViT\" нӢҖлҰј.** л°ұліёмқҙ нҠёлһңмҠӨнҸ¬лЁёмқё кұҙ л§һм§Җл§Ң н•өмӢ¬мқҖ timestepВ·мЎ°кұҙмқ„ **adaLN-Zero**лЎң мЈјмһ…н•ҳлҠ” мЎ°кұҙнҷ”.\n- **adaLN vs adaLN-Zero**: нӣ„мһҗлҠ” мһ”м°Ё м§Ғм „ **gate Оұ м¶”к°Җ + Оұ=0 мҙҲкё°нҷ”**(лё”лЎқмқ„ н•ӯл“ұн•ЁмҲҳлЎң м¶ңл°ң). л…јл¬ём—җм„ң лӘ…нҷ•нһҲ лҚ” мўӢмқҢ(FID).\n- **DiTлҠ” н”Ҫм…Җмқҙ м•„лӢҲлқј latent(LDM VAE мһ мһ¬)м—җм„ң лҸҷмһ‘.**\n- **DiT вү  нҠ№м • н•ҷмҠөлӘ©м Ғ.** мӣҗл…јл¬ёмқҖ DDPMмӢқ Оө-мҳҲмёЎ + н•ҷмҠөлҗң ОЈ. мөңмӢ  лӘЁлҚёмқҖ к°ҷмқҖ DiT л°ұліём—җ **flow matching**мқ„ м–№кё°лҸ„ н•Ё(SD3В·л№„л””мҳӨ мғқм„ұ) вҶ’ л°ұліё(adaLN-Zero)кіј лӘ©м Ғн•ЁмҲҳ(diffusion vs flow)лҠ” **л¶„лҰ¬**н•ҙ мқҙн•ҙ. (Fast-WAMмқҳ \"video-DiT\"к°Җ к·ё мҳҲ вҖ” л°ұліёмқҖ DiT, н•ҷмҠөмқҖ flow matching.)\n\n### мҡ°лҰ¬ кі„ліҙм—җм„ңмқҳ м“°мһ„ (used_by)\nCosmos PolicyВ·DreamDojoВ·Cosmos-Transfer2.5(мғқм„ұ л°ұліё)В·Fast-WAM(Wan2.2 **video-DiT** + action expert, MoT)В·BAGEL(мқҙлҜём§Җ мғқм„ұ). (`world_model_lineage_easy.md` к°Ғ м№ҙл“ң.)\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else

  });

    st.textContent = j.summary || JSON.stringify(j);
    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = 'м„ңлІ„к°Җ м—ҶмҠөлӢҲлӢӨ вҖ” н„°лҜёл„җм—җм„ң `python surveybot/serve.py` мӢӨн–ү нӣ„ http://localhost:8777 лЎң м ‘мҶҚн•ҳм„ёмҡ”. (мҡ”м•ҪВ·л”ҘлӢӨмқҙлёҢ мғқм„ұмқҖ Claude м„ём…ҳм—җм„ң /wm-survey)';
  }
}
</script>
