  <script>
  const MD = "# Diffusion Transformer (DiT)\n\n> 출처: [DiT] Peebles & Xie, \"Scalable Diffusion Models with Transformers\" (arXiv 2212.09748). ※ arXiv HTML 404 → 그림은 ar5iv 호스트.\n\n**한 줄 정의**: 확산모델 백본을 U-Net 대신 **Transformer**로 바꾼 것. 잠재 이미지를 패치로 쪼개 토큰 시퀀스로 만들고 ViT식 블록으로 노이즈를 예측한다. 핵심은 timestep $t$·조건 $c$(클래스 등)를 **adaptive LayerNorm-Zero(adaLN-Zero)**로 주입 — LayerNorm의 scale/shift/gate를 조건 임베딩에서 **회귀(regress)**한다.\n\n**직관**: \"확산은 U-Net이어야 한다\"는 통념을 깨고, 잠재 이미지를 **패치 토큰 시퀀스**로 보고 트랜스포머로 노이즈를 예측. ViT가 분류에서 한 일을 디노이저에서 한 셈 → **scale을 키울수록 품질이 매끄럽게 좋아진다**(논문 핵심).\n조건화(adaLN-Zero) 비유: 디노이저는 \"지금 몇 단계째($t$)·뭘 그릴지($c$)\"를 매 블록마다 알아야 한다. adaLN은 그 정보를 각 블록 LayerNorm의 **scale γ·shift β 손잡이**로 넣고, 거기에 **gate α**를 하나 더 달되 **학습 시작 시 α=0** → 블록이 \"아무것도 안 더하는 항등함수\"로 출발해 점진적으로 기여를 켠다(ResNet zero-init 잔차 트릭). 이 \"조용히 시작해 서서히 켜기\"가 깊은 DiT를 안정적으로 학습시켜 같은 FLOPs에서 FID를 크게 낮춘다.\n\nASCII:\n```\n   Latent z ─(patchify→토큰+pos)─►┌──────────────────┐\n                                  │   DiT block × N  │◄── cond = emb(t)+emb(c)\n   cond(t,c) ─► MLP ─►(γ,β,α)────►│   (adaLN-Zero)   │\n                                  └────────┬─────────┘\n                                           ▼\n                            LayerNorm → Linear&Reshape → ε_θ, Σ_θ (노이즈·공분산)\n\n   adaLN-Zero 블록 내부 (Self-Attn, FFN 각각 동일 패턴):\n     x ─► LN ─►(scale γ, shift β)─► [Attn 또는 FFN] ─►(× gate α)─►(+)─► x\n                                                         └ α=0 init → 처음엔 identity(잔차만 통과)\n```\n\n**수식**:\n\n$$\nq(x_t\\mid x_0)=\\mathcal N\\big(x_t;\\ \\sqrt{\\bar\\alpha_t}\\,x_0,\\ (1-\\bar\\alpha_t)I\\big)\n$$\n\n- 확산 전방과정(노이즈 점진 주입). $\\bar\\alpha_t=\\prod_{s\\le t}\\alpha_s$=누적 신호 보존비. 재매개변수화: $x_t=\\sqrt{\\bar\\alpha_t}x_0+\\sqrt{1-\\bar\\alpha_t}\\,\\epsilon_t$.\n\n$$\n\\mathcal L_{\\text{simple}}=\\big\\lVert\\epsilon_\\theta(x_t)-\\epsilon_t\\big\\rVert_2^2\n$$\n\n- DiT 주 학습목적(노이즈 예측 MSE). $\\Sigma_\\theta$(학습된 공분산)는 별도 full VLB로 학습(Nichol & Dhariwal 방식).\n\n$$\n\\text{adaLN-Zero: } x\\leftarrow x+\\alpha\\odot\\mathrm{Block}\\big(\\gamma\\odot\\mathrm{LN}(x)+\\beta\\big),\\quad (\\gamma,\\beta,\\alpha)=\\mathrm{MLP}\\big(\\mathrm{emb}(t)+\\mathrm{emb}(c)\\big),\\ \\ \\alpha\\big|_{\\text{init}}=\\mathbf 0\n$$\n\n- scale $\\gamma$·shift $\\beta$에 더해 **잔차 직전 gate $\\alpha$**를 회귀. MLP가 $\\alpha{=}0$을 출력하도록 초기화 → 학습 시작 시 블록 전체가 **항등함수**. 논문 인용: \"this initializes the full DiT block as the identity function.\" (self-attention·FFN 각각 별도 gate $\\alpha_1,\\alpha_2$.)\n\n원본 그림: [arXiv Figure 3 (DiT)](https://ar5iv.labs.arxiv.org/html/2212.09748/assets/x3.png)\n![](https://ar5iv.labs.arxiv.org/html/2212.09748/assets/x3.png)\n> Figure 3 (DiT, arXiv 2212.09748): (좌) 조건부 잠재 DiT — 잠재 패치 → N개 DiT 블록. (우) 조건화 변형 — adaLN-Zero(최고 성능)/cross-attention/in-context. \"Adaptive layer norm works best.\" (HTTP 200·image/png 검증; arxiv.org/html은 404라 ar5iv만 서빙.)\n\n### ⚠️ gotchas (못박기)\n- **\"DiT = 그냥 ViT\" 틀림.** 백본이 트랜스포머인 건 맞지만 핵심은 timestep·조건을 **adaLN-Zero**로 주입하는 조건화.\n- **adaLN vs adaLN-Zero**: 후자는 잔차 직전 **gate α 추가 + α=0 초기화**(블록을 항등함수로 출발). 논문에서 명확히 더 좋음(FID).\n- **DiT는 픽셀이 아니라 latent(LDM VAE 잠재)에서 동작.**\n- **DiT ≠ 특정 학습목적.** 원논문은 DDPM식 ε-예측 + 학습된 Σ. 최신 모델은 같은 DiT 백본에 **flow matching**을 얹기도 함(SD3·비디오 생성) → 백본(adaLN-Zero)과 목적함수(diffusion vs flow)는 **분리**해 이해. (Fast-WAM의 \"video-DiT\"가 그 예 — 백본은 DiT, 학습은 flow matching.)\n\n### 우리 계보에서의 쓰임 (used_by)\nCosmos Policy·DreamDojo·Cosmos-Transfer2.5(생성 백본)·Fast-WAM(Wan2.2 **video-DiT** + action expert, MoT)·BAGEL(이미지 생성). (`world_model_lineage_easy.md` 각 카드.)\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else
    // marked mangles LaTeX (underscores -> <em>, $$ blocks -> <p>) before KaTeX runs.
    let katexInMarked = false;
    try {
      // nonStandard: true — allow inline $...$ followed immediately by Korean particles (와/는/로),
      // otherwise the default regex requires whitespace/punctuation after closing $ and skips them.
      if (window.markedKatex) { marked.use(window.markedKatex({throwOnError: false, nonStandard: true})); katexInMarked = true; }
    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
    // 8~256 GPU); marked pairs two ~ in a line into <del>. Consume ~ runs as literal text.
    try {
      marked.use({ extensions: [{
        name: 'noStrike', level: 'inline',
        start(s) { return s.indexOf('~'); },
        tokenizer(s) { const mm = s.match(/^~+/); if (mm) return { type: 'noStrike', raw: mm[0], text: mm[0] }; },
        renderer(t) { return t.text; }
      }] });
    } catch (e) {}
    el.innerHTML = marked.parse(MD);
    // Fallback only if the extension failed to load (e.g. offline CDN)
    if (!katexInMarked && window.renderMathInElement) renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ], throwOnError: false
    });
  });
  </script>

<script>
async function runUpdate(){
  const st = document.getElementById('upd-status');
  st.textContent = '업데이트 중… (arXiv/HF 수집 → 사이트 재생성, 1~2분)';
  try{
    const r = await fetch('/api/update', {method:'POST'});
    const j = await r.json();
    st.textContent = j.summary || JSON.stringify(j);
    if(j.ok) setTimeout(()=>location.reload(), 1500);
  }catch(e){
    st.textContent = '서버가 없습니다 — 터미널에서 `python surveybot/serve.py` 실행 후 http://localhost:8777 로 접속하세요. (요약·딥다이브 생성은 Claude 세션에서 /wm-survey)';
  }
}
