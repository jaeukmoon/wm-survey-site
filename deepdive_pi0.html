  <script>
  const MD = "# π0: A Vision-Language-Action Flow Model for General Robot Control — Deep-Dive\n\n> **이 논문이 달성하려는 것**: LLM/VLM의 \"대규모 pre-train → 소량 고품질 post-train(fine-tune)\" 레시피를 **로봇 제어**로 옮긴 첫 실용적 **robot foundation model**. 인터넷으로 학습된 **VLM(PaliGemma)을 백본**으로 상속받아 상식·semantic을 공짜로 얻고, 그 위에 **flow matching action expert**를 얹어 discrete token이 아니라 **연속 action chunk**(H=50)를 최대 50Hz로 생성한다. 7개 로봇·68 task·~10,000시간 데이터로 cross-embodiment 학습해, 빨래 개기·식탁 정리 같은 장기·정밀 dexterous task를 zero-shot/fine-tune으로 수행. **이후 거의 모든 VLA(π0.5·LingBot-VLA·Fast-WAM의 action expert…)의 기반 아키텍처.**\n\n| 항목 | 값 |\n|---|---|\n| arXiv | 2410.24164 · 2024-10 |\n| 저자/소속 | Physical Intelligence (π) |\n| 코드 | https://github.com/Physical-Intelligence/openpi |\n| 백본 | PaliGemma (SigLIP image encoder + Gemma-2B), ~3B + action expert 300M = **3.3B** |\n| 벤치 | 자체 실로봇(7 config·68 task) zero-shot·language·fine-tune·복잡 multi-stage |\n\n> 읽는 법: **§IV(모델, 식 1–5)** 가 심장이다. flow matching 5식 + MoE(action expert) 구조 + block-wise causal mask(A-B)만 잡으면 끝. 나머지는 데이터 레시피(§V)와 실험(§VI).\n\n---\n\n## I. Introduction — robot foundation model의 3대 난제\n\n- **핵심**:\n  - 인간이 기계를 가장 크게 앞서는 축 = **versatility**(다양한 물리 환경 과제를 언어 명령·교란에 지능적으로 대응). 이를 위해선 embodied robot data로 학습해야 한다.\n  - LLM/VLM의 **foundation model 패러다임(대규모 pre-train → curated fine-tune)** 을 로봇에 적용하면 data scarcity(다른 task·로봇·비로봇 소스까지 활용)와 generalization/robustness를 동시에 겨냥할 수 있다.\n  - **3대 난제**: (1) **scale**(작은 규모에선 pre-training 효과가 안 나옴), (2) 다양한 데이터를 쓰면서 정교한 행동도 표현하는 **올바른 architecture**, (3) **올바른 training recipe**(가장 중요 — pre/post-training 데이터 curation).\n  - **π0 = 세 병목을 겨냥한 프로토타입**: pre-trained VLM 백본으로 Internet-scale 지식 상속 → 로봇 action을 추가 학습해 **VLA**로 전환. **cross-embodiment**(single/dual-arm·mobile) + **action chunking + flow matching**(diffusion 변형)으로 최대 50Hz 제어.\n- **왜 / 직관**: \"로봇에게도 GPT/PaliGemma식 pre-train→fine-tune을 적용하자.\" VLM 백본은 인터넷에서 세상 지식을 배운 **뇌**, action expert는 붙여준 **운동 피질**. pre/post 분리의 직관(운전 비유): *완벽한 시범 주행만* 보면 미끄러졌을 때 회복을 못 배우고, *잡다한 초보 주행만* 보면 매끄러운 운전을 못 배운다 → **둘을 합쳐** 평소엔 매끄럽게, 실수하면 회복 레퍼토리를 꺼낸다.\n- **그림 / 구조도**:\n\n  원본 그림 2: [arXiv Figure 2](https://arxiv.org/html/2410.24164v1/figures/fig2_final.jpeg)\n  ![](https://arxiv.org/html/2410.24164v1/figures/fig2_final.jpeg)\n  → 7 robot config·68 task로 pre-train된 π0가 mobile manipulator로 빨래를 건조기에서 꺼내 개는 대표 task. versatility 주장의 시각 근거.\n- **숫자**: 7 robot config · 68 task · **최대 50Hz** · **10,000시간+** 로봇 데이터.\n\n## II. Related Work — \"글자를 받아쓰는 정책\" vs \"획을 긋는 정책\"\n\n- **핵심**: 기존 VLA([RT-2/OpenVLA 등])는 action을 **text token처럼 autoregressive discretization**으로 뱉는다 → 느리고 50Hz 고빈도 dexterous에 난제. π0는 VLM을 **flow matching**(diffusion 변형)으로 fine-tune해 **high-frequency action chunk**를 한 번에 그린다. Transfusion류(seq 원소에 diffusion loss) + 별도 weight(diffusion token 전용) 아이디어를 VLA에 통합한 **최초의 flow matching VLA**. 데이터도 **~10,000시간**으로 저자 주장 로봇 학습 최대 규모.\n- **왜 / 직관**: 손 움직임을 \"왼쪽-위-잡기\"처럼 **단어로 받아쓰는 것**(기존 VLA) vs **붓으로 획을 긋듯** action chunk 전체를 노이즈에서 부드럽게 복원하는 것(π0). 후자가 고주파 정밀 조작에 유리.\n\n## III. Overview — 2단계 레시피\n\n- **핵심**: 학습 2단계 — (1) **pre-training**: (자체 dexterous 7 config·68 task) + (전체 OXE 22 robot)의 가중 조합 + 다양한 language label(task name + ~2초 segment annotation)로 **broad base model**(무엇이든 서투르게라도 함). (2) **post-training**: 고품질 curated data로 특정 downstream을 **능숙하게**. 모델 = **PaliGemma VLM + flow matching action output** → π0. PaliGemma를 쓴 이유 = 편의성 + 작은 크기(real-time 유리); 프레임워크는 어떤 VLM과도 호환.\n- **왜 / 직관**: PaliGemma = \"박학다식하지만 손이 없는 사람\", action expert = 붙여준 \"손·운동신경\". pre-training=기초 교양(넓지만 얕음), post-training=전문 도제(좁지만 깊음).\n- **그림 / 구조도**:\n\n  원본 그림 3: [arXiv Figure 3](https://arxiv.org/html/2410.24164v1/x1.png)\n  ![](https://arxiv.org/html/2410.24164v1/x1.png)\n  → pre-training mixture → **flow matching VLA(큰 VLM backbone + 작은 action expert)** → 다중 embodiment 제어. 이 논문 전체 로드맵.\n\n---\n\n## IV. The π0 Model (★ 심장)\n\n- **핵심**:\n  - 표준 late-fusion VLM 레시피(image encoder가 로봇 이미지를 language token과 같은 embedding space로 투영) + 로봇 특화 입출력(state·action) 추가.\n  - 연속 action 분포를 discrete token이 아니라 **conditional flow matching**으로 모델링(고정밀·multimodal → 고주파 dexterous에 적합).\n  - **Transfusion 영감**: 한 transformer를 두 목적으로 학습 — continuous token은 **flow matching loss**, discrete token은 **cross-entropy**. 그 위에 **로봇 token 전용 별도 weight**(=2-element **MoE**: ① image/text = VLM backbone, ② 로봇 state/action = **action expert**).\n  - 관측 $o_t$가 주어졌을 때 미래 **action chunk** $A_t$의 분포 $p(A_t\\mid o_t)$를 모델링. **H=50**.\n\n- **모듈 분해 (top-down)**:\n  - **A) VLM backbone (PaliGemma, ~3B)** — 목적: 이미지+언어 처리, Internet-scale 표현 제공(MoE 1번째 expert). 입력→출력: $[I^1_t..I^n_t,\\ \\ell_t]$(RGB 로봇당 2–3장 + language) → action expert가 attend하는 prefix. 내부: Gemma-2B 기반(width 2048·depth 18·mlp 16384·heads 18·**multi-query**(kv_heads 1)·head_dim 256), block-wise mask로 **미래 블록(로봇 입력)을 못 봐** VLM 사전학습 분포 유지.\n  - **B) Action expert (300M)** — 목적: 로봇 token(state·noisy action) 처리 + **velocity field 예측**(MoE 2번째 expert). 입력→출력: $[q_t,\\ A_t^\\tau]$(state + noisy action H개 + timestep τ) → $v_\\theta(A_t^\\tau,o_t)$(H×d). 내부: **from scratch**, width 1024·mlp 4096(작게 = 추론 때 10번 반복되므로 실시간용). backbone과 **self-attention에서만** 상호작용(width 불일치 허용).\n  - **C) Encoders + linear projection** — 이미지/state를 language embedding space로 정렬. action은 timestep MLP(식 7)로 임베드.\n  - → 연결: prefix(A) 표현 위에서 action expert(B)가 flow matching으로 action chunk를 뽑고, 추론 때 A의 KV는 캐싱(§A-D).\n\n- **30초 큰 그림 (flow matching)**: 완성된 동작 $A_t$에 **물을 타 흐릿하게** 한 상태 $A_t^\\tau$를 놓고, \"어느 방향으로 저으면 물이 빠져 원본이 선명해지나\"(velocity $u=\\epsilon-A_t$)를 네트워크가 배운다. τ=물의 농도(0=순수 노이즈, 1=원본). 추론 땐 순수 노이즈에서 시작해 배운 방향으로 **10번 작은 스텝(Euler)** 저어가며 복원.\n\n**수식**:\n\n$$\nL^{\\tau}(\\theta)=\\mathbb{E}_{p(\\mathbf{A}_{t}\\mid\\mathbf{o}_{t}),\\,q(\\mathbf{A}_{t}^{\\tau}\\mid\\mathbf{A}_{t})}\\big\\lVert \\mathbf{v}_{\\theta}(\\mathbf{A}_{t}^{\\tau},\\mathbf{o}_{t})-\\mathbf{u}(\\mathbf{A}_{t}^{\\tau}\\mid\\mathbf{A}_{t})\\big\\rVert^{2} \\qquad (1)\n$$\n\n- **무슨 식?**: 예측 속도장 $v_\\theta$가 정답 속도장 $u$를 맞추게 하는 **L2 회귀**(conditional flow matching loss).\n- **비유**: 안갯속에서 \"집으로 가는 방향\"을 가리키는 연습 — 내가 가리킨 방향($v_\\theta$)과 GPS 정답($u$)의 어긋난 각도를 줄인다.\n- **기호**: 아래첨자 $t$=robot timestep, 위첨자 $\\tau\\in[0,1]$=flow timestep. 기대값은 데이터 $p(A_t\\mid o_t)$와 노이즈 경로 $q(A_t^\\tau\\mid A_t)$ 둘에 대해.\n\n$$\nq(\\mathbf{A}_{t}^{\\tau}\\mid\\mathbf{A}_{t})=\\mathcal{N}(\\tau\\mathbf{A}_{t},\\,(1-\\tau)\\mathbf{I}) \\qquad (2)\n$$\n\n- **무슨 식?**: 원본과 가우시안 노이즈를 $\\tau:(1-\\tau)$로 **섞는** linear-Gaussian(=optimal transport) 확률 경로.\n- **콕 집어 못박기**: τ=0이면 순수 노이즈, τ=1이면 원본 $A_t$. (일반 diffusion과 반대 방향 규약 — 여기선 **τ가 1로 갈수록 깨끗**.)\n\n$$\n\\mathbf{A}_{t}^{\\tau}=\\tau\\mathbf{A}_{t}+(1-\\tau)\\,\\boldsymbol{\\epsilon},\\qquad \\boldsymbol{\\epsilon}\\sim\\mathcal{N}(\\mathbf{0},\\mathbf{I}) \\qquad (3)\n$$\n\n- **무슨 식?**: 식(2)의 reparameterization — 정답과 노이즈를 직선 보간해 학습용 **noisy action**을 만든다.\n\n$$\n\\mathbf{u}(\\mathbf{A}_{t}^{\\tau}\\mid\\mathbf{A}_{t})=\\boldsymbol{\\epsilon}-\\mathbf{A}_{t} \\qquad (4)\n$$\n\n- **무슨 식?**: 네트워크가 맞춰야 할 **정답 속도(velocity target)** = 노이즈에서 원본을 뺀 벡터.\n- **콕 집어 못박기**: 부호는 $\\epsilon - A_t$(노이즈→데이터 적분 규약). 헷갈리면 \"식(3)이 τ=1에서 원본\"이라는 약속을 떠올린다.\n\n$$\n\\mathbf{A}_{t}^{0}\\sim\\mathcal{N}(\\mathbf{0},\\mathbf{I}),\\qquad \\mathbf{A}_{t}^{\\tau+\\delta}=\\mathbf{A}_{t}^{\\tau}+\\delta\\,\\mathbf{v}_{\\theta}(\\mathbf{A}_{t}^{\\tau},\\mathbf{o}_{t}) \\qquad (5)\n$$\n\n- **무슨 식?**: **추론** — 순수 노이즈에서 시작해 배운 속도장을 **forward Euler로 δ씩 적분**해 action chunk 복원. 실험 $\\delta=0.1$ → **10 step**.\n\n$$\n\\mathbf{o}_{t}=[\\mathbf{I}^{1}_{t},\\dots,\\mathbf{I}^{n}_{t},\\ \\ell_{t},\\ \\mathbf{q}_{t}],\\qquad \\mathbf{A}_{t}=[a_{t},\\dots,a_{t+H-1}],\\ H=50 \\qquad (6)\n$$\n\n- **무슨 식?**: 관측 = 이미지들 + 언어 $\\ell_t$ + 관절 state $q_t$; action chunk = 미래 H스텝 동작 묶음.\n\n- **그림 / 구조도** (Fig 3은 개요만 → 세부는 ASCII):\n  ```\n  o_t = [ I^1_t..I^n_t (2~3 RGB) , ℓ_t (lang) , q_t (joint state) ]        A_t^τ = [ a^τ_t .. a^τ_{t+H-1} ] (H=50)\n          img enc+proj              tokenizer     state proj                        action+τ MLP (식7)\n                              └──────────── SINGLE TRANSFORMER (MoE 2-expert, Transfusion식) ───────────┘\n                                [Expert1] PaliGemma 3B (img+text)      [Expert2] action expert 300M (state+action)\n                                block-wise CAUSAL mask, 3블록(블록내 bidirectional):\n                                   B1=[imgs,ℓ_t] → B2=[q_t] → B3=[a^τ...]   (Bk는 미래 블록 못 봄)\n                                   B1,B2 KV는 추론 때 캐싱 → 매 스텝 B3만 재계산\n                              → v_θ(A_t^τ, o_t)\n    TRAIN: A_t^τ=τA_t+(1-τ)ε ─ loss ‖v_θ−(ε−A_t)‖² (τ~Beta, 저-τ 강조)\n    INFER: A_t^0~N(0,I) ─ Euler 10 step(δ=0.1) ─▶ A_t^1 = action chunk\n  ```\n- **숫자**: H=50 · 10 step(δ=0.1) · 이미지 2–3장 · **PaliGemma 3B + action expert 300M = 3.3B** · π0-small(non-VLM baseline) 470M.\n\n---\n\n## V. Data Collection and Training Recipe\n\n- **핵심**:\n  - **Pre-training mixture**: 9.1% open-source(OXE·Bridge v2·DROID, 2–10Hz 저주파·카메라 1–2대) + 나머지 **자체 903M timesteps**(single-arm 106M + dual-arm 797M), **68 task**. (여기 'task'는 'bussing'처럼 복합 behavior 전체 하나 → 실제 다양성은 68보다 훨씬 큼.)\n  - **불균형 완화**: task-robot 조합을 $n^{0.43}$로 가중(과대표집된 laundry folding 등 down-weight).\n  - **차원 통일**: config $q_t$·action $a_t$를 데이터셋 최대 로봇 차원 **18D**(팔 2 + 그리퍼 2 + base + torso)로 zero-pad, 결측 이미지 슬롯은 mask.\n  - **Post-training**: task별 소규모 fine-tune(쉬운 것 **5시간** ~ 복잡한 것 **100시간+**). 복잡 task는 **high-level VLM policy**가 \"bus the table\"→\"pick up the napkin\"으로 분해(SayCan류).\n\n**수식**:\n\n$$\nw \\propto n^{0.43} \\qquad (7)\n$$\n\n- **무슨 식?**: 조합 크기 $n$(timestep 수)의 **sub-linear(0.43제곱) 가중** — 볼륨 노브. 지수<1이라 큰 조합을 완전히 죽이지 않고 부분적으로만 눌러 다양성 확보.\n\n- **그림 / 구조도**:\n\n  원본 그림 5: [arXiv Figure 5](https://arxiv.org/html/2410.24164v1/x2.png)\n  ![](https://arxiv.org/html/2410.24164v1/x2.png)\n  → single/dual-arm(6·7-DoF) + holonomic/nonholonomic mobile manipulator. π0는 이 **모든 플랫폼에서 joint 학습**.\n- **숫자**: 903M timesteps(106M+797M) · 68 task · 7 config · OXE 22 robot · $n^{0.43}$ · 18D pad · post 5–100h+.\n\n---\n\n## VI. Experimental Evaluation\n\n- **핵심 (네 축)**:\n  - **VI-A base model zero-shot**: 5개 task(shirt folding·bussing easy/hard·grocery bagging·toast). full **700k step** π0가 OpenVLA·Octo(같은 데이터 학습) 대비 **전 task 큰 폭 우위**; baseline과 업데이트 수를 맞춘 160k step \"parity\" 버전조차 baseline 능가.\n  - **VI-B language following**: 중간 언어 명령을 **사람**(-human)/**high-level VLM**(-HL)이 주면 flat(전체 명령만) 대비 크게 향상. **π0-small은 language following이 약해** high-level 도움을 못 받음 → VLM 백본의 가치 입증.\n  - **VI-C fine-tuning**: pre-train된 π0가 from-scratch보다 큰 이득, 적은 데이터로도 학습(Fig 11).\n  - **VI-D 복잡 multi-stage**: laundry folding(정지/이동), 실제 lunch table bussing, box assembly, egg carton 등 **수십 분 장기 task**. full pre-trained π0가 max score의 50%+ 달성, ablation 상회.\n- **그림**:\n\n  원본 그림 7: [arXiv Figure 7](https://arxiv.org/html/2410.24164v1/figures/pretrain_tasks.png)\n  ![](https://arxiv.org/html/2410.24164v1/figures/pretrain_tasks.png)\n  → zero-shot: π0(700k)·π0(160k parity)·π0-small vs OpenVLA·Octo. 모든 task·비교에서 parity 버전조차 baseline 상회, full이 최고.\n\n---\n\n## VII. Discussion, Limitations, and Future Work\n\n- **핵심 기여**: VLM pre-training + flow matching 기반 **generalist robot policy 아키텍처** + robot foundation model의 **pre/post-training recipe 경험적 조사**. end-to-end 로봇 학습 문헌 중 **가장 긴 dexterous task**(수십 분 laundry folding 등)를 단일 cross-embodiment 모델로 시연.\n- **한계(저자)**: pre-training 데이터 조합의 최적 비율은 open question, 일부 task는 여전히 신뢰성 부족, 어떤 task에 얼마나 데이터가 필요한지 예측 어려움.\n\n---\n\n## Appendix (요지)\n\n### A-B Model Architecture Details\n- PaliGemma 위에 3가지 추가: (1) 로봇 token 입출력 projection, (2) **timestep MLP**, (3) action expert weight set.\n- 토큰 순서: [이미지들] → [language $\\ell_t$] → [state $q_t$] → [noisy action chunk $A_t^\\tau$, 50개]. 출력 중 action 50 token만 linear proj로 $v_\\theta$ 디코딩.\n- **block-wise causal attention(3블록)**: 블록 내부 full bidirectional, 블록 간 미래 못 봄. **B1=[img+lang]**(PaliGemma 분포 보호), **B2=[q_t]**(스텝마다 불변 → KV 캐싱), **B3=[actions]**(전체 attend).\n\n**수식 — action+timestep embedding**:\n\n$$\n\\mathrm{emb}(\\mathbf{a}_{t'}^{\\tau})=W_{3}\\cdot\\mathrm{swish}\\!\\big(W_{2}\\cdot\\mathrm{concat}(W_{1}\\mathbf{a}_{t'}^{\\tau},\\ \\phi(\\tau))\\big) \\qquad (8)\n$$\n\n- **무슨 식?**: 각 noisy action에 flow timestep τ를 **sinusoidal PE** $\\phi(\\tau)$로 주입해 transformer 입력 embedding 생성. $W_1\\in\\mathbb{R}^{w\\times d}$, $W_2\\in\\mathbb{R}^{w\\times 2w}$, $W_3\\in\\mathbb{R}^{w\\times w}$ ($w$=expert width, $d$=action 차원).\n\n**수식 — 학습 timestep 분포**:\n\n$$\np(\\tau)=\\mathrm{Beta}\\!\\Big(\\tfrac{s-\\tau}{s};\\ 1.5,\\ 1\\Big),\\qquad s=0.999 \\qquad (9)\n$$\n\n- **무슨 식?**: **낮은 τ(높은 노이즈) 구간을 집중 학습**하는 shifted/scaled beta. $s$ 이상 timestep은 아예 샘플 안 함(step $\\delta>1-s$면 불필요).\n- **왜?**: 로봇은 관측 $o_t$가 **매우 informative**(답을 강하게 좁힘)해서, \"정보 없이 평균 동작을 찍는\" 가장 어려운 저-τ 구간을 더 연습시켜야 한다 — 이미지 생성(텍스트가 느슨히 제약)과 대비.\n\n  원본 그림 14: [arXiv Figure 14](https://arxiv.org/html/2410.24164v1/x7.png)\n  ![](https://arxiv.org/html/2410.24164v1/x7.png)\n  → 저-τ(noisier) 강조 + 컷오프 s=0.999 timestep 샘플링 분포.\n\n### A-D Inference\n- 추론 = 식(5)의 forward Euler 10 step. **prefix**($o_t$: 이미지·언어·state)**의 KV를 캐싱**하고 매 적분 스텝마다 **action suffix만 재계산** → 실시간(최대 50Hz) 제어. (구체 latency 표는 원문 A-D.)\n\n---\n\n## 한눈에 정리\n\n- **문제**: 로봇 foundation model의 3난제(scale·architecture·recipe). 특히 기존 VLA의 autoregressive discretization은 고주파 dexterous에 약함.\n- **해법**: **PaliGemma VLM 백본 + flow matching action expert**(MoE 2-expert, Transfusion식). 관측→**연속 action chunk(H=50)** 를 식(1–5)의 conditional flow matching으로 생성, 추론은 10-step Euler.\n- **레시피**: LLM식 **pre-train**(903M·68task·7config, $n^{0.43}$) → **post-train**(고품질 5–100h). 복잡 task는 high-level VLM이 subtask 분해.\n- **구조 디테일**: block-wise causal mask 3블록(B1 img+lang / B2 state / B3 actions), B1·B2 KV 캐싱; action expert는 작게(1024/4096) = 실시간; 저-τ 강조 beta(식 9).\n- **성과**: zero-shot에서 OpenVLA·Octo 큰 폭 우위, 수십 분 장기 dexterous task(빨래 개기 등) 시연. **이후 VLA 계보(π0.5·LingBot·Fast-WAM action expert)의 기반.**\n\n## ⚠️ 확인 필요 / 나중에 (TODO)\n\n- [ ] **§VI 정량 성공률 표**: 본 노트는 zero-shot 우위·복잡task 50%+ 등 정성/헤드라인만. per-task 성공률 수치는 원문 Fig 7/9/13 그래프에서 직접
