  <script>
  const MD = "# 로봇 하드웨어 플랫폼 (Robot Hardware Platforms)\n\n> 로봇을 처음 보는 사람을 위한 입문 정리. VLA·WM 논문은 거의 항상 **\"이 정책을 어떤 로봇(=embodiment, 본체)에서 학습/평가했나\"** 를 말한다. 그래서 로봇 본체 종류와 기본 용어만 알아도 논문이 훨씬 잘 읽힌다. 아래는 (1) 꼭 아는 용어 → (2) 로봇 큰 분류 → (3) 논문에 자주 나오는 실제 기종 순서.\n\n### (1) 꼭 아는 기본 용어 (쉽게)\n- **자유도 (DoF, Degrees of Freedom)** — 로봇이 따로따로 움직일 수 있는 **관절(축)의 개수**. 사람 팔로 비유하면 어깨·팔꿈치·손목을 합쳐 약 7개. 로봇 팔은 보통 **6 또는 7 DoF**. 7 DoF면 *손 위치는 그대로 둔 채 팔꿈치 각도만 바꾸는* 여유가 생겨(여유자유도) 좁은 곳·장애물 회피에 유리.\n- **end-effector (말단장치)** — 팔 맨 끝의 \"손\". 대부분 **gripper(집게)** = 두 손가락으로 집기. 더 복잡하면 손가락 여러 개짜리 **dexterous hand**.\n- **base (바닥 방식)** — ① **고정형(fixed base)**: 책상에 볼트로 고정한 팔 (예: Franka). ② **바퀴형(wheeled)**: 바퀴 몸통 위에 팔 (예: RB-Y1, Galaxea R1). ③ **다리형(legged)**: 두 다리로 걷는 휴머노이드 (예: Unitree G1/H1).\n- **single-arm vs bimanual** — 팔 1개 vs **양팔 2개**. 빨래 개기·박스 들기 같이 두 손이 필요한 작업은 bimanual이 필요.\n- **cobot (협동로봇)** — 사람 옆에서 안전하게 일하도록 **힘/토크를 감지**해 부딪히면 멈추는 팔. (Franka가 대표)\n- **payload (가반하중)** — 팔이 들 수 있는 최대 무게(kg). **reach (작업반경)** — 팔이 닿는 최대 거리(mm).\n- **proprioception (자기감각)** — 로봇이 \"지금 내 관절이 몇 도인지\"를 스스로 아는 것(관절 센서값). VLA 입력 = 카메라 영상 **+** 이 관절각.\n- **teleoperation (원격조종)** — 사람이 마스터 장치로 로봇을 직접 움직여 **시범**을 보이는 것. 이렇게 모은 (영상, 행동) 쌍이 **imitation learning(모방학습)** 데이터가 된다. → [Action chunk](#action-chunk-행동-청크) 참조.\n- **action space (행동 공간)** — 정책이 출력하는 숫자 벡터. 단일 팔은 보통 **7-D**(end-effector 위치·자세 변화 6개 + 집게 열기/닫기 1개). 양팔이면 그 2배 + 몸통/바퀴.\n- **control frequency (제어 주파수)** — 1초에 명령을 몇 번 보내나(Hz). 높을수록(예: 1 kHz = 초당 1000번) 더 정밀·부드럽다.\n- **embodiment (본체)** — 정책이 올라가는 \"몸\". 같은 VLA를 여러 로봇에 학습하면 **cross-embodiment**(형태 일반화).\n\n### (2) 로봇 큰 분류 3가지\n1. **로봇 팔 (manipulator)** — 고정형 6~7 DoF 팔. 연구의 표준 기본형. 예: **Franka, Realman, ARX, AgileX PiPER**.\n2. **양팔 모바일 매니퓰레이터** — 바퀴 몸통 + 양팔(+ 위아래로 늘어나는 승강 몸통). 집안일급 작업·데이터 수집용. 예: **RB-Y1, Galaxea R1, AgiBot G1, AgileX Cobot Magic**.\n3. **휴머노이드 (다리형)** — 두 다리로 걷는 사람형. 예: **Unitree G1/H1, Leju KUAVO, Qinglong**.\n\n> ⚠️ 아래 표의 수치는 **모델 세대·구성마다 다르고 일부는 2차 출처 기반**이라 대략값(`~`)이며, 확인 못 한 항목은 `미상`. 정확한 값은 제조사 공식 스펙시트 대조 권장.\n\n### (3) 논문에 자주 나오는 실제 기종\n| 로봇 | 제조사 (국가) | 종류 | 팔 DoF | 한 줄 |\n|---|---|---|---|---|\n| **Franka** (Panda / FR3) | Franka Robotics (독일) | 고정형 단일 팔 · 토크제어 cobot | **7** | 로봇학습의 **표준 팔**. payload ~3 kg(FR3)/~7 kg(Panda·대략), reach ~80 cm, 1 kHz 제어. \"Bimanual Franka\"=2대 양팔 |\n| **RB-Y1** (RBY1) | Rainbow Robotics (한국) | 바퀴형 양팔 (휴머노이드형) | **7×2** + 6 몸통 | 한국 최초 양팔 모바일 매니퓰레이터. teleop 시범수집용, 무게 ~131 kg, 승강 >50 cm, 오픈 SDK |\n| **AgiBot G1** (Genie G1) | AgiBot 智元 (중국) | 바퀴형 양팔 휴머노이드 | ~26 DoF(상체) | 대규모 데이터 수집(AgiBot World 100만+ 시범)·GO-1 VLA용. 키 1.3~1.8 m 가변, ~150 kg |\n| **AgileX** (PiPER / Cobot Magic) | AgileX 松灵 (중국) | PiPER=고정 단일 팔 / Cobot Magic=바퀴 양팔(Mobile-ALOHA식) | 6 (~7) | 저가 teleop 데이터 수집의 단골. PiPER payload ~1.5 kg |\n| **Galaxea R1** (Lite/Pro) | Galaxea AI 星海图 (중국) | 바퀴형 양팔 (\"wheeled humanoid\") | **6×2** + 4 몸통 | LingBot-VLA·자체 G0 VLA가 쓰는 플랫폼. R1 Pro payload 7 kg, 수직 작업범위 ~2 m |\n| **Unitree G1 / H1** | Unitree (중국) | **다리형** 휴머노이드 (이족보행) | G1 23~43 / H1 ~27 (전신) | 저가 연구 휴머노이드. G1 ~1.32 m·35 kg, H1 ~1.8 m·47 kg. LeRobot/Isaac 지원 |\n| **Realman** RM65/RM75 | RealMan (중국) | 고정형 단일 팔 · 경량 cobot | RM65=6 / RM75=7 | 저가·ROS 친화 팔, payload ~5 kg. (※ \"RS-02\"는 별개의 양팔 로봇) |\n| **Leju KUAVO** | Leju (중국) | 다리형 휴머노이드 | 7×2 팔 + 6×2 다리 = 26 | 오픈소스(ROS) 휴머노이드, ~1.5 m·~45 kg |\n| **ARX** X5 (+Lift 베이스) | ARX 方舟无限 (중국) | 경량 단일 팔 (+바퀴 베이스로 양팔모바일) | ~6 (미확정) | 저가 연구 팔. RoboMIND 등 데이터셋의 embodiment |\n| **Qinglong 青龙** (OpenLoong) | 상하이 휴머노이드 혁신센터 (중국) | 다리형 휴머노이드 | 43(전신) | 오픈소스 풀사이즈 휴머노이드, 185 cm·80 kg, payload ~40 kg |\n\n### Franka 와 RB-Y1 — 조금 더\n- **Franka** (Franka Emika Panda → 후속 FR3): 독일제 **7 DoF 단일 팔**. *토크제어 cobot*이라 부딪히면 멈추고, 힘을 느껴 부드럽게 닿는 동작(contact-rich)이 가능해 연구에서 **사실상 표준 팔**이다. LIBERO 같은 벤치마크의 기본 팔이며, 논문에서 행동은 보통 **7-D 벡터**(손끝 위치·자세 변화 6 + 집게 1). \"**Bimanual Franka**\"는 이 팔 2대를 양팔로 묶은 셋업(LingBot-VLA의 9종 구성 중 하나).\n- **RB-Y1** (RBY1): 한국 **레인보우로보틱스**의 **바퀴형 양팔** 로봇. **팔 7 DoF × 2 + 6축 승강 몸통**에 전방향(omni) 바퀴 베이스가 붙어, 서서 닿는 높이를 50 cm 넘게 바꾸며 양손 작업을 한다. teleop으로 사람이 시범을 보여 **모방학습 데이터를 모으는** 용도로 쓰인다. (총 DoF는 집계 방식에 따라 ~20~24로 출처마다 다름, 정확 키는 미상.)\n\n> 정리: 위 기종들은 \"모델\"이 아니라 **로봇 본체(embodiment)** 다. VLA/WM 논문에서 보이면 \"이 정책을 어떤 몸에서 학습/평가했나\"로 읽으면 된다. 단일 팔(Franka·Realman·ARX)은 책상 위 정밀 조작, 바퀴형 양팔(RB-Y1·Galaxea·AgiBot)은 이동+양손 집안일, 다리형(Unitree·KUAVO·Qinglong)은 전신 보행+조작 연구에 쓰인다.\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else

    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
