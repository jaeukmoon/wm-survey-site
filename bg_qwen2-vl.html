  <script>
  const MD = "# Qwen2-VL — Naive Dynamic Resolution VLM 전체 구조\n\n> Wang et al., *Qwen2-VL* (arXiv:2409.12191). 위 'VLM 구조' 토픽 §4가 Qwen2-VL을 **커넥터 계열**(native dynamic resolution)로 분류한 것을 여기선 **전체 아키텍처**로 펼친다. InternVLA-M1·StarVLA 등 다수 VLA가 System2 백본으로 사용. [ViT](bg_vit.html)를 비전 인코더로 쓰되 3가지를 바꾼다.\n\n### 전체 아키텍처 한눈에\n\n```\n[가변 해상도 이미지 / 비디오 (원해상도·원종횡비 보존)]\n        │\n        ▼\n┌─────────────────────────────────────────────┐\n│ Vision Encoder = ViT (~675M, patch=14)       │  ViT에서 바뀐 점:\n│  · absolute PosEmb 제거 → 2D-RoPE            │   ① 고정 해상도 → Naive Dynamic Resolution\n│  · Naive Dynamic Resolution(가변 패치 수)    │   ② 1D learnable PosEmb → 2D-RoPE\n│  · 비디오: 3D tube(인접 2프레임 묶음)        │   ③ [CLS] 분류 head 없음(patch 토큰 전부 사용)\n└─────────────────────────────────────────────┘\n        │  가변 patch 토큰 (이미지 크기 비례)\n        ▼\n┌─────────────────────────────────────────────┐\n│ MLP Patch-Merge:  인접 2×2 토큰 → 1 토큰      │  토큰 수 1/4로 압축\n└─────────────────────────────────────────────┘\n        │  <|vision_start|> v_1 v_2 … v_k <|vision_end|>\n        ▼\n[ 텍스트 토큰 ⊕ 시각 토큰 을 한 시퀀스로 concat ]  + 위치 = M-RoPE(시간/높이/너비)\n        │\n        ▼\n┌─────────────────────────────────────────────┐\n│ LLM = Qwen2 (decoder-only Transformer)       │   크기: 2B / 7B(~8B total) / 72B\n└─────────────────────────────────────────────┘\n        │\n        ▼\n[ 텍스트 출력 (autoregressive) ]\n```\n\n> 큰 그림: **[ViT](bg_vit.html)로 이미지→패치 토큰 → 2×2로 압축 → 텍스트와 한 줄로 이어 Qwen2 LLM에 넣는다.** LLaVA식 \"projection+concat\"의 확장판인데, **해상도·종횡비를 보존**하고 위치를 **M-RoPE**로 통일한 것이 차별점.\n\n### ① Naive Dynamic Resolution (가변 해상도)\n\n```\nLLaVA/기존 ViT:  모든 이미지 → 224² 강제 resize → 항상 256 패치(고정)\nQwen2-VL:        이미지 원해상도 그대로 → 가변 패치 수\n   작은 이미지(소수 토큰)  ┐\n   큰 이미지(다수 토큰)    ┤→ min_pixels~max_pixels로 토큰 수 상·하한 제어\n   세로/가로 긴 이미지     ┘   종횡비 보존(distortion 없음)\n```\n- ViT의 **absolute position embedding을 제거**하고 **2D-RoPE**(rotary를 가로·세로축으로)로 위치 인코딩 → 임의 해상도/패치 격자에 자연 대응.\n- 효과: OCR·차트·문서·다양한 크기 이미지에 강함. 단 가변 토큰이라 배칭/서빙 메모리 예측이 어려움(그래서 min/max_pixels).\n\n### ② 2×2 Patch-Merge (토큰 압축)\n\n```\nViT 출력 패치 격자                Patch-Merge 후\n┌──┬──┬──┬──┐                    ┌─────┬─────┐\n│v1│v2│v5│v6│  인접 2×2 묶어     │ m1  │ m2  │   토큰 수 1/4\n├──┼──┼──┼──┤  MLP로 1토큰 →     ├─────┼─────┤\n│v3│v4│v7│v8│                    │ m3  │ m4  │   m = MLP(concat(v_a,v_b,v_c,v_d))\n└──┴──┴──┴──┘                    └─────┴─────┘\n```\nLLM에 들어가는 시각 토큰 수를 1/4로 줄여 긴 시퀀스 부담(self-attn O(n²)) 완화. 압축된 토큰열은 `<|vision_start|> … <|vision_end|>` 특수 토큰으로 감싼다.\n\n### ③ 비디오 처리 (3D tube)\n\n```\n비디오 프레임:  f1 f2 f3 f4 f5 f6 …\n                └┬─┘ └┬─┘ └┬─┘\n            3D conv로 인접 2프레임을 하나의 \"tube\"로 묶어 처리(시간 depth=2)\n            → 시간축도 토큰화. (이미지는 동일 프레임 2장으로 취급해 일관성 유지)\n            → 전체 토큰 상한(예: 비디오당 ~16384)으로 길이 제어\n```\n\n### ④ M-RoPE (Multimodal Rotary Position Embedding) — 핵심\n\n```\n일반 1D RoPE:  위치 = 단일 정수 인덱스 (텍스트 전용)\nM-RoPE:        위치 = (temporal, height, width) 3개 성분으로 분해\n\n  텍스트:  (t, t, t)        세 성분 동일 → 사실상 1D RoPE와 동치\n  이미지:  (t_const, h, w)  시간 고정, 높이·너비는 패치 격자 위치\n  비디오:  (t↑, h, w)       프레임마다 t 증가 + 공간 h,w\n```\n\n![Qwen2-VL M-RoPE](https://arxiv.org/html/2409.12191v2/images/mrope.png)\n> Figure 3 (Qwen2-VL): rotary 임베딩을 시간·높이·너비로 분해해 텍스트/이미지/비디오 위치를 한 틀에서 모델링. 텍스트·이미지·비디오를 한 시퀀스에 섞어도 위치가 일관되고, 최대 position id 값이 작아져 **길이 외삽(long-context)** 에 유리.\n\n### 학습 3단계\n\n```\nStage 1: ViT(비전 인코더)만 학습 — 대규모 image-text로 시각-언어 정렬\nStage 2: 전체 파라미터 학습(ViT+LLM) — 멀티모달 본학습(~1.4T 토큰 규모)\nStage 3: LLM instruction tuning — ViT 동결, LLM만 지시-따르기 튜닝\n```\n\n### vanilla [ViT](bg_vit.html) 기반 VLM과의 차이 요약\n\n```\n┌──────────────────────┬───────────────────────┬──────────────────────────┐\n│                      │ LLaVA (vanilla ViT)   │ Qwen2-VL                 │\n├──────────────────────┼───────────────────────┼──────────────────────────┤\n│ 입력 해상도          │ 224²/336² 고정 resize │ 원해상도 가변(dynamic)   │\n│ 비전 위치 인코딩     │ learnable 1D PosEmb   │ 2D-RoPE                  │\n│ 시각 토큰 수         │ 고정(256/576)         │ 가변(크기 비례), 2×2압축 │\n│ 멀티모달 위치        │ 1D(텍스트 RoPE만)     │ M-RoPE(t/h/w)            │\n│ 비디오               │ 약함/프레임 나열      │ 3D tube 통합             │\n│ 커넥터               │ MLP projection        │ MLP merge + 직접 concat  │\n└──────────────────────┴───────────────────────┴──────────────────────────┘\n```\n\n---\n";
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('dd-body');
    // Math must be handled DURING marked parsing (marked-katex-extension), else
    // marked mangles LaTeX (underscores -> <em>, $$ blocks -> <p>) before KaTeX runs.
    let katexInMarked = false;
    try {
      // nonStandard: true — allow inline $...$ followed immediately by Korean particles (와/는/로),
      // otherwise the default regex requires whitespace/punctuation after closing $ and skips them.
      if (window.markedKatex) { marked.use(window.markedKatex({throwOnError: false, nonStandard: true})); katexInMarked = true; }
    } catch (e) {}
    // Disable GFM strikethrough: the notes use ~ for "approx"/ranges (1.5~2.8x, ~20,000,
    // 8~256 GPU); marked pairs two ~ in a line into <del>. Consume ~ runs as literal text.
    try {
      marked.use({ extensions: [{
        name: 'noStrike', level: 'inline',
        start(s) { return s.indexOf('~'); },
        tokenizer(s) { const mm = s.match(/^~+/); if (mm) return { type: 'noStrike', raw: mm[0], text: mm[0] }; },
        renderer(t) { return t.text; }
      }] });
    } catch (e) {}
    el.innerHTML = marked.parse(MD);
    // Fallback only if the extension failed to load (e.g. offline CDN)
    if (!katexInMarked && window.renderMathInElement) renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ], throwOnError: false
    });
  });
  </script>

async function runUpdate(){
  const st = document.getElementById('upd-status');
